body:
  text: 甘肅通志卷三十九隱逸唐虞聖世亦有巢由巖穴之士脫屣浮榮甘心肥遁衡泌自適考槃寤歌高風亮節遺世獨立自古在昔先民有作未可沒也編次如左志隱逸臨洮府明顧敬字允恭蘭州人少聰穎秀拔涉經史尤長書法與段堅聊讓友善言動有儀晚年好學彌篤年八十卒有文稿顔宗魯蘭州人性坦直不阿善書能詩文隱居自樂鄉評雅重周詢金縣人辭榮棄祿隱居養親足以表正鄉閭馮庸字定之蘭州人敦德尚行通春秋博子史喜真草明代典章一一手録成帙言談必根道義行檢必循禮度恬靜自守不求聞達人稱為博古君子云漢德金縣人隱居不仕絶迹名利尤逺避權勢鄉人以孤清高潔稱之張九疇字天錫狄道人器宇宏偉動有矩矱杜門不出絶口不言功名足迹不至公府探討經史從學者甚衆所著有五經考學庸節解拙齋文集王伯良字志善蘭州人潛心禮義之學言動不茍取豫必以義不妄交人不干謁貴顯有凖庵集東山樵唱鞏昌府周伯夷叔齊孤竹君之二子當紂時兄弟遜國聞文王善養老乃入周就養及武王東伐紂扣馬而諫至周有天下伯夷叔齊恥之不食周粟隱於首陽山采薇而食餓死按曹大家注幽通賦云隴西首陽縣有首陽山邑人楊恩有首陽辨漢任棠漢陽上邽人有竒節隱居教授漢陽太守龎參初到先候之棠不與言但以薤一大本水一盂置戶屏前自抱孫兒伏於戶下主簿白以為倨參思之良久曰棠是欲曉太守也水者欲吾清也拔大本薤者欲吾擊強宗也抱兒當戶欲吾開門恤孤也於是歎息而還皆用其言為名太守薑岐漢陽人守道隱居名著西州太守橋玄欲召為吏岐稱疾不就玄怒逼致之督郵尹益固爭得免岐卒堅卧不起晉朱沖字巨容南安人少有至行間靜寡欲鄰人失犢認沖犢以歸後得犢大慙以還沖沖竟不受有牛犯其禾稼沖屢持芻送牛而無恨色主愧之乃不復為暴咸寧四年詔補博士不應沖每聞徵書輒逃入山時人以為梁管之流沖居夷俗羌人奉之若君沖亦以禮讓為訓邑里化之道不拾遺村無凶人毒蟲猛獸皆不為害董京字威輦初與隴西計吏俱至洛陽被髮行吟嘗宿白社中時乞於市得殘碎繒絮結以自覆或見人排辱曽無怒色孫楚時為著作郎數就社中與語遂載與歸京不肯坐楚貽之書京答以詩後數年遁去莫知所之元萬敬儒寧逺人家貧嗜學不倦與人説書輒竟日棲止東郊畫水竹以自娛忽報朝使至抱琴踰垣而走不知所終明王輔安定諸生博極羣書應貢入京遂隱不出講學於木坡諸生重趼往從之講論經史數十年不入城府縣令黃沂請為鄉飲賔輔笑謝之至今鄉人稱儒者高蹈必以輔為首李文燦伏羌人洪武初舉人資性穎異夙學天成自負經書避兵石門數年乃還持身清苦以教人為已任終身不仕平涼府漢王符字節信安定臨涇人少好學有志操與馬融張衡崔瑗等友善當途者更相薦引而符獨耿介不同於俗以此不得升進志意藴憤乃隱居著書三十餘篇以譏當時失得不欲章顯其名故號曰潛夫論後度遼將軍皇甫規解官歸安定鄉人有為鴈門太守者去職還家謁規規卧不迎有頃白王符在門規驚遽而起衣不及帶屣履出迎援符手而還與同坐極歡時人為之語曰徒見二千石不如一縫掖言書生道義之為貴也石得林安定人建安初客三輔就學於宿儒欒文博始精詩書後好學靜默關中亂南入漢中不治産業不蓄妻孥常讀老子晝夜吟咏漢中破還長安人與不取問姓氏不言唐牛意仁字行恭安定鶉觚人大父通秉志守道交辟不起仁樂道丘園屢空宴如或勸之仕但笑而不答開元六年卒於伏羌官舍以子仙客贈涇州刺史宋樊處約崇信縣人建中靖國年進士文章氣誼為當時第一流值亂隱居不仕或以仕強之約慨然曰我宋人也死且為宋鬼忠臣豈事二主哉不食而卒人咸義之以方謝疊山明孫一元字太初平涼人嘗棲太白之巔故號太白山人善為詩風儀秀朗擕鐵笛鶴瓢遍遊中原齊魯南涉江淮吳越時劉麟以知府罷歸龍霓以僉事謝政並客湖州與郡人陸琨吳充招一元入社稱苕溪五隱舉人施侃勸之娶乃妻以妻之妹張氏生一女而卒充等葬之李夢陽有太白山人傳直𨽻秦州漢趙一字元叔漢陽西縣人體貌魁梧望之甚偉而恃才倨傲為鄉黨所擯乃作解擯光和初舉郡上計到京師時司徒袁逢受計計吏數百人皆拜伏庭中莫敢仰視一獨長揖而已逢望而異之延置上坐因問西方事大悅顧謂坐中曰此人漢陽趙元叔也朝臣莫有過之者往造河南尹羊陟尚卧未起一徑入上堂臨之因舉聲哭門下皆驚陟知其非常人乃起延與語大竒之陟明旦大從車騎造一時諸計吏多盛飾車馬帷幕而一獨柴車草屏露宿其傍延陟前坐于車下陟遂與言談至曛夕極歡而去曰良璞不剖必有泣血以相明者矣陟乃與袁逢共稱薦之名動京師及西還道經𢎞農過候太守皇甫規門者不即通一遂遁去規聞一名大驚乃追書謝之一報書遂去不顧州郡爭致禮命十辟公府並不就終於家著賦頌針誄雜文十六篇郭整秦安人漢安帝順帝時公府八辟公車五徵皆不就世仰其高晉楊軻天水人易學精微養徒數百嘗食粗衣褐悠然自得受業者非入室弟子莫得親言劉曜徵拜太常固辭不起隱于隴山曜敗秦人東徙軻留長安石季龍備束帛安車徵之軻以疾辭迫之乃發既見不拜與語不言有司以軻倨傲請從大不敬論季龍不從下書任軻所尚軻在永昌季龍每有饋餼輒口授弟子使為表謝其文甚美季龍乃密令美女夜以動之軻蕭然不顧遣壯士臨之以兵并劫其所賜衣服軻不言了無懼色嘗土牀布被下無茵褥潁川荀鋪好竒之士造而談經軻瞑目不答鋪發被露其形大笑之軻神體頽然無驚怒之狀時咸以為焦先之徒未有能量其淺深也後求還季龍送以安車蒲輪蠲十戶供之自歸秦州仍教授不絶郭荷字承休略陽人也六世祖整及荷世以經學致位荷明究羣籍特善史書不應州郡之命張祚遣使者以安車束帛徵為博士祭酒使者迫而致之及至署太子友荷上疏乞還祚許之以安車蒲輪送還年八十四卒諡曰玄德先生明周蕙字廷芳山丹衛人後徙家秦州年二十聽人講大學首章惕然感動始知讀書為臨洮衛軍戍蘭州聞段堅集諸儒講學時往聽之有聞即服行久之諸儒以為畏友有疑與訂論焉遂殫心五經篤信力行為一時學者之宗恭順侯吳瑾鎮陜欲聘為子師固辭不赴或問之蕙曰吾軍士也召役則往役若以為師師豈可召哉瑾親送二子於其家以受教始納贄焉後隱居秦州之小泉因以為號秦人感化其德西安李錦薛敬之咸執弟子禮嘗正冠婚喪祭之禮以示學者秦人至今遵之逮老以父遊江南訪之沒於揚子江人皆稱其孝而悲其死云文蔚秦州人萬厯間武進士精韜略識天文高卧不仕秦王聞其賢聘見語竟日歎為天下竒士尋辭歸終日靜坐斗室經略張鄂序征蜀庭臣薦其才強起參軍務蔚至蜀出竒制勝數窘賊夜觀天象忽曰無以戰也不三日敵必歸命果如言捷上詔敕賜蔚指揮劄固辭後有人與蔚善詢之曰明祚盡矣後人始歎以為神雍康年字安夫清水學生以詩禮繼先傳篤經史不樂仕進追崇孝行修復古制建先祠立宗法制祭田修家孰躬行文公四禮教訓宗族表率閭里著族約會則家鄉禮要二書刋布之鄉人尊為敦禮先生直𨽻階州明龍正階州人幼英敏過人精於易學遇金牌道人傳授六壬占驗多應正德壬申蜀冦猖獗都御史召之贊畫每戰多捷畨夷入冦總督聘居帷幄出竒數勝欲授以官不受奏賜金帛冠帶後總督楊張鄧徵聘皆不就所著有八陳圖太乙成局竒門集要六壬書直𨽻肅州漢侯瑾字子瑜敦煌人少孤貧依宗人居性篤學恆傭作為資暮還輒燃柴讀書居恆以禮自牧獨處一室如對嚴師州郡纍召公車辭疾不就作矯世論譏刺當時隱居山中殫思著述作應賔難以自寄又按漢記撰中興以後行事為皇德傳三十篇行於世餘作新文數十篇多亡失西河人重其才品不敢名稱為侯君云晉宋纖字令艾敦煌人少有逺操沉靖不與世交隱居於酒泉南山明究經緯弟子受業三千餘人不應州郡辟命惟與隂顒齊好友善張祚時太守楊宣畫其像於閣上出入視之酒泉太守馬岌造焉拒而不見岌銘詩於石壁曰丹崖百丈青壁萬尋竒木蓊蔚鬱若鄧林其人如玉惟國之琛室邇人遐實勞我心纖注論語及為詩頌萬言年八十篤學不倦諡曰玄虛先生汜騰字無忌敦煌人惠帝時舉孝亷為郎中屬天下兵亂去官還家太守張閟造之閉門不見饋遺無所受散家財五十萬以施宗族柴門灌園琴書自適張軌徵之為府司馬騰曰門一杜其可開乎固辭郭瑀字元瑜敦煌人少有操行東遊張掖師事郭荷盡傳其業精通經義雅辨談論多才藝善屬文荷卒瑀服斬衰廬墓三年禮畢隱於臨松薤谷鑿石窟而居服柏實以輕身作春秋墨説孝經錯緯弟子千餘人索紞字叔徹敦煌人少遊京師受業太學博綜經籍遂為通儒明隂陽天文善術數占候司徒辟除郎中以避亂歸凡所占夢靡不驗太守隂淡從求占書紞曰昔入太學因一父老為主人其人無所不知有似隱者紞因從父老問占夢之術審測而説實無書也淡命為西閣祭酒紞辭曰少無山林之操遊學京師交結時賢希申鄙藝會中國不靖欲養志終年老亦至矣不求聞達又少不習勤老無吏幹濛汜之年弗敢聞命淡以束帛禮之月致羊酒年七十五卒於家甘肅通志卷三十九
