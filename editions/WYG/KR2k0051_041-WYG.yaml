body:
  text: 甘肅通志巻四十一仙釋方伎羽流緇素宿植靈根養道林泉棲心物外餐芝吸露息盡塵機勸善戒惡有裨世教至於方伎之士或醫藥治疾或卜筮指迷皆有益於民生均當傳其姓氏毋令湮没不彰志仙釋方伎仙釋上古廣成子昇仙記云混沌開闢有廣成子先天地而生後天地而終在崆峒之上修真養道黄帝往見之問以治身之道答曰至道之精窈窈㝠㝠至道之極昏昏黙黙無視無聽抱神以靜形將自正必靜必清無勞爾形無搖爾精乃可長生慎内閉外多知為敗我守其一以處其和故千三百嵗而形未嘗衰黄帝再拜稽首今崆峒山有廣成子洞為神仙之奥宅人迹所罕到漢盧真人秦州人號鐵馬大仙漢時與成紀令觀燈廣陵飛騰俄頃今玉泉觀有仙室遺蹟魏封衡隴西東鄉人㓜學道術服黄連五十年入山採藥百餘年復還鄉里如二十者常乗青牛故號青牛道士聞有病死者輒探腰間竹管中藥與服之立應魏武帝召問養性大畧衡曰減思慮節飲食著有養氣法衛生經數十餘巻晉石垣字洪孫居無定所不娶婦不營産業食不求美衣必粗敝或遺之衣受而施人人有喪葬輒杖䇿弔之路無逺近時無寒暑必在其中或同日共時人咸見焉又能闇中取物如晝無差姚萇之亂不知所終檀時師名惠豐居凉州飲酒啖肉語黙無常逆論來事後皆如言法成凉州人十六出家學經律不餌五穀唯食慈脂居山巖穴習禪後有小疾乃告人曰我死矣明日合掌而卒曇無䜟北凉沮渠世於姑臧譯大方等集經三十巻慧嵩北凉沮渠時與曇無䜟於姑臧譯大般若涅槃經四十巻曇霍秃髪傉檀時從河南來持一錫杖令人跪曰此波若眼奉之可得道或遺之衣服受而投之河後日以還其主衣無所汚行歩如風雲言人死生貴賤無毫釐之差或藏其杖曇霍輒閉目須臾起而取之咸竒其神異莫能測也法䕶月支人年八嵗出家隨師至西域諸國遂曉外國語其餘三十六種亦無不曉晉武帝末隱居深山山有清泉恒取澡潄後有樵者穢其水側俄頃水涸䕶徘徊歎曰人之無德清泉流輟水若永竭無以自給我當移去耳言訖而清泉湧出滿澗單道開敦煌人常衣粗褐不畏寒暑晝夜不卧恒服細石子一吞數枚好山居山樹諸神見異形試之初無懼色石季龍時從西平來一日行七百里其一沙彌年十四行亦及之至秦州表送到鄴季龍令佛圖澄與語不能屈也季龍資給甚厚道開皆以施人人或來問者都不答佛圖澄曰此道士觀國興衰若去者當有大亂及季龍末道開南渡許昌尋而鄴中大亂後至南海入羅浮山年百餘嵗卒勅弟子置屍石穴中陳郡袁宏為南海太守登羅浮山至石室見道開形骸如生香火瓦器猶存曰法師業行殊羣正當如蟬蛻耳王嘉字子年隴西安陽人外醜形貌而聰睿内明滑稽語笑不食五穀清虛服氣不與世人交遊隱於東陽谷鑿崖穴居弟子亦穴處石季龍之末隱於終南山苻堅累徵不起公侯以下咸躬往參詣問其當世事者皆好為譬喻狀如戯調言未然之事辭如䜟記事過皆驗堅將南征遣使問之嘉乃乘使者馬正衣冠東行數百步而䇿馬馳返脫衣服棄冠履而歸下馬踞牀一無所言使者還告堅不悟復遣問世祚云何嘉曰未央咸以為吉明年癸未敗于淮南所謂未年有殃也人候之者不至心則隠形不見衣服在架履杖猶存或欲取其衣者跂而取之衣架踰高而屋亦不大履杖諸物亦如之姚萇入長安與苻登相持問嘉曰吾得殺苻登否嘉曰畧得之萇怒曰得當云得何略之有遂斬之先此釋道安謂嘉曰世故方殷可以行矣嘉答曰卿其先行吾負債未果去俄而道安亡至是而嘉戮死所謂負債者也萇子興字子略方殺登略得之謂也嘉之死日人有隴上見之曇猷或云法猷敦煌人少苦行習禪定後遊江左太元中有妖星現帝普下諸國有徳沙門精勤佛事令懴禳災猷乃祈誠㝠感至六日旦見青衣小兒來悔過云搆勞法師是夕星退太和末卒于天台石室舉體緑色其後人入山登巖見猷屍不朽妙道真人王本豫景留人世居三河年八十有五鶴髪童顔行不䇿杖忽召弟子曰吾將逝矣於是齋戒沐浴端坐談笑頌曰勞苦生涯蕭條活計九九餘年超凡脱世頌畢而化時中統建元初齊元暢狄道人少為冦獲其帥曰此兒目光外射非凡童也遂釋乃往凉州出家復避於揚州洞曉經律深入禪要占記吉凶無不驗遊成都止大石寺入齊後山結草為庵弟子見神人乗馬繞山一匝指示造塔之處乃建塔焉齊太子遣使徵迎曰吾數盡矣至京而卒北周無名僧武帝天和二年勅為夏州三藏尋欲官之冢宰宇文䕶以書勉之答以收迹巖中攝心塵外此本志也安能憒憒久住閻浮地乎因著寳人銘曰法界中有如意寶人焉緘其身銘其膺曰多知多事不如息意多慮多失不如守一慮多志散知多心亂心亂生惱志散妨道英賢才藝是為愚蔽梁寶誌金城狄道人七嵗出家長修禪業止江東道林寺言若䜟記或一身三處宿梁武帝即位下詔誌公神遊㝠寂勿禁出入常與白鶴道人爭得潜山麓武帝以二人俱靈通各以物識其地已而鶴飛去至麓忽聞空中錫聲遂卓於山麓鶴止他所皇子生誌曰寃家亦生後知與侯景同日生天監十三年無疾而終累代加號道林真覺禪師唐佛光道悟姓㓂氏蘭州人生而有齒年十六自欲出家父母不聽數日不食乃許之後二年自臨洮歸灣子店夜夢梵僧喚覺聞馬嘶豁然大悟將遊諸方鄉人求頌有水流須到海鶴出白雲頭之句至熊耳果遇白雲禪師海公先是人問海何不擇法嗣亦有芝蘭秀發獨出西秦之語比師至夜聞空中有言來日接郭相公黎明海呼僧令持香花接我闗西弟子寺乃唐郭子儀建既至一言相契徑付衣鉢寺前常有剽而殺人者來告急師呼衆擒之曰即汝是賊尋得其巢穴衆請命師諭釋之其後路不拾遺或以師前身為汾陽王云泰和五年結厦於臨洮之大勢寺開圓覺經一日早盥潄畢呼侍者曰我病也尋藥去侍者足未及門師已卧遊方丈有五色雲如寶葢中有紅光如日者三年五十有五殷道筌不知何許人亦不測其年壽行遊天下無常名自稱七七賣藥涇州時病疫甚多得藥即愈驚為神所酬錢輒施於人周寶先於長安識之尋為涇州節度延之禮重雷牛成紀人煉丹于長道縣之南山唐明皇時宮中有疾召至長安調治即愈封雷王今山上藥臼尚存有古槐一株液出似酒飲之去病人謂雷峯仙酒劉道通學仙術居徽州金蓮洞修煉兼曉符籙法治病效至德間元帥田守璋薦賜號曰清淨真人惠印徽州人㓜出家通經律文宗召至京師授榮禄大夫司徒銀印賜號真惠國師僧伽大師西域人姓何唐龍翔初遊方至泗州臨淮縣建寺頗示神異景龍二年中宗遣使迎入尊為國師頂上有一穴以絮窒之夜則去絮香從穴中出非常芬馥及曉香還頂中仍以絮窒之師嘗濯足人取其水飲之痼疾皆愈時京邑無雨師將瓶水汎灑俄頃隂雲驟起甘雨大降中宗大喜詔賜所修寺額為普光王寺御筆親書至四年三月二日端坐而終喬真人郭真人俱雪山鳳林人同遇呂仙示以神仙之道修煉之方排五色石以象五行後期年復遇仍各賜火棗令食之遺烏兔海蟾四字了然頓悟能見吉凶知禍福後昇化於玉泉觀有碑記詹道人慶陽羣牧所軍採藥賀蘭山隂遇神人授學久之悟出言成文唱咏有佳趣修復普照寺人從牖窺見䕶法泥神起立聽道人計畫明日縁事應答如響工竣辭官民告去異日坐化有人從數百里來見道人南去相與立語莫知其終宋秦志通李志亨俱金縣人自㓜聰敏能讀書即知慕道兩人各相規勉元宗内外二典無不精研得遇太虛真人授以金液大丹五行生尅七返九還之道遂耑心烹煉數足功完於政和二年白日拔宅昇天今興龍山乃遊覽處清虚觀其故里也徐神翁鎮原人修煉飛昇之術居潛夫山今山後有神翁洞嘗遺詩數首後宋南渡翁口占絶句送高宗卒如其言宋披雲宋時人少逰大梁後訪道入陜至於太白山五陵遇純陽真人授以金丹了道于崆峒山著書行世號披雲真人朱友祥符間人修真養性于回山西真宮數年絶烟火粒食餐松栢葉以為常行履如飛世傳其得道後隱太和山不知所終元澄陽真人姓何氏枹䍐人生有仙風道骨弱齡即慕道一日汲水遇異人就飲一見竒之相與言方外事咸解悟隱顯林中動有金光覆映至正三年五月十四日雙鶴來空彩雲繞室須臾飛昇今城西有大隱庵程守善素有道行居萬壽觀内有槐僵死二十餘年守善居此其槐復蘓枝葉暢茂咸以為異常應召賜號通真子馮真人修煉總真觀有道術凡祈晴禱雨靡不騐有一石枕黄潤似玉人有疾者以枕捫之即愈黄居士元時人家巨富好道棄家入崆峒不與人交接一日感純陽真人得修道口訣持煉子飲月華午餐日精後蝉蛻而化梁誌通山西介休人號達元子生至元丙子間慕道來秦終於玉泉觀時或遇之長安灞橋與使客傳鑰封煙霞無為真人趙野雲元季道士自號趙野雲由慶陽來簪栢朶插佑德觀中倐不見竟成參霄之材人以為神翁復來云有碑明張三丰遼東懿州人名全一一名君寶三丰其號也以其不修邊幅又號張邋遢頎而偉大耳修髯一衲一簑所啖升斗輒盡或數月不食或處窮山或遊市井能一日千里嬉笑諧謔旁若無人洪武初居武當山中二十三年雲遊長安繼至隴上遍遊多方冬春不履又號赤脚張常寓岷州楊永吉家遺一小鼔雖擊大鏞莫能混音成祖遣官于四方尋訪未見封通㣲顯化真人又平凉紫極觀道士朱元貞修築道院塑雲房純陽留侯洎三丰像於中獨三丰像結胎已就不能肖忽一日有羽衣至蒲團杖履蕭然塵外散步道院見未成像問之元貞對以故羽衣曰此何難知吾嘗㑹其人於崆峒西崖其人身可七尺餘面目頎偉長鬚修眉彷彿與貧道同然坐位如此有所未安元貞問故曰雲房純陽皆師也可並坐乎衆然之工人依其言經營出像少焉羽衣竟失所在乃知三丰示現也洪武二十四年雲遊甘州寓張指揮家寓十年去莫知所之舎之老嫗嘗伺其出竊葫蘆藥一丸㗖之三丰歸覺謂嫗曰汝竊食此藥益壽太多奈所享不繼後嫗壽百餘舎内嘗遺中袖一葫蘆一居人患疫者借中袖覆之即愈童稚患瘡疾者翦少許貼服之即愈天順中鎮守甘肅總兵王敬患中滿疾火化中袖節服之遂愈成化初定西侯蔣琬㑹宴守臣以葫蘆搬三度雜劇其葫蘆即席自碎慧達肅州人姓劉名窣和自㓜出家為僧洪武間遊至凉州閉闗靜坐一日謂凉州人曰明日肅州遭水患吾當救之明寅西向已時至肅討來河水漲泛勢將逼城慧達至西峯離城一里許用手一指水向北潰遂不近城因遂圓寂於此建有寺塔人以手迹崖為古蹟白雲道人俗姓黄洪永間嘗依於凉州魯氏人莫測其迹夏坐烈日中毫無汗濕冬立風雪暖氣如蒸與之食則食不與亦不食問其事悶悶不答否則以隱語一二示之其休咎立見年九十九立化瑞竹領占狄道人姓石氏自㓜為本郡寶塔寺僧永樂四年以屢使絶域宣布王化功陞蘓州府僧綱司都綱二十一年奉命招降陞僧録司右闡教二十二年陞左善世賜誥命金圖書服器宣德元年陞灌頂圓妙廣智大國師二年奉使烏思藏公幹陞號清修靜覺崇善慈應輔教闡範灌頂圓妙廣智大國師八年正月内圓寂天順七年追封西天佛子成化二十二年追封大敏法王賀蘭二老洪武二十七年中衛人張秋童入賀蘭山伐木見二老坐石上問曰秋童何為對曰伐木二老乃呼秋童與錢盈掬童歸尋往視之則二老莫知所之其錢猶存孫碧雲馮翊人㓜即慕道年十三入華山明太祖召赴京與語甚悦所賜之物辭不受肅莊王迎居金天觀環室接引徒衆語多奥㫖後還少華山永樂中賜號虛宣子年七十三羽化於武當山邵道人蜀人至慶陽年七十餘道人嘗不言凡所欲言頤指色授館于鐘樓街築土被衲無晝夜露坐郡中子弟爭禮事之能治病令病者張目噓氣即可活居十餘年一日謂諸弟子曰吾將逝矣時夜半屋脊隱隱有霹靂聲若金戈鐵馬狀諸弟子震懾伏地天明起眎則道人死矣清然河南通許人自㓜為僧戒行精嚴正德初遊入合水子午山樂其地僻人樸遂久隱焉常修環山寺及興教寺或謂其得黄白術云如和尚不知何許人身軀頎偉髠首銅篐破衲跣足神光煥發每遊靜寧州市間無定處值暑則寒氣逼人嚴冬則裸體仆雪或入氷水以浴終日常笑了無一言人問齋否則㸃首與之食一飯斗米時人呼為如𤓰子云一日忽號於市曰我去也我去也連號數日羣小兒尾之乃趺跏端坐而化衆白於州牧建塔龕焉㑹萬厯間天旱訛傳塔中有聲衆怪之乃以火焚後聞有遇於蜀者趙仙美姿容善談論周濟貧乏施財不匱然入其室無他囊槖衾枕而已慶陽人咸怪之稱為趙仙時兵部侍郎陳震方為諸生聞而往見未至趙避去謂主人曰明日慶陽陳生來善待之勿令入吾室震至不見趙求入其室而返明日趙至恚曰吾囑汝勿令陳入吾室乃令入焉吾弗可以居矣遂辭主人而行素厚者挽留之不可竟莫知所之樊讓階州所舎人㓜博羣書工於詞翰常雲遊遇異人授竒門遁法及吐納之術年九十二無疾作贊而逝詞曰九九之九元門立久混合乾坤斡旋星斗保精氣以息神思無中而生有無無無天地原來一虚窟有有有天地能長而且久吾今返本含真道朗朗明明元不朽咦赤身無罣礙飛上白雲頭牧羊女成化間不知姓氏誓不適人每入山牧羊念佛一聲拾羊糞一粒投於眢井數十年山谷坑塹處盡為念佛所投之糞粒一日口吐青氣若蓮花之狀端坐而逝鄉人遂於凉州南闗廂建閣移其身飾以泥至今稱為肉身菩薩巴爾斯梵僧僧焚修於巴爾斯寺夷目供養已久明萬厯二十六年田樂達雲恢復松山驅丙吉入寺見僧端坐令斬之血出如乳操刄者立斃後改巴爾斯為大靖寺被回禄卜者以為枉殺高僧之故乃立祠塑像火災遂息像存有碑記其事張清肅州中右所人行履篤實寡言笑好誦經靜坐瞑目後年六十餘隱於寺至七十常言未來事人問何以先知清曰夜有夢故先知當時以為神異及卒人塑其像於文殊寺側方伎上古岐伯北地人生而神明精醫術通脉理黄帝以師事之有素問難經行於世漢楊子阿成紀人善相馬馬援傳援好騎善别名馬於交阯得銅乃鑄為馬式還上之因表曰近世有西河子輿亦明相法子輿傳西河儀長孺長孺傳茂陵丁君都君都傳成紀楊子阿臣援嘗師事子阿受相馬骨法考之於行事輒有驗效晉郭黁西平人少明老易仕郡主簿張天錫末年苻氏每有西伐之問太守趙凝使黁筮之黁曰若郡内二月十五日失囚者東軍當至凉祚必終凝乃申約屬縣至十五日鮮卑折掘送馬於凝凝怒其非駿幽之内廏鮮卑懼而夜遁凝以告黁黁曰是也國家將亡不可復振苻堅末當陽門震刺史梁熙問黁黁曰當有外國二王來朝一當返國一死此城嵗餘而鄯善及前部王朝于苻堅西歸鄯善王死于姑臧呂光之王河西也將伐乞伏乾歸黁諫曰今太白未出不宜行師往必無功太史令賈曜以為必有秦隴之地及克金城光使曜詰黁黁謂光曰昨有流星東墜雖得此城憂在不守正月上旬河氷將解若不早渡恐有大變後二日而敗問至光引軍渡河訖氷泮時人服其神驗明康永惠萬壽宮高士也遇異人授以雷法其術最秘嵗旱祈雨立應兼精於醫張好問字希明其先高郵人始祖仁以醫事韓遂家平凉好問尤精祖業常不拘古方唯濬病源弗問貧富校業禮官為良醫正診視神驗所著有張氏醫精太素集時巢鑑由浙寓華亭為隴西王侍醫又劉聰本府人皆能療治竒應擅名一時張仙童安化人少從羅理凡繪畫人物皆稱神妙今興教寺有羅漢十八幅并寒山拾得之像儼然如生禁神寧州人精呪法能禁瘡毒及蛇虫諸害每旦持水向四方呪祝願十里之内人畜不罹瘡毒蛇虫之害積年漸加多至百里凡人求呪瘡毒隔山應氣而愈逺近以法師尊之後坐化人立廟祀之其廟中土至今取而傅瘡亦有愈者蔡嘉善字建陽武威人世傳醫業純以濟世為心活人甚多没後人立祠於三皇廟側以祀之張琦寧夏人精太素脉斷疾病生死踰二十年必驗張􅆏寧夏人精太素脉可生則藥不可生斷以時日百無一失窮通夭壽以脉推之亦無不驗所著有難經直解吳通寧夏人精脉理本草素問三書妙鍼法治病輒效時稱儒醫甘肅通志巻四十一
