body:
  text: 甘肅通志巻三上建置沿革甘肅疆域最廣東接關中西控邊徼自古以來分合遷徙因革損益名隨代易制與地殊爰考建置知所自始厯稽沿革知所由更從今溯昔具載簡編我朝因時定制河西衞所改設郡縣善政宜民規模遠已志建置沿革甘肅布政司禹貢黑水西河惟雍州周舊邦在雍之西陲周孝王封非子為附庸邑之秦甘肅謂之秦自此始及平王東遷封秦襄公為諸侯賜之岐以西之地春秋戰國時涇汭之北為朝那為義渠河湟秦隴間𦍑戎居之秦併天下置郡縣為北地隴西郡漢置凉州部刺史領隴西金城天水安定北地武帝闢河西置張掖酒泉武威燉煌四郡新莽時盧芳據安定隗囂據天水竇融據河西光武次第翦除其時凉治隴安帝又置張掖居延郡三國魏復分河西為凉州治天水析隴西置秦州治上邽又置西平今西寧漢陽今秦州郡以隴西臨洮祁山西和漢陽伏𦍑為重鎮晉置秦州治上邽領隴西南安天水武都陰平畧陽六郡以凉州置武威領金城西平武威張掖西郡酒泉燉煌西海八郡建興以後相繼割據陷没為戰國者一百三十有六載南北戰争州縣錯雜増損離合疆境屢易隋大業初改州為郡置司𨽻刺史相統治後羣雄競起割土分疆梁師都據朔方稱梁李軌據武威稱凉薛舉據金城天水稱秦唐滅凉并秦討梁師成盡平隴右河西地唐初分天下為十道置隴右道領二十一州秦渭蘭河洮岷成武疊宕鄯廓凉甘肅瓜沙伊西庭臨其涇寧慶原靈㑹威武八州屬關内道開元中又分十五道關内隴右道如故天寳間於邊境置安西北庭河西朔方隴右諸節度使貞元以後隴右諸州盡陷於吐蕃止餘威涇二州五代相沿宋初置陜西路常以環慶原渭為重鎮慶厯初置沿邊四路曰熙河秦鳳涇原環慶各置經畧制置司領之而朔方河西為西夏所據金置慶原臨洮二路元至元十八年分置甘肅行中書省及河西隴北道肅政亷訪使於甘州明置承宣布政使司於西安統各府州縣設行都指揮使司於甘州領各衛所皇清初因之康熙二年以右布政司分管臨洮鞏昌平凉慶陽四府駐劄鞏昌府裁衞所八十五康熙五年改為甘肅布政使司移駐蘭州行都御史臺治焉領四府九州二十八縣雍正三年裁行都司及衛所改増四府曰甘州凉州寧夏西寧又分鞏昌州縣置直𨽻州二曰秦州階州又改肅州為直𨽻州改衞所設州縣甘州府領縣二曰張掖山丹凉州府領縣五曰武威永昌鎮番古浪平番寧夏府領州一曰靈州縣六曰寧夏寧朔平羅中衞新渠寳豐西寧府領縣二曰西寧碾伯肅州領縣一曰髙臺又改岷州衛為州改靖遠衛為縣併洮州衛俱𨽻鞏昌府新設大通衛𨽻西寧府安西衛沙州衛柳溝衛𨽻安西㕔靖逆衛赤金所𨽻靖逆㕔今領府八直𨽻州三又州八縣四十五衛所八臨洮府禹貢雍州之域周初為西𦍑地春秋屬秦韓安國傳秦穆公併國十四闢地千里隴西北地是也戰國秦昭王置隴西郡史記昭王二十七年司馬錯發隴西因蜀攻楚水經注二十八年置郡有隴坂在東故名漢仍曰隴西郡治狄道三國魏為隴西郡地時郡復移治襄武晉初因之惠帝分置狄道郡前凉張駿又改置武始郡隋開皇初郡廢為金城郡地唐初為蘭州地天寳三載始分金城置狄道郡乾元元年改曰臨州都督府屬隴右道寳應元年陷於吐蕃號武勝軍宋熙寧五年收復王韶敗𦍑人遂城武勝以為鎮洮軍節度屬秦鳯路是年置熙河路改鎮洮軍為熙州金皇統二年改熙州為臨洮府因洮水經流城下故名後又改名臨洮路元復曰臨洮府屬鞏昌路明亦曰臨洮府𨽻陜西布政司皇清初因之康熙二年分設左右布政使司以府𨽻甘肅布政司領州二縣三狄道縣附郭漢置狄道縣為隴西郡治其地有狄種故云狄道三國魏屬隴西郡治晉惠帝改置狄道郡前凉張駿改置武始郡改縣曰降狄道後魏屬武始郡隋開皇初郡廢仍為狄道縣屬金城郡唐初屬蘭州天寳三載復於縣置狄道郡乾元初為臨州治寳應初陷於吐蕃廢宋熙寧五年收復復置狄道縣為熙州治九年省元豐二年復置屬熙河路金改熙州為臨洮府治狄道元仍舊明因之為臨洮府附郭皇清因之渭源縣秦屬隴西郡地漢置首陽縣屬隴西郡後漢晉魏因之後魏大統十七年改渭源縣因渭水發源於縣之鳥䑕山隋仍屬隴西郡唐屬渭州髙宗上元二年復名首陽别置渭源縣儀鳳三年省首陽入渭源縣屬渭州寳應後陷於吐蕃宋熙寧收復置渭源堡屬熙州金屬臨洮府元至元十三年陞堡為縣屬臨洮府明仍為渭源縣屬臨洮府皇清因之蘭州秦屬隴西郡漢昭帝始元六年分置金城郡治允吾領金城榆中後漢建武十三年省入隴西郡晉初屬金城郡東晉時為郡治後魏移置金城郡治金城隋開皇初廢郡置蘭州總管府因州南有臯蘭山故名大業初府廢尋復為金城郡唐武徳二年平薛舉復曰蘭州治五泉縣天寳元年復為金城郡乾元初復為蘭州屬隴右道寳應初陷吐蕃宋元豐四年收復仍為蘭州金城郡屬熙河路崇寧三年置蘭泉縣為州治金為蘭州刺史省縣入之屬臨洮路元屬鞏昌路明洪武初降為蘭縣又置蘭州衛成化十三年復升為蘭州𨽻臨洮府皇清因之康熙五年甘肅廵撫移駐遂為省㑹金縣秦屬隴西郡漢置榆中縣屬金城郡後漢因之晉移金城郡來治魏復移郡治金城在今蘭州省縣入焉唐為五泉縣地宋置龕谷寨屬蘭州金大定間陞為縣至大間置金州領龕谷定遠二縣元至元七年併縣入州屬鞏昌路明洪武二年降州為縣𨽻臨洮府成化七年又𨽻蘭州皇清仍𨽻臨洮府河州古西羌地秦屬隴西郡漢置枹䍐縣屬金城郡後漢改屬隴西郡晉初廢惠帝時復置前凉張軌分屬晉興郡咸康初是地為凉張駿所有分置河州宋入吐谷渾後魏復置河州周置枹䍐郡隋開皇初郡廢大業初復置枹䍐郡唐復為河州天寳初改為安鄉郡乾元初復曰河州屬隴右道後陷於吐蕃宋熙寧六年收復仍為河州安鄉郡置枹䍐縣為州治屬熙河路金亦曰河州貞元二年復置枹䍐縣為州治貞祐四年置平西軍節度屬臨洮路元為河州路省枹䍐縣入之初屬鞏昌路至元六年置吐蕃宣慰司治此明洪武三年置河州衛五年又設河州府十二年省為河州衛成化十二年置河州𨽻臨洮府皇清因之歸徳所明以前為番夷駐牧之地洪武三年征西將軍鄧愈統兵至莽賚川始置歸徳所取番夷向化之義屬河州衛并𨽻陜西行都司皇清因之雍正四年裁河州衛改𨽻臨洮府鞏昌府禹貢雍州之域春秋時為羌戎地秦置隴西郡漢為隴西郡地時郡治狄道為今臨洮府東北置天水郡兼為安定郡地南境得武都郡地後漢因之靈帝分置南安郡三國魏晉仍為隴西南安二郡地元魏為隴西南安陽二郡地𨽻渭州後周為南安郡隋初郡廢大業初復為隴西郡唐武徳初置渭州天寳初復曰隴西郡寳應後陷于吐蕃大中五年收復五代時為羈縻之地宋熙寧五年置通遠軍屬秦鳳路崇寧三年升為鞏州屬熙河路金仍曰鞏州皇統三年改通遠軍屬臨洮路元初置鞏昌路都總帥府統鞏昌平凉臨洮慶陽隆慶五府及秦隴㑹蘭等二十七州明洪武三年為鞏昌府屬陜西布政司領三州十四縣皇清初因之康熙四年𨽻甘肅布政司雍正七年分置直𨽻秦階二州以清水秦安禮縣徽縣兩當分𨽻秦州以成縣文縣分𨽻階州又改岷州衛為岷州靖遠衛為縣領縣九州一衛一城一隴西縣附郭古䝠戎地漢置䝠道縣屬天水郡後漢屬漢陽郡中平五年分置南安郡縣𨽻焉三國魏始置中陶縣屬南安郡晉因之後魏屬南安陽郡後改縣為内陶後周為南安郡治隋開皇初郡廢改縣為武陽屬渭州十年又改曰隴西大業初屬隴西郡唐武徳二年縣屬伏州八年還屬渭州寳應以後没於吐蕃宋熙寧五年為通遠軍治元祐五年改隴西縣仍為通遠軍治崇寧三年為鞏州治金仍之元為鞏昌路治明為鞏昌府附郭皇清因之安定縣漢天水郡勇士縣地後漢為䝠道縣地唐渭州地為西市貿馬之所寳應中陷於吐蕃宋築定西安西二城屬通遠軍金改定西縣屬鞏州尋升定西為州以安西屬之又置安西通西二縣並𨽻州元省二縣𨽻鞏昌路後因地震改為安定州明改州為縣𨽻鞏昌府皇清因之通渭縣漢置平襄縣元鼎三年兼置天水郡治焉後漢屬漢陽郡晉屬畧陽郡隋唐為隴西縣地唐寳應中没于吐蕃宋元豐中置通渭縣崇寧五年廢金復置縣元屬鞏昌路明仍之𨽻鞏昌府皇清因之雍正八年移縣治于安定監漳縣漢隴西郡襄武縣地後漢分置鄣縣俱屬隴西郡晉廢後魏復置彰縣屬廣寧郡西魏於縣置廣安郡後周郡廢隋曰障縣屬隴西郡唐天授二年改武陽縣神龍元年復故屬渭州廣徳以後陷于吐蕃宋置鹽川寨屬鞏州金為鹽川鎮屬定西州元至正十七年復鄣縣屬鞏昌路明更為漳縣𨽻鞏昌府皇清因之㑹寧縣漢安定郡祖厲縣地後漢屬武威郡晉後荒廢西魏以後為㑹州地金置西寧縣屬秦州貞祐四年升為西寧州元初㑹州地震城圮移治西寧縣屬鞏昌路至元七年省縣入州仍屬鞏昌路明改為㑹寧縣𨽻鞏昌府皇清因之伏羌縣古冀戎地秦武公伐冀始置冀縣漢屬天水郡東漢明帝永平十七年改郡曰漢陽治冀晉仍為冀縣屬天水郡後省後魏改當亭縣又改為冀城縣後周省入黄𤓰縣隋大業二年復改冀城縣𨽻天水郡唐武徳三年改置伏羌縣又于縣置伏州八年州廢縣屬秦州至徳以後陷于吐蕃宋建隆三年置伏羌砦屬秦州熙寧三年改為伏羌城金屬秦州秦安縣元至元十三年升為縣屬鞏昌路明仍為伏𦍑縣𨽻鞏昌府皇清因之寧逺縣漢隴西郡襄武縣地後漢中平五年析置新興縣屬南安郡晉如之元魏屬廣寧郡後周廢唐寳應初陷于吐蕃咸通中收復宋初置寧遠砦崇寧三年升為縣屬鞏州金廢為砦元至元中復置寧逺縣屬鞏昌路明仍之𨽻鞏昌府皇清因之西和縣漢隴西郡西縣及武都郡地晉改置始昌縣屬天水郡後廢後魏置水南縣又于縣置天水郡後周郡縣皆廢入漢陽隋為長道縣屬漢陽郡唐屬成州天寳末廢咸通十三年復置屬秦州宋熙寧三年改屬岷州紹興十二年徙岷州治長道縣之白石鎮改為西和州元至元七年省長道縣入西和州明洪武二年改西和縣𨽻鞏昌府皇清因之靖遠縣古雍州西𦍑地秦屬隴西郡漢屬金城安定二郡地後漢屬武威郡地西魏置㑹州後周廢隋開皇十六年置㑹寧縣屬平凉郡唐武徳二年平李軌置西㑹州貞觀八年以足食故改粟州尋復舊廣徳後没于吐蕃宋初亦曰㑹州天聖後屬西夏元符二年收復仍置㑹州崇寧三年置倚郭曰敷川縣建炎四年没于金仍㑹州大定十二年改為保川縣尋陷于河西僑治㑹川城名新㑹州元初徙治西寧縣即今㑹寧縣明正統二年於故㑹州地置靖虜衛𨽻陜西都司皇清曰靖逺衛仍屬陜西行都司雍正八年改衛為縣𨽻鞏昌府岷州古西𦍑地秦置臨洮縣屬隴西郡漢魏及晉因之並為隴西郡地西魏置溢樂縣并置岷州及同和郡隋開皇二年郡廢大業初州廢改縣曰臨洮屬臨洮郡義寧二年復曰溢樂於郡置岷州唐天寳初改和政郡乾元初復為岷州治溢樂祐川和政三縣上元二年陷吐蕃宋熙寧六年收復仍曰岷州崇寧三年又置祐川縣為岷州治屬秦鳳路紹興初入金尋復改為西和州移治長道縣即今西和縣以祐川縣屬焉寧宗時復入於金元復置岷州屬鞏昌路至元八年割屬吐蕃等處宣慰司明洪武十一年廢州置岷州衛𨽻陜西行都司皇清因之雍正八年改衛為州𨽻鞏昌府洮州衛秦漢為臨洮縣地東晉後為吐谷渾所據後周逐吐谷渾置洮陽郡及洮州又置美相縣為州郡