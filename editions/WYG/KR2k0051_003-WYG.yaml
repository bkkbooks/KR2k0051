州屬鞏昌府皇清初因之順治十六年裁所歸縣雍正七年改屬直𨽻階州直𨽻肅州古西戎地秦為月支國漢初為匈奴昆邪王地武帝元狩二年開置酒泉郡治禄福縣以通西域隔絶匈奴與西羌通路名曰斷匈奴右臂東漢因之三國屬魏仍為郡𨽻凉州晉為前凉張軌所有繼為西凉李暠所都後歸於北凉沮渠䝉遜元魏平北凉改為軍屬敦煌郡孝昌中復置酒泉郡隋初郡廢仁壽二年分置肅州大業初省入張掖郡義寧兀年改縣曰酒泉唐武徳二年復置肅州八年置都督府貞觀元年府罷天寳初復曰酒泉郡乾元初復曰肅州屬隴右道大厯元年陷於吐蕃宋為囘鶻所據景祐中屬西夏元至元七年置肅州路總管府𨽻甘肅行中書省明洪武二十八年開設肅州衛𨽻陜西行都司皇清初因之雍正三年改肅州為直𨽻州七年以髙臺縣改𨽻肅州髙臺縣漢樂涫縣地屬酒泉郡晉因之前凉分置建康郡後周復置樂涫縣尋省入福禄縣唐初於故樂涫地置福禄縣屬肅州後入於吐蕃宋為西夏所據元屬甘州路明洪武初為髙臺站以其地形髙西有臺子寺為名𨽻甘州中衛景泰七年始置髙臺守禦千户所屬陜西行都司皇清雍正三年裁髙臺鎮夷二所改設髙臺縣𨽻甘州府七年改屬直𨽻肅州安西㕔春秋戰國時為西戎地秦月支戎居之漢為敦煌郡地有縣六曰敦煌冥安效榖淵泉廣至龍勒晉分敦煌之宜禾伊吾冥安淵泉廣至五縣分酒泉之沙頭縣又别立㑹稽新鄉凡八縣為晉昌郡後魏置敦煌常樂二郡後周併敦煌鳴沙平康效榖東鄉龍勒六縣為鳴沙縣又併凉興廣至冥安淵泉為凉興縣隋開皇初敦煌常樂二郡俱廢改凉興為常樂大業復置敦煌郡改鳴沙為敦煌唐置𤓰沙二州屬河西道大厯元年陷于吐蕃大中五年張義潮以𤓰沙州來歸置歸義軍以義潮為歸義節度使貞元後盡没吐蕃宋初仍為回鶻所據景祐中元昊襲回鶻取𤓰沙盡有河西之地元初立𤓰州屬沙州路𨽻甘肅行中書省明為齊勤䝉古沙州二衛地布朗吉爾以東桞溝堡尚屬齊勤䝉古衛成化後土魯番侵掠正徳中徙肅州塞内嘉靖三年閉嘉峪關其地遂為土魯番所有皇清定鼎西夷嚮化𤓰沙以西盡入版圗雍正元年置安西同知治布隆吉領安西衛沙州所三年升沙州為衛又改靖逆通判所屬之桞溝所𨽻安西㕔五年升衛六年另建安西鎮城于大灣移治安西新城領衛三曰安西桞溝沙州安西衛漢敦煌郡冥安縣地晉曰宜安即冥安屬敦煌郡又分置晉昌郡周併入凉興縣唐置𤓰州尋没于吐蕃五代時𤓰州與吐蕃雜處曹義金遣使入貢于後唐以義金為歸義節度使宋入于西夏元至元十四年立𤓰州二十八年徙居民于肅州僅存其名明為沙州衛地正徳後避土魯番内徙肅州塞下嘉靖後盡棄其地皇清雍正元年置安西衛于布隆吉六年移治安西鎮城𨽻安西同知沙州衛古三危地羌戎所居春秋時謂之𤓰州左傳允姓之戎居於𤓰州是也秦及漢初為月支匈奴所據武帝後元年分酒泉置敦煌郡晉因之元帝時張駿分敦煌晉昌髙昌三郡西域都䕶戊巳校尉玉門大䕶軍三營為沙州張祚又以敦煌郡置商州其後李暠據敦煌稱西凉公後魏置敦煌郡周置鳴沙縣水經注敦煌南七里有鳴沙山故亦曰沙州隋大業初復置敦煌郡改鳴沙為敦煌唐武徳五年置西沙州貞觀七年曰沙州領敦煌壽昌二縣神龍元年置豆盧軍貞元後盡没于吐蕃宋初為回鶻所據太宗時曹元忠以州歸于宋景祐中為元昊所據元復取之至元十四年復立沙州十七年升為沙州路明永樂二年置沙州衛以酋長昆濟楞為指揮使賜誥印正徳十年為哈密衞喇特二部侵逼走附塞下正統中沙州久為罕都指揮巴特瑪吹戬駐牧昆濟楞子納古爾謀奔衞喇特甘肅鎮将任禮勒兵收其全部入塞居之甘州時土魯番侵據哈密巴特瑪吹戬孫嘉克請自立一衛與相抗朝命于沙州故城立罕都左衛正徳十一年嘉克子竒塔特衰弱不振徙肅州塞内其部下服屬土魯番沙州遂廢皇清雍正元年置沙州所三年升衛𨽻安西同知桞溝衛漢敦煌郡淵泉縣地晉曰深泉即淵泉屬敦煌郡又分置晉昌郡周併入凉興縣唐屬沙州地隨陷於吐蕃宋入西夏元時為𤓰州地屬沙州路明為齊勤䝉古衛地成化中哈密為土魯番所據築苦峪城移哈密及寄居齊勤者以居之按苦峪東至肅州四百里當在今栁溝堡境内正徳中土魯番益張遣兵分掠苦峪嘉靖三年閉嘉峪關部衆屬土魯番其地多檉桞有水泉東則十道桞溝西則布朗吉爾河皇清康熙五十六年置栁溝所於四道栁溝治桞溝堡𨽻栁溝通判雍正三年改𨽻安西同知五年升衛移治布隆吉靖逆㕔周西戎地秦月支居之漢酒泉敦煌二郡地酒泉領縣曰玉門曰延壽師古曰闞駰云漢罷玉門關屯徙其人於此置縣元和志縣東至州二百二十里五代晉髙居誨使于闐記云肅州渡金河西百里又西百里出玉門關即故玉門縣按玉門關在龍勒縣西北一百十八里龍勒東至沙州尚一百五十里漢班超願生入玉門關者乃指玉門縣而言以離酒泉郡尚遠也今齊勤所去肅州二百三十里與古玉門縣道里相彷寰宇記延壽縣在酒泉郡西按古延壽縣地在今齊勤境内自齊勤以西方屬古敦煌郡地晉因之玉門以西屬晉昌郡後為西凉李暠所據隋屬敦煌郡地唐屬𤓰肅二州地玉門屬肅州以西屬𤓰州𨽻隴右道貞元後盡陷吐蕃宋初仍為回鶻所據景祐中元昊襲回鶻取之元屬肅州沙州二路𨽻甘肅行中書省按元肅州即漢酒泉郡明為齊勤䝉古衛地按永樂二年置齊勤䝉古在嘉峪關西二百四十里今在靖逆衛東六十里靖逆所屬俱齊勤䝉古地無疑又一統志肅州界西四百三十里為齊勤䝉古衛本故𤓰州地以道里計之又在今布隆吉東八十里按明苦峪衛在肅州西四百里𢎞治八年命哈密及寄居齊勤者盡赴苦峪是齊勤猶在苦峪之外兩説並存之正徳中土魯番侵擾無寧歳乃内徙肅州嘉靖三年閉嘉峪關絶貢其地盡廢皇清定鼎番夷内附康熙五十七年置靖逆同知雍正三年以栁溝通判改調靖逆領靖逆衛齊勤所靖逆衛漢敦煌郡地按靖逆在齊勤西一百一十里又西三十里至栁溝去古玉門已遠當屬敦煌晉敦煌郡地又分屬晉昌郡唐屬𤓰州後陷吐蕃宋入于西夏元屬沙州路明齊勤䝉古衛地正徳後避土魯番徙民于塞内皇清康熙五十七年置靖逆衛𨽻靖逆同知雍正三年𨽻靖逆通判齊勤所漢酒泉郡玉門縣地後漢延壽縣地晉因之後魏置㑹稽郡後周廢郡併會稽新鄉延興為㑹稽縣延興即延壽隋開皇中改為玉門併得魏玉門郡地唐屬肅州開元中没於吐蕃因其地置玉門軍天寳十四載廢軍為縣貞元後隨州陷廢宋入于西夏元時屬肅州路明永樂二年有塔爾尼稱丞相庫珠卜齊率所部來降建齊勤䝉古衛以塔爾尼為千户所賜誥印八年升衛屢進都督僉事正徳八年土魯番遣將據哈密大掠齊勤奪其印而去彭澤經畧西域始以印來歸齊勤衰弱不能自存乃内徒肅州之南山其城遂空衛印屬都督鎻南束掌管嘉靖後閉關絶貢嘉峪以西不復經理按今所與明齊勤道里不合當是古衛地其舊城基址無考皇清康熙五十七年置齊勤衛𨽻靖逆同知雍正五年裁衛改所𨽻靖逆通判甘肅通志卷三下
