body:
  text: 甘肅通志巻二十七職官設官分職各有攸司大小相維體統相攝以治民也甘肅邊陲長民之吏視内地為尤重本朝官制損益有明因地之宜官無繁冗民安事治自漢迄今凡蒞茲土政績素著者另列傳記餘則紀其爵里姓氏以垂永乆志職官歴代官制秦置北地隴西上郡等郡各守一人丞一人尉二人所領縣有令有長有相漢置涼州部刺史察舉隴西北地等郡不常所治武帝初置屬國都尉䕶羌校尉宣帝置西域都䕶元帝置戊巳校尉䕶羌校尉一人秩比二千石主西羌擁節長史司馬二人秩皆六百石東漢建武十八年涼州部郡十二安定隴西漢陽北地武都武威金城西平張掖酒泉燉煌西海獻帝時省涼州部以并雍州建武六年邊部置都尉及屬國都尉稍有分縣治民比郡明帝置宜禾都尉以屯田伊吾廬之地邊縣有障塞尉晉邊逺濵近羌夷之州置弓馬從事五十餘人涼州置吏八十五人卒二十人元康中以䕶羌校尉為涼州刺史隋分天下州郡縣品九等置雍州牧為從二品又置大總管視從二品加使持節唐武徳初邊要之地置總管以統軍加號使持節七年改總管曰都督其後唯朔方猶稱大總管太宗時置安西都䕶府掌統諸蕃撫慰征討叙功罰過總判府事治髙昌髙宗永徽三年徙安西都䕶於龜兹髙昌但為西州都督府開元中始置節度使又置諸道採訪使皆以刺史為之節度使或兼觀察安撫與度支營田招討經畧等使會昌中置靈夏六道元帥兵罷則省宋罷藩鎮命朝臣出守列郡號權知軍州事其後文武官參為之而慶渭熈三州則兼經畧安撫使馬步軍都總管事餘州並兼兵馬鈐轄廵檢或帶安撫提轄縣令若有戍兵則兼兵馬都監或監押又環慶秦鳯涇原熈河四路置經畧崇寜間置河南安撫司𨽻經畧司政和中熈秦用兵設制置使又有宣慰安撫防禦團練諸使金泰和八年平涼増置按察判官一員彰化軍通逺軍雄武軍定安軍興寜軍鎮洮軍並置節度使洮州置團練使秦州河州置防禦使皇統二年臨洮慶陽並置總管府餘為刺郡元河州路圖沙瑪路及鞏昌平涼臨洮慶陽四府並𨽻陜西行中書省及陜西漢中道肅政亷訪司又置甘肅行中書省河西隴北道肅政亷訪司以統甘州永昌肅州沙州亦集乃寜夏府六路山丹西寜二州每路置逹嚕噶齊一員總管一員同知治中判官各一員下路不置治中上路推官三員下路推官一員經歴一員知事一員或二員照磨兼承發架閣一員每府置達嚕噶齊一員知府或府尹一員同知通判推官一員知事一員提控案牘一員每州置達嚕噶齊一員州尹一員中州下州俱曰知州同知判官各一員其佐上州知事提控案牘各一員中州吏目提控案牘各一員下州吏目一員或二員各縣置達嚕噶齊一員尹一員丞一員中下縣不置簿一員尉一員典史二員中下縣止一員明制總制一員甘肅寜夏廵撫各一員廵按甘肅御史廵茶御史各一員平涼甘肅行太僕寺正卿少卿各一員寺丞主簿各一員苑馬寺卿少卿各一員寺丞主簿各一員臨洮甘肅寜夏糧儲郎中各一員布政司右布政使一員司屬有經歴都事照磨理問庫副大使等官分守隴右道河西道西寜道各一員分廵關西道隴右道西寜道臨洮道固原道洮岷道靖逺道荘浪道肅州道寜夏河西道寜夏河東道撫治西寜道各一員知府平涼慶陽臨洮鞏昌各一員同知臨洮鞏昌各三員平涼慶陽涼州各一員寜夏鎮帶平凉府銜一員慶陽府銜四員通判平涼慶陽臨洮鞏昌各一員寜夏帶平涼銜一員肅州帶臨洮銜一員府推官經歴知事照磨倉税遞運大使各一員知州每州各一員同知上州中州各一員下州不置州判吏目各一員知縣每縣各一員縣丞主簿上縣中縣各一員下縣不置典史每縣一員府教授州學正縣教諭各一員府訓導四員州訓導三員縣訓導二員驛丞府各一員寜州固原州静寜州涇州徽州階州蘭州河州各一員縣則平涼華亭鎮原隆徳安化合水環縣渭源金縣漳縣安定會寜兩當文縣各一員餘州縣無廵檢涇州蘭州河州徽州階州華亭鎮原安化合水環縣真寜狄道渭源安定㑹寜成縣秦安禮縣各一員餘州縣無大使平涼華亭隆徳環縣狄道渭源金縣隴西漳縣安定㑹寜禮縣各一員餘縣無掌印都司都指揮使一員指揮同知二員指揮僉事四員經歴斷事吏目司獄案牘各一員平涼衛指揮二十一員千户二十二員百户四十四員鎮撫五員經歴一員固原衛指揮二十員千户一十九員百户三十三員鎮撫一員經歴知事大使各一員慶陽衛指揮二十七員千户四十一員百户五十四員鎮撫一員經歴一員臨洮衛指揮一十員千户一十七員百户三十一員鎮撫所鎮撫各一員經歴一員鞏昌衛指揮十四員千户百户各三十二員衛所鎮撫二員經歴一員靖逺衛守備一員指揮四員經歴知事各一員鎮撫一員千户三員百户二十七員所鎮撫三員教授訓導各一員倉大使副使各一員驛丞一員西安州所千户四員百户十員鎮邊所指揮一員千户五員百户十二員鎮撫一員吏目大使各一員平西所指揮一員千户五員百户四員吏目大使各一員階州所指揮一員千户十員百户六員鎮撫二員禮店所千户一員百户三員文縣所指揮一員千户八員百户十五員鎮撫一員吏目一員西固城所千户七員百户五員吏目一員寜夏鎮總兵副總兵各一員遊撃一員都指揮三員指揮六十九員千户八十六員百户二百五十五員鎮撫八員經歴五員知事一員教授一員訓導二員税課倉大使副使各一員靈州所叅将一員指揮六員千户十二員百户三十六員鎮撫一員吏目一員學正一員廵檢倉大使各一員中衛㕘将一員指揮二十員千户二十九員鎮撫三員經歴一員教授訓導各一員大使一員後衛叅将一員指揮五員千户十三