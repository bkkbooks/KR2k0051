body:
  text: 甘肅通志巻二十四祥異春秋書災異不書事應漢儒作五行傳後人頗議其拘盛世多瑞格天育物甘省近年慶雲河清瑞穀瑞麥嘉祥屢見野慶豐收民歌樂嵗往古罕覯志祥異上古伏羲時龍馬負圖出於河在秦州三陽川周孝王十三年大雨雹牛羊凍死江漢氷幽王二年西周三川皆震涇渭洛竭襄王四年十二月星隕於秦有聲考王六年六月秦雨雪顯王八年彗星見於西方秦始皇二十六年有大人長五丈足履六尺凡十二見於臨洮三十三年彗星見漢髙帝元年十月五星聚於東井惠帝二年正月隴西地震吕后二年正月地震羌道武都山頽文帝十五年春黄龍見成紀後四年四月丙辰晦日食在東井十三度後六年四月己巳辰星熒惑嵗星三合於東井景帝中三年秋七月天狗下六年冬十二月雷霖雨武帝建元六年五月丁丑晦日食在東井二十三度元封元年五月有星孛於東井太初元年夏關東蝗飛至燉煌昭帝始元二年冬亡氷宣帝地節元年正月有星孛於西方元帝初元二年二月戊午隴西地震成帝建始元年十二月乙卯月食鎮星星不見時在輿鬼河平元年四月己亥晦日食不盡如鈎在東井六度三年五月乙亥天水南山大石鳴如雷聞三百里野鷄皆鳴元延元年七月辛未有星孛於東井哀帝建平元年正月隕石於北地十六平帝元始元年五月丁巳朔日食在東井後漢光武皇帝建武二十二年五月乙未晦日食在柳七度近輿鬼二十九年四月武威酒泉蝗三十一年七月客星見軒轅芒長三尺至次年二月二十二日在輿鬼東北凡百三十日乃滅明帝永平四年酒泉大蝗從塞外入章帝建初五年二月庚辰朔日食在東壁八度和帝永元五年二月戊午隴西地震九年三月庚辰隴西地震十五年四月甲子晦日食在東井二十二度安帝永初元年八月戊申客星在東井弧星西南二年四月甲寅漢陽城中火燒殺三千五百七十人三年冬涼州饑七年四月丙申晦日食在東井一度順帝永建三年正月丙子漢陽地䧟裂六年二月甲申彗星在東井永和三年二月金城隴西地震裂壊城郭室屋殺人五年五月己丑晦日食在東井三十三度近輿鬼建康元年正月涼州都郡六地震從漢安二年九月至四月凡百八十日乃止山谷坼裂壊敗城寺傷害人物桓帝建和三年四月丁卯晦日食在東井二十三度元嘉二年金城言黄龍見允街延熹四年六月右扶風及涼州地震永康元年五月壬子晦日食在輿鬼一度靈帝光和六年秋金城河溢五原山岸圮興平九年十一月有星孛於東井獻帝初平九年十一月有星孛於東井十七年十二月有星孛於五諸侯二十四年八月大霖雨漢水溢三國魏明帝青龍三年張掖柳谷口水溢涌寳石負圖狀象靈龜立於川西有文曰大討曹詔頒天下又有石馬七鳯麒麟白虎犧牛璜玦八卦列宿孛彗之象三年三月辛卯月犯輿鬼齊王芳正始二年十一月南安郡地震三年七月甲申南安郡地震六年二月丁卯南安郡地震陳留王奐咸熈二年八月有長人見於襄武長三丈餘足長三尺二寸白髪黄衣拄杖呼民王始曰今當太平晉武帝泰始二年正月辛丑白虎見天水西咸寧四年四月蚩尤旗見於東井太康九年四月隴西隕霜安定旱傷麥惠帝元康五年六月金城地震七年七月秦雍二州旱疫隕霜殺秋稼米斛萬錢懐帝永嘉四年五月枹罕羌妓産蛇夏蝗食草木牛馬毛皆盡東晉元帝大興元年四月西平地震二年五月祁山地震成帝咸和二年五月甲午朔日食在東井九年正月隕石於涼州咸康三年八月甲戍月犯東井距星穆帝永和元年五月辛巳太白晝見在東井三年六月月犯東井距星七年三月己卯涼州大風㧞木黄霧下塵十二年六月庚子太白晝見東井升平元年二月涼州城東池中有火四年四月姑臧澤中有火丁亥月掩井南轅西頭第二星十二月甲午月犯東井五年八月涼州地震帝奕太和元年二月涼州地震水湧楊樹生松夏四月浩亹山隤簡文帝咸安元年西平地震孝武帝寧康元年彗星見自箕尾掃東井四月及冬不滅二年七月甲午涼州地震太元十一年三月戊申太白晝見東井六月甲申見輿鬼十二年冬涼州大饑人相食安帝隆安元年四月丁丑太白晝見東井五月龍見於長寧川麒麟游於綏羌是年武都郡前水中白龍升天義熈八年七月己未月犯井鉞九年三月壬辰嵗星熒惑鎮星太白聚於東井十年日没東井有白虹十餘丈在南千日災在秦分十一年秋熒惑不見八十餘日後出東井秦地大旱恭帝元熈元年四月西涼地震星隕南北朝宋文帝元嘉六年西秦地震草木皆自反七年西秦自正月不雨至於九月十二年正月涼有神投書於燉煌東門曰涼王三十年若七年求之不獲北魏髙祖延興五年二月秦州地震六年五月癸未秦州地震有聲甲午復震有聲如雷十年二月丙午秦州地震世宗景明元年六月庚午秦州地震四年正月辛酉涼州地震六月丁亥秦州地震正始三年七月己丑涼州地震有聲城圮永平元年正月庚寅秦州地震延昌元年十月壬申秦州地震有聲肅宗熈平元年十二月乙巳秦州地震有聲正光二年六月秦州地震有聲東北引八月始平郡地開成井齊後主天統四年六月彗星見於東井後周武帝建徳三年涼州地震壊城郭地裂涌泉出隋文帝開皇二十年十一月大風發屋㧞木秦隴壓死者千餘仁壽元年十月蘭州楊樹生松二年四月隴西地震煬帝大業三年二月己丑彗星見於東井掃帝座百餘日乃止四年張掖獲黒狐唐髙祖武徳元年冬涼州大饑六年秋夏州蝗九年五月太白晝見六月丁巳經天己未又經天太宗貞觀二年六月天狗隕於夏州城中八年七月隴右山摧十七年六月己卯朔日食在東井十六度八月涼州鴻池谷有石青質白文成字二十三年四月靈州河清髙宗顯慶五年六月庚午朔日食在東井二十七度龍朔元年五月甲子晦日食在東井二十七度總章二年六月戊申朔日食在東井二十九度咸亨元年六月壬寅朔日食在東井十八度上元三年七月丁亥彗星見於東井儀鳯三年四月涇州獻二小兒連心異體調露元年八月邠慶寧涇原五州霜十一月壬午秦州神亭治北霧開如日初曜武后垂拱三年武威郡石化為麫四年六月丁亥朔日食在東井二十七度長安三年六月寧州大水中宗嗣聖元年四月丁亥寧州大風㧞木景龍元年六月丁卯朔日食在東井二十八度二年六月癸巳太白晝見東井明皇開元二十二年二月壬寅秦州地震壊廬舍殆盡壓死四千餘人天寳十三載六月乙丑朔日食不盡如鈎在東井十九度肅宗至徳元載十一月辛亥朔河西地震裂有聲陷廬舍張掖酒泉尤甚至二載三月癸亥乃止乾元二年四月丁巳彗見東方疾行歴東井輿鬼栁凡五旬餘不見代宗大厯十年十二月丙子月出東方上有十餘道如匹練貫井鬼柳十三年六月隴右獻猫鼠同乳徳宗貞元元年春旱夏蝗西盡河隴羣飛蔽天旬日不息草木葉及畜毛皆盡餓殣枕道十年正月涼州奏甘露降十七年五月壬戍朔日食在東井十度憲宗元和十三年六月癸丑朔日食在輿鬼一度穆宗長慶二年冬夏州大風飛沙為堆髙及城堞四年三月庚午太白晝見經天七年九月靈州奏黄河清從陜至定逺界二百五十里見底懿宗咸通元年六月壬寅朔日食在東井十八度七年渭州有人生角昭宗天復元年自五月丁酉至於己亥太白晝見經天在東井度八月己亥西方有白雲如履底出白氣如疋練長五丈上衝天分為三彗形下垂五代晉髙祖天福七年四月關西諸郡皆蝗大飢死者十有七八宋太祖建隆三年七月己卯夜西方起蒼白雲長五丈貫天亘井宿乾徳四年八月渭州范裕獻蓮一莖二花開寳元年關西大旱饑太宗太平興國二年五月白龍見於寧州要冊龍廟池中三年四月秦嶺南石洞自開得丹砂千二百粒獸形六八月涇州民田産嘉禾雍熈二年正月壬戍有星出東井其大倍於金星至輿鬼沒三年階州青龍峽山圮壅白江水逆流髙十丈許壊民田數百里至道二年十月靈夏環慶等州地震城郭廬舍多壊真宗咸平三年三月辛丑夜秦州大澤縣三陽寨大雨崖摧壓死六十二人四年正月秦州成紀縣山摧壓死六十餘人七月戊戌白氣如陣貫東井九月戊戍有星千數入輿鬼至中台凡一大星偕小星數十隨之其間兩星如升器大至狼星一至南斗没六年十一月甲寅有星孛於東井大如杯景徳四年七月秦州成紀縣崖圯壓死居民大中祥符三年十二月夏州饑仁宗景祐元年九月己丑有星出東井如太白赤黄色尾迹向東速行至柳至和二年九月壬午有星出東井如太白赤黄色向北速行至文昌没嘉祐五年三月甲午月掩熒惑在井七度半英宗治平元年二月乙未夜蒼黒雲起西北方長五丈許貫東井四年十二月庚戍夜蒼黒雲起南方長三丈濶二丈貫東井五諸侯神宗熈寧二年正月丙戍月入東井七年六月熈州大雨洮河泛溢八年夏涇州大雨雹十年夏秦州大雨雹哲宗元祐七年九月蘭州地震十月庚戍朔環州鎮戎軍地再震徽宗政和七年六月熈河環慶涇原地震經旬城砦關堡官私廬舍並皆摧塌居民覆壓死傷甚衆宣和七年七月己亥熈河路地震有裂數十丈者蘭州尤甚髙宗紹興四年十二月庚寅望月食於井十一年三月庚申涇州雨黄沙十二年七月丙午彗見東北井宿内十二月陜西大旱涇渭㶚滻皆竭民多飢死十五年六月乙亥朔日食在東井二十六年七月丙午彗星見東井孝宗隆興元年六月庚戍朔日食在東井九年五月壬辰朔日食在東井淳熈八年十一月丁亥望月食於井九年十一月辛巳望月食於井十年階成西和人乏食十六年夏成州亡麥冬階成西和洊飢光宗紹熈二年階成西和亡麥寧宗嘉定五年夏陜西大饑十二月壬子月食於井十二年十一月丙午望月食於井元世祖至元二十二年二月太隂犯東井成宗元貞元年閏四月蘭州河清三日上下三百餘里六月環州伏羌通渭等縣旱饑大徳五年八月庚辰彗出東井歴紫㣲垣天市垣自八月庚辰至九月乙丑凡四十六日而滅十月癸未太隂犯東井十年八月開成路地震壊王宫及官民廬舍壓死五千餘人武宗至大元年六月丁酉隴西地震四年三月己亥寧夏地震裂仁宗延祐元年六月六盤山隕霜殺稼五百餘頃二年夏五月乙丑成紀縣山移是夜疾風雷電北山南移至夕川河次日再移平地突出土阜髙者二三丈陷没民居四年六月己丑成紀縣山隤五年二月丁酉秦安縣山隤五月隴西縣山頽七月戊子寧逺縣山摧六年八月伏羌縣山隤英宗至治元年五月太白犯鬼宿積尸氣泰定帝泰定元年五月隴西縣大雨漂死者五百餘家二年四月伏羌縣山摧四年九月壬寅寧夏地震致和元年七月辛酉寧夏地震文宗天厯二年正月鞏昌蘭州定西州大旱饑至順元年八月隴西地震順帝元統元年八月鞏昌徽州山摧至元三年三月河州大雪十日深八尺馬駝牛羊凍死者十九民大飢六年六月成紀山摧地坼至正三年三月鞏昌成紀寧逺伏羌等縣山摧水涌出人溺死者無算十二年三月隴西地震百餘日莊浪定西静寧㑹州尤甚㑹州公廨牆圮得弩五百餘張長者丈餘短者九尺人莫能挽十三年莊浪定西静寧㑹州復地震二十三年六月太白晝見犯井明太祖洪武二年陜西大旱饑指揮徐呆厮出兵河套一日午間有火星墜於河中火發延及岸上營中有被傷者成祖永樂三年寧夏産兩岐麥數莖五年二月戊午西和地震八年五月金州大水宣宗宣徳三年隴右大旱饑英宗正統十二年寧夏産異馬白色拳毛夜行則火光見天順五年七