body:
  text: 甘肅通志巻四十流寓名賢高士過都越國旅寓棲遲或因事羈留竟至畢世足蹟所經山林生色遺風流韻後人景仰爰紀姓名以資觀覽志流寓臨洮府明徐蘭字與善浙江開化人洪武初任郃陽知縣謫戍蘭州衛復舉國子助教調崇仁縣丞永樂元年聘典京闈鄉試致仕復歸於蘭尋又南還卒著有書經體要解縉字大紳江西吉水人洪武二十一年進士授庶吉士上封事萬言論時政剴切上數稱其才諸大臣皆忌之上慰諭賜鏹遣歸令讀書十年後來用後因有司劾縉違詔奔喪謫河州衛吏後召為翰林待詔永樂二年擢右春坊大學士耿復初字明善合肥人性聰敏博通經史尤敦孝友元末歸附李文忠亷其賢授中書省使居於杭洪武間謫戍蘭州衛二年母尚留杭不逺萬里迎母就養讀書課子造次顛沛守仁義如一日嘗玩易至節之六四歎曰宜退而進殃也可止而止無咎自號安節老人年八十而卒謝圓字友規浙江四明人洪武中以事謫臨洮為府學掾學富才敏文雅而思深受知當道郡弟子員皆從之登第者甚衆尋以例釋歸丁晉字希敏江南崑山人洪武中謫戍莊浪衛永樂中被選為肅府儀衛司校尉性鯁介明醫術善吟咏尤精於畫所著有樵雲集沈繹字成章江南吳縣人洪武間謫戍蘭州衛精醫道敦志節善琴書所著有醫方集要平治活法繪素集芝軒餘興潘若水江西人為翰林待詔以事充吏於西寧往來於蘭與沈丁軰遊善詩為蘭士大夫所重楊志善浙江杭州人遷河東鹽運司洪武間謫戍蘭州衛善屬文不事生産與范繹丁晉善齒德為人所重號稱金城三老田中北直蠡縣人由進士任錢塘知縣洪武間謫戍肅府儀衛司校尉性惇厚尚古樸治家嚴肅人皆稱之陳質字太素江西廣信人洪武間謫戍蘭州衛精醫術善吟咏自少至老好學不倦有瓦瓿集游堅字文固應天府人任山東道監察御史永樂間謫戍河西因寓於蘭有文翰存董可善字在道浙江四明人敦德力學教人有法徐蘭為記城南書塾士林重之慶陽府漢馬嚴字威卿扶風茂陵人嚴少孤從平原楊太伯講學能通春秋左氏弟敦字孺卿亦知名援卒後嚴乃與敦俱歸安陵居鉅下三輔稱其義行號鉅下二卿明德皇后既立嚴乃閉門自守猶復慮致譏嫌遂復更徙北地斷絶賔客永平十五年皇后勅使移居洛陽明張珩山西石州人正德辛巳進士由御史歴陞延寧巡撫總督三邉清直不阿權貴陞戸部尚書未及任以延綏失利謫戍慶陽七年教授生徒講論道德一時俊髦咸出門下所著有南川録並文集奏議性文山人不知何許人蓬頭垢面嗜酒善飲詩不搆思百首立就字亦竒有贈衣者即裂而披之囊金不匱莫知所從來凡二十餘年死葬長安甘州府明劉廌字士端誠意伯基之孫江西參政璉之子洪武二十三年襲封明年坐事貶秩歸里築室雞山下命曰盤谷丁丑譴戍甘肅尋赦還建文帝及成祖皆欲用之以奉親守墓力辭永樂年卒於家著有盤谷集十巻盤谷倡和集二巻郭豋字元豋武定侯英諸孫也正統七年從王驥征木麓川九年從沐斌征騰衝功皆最土木之難以都督僉事守大同上皇至城下豋陴謝却之景泰元年大戰栲栳山有功封定襄伯上皇復辟謫戍甘肅成化初復爵卒贈侯諡忠武李東陽嘗謂武臣能詩者莫過郭定襄有聨珠集二十二巻行世艾穆字純卿湖廣舉人為刑部郎諫張居正奪情言切直謫戍甘肅嘗遊終南山水間與一時詞人結社賦詩張慎言字金銘山西陽城人萬厯庚戍進士為曹縣令有惠政擢御史天啓時以直言忤魏忠賢謫戍甘肅明末復職歴官南京吏部尚書凉州府漢馬援字文淵扶風茂陵人少孤有大志諸兄竒之後為郡督郵送囚至司命府囚有重罪援哀而縱之遂亡命北地遇赦因留牧畜賔客多歸附者遂役屬數百家轉遊隴漢間嘗曰丈夫為志窮且益堅老當益壯王莽敗復避地凉州世祖即位歸漢為新息侯拜伏波將軍建初三年諡曰忠成侯劉般字伯興宣帝之元孫般數嵗而孤獨與母居王莽敗更始即位般奔長安㑹更始敗與般西行上隴遂至武威般雖年少而篤志修行講誦不怠其母及諸舅以為身寄絶域死生未必不宜苦精若此般終不改其業建武八年隗囂敗河西始通般將家屬至洛陽封菑丘侯晉司馬順字子思宣帝弟魏安城亭侯通之子也初封習陽亭侯及武帝受禪順歎曰事乖唐虞而假為禪名遂悲泣由是廢黜徙武威姑臧縣雖受罪流放守意不移而卒魏常爽河内人寓凉州不受禮命魏主以為宣威將軍爽置館於温水之右教授七百餘人弟子事之如嚴君由是儒風始振明河西傭不知何許人建文四年六月燕兵入京城傭被葛衣走其冬至金城行乞市中邊地極寒傭常衣葛明年至河西依莊浪魯家為傭取傭值買羊裘披之夏或衣新布衣皆以故葛衣覆其上葛衣破縷縷或勸棄之終不可錢稍餘輒市酒肉與諸乞兒飲食力作倦自吟哦或夜聞其哭聲永樂中有京朝官至莊浪識傭欲與語傭走南山避之旬月京朝官去乃還在莊浪數年病且死呼主人囑曰我死勿殮我西北風起火我勿埋我骨魯家從其言今建有葛衣先生祠湯鼐壽州人官御史𢎞治三年上䟽劾萬安劉吉尹直下詔獄坐妖言罪死刑部侍郎彭韶辭不判徐溥力言不可使朝廷有殺諫臣名獲免鼐謫戍河西包節字䝉泉江南吳縣人嘉靖間御史參劾逆璫擅作威福謫戌莊浪衛以章句訓童子以給衣食有時賦詩既病篤手書寄弟包孝善事母殮以斬衰曰少申罔極之恩所著有湟中稿徐文彪上虞人武廟時以布衣徵值璫瑾亂政即于廷中指為𢎞恭石顯極詆其惡瑾怒下獄廷杖謫戍鎮番衛寧夏府晉周虓字孟威晉益州刺史建城定公周楚之孫為梓潼太守寜康元年苻秦將楊安攻梓潼虓固守涪城遣步騎數千送母妻自漢水趨江陵秦秘書監朱彤邀而獲之虓遂降於安秦王堅欲用為尚書郎虓曰蒙晉厚恩但老母見獲失節於此母子獲全秦之惠也雖公侯之貴不以為榮況郎任乎太元八年徙之於朔方之北後竟卒於朔方隋栁彧字㓜文河東解人仕治書御史正色立朝百僚皆敬憚之後為楊素所忌坐罪除名徙配朔方懷逺鎮明阮彧字景文錢塘人任兵科給事中其同母弟誼謫戍寧夏未及行而卒遂以彧代戍永樂元年以薦者言釋於戍所復其官工吟咏尤長於駢體陳矩字善方江西廬陵人洪武初第進士以戸部主事謫戍寧夏後復官湖廣江陵知縣直𨽻秦州漢申屠剛字巨卿扶風茂陵人性方直仕郡功曹舉賢良方正對䇿罷歸田里莽簒位遂避地河西隗囂據隴右欲背漢而附公孫述剛説曰人所歸者天所與人所攜者天所去將軍孤立一隅宜推誠奉順上應天心下醻人望為國立功可以永年囂不納建武七年徵拜侍御史遷尚書令鄭興字少贑河南開封人少學春秋學者師之更始拜興諫議大夫凉州刺史使安集闗西及朔方凉益三州㑹天水反者攻殺郡守興坐免赤眉入闗東道不通乃西歸隗囂囂虛心禮待而興恥為之屈稱疾不起聞囂稱王説囂不可囂乃止建武六年侍御史杜林先與興同寓隴右乃薦興執義堅固敦說詩書徵為大中大夫後坐事左轉蓮勺令興好古學尤明左氏世傳左氏者多祖興興去蓮勺後三公連辟不就卒於家馬融字季長扶風茂陵人美辭貌有俊才博通經籍永初二年大將軍鄧隲聞融名召為舎人不應命客于凉州武都漢陽界中後㑹邉方擾亂自闗以西米穀踴貴道殣相望融既飢困乃應隲召拜校書郎班彪字叔皮扶風安陵人更始敗三輔大亂隗囂擁衆天水彪避難從之囂問彪曰往者周亡戰國並爭意縱横之事復起于今乎對曰周之廢興與漢殊異方今帶州域者無七國之資而百姓謳吟思仰漢德乃著王命論以感之而囂終不悟遂辟地河西河西大將軍竇融以為從事彪為畫䇿事漢融還京師召彪入見舉茂才拜徐令杜林字伯山扶風茂陵人博洽多聞時稱通儒初為郡吏王莽敗盗賊起林與弟成及同郡范逡等俱客河西隗囂素聞林志節深相敬待以為持書平以疾辭去囂復强起遂稱篤囂乃出令曰杜伯山天子所不能臣諸侯所不能友今且從師友之位須道開通使順所志林終不屈節光武徵拜侍御史問以經書故舊及西州事賜車馬衣被羣寮知林以名德用甚尊憚之林於西州得漆書古文尚書一巻嘗寶愛之雖遭艱困握持不離身出以示衛宏等於是古文遂行後為光禄勲大司空任延字長孫南陽宛人年十二為諸生學于長安顯名太學學中號為任聖童值倉卒避兵之隴西隗囂已據四郡遣使請延延不應更始元年以延為大司馬屬拜㑹稽都尉時年十九時避亂江南者皆未還中土㑹稽頗稱多士延到皆聘請高行如董子儀嚴子陵等待以師友之禮掾吏貧者分禄給之賢士大夫爭往宦焉建武初徵為九真太守九真吏人生為立祠唐杜甫杜陵人字子美審言孫少貧不自振客吳越齊趙間李邕竒其材先往見之舉進士不中第困長安天寶十三載獻賦授右衛率府胄曹參軍禄山亂走鳳翔謁肅宗拜右拾遺出為華州司功參軍闗輔饑棄官客秦州寓居東柯谷結草堂草堂之中有泉焉人稱為子美泉負薪拾橡栗自給其後往來栗亭同谷間今栗亭同谷俱有草堂遺蹟後流落劔南節度使嚴武表為參謀檢校工部員外郎明李天成莊浪人天啓甲子舉人隱居秦州仙人崖安貧樂志蕭然箕穎之風朱新靖山西舉人闖賊逆變避跡秦州麥積山詩酒自適日逍遙于松泉間以終其身直𨽻肅州明岳正字季方順天漷縣人正統十三年進士及第官修撰天順初以原官入閣言石亨曹吉祥權太重恐久不可制又言尚書陳汝言小人時命正視草歴數弊政亨吉祥構蜚語謂正賣直訕上謫欽州同知道漷以母老暫留汝言嗾校言狀逮繫詔獄杖百戌肅州亨吉祥誅起原官直經筵出為興化知府築隄溉田數千頃節縮浮費預備倉儲卿士大夫不利騰謗成化五年入覲致仕嘉靖中追贈太常寺卿諡文肅劉大夏字時雍湖廣華容人天順八年進士除兵部郎宿弊盡革遷福建參政廣東布政移浙江皆以政績聞治河張秋疏上流築長隄水乃大治理宣府兵餉儲積充羡總制兩廣令行盗息民安召拜兵部尚書條上當興革十六事再陳兵政十害武宗嗣位乞歸加銜馳驆大夏忠誠懇篤忘身徇國見疾權倖劉瑾假田州岑猛事欲坐以激變李東陽力解乃戍肅州大夏徒步荷戈至大明門下叩首而去觀者塞路歎息泣下父老攜筐進食所至罷市焚香祝其生還至戍所儒學生徒傳食之遇團操荷戈就伍五年赦歸八年瑾誅復官致仕教子孫力田謀食稍餘散之宗族預自為壙志卒年八十一贈太保諡忠宣所居東山草堂僅數楹天下稱東山先生趙逐仙邑里名字未詳原任太常卿𢎞治初謫戍肅州陶諧有訪趙逐仙之作潘魴號愚叟原任刑部尚書以忤逆瑾謫戍肅州陶諧號南川原任給事中以忤逆瑾謫戌肅州後起官為兵部侍郎總制兩廣姜道淵原任蘭州知州不知何名道淵其字也正徳間李髙巡按河西時適凉州人徐謙任蘭州參將與姜相搆李因劾徐謙徐乃逆瑾黨瑾力為内庇遂逮治李與邊備副使張天衢及道淵俱謫戌肅州甘肅通志巻四十
