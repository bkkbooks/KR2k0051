body:
  text: 甘肅通志巻四十五藝文甘省自羲皇畫卦肇啟文明千古文章孰大於是從漢迄今或良臣謀國碩畫訏謨或學士名儒立言著述皆足信今傳後鼔吹休明即吟詠篇什輶軒采風亦所必録捜輯薈萃備載簡編至於月露風雲浮詞縟語無闗治忽則不取焉志藝文奏疏漢趙充國上書陳兵利害臣竊見騎都尉安國前幸賜書擇羌人可使使䍐諭告以大軍當至漢不誅䍐以解其謀恩澤甚厚非臣下所能及臣獨私美陛下盛徳至計亡已故遣幵豪雕庫宣天子至徳䍐开之屬皆聞知明詔今先零羌楊玉此羌之首帥名王将騎四千及煎鞏騎五千阻石山木候便為㓂䍐羌未有所犯今置先零先擊䍐釋有罪誅無􅇳起一難就兩害誠非陛下本計也臣聞兵法攻不足者守有餘又曰善戰者致人不致於人今䍐羌欲為燉煌酒泉㓂宜飭兵馬練戰士以須其至坐得致敵之術以逸擊勞取勝之道也今恐二郡兵少不足以守而發之行攻釋致虜之術而從為虜所致之道臣愚以為不便先零羌虜欲為背畔故與䍐幵解仇結約然其私心不能亡恐漢兵至而䍐幵背之也臣愚以為其計常欲先赴䍐幵之急以堅其約先擊䍐羌先零必助之今虜馬肥糧食方饒擊之恐不能傷害適使先零得施徳於䍐羌堅其約合其黨虜交堅黨合精兵二萬餘人迫脇諸小種附著者稍衆莫須之屬不輕得離也如是虜兵寖多誅之用力數倍臣恐國家憂累繇十年數不二三嵗而已臣得䝉天子厚恩父子俱為顯列臣位至上卿爵為列侯犬馬之齒七十六為明詔填溝壑死骨不朽亡所顧念獨思惟兵利害至熟悉也於臣之計先誅先零已則䍐幵之屬不煩兵而服矣先零已誅而䍐幵不服渉正月擊之得利之理又其時也以今進兵誠不見其利唯陛下裁察趙充國上屯田奏臣聞兵者所以明徳除害也故舉得於外則福生於内不可不慎臣所将吏士馬牛食月用糧榖十九萬九千六百三十斛鹽千六百九十三斛茭槀二十五萬二百八十六石難久不解繇役不息又恐它夷卒有不虞之變相因並起為明主憂誠非素定廟勝之册且羌虜易以計破難用兵碎也故臣愚以為擊之不便計度臨羌東至浩亹羌虜故田及公田民所未墾可二千頃以上其間郵亭多壊敗者臣前部士入山伐材木大小六萬餘枚皆在水次願罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者合几萬二百八十一人用榖月二萬七千三百六十三斛鹽三百八斛分屯要害處冰解漕下繕鄉亭浚溝渠治湟陿以西道橋七十所令可至鮮水左右田事出賦人二十畮至四月草生發郡騎及屬國胡騎伉健各千倅馬什二就草為田者遊兵以充入金城郡益積畜省大費今大司農所轉榖至者足支萬人一嵗食謹上田處及器用簿唯陛下裁許趙充國復上屯田状臣聞帝王之兵以全取勝是以貴謀而賤戰戰而百勝非善之善者也故先為不可勝以待敵之可勝蠻夷習俗雖殊於禮義之國然其欲避害就利愛親戚畏死亡一也今虜亡其美地薦草愁於寄託逺遯骨肉離心人有畔志而明主般師罷兵萬人留田順天時因地利以待可勝之虜雖未即伏辜兵決可期月而望羌虜瓦解前後降者萬七百餘人及受言去者凡七十輩此坐支解羌虜之具也臣謹條不出兵留田便宜十二事歩兵九校吏士萬人留屯以為武備因田致榖威徳並行一也又因排折羌虜令不得歸肥饒之地貧破其衆以成羌虜相畔之漸二也居民得並田作不失農業三也軍馬一月之食度支田士一嵗罷騎兵以省大費四也至春省甲士卒循河湟漕榖至臨羌以眎羌虜揚威武傳世折衝之具五也以閒暇時下所伐材繕治郵亭充入金城六也兵出乘危徼幸不出令反畔之虜竄於風寒之地離霜露疾疫瘃墮之患坐得必勝之道七也亡經阻逺追死傷之害八也内不損威武之重外不令虜得乘間之埶九也又亡驚動河南大幵小幵使生它變之憂十也治湟陿中道橋令可至鮮水以致西域信威千里從枕席上過師十一也大費既省繇役豫息以戒不虞十二也留屯田得十二便出兵失十二利臣充國材下犬馬齒衰不識長册唯明詔博詳公卿議臣採擇趙充國復奏屯田臣聞兵以計為本故多算勝少算先零羌精兵今餘不過七八千人失地逺客分散饑凍䍐幵莫須又頗暴畧其羸弱畜産畔還者不絶皆聞天子明令相捕斬之賞臣愚以為虜破壊可日月冀逺在來春故曰兵決可期月而望竊見北邊自燉煌至遼東萬一千五百餘里乘塞列隧有吏卒數千人虜數大衆攻之而不能害今留歩士萬人屯田地埶平易多髙山逺望之便部曲相保為壍壘木樵校聨不絶便兵弩飭鬬具㷭火幸通埶及并力以逸待勞兵之利者也臣愚以為屯田内有亡費之利外有守禦之備騎兵雖罷虜見萬人留田為必禽之具其土崩歸徳宜不久矣從今盡三月虜馬羸瘦必不敢捐其妻子於它種中逺渉河山而來為㓂又見屯田之士精兵萬人終不敢復将其累重還歸故地是臣之愚計所以度虜且必瓦解其處不戰而自破之册也至於虜小㓂盗時殺人民其原未可卒禁臣聞戰不必勝不茍接刃攻不必取不茍勞衆誠令兵出雖不能滅先零亶能令敵絶不為小㓂則出兵可也即今同是而釋坐勝之道從乘危之埶徃終不見利空内自罷敝貶重而自損非所以示蠻夷也又大兵一出還不可復留湟中亦未可空如是繇役復發也且匈奴不可不備烏桓不可不憂今久轉運煩費傾我不虞之用以澹一隅臣愚以為不便校尉臨衆幸得承威徳奉厚幣拊循衆羌諭以明詔宜皆鄉風雖其前辭嘗曰得亡效五年宜亡他心不足以故出兵臣竊自惟念奉詔出塞引軍逺擊窮天子之精兵散車甲於山野雖亡尺寸之功媮得避嫌之便而亡後咎餘責此人臣不忠之利非明主社稷之福也臣幸得奮精兵討不義久留天誅罪當萬死陛下寛仁未忍加誅令臣數得孰計愚臣伏計孰甚不敢避斧鉞之誅昧死陳愚唯陛下省察班超上書請兵臣竊見先帝欲開西域故北擊匈奴西使外國鄯善于寘即時向化今拘彌莎車疏勒月氐烏孫康居復願歸附欲共并力破滅龜兹平通漢道若得龜兹則西域未服者百分之一耳臣伏自惟念卒伍小吏實願從谷吉效命絶域庶㡬張騫棄身曠野昔魏絳列國大夫尚能和輯諸戎況臣奉大漢之威而無鉛刀一割之用乎前世議者皆曰取三十六國號為斷匈奴右臂今西域諸國自日之所入莫不向化大小欣欣貢奉不絶惟焉耆龜兹獨未服從臣前與官屬三十六人奉使絶域備遭艱戹自孤守疏勒於今五載胡夷情數臣頗識之問其城郭大小皆言倚漢與依天等以是效之則䓤嶺可通䓤嶺通則龜兹可伐今宜拜龜兹侍子白覇為其國王以歩騎數百送之與諸國連兵嵗月之間龜兹可禽以外域攻外域計之善者也臣見莎車疏勒田地肥廣草牧饒衍不比燉煌鄯善間也兵可不費中國而糧食自足且姑墨温宿二王特為龜兹所置既非其種更相厭苦其埶必有降反若二國來降則龜兹自破願下臣章參考行事誠有萬分死復何恨臣超區區特䝉神靈竊冀未便僵仆目見西域平定陛下舉萬年之觴薦勲祖廟布大喜於天下曹鳯請建復西海郡縣西戎為害前世所患臣不能紀古且以近事言之自建武以來其犯法者常從燒當種起所以然者以其居大小榆谷土地肥美又近塞内諸種易以為非難以攻伐南得鍾存以廣其衆北阻大河因以為固又有西海魚鹽之利縁山濵水以廣田畜故能彊大常雄諸種恃其權勇招誘羌胡今者衰困黨援壊沮親屬離叛餘勝兵者不過數百逃亡棲竄逺依發羌臣愚以為宜及此時建復西海郡縣規固二榆廣設屯田隔塞羌胡交闗之路遏絶狂狡窺欲之源又殖榖富邊省委輸之役國家可以無西方之憂班昭上書請兄超妾同産兄西域都䕶定逺侯超幸得以㣲功特䝉重賞爵列通侯位二千石天恩殊絶誠非小臣所當被䝉超之始出志捐軀命冀立㣲功以自陳效㑹陳睦之變道路隔絶超以一身轉側絶域曉譬諸國因其兵衆每有攻戰輙為先登身被金夷不避死亡賴䝉陛下神靈且得延命沙漠至今積三十年骨肉生離不復相識所與相隨時人士衆皆已物故超年最長今且七十衰老被病頭髮無黒兩手不仁耳目不聰明扶杖乃能行雖欲竭盡其力以報塞天恩迫于嵗暮犬馬齒索蠻夷之性悖逆侮老而超旦暮入地久不見代恐開姦宄之源生逆亂之心而卿大夫咸懐一切莫肯逺慮如有卒暴超之氣力不能從心便為上損國家累世之功下棄忠臣竭力之用誠可痛也故超萬里歸誠自陳苦急延頸踰望三年於今未䝉省録妾聞古者十五受兵六十還之亦有休息不任職也縁陛下以至孝理天下得萬國之歡心不遺小國之臣况超得備侯伯之位故敢觸死為超求哀匄超餘年一得生還復見闕廷使國永無勞逺之慮西域無倉卒之憂超得長䝉文王葬骨之恩子方哀老之惠詩云民亦勞止汔可小康惠此中國以綏四方超有書與妾生訣恐不復相見妾誠傷超以壮年竭忠孝于沙漠疲老則便捐死于曠野誠可哀憐如不䝉救䕶超後有一旦之變冀幸超家得䝉趙母衛姬先請之貸妾愚戅不知大義觸犯忌諱虞詡上疏請復三郡臣聞子孫以奉祖為孝君上以安民為明此髙宗周宣所以上配湯武也禹貢雍州之域厥田惟上且沃野千里榖稼殷積又有龜兹鹽池以為民利水草豐美土宜産牧牛馬銜尾羣羊塞道北阻山河乘阨據險因渠以溉水舂河漕用功省少而軍糧饒足故孝武皇帝及光武築朔方開西河置上郡皆為此也而遭元元無妄之災衆羌内潰郡縣兵荒二十餘年夫棄沃壤之饒損自然之財不可謂利離山河之阻守無險之處難以為固今三郡未復園陵單外而公卿選懦容頭過身張解設難但計所費不圖其安宜開聖徳考行所長段熲上言討先零東羌臣伏見先零東羌雖數叛逆而降於皇甫規者已二萬許落善惡既分餘㓂無㡬今張奐躊蹰久不進者當慮外離内合兵徃必驚且自冬踐春屯結不散人畜疲羸自亡之埶徒更招降坐制强敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動唯當長矛挾脅白刃加頸耳計東種所餘三萬餘落居近塞内路無險折非有燕齊秦趙從横之埶而久亂并涼累侵三輔西河上郡已各内徙安定北地復至單危自雲中五原西至漢陽二千餘里匈奴種羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千歩萬人車三千輛三冬二夏足以破定無慮用費為錢五十四億如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起於兹作害今不暫疲人則永寧無期臣庶竭駑劣伏待節度魏刁雍鑿艾山渠表臣䝉寵出鎮奉辭西藩總統諸軍户口殷廣又總勒戎馬以防不虞督課諸屯以為儲積夙夜惟憂不遑寧處以今年四月末到鎮時以夏中不及東作念彼農夫雖復布野官渠乏水不得廣殖乘前以來功不充課兵人口累率皆飢儉畧加檢行知此土稼穡艱難夫欲育民豐國事須大田此土乏雨正以引河為用觀舊渠堰乃是上古所制非近代也富平寧夏靈州有富平廢城西南三十里有艾山南北二十六里東西四十五里鑿以通河似禹舊跡其兩岸作溉田大渠廣十餘歩山南引水入此渠中計昔為之髙于水不過一丈河水激急沙土漂流今日此渠髙于河水二丈三尺又河水浸射徃徃奔頽渠溉髙懸水不得上雖復諸處按舊引水水亦難求今艾山北河中有洲渚水分為二西河小狹水廣百四十歩臣今求入來年正月於河西髙渠之北八里分河之下五里平地鑿渠廣十五歩深五尺築其兩岸令髙一丈北行四十里還入古髙渠即循髙渠而北復八十里合百二十里大有良田計用四千人四十日功渠得成訖所欲鑿新渠口河下五尺水不得入今求從小河東南岸斜斷到西北岸計長二百七十歩廣十歩髙二丈絶斷小河二十日功計得成畢合計用功六十日小河之水盡入新渠水則充足溉官私田四萬餘頃一旬之間則水一遍水凡四溉榖得成實官課常充民亦豐贍刁雍運屯榖付沃野表奉詔髙平安定統萬及臣所守四鎮出車五千乘運屯榖五十萬斛付沃野鎮以供軍糧臣鎮去沃野八百里道多深沙輕車來徃猶以為難設令載榖不過二十石每渉深沙必致滯陷又榖在河西轉至沃野越度大河計車五千乘運十萬斛百餘日乃得一返大廢生民耕墾之業車牛艱阻難可全至一嵗不過二運五十萬斛乃經三年臣前被詔有可以便國利民者動静以聞臣聞鄭白之渠逺引淮海之粟泝流數千周年乃得一至猶稱國有儲糧民用安樂今求於牽屯山河水之次造船二百艘二船為一舫一船勝榖二千斛一舫十人計須千人臣鎮内之兵率皆習水一運二十萬斛方舟順流五日而至自沃野牽上十日還到合六十日得一返從三月至九月三返運送六十萬斛計用人功輕於車運十倍有餘不費牛力又不廢田刁雍河西修城表臣聞安不忘亂先聖之政也況綏服之外帶接邊城防守不備無以禦敵者也臣鎮所綰河西爰在邊表常懼不虞平地積榖實難守䕶兵人散居無所依恃脱有妖奸必致狼狽雖欲自固無以得全今求造城儲榖置兵備守鎮自建立更不煩官又於三時之隙不令廢農一嵗二嵗不訖三嵗必成立城之所必在水陸之次大小髙下量力取辦宋宋琪論邊事疏臣頃任延州節度判官經渉五年雖未嘗躬造夷落然常令蕃落将和斷公事嵗無虚月藩部之事熟於聞聽大約党項吐蕃風俗相類其帳族有生户熟户接連漢界入州城者謂之熟户居深山僻逺横過㓂畧者謂之生户其族多有世讐不相來徃遇有戰鬬則同惡相濟傳箭相率其從如流雖各有鞍甲而無魁首統攝並皆散漫山川居常不以為患党項界東自河西銀夏西至靈鹽南距鄜延北連豐㑹厥土多荒隙是前漢呼韓邪所處河南之地幅員千里從銀夏至青白兩池地惟沙磧俗謂平夏拓㧞盖蕃姓也自鄜延以北多土山栢林謂之南山野利盖羌族之號也從延州入平夏有三路一東北自豐林縣葦子驛至延州縣接綏州入夏州界一正北從金明縣入蕃界至盧闗四五百里方入平夏州南界一西北歴萬安鎮經永安城出洪門至宥州四五百里是夏州西境我師如入夏州之境宜先招致接界熟户使為鄉導其强壮有馬者命去官軍三五十里踏白先行縁此三路土山栢林溪谷相接而復隘陿不得成列躡此鄉導可使歩卒多持弓弩槍鋸隨之以三二千人登山偵邏俟見坦途寧静可傳號勾馬遵路而行我皆嚴備保無虞也長興四年夏州李仁福死有男彞超擅稱留後當時詔延州安從進與李彞超換鎮彞超據夏州固不奉詔朝廷命邠州藥彦稠總兵五萬送從進赴任時頓兵城下議欲攻取軍儲不繼遽命班師而振旅之時不能嚴整失戈棄甲遂為邊人之利臣又聞党項號為小蕃非是勍敵若得出山布陣止勞一戰便可盪除深入則饋運艱難窮追則窟穴幽隠莫若縁邊州鎮分屯重兵俟其入界侵漁方可隨時掩擊非惟養勇亦足安邊凡烏合之徒勢不能久利於速鬬以騁兵鋒莫若持重守疆以挫其鋭彼無城守衆乏餱糧威賞不行部族分散然後宻令覘其保聚之處預於麟府鄜延寧慶靈武等州約期㑹兵四面齊進絶其奔走之路合勢擊之可以翦除無噍類矣仍先告語諸軍擊賊所獲生口資畜許為己有彼為利誘則人百其勇也靈武路自通逺軍入青岡峽五百里皆蕃部熟户向來使人商旅經由並在部族安泊所求賂遺無㡬謂之打當亦如漢界逆旅之家宿食之直也此時大軍或須入其境則鄉導踏白當如夏州之法況彼靈州便是吾土芻粟儲蓄率皆有備縁路五七程不煩供饋止令逐都兵騎裹糧輕齎便可足用諺所謂磨鎌殺馬劫一時之力也旬浹之餘固無闕乏矣張齊賢上備邊疏清逺軍陷沒以來青岡砦燒棄之後靈武一郡援隔勢孤此繼遷之所覬覦而必至者也以事勢言之加討則不足防遏則有餘其計無他蕃部大族首領素與繼遷有隙者若能㗖以官爵誘以貨利結之以恩信而激之以利害則山西之蕃部族帳靡不傾心朝廷矣臣所領十二州軍見二萬餘人若縁邊料東本城等軍更得五萬餘人招致蕃部其數又踰十數萬但彼出則我歸東備則西擊使之奔走不暇何能為我患哉今靈武軍民不翅六七萬陷於危亡之地若繼遷來春於我兵未舉之前發兵救援靈武盡驅其衆并力攻圍則靈州孤城必難固守萬一失陷賊勢益増縱多聚甲兵廣積財貨亦難保必勝矣臣所以乞封潘羅支為六谷王而厚以金帛者恐繼遷旦暮用兵斷彼賣馬之路也茍朝廷信使得達潘羅支則泥埋等族西南逺蕃不難招集西南既禀命而縁邊之勢張則鄜延環慶之淺蕃原渭鎮戎之熟户自然歸化然後使之與對替甲兵及駐泊軍馬互為聲援則萬山聞之必不敢於靈州河西頓兵矣萬山既退則賀蘭蕃部亦稍稍叛繼遷矣若曰名器不可以假人爵賞不可以濫及此乃聖人為治之常道非隨時變易之義也張齊賢上靈州事宜疏靈州斗絶一隅當城鎮完全磧路未梗之時中外已言合棄自繼遷為患以來危困彌甚南去鎮戎約五百餘里東去環州僅六七日程如此畏途不須攻奪則城中之民何由而出城中之兵何由而歸欲全軍民理須應接為今之計莫若増益精兵以合西邊屯駐對替之兵從以原渭鎮戎之師率山西熟户從東界而入嚴約師期兩路交進設若繼遷分兵以應敵我則乗勢而易攻且奔命道途首尾難衛千里趨利不敗則禽臣謂兵鋒未交而靈州之圍自解然後取靈州軍民而置砦於蕭闗武延川險要處以僑寓之如此則蕃漢土人之心有所依賴裁候平寧却歸舊貫然後從蕃漢之兵乘時以為進退則成功不難矣張齊賢上經制西邊疏臣在先朝常憂靈夏兩鎮終為繼遷并吞言事者以臣所慮為太過畧舉既徃之事以明本末當時臣下皆以繼遷只懐戀父祖舊地别無他心先帝與以銀州廉察庶滿其意爾後攻刼不已直至降麟府州界八部族蕃酋又脇制賀蘭山下帳族言事者猶謂封奨未厚洎陛下賜以銀夏土壤寵以節旄自此姦威愈滋逆志尤暴屢斷靈州糧路復撓縁邊城池數年之間靈州終為吞噬當靈池清逺軍垂欲陷沒臣方受經畧之命臣思繼遷須是得一兩處强大蕃族與之為敵如漢斷匈奴右臂乃古今之上策也遂請以六谷名目封潘羅支俾其展効其時近臣所見全與臣謀不同多為阻撓及繼遷為潘羅支射死邊患謂可少息今其子徳明依前攻刼析逋遊龍鉢等盡在部下其志又似不小臣慮徳明乘大駕東幸之際去攻六谷則𤓰沙甘肅于闐諸處漸為控制矣向使潘羅支尚在則徳明未足為虞今潘羅支已亡厮鐸督恐非其敵望委大臣經制其事范仲淹論西事劄子臣聞兵家之事在先觀虚實之勢實則避之虚則攻之今縁邊城寨有五七分之備而闗中之備無二三分若昊賊知我虚實必先脅邊城不出戰則深入乘闗中之虚小城可破大城可圍或東阻潼闗隔兩川貢賦縁邊懦将不能堅守則朝廷不得髙枕矣為今之計莫若且嚴邊城使之久可守實闗内使無虚可乗西則邠州鳯翔為環慶原渭之聲援北則同州河中府扼鄜延之要害東則陜府華州據黄河潼闗之險中則永興為都㑹之府各須屯兵三二萬人若㓂至使邊城清野不與大戰闗中稍實豈敢深入復命五路修攻取之備張其軍聲分彼賊勢使弓馬之勁無所施牛羊之貨無所集三二年間彼自困弱待其衆心離叛自有間隙則行天討此朝廷之上䇿也又聞邊臣多請五路入討臣竊計之恐未可以輕舉也太宗朝以宿将精兵北伐西討艱難嵗月終未收復緣大軍之行糧車甲乘動彌百里敵騎輕㨗邀擊前後乘風揚沙一日數出進不可前退不可息水泉不得飲沙漠無所獲此所以無功而有患也況今承平嵗久中原無宿将精兵一旦興深入之謀擊難制之敵未可知也然則漢唐之時能拓疆萬里者盖當時受任與今不同既委之以兵又與之税賦而不求速效故養猛士延謀客日練月計以待其隙進不俟朝廷之命退不闗有司之責觀變乘勝如李牧之守邊可謂善破敵者唯陛下深計而緩圖之蘇軾論西羌夏人事宜臣竊見近者熈河路奏生擒鬼章百官稱賀中外同慶臣愚無知竊謂安危之機正在今日若應之有道處之有術則安邊息民必自是始不然将驕卒惰以勝為災亦不足怪故臣區區欲乞陳前後致㓂之由次論當今待敵之要雖狂愚無取亦臣子之常分昔先帝用兵累年雖中國靡敝然夏人困折亦㡬於亡横山之地沿邊七八百里不敢耕者至二百餘里嵗賜既罷和市亦絶彼中疋帛至五十餘千其餘老弱轉徙牛馬墮壊所失盖不可勝數饑羸之餘乃始欵塞當時執政大臣謀之不深因中國厭兵遂納其使毎一使賜予貿易無慮得絹五萬餘疋歸鬻之其民疋五六千民大悦一使所獲率不下二十萬緡使五六至而累年所罷嵗賜可以坐復既使彼因吾資以徳其民且飽而思奮又使其窺我厭兵欲和之意以為欲戰欲和權皆在我以故輕犯邊陲利則進否則復求和無不可者若當時大臣因彼之請受其詞不納其使且詔邊臣與之徃返商議所獲新疆取捨在我俟其詞意屈服約束堅明然後納之則彼雖背恩反覆亦不至如今日之速也彼雖有易我意然不得西藩解仇結好亦未敢動夫阿里骨董氈之賊臣也挾制其公主以弑其君之二妻董氈死匿喪不發逾年衆定乃詐稱嗣子偽書鬼章温溪心等名以請於朝當時執政若且令邊臣審問鬼章等以阿里骨當立與否若朝廷從汝請遂授節鉞阿里骨真汝主矣汝能臣之如董氈乎若此等無詞則是諸羌心服既立之後必能統一都部吾又何求若其不服則釁自彼生爵命未下曲不在吾彼既一國三公則吾分其恩禮各以一近土使額命之鬼章等各得所欲宜亦無患當時執政不深慮此專以省事為安國因其妄請便授節鉞阿里骨自知不當立而憂鬼章之討也故欲借力於西夏以自重於是始有解仇結好之謀而鬼章亦不平朝廷之以賊臣君我也故怒而盗邊夏人知諸羌之叛也故起而和之此臣所謂前後致㓂之由明主不可以不知者也雖既徃不咎然可以為方來之鑑元昊本懐大志長於用兵亮祚天付兇狂輕用其衆故其為邊患皆歴年而後克定今梁氏專國素與人多不協方内自相圖其能以創殘呻吟之餘久與中國敵乎料其姦謀盖非元昊亮祚之比矣意謂二聖在位恭黙守成仁恕之心著於逺邇必無用武之意可肆無厭之求蘭㑹諸城鄜延五寨好請不獲勢挾必從猖狂之後求無不獲計不過此耳今者竊聞朝廷降詔諸路勅勵戰守明逆順曲直之理此固當今之急務而詔書之中亦許夏人之自新臣竊以為開之太易納之太速曽未一戰而厭兵欲和之意已見乎外此復蹈前日之失矣臣甚惜之今既聞鬼章之㨗或漸有欵塞之謀必将為恭狠相半之詞而繼之以無厭之請若朝廷復納其使則是欲戰欲和權皆在彼有求必獲不獲必叛雖媮一時之安必起無窮之釁故臣願明主斷之於中深詔大臣宻勅諸将若夏人欵塞當受其詞而却其使然後明勅邊臣以夏人受恩不貲無故犯順今雖欵塞反覆難保若實心向化當且與邊臣商議茍詞意未甚屈服約束未甚堅明則且却之以示吾雖不逆其善意亦不汲汲求和也彼若心服而來吾雖未納其使必不於徃返商議之間遽復盗邊若非心服則吾雖蕩然開懐待之如舊能必其不叛乎今嵗涇原之入豈吾待之不至耶但使吾兵練士飽斥堠精明彼無大獲不過數年必自折困今雖小勞後必堅定此臣所謂當今待敵之要亦明主不可以不知者也今朝廷意在息民不憚屈已而臣獻言乃欲艱難其請不急於和似與聖意異者然古之聖賢欲行其意必有以曲成之未嘗直情而徑行也将欲翕之必固張之将欲取之必固予之夫直情而徑行未有獲其意者也若權其利害究其所至則臣之愚計於安邊息民必久而固與聖意初無少異然臣竊度朝廷之間似以畏事為無事者臣切以為過矣夫為國不可以生事亦不可以畏事畏事之弊與生事均譬如無病而服藥與有病而不服藥皆可以殺人夫生事者無病而服藥也畏事者有病而不服藥也乃者阿里骨之請人人知其不當予而朝廷予之以求無事然事之起乃至於此不㡬於有病而不服藥乎今又欲遽納夏人之使則是病未除而藥先止其與㡬何臣於侍從之中受恩至深其於委曲保全與衆獨異故敢出位先事而言不勝恐悚待罪之至元特穆爾鹽法疏近䝉委廵歴奉元東道至元元年各州縣户口額辦鹽課其陜西運司官不思轉運之方每年預期差人分道齎引遍散州縣甫及旬月杖限追鈔不問民之無有竊照諸處運司之例皆運官召商發賣惟陜西等處鹽司近年散於民户且如陜西行省食鹽之户該辦課二十萬三千一百六十四錠有餘於内鞏昌延安等處認定課鈔一萬六千二百七十一錠慶陽環州鳯翔興元等處嵗辦課一萬七千九百八十五錠其餘課鈔先因闗陜旱饑民多流亡准中書省咨至順三年鹽課十分為率減免四分於今三載尚有虧負盖因户口凋殘十亡八九縱或有復業者家産已空邇來嵗額豐收而物價甚賤得鈔為艱本司官皆勒有司徵辦無分髙下一槩給散少者不下二三引每一引收價銀三錠富家無以應辦貧民安能措畫糶終嵗之糧不酧一引之價緩則輸息而借貸急則典鬻妻子縱引目到手力窘不能装運止從各處鹽商勒價收買舊債未償新引又至民力有限官賦無窮又寧夏所産韋紅鹽池不辦課程除鞏昌等處循例認納乾課從便食用外其池鄰接陜西環州百餘里紅鹽味甘而價賤解鹽味苦而價貴百姓私相販易不可禁約以此參詳河東鹽池除撈鹽户口食鹽外辦課引數今後宜從運官設法募商興販但遇行鹽之處諸人毋得侵擾韋紅鹽法運使每嵗分輪官吏監視聽民採取立法抽分依例發賣每引收價鈔三錠自黄河以西從民食用通辦運司元額課鈔因而夾帶至黄河東南者同私鹽法罪之陜西興販解鹽者不禁如此庶望官民兩便而課亦無虧矣明楊一清請復茶馬舊例疏臣於茶馬事例知聖祖神宗睿謀英畧度越前代也自唐世回紇入貢以馬易茶至宋熙寧間乃有以茶易蕃馬之制所謂以摘山之利而易充廄之良戎人得茶不能為我害中國得馬足以為我利計之得者無越於此至我朝納馬謂之差發如田之有賦身之有庸必不可少彼即納而酬以茶斤我體既尊彼欲亦遂較之前代曰互市曰交易得失輕重較然可知且金城之西綿亘數千里北有狄南有番狄終不敢越番而南以番人為之世仇恐議其後此天所以限别區域絶内外者也國初散處降夷各分部落隨所指撥地方安置住劄授之官秩聨絡相承以馬為科差以茶為酬價使知雖逺外小夷皆王官王民志向中國不敢背畔且如一背中國則不得茶無茶則病且死以是羈縻之賢於數萬甲兵矣此制西番以控北邊之上䇿前代畧之而我朝獨得之者也頃自金牌制廢私販盛行雖有撫諭廵茶之官莫之能禁坐失茶馬之利垂百六十年豈徒邊方缺馬将意外之慮或從此生乞勅該衙門将金牌舊額查出仍遣廷臣齎捧前來㑹同臣等昭示番族使知朝廷修復舊制各當本等差發不許違背附近番族調取原降金牌前來納馬給茶賞勞有不受約束招調者官兵誅剿以警其餘庶㡬恩威並施番人懐畏永為藩籬之固劉天和陳邊計疏訪得漢人歴年被驅掠在敵中者常數萬人每敵騎南牧近邊則脱身而歸然以守墩官軍殘忍貪功遇有到邊則偽舉火砲殺取首級冐報功次希圖陞賞是以來歸者尚少查得舊例遇有到邊鎮廵官查取姓名鄉貫差人伴送寧家夫彼皆中土良民我不能衛之保安致彼被掠彼不忘我冐死逃歸我不加恤又從而利其盗得之物此何理也切念先年曽因邊方缺軍懸賞召募每軍一人給銀五兩能召及百人者陞一級其所召者多老弱逋囚之人然走回人口少小而去强壮而歸彼之伎倆知之稔矣其耐寒暑習戰鬬猶夫彼也以此赴敵所謂用我所長也乃縱之使歸民伍謂之何哉近來各鎮将官亦有私蓄以備爪牙者緣未著為令故所收者不多合無通行各該鎮廵官曉諭守墩官軍但有敵中走回人口隨即收送鎮廵官處時刻不許遲留除老弱婦女照舊伴送寧家其精壮男子及十四五嵗幼童若係本鎮附近軍民俱倍加撫恤編入衛所與正軍一體食糧無妻者官為娶妻無屋者官為買屋發遊兵部下名為先鋒軍每逢出戰用以當先使之踴躍呼譟以倡士氣先登陷陣以挫賊鋒敵中騎回馬匹有堪以出戰者官給時價收買不堪者聽其自行變賣收送墩軍夜不收仍給官銀三兩以塞其貪功妄殺之心其視用銀五兩召募不堪之人以耗邊餉似有間矣若有貪功妄殺者下手之人扺命該管官知情者問發充軍仍行各該撫臣出給告示發各墩懸掛曉諭或别行召誘庶風聞塞外來歸者日衆每鎮若得千人以上鼓譟於軍中則三軍氣勝所向不怯而武功大振矣楊博查處屯田計安地方疏臣以庸劣誤䝉聖明付以邊撫重寄任事以來其於地方利弊靡不悉心講求大要河西事體重且大者莫過於屯田一事遂即案行守廵兵備四道各将境内荒蕪田地通行查出或上下水利不通應該挑濬或人力牛種不敷應該處給或從來抛荒未種應該開墾逐一議處明白每處畫一小圖貼説其上陸續送閲果有父子兄弟相率力田者即以姓名開呈動支官錢買辦羊酒花紅犒賞惰農自安者各舉數人量加懲治以警其餘去後節據分廵西寧道副使鍾鑑先将鎮城迤南荒田開報到官如黑河木龍壩則有荒田二十餘頃洞子渠則有荒田一十三頃馬子渠則有荒田一頃大滿渠則有荒田四頃即鎮城一靣荒蕪之田至於如此其他十五衛所可概知矣臣即督同鍾鑑前去各該地方逐一踏勘召人承種不見有響應者㑹集父老問之咸以為徃年興復屯田或種未入土名已入冊或人已在逃糧猶如故不知虜至則不得耕牧水淤則不能灌溉其從來抛荒之地雖節奉事例永不起科官司一概追徵更無分别未受富饒之利先罹剥膚之害以故寧甘貧窶不敢承認臣惟甘肅地方與延綏事體大畧相同先年河東民運皆係本色後因輸納不便改本為折遂致二鎮漸次蕭索延綏守臣無嵗不討内帑者以其計無所出不得不仰給也甘肅茍且支持未嘗率意陳乞者非守臣之才過於延綏以其地土肥饒猶可耕牧故也臣自入境以來見所至荒田不下萬頃遂極力經理期於少效乃今備咨輿情始知其受病源委全在於催科之不法而法令廢閣實由於勸懲之未至若不急為處分河西生計日就窮蹙臣恐萬不得已又将如延綏之奏討矣以内帑有限之財應諸鎮無厭之請非惟該部難以區畫亦非臣等邊臣體國之忠也昔漢趙充國唐郭元振在河西咸卓然著聲考其所為充國則上屯田便益以逸待勞元振則修通河渠盡水陸之利今時雖云異勢不甚殊倣二臣之意而不泥於其跡固亦存乎其人焉耳如䝉乞勅該部将原奉各邊抛荒地土聽其儘力開墾永不起科其舊曽起科荒蕪年久仍要用力開耕應納籽粒一體蠲免事例再加申明行臣遵守仍聽臣将在城甘州左等五衛并山丹衛髙臺所行分廵副使鍾鑑涼州鎮潘永昌荘浪古浪五衛所行分守參政張璽肅州衛鎮夷所行兵備副使趙得祐西寧衛行兵備副使王繼芳各會同副參遊守等官督同衛所掌印管屯官員及兹邊警少緩之時将一應荒田查議停當候明年春煖刻期舉行合用錢糧人工等項并未盡事宜臣當徃來調度次第整理各官果能加意區畫有益地方事宜查上勞勣該部一併録叙怠惰誤事者具實論劾其衛所官吏知數人等若仍敢将荒田作弊朦朧起科嚴行挐問從重治罪中間如有應完籽粒亦許從實查免不得徒事虚文庶政有條理人自樂從臣猶恐議者必以為永不起科大便小民為疑不知損上益下藏富於民實自古經畧之長策若使民果富饒臣欲鹽糧則鹽糧有餘臣欲銀糧則銀糧有餘臣欲清補接年屯糧則屯糧有餘所謂投之所向無不如意不然則民方糊口不給遑恤其他萬一虜騎充斥倉廪匱竭河西不㡬於坐困乎此臣之所以早夜圖維不能已於有言也臣不任懇切覬望之至楊博修築𦂳要城堡以弭外患疏議得本鎮地方斗絶羌戎之中孤懸河湟之外度勢審時較之沿邊諸鎮獨為難守而經制長䇿大要亦不出於趙充國留兵屯田部曲相保塹壘木樵校聨不絶之數言盖以静致動以逸待勞自足以坐收成算而區區攻戰之末不與焉臣以駑劣以今嵗七月之初始至鎮城深惟積榖重農第一要務故亟将屯田事宜議擬題請其次則繕城郭起塢堠謹烽燧良不容緩乃備行守廵兵備四道将槩鎮城堡墩臺通行查處昨因八月九月農工告畢已将甘州張欽等堡山丹石硤口等堡風營等墩髙臺老鴉等墩永昌明沙等墩洪氷閆王邊等墩涼州張義等堡紅城子大紅石等墩古浪可可等墩肅州譚家等堡應添置者次第添置應修飭者次第修飭事涉瑣細不敢陳瀆聖聽外但惟鎮番地方北出涼州二百餘里曠逺寥闊實與宣府獨石馬營相類昔人謂於涼州北境磧中建置城垣控其衝要自是㓂不敢復至涼州城下即此處也乃今風沙壅積㡬與城埒萬一敵騎突至因沙乘城豈惟涼永坐撤藩籬實甘肅全鎮安危所繫至於涼州柔逺懐安靖邊亦皆番虜徃來出沒之所垣牆低薄壕塹淤塞雖嘗屢議修築止緣無人任事旋議旋罷今石參政張璽欲要於鎮番添築闗廂一則消除沙患一則増置重險并将修飭柔逺等堡事宜開呈前來謀之父老咸謂可行質之官僚殊無異議急當整理但夫役動調衆多錢糧經費浩繁事體頗重固非臣愚所敢擅舉如䝉乞勅該部再加查議稍待來年春暖土脈融和容臣查照所議刻期舉行未盡事宜竟自查處仍行參政張璽涼州副總兵蕭漢徃來督視務期一勞永逸保障地方事完将用過錢糧撥過夫役備細造册奏繳仍行守備蔡勲徃來提調刻期完報張倫救荒弭患疏奏為救荒弭患事切見陜西三年雨雪愆期赤地千里饑窘枕藉流移亡數賑貸磬倉廪之儲勸借竭富家之積誠可痛哭流涕且外控三邊内制番夷自古用武之地俗多强悍軍民雜處有回回土黙特河西西番輝和爾拉哩諸種族雖係附籍當差狼子野心終不能保成化四年開城縣土黙特穆蘇相聚為盗據險石城特勞大軍剿滅費出萬計即今之患又非穆蘇之比况敵騎猖獗各邊防禦誠恐風聞山西饑饉倉廪空虚謀大舉深入動調邊民截殺則軍餉何以備之轉輸何以處之此可慮者一也平慶地方盗賊蜂起誠恐勢至燎焰不可撲滅此可慮者二也流民俱在漢中荆襄萬山患出不測又非劉千斤比此可慮者三也王府禄米不足啼饑號寒此可慮者四也故曰思患預防有備無患臣有一得之愚非身家利上為朝廷下為民命内防激變外防邊患昧死規畫條陳一曰救荒無善政興水利而已臣見河南客船俱從黄河達淮直抵南京新河水利莫此為便照得南京常平倉烏龍潭等倉糧米不下數百餘萬且近年嵗頗豐稔乞勅内外守備南京户部總督糧儲等官㑹議将前項倉糧借撥二十餘萬石於南京江淮濟川二衛馬快船撥一千駕船軍人給口糧盤纒查取應天府官銀雇民船一千載運至河南孟津縣等處水次收貯仍勅户部将南方折糧銀太倉銀運至孟津縣督有司雇騾車二千運至潼闗倉并合空閑處如法堆放以賑陜西山西河南各司府州縣官斟酌緩急難易設法運賑務在盡心殫力俾民得實惠庶㡬人心安而外患可防也二曰浙淮長蘆存積官鹽所獲私鹽通賣銀運至南直𨽻蘇松等府又各府庫銀督令有司以禮召積粟之家依時估給米價船脚令其自行載運至前項水次有能仗義輸米五百石者給與七品散官三百石者冠帶榮身庶官民兩利三曰慶陽靈州鹽課司池鹽勅陜西廵鎮等官召商納米於缺糧處上納斟酌米鹽低昻定價如米貴糴買無出依時價納銀别行區處糴賑四曰河州西寧等處官茶并獲私茶許客商於缺糧去處納米領茶備賑五曰陜西司府州縣官𨽻銀免徵以贓罰銀物減半支給以蘇民困待豐年簽補六曰加意招撫復業将官銀易牛犋種子給招流亡将拖欠糧草官物及一應不急之務暫令寛免有司體詢民瘼曲加撫字七曰專委布政司官督有司修理預備倉多方蓄積行問刑衙門贖罪納米備賑八曰終南華吳山一帶深谷之中多有無藉假以僧道潛住或聚衆為盗或造為妖言煽惑人心今飢民流移誠恐被其誑誘謀為不軌宜出榜嚴加禁約朱笈豁免屯糧賠累疏臣伏讀皇上登極詔書一陜西沿邊及兩廣等處軍民田地先年被賊蹂踐抛荒者及各處荒閑官民田地各該廵按御史勘實具奏該徵夏秋税糧户部悉與蠲免又各處水坍沙壓等項民屯田地税糧負累軍民賠納曽經撫按官查勘明白具奏者該部即與除豁欽此臣有以仰窺皇上損上益下而軫恤民艱甚大惠也是故海内臣民歡欣鼓舞莫不翹首拭目願太平之治謹以夏民負累屯糧疾苦􅄋情上懇照得寧夏孤懸河外逼鄰敵境地土硝鹻膏腴絶少而當時定税遽擬一斗二升其後因缺馬缺料加増地畝草束賦日益重又其後河勢遷徙衝没良田遂至河坍沙壓髙亢宿水荒蕪無影等項而田不得耕矣繼又加以雜差則挑渠修壩採草納料捲埽起塢等項而勞者弗息矣比先當事臣工不忍前項田糧苦累節經具題未䝉豁免由是嵗無豐凶例取登足故糧有拖欠撒派包賠包賠不過勒逼逃竄逃竄不已則又摘丁頂補派及嬰孩年復一年以有限之丁受無窮之累馴至户口流亡生齒凋耗臣先任寧夏頂田軍餘見在二萬八千餘人每衛所開報逃亡輙為踧踖自臣去大同丁憂起復仍涖斯土距今僅四年而逃移者又不啻五千餘矣屢經前撫臣招徠復業畢竟傷弓之鳥驚棲不定但聞清派相繼逃移遂使市井蕭條村落荒廢有不忍言者夫國保於民民保於食今罔念夏民貽累之殘傷而乃攖情於催科之殿最追逋負之税者逐見在之民撒抛荒之田者敺安堵之衆臣不佞切有條陳民瘼之計先已行寧夏兵糧道僉事劉之䝉查報勘過河坍沙壓髙亢宿水抛荒無影等田共一千六十頃三十五畝計征糧一萬二千一十石榖草一萬七千五百餘束地畝銀一百一兩折糧草銀四十三兩造册呈繳到臣覆查間忽覩邸報因該兵科給事中劉鉉題為摘陳邊民困耗之状懇乞聖恩破格蠲恤荷䝉皇上勅下該部查勘臣竊私憂夏鎮素有江南之名惟恐溺於舊聞者見此蠲免必曰夏有水利税不可免軍餉嵗用額不可縮不䝉亟賜蠲恤輙復不識忌諱為皇上陳之夫夏方何為而敝也以糧差繁重之累也糧差何為而累也以塞北江南之稱也諺曰耳聞不如目見彼擬寧夏於江南者果經歴其地而灼見乎亦使夏人冒魚米之虚名受征斂之實禍乎且江南財賦之地泉貨所通寜夏戎馬之區較於陸海本相霄壤而顧有聲於寰宇之内自有小江南之名故夏鎮鹽引曽議増淮減浙而計部亦謂地饒糧賤藉口滋駁故淮引不添浙引不減請給内帑亦不肯多發也臣先任撫夏思為邊氓告哀今奉查勘據該道勘實造册前來并勘實各項賠糧田地文册一本進呈御覽㐲望聖明勅該部通将包賠糧草原額悉與開除其髙亢等項量為減徵流民復業官助開墾待後地闢財豐漸次補復舊額一以盡損上益下之愛一以昭聚人導利之公庶脱之於湯火之中而登之於袵席之上無事必謹惟正之供有事必攄敵愾之志臣所謂固䕶人心而保安地方者此之謂也雒遵請墾屯田疏恭惟皇上念邊人之疾苦也計多得良司牧頃言官部臣請増科額即可其奏盖廣羅才儁重邊牧甚至徳也臣竊惟得可用之人即為可為於可為之時今時可為莫急於九邊之屯田而其廢舉係司牧焉敬為皇上陳之西起燉煌東距遼海邊陲延袤萬餘里者初立軍衛時軍各予屯田雖坐落地方逺近不一其數相當不至少缺相沿至今邊軍多缺伍而田以屯征課者每每告匱不能餉什之二三夫度田非益寡而計兵未加益以口量地視昔猶有餘而食之甚不足者無乃屯田之失其初也近來議復屯田者不知有㡬訖未見效而復其舊者其説固多大較不過有二焉一則戎馬之出入無常邊人畏而不敢耕一則佃屯之頂補多差邊人苦而不肯耕時敵釋桀心未有騷於邊境失此不復後難為力今復屯田相近而實不同田以屯名豈非以屯兵而名耶見屯見佃者依舊辦課不容復議比訪之邊人及經彼守令皆云沿邊舊田今多荒棄間有願自開墾者禁之何未食新田之粒先有頂軍之苦是能棄良田為荒蕪不能舎荒田而許耕耘執此籌邊臣愚竊謂非計也然與其額征而禁民之耕孰若弛禁以盡益窮卒乎臣反復永思必須重望科甲之人布列沿邊州縣方可藉以舉行但徃年議者重惜科甲多畏邊地孤危授官稀鮮豈知志士垂勛念不異逺忠臣報主義不辭難況入官一時之苦易邊塞萬姓之福而先試諸難又作成人才之一要機也有識之士伊誰憚而不救耶伏願皇上勿忘邊備之單弱推廣臨軒之徳意勅吏部遵照欽依查将沿邊一帶州縣每遇選期先儘進士相應者選授正官如員缺太多間從見例擇年力精健舉人稍填補之分符專牧廣托民社之寄星列棊布宻堅捍禦之司其前項傍邊近地逃絶抛荒凡可田去處悉令各正官聽督撫委用親自履行相度地里得便宜懸令不論官軍土著流民各色人等願佃者許其開墾即以所墾田為永業不起科復其他徭量給租種或相險阨以結團堡或挑溝畛以遏衝突諸可備邊安百姓者任設方畧互為永圖不必屑屑然數日計功則荒塞餘民困弊可蘇又况耒耜之農夫即皆保障之力士不數年間邊食既豐兵下亦足萬一有警呼吸成聚家自為守人自為戰可恃紓宵旰之憂者䇿未出此也再乞仍勅兵部速咨各邊督撫責令司道官不許沿襲故套聽委軍職槩隠見屯巧作抛荒惟許專令州縣正官分區畫域親踏荒地急為開墾毋令後時其寛課如議不得分毫科擾統待三年考績奏報酬以異格不次超擢倘督責於上者發文移為了事奉行於下者呈文移而報完不求實效壊我邊事許各該廵按御史的查參奏重治不少貸則皇上增額之徳意流溢塞下而墾田之實政可及時振舉矣戴才議處極邊地方兵将疏臣惟甘肅一鎮最為孤懸而防範機宜尤當嚴宻所以然者何也盖各邊止知防秋而甘肅四時皆防各邊止防一處而甘肅則又防番防回兵馬奔馳殆無虚日凡可權宜裁處者皆次第舉行外竊照髙臺所設在甘州之西相去二百餘里土壤肥饒軍民庶富猾囘素所垂涎賊番不時窺伺先年議設操守一員管領馬步官軍一千餘員名在彼防禦縁官卑兵寡番囘易玩每遇大敵侵犯動發兵馬設伏不惟徒勞軍士亦且糜費芻糧且居住之民多係四外流移姦偽百出難以制馭又照西寧巴暖三川介於山溪之中東接蘭州南抵河州西連碾伯尤為曠逺且土漢雜居番囘環峙中間膏腴相望棃棗成林少有不足則肆剽掠此時雖設防守官一員摘撥西寧官軍二百餘員名并彼處屯長土兵相兼防範每遇有警去西寧頗逺加以蘭河逃逋之民附於其中相誘為非動倡悖逆此二處實不容不處也然欲為處必須増置兵将而増置兵将又當㑹計錢糧當此極邊困乏之時如之何其可也臣查得甘州既設總兵官一員統領正兵三千及標下前鋒家丁勇士一千居中調度已足捍衛又設協守左副總兵一員統領竒兵三千共駐一城似将有制之兵置於無用之地中間裒多益寡移彼駐此要必有道以通之也及質諸守廵二道李敏徳張廷槐等㑹同總督三邊軍務右侍郎郭乾及廵按御史雷稽古議照髙臺與巴暖三川地方俱係富饒要害之處無事則彈壓軍民有事則防禦番囘誠不可缺人也酌量已久故敢冒昧上陳伏望皇上軫念河西極邊重地乞勅兵部再加詳議如果臣言不謬合無将髙臺操守裁革左副總兵移駐髙臺就将竒兵官軍摘撥一千員名與髙臺所見在官軍共合二千之數付之本官統領防禦其東而平川守備西而鎮夷操守勢相聨屬亦聽本官管轄調度應援截殺髙臺既議裁革却於巴暖三川地方比照碾伯添設操守一員再於西寧遊兵下班軍内撥發二三百名或召募一二百名與前軍士付之統領防守臣等又思作事貴於謀始選将尤在得人查得甘肅坐營都司莫倦宅心勤謹生長西寧彼中土俗民情山水險易素所稔知若将本官改授巴暖三川操守添設之初凡一應防禦事宜必能有濟如此庶兵将増重番囘讋服軍民既有所頼地方可保無虞矣鄭洛收復蕃族疏據西寧兵備道按察使石檟呈會同贊畫主事梁雲龍僉事萬世徳議照西寧古湟中地也乃甘肅凉荘之右臂河州洮岷之前户萬山廻合二千餘里諸蕃羅列奚啻數萬顧附近境内而嵗納茶馬者謂之曰屬蕃其散出山外而易茶屬蕃者謂之生蕃種類不一逺近攸分要之皆為中國之藩籬向未欵之先松套諸部逺莫敢犯間有海邉諸㓂諸蕃兵力既足相抗又畏漢兵之尾其後步𢷬其巢穴以故忽來忽去未為大害苐自數年以來敵借中國之欵不獨海上而延寧松套諸部㑹盟蟻聚長驅大進始而搶山外之蕃矣在該鎮則曰此生蕃也非吾族𩔖坐視荼毒恬不為異以故生蕃俛首歸順嵗納添巴願為部落如紅㡌兒姑古只等不知其㡬已繼而搶境内之蕃矣在該鎮則曰此雖屬蕃非吾百姓也曲為隠忍莫之一救以故屬蕃甘心順從亦嵗納添巴而招中漸廢如俺官阿落受等族又不知其㡬已諸蕃既順又因而搶土漢之民矣隂實刼奪陽為誤及在将領亦曰蕃漢雜處原無分别互相容隠量為㱔須罰服粉飾塘報以邀重賞細梭等物利不止於數倍故土民無依亦倣效諸蕃添巴之例而嵗納不缺甚至有土官為土民而賞給有差者亦添巴之别名也年復一年剥削日甚以麥豆青稞口食取之蕃也褐疋毛布輕煖取之蕃也迨其搶掠或令為嚮導或驅為前鋒兵力亦取之蕃也且徃年該路将領既不能保蕃又能害衆如以䑕竊小事輙率兵攻打堡帳希圖牛羊資財之利其偷赶畨子馬匹本為報復則又代為追還倍加罰服内困於法外困於敵諸蕃蹙額之情誠仰天而莫訴矣然敵黨日增則敵謀叵測漸生不軌之心故一犯而西寧殺副總兵李魁等再犯而洮州殺副将李聨芳又犯而河州殺遊擊李芳長驅洮渭騷動三秦擄掠之慘道路痛心今特令大臣經畧贊畫司道分猷創敵招蕃招回生屬蕃人共一百六十族部落該七萬四千七百一十餘名傾心歸順各無異詞等因到臣議得兩河皆蕃而河西為甚河西四郡皆蕃而西寧為甚盖緣逺連青海近接河湟古先零䍐幵遺種在焉其於匈奴種類既殊住居各異故甘肅一鎮北則匈奴南則羌蕃漢稱河西五郡斷匈奴右臂者以敵不能越此而南牧也祖宗畧地西陲緣俗立教加意諸羌故大建梵宇特賜專勅蕃僧為衆推服者大者國師小者禪師其諸豪有力者或指揮千户百户各授有差各寺崇奉勅書及原領金玉印章在焉又以諸蕃資茶為命故許納馬中茶以示羈縻屬蕃無異編民生蕃雖不敢内嚮而所資茶箆則轉資於屬蕃二百年來分方住牧内外相安若時有跳梁或撫或剿旋即安定其松套諸部雖嘗垂涎搶掠然以甘鎮斥堠聨絡彼即潰牆而南畏我乘之旋即宵遯且彼敢掠蕃蕃亦殺之利害得失亦畧相當故蕃人為我保疆無敢異志自欵貢以來其王南牧許之借途因而收蕃此後敵騎因仍不為禁制遂致敵縱蹂躪蕃失憑藉子女牛羊皆彼所有生死予奪惟彼所制日招月引蕃安得不盡歸之敵也以故竟舎故巢率趨西海豈獨水草豐美實以諸蕃可利初尚利蕃之財物繼則利蕃為爪牙久之則利為心腹矣盖敵驅蕃以掠漢而其禍本胚胎則漢為敵而驅蕃也臣細問積弛皆謂蕃囘交通大防已潰西海四郡何地非蕃何地非囘驅之不能招之不可盖驅蕃則明以予敵招蕃又恐隂為敵應即地方官員亦謂此輩浸淫日久必不可招招則引賊入室難與共居将付之無可奈何而已臣竊謂蕃囘之勢不分則心腹之患無已故欲蕩兩川須清西海欲清西海須鼓諸蕃乃大修播告廣詢羣䇿乘其極困誘以真情畧其徃愆開之新路乃各蕃逺近傳聞風勢感動始而􅈛加七族自敵逃回既而紅㡌一族賔妻送返臣至西寧凡蕃首投見者皆進之臺階撫之善語慰其苦楚賞以口食各蕃無不感激泣下願歸故巢奮勇殺虜者臣益加鼓舞乃守備祁徳遍歴蕃巢遊擊曽光祖多方樹幟按察使石檟悉心區畫主事梁雲龍僉事萬世徳極力經營且條分縷析部落有數中馬有額安挿有所保䕶有方不惟屬蕃復歸即生蕃亦附不惟蕃慕義而逃歸即敵亦畏威而速返千里之藩籬既撤而復附數萬之戎羌既叛而復歸從此土宇如常邊疆無改戎羌安堵敵騎不侵張天朝之靈寵擅國家之盛事盖收此羌戎有六利焉蕃不附敵敵必讐蕃敵既讐蕃蕃益叛敵其約既解其勢即分敵既難侵蕃亦易制利一也敵越甘凉惟蕃是掠今我保蕃蕃氣自壮或偷赶馬畜或竊殺敵級使敵不寧居流㓂自息利二也羌富畜牧觔角皮革可供軍需利三也牛羊氈酪繹絡來市邊民財貨日通閭閻無匱連年殘壊可以甦息利四也山林通道樵牧來徃蕃漢無猜小而薪爨大而材木源源資給利五也我既示恩蕃必懐感日與土人相親相睦不出五六十年與西納等族俱可化為良蕃利六也而其安危喫𦂳猶在於彼此勢分敵難深入者此皆事理易見土俗之人俱能言之然臣之所以皇皇為善後之慮故不在今日安挿之妥而特為後日紛更之慮也甘肅通志巻四十五
