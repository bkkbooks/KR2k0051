body:
  text: 甘肅通志巻二星野星有分野猶地有分界周禮保章氏以星土辨九州分野以察災祥但言躔次者諸説互異皆以唐一行所定爲凖天官家言必徵於古考古所以信今甘肅地處西北極髙東井輿鬼分野為鶉首之次志星野歩天歌井八星行列河中浄一星名鉞井邊安兩河各三南北正天罇三星井上頭罇上横列五諸侯侯上北河西積水欲覓積薪東畔是鉞下四星名水府水位東畔四星序四瀆横列南河裏南河下頭是軍市軍市團圓十三星中有一箇野鷄精孫子丈人市下立各立兩星從東説闕丘二箇南河東丘下一狼光蓬茸左畔九箇彎弧弓一矢擬射頑狼胸有箇老人南極中春秋出來壽無窮歩天歌鬼四星册方似木櫃中央白者積尸氣册上四星是爟位天狗七星鬼下是外㕑六間柳星次天社六箇弧東倚社東一星是天紀分野甘肅雍州之西境天文東井輿鬼分野為鶉首之次於辰在未營室東壁尾箕諸宿亦分各郡之次春秋元命苞曰東井鬼宿分為秦史記天官書分東井輿鬼雍州之分前漢地理志曰自井十度至柳三度為鶉首之次秦之分後漢律厯志曰井十二度至鬼五度為秦分晉天文志曰自東井十六度至柳八度為鶉首而費直又謂起井十二度蔡邕又謂起井十度所言頗異唐志云東井輿鬼鶉首也自漢三輔及北地上郡安定西自隴坻至河右西南盡巴蜀漢中之地及西南夷犍為越巂益州郡極南河之表東至牂牁古秦梁豳芮豐畢駘杠有扈密須庸蜀羌髳之國晉志北地上郡安定天水隴西酒泉張掖金城武威燉煌諸郡各指其所入之星為尾為室為壁詳紀度數唐志又稱東井居兩河之隂自山河上流當地絡之西北輿鬼居兩河之陽自漢中東盡華陽與鶉火相接當地絡之東南鶉首之外雲漢潛流而未逹故狼星在江河上源之西弧矢雞犬皆徼外之備也西羌吐谷渾及西南徼外夷人皆狼星廼若諸星度數井宿洛下閎測三十三度宋崇寧測三十三度少至元測三十三度三十分鬼宿洛下閎測四度唐一行測三度宋測二度崇寧測二度半至元測二度二十分而尾箕室壁亦各不同又考諸星去極度數景祐測騐謂井去極六十九度鬼去極六十八度尾去極百二十八度箕去極百二十三度營室去極八十五度東壁去極八十六度視永元銅儀開元游儀逺近微異淳風法象志因漢書十二次度數始以唐之州縣配焉而一行謂天下山河之象存乎兩戒北戒自三危積石負終南地絡之陽南戒自岷山嶓冡負地絡之隂寰宇脉絡上昭於天雍州西境為南北二條之肇端云躔次晉天文志上郡北地入尾十度凉州入箕中十度安定入營室一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度燉煌入東壁八度臨洮府古隴西郡治狄道縣入營室四度今蘭河二州金縣並古金城郡地兼得東壁四度鞏昌府古隴西郡地入營室四度又為古凉州地入箕中十度其南境西和縣得古梁州地為參井之交平凉府古安定郡入營室一度慶陽府古北地郡兼得上郡地入尾十度唐志云初東井十二度餘終柳六度雍秦之分甘州府古張掖郡入營室十二度凉州府古武威郡入東壁六度寧夏府古北地郡地入尾十度唐志夏州東井之分西寧府亦古金城郡入壁四度秦州古天水郡入營室八度南境徽禮兩當三縣亦得古梁州地為參井之交階州古武都郡入東壁一度其文縣為古隂平道漢屬廣漢郡得益州部晉志廣漢入觜一度文當在觜壁之交肅州古酒泉郡入營室十一度安西沙州古燉煌郡入東壁八度國星斗一至四為魁魁一星曰天樞主秦天市垣西列十一星其第六星曰秦女十二國星周東南北二星曰秦五車五星其次舍在畢西北一星主秦五星鶉火實沈以負西海主於華山太白位焉北方水位自河曲黄甫川西經榆林至寧夏又西經蘭州踰河至嘉峪關四千餘里得水位之半占驗東井八星在河中主水衡事法令所取平也王者用法平則井宿明而端鉞一星附井前主伺滛奢而斬之南北兩河各三星分夾井主關梁河星具則路通四瀆四星江淮河濟之精也明大則百川決水位主水衡若客星水火守犯或彗孛皆為大水天罇三星主給貧餒明為豐年五諸侯主治隂陽察得失明大潤澤天下治積水在北河之北不見為災積薪在積水東火守之旱水府四星水官也闕丘天子雙闕諸侯兩觀也軍市天軍貿易之市中星衆則軍餘糧野鷄主變怪狼為野將弧矢常束矢以向狼丈人子孫星相扶而居不見為災老人星一名南極見則治平天子壽昌輿鬼主觀察姦謀天目也為日月五星之中道東北星主積馬東南星主積兵西南星主積布泉西北星主積金玉隨變占之中央積尸主祠祀爟四星主烽火天狗七星主守財天社在弧南明則吉天紀一星在外㕑南主知禽獸甘肅通志巻二
