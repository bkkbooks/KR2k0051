body:
  text: 甘肅通志巻三十三選舉上古立賢無方自漢以後取士之法徵辟保薦科舉考試代各異制有明專重科目我朝闢門造士茂材異等連類彚征科舉之法向仍明舊誠野無遺賢矣志選舉薦辟漢李恂臨涇人辟司徒府官武威太守傅燮北地人舉孝亷官至漢陽太守蓋勲敦煌人舉孝亷官至潁川太守皇甫規朝那人舉賢良方正𢎞農太守張奐酒泉人舉賢良對策仕大司農段熲武威人舉孝亷歴官至太尉皇甫嵩規兄子舉孝亷歴官至太尉三國姜維天水人郡辟上計掾晉大將軍賈詡姑臧人察孝亷為郎官冀州牧辛毗狄道人辟為議郎遷侍中晉傅元北地人舉秀才除郎中官侍中李含狄道人舉秀才累官河南尹索靖敦煌人舉賢良方正酒泉太守索綝靖子舉秀才官至尚書僕射賈疋武威人初辟公府歴安定太守郄曇金鄉人辟秘書郎官至刺史郄超金鄉人桓温辟為掾臨海太守虞溥髙平人察孝亷除郎中張軌安定烏氏人初辟掾官涼州牧張茂軌子辟從事中郎官至涼州牧劉殷新興人辟大司馬軍諮祭酒氾騰敦煌人舉孝亷除郎中郭荷畧陽人以經學徵博士祭酒祈嘉酒泉人徴儒林祭酒北魏李彦狄道人舉秀才歴秦州刺史辛祥狄道人舉秀才官義陽太守辛少雍祥弟薦舉遷給事中辛穆狄道人舉茂才官龍驤將軍宋繇狄道人舉秀才除郎中辛雄狄道人辟户曹㕘軍官至尚書梁祚北地泥陽人辟秘書中散遷秘書令李琰之狄道人舉秀才官侍中北周令狐整敦煌人辟為主簿加盪冦將軍辛慶之狄道人以文學徵官度支尚書辛仲景舉文學對䇿拜司空府主簿隋田仁恭平涼人舉明經官武衛大將軍辛德源狄道人薦累官諮議㕘軍梁毗安定烏氏人舉明經刑部尚書唐段秀實姑臧人舉明經官至司農卿尹思貞天水人春秋髙第為國子大成尹愔思貞子薦授集賢院學士辛秘系出隴西擢明經第官節度使五代王仁裕天水人辟判官累遷户部尚書元髙斌安定人以明經舉授亷訪僉事明張諤蘭州人薦授盧龍知縣趙榮通渭人舉明經歴工部尚書趙玹通渭人舉明經官至苑馬少卿田彬通渭人以經明行修辟官知府李儼伏羌人舉人才山西道御史謝九温伏羌人舉人才任重慶府同知牛叙伏羌人舉人才任崖州知州劉偲平涼人辟經明行修授御史張仲賢平涼人辟孝亷灤州知州段榮鎮原人舉人才任九江府推官羅傑鎮原人保舉擢夀州州判劉仲祥固原人舉人才任無錫知縣韓正隆德人舉人才歴監察御史黄鍾隆德人舉人才授刑科給事中王音真寧人舉人才為夀陽縣丞鮑士𢎞秦州人舉人才授南昌知府門克新禮縣人由薦舉歴擢尚書趙斌徽州人舉人才任京畿御史李銘徽州人以貢薦任御史髙斗南徽州人以薦歴新興知州髙恂斗南子以薦任新興知州周鑑徽州人舉秀才授盩厔知縣馮均臣兩當人由薦授户科給事中楊維新文縣人由保舉授江油知縣趙伏岷州人舉明經任監察御史姚謙岷州人舉明經任刑部郎中劉昌岷州人舉明經任兵科給事中吕賢岷州人舉明經任户部郎中皇清馬一鶚徽州人舉茂才任武隆知縣李兆乾階州人薦授馬湖知府賈還正階州人薦授䕫州道李夢白莊浪衛人薦任徽州知州蘇應麟莊浪衛人薦任臨洮通判郭徵庸徽州人薦授叙州知府馬廷瑜徽州人薦授鹽亭知縣張綸武威人薦任濟寧州知州張玿美武威人薦任惠來知縣進士唐趙彦昭張掖人刑部尚書李揆隴西人尚書左僕射權皋天水人秘書少監李益隴西人禮部尚書皇甫鎛涇州臨涇人侍郎平章事皇甫鏞鎛弟官國子祭酒段平仲武威人諫議大夫權璩秦州畧陽人閬州刺史牛僧孺鶉觚人平章事牛叢僧孺子吏部尚書牛蔚僧孺子尚書右僕射牛徽蔚子刑部侍郎李石隴西人檢校司空李中敏隴西人給事中李讓夷隴西人中書侍郎同平章事李蔚鞏昌人中書門下平章事五代李珽敦煌人諫議大夫李琪敦煌人尚書左僕射宋李仕衡成紀人尚書左丞胡順之臨涇人屯田員外郎郭執中華亭人樞宻承㫖王庶慶陽人經畧宣撫使王公儀長道人中散大夫吳師古徽州人編修曹友聞同慶栗亭人驍騎大將軍金虞仲文武州寜逺人翰林侍講學士裴滿亨河西臨潢人安武軍節度使髙汝礪金城人尚書右丞相傅慎㣲秦州人禮部尚書張邦憲秦州人永固縣令元馬祖常狄道人御史中丞閭仲賢涇州人延安府知府閭卜花涇州人監察御史武紹文伏羌人刑部侍郎王清伏羌人河南僉事武德裕紹文子郎中雒政伏羌人河東㕘議張清伏羌人劍南路僉事王思聰清水人知秦安縣余闕武威人僉都元帥府事明洪武乙丑科曹銘㑹寧人左都御史王恪伏羌人杜銘階州人給事中甲戌科景清真寧人左都御史丁丑科黨理真寧人太僕寺少卿何潤寧州人知府永樂丙戌科韓縉鞏昌人郎中壬辰科何賢狄道人少詹事乙未科徐琦寜夏人兵部尚書曹衡寧夏人知府戊戌科王𢎞河州人知縣朱孟德寧夏人庶吉士辛丑科孔文英安化人侍郎王珏涇州人御史袁錠真寜人知府正統己未科張勛會寧人㕘政李翺隆德人倪讓慶陽人太常寺少卿江滸成縣人知府壬戌科黄諫蘭州人學士王竑河州人尚書李翔隆德人郎中宋儒寧夏人僉事乙丑科馮時寧州人主事景泰辛未科趙銘安化人布政使甲戌科滕佐蘭州人按察使段堅蘭州人知府聊讓蘭州人知府朱紳河州人布政使茂彪慶陽人御史程景雲寜夏人御史天順丁丑科文志正蘭州人郎中段寧平涼人行人庚辰科周鳯狄道人㕘政曹英狄道人李銳涼州人主事甲申科張九疇狄道人梁翰狄道人檢討成化丙戌科羅睿蘭州人僉事劉晟安定人主事王偉寧州人庶吉士己丑科邵宗蘭州人主事張錦岷州人侍郎楊重靈臺人知州趙聰階州人主事壬辰科趙英蘭州人㕘政李寛蘭