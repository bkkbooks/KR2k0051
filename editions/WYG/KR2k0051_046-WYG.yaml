body:
  text: 甘肅通志巻四十六藝文賦漢班彪北征賦余遭世之顛覆兮罹填塞之阨灾舊室滅以丘墟兮曽不得乎少留遂奮袂以北征兮超絶迹而逺遊朝發軔於長都兮夕宿瓠谷之𤣥宫厯雲門而反顧望通天之崇崇乗陵崗以登降息郇邠之邑鄉慕公劉之遺徳及行葦之不傷彼何生之優渥我獨罹此百殃故時㑹之變化兮非天命之靡常登赤須之長坂入義渠之舊城忿戎王之淫狡􅁾宣后之失貞嘉秦昭之討賊赫斯怒以北征紛吾去此舊都兮騑遲遲以厯兹遂舒節以逺逝兮指安定以為期渉長路之緜緜兮逺紆㢠廻以樛流過泥陽而太息兮悲祖廟之不修釋余馬於彭陽兮且弭節而自思日晻晻其將暮兮覩牛羊之下來寤曠怨之傷情兮哀詩人之歎時越安定以容與兮遵長城之漫漫劇蒙公之疲民兮為疆秦乎築怨捨髙亥之切憂兮事蠻敵之遼患不耀徳以綏逺兮顧厚固而繕藩首身分而不寤兮猶數功而辭諐何夫子之妄說兮孰云地脉而生殘登障隧而遥望兮聊須臾以婆娑閔獯鬻之猾夏兮弔尉卬於朝那從聖文之克讓兮不勞師而幣加惠父兄於南越兮黜帝號於尉佗降几杖於藩國兮折吳濞之逆邪惟太宗之蕩蕩兮豈曩秦之所圖隮高平而周覽兮望山谷之嵯峨野蕭條以莽蕩兮逈千里而無家風猋發以飄颻兮谷水漼以揚波飛雲霧之杳杳兮渉積雪之皚皚鴈雝雝以羣翔兮鵾鷄鳴以嚌嚌遊子悲其故鄉兮心愴恨以傷懷撫長而慨息兮泣漣落而霑衣攬余涕以於邑兮哀生民之多故夫何隂曀之不陽兮嗟乆失其平度諒時運之所為兮永伊鬱其誰愬亂曰夫子固窮遊藝文兮樂以忘憂惟聖賢兮逹人從事有儀則兮行止屈申與時息兮君子履信無不居兮雖之蠻貊何憂懼兮晉成公綏黄河賦覽百川之𢎞壯兮莫尚羙於黄河潛崑崙之峻極兮出積石之嵯峨登龍門而南遊兮拂華隂與曲阿凌砥柱而激湍兮踰洛汭而揚波體委蛇於后土兮配靈漢於穹蒼貫中夏之畿甸兮經朔狄之遐荒厯二周之北境兮流三晉之南鄉秦自西而啟壤兮齊據東而畫疆殷徙渉而永固衛遷濟而遂強趙决流而却魏嬴引溝而滅梁思先哲之攸歎何水徳之難量唐李翺釋懐賦讀黨錮傳哀直道之多尤不容作釋懐賦其詞曰懐夫人之鬱鬱兮厯晦蚤而傷離吾心直以無差兮惟上天其能知袤於徳而必好兮忠何尤而甚疑彼陳詞之多人兮故不去衆而訊之進藎言之不信兮退逺去而不獲弗驗實而考省兮固余道之所厄昔師商之親聖兮徳既均而行革惟肝膓之有殊兮守不同其何責願披懐而竭聞兮道既塞而已行路非險而不通兮人忘我而異情王章直而獄死兮李固忠而陷刑自古世之所悲兮矧末俗之衰誠哀貞心之潔白兮疾苖莠之紛生令農夫以手鋤兮反翦去乎嘉莖豈捐􅁾而語之兮詳瞪矒而不肯聼欲釋去而不忍兮終留滯亦何成當晨夕而歩丘兮仰白日而自明處一世之若流兮何乆求而傷情樂此言而自抑兮壯大觀於兢生㧞馨香之茝蘭兮樹蒿蔚以羅列斥通路而使無兮戀棘逕之中絶置春秋而徇心兮羌與此其奚别昔誓辭而約文兮期共死以皆居嗟所守之既異兮乃漫汗而遺初心皓白而不容兮非市直而望利忠不顧兮立忘交不同而行棄悲夫不旬已而必讐兮諒非水火其可畏猥吾行之不然兮直愧心而懼義嘉山松之蒼蒼兮嵗苦寒而亦瘁吾固樂其貞剛兮夫何尤乎小異欲静黙而絶聲兮豈不悼厥初之所志抑此懐而不可兮終永夜以歔欷明薛瑄黄河賦吾觀黄河之渾渾兮乃元氣之萃蒸濬洪源於西極兮注天𣲖於滄瀛貫后土之龎博兮沓𤣥溝之晶明過積石而左轉兮龍門呀而峻傾薄太華而東騖兮撼砥柱之崢嶸入大陸而北徙兮迷不辨夫九河之故形經兩海而紀衆流兮擅浮沉之濯靈覽頽波而懐明徳兮又何莫非姒氏所經營登崑崙而俯視兮固彷彿其初迹馭髙風而騁望兮遂周游其曲直何末流之混濁兮始清澂而湜湜差澹灔而徐趨兮勢沄沄而自得觸險石以鬬􅍊兮詫雷轟而轂擊天宇擴其沆漭兮𣺌上下之蒼黄霧雨霪霪而滃集兮混䆳古之洪荒微風蕩拂而渙散兮天機組織其文章頽猋浩而洶湧兮百怪垂涎而簸揚腥雲濁浪以盪汩兮恍忽顚倒夫舟航靈曜升而赫照兮乗正色於中央望舒在御而下臨兮列宿涵泳其光芒若乃震秉符以行令兮百谷淫淫其凍釋山澤沮洳以上􅂔兮増滉瀁之洋溢魚龍乗濤以變化兮杳莫測其所極祝融載節以南届兮雷雨奮逹以霶霈潢支流而股合兮百川奔而來㑹木輪囷而漂㧞兮蔽雲日而淘汰狂瀾洶而囓岸兮塊土焉塞夫衝潰霜戒嚴而木脫兮少昊執矩以司秋洲渚緬邈而石出兮始殺湍而安流霰雪紛其四集兮顓頊乗坎以奮神大塊噫氣而摩軋兮流澌下而龍鱗層氷横絶而山委兮河伯驅石以梁津羌險夷而明晦兮變朝暮與四時飈風起而衝水兮莽怪駭其難推覩圓方之一氣兮恒來往而宻移昔尼父之嘆逝兮跨百世而罕知顧川流之有本兮與終古以為期啟龍圖而翫六一兮悟主宰之所為喟余心之未純兮感道玅之如斯聊誦言以自明兮庶晝夜之靡虧李夢陽竹石賦有杳者篠叢彼阿徙置得地檽以華托根靈石發生直翕䬃拂樓翠風閣長竿巉巉翼紛若截為䨇簫雛鳯鳴任心吹之靈霧生乗鸞挈友騰煙霧餐霞戲委永無慮中虚允直性介固述征賦仲夏赫炎兮草木畢掲鞿縲赴徴兮夜發梁國抑情順志兮強食自解亂流渡河兮忽焉而寐所以懭恨揮霍兮中情菀而内傷明星散而交加兮翩㝠𡨕吾以行攬衆芳而横涕兮莽皇皇莫知所投曷暾杲杲方上進兮雲披離而蔽之飄風磕而曽波兮湖水擊而震盪慨川廣而難越兮朝余翺翔乎河上既渉衛以奔騖兮又逾淇而渡漳去故鄉以就逺兮霑余襟兮浪浪山峻髙而造天兮又隂晦而多雨觀藴蟲之相搏兮忳於邑汗又交下哀人命之有常兮禍福杳其無門孰非義之可蹈兮焉作忠而顧身余獨怪夫謇博之罹患兮親好修而逄殆箕子狂而悲歌兮彼比干固以菹醢觀前世誰不然兮矧吾懐愆而造尤聊周張以嬋媛兮盖不忍此心之常愁渉湯隂余愴怳兮乃又瞻兹羑里鄂廟屹而傍路兮駟超軼而過止懐誠有離慜兮任道有承尤侍中顚隕兮扁鵲被劉專惟君而遘殃兮眩吾不知其何謂極終古而長憤兮羗炯炯其猶未昧翼綿綿之無聊兮𦕈翩翩莫知所騁憂悄悄之悶瞀兮厯山川余弗省跡有隠而難察兮物有微而先彰負蚊蟁以抗山兮固切人之未量欲結言以自明兮拙而莫之謀也將髙舉以逺羣兮又絆而莫之能也經溝瀆吾不悅兮亦何必為此行也謇相羊以俟至兮莫好修之證也路遼逴之裔裔兮埃風旋而簸揚煙液蒸而練練兮夕吾次於沱陽嶺岪曲以斂容兮原瞹䁆而嵣嵭風草剡而㝠㝠兮狼狸號而夜鳴指黄昏以為期兮􅆖駸駸又夜行曰雷霆不可玩兮孰刑人而不戒悲轅馬之喘嚏兮常十策而九退朝攬木末之清風兮夕瞻明月指列星我既處幽羗誰告兮魂中夜之營營欲展詩以效志兮又恐増愆而倍尤衆聚觀而潛誶兮或掩涕為余乎淹留予朝餐中山之初蕨兮暮挈易之香莽睇北山而不見兮彼南州又邈焉而弗予覩氣怦怦而絓結兮心緯繣而弗怡紛流目以相觀兮見金臺之崔嵬軫雄虹之迅光兮愾烏白與馬角燕昭既劇該輔兮厥躬亡而國削何秦嬴之虎視兮厥二世以不禄固盈虚之環沓兮春秋奄其代續自前代乃已然兮吾又何怨乎人心雜亂反覆豈畢䆒兮由邃古而至今重曰隆隆三伏鑠金石兮如羮如沸行路喙兮道思作誦軫爾𩔖兮南有喬木不可以憇兮念我徂征日顦顇兮含精内蝕世莫可說兮亂曰已矣哉鳯鳥之不時與燕雀𩔖兮横海之鯨固不為螻蟻制兮誠解三面之綱吾寜溘死於道路而不悔兮婁奎朔方風俗賦西夏有元虚居士賢而隠文子偕華先生客夏耳其名以刺謁之欵叙既已文子乃稱曰盖聞過髙唐者必聆清商遊睢渙者必觀藻繢蒙躡蹻海内有年所至處無不習交其賢豪長者因獲周知謡俗矣語云百里不同風千里不同俗君世家於夏且翺翔文學之囿棲遲載籍之林上燭往古下鏡來今其於朔方建置之嶺末洎山川風物畢載於腹敢以為請毋予靳哉居士謖爾興曰僕也恂愗未嘗蘇於故間從長老後而竊聞其槩焉夫草昧方祛睢盱無詔軒唐闡繹上哉夐乎靡得而究已自姬王命使來城嬴氏因河為塞權輿於葩經之脉昭著於太史之載按職方為雍州區攷天官分井桞界甫要服於中華繼編户於炎代啟於青而築於建郡於漢而縣於唐為宋隋之州鎮為偽夏之都邦靣陽明而翼赤縣之衛背隂陸而抵户遂之防右酒泉兮控引左雲谷兮相望徼櫓星繁雉堞雲長勢形繡若天險孔張洵九圍之無匹展四野之獨臧其山則賀蘭擅其竒金積標其勝拓跋之所避暑瞿曇之所演乗綿亘則百舍不止穹崇則萬尋未竟傑壁霞搆攢􅄘鶴立邃壑莽蒼靈岑崱屴根連金母之瑶房椒載上清之玉色干秋雲而叵度礙朝日而行遲􅆐不敢扳鳥不能飛逖而望之訝煉石兮撐碧落就而仰之猶鼇足兮奠四維至若黄草葳焉欲衰黒鷹翛乎將翥伏地飲河狼眠虎踞特秀觜起敦丘𤓰聚登子而流覽無窮訪天都而難覓其處其水則漭漭溔溔汗汗沺沺黒水沃日靈河漲天方其趣乎峽口㵼乎石瀨旁薄驚騰轟豗澎湃山摧嶽舞之勢排江傾海之𣲖及其寓安流没追埼軋盤涌裔咸夷邐迤朔波凌湍虹洞無紀環郛帯郭散漫縈紆枝而為渠瀦而為湖其為渠也溢螮蝀駕螭虬條分縷析曲折周流經城市而脉脉道澮洫而滮滮溉千林之果蓏浸萬頃之塍疇其為湖也萑葦之塲蒹葭之藪皛皛無垠涵藏百有芻牧者馳騖茭藁者奔走其産則湓池神液因風自生調鐺濟味國計芘盈馬芽地掬犛尾沙尋纑旄連丹三幣五金旃裘膠革觔角豫章以全民用作貢尚方土植有山礬江離沙䓤石竹射干彫胡流彞苜蓿淺渚平原菁菁郁郁香有金錢甘有青玉棗實鷄心槐生兎目龍珠稱百果之宗烏稗藴七絶之淑渌池並蒂而荂青門合莖而熟露長苴蓮蔓孳蘡薁來禽種於漢苑馬乳扺於西域薔薇鬱於東山牡丹富於金谷碧梧棲鸞鳯之柯金桃啄鸚鵡之肉薦雕爼於芳筵蒔瓊砌於華屋兼以秋黄之蘓白露之䔩益人之蒜禦饑之葍青稞胡麻薌秔羙菽可釀可炊粒珠顆玉又枸檵成林蘦菖若稼幹不冬彫華不寒謝臾跗咀之療人偓佺煉之羽化至於鱗䖝羽族壙走穴居若圖經之所逸若爾雅之所無指百詘而未盡剡十襲而難書爰耳目之所覩記祗能憶其大都䑕珍貂䶉馬異騊駼觝突羱羜趫㨗尨盧迒足則三窟之兎􅚵跡則九尾之狐麝餐柏而香逺麖戴玉而班殊趨則儦儦行則於於橐駞可服大武善樓既以引重亦以長驅集觀乘雁蜚睹䨇鳬交精屬玉旋目庸渠䎒䎒之翼鷕鷕之雛毿毿之啄鳦鳦之呼黄陵之廟青草之湖頡之頏之以遊以娱丁首莘尾鼓鬐清流躍瀺灂兮為樂齧荇藻兮沋沋問其名兮鰋鯉取不竭兮鮎鯈詹何引兮獨繭漁子泛兮孤舟烟消日出兮欵乃聚緵罟兮渡頭鱠飪紅縷細味與丙穴厹蒸嘗以品賔客用羞其宫室則飛觀基諸元昊臺榭剙自狄公崔嵬千祀故址猶崇且鬱鬱兮仙人之館矗矗兮帝子之宫蘭堂生霧桂榭凌金壇黋朗珠刹玲瓏廊櫩纚纚甍棟隆隆䟽窈窕而沙紫𤨏翕赩而泥彤文櫨華桷玉磶鏤題籠以朱網覆以琉璃照耀星漢揮霍雲霓甲第名園參差城郭户植羽葆門懸鐘鐸金波蕩漾麗景聯絡􅋈畵鷁於圍塘飾翠鷸於簾箔市廛孔道萬落重闉青帘飄雨紅䄛媚人烟花不夜歌管長春陟麗譙而睇盻苐見乎廣厦之􅉿􅉿其人則飛英於國史之著厠名於金櫃之藏傅爕以黄金而取譽傳昭以學府而流芳宇文赫赫於弢畧侯程􅷆􅷆於居喪三史偉於行師三傅神於折訟勛績擅於喬梓功名炳於伯仲稱豹變則韓遊􅅛論汗馬則史敬奉是皆人世之龍塵寰之鳯遐邇景風今古雅重迨我明時譽髦尤衆忠者義者孝者節者有芝英雲氣片藤拱璧者有黼黻河漢隻語千金者有嫻儒雅而師表士林者有持風裁而正色立朝者有倚劒崆峒抑天驕之横者有寜衘刀都市不易慮以生者有蟬蛻􅅽埃而翔區外以舒翼者丱角而茂者雲翔華顚而彦者鱗萃金鼦右蟬纓緌紳珮嚄唶之胄翩翩鈴閣之前偊旅之儒濟濟闕里之内鴻漸肅雍雍之儀虎螭振桓桓之槩冠盖交於道途軒馬塡於闤闠譬猶鐘山之阜泗水之滙累圭璧不為之盈採浮磬不為之匱其俗則四民雜居五技贅聚獿石洒削甄冶古鑄日者星人覡史駔儈與夫俳伶優侏之儕咸旁午而交臂自髙門鼎貴下比齊民靡不羮鮮飲鑿茹毳含醇曼揄被服輕煖綿純當夫春日載陽布榖催種民狎其野耙鋤并用室無懸器田無賸壅新景鬯韶華明錦鈾則有弱冠王孫游閒公子飾冠劍聫裀褥引類呼朋吹竽摶筑走狗鬬鷄六博蹋鞠馳逐於章臺之紅嬉戲於郊圻之緑及序届朱明流金俶甚箑製緗輕筍舒薤錦支公于是乎手談羲皇於是乎髙枕乃有武力鼎士絡駭札桞諸伎畢逞絶倫超醜金注觶浮爭先競首農者戴蒲茆衣襏襫抱桔槹沃阡陌禾黍百里藨蓘矻矻行者出圃草之陂憇灌木之樾來封夷之常羊忘祝融之爍烈疑姗姗於畵圖儼僊僊於閬闕迄夫商吹觱發於林臯霄露厭浥於芊草翹然勁者離披蔚然茂者枯稿萬樹千畦生成垂實翦摘芟穫塲圃狼籍離離穰穰唪唪磑磑於橐於囊盈篝滿槅豨膏棘軸衘尾相屬塞於莊馗輷輷殷殷縱横絡繹已而貢禹舉元英涖塲功竣畚挶偫狐貂成盖藏既則見畜牧被野風騣霧鬛魚目龍文蒲梢汗血蘭筋權竒羣奔互齧抉壑斸山𤣥黄雜遝於是﨣﨣矯矯之士臂夏服手烏號䍒削格載畋獠星流景集飈奮霆擊决眥弇心覆草蔽地寃伏陵窘充牣車騎無飛不有靡走不備伏臘嵗時迎釐賽社人事紛拏莫可覼縷夫夏之黔黎既尠啙窳逋蕩夏之土壤又盡膏腴羙利此所以豐樂甲於關中聲稱浹乎㝢内也文子曰羙哉邊陲若此者罕矣居士曰未也青銅之峽雷斧劈劃斷山為兩衝流激石招提百座森聳乎其上檜栢千章掩映乎其側莎羅之峯嵳峩萬仞三泉地湧渟泓澄潣精爽招徠乎逺近膏澤徧敷於靈蠢西山屹秀翠若薄苔惟絶巚之積雪厯四時而不開即溽暑兮伊鬱常色澤兮皚皚牛首飛霞洞天𢎞敞天下之苾芻蜂合四外之泥絙斗仰其中有龍淵噴玉石罅珠濺若倒囊與傾瓮貫桐枝兮為綫放逺池兮猶沸當祁冬兮可湔及氣肅天髙撼石動地則曰靈武秋聲青蠡入雲素華涵影則曰玉關白雪沙明水映乾坤錦燦則曰羚羊落照踈星的厯乍見乍没則曰石空夜火望之則有即之則無此官橋之竒木也明河在天星斗在地此月湖之殊景也表立則順影堕則逆此浮圖之幻跡也晴日鐘鳴風雨鏞振此沙關之異響也以至靈豨變兮吉善臻神駒刷兮夜光熾元兎進兮飛龍閑金牛現兮白馬寺秋童㒧躅於劉晨安門嫓徳於公藝朱大夫齊名於謫仙程先生等節於孔伋靖王有東平河間之風仇侯有嫖姚車騎之績斯亦殊尤絶軌也寜非世之所稀覿文子嘆曰偉哉不謂西夏有此曹璉朔方形勝賦繄夏州之大郡實陜石之名邦當三邊之屏翰闢千里之封疆廓岡阜而為垣濬川澤而為湟角黿鼉而為道卧螮蝀而為梁帯河渠之重沮奠屯戍之基張墾良田之萬頃撐喬木之千章鹽池滉瀁瀆其隈菊井馥郁馨其傍桑梓相接棟宇相望若率土而論其邊陲則非列郡之所擬方也今焉載瞻其四維也漢隴蟠其西晉洛梗其東北跨沙漠之險南吞巴蜀之雄山奔突而若馳水旋繞如環雍鄺遐郊其坦夷聳孤城之崇窿内則敞街衢兮輻輳紛輿馬兮交通外則經溝塍兮刻鏤畇原隰兮腴豐任土作貢而域雍兮星分井鬼罷侯置守而𨽻靈兮民雜漢戎出河朔山川之外臨藩落境界之中青窺華嶽之隠隠翠挹岷峨之重重遥躋西嶺之屹屹近俯東湖之溶溶營興廣武坊旌効忠壩濵積石關邇臨潼橋横通濟兮接賔之舖連棟園開麗景兮望春之樓凌空澹清潭兮天光雲影翠秀色兮緑水芙蓉赫連春曉兮日烘桃李靈武秋髙兮風墜梧桐殘陽夕照荒坰兮落花啼鳥飛瀑暗懸峭壁兮玉澗垂虹轆轤咿軋兮影落蘆溝之夜月漁歌欵乃兮響窮古渡之秋風於是髙臺日上長塔烟浮晴虹之影乍弄蒲牢之聲初収大河之水未波蠡山之雲不流藹華實之蔽野漫黍稷之盈疇石關雪積兮銀鋪曲徑漢渠春漲兮練拖平丘騏驥如雲兮花馬之池鱒鯽盈肆兮應理之州平羅城兮執訊獲醜鳴沙州兮落鴈浮鷗城傾黒水兮頽雉殘堞津問黄沙兮短櫂輕舟神槎湮兮猶存博望之跡石硤鑿兮尚傳大禹之游髙塜巍峩兮元昊之䰟已冷古刹煨燼兮文殊之像常留表賀獻俘而忠貫日月兮唐將之精靈耿耿書抗偽號而名重丘山兮宋賢之遺韻悠悠此名天下播海陬而為西夏之勝槩可與江南之匹儔者然猶未也若乃考其四時也春則杏塢桃蹊霞鮮霧靄秋則鶴汀鳬渚月朗風微夏則蓮濯碧沼之金波嬌如太液池邊之姬媵冬則柏傲賀蘭之暗雪癯若首陽山下之夷齊與夫觀鷹鸇之雄度則凛凛乎周家之尚父也覩芝蘭之葱蒨則奕奕乎謝庭之子侄也對松竹之森立則挺挺乎汲黯之剛直也翫鷗鷺之瑩潔則皎皎乎楊震之清白也以至芳林鶯語桞榭蟬聲又有若回琴㸃瑟之立夫孔楹也此皆翫耳目娱心志而為西夏之羙觀不減江南之佳致者是使騷人墨客碩士英賢尋幽覽勝游樂流連於以羅珍饌列綺筵飛羽觴奏管絃品題詞藻繡句錦篇觥籌交錯屢舞僊僊撫乾坤之坱圠掃亭障之烽烟詢古今於故老稽成敗於遺編方其王命南仲往城於方此何時乎迨漢郭璜繕城置驛浚渠溉田省費萬計盖一盛也整居焦濩侵鎬及方此何時乎迨唐李聽興仆舉廢復田省餉人賴其利又一盛也嗟夫時有盛衰治有隆替天道循環斯亦何泥方今聖主啓運應符丕建人極重熈皇圖混車書於六合覃㤙威於九區登斯民於懐葛躋斯世於唐虞矧兹夏州超軼往古詩禮彬彬衣冠楚楚建學立師修文偃武尚陶匏貴簪組祛異端禦狎侮抑工商之浮華敦士農之寒苦沙漠塵空閭閻安堵白叟黄童謳歌鼓舞熊羆奮勇於陣行麋鹿潛行於巢所弓矢藏於服韔干戈戢於庫府而况䕃土封者惟徳惟義逺超樂善之東平握將柄者有嚴有翼端繼為憲之吉甫予也一介之書生敢擬韓范之參伍聊泚筆而紀行議者幸勿謂其狂魯黄諫崑崙山賦瞻彼西域猗歟崑崙擘地勢以特起指太清而髙蹲控玉門以設險湧朝宗之河源其方也里八百而可考其髙也數萬仞而堪論大鵬之翼髙舉而莫及都盧之足善縁而難升其隂則堅氷厚凝鏡見人形風氣凛冽寒不可勝其陽則瀑布飛流聲震雷霆羣猿下飲接臂流肱至若瑶池之水􅉿􅉿瀰瀰有龜六足有鼈三趾遊魚吹波超羣鷗起𤣥圃之中廣輪莫擬藥闌花檻布縠散綺離婁之明殆不能視𨽻首之數亦不可記木則琪玕參差文玉森然琅玕子實如玉且圓豫章松檜楓梧楩柟山柿女桑木犀秋香冬青萬年蓊䖇蘙薈亘地連天草則朱英玉芝幽蘭芳蕙枸把根靈薇菜可茹叢卉灌芳阜滋蕃庶其禽則女牀之鸞蹁躚丹穴之鳯翔翥鸑鷟䨇飛鷫鷞羣舞啣木精衛能語鸚鵡散則霞開止則雲聚自相喧䀨各得其所獸則狒狒見人而嘆猩猩披髮而言犛牛體重騉䮊輕儇元豹霧隐文虎畫眠貔貅獅兕麋鹿塵麂熊羆狡猊狐貂豵豣其所孔有不可殫焉或遥渉乎蒸霞之水或弄影於閬風之顛或羣或友儦儦俟俟於種玉之田何竒不有何異不儲乃上帝之下都豈常人之所居軒轅之宫王母之室碧瓦鱗比青𤨏櫛宻畵棟飛虹朱簾炫日髙閣千尋長廊萬丈赭堊丹青雜以金碧適中乎文質乃輝耀於今昔是以仙鄉留舄之軰緱山吹笙之徒崆峒之老蓬萊之流莫不駕雲輿而是趨於是王母開筵侍以麻姑宓妃鼓瑟雙成吹竽瓊漿玉液盛饌佳蔬蟠桃異果苾芬芳敷延周穆於瑶席之上邀漢武於囘丘之隅𤣥㝠滌器溽収司壺少皥行令太白操觚勸酬之禮既畢羲和趨御而日色已晡豈特産竒瑰之物招遊燕之娛而已哉爾乃質凝重厚氣鍾淳粹靜而有常類仁者之夀動以致用方君子之不器雲從而起雨從而致休徴以時而若於焉而發生乎萬類也㳟惟聖明一統區宇極地際天咸施㤙惠海瀆嶽鎮各有典制視伯視公皆以次第咸秩無文名山以祭兹山也同海嶽而效靈故其功鉅而不細是以篤生賢良而非止於一才一藝乃拜手稽首而作頌曰大哉聖人之御世也旰亦未食宵亦未寢也治人禮神各盡其義也山嶽效靈而人才軰出薄海内外而皆享雍熈之盛治也論漢後漢書西域傳論西域風土之載前古未聞也漢世張騫懐致逺之畧班超奮封侯之志終能立功西遐羈服外域自兵威之所肅服財賂之所懐誘莫不獻方竒納愛質露頂肘行東向而朝天子故設戊巳之官分任其事建都䕶之帥總領其權先馴則賞金而賜龜綬後服則繫頭顙而釁北闕立屯田於膏腴之野列郵置於要害之路馳命走驛不絶於時月商胡販客日欵於塞下其後甘英乃抵條支而厯安息臨西海以望大秦距玉門陽關者四萬餘里靡不周盡焉若其境俗性習之優薄産載物類之區品川河嶺障之基源氣節凉暑之通隔梯山棧谷繩行沙度之道身熱首痛風災鬼難之域莫不備寫情形審求根實至於佛道神化興自身毒而二漢方志莫有稱焉張騫但著地多暑濕乘象而戰班勇雖列其奉浮圖不殺伐而精文善法導達之功靡所傳述余聞之後說也其國則殷乎中土玉燭和氣靈聖之所降集賢懿之所挺生神跡詭怪則理絶人區感騐明顯則事出天外而騫超無聞者豈其道閉往運數開叔葉乎不然何誣異之甚也漢自楚英始盛齋戒之祀桓帝又修華盖之飾將微義未譯而但神明之邪詳其清心釋累之訓空有兼遣之宗道書之流也且好仁惡殺蠲敝崇善所以賢達君子多愛其法焉然好大不經竒譎無己雖鄒衍談天之辯莊周蝸角之論尚未足以槩其萬一又精靈起滅因報相尋若曉而昧者故通人多惑焉盖導俗無方適物異㑹取諸同歸措夫疑說則大道通矣隋皇甫謐𤣥守論或謂謐曰富貴人之所欲貧賤人之所惡何敢委形待于窮而不振乎且道之所貴者理世也人之所羙者及時也先生年邁齒變饑寒不贍轉死溝壑其誰知乎謐曰人之所至惜者命也道之所必全者形也性形所不可犯者疾病也若擾全道以損性命安得去貧賤存所欲哉吾聞食人之禄者懐人之憂形強猶不堪况吾之弱疾乎且貧者士之常賤者道之實處常得實沒齒不憂孰與富貴擾神耗精者乎又生為人所不知死為人所不惜至矣喑聾之徒天下之有道者也夫一人死而天下號者以為損也一人生而四海笑者以為益也然則號笑非益死損生也是以至道不損至徳不益何哉體足也如㢠廻天下之念以追損生之禍運四海之心以廣非益之病豈道徳之至乎夫惟無損則至堅矣夫惟無益則至厚矣堅故終不損厚故終不薄茍能體堅厚之實居不薄之眞立乎損益之外游乎形骸之表則我道全矣宋張方平屯田論臣聞古者師役不逾時無逺征乆戍之勞宿軍轉餽之費故在三代無屯田之事及秦漢務恢封畧疲敝中夏外事邊疆魏氏之後吳蜀鼎立永嘉東徙遂成南北天下割解更相鄙薄分疆占域各分戍守力穡之夫鮮披甲之士衆曠日持乆兵勢未解而屯田之利惠興矣漢昭始調戰射士設屯於張掖充國後擊先零羗留佃于浩亹魏武之經畧四方取濟許潁之積普氏之南征吳㑹仰給江淮之儲唐太宗既定天下思欲散兵權省國用遂因隋制相要衝以設府計隙地而置屯三時務農一時講武居則有扞城之庸而廪食自足動則備調發之籍而戌事無廢及明皇恃海宇之泰寜承國力之全盛府兵耗散田萊不墾後又停折衝府立武士帳於是乎罷丁兵而有正兵矣寵將驕卒坐而蠧食帑庾虚竭財用不贍而商利侵刻之臣百方誅取生人困瘁漸至危亂范陽搆禍日尋干戈代宗徳宗專用姑息自諸方嶽之任徒兼營田之名荷㦸之夫箕踞待哺至憲宗時有司上元和國計簿校天下兵農之數率以兩户而資兵卒人力凋敝可舉而知天下兵農之業遂離而不復焉今國家之務莫大於飬兵四聖同仁㳟儉愼徳靡遊于逸于觀于畋念四方惟正之供憫小人作業之勞節愛惟微嗇用罔小然出納之吝在乎有司刻斂勾収錙毫圭撮天地所産山海之富動植之物悉筦于官婦織不裳夫耕不食黎民力盡寒暑不息以供軍士衣稍匪頒之費汲汲乎其不能足也伏見議者有獻屯田之策雖未能該盡乎體要顯辨其利跡而或者猥為異說破其端緒臣輙為之揚㩁以申其論或者曰盖聚衆邊境戰守相持留則芻糧不足解則㓂患未息故且耕且守而後有屯田之事未聞平時興屯於内地也臣應之曰昔棗祇建安之跡邇布都畿鄧艾正始之謀近縁陳項普荀羡興石鼈之利分界東陽齊嵇華置懐義之屯乃在河内唐氏府兵就田天下相望後上元中因洪澤芍陂之饒大資國用我朝自唐汝河朔之郡皆有田務此固不待邊境而後有屯田也今淮陽許昌汝南之域人希土曠地力不盡宻接京輔便於漕發雖内師禁旅更出就食往復浹日不廢衞䕶又東平鉅野至于彭城率多閒田民力不贍决河之所墳淤皆為沃野嵗所収入東自濟汶漕而北洄可至河北東境西入廣利渠可至太倉曹南陶丘可為廩積置戍之地無便于此江淮之境人稠地狹田無體易何以布屯且國家嵗漕東南之粟度其復制費已兼倍此為謀之迂也或者曰唐氏之前兵民同業本調取于農坂故可任於農事今之軍士皆市井桀猾去本惰游之民至於無所容然後入于軍籍且其驕也乆矣呴濡保息莫敢拂其心者是可使之寒耕暑耘者乎臣應之曰昔之為屯田者多在師旅之中解甲胄而執耒耜釋耒耜而執干戈出死入勞莫之憾也惟所御用之而已又况四方無事邊疆無役衣食足而起居時安室家而守妻子使趨南畆各食其力又何嫌焉盖智者謀始因勢推移使勢濟而衆安在資權而成務臣雖不敏請試效愚盖漢氏之屯田也發弛刑焉曹氏之屯田也募百姓焉普氏之屯田也置營卒焉後魏之屯田也借民力焉唐氏之屯田也以府兵焉或兵或民惟所用者今天下浮户依強家而為佃客者取分末之利大半輸主率由無以自業也儻優制招來豔之以利寛其賦入復其它徭則願屯之夫襁負而至矣為置典農之官專司力穡之事功勞報賞為法必信因使冬隙簡其強銳教之角射賞其精力古者因農事而寄軍令盖此之謂此是募屯田夫得屯田兵也居則稼穡之人用則戰騎之士不衣庫帛不食廩榖是驕卒可放省屯倉可待盈雖有凶荒水旱之變而軍不乏乎儲峙民不増乎横賦建屯之利其亦溥矣謹論蘓轍隗囂論隗囂初據隴坻謙㳟下士豪傑歸之刑政修舉兵甲富盛一時竊據之雄有賢將之風矣然聖公乗王莽之敗擁衆入關君臣貪暴不改盗賊之舊敗亡之勢而囂舉大兵束手稱臣違方望之言陷諸父于死地僅以身免及光武自河北入洛政修民附賢士滿朝羣盗十去六七而囂忽既往之禍方擁兵自固為六國之計謀臣去之義士笑之而囂與王元王㨗一二人以死守之始從聖公而不疑終背光武而不悔去就之義無一得者至於殺身亡國盖不足怪也明趙時春馬政論天有天駟天子有牧僕之職自軒轅以來墳典經史不絶書逮周始詳穆王征西戎責以不享在今平凉之域而八駿皆是物也孝王命秦非飬馬汧渭大蕃息宣王中興比物閑則北至太原南平荆蠻大蒐鄭圃皆以車馬之盛為言秦烏蠃谷量牛馬即烏氏人而漢文景時阡陌成羣六郡良家馳射是利馬援之邊郡田牧數年得畜産數萬唐人養馬亦于涇渭近及同華置八坊其地止千二百三十頃樹苜蓿茼麥用牧奚三千官寮無幾衣食皮毛是資不取諸官盖合牧而散畜之牧專其事不雜以耕而太僕張萬嵗王毛仲官職雖尊身本帝圉生長北方貫厯牧事躬馳撫閱無㸃集追呼之擾科索之煩順天因地馬畜滋殖萬嵗至七十萬六千毛仲至六十萬五千六百有竒色别為羣號稱雲錦地狹不容増置河西史贊其盛圖傳至今夫豈有它術哉法簡而專誠而不二故也元宗既以嫌誅毛仲後遂以付安禄山禄山統北方三道又使兼掌京西牧馬地既隔越而職守難專重以匃胡叛逆覆用蹂踐唐室其餘存者猶足以資肅宗之中興憲宗命張茂宗監牧茂宗不能逺畧乃籍􅊈隴民田人争言其不便牧事遂廢唐亦䘮亂由此言之人事得失馬政盛衰益昭然矣自宋以來馬藏民間涇原為邊重鎭日不暇給然頗貿易蕃馬以給戰士金元悉從民牧兵興隨宜取用官亦無事皇朝逺稽周唐大振馬政自大將軍得李思齊李茂之騎繼破王保保擄馬駝雜畜數十萬御史大夫丁玉凉公藍玉四征西番部族悉服乃製金牌合符番人以馬充差朝廷以茶為賚體統正而名義嚴馬日蕃庻始置苑馬寺聫以監苑廵以御史日乆法弛𢎞治末年遂命都御史楊公一清董治之公振肅紀綱増置官屬蒐括墾田益市民馬一時觀羙然三年二駒其計利深矣數年之後所利不補所費何哉豈非官多牧擾法煩弊生縉紳衣錦難禦邊塞之風霜而肩輿騶從㸃集追呼非孕字重累之所能堪乎且牧地十七萬七千餘頃飬馬一萬四千餘匹牧軍才三千三百餘人田重牧輕皮肉収銀三兩有竒公用銀三千餘兩責之三千三百餘人物輕輸重毎嵗各各入賀督監參謁不絶遷代嵗月繁促南北習俗異宜道路往來勞費牧人之不支如此州縣地不踰二萬頃為糧站徭二十餘萬輕重之相懸如彼嘉靖三十七年平凉通判嘉定陳應詳舉籍平固以北皆為牧地民村落室廬皆度為牧代之飬馬償駒遂號二稅按制先定州縣田稅後以隙地為牧本自相間安得齊一應詳務虚名而民重被病牧既少獲種馬日削責民市馬吏縁為奸民不堪命矣世之君子其思有以善後哉今粗舉其大端云議漢虞詡凉州不可棄議竊聞公卿定策當棄凉州求之愚心未見其便先帝開拓土宇劬勞後定而今憚小費舉而棄之凉州既棄即以三輔為塞三輔為塞則園陵單外此不可之甚者也喭曰關西出將關東出相觀其習兵壯勇實過餘州今羗胡所以不敢入據三輔為心腹之害者以凉州在後故也其土人所以摧鋒執銳無反顧之心者為臣屬於漢故也若棄其境域徙其人庶安土重遷必生異志如使豪雄相聚席巻而東雖賁育為卒太公為將猶恐不足當禦議者喻以補衣猶有所完詡恐其疽食侵滛而無限極棄之非計宋鄭文寳城古威州議威州在清逺軍西北八十里樂山之西唐大中時靈武朱叔明収長樂州邠寜張君緒収六關即其地也故壘未圯水甘土沃有良木薪桔之利約葫盧臨洮二河壓明沙蕭關兩戍東控五原北固峽口足以襟帯西凉咽喉靈武城之便然環州至伯魚伯魚扺青岡青岡距清逺皆兩舍而清逺當羣山之口扼塞門之要芻車野宿行旅頓絶威州隔城東隅堅石盤互不可浚池地中舊乏井脉又飛鳥泉去城尚千餘歩一旦縁邊警急賊引平夏勝兵三千據清逺之衝乗髙守險數百人守環州甜水谷獨家原傳箭野貍十族脇從山中熟户党項孰敢不從又分千騎守磧北清逺軍之口即自環至靈七百里之地非國家所有豈威州可禦哉請先建伯魚青岡清逺三城為頓師歸重之地古人有言金城湯池非粟不能守俟二年間秦民息肩臣請建營田積粟實邊之策修五原故城專三池鹽利以金帛啖党項酋豪子弟使為朝廷用不惟安朔方制豎子至于經營安西綏復河湟此其漸也明徐貞明西北水利議夫雨暘在天而時其蓄洩以待旱潦者人也廼西北之地旱則赤地千里潦則洪流萬頃惟寄命于天以幸其雨暘時若庻幾樂嵗無饑耳此可以常恃哉惟水利興而後旱潦有備其利一也神京北鞏財賦取給於東南忠於謀國者鏡勝國之往事懐把人之隠憂尚有出於河流外者惟興水利而西北儲蓄近取常裕視東南為外府可也中人之治生必有附居常稔之田始可安土而無飢廼國家處全盛之勢據上游以控六合獨待哺於東南近廢可耕之田逺資難繼之餉豈計之全哉今運早而積乆儲蓄信有頼矣然運蚤而収之不及其熟有浥損之患積乆而散之恒過其期有紅腐之憂水利既興則田疇之間要皆倉庾之積其利一也東南轉輸毎以數石而致一石民力竭矣而國計所頼欲暫紓之未能也惟西北有一石之入則東南省數石之輸所入漸富則所省漸多先則改折之法可行乆則蠲租之詔可下東南民力庻幾獲甦其利一也今西北之地平原千里㓂騎得以長驅若使溝澮盡舉則田野之間皆金湯之險而田間植以榆桞棗栗既資民用又可以設伏而避敵其利一也往者劉六劉七之變持竿一呼從者數萬則游惰歸之也盖業農者縻其田里惟遊惰之民輕去鄉土而易於為亂今西北之境土曠民遊識者常惴惴焉誠使水利興則曠土可墾而遊民有所歸消釁弭亂深且逺矣其利一也東南之境生齒日繁地苦不勝其民而民皆不安其土廼西北蓬蒿之野常疾耕而不能徧蘇子謂聚則争于不足之中散則棄于有餘之外其不均固如此也今若招撫南人修水利以耕西北之田則民均而田亦均矣其利一也東南多漏役之民而西北罹重繇之苦則以南之賦繁而役減北之賦省而繇重也使田墾而民聚民聚則賦増而北繇可輕其利一也沿邊諸境有轉輸不能至者招商以代輸盖有數頃之田困於一商遂棄業以他徙其有曲避轉輸之苦者則私以折色兌軍商得茍安軍無宿儲即承平勿論設有􅇏警何以待之惟近邊田墾轉輸不煩其利一也屯田之成熟者多屬隠占乆則難稽矣然亦不必稽也西北非無田之為患而不墾之為患彼既墾而熟矣何必歸官始為國家之利哉惟自其荒蕪不理者召募墾之則新屯固種種也兵之壯悍者既心耻於負鋤而其羸弱者又力疲于荷戈驅兵為農勢固難行惟募之為農而簡之為兵則心安而力奮屯政無不舉矣今天下浮户依富家以為佃客者何限募而集之可立致也募農以修水利修水利以舉屯政其利一也昔之有志者嘗欲倣井田之遺意授民之産而惜其時之不可痛豪傑之兼并限民之田而恨其勢之難行今若於西北空閒之地修舉水利則倣古井田亦可也限民名田亦可也古者飬民之政以漸可舉其利一也古者以井畫地度地居民比閭族黨井自為界民不可多得尺寸之地而地亦不可多得一介之民民與地適相均也今通都大邑之民踵接肩摩而爭繁習靡多梗化而敗俗其爭少習朴者惟寥廓之鄉為然今若畫井居民裒益其多寡使民與地均如古比閭族黨之意則教化可興而俗尚自羙其利一也嗟乎水在天壤間本以利人非以害之也惟不利斯為害矣人實貽之而咎水可乎盖聚之則害而散之則利棄之則害而用之則利如血之在人身流貫于肢節而潤澤其肌膚一有壅注則上而為癰下而為痔又或溢出於口鼻而因以􅆷其軀遂曰血之於人害也亦舛矣今之咎水之害者即山川之委原未悉胡不引人身觀之也古昔盛時列國分布畫井而田甽逹于溝溝達于洫洫達于澮澮達于川縱横因其地勢以取利于水今西北皆其故疆也豈古以為利而今以為害乎且東南之民爭涓流于尺寸之間何者彼固利之也謂水利於南而獨為北害此必無之理也南方之民披簔而耕抱濕而穫盖恒與雨相値也長夏苗將立槁則訟風伯而祝雨師盻盻焉以一沾濡為快廼西北之雨多于長夏而耕穫之時少雨其易于南天時則然也西北地曠而水平稍一疏引水即為利東南之地髙下相懸有轉水於數仞之深者再日不雨則桔橰之聲徹于郊原竭人力以資灌溉苦且難地勢使然也考之古昔甽深尺許遂深二尺溝深四尺洫深八尺澮深二仞而已未有如東南轉水於數仞之深者至如京東山之湧泉溢地而出河之支流等地而平其于西北尤為易易也西北在三代盛時溝洫時修農功畢舉厥後魏史起引漳水溉鄴鄴以富秦開鄭國渠溉舄鹵之地四萬餘頃關中為沃野秦以富強至漢文翁溉灌繁田千七百頃而蜀饒白公穿渠引涇水溉田四千五百餘頃而民以饒富馬援引洮水種秔稲而狄道並塞之民得以樂業虞詡復三郡激河浚渠為屯田而省内郡之費盖三代之時溝洫遍于列國水之為利也𢎞魏秦國擅其利文翁以下諸子人興其利水之為利也專然皆在西北之境若東南稱水利者在漢以前惟馬臻開鑑湖而已他未有聞也及漢後之亂中原生齒漸耗從普室而東徙者謂之僑人乆則安其土而樂其生西北民散而東南利興非細故也即如東南之饒三吳稱最在禹貢揚州之域厥土塗泥厥田下下而已漢之時亦一澤國耳惟普室既東民日聚而利漸興然其財賦亦未至于今日之盛也至五代時錢鏐竊據以稱饒及南宋偏安以致富則民益聚利益興而財賦遂甲於天下矣嘗考宋紹興五年屯田郎中樊賔言荆湖江南與兩浙膏腴之田彌亘數千里無人可耕則地有遺利中原士民扶攜南渡幾千萬人則人有餘力若使流寓失業之人盡田荒閒不耕之田則地無遺利人無遺力以資中興由此觀之則宋室方南之時東南尚有曠棄之地及其季年人多而田少豪右擅陂湖以自殖地利盡而民不聊生者聚故也東南地利盡而西北曠廢厥有由哉盖勸農而興水利牧養斯民之首務也今若另設勸農而水利又有專職則若於牧飬斯民之外増勸農水利一事彼之號為牧飬斯民者又將何為耶今之開府持節與藩臬守令皆以牧養斯民也勸農水利責將誰諉惟於開府持節者得人以擇藩臬以擇守令乆任而責成之殿最繫焉利興而民不知者可坐而致也世之言費者吾惑焉夫捐數萬金之費於春而収數萬石之穫於秋費於帑而償于田此庸人操十一之利者尚甘心焉曽謂善於謀國者而顧以費為憚乎且始為而穫繼是有興即以所穫者為資漸而廣焉不煩再費也北之治田也逸南之治田也勞彼其以惰心而乗之以逸習卒而驅之宜有未從者然彼之鹵莽而耕亦鹵莽而穫所入固微也以南之勞治北之田則一畝之入倍於數畝而旱澇可以無憂誠一驅之其嗜利之心必潛易其好逸之習且相率而為逸者以其習之故然比閭族黨皆然也官為倡率有能爭先力田者稍優異之則皆耻于逸而趨于勞矣昔張全義起于羣盗其尹河南也當䘮亂之後白骨蔽地荆棘彌望居民不滿百户全義擇人以修屯政招徠農户流民漸歸逺近趨之如市全義為政寛簡出見田疇羙者輒下馬與僚佐共觀之召田主勞以酒食有蠶麥善収者或親至其家悉呼出老㓜賜以茶綵衣物民間言張公不喜聲伎見之未嘗笑獨見佳麥良蠶則笑耳有田荒蕪者則集衆杖之或訴以乏人牛則召鄰里責之曰彼乏人牛何不助之由是鄰里相助比户有積蓄在洛四十年遂成富庻盖其勸農力本生聚教誨變荒墟為富壤非偶然也誠使西北牧飬斯民者能以全義之心為心未有狃於故習而不變者不一倡率而遂曰習之難變可乎邊地屯田以餉軍也其道有三倡力耕之機定賞功之典廣世職之法而已内地墾田以阜民也其道有三優復業之人立力田之科開贖罪之條而已盖大將固偏裨卒伍所望而趨也今諸邊沃土多大將飬㢘之地使大將肯以其地畫井以田以率偏裨卒伍無不響應而競耕者昔郭子儀因河中軍嘗乏食廼自耕一畝將校以是為差於是士卒皆不勸而耕是嵗河中野無曠土軍有餘糧昔宋廖給事中剛亦嘗首陳是說也將卒捐生而赴敵者冀以功而獲賞也今若計田行賞又如廖給事所謂執耒之安方之操戈之危豈不特易此賞一行萬頃不難得者信然矣今富民得納貲以列武弁職冗而軍政無裨也若倣虞文靖公之意聼富民欲得官者能以萬夫耕則為萬夫之長千夫百夫亦如之先試以虚衘緩其征科俟其田入既饒積蓄漸充則命以官而量征其稅就所征者給以禄佩之印綬得世其官練集其耕夫以寓兵於其間眞良法也民之流離棄其業而畏不敢復盖瘡痍未起科督又嚴甚則舉其宿負者而取盈焉此宜上有以招徠之蠲其負寛其征時其賑貸則流離競復荒蕪漸墾矣漢之盛時孝悌力田同科盖務本重農以寓勸率之微權也今若定為之制有能於荒蕪之鄉墾田而井者田得自業而輸其稅於官官因稅而稽田因田而定等上者如納粟待銓次者遥授散職又其次者補胥吏而役于官則力田者競起矣贖罪有條借貪墨以行私者何限也使令罪而有力者捐貲墾田官課其墾田之費與贖罪相當則歸其田而収其稅即無力宜近配者亦得近屬于田畆之間以力墾田而贖其罪此屯法行而人亦樂從也倘舉數者而行之屯田可興墾田可多又何必費出公帑而後煩募民哉國家分兵而屯授之以田統於衛所之官法非不詳然乆則田隠占而屯亦漸廢盖田授于官兵非己業也惟富民得官屯駐則其田固己業子孫相承稽覈自詳無隐占之患盖井田而寓封建之意也夫富民捐己之貲闢荒區以輸稅飬耕夫以寓兵其利于國者多矣就其所入給以禄朝廷御之以虚名使之世其職而守其業有増課之饒無飬兵之費又何靳而不與乎彼即汗馬之勲者禄入兵費皆仰給於縣官嵗糜而無補安可以此例論也今民間子弟入胄監者例得輸三百五十金若使力田者於荒蕪之野墾田三百五十畆得比輸三百五十金者而同科則國家一時雖未得三百五十金之入而嵗収三百五十畆之稅嵗嵗積之其得更倍諺謂千鏹而家藏不若銖兩而時入此尤易曉也田少而殺與贖罪而入者即是可推也若恐力田可同于輸金則必有偽増田畝以欺上或始而墾旋而廢難以一一稽之則又不然夫民間始繫名于胄監距其入銓得官之時多者三十年少亦不下二十年所墾之田嵗入官稅總而計之當不止于三百五十金彼既墾田嵗以其田之入而輸官不難也亦何樂於偽田増稅嵗以厲已乎即有田偽而稅負者有司將時稽而除其名彼亦何利焉行之積乆田闢而稅廣費省而用足則力田之科與輸金者皆可漸罷又不必商盈詘于財賄酌多寡于開納也張鍊鹽法議夫食鹽山澤自然之利天地所以養民也上古無征近古薄征以佐國用要在先不病民而後利國為可貴耳關中食鹽一出於河東一出于花馬池一出於靈州一出於西漳靈州西漳去三輔絶逺專供靈夏洮岷西北兵民之用無容議矣花馬池鹽北供延慶平三府寜榆二鎮南與河東鹽並行於三輔閒河東鹽上下公用謂之官鹽花馬池鹽私自貿易謂之私鹽民間便於私鹽而不便於官鹽者百年於兹矣必欲行河東官鹽其弊有四盖行鹽郡縣各有分界所司徒知紙上陳跡河東鹽行三省不可越縮若䆒其實在山西河南未知何如其在關中自長安以西河東羙鹽絶跡不至間有至者皆泥滓苦惡中人不以入口惟耕夫寡婦黽勉食之計其所售無幾也名雖謂行其實未嘗行之一也往年商人慮惡鹽不售告發郡縣使所在輦運外加様鹽包封印記之及以給民封者自佳輦者自惡唱户分鹽畏如飲鴆計帳徴價峻於正稅今雖暫止既為故事恐不能已二也商人賣鹽與販夫隨以小票鹽盡票不収毁官鹽不至西路則無票無票則通責店肆負販細人請東路自買未毁之票繳官公人亦幸免責不問由來互相欺抵三也買票日乆奸人依式私製盗賣僥倖者冐利敗露者破家雖有防禦迄今未已四也必欲禁花馬池私鹽其弊有五關中民貧衣食驅遣賦稅催切罄家所有走北地販鹽冀牟斗升之利一為公人所獲則身入䧟阱家計盡空一也貧人既為囚縶内無供餽冬月多斃于獄考驛遞囚帳鹽徒居半死者又居強半民命可恤二也小販懼捕結聚大夥經山谿要隘偶遇公人勢強則抵敵勢弱則冐險奔迸投崖落澗人畜死傷塗地三也公人與有力慣販者交關終嵗不捕反為導䕶惟單弱貧瘠者捕之或以升斗惡鹽強入路人筐袋執以報功使無辜受害四也衆役工食悉有定例惟廵捕工食私幇公費嵗増十倍官吏比銷徒御勞悴動經時月候文曠職旅食空囊或罰或貸俱為無補五也夫物力不齊物之情也好羙惡惡趨利就便民之情也所欲與聚所惡勿施裒多益寡因俗成務司國計者之情也以物力言河東舊商帶支坐困新商起納無幾澆晒徒勞増課未減公私俱稱歉矣河東一池雖差大供三省則不足花馬二池雖差小供三郡二鎮則有餘自然之勢也以人情言河東鹽百方督之使行至以泥沙勒售假票甘罪而終不能行花馬池鹽百方禁之使不得行至于比屋破産接踵喪生而終不能禁者民之大欲大惡不可強也以國計言河東嵗課一十九萬有竒花馬二池嵗課不盈數千河東鹽一引三錢有竒二池鹽一石六分有竒如是相懸者意河東與天下六運自祖宗朝俱有定額由來乆逺二池廹近塞垣棄取不時故課亦微𣺌後來因循取足原辦而止耳夫河東鹽既不能及逺二池鹽卒不能禁民間又不可一日無鹽而盗買盗賣終非常理今當直開二池鹽禁使西鳯漢中沛然通行計三府所當常食河東鹽一十二萬有竒嵗課即照河東責三府代辦以其事權統歸河東廵鹽御史則逹觀無異督禁有程兩地嵗徴四鎭年例保無纖爽而關中可少事矣夫居害者擇其寡興利者取其多儻今不弛二池鹽禁則愚民被逮供餽為費罪贖為費奸人騙詐為費兵民嵗増工食為費官吏比銷為費一切顯隠猥雜不可㑹計財足抵河東花馬二池正課出于千瘡百痛徒然費之而下殘民命上損國體又餘殃也儻今一弛二池之禁則愚民被逮供餽可省罪贖可省奸人騙詐可省嵗増工食可省官吏比銷可省一切顯隠猥雜不可㑹計財足抵河東花馬二池正課出于不識不知漠然省之而下活民命上全國體又餘福也夫人情不甚相逺比聞鹽法侍御皆一時英碩表表長者使其聞見悉如關中人習知利病則亦何憚而不為良處哉但其受命而來也惟以行官鹽禁私鹽為職而反是則駭矣地非素履事未前聞雖聖人有所不知者何可遽望改易其常耶雖然安國家利百姓大夫出疆義也究理從長議政從便人心不昧因革有時此又關斯民之幸不幸也張練屯田議自古英賢之君竒智之士當諸侯割據華夏分爭之代以師行而糧從餽運不繼相其臨戎廣野使戍卒耕稼其間耕而有獲以十一二輸官以十八九自贍由來以為良法羙意者屯田是也趙充國以二羗反叛廣田金城期年之間使先零坐斃曹操以征伐四方屯田許下墾荒積榖無逺運之勞諸葛亮與魏將嚴拒乃從容渭濵分兵屯田司馬懿畏而欲避鄧艾與吳為隣開河渠溉田通于江淮大為伐吳之資嗣是厯世因之其法寖備其利寖􅄎於今強敵陸梁非兵無以禦敵非糧無以飬兵百計集兵千方足食而獨不及屯田者何也我太祖體國經野屯田遍天下而西北邊最多開屯之例軍以十分為率以七分守城三分屯種墾田之令邊方閑田許軍民開種永不起科限畆輸租者為額内之田不起科者為額外之田然法乆弊生弊乆法盡瘠田荒蕪不治腴田為豪強兼并為官校侵奪為巧慧移丘易畝汩没于田混亂于籍征輸徒有其名芻粟不為國用至于招商開中責令募兵墾田保伍屯聚視功力給牒予鹽酬值初時上下同利今復為敝商蠱壊泥而不行然經界在田中開列在紙上非髙逺難行之事無幽隠不可究之理但求憂國敏事之臣專任責成待以不次之位其規畫措置一事聼其自為直以期年為限使田額如舊課程如舊無占種影射包賠如舊隨處有田隨處行師芻糧如峙内省帑運外省民輸有卒徒將領以足兵有溝洫隴畛以助險有樹藝園林以䕶耕轉盻之間變荒磧為豐壤易流莩而樂康阜民足國未有善于此者昔唐徳宗問李泌復府兵之策以兵多食少欲减京西戍兵泌請發左藏積繒因党項易牛鑄農器糴麥種分賜縁邊軍鎭夏秋耕荒田而種之沃土乆荒収入必多戌卒獲利則願耕者衆既因田致富則不思歸及戍期將滿下令有願留者即以所開田為永業家人願來者本貫給食而遣之是後収入既腆耕者願留家人願來變關中之疲敝為富強泌之一言即日行之如彼其速即年獲效如彼其厚矧在今日大修屯政簡付得人今年舉之則明年報功决食其利矣其他籌邊逺畧十百千萬無如此事為急要也頌漢揚雄趙充國頌明靈惟宣戎有先零先零猖狂侵漢西疆漢命虎臣惟後將軍整我六師是討是震既臨其域諭以威徳有守矜功謂之弗克請奮其旅於罕之羗天子命我從之鮮陽營平守節屢奏封章料敵制勝威謀靡亢遂克西戎還師於京鬼方賓服罔有不庭昔周之宣有方有虎詩人歌功乃列於雅在漢中興充國作武﨣﨣桓桓亦紹厥後普陸士衡紀信頌紀信誑項軺軒是乘攝齋赴節用死孰懲身與烟消名與風興唐元結大唐中興頌天寳十四年安禄山陷洛陽明年陷長安天子幸蜀太子即位於靈武明年皇帝移軍鳯翔其年復兩京上皇還京師於戲前代帝王有盛徳大業者必見於歌頌若令歌頌大業刻之金石非老於文學其誰宜為頌曰噫嘻前朝孽臣奸驕為昏為妖邊將騁兵毒亂國經羣生失寜大駕南廵百官竄身奉賊稱臣天將昌唐繄睨我皇匹馬北方獨立一呼千麾萬旟戎卒前驅我師其東儲皇撫戎蕩攘羣兇恢復指期曽不逾時有國無家事有至難宗廟再安二聖重歡地闢天開蠲除妖災瑞慶大來兇徒逆儔涵濡天休死生堪羞功勞位尊忠烈名存澤流子孫盛徳之興山髙日昇萬福是膺能令大君聲容沄沄不在斯文湘江東西中直浯溪石崖天齊可磨可鐫刋此頌焉何千萬年楊炎靈武宫受命頌臣聞享天隆命惟徳也戡難奉時惟聖也必有非常之運是興撥亂之功君以蒼生為憂不以濡足為患此陶唐所以捨而不畏舜禹所以受而不疑靈武宫皇帝龍躍之所日者奸臣竊命四海蕩波我聖皇天帝探命厯之數啓龍圖作受命之書付於我皇帝皇帝方遊崆峒以求至道於是羣公卿士負玉旒金璽望氣􅉭碭之野三進於閶闔之中曰臣聞在昔􅃖尤連禍大盗中國神農氏兵莫能勝天降𤣥女敕軒轅氏大定其災厥後堯有九州之害而命禹禹以四海之功而受舜陛下主鬯大位十有九年𤣥徳上達景福有歸六聖覩命厯之期兆人有臨難之請陛下畏災運而不寜棄黎元而不顧以至仁為薄以大寳為輕臣等若不克所請與億兆之衆將被髮拊膺號於天而訴於帝矣皇帝唯然改容曰豈人心與丁邜廣平王俶太尉光弻司徒子儀尚書左僕射冕兵部尚書輔國與北軍將士西土耆老萬五千人排闥以訴帝曰今􅉘狼穴居宫闕陛下兆庻為餌宗廟為墟若臣等誠懇未通是髙祖不歆於太廟且陛下渉渭則洪流涸廻鑾則慶雲見布澤而川池廣勤道而嘉禾生靈祇髣髴𤣥貺幽感臣聞符命待聖而作天運否終而泰葳㽔肸蠁㑹也睿武英明聖也臣等敢昧死上聞帝乃灑齋宫啟金匱嗚咽拜受詔有司大赦天下改元曰至徳元年尊聖父為文武大皇帝是日烟雲變作士庻踴躍黄龍見於東野紫氣滿於天門翌日也數百里衣裳會兼旬也數千里朝貢會踰月也天下兵車㑹浹時也四方重譯㑹以一旅成百萬之師率六軍平社稷之難禮郊祀戴聖皇與人合誠心以氣消天厲動罔不吉歆無不報是以白鹿擾於王庭靈芝産於延英化動而功成淵黙而頌聲言禪代者陋蒼梧易姓之名語嗣守者羞唐堯積善之辱述戡定者嘆四紀而復夏羙中興者嗤三六而滅新於戲神祗之所歸往品物之所法象鼓飛龍於尺水仗大義而東向矢謨發號實在兹都願篆石宫庭以垂萬古俾過山澤知風雨之奥窮造化識天地之爐臣炎稽首敢獻頌曰赫赫河圖啟天之祐雲從億萬皇居九五惟昔陶唐克傳舜禹濩也武也夫何足數彼妖者㪍惟暴惟貪天實即命人將不堪皇曰内禪于再于三盡武之善去湯之慙兵車百萬洶洶雷震横㑹九州為行為陣恃力者踣從命者順孝以奉天神而撫運至徳唐堯崇功大禹皤皤兆叟垂白而覩沛邑空歌周原已古徘徊頌聲永介兹土張濛楙功昭徳頌聖唐九葉皇帝平内盗攘外敵建中興永圖以崇王業乃命潼關鎭國軍節度使檢校尚書右僕射兼御史大夫華州刺史武康郡王李元諒整兵隴右分鎮京西朝野訢以為宜軍州翕而益重復我洮罕期在於兹且謂分星辰之精山河之靈彧穆英明為國而生者也於是行軍司馬御史中丞董叔經以州人感公救其􅂗炭荷公拯其瘥厲露表羣言贊亐雲隄曰臣聞鼓天下之大節莫先於忠義却天下之大難莫出於才能奏勲庸播金石以為天下表莫盛於碑版然則陛下宗臣元諒雄傑英勇沉斷明謀虎身之望夙成龍額之封果及武齊七徳而克用為模文有九功而能舉為法故炳燭方召粃稗韓彭桓桓然殉國之功皆可揭而昌言也昔陛下薄狩郊甸爰幸巴梁虵虺畜而患生豺狼飽而害作内奰宫闕黨與譸張何望之墾掘咸林敬釭窺覷蒲坂同逆相扇傾陷巨州元諒時以散員副戎關鎮無一廛之士無一旅之衆感憤而發招輯白徒斬賊使於潼津破賊將於敷谷乘勝連擊遂克城池閭閻載安室家相慶此其殉國之功一也勇而重閉以備不虞創續墉堤是徴板榦環廻褁於脩郭延袤臷於通衢冀防馳突之鋒庻窒捜牢之掠四封輻輳不震不驚益兇豎東顧之憂壯義夫西討之勢此其殉國之功二也州之器備自昔其空乃剔鑊鼓為兵撒氈彯為甲剡蒿揉為弩載簀鞏為排嚴約誓於五申肅部隊於三令勞逸斯共甘苦必分徳以導其懐刑以齊其力義以啟其憤忠以發其誠由是士皆嚮方樂公戰矣此其殉國之功三也籍馬蒐乗補卒濟師始編簿者二千終載書者一萬進次昭應稟命於副元帥之軍列屯興泰分援於尚可孤之壘元兇恃衆犯我中營或靡矜而來或掉鞅而去因其去也霆激飈衝分翼夾馳邀覆其陣血鬬滻川之水屍膏㶚岸之田狡勢迷窮不能復振此其殉國之功四也蒼茫御苑横矗長雲摧百堵而洞開擁三軍而徑入姚令言望旗而潰張光晟棄甲而奔彀騎爭追若燎於藪賊泚憂廹躬率全軍驅其恟恟之徒揮我堂堂之衆一鼓而北竄死真寜氛祲廓而黄道清腥穢消而彤庭肅頓師章敬都邑晏如迎大駕復於咸秦還大兵散於隂普此其殉國之功五也李懐光阻河拒命竊弄戈鋋北連絳臺南扺黄巷選朔方之健將保朝邑之離宫陛下特詔攻圍重鞠戎旅總於經畧丕冐平凉或掎擊其救兵或邀絶其餫卒力殫命窘因乃求降未殲當道之􅉘且蹀吠籬之犬此其殉國之功六也進屯河縣接邏官橋雖竹纜已焚而水口將渡大憝知窘猶懐鬬心乗時出竒幸於有勝遲明遇伏卒以無歸恚蹙窮城因絞中閤三條以謐二輔斯寜此其殉國之功七也戍羗不道俶擾西陲驟掠邠涇深入鹽夏狃其横猾溽暑仍留茍不用權若何攘暴廼勵我鷹揚之旅乘其馬瘠之時張皇軍形緩俘令逸然後排􅇏結隊加竈翻營師未逾於洛源㓂已還於河曲此其殉國之功八也婪婪藩戎匿詐求和重違修好之言用許尋盟之約諸軍畢㑹是獨沉疑陳其不誠請以為備且曰古者諸侯相見兵衛不撤警也今敵人反覆未可以端拱待之乃距平凉二十里所柵為壁塹為壕設晉師敖前之伏脩楚臣勁後之殿練銳三千渉涇式遏既而升壇將㰱果以惡來聲若河翻勢如山進望我旗鼓驚眙而還禦侮之道既𢎞折衝之威亦著此其殉國之功九也良原縣間在涇隴西壓窮邊罹彼煙塵翦除荆棘事未經啟宻令興功遂發軫而遽行即建標而特起恢其制度峻以規模役不二旬隠然岳立乃脩廬井乃闢田疇商旅載通流庸偕附􅇏堠交於塞表保障連於岐右雖周築虎牢漢慿馬邑式遏亂畧曽何足云此其殉國之功十也朝廷所以降丕命策髙勲重位以崇之豐爵以榮之歌鍾以樂之邸宅以寜之自建中以來衛社稷之臣秉旄鉞之將除宰輔董閫外其孰能疇匹於此哉况明允豪賢勤於理要清庻以康黎獻簡恤以裕公私推信誠𢎞敬讓薄九賦勵三農抑浮窳之風興㢘正之教一年而人知禁二年而人知惠三年而人知愛四年而人知誦夫然又安可使懋功昭徳沉隠無聞也歟願聼華人篆之樂石制曰可於是耆夀荔非升古沙門釋僧㑹道士遊方外等千乃心萬乃口喜從所欲祈我筆端乃約奏章以纂成績公本姓安氏武威姑臧人盖黄軒帝孫降居安息髙陽王裔留宅姑臧僕射元魏之股肱武衛巨唐之牙𤓰世濟其貴公又昌明而弱嵗羇孤感於知己某某之族從駱統之姓鎭潼關者五年矣既申武節克建戎勲天子以敦淳可親誠明可信更名錫氏以昭實焉書所謂踐脩厥猷靈承多寵者矣若夫校功王府譔徳侯家雖馮異揚言已傳徽於昔嵗而吉甫作頌庻𢎞羙於今辰詞曰洸洸武康兮有䖍秉鉞即戎臨敵兮原火烈烈隊如星兮陣如雲進如流兮止如臷轉電激兮衝風發壊苑垣兮復宫闕既東征兮又西伐鼙鼓雄兮才氣傑滌昬霾兮掃妖孽河瀆清兮渭源澈功既成兮恩亦結倚鐵防兮賚金穴華山麓兮敷水澨惠汪濊兮威凛冽庻氓安兮羣盗絶舞稚童兮歌大耋城窣雲兮營偃月望麾幢兮想旌節樹豐碑兮頌英哲詞不愧兮勲不滅銘古黄帝巾几銘毋弇弱毋佹徳毋違同毋敖禮毋謀非徳毋犯非義無掘壑而附丘無舍本而逐末日中必彗操刀必割執斧必伐日中不彗是謂失時操刀不割是謂失利執斧不伐賊人將來涓涓不塞將為江河熒熒不救炎炎奈何兩葉不去將用斧柯漢班固封燕然山銘鑠王師兮征荒裔勦凶虐兮截海外夐其邈兮亘地界封神丘兮建隆碣熈帝載兮振萬世傅毅車左銘盧氏作車取象璣衡君子建左法天之陽正位受綏車不内顧塵不出軌鸞以節歩彼言不疾彼指不躬𤣥覽於道永思厥中車右銘擇御卜右採徳用良詢納耆老於我是匡惟賢是師惟道是式箴闕旅賁内顧自式匪望其度匪愆其則越戒敦約禮以華國車後銘敬其在路體貌思㳟望衡顧轂允慎兹容毋或好佚匪盤於遊顧省厥遺虎尾斯求昭徳塞違抑盈以無雖有三晉欿然若虚周庾信秦州麥積崖佛龕銘麥積崖者乃隴坻之名山河西之靈岳髙峯尋雲深谷無量方之鷲島迹遯三禪譬彼鶴鳴虚飛六甲鳥道乍窮羊腸或斷雲如鵬翼忽已垂天樹若桂華翻能拂日是以飛錫遥來乗杯逺至䟽山鑿洞鬱為净土拜燈王於石室乃假馭風禮花首於山龕方資控鶴大都督李允信者藉於宿植深悟法門乃於壁之南崖梯雲鑿道奉為亡父造七佛龕似刻浮檀如攻水玉從容滿月照曜青蓮影現須彌香聞忉利如斯塵野還開說法之堂猶彼香山更對安居之刹昔者如來追福有報恩之經菩薩去家有思親之供敢縁斯義乃作銘曰鎮地鬱盤基乾峻極石關十上銅梁九息百仞厓構千尋松植隂兔假道陽烏廻翼載輦疏山穿龕架嶺糺紛星漢廻簇光景壁累經文龕重佛影雕輪月殿刻鏡花堂鐫石壁闇鑿山架梁雷乗法鼓樹積天香𠻳泉珉谷吹塵石牀集靈眞館藏仙册府芝洞秋房檀林春乳水谷銀沙山樓石柱異嶺共雲同峯别雨冀城餘俗河西舊風水聲幽咽山勢崆峒法雲常住慧日無窮方域芥盡不變天宫唐吕温三受降城碑銘韓侯受命志在朔易北方之強制以全策亘漠横塞揭兹雄壁如三鬬龍躍出大澤並分襟帯各閉風雷俯視隂山仰看昭囘一夫登陴萬里洞開日晏秋盡纖塵不來時維韓侯方運神妙觀釁則動乃誅乃弔廓乎窮荒盡日所照天乎未贊不策清廟我聖耀徳罷扃北門優而柔之用息元元曷若完守推亡固存于襄于夷永裕後昆宋石介擊蛇笏銘天地至大有邪氣干於其間為凶暴為殘賊聼其肆行如天地卵育之而莫禦也人生最靈或異類出於其表為妖怪信其異端如人蔽覆之而莫露也祥符間寜州天慶觀有蛇妖極怪異郡刺史日兩至於其庭朝焉人以為龍舉州人内外逺近罔不駿奔於門以覲㳟莊肅祗無敢怠者今龍圖侍御孔公時佐幕任是邦亦隨郡刺史於其庭公曰明則有禮樂幽則有鬼神是蛇不亦誣乎惑吾民亂吾俗殺無赦以手板擊其首遂死於前則蛇無異焉郡刺史暨州内外逺近庻民昭然若發蒙見青天覩白日故不能肆其凶殘而成其妖惑易曰知鬼神之情狀公之謂乎然天地鍾剛正之氣在公之笏豈徒斃一蛇而已軒陛之下有罔上欺民先意順旨者公以此笏指之廟堂之上有蔽賢䝉惡違法亂紀者公以此笏麾之朝廷之内有諛容佞色附邪背正者公以此笏擊之夫如是則軒陛之下不仁者去廟堂之上無姦臣朝廷之内無佞人則笏之功也豈止在一蛇作笏銘曰至正之氣公乃能得笏之在公能破滛妖靈氣未竭斯笏不折正道未亡斯笏不藏惟公寳之烈烈其光明孟侃鵞池銘慶陽下鵞名池深􅆼窕來清漪源不竭兵民宜通或塞在人為千萬䙫視兹辭甘肅通志巻四十六
