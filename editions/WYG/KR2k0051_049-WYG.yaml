body:
  text: 甘肅通志巻四十九藝文詩漢武帝馬生渥洼水中作太乙況天馬下霑赤汗沫流赭志俶儻精權竒籋浮雲晻上馳體容與迣萬里今安匹龍為友獲宛馬作天馬徠從西極涉流沙九有服天馬徠出泉水虎脊兩化若鬼天馬來歴無草徑千里循東道天馬徠執徐時将搖舉誰與期天馬徠開逺門竦予身逝昆侖天馬徠龍之媒游閶闔觀玉臺朝隴首歌朝隴首覽西垠雷電尞獲白麟爰五止顯黄徳圗匈虐熏鬻殛闢流離抑不祥賓百僚山河饗掩回轅鬗長馳騰雨師洒路陂流星隕感惟風籋歸雲撫懐心古樂府飲馬長城窟行青青河邊草綿綿思逺道逺道不可思宿昔夢見之夢見在我旁忽覺在他鄉他鄉各異縣展轉不相見枯桑知天風海水知天寒入門各自媚誰肯相為言客從逺方來遺我雙鯉魚呼童烹鯉魚中有尺素書長跪讀素書書中竟何如上有加餐食下有長相憶隴頭吟隴頭流水鳴聲嗚咽遙望秦川肝腸斷絶朝發欣城暮宿隴頭寒不能語舌巻入喉晉傅𤣥秦女休行龎氏有烈婦義聲馳雍凉父母家有重怨仇人暴且彊雖有男兄弟志弱不能當烈女念此痛丹心為寸傷外若無意者内潛思無方白日入都市怨家如平常匿劒藏白刃一奮尋身僵身首為之異處伏尸列肆旁肉與土合成泥灑血濺飛梁猛氣上干雲霓仇黨失守為披攘一市稱烈義觀者收淚並慨忼百男何當益不如一女良烈女直造縣門云父不幸遭禍殃今仇身以分裂雖死情益傷殺人當伏法義不茍活隳舊章縣令解印綬令我傷心不忍聽刑部垂頭塞耳令我更舉不能成烈著希代之績義立無窮之名夫家同受其祚子子孫孫咸享其榮今我作歌吟詠髙風激揚壯發悲且清梁車􅛴隴山詩隴頭征人别隴水流聲咽只為感君恩甘心從苦節雪凍弓弦斷風吹旂竿折獨有孤雄劒龍泉字不滅唐王勃隴西行隴西多名家子弟復豪華千金買駿馬蹀躞長安斜彫弓侍羽林寳劍照期門南來射猛虎西去獵平原既夕罷朝參薄暮入終南田間遭罵詈低語示乘􅆖入被鑾輿寵出視轅門勇無勞豪吏猜常侍當無恐充國出上邽李廣出天水門第倚崆峝家世垂金紫麟閣圗良将六郡名居上天子重開邊龍雲壘相向烽火照臨洮榆塞馬蕭蕭先鋒秦子弟大将霍嫖姚開壁左賢敗夾戰樓蘭潰獻捷上明光揚鞭歌入塞更欲奏屯田不必勒燕然古人薄軍旅千載謹邊闗少婦經年别開簾知禮客門户爾能持歸來笑投策宿長城詩隂雲凝朔氣隴上正飛雪四月草不生北風勁如割朝來羽書急夜宿長城窟道隘行不前相呼抱鞍歇人寒指欲墮馬凍蹄皆裂射鴈旋充飢斧冰還止渇寧辭解圍鬬但恐乘波沒早晚邊候空歸來事耕作散闗晨渡詩闗山淩旦開石路無塵埃白馬髙譚去青牛真氣來重門臨巨壑畫棟起崇隈即今楊䇿度非是棄繻回隴上行負羽到邊州鳴笳度隴頭雲黄知塞近草白見邊秋盧照鄰隴山詩隴山飛落葉隴雁度寒天愁見三秋水分為兩地泉西流入羌郡東下向秦川行客頻回首肝腸空自憐入秦川界隴坂長無極蒼然望不窮石徑縈疑斷回流暎似空花開緑野霧鶯囀紫巖風春芳勿遽盡留賞故人同蚤度闗山分水嶺詩十年遊蜀道萬里向長安徒費周王粟空彈漢吏冠馬蹄穿欲盡貂裘敝轉寒層氷横九折積石凌七盤重谿既下漱峻峯亦上干隴頭聞戍鼓嶺外咽飛湍瑟瑟松風急蒼蒼山月團傳語後來者行路誠獨難駱賓王隴山詩隴坂髙無極征人一望鄉闗河别去水沙塞斷歸腸馬繫千年樹旌懸九月霜從來共嗚咽皆是為勤王晚泊蒲類二庭歸望斷萬里客心愁山路猶南屬河源自北流晚風連朔氣新月照邊秋竈火通軍壁烽烟上戍樓龍庭但苦戰燕頷㑹封侯莫作蘭山下空令漢國羞邊城詩紫塞流沙北黄圗灞水東一朝辭俎豆萬里逐沙蓬候月恒持滿尋源屢鑿空野昏邊氣合烽逈戍烟通膂力風塵倦疆場嵗月窮河流控積石山路逺崆峝壯志凌蒼兕精誠貫白虹君恩如可報龍劍有雌雄李嶠奉和幸望春宫送朔方軍大總管張仁亶玉塞懲驕子金符命老臣三軍張武斾萬乘餞行輪猛氣凌𤣥朔崇恩降紫宸投醪還饗士辭第本忘身露下鷹初擊風髙雁欲賓方銷塞北祲還静漠南塵杜審言贈蘇綰書記知君書記本翩翩為許從戎赴朔邊紅粉樓中應計日燕支山下莫經年沈佺期出塞十年通大漠萬里出長平寒日生戈劒隂雲拂斾旌飢烏啼舊壘疲馬戀空城辛苦臯蘭北胡塵損漢兵李乂奉和幸望春宫送朔方大總管張仁亶邊郊草具腓河塞有兵機上宰調梅寄元戎細栁威虎貔東道出鷹隼北庭飛玉匣謀中野金輿下太微投醪銜酌餞緝衮事征衣勿謂公孫老行聞獻凱歸鄭愔塞外三首陽鳥南飛夜隂山北地寒漢家征戍客年嵗在樓蘭玉塞朔風起金河秋月團邊聲入鼓吹霜氣下旌竿海外歸書斷天涯旅鬢殘子卿猶奉使恒向節旄看塞外蕭條望征人此路賒邊聲亂朔馬秋色引胡笳遙嶂侵歸日長城帶晚霞斷蓬飛古戍連雁聚寒沙海暗雲無葉山春雪作花丈夫期報主萬里獨辭家荒壘三秋夕窮郊萬里平海隂凝獨樹日氣下連營戎斾霜旋重邊裘夜更輕将軍猶轉戰都尉不成名折栁悲春曲吹笳斷夜聲明年漢使返須築受降城蘇頲奉和聖製幸望春宫送朔方大總管張仁亶北風吹早雁日夕渡河飛氣冷膠應折霜明草正腓老臣帷幄算元宰廟堂機餞飲迴仙蹕臨戎解御衣軍装乘曉發師律候春歸方佇勲庸盛天詞降紫微張說和餞王晙巡邊六月歌周雅三邊諗夏卿欲施攻戰法先作簡稽行禮樂知謀帥春秋識用兵一勞堪定國萬里即長城策布和戎利威傳破虜名軍前雨灑道樓上月臨營别藻瑤華降同衣錦襮榮闗山由義近戈甲為恩輕絲竹路傍散風雲馬上生朝廷謂吉甫邦國望君平将赴朔方軍應制禮樂逢明主韜鈐用老臣恭慿神武䇿逺静鬼方人供帳榮恩餞山川喜詔巡天文日月麗朝賦管絃新幼志傳三畧衰材謝六鈞膽由忠作伴心故道為隣漢保河南地胡清塞北塵連年大軍後不日小康辰劍舞輕離别歌酣忘苦辛從來思博望許國不謀身王翰凉州詞蒲桃美酒夜光盃欲飲琵琶馬上催醉卧沙場君莫笑古來征戰幾人回崔顥贈凉州張都督聞君為漢将敵騎罷南侵出塞清沙漠還家拜羽林風霜臣節苦嵗月主恩深為語西河使知余報國心送單于裴都䕶赴西河征馬出翩翩城秋月正圓單于莫近塞都䕶欲臨邊漢驛通烟火湖沙乏井泉功成須獻捷未必去經年崔融西征軍行遇風北風巻塵沙左右不相識颯颯吹萬里昏昏同一色馬煩不敢進人急未遑食草木春更悲天景晝相匿夙齡慕忠勇雅尚存孤直覽史懐寖驕讀詩歎孔棘及兹戎旅地忝從書記職兵氣騰北荒軍聲振西極坐覺威靈逺行看氛祲息愚臣何以報倚馬申微力李白塞下曲三首五月天山雪無花祇有寒笛中聞折栁春色未曾看曉戰隨金鼔宵眠抱玉鞍願将腰下劍直為斬樓蘭駿馬似風飈鳴鞭出渭橋彎弓辭漢月插羽破天驕陣解星芒盡營空海霧消功成畫麟閣獨有霍嫖姚塞虜乘秋下天兵出漢家将軍分虎竹戰士卧龍沙邊月隨弓影胡霜拂劍花玉闗殊未入少婦莫長嗟杜甫髙都䕶驄馬行安西都䕶胡青驄聲價欻然來向東此馬臨陣久無敵與人一心成大功功成惠養隨所致飄飄逺自流沙至雄姿未受伏􅇫恩猛氣猶思戰場利腕促蹄髙如踣鐵交河幾蹴層氷裂五花散作雲滿身萬里方看汗流血長安壯兒不敢騎走過掣電傾城知青絲絡頭為君老何由却出横門道送韋書記赴安西夫子歘通貴雲泥相望懸白頭無籍在朱紱有哀憐書記赴三捷公車留二年欲浮江海去此别意茫然投贈哥舒開府翰二十韻今代麒麟閣何人第一功君王自神武駕馭必英雄開府當朝傑論兵邁古風先鋒百勝在畧地兩隅空青海無傳箭天山早挂弓亷頗仍走敵魏絳已和戎每惜河湟棄新兼節制通智謀垂睿想出入冠諸公日月低秦樹乾坤繞漢宫胡人愁逐北宛馬又從東受命邊沙逺歸來御席同軒墀曾寵鶴畋獵舊非熊茅土加名數山河誓始終策行遺戰伐契合動昭融勲業青冥上交親氣概中未為珠履客已見白頭翁壯節初題柱生涯獨轉蓬幾年春草歇今日暮途窮軍事留孫楚行間識吕䝉防身一長劍将欲倚崆峝寄髙三十五書記歎息髙生老新詩日又多美名人不及佳句法如何主将收才子崆峝足凱歌聞君已朱紱且得慰蹉跎送蔡希曾都尉還隴右因寄髙三十五書記蔡子勇成癖彎弓西射胡健兒寧鬬死壯士恥為儒官是先鋒得材縁挑戰須身輕一鳥過槍急萬人呼雲幕隨開府春城赴上都馬頭金匼匝駝背錦糢糊咫尺雪山路歸飛青海隅上公獨寵錫突将且前驅漢使黄河逺凉州白麥枯因君問消息好在阮元瑜贈田九判官梁丘崆峝使節上青霄河隴降王欵聖朝宛馬總肥春苜蓿将軍只數漢嫖姚陳留阮瑀誰争長京兆田郎早見招麾下頼君才並入獨能無意向漁樵赤谷西崦人家躋險不自安出郊已清目溪迴日氣暖逕轉山田熟鳥雀依茅茨藩籬帶松菊如行武陵暮欲問桃源宿秦州雜詩二十首滿目悲生事因人作逺遊遲迴度隴怯浩蕩及闗愁水落魚龍夜山空鳥鼠秋西征問烽火心折此淹留秦州城北寺傳是隗囂宫苔蘚山門古丹青野殿空月明垂葉露雲逐度溪風清渭無情極愁時獨向東州圖領同谷驛道出流沙降虜兼千帳居人有萬家馬驕朱汗落胡舞白題斜年少臨洮子西來亦自誇鼓角緣邊郡川原欲夜時秋聽殷地發風散入雲悲抱葉寒蟬静歸山獨鳥遲萬方聲一槩吾道竟何之南使宜天馬由來萬匹強浮雲連陣沒秋草徧山長聞說真龍種仍殘老驌驦哀鳴思戰鬬逈立向蒼蒼城上胡笳奏山邊漢節歸防河赴滄海奉詔發金微士苦形骸黒林疎鳥獸稀那堪往來戍恨解鄴城圍莽莽萬重山孤城山谷間無風雲出塞不夜月臨闗屬國歸何晚樓蘭斬未還烟塵獨長望衰颯正摧顔聞道尋源使從天此路迴牽牛去幾許宛馬至今來一望幽燕隔何時郡國開東征健兒盡羌笛暮吹哀今日明人眼臨池好驛亭叢篁低地碧髙栁半天青稠疊多幽事喧呼閱使星老夫如有此不異在郊坰雲氣接崑崙涔涔塞雨繁羌童看渭水使客向河源烟火軍中幕牛羊嶺上村所居秋草浄正閉小蓬門蕭蕭古塞冷漠漠秋雲低黄鵠翅垂雨蒼鷹飢啄泥薊門誰自北漢将獨征西不意書生耳臨衰厭鼔鞞山頭南郭寺水號北流泉老樹空庭得清渠一邑傳秋花危石底晚景卧鐘邊俛仰悲身世溪風為颯然傳道東柯谷深藏數十家對門藤葢瓦映竹水穿沙瘦地翻宜粟陽坡可種𤓰船人近相報但恐失桃花萬古仇池穴潛通小有天神魚人不見福地語真傳近接西南境長懐十九泉何時一茅屋送老白雲邊未暇泛滄海悠悠兵馬間塞門風落木客舍雨連山阮籍行多興龎公隠不還東柯遂疎懶休鑷鬢毛斑東柯好崖谷不與衆峯羣落日邀雙鳥晴天卷片雲野人吟險絶水竹㑹平分採藥吾将老兒童未遣聞邊秋隂易久不復辨晨光簷雨亂淋幔山雲低度牆鸕鷀窺淺井蚯蚓上深堂車馬何蕭索門前百草長地僻秋将盡山髙客未歸塞雲多斷續邊日少光輝警急烽常報傳聞檄屢飛西戎外甥國何得迕天威鳳林戈未息魚海路常難候火雲峯峻懸軍幕井乾風連西極動月過北庭寒故老思飛将何時議築壇唐堯真自聖野老復何知曬藥能無婦應門亦有兒藏書聞禹穴讀記憶仇池為報鴛行舊鷦鷯在一枝西枝村尋置草堂地夜宿贊公土室二首出郭眄細岑披榛得微路溪行一流水曲折方屢渡贊公湯休徒好静心迹素昨枉霞上作盛論巖中趣怡然共攜手恣意同逺步捫蘿澀先登陟巘眩反顧要求陽岡暖苦陟隂嶺沍惆悵老大藤沉吟屈蟠樹卜居意未展杖䇿迴且暮層巔餘落日草蔓已多露天寒鳥已歸月出山更静土室延白光松門耿疎影躋攀倦日短語樂寄夜永明燃林中薪暗汲石底井大師京國舊徳業天機秉從來支許遊興趣江湖逈數竒謫闗塞道廣存箕潁何知戎馬間復接塵事屏幽尋豈一路逺色有諸嶺晨光稍曚曨更越西南頂送人從軍弱水應無地陽闗已近天今君渡沙磧累月斷人烟好武寧論命封侯不計年馬寒防失道雪沒錦鞍韉發秦州我衰更懶拙生事不自謀無食問樂土無衣思南州漢源十月交天氣凉如秋草木未黄落況聞山水幽栗亭名更佳下有良田疇充腸多薯蕷崖蜜亦易求密竹復冬笋清池可方舟雖傷旅寓逺庶遂平生遊此邦俯要衝實恐人事稠應接非本性登臨未銷憂谿谷無異石塞田始微收豈復慰老夫惘然難久留日色隠孤戍烏啼滿城頭中宵驅車去飲馬寒塘流磊落星月髙蒼茫雲霧浮大哉乾坤内吾道長悠悠赤谷天寒霜雪繁遊子有所之豈但嵗月暮重來未有期晨發赤谷亭險艱方自兹亂石無改轍我車已載脂山深苦多風落日童稚飢悄然村墟逈烟火何由追貧病轉零落故鄉不可思常恐死道路永為髙人􅅓鐵堂峽山風吹遊子縹緲乘險絶硤形藏堂隍壁色立積鐵徑摩穹蒼蟠石與厚地裂修纎無限竹嵌空太始雪威遲哀壑底徒旅慘不恱水寒長冰横我馬骨正折生涯抵弧矢盜賊殊未滅飄蓬踰三年迴首肝肺熱鹽井鹵中草木白青者官鹽烟官作既有程煮鹽烟在川汲井嵗搰搰出車日連連自公斗三百轉致斛六千君子慎止足小人苦喧闐我何長嘆嗟物理固自然積草嶺連峯積長隂白日遞隠見颼颼林響交慘慘石狀變山分積草嶺路異明水縣旅泊吾道窮衰年嵗時倦卜居尚百里休駕投諸彥邑有佳主人情如已㑹面來書語絶妙逺客驚深眷食蕨不願餘茅茨眼中見泥功山朝行青泥上暮在青泥中泥濘非一時版築勞人功不畏道途永乃将汩沒同白馬為鐵驪小兒成老翁哀猿透却墜死鹿力所窮寄語北來人後來莫怱怱鳳凰臺亭亭鳳凰臺北對西康州西伯今寂寞鳳聲亦悠悠山峻路絶蹤石林氣髙浮安得萬丈梯為君上上頭恐有無母雛飢寒日啾啾我能剖心血飲啄慰孤愁心以當竹實炯然無外求血以當醴泉豈徒比清流所重王者瑞敢辭微命休坐看綵翮長舉意八極周自天銜瑞圖飛下十二樓圖以奉至尊鳳以垂鴻猷再光中興業一洗蒼生憂深衷正為此羣盜何淹留萬丈潭青溪含冥寞神物有顯晦龍依積水蟠窟壓萬丈内跼步凌垠堮側身下烟靄前臨洪濤寛卻立蒼石大山危一徑盡崖絶兩壁對削成根虚無倒影垂澹瀕黒如灣澴底清見光炯碎孤雲倒來深飛鳥不在外髙蘿成帷幄寒木壘旌斾逺川曲通流嵌竇潛洩瀨造幽無人境發興自我輩告歸遺恨多將老斯遊最閉藏修鱗蟄出入巨石礙何事暑天過快意風雨㑹發同谷縣賢有不黔突聖有不暖席況我飢愚人焉能尚安宅始來兹山中休駕喜地僻奈何迫物累一嵗四行役忡忡去絶境杳杳更逺適停驂龍潭雲迴首虎崖石臨岐别數子握手淚再滴交情無舊深窮老多慘慼平生嬾拙意偶值棲遁跡去住與願違仰慙林間翮木皮嶺首路栗亭西尚想鳳凰村季冬攜童稚辛苦赴蜀門南登木皮嶺艱險不易論汗流被我體祁寒為之暄逺岫争輔佐千巖自崩奔始知五嶽外别有他山尊仰干塞大明俯入裂厚坤再聞虎豹鬬屢跼風水昏髙有廢閣道摧折如短轅下有冬青林石上走長根西崖特秀發煥若靈芝繁潤聚金碧氣清無沙土痕憶觀崑崙圗目擊懸圃存對此欲何適默傷垂老魂王維燕支行漢家天将才且雄時來謁帝明光宫萬乘親推雙闕下千官出餞五陵東誓将甲第金門裏身作長城玉塞中衛霍纔堪一騎将朝廷不數貳師功趙魏韓燕多勁卒闗西俠少何咆勃報讎只是聞嘗膽飲酒不曾妨刮骨畫㦸雕戈白日寒連旗大斾黄塵沒疊鼓遙翻瀚海波鳴笳亂動天山月麒麟錦帶佩吳鈎颯沓青驪躍紫騮拔劍已斷天驕臂歸鞍共飲月支頭漢兵大呼一當百虜騎相看哭且愁教戰須令赴湯火終知上将先伐謀隴頭吟長安少年游俠客夜上戍樓看太白隴頭明月迥臨闗隴上行人夜吹笛闗西老将不勝愁駐馬聽之雙淚流身經大小百餘戰麾下偏裨萬戸侯蘇武纔為典屬國節旄空盡海西頭送劉司直赴安西絶域陽闗道胡烟與塞塵三春時有鴈萬里少行人苜蓿隨天馬葡萄逐漢臣當令外國懼不敢覓和親送平淡然判官不識陽闗路新從定逺侯黄雲斷春色畫角起邊愁瀚海經年别交河出塞流須令外國使知飲月支頭使至塞上單車欲問邊屬國過居延征蓬出漢塞歸鴈入胡天大漠孤烟直長河落日圎蕭闗逢候騎都䕶在燕然送張判官赴河西單車曽出塞報國敢邀勲見逐張征虜今思霍冠軍沙平連白雪蓬巻入黄雲慷慨倚長劍髙歌一送君出塞作居延城外獵天驕白草連天野火燒暮雲空磧時驅馬秋日平原好射鵰䕶羌校尉朝乘障破虜将軍夜度遼玉靶角弓珠勒馬漢家将賜霍嫖姚送元二使安西渭城朝雨裛輕塵客舍青青栁色新勸君更盡一盃酒西出陽闗無故人送韋評事欲逐将軍取右賢沙場走馬向居延遙知漢使蕭闗外愁見孤城落日邊王昌齡塞下曲蟬鳴空桑林八月蕭闗道出塞復入塞處處黄蘆草從來幽并客皆共塵沙老莫學游俠兒矜誇紫騮好飲馬渡秋水水寒風似刀平沙日未沒黯黯見臨洮昔日長城戰咸言意氣髙黄塵足今古白骨亂蓬蒿從軍行烽火城西百尺樓黄昏獨上海風秋更吹羌笛闗山月無那金閨萬里愁琵琶起舞換新聲總是闗山離别情撩亂邊愁聽不盡髙高秋月照長城青海長雲暗雪山孤城遙望玉門闗黄沙百戰穿金甲不破樓蘭終不還秦時明月漢時闗萬里長征人未還但使龍城飛将在不教胡馬度隂山大漠風塵日色昏紅旗半巻出轅門前軍