body:
  text: 甘肅通志巻四十二列女兩河内外風土剛勁婦女知重氣節或盡孝懐忠能識大義或茹荼畢世殉節崇朝或强暴侵凌捐生蹈刃自古已多於今更烈深閨卓行固屬可傳蓬户貞操尤堪勵俗紀其姓氏彰徃勸來博採輿論寧詳毋畧志列女臨洮府晉羊躭妻辛氏字憲英狄道人魏侍中毗之女也聰慧有才鑒初魏文帝得立為太子抱毗項曰辛君知我喜否毗歸告憲英歎曰太子代君主宗廟社稷者代君不可以不戚主國不可以不懼宜戚而喜何以能久魏其不昌乎弟敞為曹爽參軍司馬懿将誅爽閉城門敞懼問憲英憲英曰事有不可知然以我度之此舉不過以誅爽耳敞曰然則敞可無出乎曰安可以不出職守人之大義也為人執鞭而棄其事不祥也汝從衆而已敞遂出事定敞嘆曰吾不謀於姊㡬不獲於義鍾㑹為征西将軍将滅蜀憲英謂躭從子祜曰㑹在事縱恣非持久處下之道吾慮其有他志也及㑹将行請其子琇為參軍憲英曰行矣戒之古之君子入則致孝於親出則致節於國在職思其所司在義思其所立不貽父母憂患而已軍旅之間可以濟者其惟仁恕乎㑹至蜀果反琇竟全歸辛之識見𩔖如此散騎常侍梁緯妻辛氏狄道人緯為散騎常侍西都陷沒為劉曜所害辛氏有殊色曜将取之辛氏據地大哭仰謂曜曰妾聞女不再醮妾夫已死理無獨全乞就死地下事舅姑遂號泣不止曜曰貞婦也任之乃自縊而死曜以禮葬之隋渭源令裴倫妻栁氏薛舉之亂倫遇害栁氏有二女及兒婦皆有色栁氏謂曰我輩遭逢禍亂若辱於賊其若汝父之死義何女婦垂涕曰惟母所命栁氏自投於井其女婦相繼而下皆死於井中明曹友妻王氏狄道人友為廣東瓊山縣丞卒於官一子復夭氏撫育㓜孫始終完節洪武中旌表董守中妻毛氏狄道人毛芾女守中舉賢良任四川布政司都事卒於官毛聞訃慟哭曰夫死獨存犬豕弗若吾與俱死遂自縊而死王紹春妻魏氏狄道人春卒氏年十九其姑尚存有㓜子曰宗道以貧故自負土築夫墳既葬惟勤紡績奉姑撫子年七十餘卒永樂中旌表生員張通妻王氏狄道人年二十六通卒子世安甫一嵗夫亡時即欲自盡親族止之曰有姑有子何苦如此乃奉姑撫子備歴艱辛富豪聞其賢欲謀而醮之氏奮罵以砒霜自隨人莫敢犯守節四十餘年嘉靖間旌表魏太信妻任氏狄道人大信病且革任泣告諸親曰吾必與夫俱死大信卒任自縊以殉張賔妻王氏臨洮衛人年二十七賔亡無子乃曰聞古有貞烈女吾當效之乃勤紡績以養孀姑取夫姪以承後嗣有司表之司偉妻王氏狄道人年十六夫亡舅姑尚存遺腹生一子誓不再醮勤紡績以治生始終無玷夀六十卒張銓妻司氏狄道人年二十三而夫亡遺二孤俱在襁褓司誓無他志廿貧紡績苦節四十餘年撫孤成立張紀妻王氏狄道人夫病篤焚香龥天願以身代及卒哀毁㡬絶紡績教子五十餘年卒文載道妻魏氏狄道人載道赴選卒於京氏年二十有六遺男來鳯甫七嵗貧不能歸襯稱貸於鄉之寓京者母子徒步扶柩而歸營葬訖勤女紅教子讀書有司表之劉澤妻曹氏狄道人年二十澤卒哀痛㡬絶竭力襄事撫孤於舅姑喪葬殫盡心力夀六十有六廵撫表其閭李奉元聘妻張喜英狄道人許字邑人李奉元未娶而歿訃聞父母徃弔英悲痛縊於家廵方上其事奉㫖立祠旌表趙鏜妻滕氏狄道人夫卒即欲身殉因有姑在及姑亡氏曰姑亡我安忍獨存哭不絶聲飲食不入口浹旬而卒年止二十一生員張建中妻趙氏狄道人夫死遺一女方在襁褓顧其女曰我無復存之理但為汝勉活耳遂撫成立及適人饌女畢即鍵門焚香再拜自縊女發嫁時衣箱已有齊衰一襲始知從前勉活之言非虚也萬歴間旌表田俊妻尚氏狄道人夫亡時年二十八寡姑垂老家極貧無可依者尚誓死守節勤女工事姑生養死葬悉有禮撫遺孤業儒兼撫夫二姪與子無異趙鶴齡妻王氏狄道人適趙四年夫亡有惜其年㓜勸之嫁者王以死自誓惟孝以事姑慈以撫子守節三十餘年卒方瑄妻袁氏狄道人瑄病龥天願以身代瑄卒袁年二十有四水􅄴不入口哀毁㡬絶以翁姑在勉活奉事及撫㓜孤未㡬亦亡有勸其再醮者袁翦髮杜門撫養夫姪夀六十二而卒雍不敏妻魏氏狄道人年二十九不敏卒守節撫孤紡績自贍四十餘年廵按表其門百户蒋汝勤妻李氏狄道人夫卒氏年二十四遺孤申甫八嵗氏甘心奉姑撫子成立襲父職年六十四卒御史表其門潘榮妻趙氏狄道人榮卒氏甘貧苦節撫子成立襲父職未㡬子亦早逝遺婦劉氏年二十有五時有以家事艱難勸之再適者劉叱之曰上有孀母孰與事下有遺孤孰與撫乃守節終身人稱為兩世雙節云邢福妻閔氏狄道人福嬰重疾氏脱簪珥迎醫調理及疾革福與之訣令其再適氏誓不易節竭力襄葬鞠二孤至成立孀居五十年夀八十有六卒王寧妻馮氏狄道人夫亡氏年二十四嵗子衡生八月家無治生具紡績為資非大故不出户庭苦節終身王守山妻魯氏狄道人年二十九山卒誓以死殉家人以撫孤勸乃毁容紡績課子宗舜讀書補郡庠生夀六十有三廵按旌其門姚登明妻郝氏狄道人年二十四夫亡遺孤二郝哀痛㡬殞喪葬畢乃日夜拮据耕織以奉翁姑兼撫二孤及孤長命就外傅時誡之曰子之所以不死者為姚氏門庭計耳名弗就奚以追休前人未㡬長子俊遊庠廪貢孫之珵登鄉舉一門衣冠不絶夀九十有七陳懋妻楊氏狄道人懋卒楊年二十有三遺孤三無戚可依氏號泣卧地姑慰之稍息乃曰夫死矣予無生理如姑衰子㓜何乃矢志靡他備嘗艱辛未㡬姑亡喪葬如禮季子業儒補弟子員孫膺明經年八十有七卒生員劉遷妻王氏狄道人明末遷被流㓂執不屈而死遺子二尚㓜王誓死守節撫養二孤備歴艱辛終至成立為邑名士太守表其門生員甄鼐妻韓氏渭源人正徳中兵亂執鼐及韓氏欲辱之氏大罵不屈遂遇害張斌妻朱氏渭源人夫亡於京憂泣不食誓欲殉節數日而卒廵按表其閭徐仁得妻孟氏蘭州人年二十九夫亡遺子思温甫八嵗氏紡績教養由鄉舉任湖廣藍田縣丞思温復故遺子友諒孟又撫養成立永樂中旌表其門鍾昇妻邢氏蘭州人年二十九夫亡姑陳氏性至嚴邢承顔順志四十餘年姑亡邢以禮葬之享夀八十九卒吳彦髙妻萬氏蘭州人其姑病劇萬稽首北辰割股作羮以進尋病愈後彦髙卒哀毁踰常孀居六十年夀九十三卒曹洪妻吳氏蘭州人成化間洪商遊蜀病卒時吳年二十七守節甘貧孝事翁姑當道奨之金鐄妻馮氏蘭州人適鐄四載夫亡馮年二十二遺孤瑞甫月餘馮孝事孀姑撫孤子入庠苦節七十餘年而終譚宗良妻梁氏蘭州人于歸二載宗良行商三十餘年不歸别娶生子梁紡績自甘操守不渝良邸卒梁取夫庶子歸家撫養成立内外肅然年六十卒蔡寧妻于氏蘭州人寧於天順間從征賊刃斷左股輿至家卒母老子㓜于紡績以勤孝養孀居五十年鄉人未嘗覩面郭盛妻相氏蘭州人年二十三夫卒遺子尚㓜守節不渝年六十八卒指揮陳溥妻滕氏蘭州人自㓜貞淑寡言笑溥卒滕年少無子女可依孀居自勵素衣疏食苦節四十年殁監生李達妻髙氏蘭州人達卒髙少寡遺孤芝甫四嵗孤苦自守時有通媒妁者髙斥之遂決意以禮自防教子成立補郡庠生黄珍妻楊氏蘭州人年一十七嵗許黄珍為婚未及合􅈟珍商遊江南不歸楊父母相繼殁貧苦特甚躬勤紡績不出中門寡言笑以死自誓鄉人服其志越三十年珍始歸以禮迎娶人皆以完節稱之髙英妻樹氏蘭州人適英七載而英亡時樹年二十七遺孤源四嵗守節奉親家貧舅姑屢欲奪其志樹度不能争乃自白於州司誓死苦守越五十年夀七十有七監生金志妻劉氏蘭州人夫亡年二十六嵗姻戚憫其㓜且無出勸令再醮劉終不從奉養舅姑生事死葬竭力盡禮家貧無告依母家四十年卒滕倫妻宋氏蘭州人年二十四倫亡遺孤連七嵗家貧如洗甘心紡績撫孤就學底於成立年八十一𢎞治間旌表蔡瑄妻滕氏蘭州人適瑄方五月夫業賈旅卒滕悲痛求死不得即立志孀居遺孕三月生子諒撫育成立貢生蘇源妻石氏蘭州人源入監旅卒無子四女俱㓜石紡績撫養出嫁三女相繼而亡季女適沈訓者迎養石獨居一小樓如處子然夀七十四而終義官龔振妻顧氏蘭州人事翁姑以孝聞姑嘗病氏竭誠龥天割股和藥而疾愈年七十三卒邑人聊讓銘諸墓極著其孝趙剛妻戴氏蘭州人年二十而夫亡事姑守志撫子有成年六十三卒郡人彭澤嘗書雙節以表之王寧妻馮氏蘭州人夫卒年二十四子衡生一月家甚貧攻苦撫養充州學生文晉妻陳氏蘭州人晉以郡吏給由赴京陳從之晉卒哀毁㡬絶其族弟冀托親以歸陳佯許之是夕自縊死郡人公治棺買地合葬燕邸吳淑乾女吳氏蘭州人孝愛性生年十四值父病割股和藥以進傷重危甚有一老人遺藥敷之患愈不知老人為誰後適指揮劉麟鉛山王繼妃楊氏蘭州人省祭官楊桐女年十六選鉛山王繼妃未娶王薨矢志守節遂留宫闈撫媵子如已出廵方吳楷上其事萬歴二十八年建坊旌表曰貞心天植苦志霜嚴勅封繼妃髙懐義妻陶氏蘭州人年十七而夫亡子女俱無坐卧一小樓以女紅自養者五十餘年鄉里公鳴當道肅藩矜其節嵗給米薪布帛旌曰完節維風劉應舉妻髙氏蘭州人年二十夫亡並無子女隻身苦節凡七十年本道奨之夀八十九嵗終生員陸永福妻唐氏蘭州人年二十九夫亡孝事孀姑教育二子同時遊庠直指具題旌表庠生楊名顯妻朱氏蘭州人年二十夫亡撫㓜子㓜姪恩愛篤至不分異體廵方旌表戴文光妻楊氏蘭州人夫早殁泣血三年服闋之日絶飲食自盡肅藩旌表賜祭肅王嬪楊氏田氏蘭州人明末流㓂薄城二嬪盥沐簪服從容投繯宫人從死者二百餘人生員楊鴻妻鍾氏金縣人鴻早卒鍾年二十生子二長三嵗次彌月即欲自盡以舅姑老子㓜止之後舅姑欲奪其志氏痛哭自縊賴侍女救活守節七十年知縣表其門生員陳師䕫妻邵氏金縣人寡言笑善治家䕫卒二日後縊死於柩前鄉人莫不哀痛金鰲妻漢氏金縣人于歸二載夫卒氏年二十遺孤在褓欲以死殉衆慰乃止甘貧撫孤卒年九十萬歴中表其門金國宗妻陳氏金縣人夫卒氏年一十八嵗寝食俱廢至七日以首擊柱未死抵暮自縊吳華妻熊氏河州人華死氏年二十有四遺孤七嵗一貧如洗以死自誓父母不能奪其志乃紡績孝姑養子守節八十有一而卒正統間旌表吳昺妻倪氏河州人年二十嵗夫死子㓜舅姑勸其再醮誓死守節夀七十有六天順五年旌表朱顯妻張氏河州人夫死無子氏時年十九舅姑欲令再醮氏以死誓恪執孝道守節終身天順八年旌表張侃妻李氏河州人侃卒氏有姿色父母欲奪其志氏以藥瞽其一目事舅姑終養撫子女婚嫁夀五十卒嘉靖間旌表生員李時郁妻陳氏河州人年二十四生一子一女夫卒氏次日自縊死雷玘妻丘氏河州人玘卒丘年三十撫孤守節七十五卒嘉靖間旌表生員王約妻李氏河州人年二十七約卒李哀毁㡬絶撫孤守節夀六十五卒徐理妻王氏河州人夫亡氏年二十二姑欲奪其志氏曰姑老子㓜何所依恃於是勤織絍事姑教子至七十七卒嘉靖間旌表王錦繡妻謝氏河州人夫亡氏年二十六甘貧守節年七十有五嘉靖間旌表指揮姚寧妻金氏河州人寧故金年二十二撫養㓜子承襲父職氏苦節終身年八十三卒姚憲妻雷氏河州人憲寧弟也憲取雷甫一年生子七月憲病篤語氏曰我死之後願養孤子雷聞之哀痛㡬死用艾自灸其面杜門守節始終不渝嘉靖三十九年與嫂金氏事聞旌表曰雙節雷得時妻楊氏河州人得時病故楊年二十四甘貧守節織紝為事年七十五卒察院給扁旌之馬廷鳯妻羅氏河州人生男未及週而鳯故氏年二十五屏服飾養㓜子四十餘年始終一節事聞旌表生員劉濂妻周氏河州人濂病故周年二十五嵗號泣不絶七日而亡監生金崑妻黄氏河州人崑故黄年二十遺子朴尚在襁褓黄哀痛㡬絶誓不出户庭撫子成立年七十卒劉秋喜河州民思信女年十七許義官任璉子國卿未合􅈟國卿病死秋喜欲徃弔之母不允痛哭不食次日平旦整衣裳母不知所為投井死事聞奉㫖旌表給塋田與國卿合葬朱麟妻李氏河州人生男二夫亡氏年二十八嵗母舅欲奪其志於夫死三週日祭畢以二子托之於伯飲藥而亡有司表其門曰節烈維風揑貞女河州指揮女未嫁而婿亡女遂自縊死有墓在河灘闗水渠小橋之北皇清生員雷從龍妻趙氏狄道人康熈十三年吳逆之變郡城失守氏年方二十遇難以刀自刎未死後從龍故氏二十九嵗一子鳴夏甫五嵗姑年七十四嵗氏飲氷茹檗奉姑教子鳴夏後為貢生把總周文禮妻沈氏狄道人康熈十八年文禮隨征吳逆至四川陣亡氏年二十九嵗遺孤甫二嵗氏聞變以死自誓親隣以奉親育子勸乃勉强進食上奉舅姑下撫孤兒凡三十二載田啟蘭妻趙氏狄道人年二十二嵗夫故翁姑俱老長子方三嵗次子甫數月氏號哭自縊數次以生母解救方甦家貧紡織度日奉舅姑生養死葬悉盡禮子亦成立年六十有五而終杜尚智妻㓂氏狄道人夫故時年二十七嵗姑老子㓜家貧姑憐之私議欲令他適氏聞自縊賴救得免誓不再醮研磨賣餅織紝紡績為活計奉姑撫子苦節三十年盧蔚妻王氏狄道人蔚死氏年二十六嵗子甫二嵗痛不欲生其姑曉之氏立志守節紡績度日奉姑生養死葬悉盡禮子亦成立苦節凡四十八年生員牟采妻張氏牟䅿妻蘇氏俱狄道人康熈四十一年兄弟同故時張氏年二十八嵗有子名繼祖方二嵗蘇氏少張四嵗有娠三月張氏謂蘇氏汝若生男與吾同守後果生男二人遂身親農業協力共濟繼祖得列庠生蘇氏先卒子亦成立生員王𢎞祚妻盧氏狄道人𢎞祚故氏年二十三嵗子方二嵗祖姑年八十餘舅亦衰邁舅姑憐其少艾欲嫁之氏痛哭自矢守節撫孤孝養祖姑舅姑生死盡禮年五十四而卒回民馬有驥繼妻張氏狄道人夫病故氏年二十二嵗前子一氏子一女一氏撫養之誓不再適閲一載姑以家貧屢次勸嫁氏不從姑暗通媒妁約日令人偷娶及期氏早起研磨忽聞此信哄前子出縛子女手足自縊死程翺妻李氏蘭州人二十九嵗喪夫立志守節撫孤成立夀一百一嵗召親族訣别沐浴端坐而逝雍正三年具題旌表百户范淐妻吳氏蘭州人年二十七淐陣亡吳孕甫七月後生一子家貧親族勸令再醮氏毁容矢死撫孤四十餘年張友科妻駱氏蘭州人科早亡值回變氏􅂝其婦及已嫁女張氏同投河而沒闔門殉難生員韓陛寵妻周氏蘭州人年十九寵病卒氏即絶食母及諸親以氏有遺腹為勸少進飲食及産弗存氏遂不食死武舉楊智妻李氏蘭州人守備李必因女智㑹試北上卒於道櫬将歸先一日氏始知夜半整衣自縊死遂與夫合葬楊鍾淑妻陳氏蘭州人夫亡氏年十七嵗有遺孕後生子倫生孫光甫三嵗而倫又亡撫其孫生曽孫先後六十年歴盡危險及耄而卒周國璧女周烈女蘭州人年十四嵗值戊子回變避難東灘為賊所掠女度不能脱泣向母曰我誓不辱身為父母羞渡至黄河中流猝躍赴水撁賊俱下賊拉馬尾以出女竟溺死張希堯妻顔氏蘭州人十九嵗適戍者張希堯順治戊子逆回據河州攻城夫中砲而亡顔聞痛哭自縊生員王學文妻韓氏蘭州人戊子回變文被害氏聞即日自縊其翁收尸合葬焉遺子譽甫四嵗生員方䇿妻陳氏蘭州人年二十六䇿亡家貧苦守凍餒自甘後三子俱歿撫㓜孫五十餘年夀七十八而卒于養鯤妻陳氏蘭州人年十九嵗適鯤甫四年鯤病卒氏水不下咽者三日一夕自縊柩旁王三問妻張氏蘭州人年二十二夫故氏對屍泣曰俟我同去是日暮潛投黄河死王承禮妻周氏蘭州人年二十喪夫子甫三嵗家貧苦節自守其後子亡撫孫年九十卒孔啟忠妻楊氏蘭州人夫早亡伯叔勒嫁氏撫孤無二志後復遭族人逼氏慮不能遂志遂自縊死翟麒妻王氏渭源人麒早亡氏年十九嵗有遺孕生子氏上事舅姑下撫弱息厯十六年子芾遊庠舅姑以夀終張善猷妻張氏渭源人夫早亡氏敬奉孀姑畊織經營每食粗糲自養甘㫖供姑黽勉二十餘年及姑亡竭力葬祭皆有禮周𢎞祚妻安氏金縣人十八嵗于歸又六年而夫亡上奉翁姑下撫㓜子守節五十一年雍正十年具題旌表生員王顯猷妻陳氏金縣人夫故氏二十一嵗無子猷弟顯謨有子三人氏求一子立嗣矢志守節歴數載嗣子亦亡氏志堅金石又向叔求将次子承繼撫養成立楊兆奎妻梁氏河州人奎亡遺孤二嵗氏年二十二矢志守節葬夫後即持家事一切不以累舅姑舅姑或感傷則抱遺孤以解之以是舅姑感悦俱以夀終王起鳯妻王氏河州人鳯卒氏年二十八撫孤成立事舅姑始終一節韓萬才妻辛氏河州人家貧無子氏夫疾藥餌湯粥典賣什物供給及夫病故氏即於是日投井死時年三十嵗柴門興妻吳氏河州人門興為柬房吏迎新刺史至華隂道上中暑斃氏聞訃晝夜哭不食者數日女伴勸諭遂少食强起脱簪珥衣物作搬柩計至九月櫬歸停山荘是夜氏即縊死柩前賈興祖妻朱氏河州人生子麟甫三嵗次子僅一月氏年十九守節撫二孤日夜飲泣麟入泮次子亦成立生員朱衡妻楊氏河州人衡卒氏二十九嵗欲以身殉親姻以撫孤勸乃勉事姑嫜教育二子後二子同時入泮孫入泮者三人享夀八十四嵗王大元妻何氏河州人元病故氏年二十五嵗矢志不茹葷酒不御環珥惟閉户教子三子皆得成立享年八十而卒鞏昌府魏姜叙母楊氏冀人楊阜之姑叙為撫夷将軍屯歴城寨建安中馬超攻冀殺刺史韋康阜至歴城候叙母具言冀中事歔欷悲甚母慨然謂叙曰韋使君遇難豈一州之恥亦汝之負汝無顧我人誰不死死國忠義之大者但當速發我自為汝當之不以餘年累汝也因勅叙與阜參議阜乃與趙昂梁寛等合謀舉兵攻超超自出攻叙寛等閉冀門超失據因進至歴城執叙母母怒罵超遂殺叙母及其子而去阜上状魏王手令褒揚趙昂妻王氏名異天水人昂為羌道令留異在西㑹同郡梁雙反攻破西城害異二子異獨與六嵗女英在城中異見二子已死引刀欲自刎顧英曰爾當誰恃哉乃以溷糞涅麻而被之尠食瘠形自春至冬異竟免昂遣迎之未至三十里止謂英曰婦人無符信保傅不出房帷吾遭亂不能死惟憐汝耳今官舎已近吾去汝死矣遂飲毒而絶適有解毒藥灌之得甦建安中昂以參軍徙居冀㑹馬超攻冀異躬著布鞲佐昂守備又悉脱所佩環繡以賞戰士超攻急刺史韋康與超和超害康刼昂質其子月以要昂超妻楊聞異節行請與讌終日遂重相結昂得免於禍及昂與楊阜等結謀討超告異曰當奈月何異厲聲應曰忠義立於身雪君父之大恥喪元不足為重況一子哉遂共閉門逐超超奔漢中從張魯得兵還異復與昂保祁山超圍三十日救到乃解超卒殺異子月自冀城之難至祁山昂出九竒異輙參焉晉李暠妻尹氏天水冀人㓜而好學才辨有氣節暠之創業謀謨經畧毗贊為多齊畧陽垣曇深妻鄭氏字獻英滎陽人劉楷為交州辟曇深同行未至而卒時鄭年二十子文凝始生仍隨楷到鎮晝夜紡織旁無親援年盛美自厲冰操無敢望其門者居一年私装盡乃告楷求還楷愴然許之厚為之送於是間闗危險至鄉葬畢親教文凝經禮訓以義方元張忠妻劉氏伏羌人忠亡劉年二十守節終身至元二年旌表明百户王璵妻石氏鞏昌人璵卒石誓不二適奉舅嫜撫㓜子終身無失百户汪溶妻白氏鞏昌衛人溶卒白年二十有七蓬髮垢面晝織夜紝以鞠孤鐸鐸長能孝以奉節母指揮趙誥妻閆氏鞏昌衛人誥卒閆年二十七三日不食欲以死殉縊将絶家人救之甦諭曰殉夫固髙節奈二孤弱小将誰依因絶迹人事撫孤成立雖至親不能見一面百户胡鑑妻韓氏鞏昌衛人鑑卒子方七嵗茹苦守節鄉人稱之指揮閆橘妻陸氏鞏昌衛人橘亡陸年二十有五誓以死殉人謹防之不果守志六十五年未嘗見其踰户指揮汪川妻張氏鞏昌衛人川故張年十六奉養孀姑撫子成立守志五十餘年王愛妻朱氏鞏昌衛人朱年二十八而愛卒茹苦守節生員王彤妻李氏鞏昌衛人彤亡氏年二十四嵗誓不欲生一日縊於室家人覺而救之他日送母喪歸縊於室郡守與衛守聞而弔之指揮汪福妻葛氏鞏昌衛人年十九福亡孝事舅姑誓不再適舅姑殁葬祭盡禮詔旌表其門指揮董諒妻雷氏鞏昌衛人諒早卒誓不再適遺腹一子撫育成立襲父職以功陞都指揮詔旌其門米烈女名鳯安定人米金女年十七許聘王生而未歸王卒鳯欲徃弔父母不許乘間至王生柩所慟哭而返遂自縊宣徳間旌表王廷貞妻郭氏名二英安定人正徳中㓂亂破堡欲汚之二英大罵披其頰㓂刺其兩目而死生員王經妻方氏安定人經遇㓂被害方氏聞之號慟投崖死時年二十四趙全妻張氏安定人全墜馬死張至死所欲投崖親黨防之不果遂自縊賈時宜妻張氏安定人賈客死於淮張年二十有六痛夫客死偕女伴扶櫬歸里孀居四十年邑令表其事楊璿妻郭氏名順英安定人璿卒英年二十舅姑早喪守寡撫孤孀居六十年年八十終監生王應槐妻張氏安定人夫死遺妾二子㓜有白金六百張埋之甚宻及二子長有室乃集親黨出金均畀曰吾事畢矣年八十一終生員張嘉相妻李氏安定人年二十四相客死於外遺子襁褓慟哭欲絶舅姑憐之撫子裒以文行知名事聞旌表王虞封妻劉氏安定人年二十三封殁生子烈方兩月劉毅然守節烈後成立萬厯中旌表張某妻薛氏安定人年十七夫殁子勲始生氏撫育成立為諸生有聲有司上其事旌表王某妻南氏安定人夫殁南年十九誕子方三月足不踰閫垢面蓬髮守節六十餘年梢藻妻石氏安定人藻亡氏年二十一嵗遺子方三嵗水漿不入口欲從夫地下戚黨諭以翁老孤㓜廼弗死終養無闕儀子凌雲亦讀書成立廵方表之生員陳周典妻張氏安定人年二十夫殁子炳方在抱矢志求死自縊者數自是數十年語不謔笑容不膏沐杜時茂妻安氏安定人年二十一夫殁守志自矢嚙指血誓之撫二子成立縣令上其事旌表闖賊破城聞而義之一門免禍年七十七終生員李培妻楊氏安定人歸培僅朞年培殁年始十七誕遺腹子氏撫之舅姑每欲奪其志氏終不渝子如松癸未冬賊殺如松妻傅氏罵賊不受辱與夫同死康汝善妻陳氏安定人年二十五夫故氏守節子姓繁衍知縣應昌士上其事旌表生員賈學誼妻安氏安定人夫死殮畢宻行縊死帷側舉人景彦和妻陳氏安定人彦和卒陳年二十三矢死守節侍舅姑動循禮度孀處六十年卒生員張大器妻李氏安定人大器亡氏痛哭不食七日而殂李珩妻禮氏安定人珩亡氏自縊而死張大韶母杜氏安定人闖賊陷西安杜先期數日不食及城破杜義不受辱觸階而死貢生張國鋐妻楊氏安定人崇禎十六年冬賊賀錦攻安定城急鋐與里紳劉耀龍議丁壮禦賊女子運石接濟楊與劉之婦首運石闤闠女子因共運石及城陷楊抱石死於壕事定家人跡獲屍兩手猶抱石不脱生員張國維妻安氏張國頴妻彭氏俱以運石擊賊死於賊手石傳璽妻張氏安定人癸未闖賊克城掠張至兄大韶家繯其首死於窓櫺之下時年三十餘生員楊清妻王氏王三爵妻謝氏楊復堦妻石氏安定人俱從夫自縊廵方命建祠東闗生員李鶴妻郭氏通渭人鶴遘疾不起氏慿尸悲號氣絶者三家人防少懈乃付其女於伯氏梳櫛整容䝉被而卧以綾帕繫頸家人救蘇䝉袂覆面不復食越三日而殁年二十有五時嘉靖丁未生員楊必暢妻王氏通渭人必暢死氏年甫二十日夜號泣不食而死劉大俊妻金氏通渭人年十六適俊甫三載俊病風痺甚浴於邑温泉遇暴風雨山水陡發不能動氏在傍扶俊俊使急走氏號泣堅持不肯去與夫並溺死屍流數里兩屍始出氏猶挽夫不釋以㣲寠無後湮滅二十餘年萬厯四十二年知縣劉世綸上其事廵按彚題旌表宋棨妻張氏伏羌人夫卒氏年二十有九守節終身𢎞治中奉㫖旌表謝子顯妻張氏伏羌人夫卒氏年二十有七守節終身𢎞治中旌表按縣志二氏俱經歴張珏之女珏妻王氏性嚴謹有家範故二女同節悉䝉旌表㑹寧縣丞彭珏妻王氏河南鄢陵人正徳七年二月珏解糧入京㑹流賊破城突入縣衙欲擄氏去氏大罵曰犬賊何敢汚我衣冠家賊怒斧破其腦死事聞旌表任琦妻王氏寧逺人琦卒氏年二十守節撫孤上聞旌表生員周溥妻張氏寧逺人溥卒氏二十三誓死不二守節五十年勅賜旌表訓導魏文訓妻韓氏通渭人夫卒於官氏年二十五扶柩􅂝㓜男還鄉甘貧守節訓子成立任撫寧衛經歴年八十五卒李辰妻趙氏通渭人年二十夫卒氏方孕欲死以殉勺水不入者數日諸親苦勸始進饘粥後舉子貧甚備嘗艱辛撫子成立廵按表其門生員吳秉禮妻賈氏通渭人秉禮卒氏年二十餘守節撫孤雖内閫亦不輕出終日不舉火亦不向隣覔取二子俱成立鄉人髙之知縣劉世綸因公舉旌表廪生王大賔妻馮氏㑹寧人年十七歸賔逾嵗賔亡氏哭泣不食求死家人防之甚宻越旬餘稍懈就靈帷前縊死有司旌匾生員陳嘉賔聘妻張烈女名招姐㑹寧人㓜字于靖逺衛生員陳嘉賔既而賔家甚貧值嵗饑餓死女聞之痛哭三日不食其母叱詈之居頃有鄉人約其父母趨避以馬迎强娶之女持刀堅拒娶者懼䇿馬而回父母還責罵之女遂自縊何烈女名武英伏羌人何景元女也母早喪事父至孝嘉靖甲午流賊作亂入其家欲汚之武英怒罵力拒賊遂刺武英方刺時忽黄犬從傍嚙賊右股拽七八歩隣人楊景和聞喊恃勇赴救賊並景和與犬撲殺之邑人為立烈女祠舉人楊安妻賈氏伏羌人安卒賈年尚少守節堅苦年七十有七始卒安子景陞妻趙氏陞卒趙年二十二嵗以死自誓事姑賈曲謹終身無間言景陞子俊妻任氏俊亦早卒任年二十五守節不二俊子時濟妻康氏濟亦早卒康年二十二姑媳甘貧伶仃孤苦楊氏一門四世栢節鄉人景仰旌典未及鄭得時妻吕氏伏羌人夫死翁姑欲嫁之吕氏負㓜女投水而亡生員王加鼎妻王氏伏羌人夫亡悲哭淚乾繼之以血因而喪明生員魏成謨妻李氏伏羌人夫早亡哀毁成疾未及兩月亦死生員盧瀛妻李氏伏羌人夫早亡時李年二十五保恤二孤事姑至九十餘始終如一張震妻王氏伏羌人自二十嵗守節夀至六十撫前妻之孤視如己子始終無二黄栢妻馮氏伏羌人少年守節撫姪為子至于成立馮以夀終生員蒲輪妻楊氏伏羌人夫卒無子誓不改適孀居五十年清苦終身李萱妻王氏伏羌人萱卒無子守節年㓜至老不改涿州同知馮雲龍妻黄氏伏羌人早年守節賢聲茂著瀘州同知鞏養重妻杜氏伏羌人孀居三十餘年撫子成立清苦自持蒋毅妻李氏伏羌人夫亡堅志守節以養舅姑享年八十五卒盧志㑹妻安氏伏羌人合巹甫三月㑹卒安年十九誓死與夫同穴家人防之不果後守節六十二年王本義妻趙氏伏羌人夫亡趙年二十有二甘貧守節晝夜號泣絶而甦者三族人救之始得不死後六十九而卒陳嘉諫妻武氏伏羌人孀居從子者殆五十年足不履門鄉人頌之周某妻謝氏寧逺人夫亡氏年二十有六父母欲其别適氏曰遺腹在身何忍言此紡績自給不復至母家苦節五十餘年事聞旌表西和知縣耿桂芳子婦王氏嚴氏女五姐蠡縣人冡婦王次婦嚴與女五姐皆殊色崇禎八年賊夜破城三人懼為所辱同室縊死明日賊首揺天動見之亦為嘆惜邑人莫不髙其節生員張斗南妻張氏西和人年二十一流賊入城逼之行氏義不受辱紿賊前行率二子甲寅庚午投火焚死羣賊駭散王繼忠妻李氏西和人年二十四夫亡母姚孀居病垂危李傷母痛夫遂飲藥死田烈女靖逺人許字生員張廷表未娶廷表卒女悲泣奔喪父母阻焉抑鬱不食而死申大亨妻楊氏岷州人家極貧夫遘疾不能供湯藥氏以裙覆其夫乞米于隣及歸而夫已亡氏痛哭仆地即死知州李僑表其門蕭正遺妻李氏洮州衛人明末流㓂遍野氏少有姿色奔逃入山遇賊逼之氏持斧砍殺其賊乃被賊害千總劉三樂妻張氏西固所人天啟八年三樂故氏年甫十八欲以身殉或勸之曰幸有遺腹安忍盡節而絶夫後越七日果生一子命名𢎞聲撫育成立仍掌西固所印務題請旌表皇清駱元圖妻包氏隴西人年二十九夫故遺孤三人氏矢志撫孤遭荒典鬻度日長伯二伯相繼逝二婦亦皆去帷悉竭力如禮殯葬教誨諸孤以至成立雍正七年具題旌表李炳妻陳氏隴西人年二十一夫故僅遺一女矢志奉養翁姑家貧勤女工以易薪米翁姑亡喪葬盡禮伯嫂繼逝遺孤週嵗氏撫至成立無異己子鄉隣皆稱孝慈雍正七年具題旌表杜嶢妻石氏隴西人年二十一夫亡以奉翁姑育弱子自任翁司訓興安未㡬卒氏􅂝孤兒廷璋䟦渉千里扶櫬歸葬氏拮据課子為庠生守節五十五年雍正七年具題旌表生員景俊妻張氏隴西人性孝姑王氏患背疽氏吮膿中毒㡬絶復甦年二十九夫亡誓以身殉妯娌勸之撫孤以延夫脈孤學聖成立娶媳王氏景學聖妻王氏年二十五嵗學聖又亡姑媳相依一門雙節張年登八十苦守五十餘年王亦三十餘年雍正七年具題旌表劉俊妻馬氏隴西人夫故氏年二十七矢志養姑撫子子亦入庠雍正七年具題旌表張雄妻宋氏隴西人年二十七夫死遂引刀斷髮誓不改醮遺孤大經甫四嵗家貧撫子守節四十餘年雍正八年具題旌表劉斌妻趙氏隴西人二十三嵗喪夫孝事翁姑生養死葬盡禮事夫叔如翁撫夫九嵗㓜弟及長代為婚娶氏有遺腹一子教育成立守節三十五年雍正十年具題旌表石盤妻郭氏隴西人年十八夫亡遺孤未滿三月氏事翁姑育㓜子守節四十五年雍正十年具題旌表守備楊承綬妻司氏四川潼川州人夫承綬休致回岷州病故氏年二十一嵗守節撫孤四十三年雍正十年具題旌表李中梅妾張氏隴西人氏事夫與嫡室俱小心盡禮中梅亡氏年二十五嵗嫡室楊氏亦故嫡子甫三嵗氏愛如己出養而兼教厯三十餘年如一日雍正十年具題旌表杜暢盛妻周氏隴西人年二十四夫亡上事翁姑下撫子女孝慈勤儉守節三十一年雍正十年具題旌表楊興妻趙氏隴西人夫亡翁姑老孤子㓜氏守節三十餘年備嘗艱苦雍正十年具題旌表彭天修妻王氏隴西人年二十六嵗夫亡之後翁姑繼殁喪葬盡禮教訓孤子守節三十餘年雍正十年旌表李大綸妻楊氏隴西人年二十五嵗夫殁翁姑繼亡喪葬俱竭力盡禮家貧紡績度日苦節四十餘年雍正十年具題旌表李璉妻孫氏隴西人年二十七嵗夫亡氏事姑育子晝耕夜績矢志苦守已三十四年雍正十年具題旌表生員趙之英妻王氏隴西人英故王年二十五嵗三日不食自縊殉夫鄧楫妻嚴氏隴西人楫亡遺孤良材六嵗氏年二十有二守志不渝養親撫孤良材為邑庠生無何亦故遺孤彩氏復撫之婚娶生子鄧氏得延一脈生員羅在堂妻馬氏隴西人在堂逝事翁撫孤以孝慈稱康熈十四年吳逆叛偽将陳元經等竊據隴西捜括士民氏留子萬錦於翁側􅂝媳李氏女瑞蘭避居斗底山六月賊至氏手挽媳女墜崖下死同時避亂山中者有貢生陳文言媳陳氏邑増生李國祥妻史氏郡庠生王家駒妻謝氏女二姐聞氏死亦墜崖死生員張傑妻李氏隴西人傑為賊殺掠其婦送紅旗白四氏好言哄四他出及歸而氏已自縊生員董鎮妻杜氏隴西人年十六歸鎮二十二嵗夫亡翁老子㓜家貧矢志守節張嵋妻楊氏名慕潔安定人嵋死氏年二十四有遺腹及生男痛絶復甦親操井臼事舅至九十餘孤之翰為庠生雍正十年具題旌表岳存虎妻王氏安定人年二十一嵗夫於康熈二十年五月初六日病故氏號慟終日於初七日自縊柩前康熈二十一年具題旌表髙必達妻袁氏安定人十四嵗適髙未踰月髙逺遊雲貴氏竭力孝養其姑姑殁夫亦客死於外氏慟哭投繯家人救之得甦誓不復醮苦守五十餘年張嵐妻蘇氏安定人年十九夫死以女工給菽水事姑終身生員陳鵬翔妻曹氏安定人年二十三夫亡有遺娠母家欲奪其志氏決意不從數月後生子躬親女作教子以嚴子晨遂入泮以夀終卜元吉妻髙氏安定人夫亡年二十三舅欲嫁之聘者至門氏即剪髮擲地掣其耳環血淋漓滿頰姑素賢相抱而泣少頃髙紿入厠急趨投崖鄉隣救之得免安汝衡妻張氏安定人夫死年二十二水漿不入口者十餘日家人勸以撫孤大義始漸食後備歴艱辛訓子成立王延夀妻左氏安定人夫殁時年二十三嵗上事翁姑撫育㓜子克盡婦道三十年如一日雍正十年旌表生員王心一妻陳氏安定人年二十六夫故哀毁不欲生姑老子㓜歴盡艱辛事姑終身子亦成立趙之璧妻魏氏安定人氏有殊色夫久病遂垢面蓬頭家貧無子賣屋宻具二棺不使夫知夫死之夜遂自縊親友義而並葬焉㑹寧縣典史汪玉虹妻陳氏隨夫在任康熈十四年玉虹赴南安陳氏竭力事姑既而姑殁陳氏獨守靈幃六月逆賊破城賊兵入署百般拷打氏罵賊不屈遂投井而亡本年十二月具題建坊旌表髙近明妻何氏㑹寧人近明貧苦夫妻子女雇工於東嶽廟僧甯應貞康熈四十三年十一月十三日應貞强姦何氏不從将何氏中衣扯破氏罵詈奔出白知近明欲行控告至十二月二十七日又求行姦氏復拒罵和尚持棒擊氏氏女見母被毆用斧救䕶和尚奪斧砍死又入室砍傷何氏至次年正月初八日殞命和尚擬斬何氏殞身全節不受汚辱康熈四十四年具題旌表王有君妻王氏㑹寧人有君出外賣柴未回有王守本夙羨王氏少艾潛入卧室强逼求通王氏不從赶罵守本慮人知遂㧞塲門所植之椽連擊王氏頂心殞命王氏村荘少婦舎生殉節不為强暴所汚康熈三十七年具題旌表栁懋倫妻王氏㑹寧人懋倫病亡氏撫屍悲慟絶粒不食晝夜求死家人防甚力越三日含殮畢是夜遂以白練自經靈前生員吳友古妻王氏㑹寧人夫亡遺孤甫三嵗氏年二十有一課子成立苦節五十年王琮妻尚氏㑹寧人夫亡氏年二十五遺子二齡事翁姑以孝慈著聞守節六十餘年趙國璧妻王氏㑹寧人氏年二十三夫亡艱苦育子子入泮童生丁居南妻吳氏㑹寧人年二十五夫故遺孤丁中俊甫六月家貧立志守節教子中俊入泮年七十餘丁建南妻康氏㑹寧人建南故氏年二十一翁老子㓜守節歴五十年吳禹鼎妻梁氏㑹寧人夫故時氏年十九遺腹生子苦守成立梁任𢎞妻李氏㑹寧人年二十夫亡無子撫姪若己出鄰邑富室欲以百金奪其節氏聞之遂􅂝子獨居困饑寒者歴四十年王佐妻武氏㑹寧人佐死氏年十八嵗舅姑老遺子穉家甚貧與弟輔同炊未㡬輔夫妻亦亡遺孤亦在襁褓氏拮据盡瘁奉親鞠孤子姪成立苦節四十餘年生員吳其蘂妻李氏㑹寧人逆㓂破城家人奔竄氏以弱質懐七月孕賊至恐辱自投井中時年十七嵗武體泰妻杜氏㑹寧人于歸時方十四齡夫貧甚或採薪拾荼婦必隨之不少離夫死氏易櫬含殮撫棺而哭遂閉户自經死趙福禄妻栗氏通渭人福禄病亟遂絶粒不食及卒氏號慟三朝隨柩出乗間投崖而死學生王憲妻侯氏寧逺人憲亡氏年二十二子方四嵗家最貧氏拮据奉舅教子有成郭材妻王氏寧逺人年二十餘而寡子才五嵗撫之成立年八十四而終學生張熈妻李氏年二十一夫亡遺子燦斗始在襁褓拮据井臼燦斗長𨽻學宫鄉隣感嘆議将聞於當事氏知力辭年七十餘生員孔嗣昌妻董氏寧逺人昌早亡遺子甫二嵗家計蕭條父母勸之改適氏堅不從魏烈女寧逺民魏有禄女生長田間年十七有姿色父早亡獨母相伴家貧康熈三十四年七月間同里奸民窺其母他徃直入室逼之女怒罵不從隣里聞女喧呼聲徃瞰其人倉皇逸去女已自刎於室王麻狗妻吕氏寧逺人年及笄歸麻狗康熈四十八年七月間生一女甫數日麻狗病亡痛哭自投於地值家人皆徃送葬吕以新産獨留遂縊於室時年十九任濟民妻郭氏伏羌人濟民故氏年十八抱屍號慟遂自縊死舉人鞏敬緝妻蒲氏秦州人適伏羌縣舉人鞏敬緝翰林鞏建豐之長子雍正四年冬建豐督學滇南敬緝隨之任道卒訃至氏一慟氣絶妯娌撫慰誓不獨生乃奮身墜樓不死手足俱折家人防圍甚嚴乘間投繯自盡生員楊䝉妻樊氏漳縣人夫亡年二十四遺子僅週嵗撫棺悲悼欲以身殉親屬勸撫孤成立以至入泮守節四十餘年雍正十年具題旌表生員李定世妻趙氏漳縣人事翁姑生養死葬備極誠敬年二十八夫故遺孤八嵗㷀㷀獨立教子遊庠守節四十二年雍正十年具題旌表生員楊孚妻李氏漳縣人二十嵗夫亡遺子三氏立志守節女工度日艱辛萬状三十餘年人無間言生員汪漢宗妻包氏漳縣人年二十六夫亡遺子二長七嵗㓜五嵗又孤姪甫十嵗矢志撫育甘貧茹苦三子成立王氏漳縣庠生趙世基母氏夫故年二十七嵗世基方八嵗氏矢志守節誨子讀書冬月燈火弗繼氏拾乾糞煨火令以香頭映字卒列學宫生員侯天錫妻杜氏靖逺人順治四年年二十七天錫亡號痛㡬絶遺孤三子俱㓜家貧立志守節閲四十餘年如一日康熈三十二年題請旌表馬海妻楊氏靖逺人年二十海亡氏悲號絶粒自縊而死康熈十年具題旌表陳啟堯妻王氏靖逺人康熈二十四年夫亡王氏年三十一嵗引刀自刎家人救解得生復吞金簪頭不死日夜號泣絶食家人勸解隄防復自縊救解堯葬後二日防範稍疎遂縊死康熈二十六年具題旌表副将趙率倫妻王氏靖逺人總兵光瑞之繼母年十六歸夫光瑞甫三齡撫育若己出至二十七嵗率倫故守節撫子年七十三以子光瑞受封路守愈妻陳氏靖逺人年二十七夫亡家貧晝夜績紡以奉雙親喪葬俱如禮教子届逺讀書時值饑饉氏自咽糠粃以好食食子後氏面浮腫届逺疑每食必欲與母俱母誑使先食届逺堅不獨食氏遂泣下母子相抱而泣後届逺為監生曲盡孝道生員盧潢妻張氏靖逺人年二十三夫亡苦志守節年七十八終鄭治安妻席氏靖逺人年二十七夫亡守節事親遺腹生男撫之成立孝慈兼全馬興妻馮氏靖逺人年二十二夫亡遺一子苦志撫孤孝養翁姑子年三十又亡孫僅八齡氏復撫育成人卒年八十餘張成妻占氏靖逺人成亡時氏年十九生子僅三月苦志撫孤孝養翁姑韓有徳妻楊氏靖逺人年二十夫死苦節奉姑遺子二嵗撫至成立王天水妻張氏靖逺人年十八夫亡遺孤週嵗家貧苦守撫子成立杜槐妻劉氏靖逺人夫死氏年二十八遺腹生一子芝蘅立志撫孤事翁姑以孝聞張宷妻王氏靖逺人年二十而宷夭舅老失明奉侍維謹没則苴麻盡哀撫孤茹苦陳文耀妻張氏靖逺人夫亡氏年二十三事翁與繼姑敬養交至及終葬祭以禮武舉趙率泰妻葉氏靖逺人泰亡氏二十九嵗無子撫姪光璧以延泰祀苦節五十餘年路寅妻郭氏靖逺人事翁姑孝謹家貧菽水不繼年二十六夫亡四日即絶粒投繯以死韓育惠妻黒氏靖逺人夫死年二十三遺子甚㓜氏傭績以哺孤兒方至成立營兵楊暢茂妻展氏靖逺人暢征川陣亡氏時年二十八苦節撫孤傅良棟妻左氏靖逺人年二十七夫亡奉養舅姑喪祭盡禮教子光俊入泮王徳元妻劉氏靖逺人年二十三夫故遺孤道昌撫教完娶道昌復早逝遺孫五人鞠育成人氏年百有二嵗曽孫林立營兵李國昺妻張氏靖逺人昺陣亡氏年十九甘守苦節事養翁姑殯葬以禮撫二子成立享年七十有一豆生桂妻陳氏靖逺人夫死氏年二十一二子俱㓜貧無所倚撚毛線度活二子俱成立劉爵妻馬氏靖逺人爵征川陣亡氏年十八並無子女甘貧苦節女工自給吕元聲妻王氏岷州人夫亡年二十七嵗家貧矢志守節養翁姑撫孤兒厯四十五年雍正十年具題旌表楊桂齡妻閔氏岷州人二十四嵗夫故無子止有一女氏斷髮誓守針指自給撫育弱女成人婚嫁守節五十八年雍正十年具題旌表生員徐永清妻虎氏岷州人年二十三而寡苦節四十年撫孤成立楊佳棟妻張氏岷州人年二十四夫亡苦節四十餘年撫孤成立徐添順妻陳氏岷州人添順以牆崩壓死氏痛哭三晝夜勺水不入口誓欲從夫地下家人防之稍疎遂自縊死王旦召妻周氏洮州衛人年二十三嵗夫故遺孤承堯未周嵗氏苦節撫子及長性至孝飲食起居必親焉氏夀一百一十三嵗承堯九十嵗人以為節孝夀考並出一門馬體元妻張氏洮州衛人年二十一嵗夫亡遺孤甫周嵗家極貧無翁姑兄弟族之伯叔逼之改嫁氏誓死不從以針指撫孤成立以夀終劉世華母談氏西固人夫在日賠納屯糧十餘石夫亡年始二十遺孤始生志勵冰霜身任耕織招佃墾田糧無賠累家漸饒裕遺子成立夀八十有竒平涼府後漢皇甫規妻安定人不知何氏女妻善屬文能草書時為規答書記衆人怪其工及規卒時妻年猶盛而容色美後董卓為相國承其名聘以軿輜百乘馬二十匹奴婢錢帛充路妻乃輕服詣卓門跪自陳請辭甚酸愴卓使傅奴侍者悉㧞刃圍之而謂曰孤之威教欲令四海風靡何有不行於一婦人乎妻知不免乃立罵卓曰君羌胡之種毒害天下猶未足耶妾之先人清徳奕世皇甫氏文武上才為漢忠臣君親非其趣使走吏乎敢欲行非禮於爾君夫人耶卓乃引車庭中以其頭懸軶鞭撲交下妻謂持杖者曰何不重乎速盡為惠遂死車下後人圖畫號曰禮宗云北魏貞女兕先氏涇州女許彭老生為妻聘幣既畢未及成禮兕先率行貞淑常自舂汲以養父母老生輒徃逼之女曰與君禮命雖畢二門多故未及相見何由不禀命父母擅見陵辱若茍行非禮止可身死耳遂不肯從老生怒而刺殺之取其衣服臨死謂老生曰我所以執節自固者正欲奉給君耳今反為君所殺若魂靈有知自當相報言終而絶老生持女珠瓔至其叔宅以告叔叔曰此是汝婦奈何殺之天不祐汝遂執送官太和七年有司劾以死罪詔曰老生不仁侵陵貞淑便可戮之女守禮履節没身不改宜賜美名以顯風操其標墓旌善號曰貞女明指揮僉事甘忠妾彭氏平涼衛人正統八年忠死氏哀戚不絶自縊於室事聞旌表張經妻劉氏華亭縣人有二子平康徳隆女春姐正徳十年敵入㓂掠劉氏及春姐執赴北驅以刃氏及女咸大罵承刃死之後二子俱仕魯烈女涇州人年二十嘉靖元年春㓂掠婦女皆脅以從氏獨冐刃罵賊而死廵按俞茂堅立碑表其墓趙廷璧妻彭氏平涼縣人年二十三生子雲漢即寡翦髪納於璧棺雲漢稍長亦薄遊客死氏撫㓜孫守敗屋常空腹年八十餘嘉靖丙辰年饑餓而死生員梁思聰妻張氏平涼人聰早卒氏年二十一家極貧二子俱㓜氏誓不他適立志守節女紅自給日不再食初志彌篤苦節貞操五十年萬厯中廵按徐喬遷題請旌表生員張化龍妻謝氏平涼縣人夫痼疾氏侍湯餌唯謹至溺矢狼藉牀褥間日為拭浣三年終無倦色夫久病多恚稍不慊意即大詬氏婉詞謝之夫死三日歛畢是夕縊死於柩前朱朗釿妻孫氏平涼縣人夫亡遺子海山方數嵗氏託之翁姑七日不食未死以刀自剄遂同穴葬生員朱復初妻張氏平涼縣人夫亡氏守節撫子璟入庠李自成攻陷城大肆刼掠氏自度孤孀恐或見逼遂投井死其子璟亦從死烈婦孝子人皆哀之楊自有女孝姐平涼縣人明末流賊猝至父母俱逃散孝姐以汚泥塗其面匿薔薇叢中賊捜得脅之行大罵不從而死教諭黄錦妻李氏崇信人錦卒氏二十六嵗撫遺孤彦相守志涇州何某從其父求婚氏告父曰生則與夫配死當全節擲以熾湯何愧遁靈臺李某亦聞其賢從其兄求婚適嵗凶兄以餓死懼之對曰死則死耳涕泣峻辭閉門不納其兄鄉黨聞之莫不肅敬學生黄彦相妻李氏崇信人夫死守節亦如其姑督學姜表其賢曰一門雙節教諭梁自立妻蒲氏崇信人遇難避匿山窟賊攻執之氏不受辱賊持刃脅從氏罵不絶口遂遇害貢生梁毓龍妻闗氏崇信人蒲氏之媳也㓂至病不及避方著禮服持繩自縊為賊所阻賊惜其姿色不忍加害怒罵不休堅意求死賊殺之趙存謨妻闗氏崇信人謨卒霜操自矢遺子國掄訓誨備至卒底成名劉三重妻劉氏崇信人三重遘篤疾病不可忍暗投崖下氏覺亦號泣投崖夫婦同死觀者如堵庠生馬若豸妻闗氏崇信人豸卒甘貧守節撫子成立張國珍妻朱氏崇信人國珍被㓂掠三年未還氏茹苦自守母與叔謀令他適已與某姓定聘氏泣曰媳去誰事姑且兒歸奈何況子尚孩提耶執不應母迫促之氏度不可回乃紿母曰母命不敢違然嫁時衣裳須檢㸃也遂入室縊死生員薛銓妻閻氏華亭人隴州鴻臚閻仲容女也識古訓有家風事姑甚執婦道銓早死氏年二十九哀毁甚誓不他適家室匱乏艱辛撫孤成立年七十餘卒柴安慶妻李氏華亭縣人安慶早死無子氏孤苦守志食貧五十餘年夀八十卒辛永康妻劉氏華亭人生子女各一永康家貧典史冷霖困楚之歸匿窖中自縊氏甘貧守節撫養子女雖昆弟未嘗言笑每耕耘使子伺道無行人乃適田紀言妻李氏華亭人産未彌月流㓂陷城一賊入其家欲汚之氏紿賊近牀以切麫刀斫死後數賊入殺氏碎其尸知縣石起鳯妻趙氏華亭人流賊陷城恐為所汚潛入南察院自縊死生員潘雲霄女潘烈女華亭人未出閨流賊逼之投井而死賊見者並為垂涕王永紹女王烈女華亭人甫笄未出閨㓂陷城執之女大罵不絶賊怒加捶楚女罵愈厲以首觸石尋見殺知縣馬選魁妻陳氏華亭縣人崇禎七年魁赴京謁選氏聞賊警􅂝㓜子與侍兒匿石渠山谷中賊尋陷城執其僕問主母所在脅與至匿所索數日甚急陳氏知不免乃以子付侍兒藏短刃出紿賊曰若欲吾從幸勿傷吾子行至蕭氏荘逼之陳氏瞋目厲罵遂出刃自刎而死賊相顧駭愕去事聞勅旌其節贈孺人李廷璧妻張氏鎮原人年二十喪夫守志撫孤卒年八十李時暢妻黄氏鎮原人夫應貢卒於京氏年二十􅂝子扶柩歸守節四十餘年生員范孟堅妻王氏鎮原人少年喪夫無子守志終身廵按表其門段應試妻張氏鎮原人年二十孀居家極貧親黨屢逼改適氏輒以死拒之守志撫孤二子俱成立年七十餘終生員段大章妻董氏鎮原人年三十夫亡哭泣殞身廵按范立朝上聞建坊旌表張世龍妻戴氏鎮原人年二十四孀居守節不渝卒年八十生員段徽妻張氏鎮原人年二十餘夫故晝夜哀泣水粥不下咽者五日食苦杏仁數粒而死馮宣妻趙氏固原州人年二十三而寡家貧守節撫育㓜子夀八十四彭珏妻楊氏固原衛人年二十四而寡家貧誓死自守夀七十七黄淮妻夏氏固原衛人年二十四生二子未周月淮亡氏撫遺子養舅姑姑憫其孤窮欲嫁之氏以死自誓為女工以給養夀七十三梁輔妻王氏固原衛人年二十三輔亡有二子在襁褓備歴艱苦勤女工以養姑育子凡五十餘年鄉人重之夀八十三生員趙欽妻葉氏固原人年二十五欽卒遺二子甫三嵗氏撫養劬勞備歴艱辛雖親戚邀請亦不徃百户陳琮妻郭氏固原衛人琮戰没氏年二十四撫孤源嗣官夀八十三旌表其門生員翟元妻白氏固原衛人年二十五元亡貧苦撫遺孤成立鄉里稱賢夀六十三生員周繼妻張氏固原人繼没氏年二十五撫育㓜子有司表之生員徐效妻張氏固原人效殁氏年二十七鞠育二子咸成立夀八十有四有司表之李子友妻温氏固原州人子友殁氏慷慨以殉時年二十四天啟中旌表景可樂妻李氏固原州人可樂以疾卒氏哀傷死單養棟妾趙氏固原州人養棟死氏方十有九嵗夜殉柩前韓杞聘妻徐貞女固原州人受應襲韓杞聘未合􅈟而杞殤女聞之潛自經死生員魏宗一妻趙氏涇州人氏年十八生子僅三月夫亡誓與夫同死或勸之撫遺孤卒成人寡居四十餘年雷秀貞涇州人年十八家貧採蔬於野惡少辛添禮方鋤逼而求通女叱號力拒以蔬刃刺禮禮反鋤擊女頸垂絶而逃女父執禮聞廵按吉澄論禮死而表女門進士楊重妻毛氏靈臺人重早喪氏方盛年育一男一女撫養教訓有方女適解元劉鉞男森為廪生皆先氏而卒艱難辛苦節操愈勵年八十一嵗卒人無間言舉人史詳妻閭氏靈臺人詳亡時氏年二十餘守節終身人常曰父死於忠女終於節父子皆無悔焉習文妻楊氏靈臺人夫故氏方二十嵗守節事舅姑朝夕匪懈撫遺孤耕讀繼業甘貧固守年七十有五艱苦備歴張企和妻姚氏靈臺人年二十三嵗夫故孀居六十四年善事舅姑撫育㓜子享夀九十卒事聞旌表習良民妻陳氏靈臺人年二十夫故家貧有求娶者輒縊㡬死事姑楊氏躬持巾櫛及殁氏哀痛泣血殯葬盡禮撫孤子成立年七十有三艱難苦楚老而彌堅按院題請旌表生員盧閣妻王氏靈臺人夫卒氏二十一嵗事翁姑育㓜子饑寒備經始終無渝生員茍士元妻胡氏靈臺人士元以應鄉試暴卒氏號泣日夜不息親隣勸諭方進飲食遺二子長亦卒其翁姑垂白晨昏侍養無少怠及殁哀毁切痛聞者稱嘆事聞旌表吕九功妻李氏靈臺人嫁踰年夫故遺腹三月氏即矢志誓不再適撫養孤子奉侍老姑年八十視膳問寝日夕不懈嘗涕泣祝曰姑幸無恙兒長為吕家後夫其有知庶暝目乎彭水令姚惟兢妻李氏靈臺人氏及笄于歸遂值姑喪孝謹盡禮前室遺子氏撫養愛逾己出相夫宦所聞有鞭扑之聲氏即温言勸之夫卒氏方盛年矢志苦守閨閫矜式王氏靈臺人王養貴女適隴州民未一月因元宵節歸寧被流賊掠去執刀挾制之氏涕泣罵詈强奪賊刀並撲崖求斃賊感其節烈釋之氏歸父家以為身雖全節手已受辱適其夫至氏佯慰之即於是夜自縊貢生李思芳妻董氏隆徳人芳卒氏誓必死遂不食七日卒多烈女靈臺庠生多藎臣之女因父早卒未及聘嫁明末流㓂攻掠城邑女避於隠形山北窰窨内被賊捜山獲之見其姿艾舁之馬上女不從躍投地下者三次賊以美言誘之女兩手遮面罵不絶口賊怒遂斷其手而殺之曹椒葉静寧州人曹福女生而端荘不輕言笑工女紅暇則其父教以列女傳許配王守正未嫁而守正死曹氏聞之懼再婚不食而死生員吳應正妻党氏静寧州人為女時父党禮病目痛不能忍欲自盡氏多方防救哀毁㡬絶延醫調治有人謂曰欲目明須以人肉食之氏潛入室舉刀割股烹羮以進父食之其目果愈人咸以為至孝所感知縣馬應麟妻婁氏静寧州人年二十五夫亡守志毎撫二子泣曰非汝輩我當從爾父於地下矣後子成立夀八十六監生周塘妻沐氏静寧州人年二十二夫故氏毁形自誓茹苦守志每撫孤泣曰須爾成立爾父始瞑目九原矣後子成人氏夀八十監生張琔妻陳氏静寧州人年二十四守節孝事翁姑遺孤甫三齡鞠育成立卒年八十三貢生方向妻唐氏静寧州人向卒遺四子氏年二十七守節教子常泣責諸子曰爾等無成我何顔見爾父地下子皆悲憤勵志鄉貢者二人長應規知楚雄縣事仲應矩任崞縣簿卒年八十有六學博李淳妻王氏静寧州人居水洛城值㓂變賊入其室挾氏欲亂氏怒罵拒之賊益逼氏投井而死生員邵騰鳯妻霍氏静寧州人崇禎七年流賊突入荘舎氏被執忿罵頭觸石死監生杜汝楫妻朱氏荘浪縣人年十九楫亡舅姑在堂遺孤良琨㓜氏哀毁㡬絶尋悟托孤重於死節乃矢志養親撫子後琨為崞縣簿甚孝守節五十餘年貢生楊文英妻岳氏荘浪人英卒氏年二十有五嫠居逾五十年撫孤從學官典膳䝉冠妻蒋氏荘浪人冠亡氏年二十一誓不獨生時姑尚在遺孤在抱諸親勸諭至再方起乃竭力奉姑撫孤成立孀居五十餘年年七十六卒杜繼美妻崔氏荘浪人明末流㓂入其荘舎欲犯之抗節不屈罵不絶口竟遇害王篤妻荘浪人失氏明末流㓂入荘欲汚之氏遂假事誑賊稍寛竟投崖死進士齊廷珪妻張氏隆徳人珪卒氏産一子在襁褓中時年十九常慮為家人所逼防禦甚固卒撫孤成立終其身同知楊文奎妾劉氏隆徳人文奎卒氏年二十七家人勸以更適氏以死自誓遂撫孤終身年八十三卒同知齊恩妾張氏隆徳人恩戰死氏年二十六痛其夫没於王事而孤未成立遂以死自守撫其子終身生員剡英妻王氏隆徳人英亡氏年二十六泣曰吾誼當從死但無如遺孤何耳遂撫子就學後子亦成諸生鄉人畢賀王感鬱成疾泣曰吾極知可喜顧恫廼父不見以此鬱鬱不能自解耳疾遂不起卒生員劉鉞妻靳氏隆徳人鉞亡氏年二十八遺孤甫一嵗貧甚靳撫其孤艱苦五十餘年生員劉棟妻辛氏隆徳人棟卒氏年十八棟上有父母遺孤二在襁褓中氏泣曰父母饑寒嗣續存滅盡在我身遂矢死自守奉養翁姑撫育二子人無間言後二子俱成立氏年九十卒生員李成梁妻閆氏隆徳人梁卒氏年十九遺一女哀毁殆将滅性遂成疾父母致醫藥不肯服曰苐恐不得死耳臨絶瞪目顧家人曰得死所矣語訖目瞑生員閆汝化妻王氏隆徳人夫卒氏哭泣晝夜不絶兩目遂瞽成疾積數月病革氏有一子呼之曰吾今得從爾父地下遂卒時年二十生員趙應科妻范氏隆徳人夫卒遺孤年十三氏哀毁不食家人勸曰此子與爾為存亡者也撫孤與殉死孰重氏悟遂强飯卒撫其子獲成立許登海妻張氏隆徳人家甚貧登海死氏年二十九採薪拾馬矢炊糠覈而啖之夏日冬夜不免凍餒煢居三十餘年卒閆榮妻董氏隆徳人榮卒氏年二十九無子寡居四十年備嘗艱辛苦節生員雍學易妻孫氏隆徳人易卒有老母遺子纔三嵗氏備極艱難事姑色養撫成其子年七十八卒武生王信妻董氏隆徳人信卒氏年二十五奉翁姑育㓜子翁姑殁質衣市殯葬物遺孤獲成立氏年踰七十卒杜老女隆徳人杜曰山女曰山老無子家甚貧同縣民梁宰求聘女為妻父将許之女曰父母老無子止一女女嫁父母曷依自誓終身不嫁拮据力作以養父母父卒營葬畢復竭力養母越十八年母卒營葬畢女遂曰吾已許父母不嫁矣今復嫁是渝言也且父母墳墓何託乎終不嫁煢苦自守年踰七十卒鄉人感其孝呼曰老女真陽令董三秦妻于氏隆徳人三秦為宰多有惠政氏多從内贊成之三秦卒氏寡居四十年撫教三子俱以明經入仕有司疏其節行詔縣給米嵗十二石綿布嵗十二斤終其身王厯妻董氏隆徳人真陽令三秦女崇禎七年賊犯隆徳城破氏率二女同赴池溺死三日尸浮出顔面如生段烈女隆徳人父遇科字同縣李氏崇禎八年為賊所執堅守不可犯賊逼之嚙其左擘力拒之賊怒刃殺之時年十六雍烈女隆徳人父鳯鳴賊克縣獲之女堅執不從賊手刃殺之監生方大儒妻雍氏隆徳人儒卒氏持節自守賊犯隆徳城陷自縊死生員張士俊妻齊氏隆徳人明末賊克城氏從士俊並三子俱赴井溺死何自新妻仇氏静寧人賊至自縊死賈徳友妻陳氏静寧人㓂掠罵賊剖腹而死皇清姚永福聘妻何氏平涼縣人同鄰婦採苦於野田進禮見氏少艾乘其空野强拉求姦何氏堅拒呌罵􅎲裂進禮面貌進禮用掀把擊何氏頂心仆地殞命何氏因强姦不從被殺康熈三十七年具題旌表王應亨妻沈氏平涼縣人應亨逺出有生員郭鍾者排入其室戲誘之沈變色正詞叱之郭懼出氏遂自縊死雍正二年具題旌表紀成妻閆氏平涼人甫婚娶王輔臣叛為賊逼投崖落崖半樹稍未墜賊退援之三日始甦年二十一夫死遺腹八月生子辛苦鞠育成立夀七十八祁化普妻崔氏平涼人年二十五夫死歴盡辛苦背糞壅田養姑撫子普係庶出兄屢逼嫁暗通媒妁欲强娶氏以死相拒而免貢生連泰㧞妻王氏平涼人明末流㓂犯境㧞中矢斃氏年十八子甫週嵗苦節自廿流離顛沛無渝志年八十餘而終生員陳志妻王氏平涼人志故王年二十三嵗産遺腹子勛備極艱辛撫養成人年八十二而終生員賈文煐妻張氏鎮原人年二十八嵗夫故守節事姑養生送死無憾撫遺腹子成立雍正二年具題旌表生員段淑古妻賈氏鎮原人二十五嵗夫亡未有子女氏守節奉姑曲盡孝道歴二十八年姑殁喪葬盡禮雍正十年具題旌表脱海龍妻趙氏鎮原人遇兵避趨崖窟海龍後奔氏遥望見夫為追兵手刃仆地遂投崖而絶土人憐之立石碣於道旁王𢎞綱妻柴氏固原州人年二十二夫亡撫孤守節嵗遇荒歉日不舉火以死自守守節三十一年孝養翁姑撫二孤成立康熈十六年具題旌表生員趙國寧妻尚氏固原州人夫亡氏年二十八孝養翁姑後相繼逝喪葬盡禮撫子成立夀九十三嵗康熈五十年具題旌表馬志啟妻李氏固原州人啟故氏年二十二欲自絶念翁姑在堂堅志毁形守節雍正三年具題旌表段氏固原州人因夫兄陳大年自外醉歸見其弟在書館歇宿逕奔段氏卧房求合段氏拒罵大年掌擊棍毆殞命投屍井中将陳大年擬斬段氏强姦不從以致身死雍正九年十二月具題旌表黎天禄妻吳氏固原州人天禄亡氏年二十六持刀自刎官立石表之曰白刃明心殺身成仁吳承恩妻韓氏固原營守備韓寧女姑病刲股和藥以進疾竟瘥功加守備文理妻王氏固原州人文理於雍正七年出征巴里坤至十年七月二十七日在軍營病故十一月􅂝骨回里王氏聞訃悲號即欲捐生因防守嚴宻於是月二十三日賺母歸爨投繯自盡生員楊嘉玥妻栁氏固原州人玥疾篤氏以死許玥及卒家人共防之氏衣麻衣三日悲戚不甚防稍疎氏潛自縊年未滿二十生員李瀛妻于氏涇州人年二十四喪夫守節撫孤成立儒童李永蓁妻閭氏涇州人氏年二十五蓁亡撫週嵗孤兒苦節六十餘年蘇氏涇州民婦王輔臣叛逆平涼氏與李氏俱被兵虜臨崖遇水投河而死李氏涇州民婦與蘇氏被兵掠相繼溺水死州牧閆豎碑表二氏墓荘邑生員劉琯妻夏氏静寧州人夫卒無子氏年二十六歸母家守節㑹父兄繼逝養母撫姪終身無二志生員王傅妻王氏静寧州人與張氏同被兵掠拘於一室經一索死常能妻張氏静寧州人同王氏死時被拘者尚多惟二氏懼汚自經荘浪縣庠生張標妻楊氏静寧州人王輔臣之亂氏被兵獲欲汚之堅拒不從自刎而死賈徳友妻陳氏静寧州人罵賊剖腹生員楊盛業妻李氏荘浪人盛業死氏年十九欲殉之因前妻遺二㓜子撫孤守節至老不改生員張爾紳妻齊氏隆徳人年二十七夫亡遺二㓜子家貧翁老荒嵗絶糧旬日不能舉火以豆渣充饑族人欲奪其節死争得免葬翁教子歴盡艱苦年七十五嵗杜偉妻程氏隆徳人年十八夫亡泣欲從死遺腹三月後生子食貧撫誨年六十一董福妻髙氏靈臺人二十喪夫孝養翁姑值逆賊為㓂兼嵗饑能以禮送葬子方週嵗撫訓成立生員張大倫妻吳氏鹽茶㕔人上事孀姑極盡孝養氏年十九甫生一子未朞夫殁家道貧寒勤苦紡織撫子長成屏跡家居並不出外守節五十餘年始終如一雍正三年具題旌表甘肅通志巻四十二
