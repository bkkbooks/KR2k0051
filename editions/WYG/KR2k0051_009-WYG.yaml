body:
  text: 欽定四庫全書甘肅通志巻九學校庠序之設教育人才風化之本其道甚重自漢迄眀科條漸備盛朝文治駕軼前代比年考校三載賓興六年選拔期得賢才以襄政治菁莪樸棫應有俊髦嚮風蔚起甘屬各郡澤宮之制創立修舉考據宜詳志學校臨洮府臨洮府儒學學宮在府治東元泰定二年同知都總帥府事祁安建眀洪武二十五年教授前太常寺少卿劉傑重建皇清康熙三十五年知府髙錫爵重修學署教授在學宮左訓導在教授署東學生一年一貢廩四十缺増四十缺入學每歳考取文武生各十五名科考取文生十五名學田九頃四十畝有奇前眀駕部郎楊繼盛謫狄道時捐俸買置徴租養濟貧士今每年實徴租粮一百石七斗七升五合超然書院在府治東嶽麓山半楊繼盛治洮時買建教諸生于此今累次重修義學在府署對門今移洮陽驛廢署内一在東闗知府衞封濟捐設狄道縣儒學學宮在縣治西洪武五年知府段嗣宗建萬厯間移建府學左後復撤之眀末知縣禇泰珍重建故地至今屢修學署教諭在學宮右訓導在堂後學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各十二名科考取文生十二名學田二頃眀知府王曰然捐置又郡人祁姓捐置二處今皆無可考稽分給府學租糧義學在城隍廟旁渭源縣儒學學宮在縣治東眀洪武四年知縣党茂建嘉靖十年知縣楊璉重修皇清康熙二十一年知縣張𢎞斌訓導張淑孔重修學署訓導在學宮右學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各八名科考取文生八名學田租糧三十九石八升又學租銀一兩九錢社學在闗外蘭州儒學學宫在州治東南元至元五年知州姚諒建眀洪武八年知縣黄鎮重修嘉靖三十八年兵備副使彭燦重修皇清康熙五年巡撫劉斗補修重新學署學正在學宮左訓導在學宮右學生三年二貢廩三十缺増三十缺入學每嵗考取文武生各十五名科考取文生十五名學田實徴租糧三十石一斗折銀一十二兩四分正業書院在新闗路北雍正元年巡撫盧詢捐俸設立並置射圃建立坊表共費八百餘金雍正七年巡撫許容布政使孔毓璞按察使李世倬復設立義學捐俸延師訓誨單寒子弟東社學在城東北康熙七年巡撫華善捐置西社學在城西北康熙七年巡撫華善捐置以上二學雍正七年巡撫許容布政使孔毓璞按察使李世倬設立義學與書院一體通行金縣儒學學宮在縣治西元至治二年判官傅夢臣建眀成化十二年知縣李士俊重修天啟六年知縣趙烱復修學署訓導在眀倫堂左學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各八名科考取文生八名學田一頃七十四畝租糧一十石四升半給廩生半給貧士社學在縣治西康熙五年知縣王之鯨捐建河州儒學學宮舊在州治西南本元儒張徳載家塾延祐六年徳載孫文煥捐改儒學史臣倪鏜有記眀洪武五年設州為州儒學十二年改置衛學成化間復改為州儒學皇清康熙八年監収㕔黄綬重建五十四年知州王全臣因前地形湫隘移建于州治東南學署學正在眀倫堂左訓導在學正署左學生三年二貢廩三十缺増三十缺入學每歳考取文武生各十二名科考取文生十二名學田租糧九十石八斗歳給廩生寒士今四十石分贍學官大書院在儒學右康熙四十五年士民公建小書院在州治左同時建社學二一在大城一在南闗俱康熙三十三年同知劉永祺設四十四年知州王全臣又増立鄉學共十處鞏昌府鞏昌府儒學學宮在府治東南元中統初建眀兩經改徙皇清康熙二年始定今基學署教授在學東北訓導在學東南學生一年一貢廩四十缺増四十缺入學每嵗考取文武生各二十名科考取文生二十名學田每年于隴西縣學田内支給崇羲書院在東闗内眀嘉靖十四年巡按王紳建崇文書院在城南正街康熙二十八年知縣楊本植因舊縣治改建今為提學考院義學在府治東南總鎮廢署隴西縣儒學學宮在縣治東南學署教諭在府學西訓導在教諭署北學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各十五名科考取文生十五名學租每年額徴銀二百四十兩零與府學諸生分支義學一在縣治東鐘樓街一在學宮左側道廢署一在縣治東北察院廢署一在縣治東北按院廢署安定縣儒學學宮在城内街西學署教諭在敬一亭左訓導在右學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各十五名科考取文生十五名學田九頃六十六畝義學在東闗街北康熙五十七年設通渭縣儒學學宮在縣治西眀洪武初建成化萬厯間皆重修學署現在修理學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各十二名科考取文生十二名漳縣儒學學宮在縣治東久圮學署訓導在學宫旁學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各八名科考取文生八名㑹寧縣儒學學宮在縣治東眀洪武六年建正統成化𢎞治間凡三遷嘉靖間復舊址萬厯六年重修學署訓導在敬一亭西學生二年一貢廩二十缺増二十缺入學每嵗考取文生十五名武生十二名科考取文生十五名伏羗縣儒學學宮在城西南眀天啓七年自河北移建學署訓導在眀倫堂東學生二年一貢廩二十缺増二十缺入學每嵗考取文生十五名武生十二名科考取文生十五名學田徴租糧二十六石寧逺縣儒學學宮在縣治東北眀洪武二年建學署訓導在學宮内學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各十二名科考取文生十二名學田一百畝西和縣儒學學宫舊在縣治西今以眀倫堂改建學署訓導在内學生二年一貢廩二十缺増二十缺入學每嵗考取文武生各八名科考取文生八名學租銀五兩領自司庫靖逺縣儒學學宮在城東南眀正統三年