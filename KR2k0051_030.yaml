body:
  text: 甘肅通志卷三十名宦名臣碩輔秉節保釐良牧循吏綰符守土保障岩疆功在社稷勞心撫字澤在生民當時沐其恩膏奕代傳其政績召棠峴碑遺澤猶新考其時代傳其姓氏芳型雖逺吏道之師志名宦甘肅總制文武大臣秦蒙恬恬世為秦將秦既並天下使恬將三十萬衆北逐戎狄收河南築長城因地形用險制塞起臨洮至遼東延袤萬餘里於是渡河據陽山逶蛇而北居上郡是時蒙恬威振胸奴漢衛青字仲卿平陽人初為侍中後為大中大夫元光六年拜車騎將軍擊胸奴出上谷至籠城斬首虜數百元朔二年又取河南地為朔方郡封為長平侯後上郡朔方數被寇掠元朔五年令青將三萬騎出髙闕禦之大捷獲其裨王十餘人及衆男女牲畜皆為漢得還至塞天子使使者持大將軍印即軍中拜青為大將軍諸將皆以兵屬立號而歸益封青六千户霍去病大將軍青姊子也善騎射再從大將軍出塞斬首虜二千餘級得相國當户斬單于大殳行籍若侯産生捕季父羅姑比封冠軍侯元狩三年以驃騎將軍將萬騎出隴西踰烏盩涉狐奴轉戰六日過焉支山千餘里合短兵鏖臯蘭下殺折蘭王斬盧侯王執渾邪王子及相國都尉首虜八千九百六十級收休屠祭天金人益封二千二百户其夏與合騎侯敖俱出北地異道去病深入過居延攻祁連山捕斬甚多益封五千四百户日親貴比大將軍其秋渾邪王與休屠王謀降漢去病將兵迎之渾邪王禆將有二志欲遁去去病馳入與渾邪王相見斬其欲亡者八千人遂獨遣渾邪王乘傳先詣行在所盡將其衆渡河降者數萬天子嘉之益封千七百户減隴西北地上郡戍卒之半以寬天下徭役元狩四年上令青去病各將五萬騎出塞外去病躬將所獲葷允之士約輕齎絶大幕獲其大纛與主帥三人將軍相國當户都尉八十三人封狼居胥山登臨瀚海益封五千八百户卒諡景桓李息郁郅人武帝元鼎間為將軍西域既通置河西郡後先零羌合兵十餘萬圍枹罕息與郎中令徐自為將兵十萬人擊平之始置護羌校尉持節統領焉趙充國字翁孫隴西上邽人後徙金城昭帝末與霍光定䇿立宣帝封營平侯為後將軍宣帝神爵元年西羌楊玉等背畔充國年七十餘上老之使御史丙吉問誰可將者對曰無踰老臣者矣又問將軍度羌虜何如當用幾人曰百聞不如一見請行至金城圗上方略乃大發兵充國將之上屯田便宜十二事留屯湟中二年五月充國奏羌本可五萬人除斬降溺飢死者定計遺脫不過四千人羌靡忘等自詭必得請罷屯兵奏可充國振旅而還秋羌人先零等共斬楊玉首以降初置金城屬國以處之來歙字君叔新野人建武初拜大中大夫時方以隴蜀為憂歙請行説囂囂遂遣子恂入質拜歙為中郎將帝謀西收囂兵與俱伐蜀復使歙喻旨囂遲疑不決歙怒杖節就車而去八年分精兵二千餘人從番須回中襲略陽斬囂守將金梁因保其城囂悉兵數萬圍之斬山築堤激水灌城歙與將士固守帝大發關東兵上隴囂衆潰走詔歙帥諸將入天水擊破公孫述將復攻拔落門隗囂支黨及天水屬縣皆降後又擊破襄武賊時飢流相望乃傾倉廩轉運諸縣以賑贍之於是隴右遂安而涼州亦通馬援字文淵茂陵人王莽末避地涼州隗囂甚敬重之以為綏德將軍與決䇿使覘蜀還曰不如専意東方囂乃使援奉書洛陽世祖岸幘迎笑援曰臣逺來陛下何知非刺客而簡易若是世祖笑曰卿非刺客乃説客耳援嘆服及還帝使來歙持節俱西援説囂遣子入質援因歸洛陽會囂更狐疑援數以書責囂囂怨援遂拒漢八年帝西征至漆援於帝前聚米為山谷指畫形勢開示軍所從道徑遂進兵至髙平第一城囂衆大潰拜援大中大夫副來歙監諸將平涼州西羌寇邊來歙奏言隴西侵殘非援莫能定璽書拜援隴西太守乃發兵擊破先零援奏置長吏繕城郭起塢候開導水田勸以耕牧郡中樂業後拜新息侯馮異字公孫潁川人通左氏春秋孫子兵法從光武起兵諸將論功異常獨屏樹下軍中號大樹將軍建武六年諸將上隴為隗囂所敗詔異軍栒邑大破行巡軍隗囂乘勝遣將王元行巡取栒邑異先據之以逸待勞元赴之異建旗鼓而出巡軍驚亂大破之於是北地諸豪長耿定等悉畔隗囂降異於是使異領北地太守事進軍義渠青山豪帥肥頭少卿率萬餘人降異異又討盧芳將賈覽等於安定破之復領安定太守事公孫述遣趙匡等救隗純異以天水太守攻匡等皆斬之馬武字子張南陽湖陽人光武時封揚虛侯顯宗初燒當羌反寇隴西敗太守劉盱於允街守塞諸羌皆畔拜武捕虜將軍與王豐等將四萬兵討平之寇恂字子翼上谷昌平人初隗囂將安定髙峻擁兵據髙平第一城帝使待詔馬援招降之後復叛據髙平堅守帝使耿弇圍之一歲不拔帝欲親征恂諌止之遂奉璽書西行至第一城峻遣軍師皇甫文出謁辭禮不屈恂斬之遣其副歸峻懼即日出降諸將皆賀因曰敢問殺其使而降其城何也恂曰皇甫文峻之腹心其所取計者也今來而不屈必無降心全之則文得其計殺之則峻亡其膽是以降耳耿弇字伯昭扶風茂陵人光武即位拜建威大將軍建武八年從上隴與中郎將來歙分部徇安定北地諸營保皆下之溫序字次房太原祁人建武六年拜謁者遷護羌校尉序行部至襄武為隗囂别將茍宇所拘劫序曰受國重任義不貪生宇等曉譬之序大怒叱宇等因以節撾殺數人賊衆爭欲殺之宇止之曰此義士死節可授以劍序受劍銜鬚於口顧左右曰既為賊所迫殺毋令鬚汚土遂伏劍而死光武聞而憐之賜冡葬焉除三子為郎馬賢史失其字籍永初七年賢以騎都尉與侯霸擊零昌别部牢羌於安定元初元年擊號多於枹罕皆有斬獲及龎參軍敗抵罪賢代領校尉事四年賢與中郎將任尚並擊狼莫賢先至安定青石岸狼莫逆擊敗之會尚兵到髙平因合勢進至北地大戰破之於富平河上狼莫走死六年勒姐種與隴西種羌號良等通謀欲反賢擊斬號良於安故衆皆降散永寧元年上郡沈氐種羌五千餘人寇張掖賢將萬人往擊之斬首千八百級獲生口千餘人餘悉降時當煎種大豪飢五等以賢兵在張掖乃乘虛寇金城賢還軍追之出塞斬首數千級初飢五同種大豪盧忽忍良等别留允街而首鼠兩端賢率兵召盧忽斬之因放兵擊其種人忍良等皆亡出塞璽書封賢安亭侯是嵗建光元年也忍良等以麻奴兄弟本燒當世嫡而賢撫恤不至常有怨心遂相結脅將諸種攻金城諸縣又脅將先零沈氐諸種緣山西走寇武威賢追到鸞鳥招引之諸種降者數千麻奴南還湟中延光元年賢追到湟中麻奴出塞渡河賢復追擊破之麻奴等詣漢陽降永建元年隴西鍾羌反賢擊之戰於臨洮斬首千餘級降其衆進封賢都鄉侯四年賢以麻奴兄弟數背叛因繫其弟犀苦質於令居其冬賢坐徵免陽嘉三年鍾羌良封等復寇隴西漢陽詔拜賢為謁者鎮撫諸種四年賢擊殺良封良封親屬並詣賢降賢復進擊種羌且昌且昌諸種十餘萬亦降永和元年復代馬續為校尉二年擊武都塞上白馬叛羌斬其渠帥飢指纍祖等三百餘級於是隴右復平明年燒當種那離等寇金城塞賢擊斬那離等前後獲首虜牲畜無算四年徵為𢎞農太守五年且凍傅難種羌及湟中雜種以刺史虐刻俱反復拜賢征西將軍屯漢陽且凍分遣種人寇武都賢將騎兵數千赴之至射姑山軍敗賢及二子皆戰殁帝愍之賜恤封其孫光為舞陽亭侯段熲字紀明姑臧人延熹初遷護羌校尉會燒當等種羌寇隴西金城熲將兵出湟谷擊破之又使軍吏田晏夏育復戰於羅亭大破之四年羌寇涼州熲將兵討之為郭閎所誣徵下獄六年羌寇轉盛復以熲為護羌校尉明年春良多滇那諸羌三千落詣熲降當煎勒姐種猶自屯結熲擊斬四千餘級八年春復斬降二千餘以功封都鄉侯後官至太尉皇甫規字威明安定朝那人延熹中舉為中郎將持節監關西兵討叛羌零吾等破之斬首八百級先零諸羌慕規威信相勸降者十餘萬明年規因發其騎兵討隴右而軍中大疫死者十三四規親入庵廬巡視將士三軍感恱東羌遂遣使乞降涼州復通先是安定太守孫俊涼州刺史郭閎等皆倚恃權貴不遵法度規到州條奏其罪或免或誅羌人聞之翕然反善沈氐大豪十餘萬口復詣規降後拜度遼將軍舉張奐以自代朝廷從之諸葛亮字孔明琅琊人仕蜀至丞相兼領司𨽻校尉建興六年帥師攻祁山戎陳整齊號令明肅南安天水安定三郡響應關中大震魏命張郃拒之亮使馬謖與郃戰於街亭謖違節度為郃所破亮拔西縣千餘家還於漢中戮謖以謝衆九年復出祁山糧盡退軍與張郃戰射殺之三國魏夏侯淵字妙才沛國譙人獻帝建安十九年魏王操以淵為行護軍將軍襲韓遂於顯親收其軍糧追至略陽戰於長離破之轉擊髙平屠各皆散走時枹罕宋建因涼州亂自號河首平漢王淵率諸將進討圍枹罕月餘拔之斬建及所置丞相以下淵别遣張郃等平河關渡河入小湟中河西諸羌盡降隴右平鍾繇潁川長社人建安初關中諸將馬騰韓遂各擁強兵相爭太祖方有事山東以關右為憂乃表繇督關中諸軍繇至關中移書騰遂以陳禍福騰遂各遣子入侍郭淮太原陽曲人黃初中擢領雍州刺史稱為神明太和中隴右無穀議欲關中大運淮以恩威撫循羌胡家使出穀平其輸調軍食用足陳泰潁川許昌人嘉平初代郭淮為刺史拒蜀有功晉范晷順陽人太康中涼州刺史轉雍州時西土荒毁氐羌蹈藉田桑失收百姓困弊晷傾心化導勸以農桑所部甚賴之唐李大亮涇陽人貞觀初為涼州都督嘗有臺使見名鷹諷大亮獻之大亮密表曰陛下絶畋獵久矣而使者求鷹信陛下意耶乃乖昔旨如其擅求是使非其才太宗報書曰有臣如此朕何憂因賜荀恱漢紀時西突厥種落散在伊吾詔大亮為西北道安撫大使峙糧磧口以賑其飢大亮奏罷之房玄齡每稱大亮有王陵周勃之節李靖字藥師京兆三原人貞觀九年督五總管兵伐吐谷渾軍次伏俟城渾退保大非川諸將議春草未芽馬弱不可戰靖決䇿深入遂踰積石山大破之伏允愁􅕚自經死靖更立大寧王慕容順而還封衛國公薛仁貴絳州龍門人顯慶中為鐵勒道行軍副總管時九姓衆十餘萬令驍騎數十來挑戰仁貴發三矢輒殺三人於是虜氣懾皆降軍中歌曰將軍三箭定天山壯士長歌入漢關後拜瓜州長史裴行儉字守約聞喜人擢安西都護西域諸國多慕義歸附遷吏部侍郎典選有能名儀鳯二年詔行儉册送波斯王為安撫大食使徑莫賀延磧風礫晝冥導者迷將士飢乏行儉止營致祭令曰水泉非逺衆少安俄而雲徹風恬行數百步水草豐美後來者莫識其處衆皆驚以方漢二師將軍至西州諸蕃郊迎行儉召豪傑千餘人自隨揚言大熱未可進軍都支不設備行儉徐召四鎮酋長偽約畋乃隂勒部伍數日倍道進又使人趣召都支都支本與遮匐計及秋拒使者已而聞軍至倉卒不知所出率子弟五百餘人詣營謁遂禽之進襲遮匐道獲其使者釋使往諭其主並言都支已禽狀遮匐乃降悉俘至京師帝親勞宴曰行儉提孤軍入萬里兵不血刃而叛黨擒可謂文武兼備矣即拜禮部尚書兼右衛大將軍永隆中突厥溫傅部迎頡利族子伏念寇原慶二州復詔行儉為總管曺懷舜李文暕副之伏念走保細沙行儉縱單于鎮兵躡伏念伏念惶駭不得戰遂遣使間道詣行儉執溫傅降歸封聞喜縣公婁師德字宗仁原武人上元初為監察御史會吐蕃盜邊劉審禮戰沒師德奉使收敗亡於洮河因使吐蕃其首領論贊婆等自赤嶺操牛酒迎勞師德諭國威信開陳利害番人畏恱後募猛士討吐蕃乃應詔從軍有功遷殿中侍御史兼河源軍司馬與敵戰白水澗八遇八克天授初為左金吾將軍檢校豐州都督率士屯田積穀數百萬兵以饒給無轉餉和糴之費長壽元年復為河源積石懷逺軍及河蘭鄯廓州營田大使萬嵗通天中為隴右諸軍大使復領營田許欽明安陸人為涼州都督嘗輕騎按部會突厥默啜兵奄至被執賊與皆至靈州使説之降欽明至城下呼美醬梁米並乞墨一枚時賊營四面阻水惟一路得入欽明欲選將練兵乘夜襲之也而城中無悟其意者遂見害時欽明兄欽寂為討擊副使與契丹戰亦被擒敵方圍安東令欽寂説其屬城未下者欽寂謂城中曰賊朝夕當滅幸謹守賊怒害之兄弟死王事世名其忠唐休璟名璿以字行始平人埀拱中為安西副都護聖厯中授涼州都督持節隴右諸軍副大使吐蕃率騎數萬寇涼州入洪源谷休璟以兵數千臨髙望之見賊旗鎧鮮明謂麾下曰吐蕃自欽陵死贊婆降麴莽布支新將兵欲以示武且其下皆貴臣豪酋子弟騎雖精不習戰吾為諸軍取之乃披甲先登六戰皆克斬二將獲首二千五百築京觀而還張仁願華州下邽人本名仁亶以睿宗諱音近避之神龍三年以左屯衛大將軍充朔方軍總管以擊突厥比至突厥衆已退引兵踵擊夜掩其營破之始朔方軍與突厥以河為界北崖有拂雲祠突厥每犯邊必先謁祠禱解然後料兵度而南時默啜悉兵西擊突騎施仁願乘虛取漠南地於河北築三受降城絶突厥南寇路六旬而就又於牛頭朝那山北置烽堠千三百所自是朔方無寇減鎮兵數萬嵗省費億計郭元振魏州貴鄉人嗣聖十八年突厥吐蕃聨兵寇涼州拜元振為涼州都督初州境輪廣才四百里寇來必至城下元振始於南峽口置和戎城北磧置白亭軍控制要路遂拓境千五百里自是州無寇患又令甘州刺史李漢通闢屯田盡水陸之利元振治涼五嵗善撫御夷夏畏慕令行禁止道不拾遺河西諸郡置生祠豎碑頌德神龍中遷安西大都護突厥部落欵塞願和睿宗立召為太僕卿將行安西蕃長有哭送者旌節下玉門關去涼州猶八百里城中爭具壺漿歡迎先天元年為朔方軍大總管築豐安定逺城張説字道濟洛陽人開元中阿布思既誅使説持節撫九姓同羅拔野固等説從輕騎二十直詣其部宿帳下召見酋豪慰諭之由是九姓遂安王晙討康待賓詔説相聞經略時黨項羌亦連兵攻銀城説將步騎萬人出合河關掩擊破之仍招納黨項使復故處奏置麟州以安羌衆十年詔為朔方節度大使親行五城督士馬八月康待賓餘黨康願子反掠牧馬西涉河出塞説追討至木槃山擒之其黨悉平乃議徙河曲六州殘寇於唐鄧仙豫間空河南朔方地先是緣邊戍兵常六十餘萬説以時平無事奏罷二十餘萬還農上以為疑説曰臣久在疆場具知其情將帥茍以自衛及役使營私而已若禦敵制勝不必在多臣請以闔門百口保之上乃從之蕭嵩開元十四年吐蕃陷瓜州河隴大震帝擇堪任邊者時嵩將赴朔方徙嵩河西節度使判涼州事嵩與吐蕃戰祁連城下自辰迄晡賊乃大潰斬一將賊哭震山谷露布至帝大恱授嵩同中書門下三品嵩以裴寬為判官與君􅎢判官牛仙客俱掌軍政人心浸安又奏建康軍使張守圭為瓜州刺史修復城市收合流散復縱反間於吐蕃國中云大將悉諾邏與中國通謀贊普誅之舊悉諾邏威名甚重既被誅後吐蕃少衰王君􅎢字威明瓜州常樂人初事郭知運纍功至右衛副率知運卒代為河西隴右節度使開元十四年吐蕃自恃其強致書用敵國禮上怒君􅎢請深入討之會吐蕃酋悉諾邏寇大斗拔谷君􅎢間其怠率秦州都督張景順乘氷度青海襲破之獲其輜重羊馬萬計而還以功遷左羽林大將軍哥舒翰其先蓋哥舒部之裔翰能讀左氏春秋漢書仕至左衛郎將吐蕃盜邊與翰遇苦拔海吐蕃枝其軍為三行從山差池下翰持半段槍迎擊所嚮披靡名蓋軍中擢副隴右節度河源軍使先是吐蕃候積石麥熟嵗來取莫能禁翰乃設伏東南谷吐蕃以五千騎入塞將就田翰自城中馳至虜駭走伏起悉殺之隻馬無還者後進涼國公兼河西節度使攻破吐蕃洪濟大莫門等城收黃河九曲以其地置洮陽郡築神䇿宛秀二軍進封西平郡王郭子儀華州鄭人天寶十四載安祿山反詔子儀為靈武郡太守充朔方節度使率本軍東討破史思明北圗范陽會潼關失守天子入蜀太子即位靈武詔班師子儀與光弼將兵五萬自河北赴行在軍威始振拜子儀兵部尚書同中書門下三品仍為朔方節度使平河曲復兩京破吐蕃以身係天下安危者二十年李光弼營州栁城人光弼嚴毅沉果有大略天寶六載為河西兵馬使王忠嗣遇之厚雖宿將莫能比俄封朔方節度使安思順表為副知留後事愛其才欲以子妻之光弼引疾去哥舒翰異其操後有大功與郭子儀齊名其代子儀朔方也營壘士卒麾幟無所更而光弼一號令之氣色乃益精明云李晟字良器洮州臨潭人年十八嵗從王忠嗣擊吐蕃悍酋乘城殺傷士甚衆晟一矢殪之大厯初吐蕃寇靈州李抱玉授晟兵五千使擊之辭曰以衆則不足以謀則多乃請千人趨臨洮屠定秦堡執其帥慕容谷鍾虜乃解靈州去遷涇原四鎮北庭兵馬使馬璘與吐蕃戰鹽倉敗績晟率遊兵拔璘以歸及定朱泚之難晟以涇州倚邊數戕其帥請治不龔命者因以訓耕積粟實塞下羈制西戎乃拜晟鳳翔隴右涇原節度使兼行營副元帥徙西平郡王王忠嗣以武功至金吾衛將軍素勇敢及為將乃能持重俄為河西隴右朔方河東節度佩四將印控制萬里每互市髙估馬價諸番爭以馬求市番馬遂少每嵗積石麥熟吐蕃輒穫之無敢禦者忠嗣遣將伏兵於其側夷至從其後夾攻之無一人得返至是吐蕃不敢犯李聽徙靈鹽節度使部有光祿渠久廞廢聽始復屯田以省轉餉即引渠溉塞下地千頃後賴其利宋劉綜字居正虞鄉人咸平中夏人擾西邊環慶大屯士馬詔以綜為陜西轉運副使時靈州孤危獻言者或請棄之綜力上言靈州民淳土沃為邊陲巨屛所宜固守以為扞蔽然後於浦洛河建軍築城屯兵積糧為之應援此暫勞永逸之勢也且鎮戎軍與靈州相接今若棄之則原渭等州益須設備較其勞費十倍其利害昭然可驗矣四年又獻議於鎮戎軍置屯田務又録唐安國鎮制置城壕鎮戎古記石本以進詔從其請明鎬安丘人元昊寇延州起為陜西轉運使敵破金明寨既去謀修復其城帥臣擁兵不即進鎬以百餘騎自督將士一月築成又常閲同州廂軍得材武者三百餘人教以強弩奏為清邊軍號最驍悍其後陜西河南頗倣置之曹瑋字寶臣真定靈壽人彬第三子也年十九知渭州沉勇嚴明舉措如老將以破章埋族於武延川滅撥臧於平涼隴上諸族皆來獻地築堡山外為籠竿城募土兵守之因知秦州兼涇原儀渭鎮戎安撫使時唃厮羅強盛使其舅賞樣丹與厮敦謀內寇瑋隂結厮敦解寶帶與之敦感激求自效斬賞樣丹送其首拜獻南市地瑋城之表厮敦為順州刺史既唃厮囉大入寇瑋迎戰三都谷斬首千餘級獲馬牛兵仗三萬餘遷康州防禦使秦人請刻石紀功特詔褒之天禧中以瑋為環慶緣邊巡檢安撫使委乞骨咩大門等族聞瑋至歸附者甚衆曹琮字寶章彬之子初知秦州兼涇原路兵馬定國軍節度觀察留後琮欲誘吐蕃掎角圗賊得西川舊賈使諭意而沙州鎮王子遣使奉書願率首領為朝廷擊賊帝善琮䇿改陜西副都總管經略安撫招討副使拜步軍副都指揮使與夏竦屯鄜州還為馬軍副都指揮使以疾卒帝臨奠贈安化軍節度使諡忠恪琮小心謹畏善贊謀御軍整嚴死時家無餘資韓琦字稚圭相州安陽人趙元昊反命琦為陜西安撫使進樞密直學士副夏竦為經略琦畫攻守二䇿入奏言元昊傾國入寇不過四五萬人吾各路兵勢分力弱若併出一道鼓行而前乘賊驕惰破之必矣乃詔鄜延涇原同出征既還營敵使來求盟琦曰無約而請和者謀也命將戒嚴敵果犯山外尋復為陜西四路經略安撫招討使屯涇州東兵從宿衛來不習勞苦琦奏增土兵以代戍建德順軍以蔽蕭關鳴沙道立鄜延渭三軍視敵所不備互出搗之以規取橫山元昊稱臣夏人不敢近塞時謠曰軍中有一韓西賊聞之心膽寒召為樞密副使元昊介契丹為援邀索無厭宰相晏殊等厭兵將一切從之琦極言其不便又陳西北四䇿以為今當以和好為權宜戰守為實務請繕甲厲兵營修城障密定討伐之計琦與范仲淹久在兵間名重一時朝廷倚以為重天下稱為韓范云范仲淹字希文吳縣人元昊反召為天章閣待制知永興軍改陜西都轉運使副夏竦為陜西經略先是詔分領邊兵自萬人至三千人以官崇卑為差敵至則官卑者先出戰仲淹曰將不擇人以官為先後取敗之道于是大閲州兵得萬八千人分為六各將三千分部教之量敵衆寡使更出禦敵由是聲震關輔敵聞之相戒曰無以延州為意今小范老子胸中有數萬甲兵不比大范老子時謡曰軍中有一范西人聞之驚破膽又城清澗大興營田聽民得互市又請鄜城為軍以河中同華户稅租就輸之春夏徙兵就食省糴十之三詔諸路進討仲淹曰宜俟春深敵馬瘦人飢勢易制鄜延密邇靈州西羌所必由第按兵不動以觀其釁稍以恩信招徠之若臣䇿不效當舉兵先取綏宥據要害屯兵營田為持久計則茶山橫山之民必挈族來歸矣帝皆用其議仲淹又議修承平永平等寨稍招還流亡定堡障通斥堠城十二寨於是沿邊之民相踵歸業遷環慶路經略安撫緣邊招討使初元昊隂誘屬羌為助環慶酋長六百餘人約為鄉道事尋露仲淹知其反覆奏請行邊以詔書犒賞諸羌閲其人馬為立條約諸羌皆受命自是始為用慶西北馬鋪寨當後橋川口在敵腹中仲淹欲城之度賊必爭密遣子純祐與蕃將趙明先據其地引兵隨之諸將不知所向行至柔逺始號令之版築皆具旬日而城成即大順城自此白豹金湯皆不敢犯環慶寇遂益少明珠滅臧徑兵數萬仲淹聞涇原欲襲討之上言二族道險不可攻平時且懷反側今討之必與賊表裏邊患未艾也若北取細腰葫蘆為堡障以斷敵路則二族安而環鎮道通可無憂矣其後遂築細腰葫蘆諸寨帝以葛懷敏之敗涇原傷夷欲徙仲淹遣王懷德喻之仲淹謝曰涇原地重恐臣不足當與韓琦同經略並駐涇州琦兼秦鳳臣兼環慶涇原有警臣與韓琦合秦鳳環慶之兵犄角而進若秦鳳環慶有警亦可率涇原之師為援臣當與琦練兵選將漸復橫山以斷敵臂帝從之仲淹號令明白愛撫士卒諸羌來者推心接之故敵亦不敢犯其境元昊請和召拜樞密副使邠慶二州之民與屬羌皆畫像立生祠事之及其卒也羌酋數百人哭之如父王堯臣字伯庸應天虞城人陜西用兵為體量安撫使將行請曰連年以來關中之民凋敝甚請以詔勞來仍諭以賊平蠲租賦二年仁宗從之使還上言陜西兵二十萬分屯四路然可使戰者止十萬敵衆入寇常數倍官軍此所以敗涇原近敵最當要害請益團土兵以二萬屯渭州為鎮戎山外之援萬人屯涇州為原渭聲勢二萬屯環慶萬人屯秦州以制其衝突又論延州鎮戎軍渭州山外三敗之由是為敵先據勝地誘我將帥不能據險擊歸多倍道趨利遂致掩覆願敕邊吏度逺近營寨量敵奮擊毋輕出時韓琦徙秦州范仲淹降耀州堯臣言二人皆忠義智勇不當置之散地又薦种世衡狄青有將帥才上皆納用並以其言戒邊吏明年敵自鎮戎軍原州入寇上思其言乃復以琦仲淹為招討使而使堯臣再安撫涇原又言鄜延環慶皆險固惟涇原自鎮戎軍至渭州沿涇河大川直抵涇邠略無險阻朝廷置帥府於涇州控扼關陜誠合事機然頻經敗覆空虛不振願擇將佐嚴斥堠一路兵力完實敵不敢長驅而入矣狄青字漢臣汾州西河人善騎射寶元初趙元昊反詔擇衛士從邊以青為三班差使殿侍延州指使青行常為先鋒凡四年前後大小二十五戰城橋子谷築招安豐林新寨大郎等堡皆扼賊要害嘗戰安逺被創甚聞寇至即挺起馳赴衆爭前為用臨敵被髮帶銅靣具出入賊中皆披靡莫敢當尹洙為經略判官青以指使見洙與談兵善之薦於經略使韓琦范仲淹曰此良將材也二人一見竒之待遇甚厚仲淹授以左氏春秋青折節讀書悉通秦漢以來將帥兵法由是益知名以功纍遷西上閣門副使擢秦州刺史涇原路副都總管經略招討副使范祥字晉公三水人通判鎮戎軍元昊圍城急祥帥將士拒退之請築劉璠堡定川寨從之纍遷度支貟外郎權轉運副使建議變鹽法及築古渭城嘉祐中包拯言祥通陜西鹽法行之十年嵗減𣙜貨務使緡錢數百萬其勞可録熙寧中以古渭為通逺軍權陜西轉運副使張詵奏朝廷復洮隴故地自將帥至裨佐悉有功賞臣見洮渭父老言皇祐中轉運使范祥因熟羌數被寇掠其部族願輸土置城以為守禦乃即古渭為寨祥此舉足以消沮邊隙可謂知攻守之利矣冀推原舊功少賜褒恤使天下知祥死猶被恩且舒祥忠義之氣詔贈祕書録一子未官者李參字清臣鄆州須城人厯知興元府陜西轉運使部多戍兵苦食少審訂其闕令民自隱度麥粟之贏先貸以錢俟穀熟還之官經數年廩有羡糧朝廷患邊費益廣參建議輦錢邊郡以平估糴權罷入中法比其去省糧𣙜貸錢千萬計召為鹽鐵副使孫永字曼叔趙人歷河北陜西都轉運使時邊用不足以解鹽市馬别為一司外臺不得與永奏曰鹽馬國之大計使主者專其柄既無以統𨽻茍為非法孰從而制之加龍圗閣直學士范純仁字堯夫仲淹次子歷陜西轉運副使召還神宗問陜西城郭甲兵糧儲如何對曰城郭粗全甲兵粗修糧儲粗備神宗愕然曰卿之才朕所倚信何為皆言粗對曰粗者未精之辭如是足矣願陛下且無留意邊功若邊臣觀望將為他日意外之患拜兵部員外郎加直龍圗閣知慶州過闕入對神宗曰卿父在慶著威名今可謂世職卿隨父既久兵法必精邊事必熟純仁揣神宗有功名心即對曰臣儒家子未嘗學兵先臣守邊時臣尚幼不復記憶且今日事勢宜有不同陛下使臣繕治城壘愛養百姓不敢辭若開拓侵攘願别謀帥臣神宗曰卿之才何所不能顧不肯為朕悉心爾遂行秦中方飢擅發常平粟賑貸僚屬請奏而須報純仁曰報至無及矣吾當獨任其責或謗其所全活不實詔遣使按視會秋大稔民歡曰公實活我忍纍公耶晝夜爭輸還之使者至已無所負張浚字德逺漢州綿竹人髙宗時為川陜宣撫處置使得便宜黜陟抵興元金人已取鄜延驍將羅索貝勒引大兵渡渭攻永興諸將莫肯先援浚至即出行關陜訪問風俗罷斥姦贓搜攬豪傑諸將惕息聽命時敵帥在淮西浚懼復擾東南謀牽制之遂決䇿治兵合五路師以復永興敵大恐急調淮西師由京西入援大戰於富平涇原帥劉錡身率將士薄敵陳殺獲頗衆會環帥趙哲擅離所部諸軍皆潰浚斬哲以徇退保興元命吳玠聚兵扼和尚原斷其來路關師古等聚熙河兵於岷州大潭孫渥賈世方等聚涇原鳳翔兵于階成鳳三州以固蜀口紹興元年敵攻和尚原吳玠乘險擊之敵大敗拜浚檢校少保定國軍節度使浚在關陜三年訓新集之兵當方張之敵以劉子羽為上賓趙開為都轉運使吳玠為大將西北遺民歸附日衆故關陜雖擾而全蜀安堵且以形勢牽制東南江淮亦賴以安胡世將字承公晉陵人宿曽孫也歷官至安撫制置使吳玠以軍無糧奏請踵至而蜀之餉運遡嘉陵江千餘里半年始達世將始用轉般摺運法軍儲稍充公私便之金陷長安聲援幾絶世將遣大將吳璘等歸河池不數日有石壁之捷金人逡巡不敢度隴詔除端明殿學士吳玠字晉卿德順軍隴干人建炎二年從統制曲端為前鋒敵據華州劇賊史斌欲取長安敵帥羅索等長驅入關玠咸擊敗之張浚巡關陜升玠涇原路副總管富平之敗玠收散卒保散關東和尚原積粟繕兵列柵為死守計時朝問隔絶人無固志玠命諸將選徑弓強弩分番迭射號駐隊矢連發不絶繁如雨注敵稍却則以竒兵旁擊絶其糧道屢敗金師浚録其功為鎮西軍節度使紹興二年復命節制興文龍三州時玠在河池薩里罕自商於搗上洋取金州長驅趨洋漢守臣劉子羽以驛書招玠入援玠日夜馳三百里大戰饒風嶺金人死者山積雖入三郡而失不償得四年復戰仙人關捷聞拜少師玠與敵對壘且十年常苦逺餉勞民屢汰冗員節浮費益治屯田嵗收至十萬斛用兵本孫吳務逺略不求小利故能保必勝御下嚴而有恩身為大將卒伍至下者得以情達士每樂為之死吳璘字唐卿玠弟紹興元年箭筈關之戰璘功居多超遷統制和尚原軍馬及金兵大入分合三十餘陳璘隨機而應敵不敢窺蜀者數十年後仙人原之戰復敗賊於石壁寨十一年復大戰剡家灣復秦州及陜右諸郡初和珍與希卜蘇合兵五萬屯劉家圈璘請攻之胡世將問䇿安出璘曰有新立疊陳法每戰以長鎗居前坐不得起次最強弓次強弩跪膝以俟次神臂弓約賊相搏至百步內則神臂先發七十步強弓併發次陳如之凡陳以拒馬為限鐵鈎相連俟其傷則更代遇更代則鳴鼓為節騎兩翼以蔽于前陳成而騎退謂之疊陳得車戰餘意及與敵遇遂用之敵大敗降者萬人十二年入覲拜階成岷鳳四州經略使瓦亭之戰敵凡數出數敗之孝宗受禪命兼陜西河東路宣撫招討使璘䇿敵必再爭德順亟馳赴城下而敵兵十餘萬果來攻璘築堡東山以守敵極力爭之殺傷大半終不能克拜少傅元亷希憲字善甫世祖初分十道希憲為京兆四川宣撫使宣布詔旨安諭六盤捕太平亂黨琿塔噶反命汪惟良將秦鞏諸軍進六盤惟良辭未得旨希憲即解所佩虎符銀印授之又發蜀卒令巴沁將之曰六盤兵精勿與爭鋒但使不得東則大事濟矣會有詔赦至希憲命絞太平等于獄方出迎詔人心遂安帝深善之别賜金虎符使節制諸軍時巴沁獲琿塔噶黨五十餘人希憲謂僚屬曰衆志猶懷反側今宜因其懼死並加寬釋使𨽻巴沁其黨大喜咸願出兵效力遂得精騎數千詔以希憲為中書右丞行秦蜀省事琿塔噶西渡河趨甘州阿拉克岱爾復自和林提兵與之合諸將失利河右大震朝議欲棄兩川退守興元希憲力言不可會親王哈坦及汪惟良巴沁等合兵復戰於西涼大敗之俘斬略盡二叛首俱伏辜事聞帝大嘉之曰希憲真男子進拜平章政事商挺字孟卿濟隂人楊惟忠宣撫關中兵火之餘民不聊生挺佐惟忠進賢良黜貪暴明尊卑出淹滯定規程止簿責印楮幣頒俸祿務農薄稅期月民安世祖即位以亷希憲及挺宣撫陜蜀破琿塔噶等於甘州帝大恱稱古良將進參知政事明徐達字天德濠人洪武元年以征虜大將軍右丞相將二十五萬人北伐平山東河南定燕京克鳳翔會諸將議所向諸將咸欲先取慶陽後攻臨洮達曰不然慶陽城險而兵精猝未易拔臨洮北界河湟西控羌戎得之其人民足以備戰鬭地産足以佐軍儲今以大軍􅕚之思齊不走即束手縛矣臨洮克旁郡自下遂進克秦州入鞏昌遣右副將軍馮勝逼臨洮李思齊果降張良臣懼亦以慶陽降陜西悉平進太傅右丞相封魏國公卒封中山王諡武寧配享廟庭常遇春字伯仁懷逺人洪武二年副大將軍達西入秦張良弼遁李思齊迎降平奉元鳳翔鞏昌臨洮所至望風歸服不妄殺一人令將士所過無得搶掠秦人德之為立祠卒封太保開平王諡忠武配享廟庭鄧愈虹縣人洪武三年以左副將軍從大將軍平隴右大敗王保保於定西自臨洮進克河州招諭吐蕃諸酋長何鎖南等皆請降於是河州以西朵甘思烏思藏等部悉來歸封衛國公八年創蘭州河梁定河西九年吐蕃所部州城邀掠烏思藏貢使十年復以愈為征虜將軍往討之愈分兵為三道覆其巢穴窮追至崑崙山俘斬萬計獲馬牛羊十餘萬上嘉其功召還卒封寧河王諡武順配享廟庭湯和字鼎臣濠州人洪武二年同大將軍徐達入潼關趨涇州越六盤山關隴皆平明年與徐達馮勝至定西襲元將庫庫特穆爾敗之北定寧夏至察罕諾爾皆以勞先諸將還京卒封東甌王諡襄武配享廟庭沐英字文英定逺人洪武十年以征西副將軍從鄧愈出塞渡黃河略烏思藏耀兵崑崙轉戰數千里俘獲萬計論功封西平侯十一年拜征西將軍征西蕃降元萬户且沙克嘉三副使平其部落擒洮州十八族十二年平朵甘納兒七站地十三年以托和齊犯順由額齊訥路渡黃河歷賀蘭山涉流沙分為四翼自以驍勇衝其中堅銜枚夜薄其營生擒托和齊及知院阿珠全部以歸卒封黔寧王諡昭靖配享廟庭馮勝定逺人洪武二年以右副將軍從大將軍下陜西取鳳翔隴州鞏昌征臨洮李思齊降圍慶陽執張良臣克慶陽河州等處陜西悉平三年復命勝為右副將軍同大將軍出西安搗定西大破庫庫特穆爾獲士馬數萬王巴拜等俱逃竄封宋國公五年詔勝為征西將軍分兵由西道取甘肅至蘭州元將迎降至額齊訥追多爾濟巴勒俘獲數十萬進拔肅州開創河西勝功獨多二十年命為征虜大將軍討納克楚降之太祖次列勳臣功髙望重者八人勝居其三云耿炳文濠人下河西從大將軍徐達走李思齊張思道開拓西郡即鎮其地築城池設衛所以功封長興侯耿忠長興侯炳文之弟洪武九年開立寧夏披荆棘修法制招攜懷逺恩威兼著守以鎮靜境土以寧郭子興濠人洪武元年從大將軍徐達守潼關移鎮鞏昌西境帖然三年封鞏昌侯卒贈陜國公諡宣武宋晟定逺人洪武十七年討西番至額齊訥路擒元國公平章進右軍都督鎮守涼州二十四年充總兵官討哈瑪爾倍道疾馳奄至城下金鼓震地即日克之收其部落以歸番戎懾服建文元年鎮甘肅永樂元年拜平羌將軍仍鎮甘肅三年招降巴圖特穆爾部落封西寧侯晟凡四鎮涼州前後二十餘年威信著絶域馬鑑洪武間以都督僉事提兵寧夏率兵出賀蘭山至五井與元平章倫布戰大破之劉釗全椒人以陜西指揮同知鎮守河州號令嚴明中外畏服永樂中領兵往烏思藏賞諸國還遇敵衆劫掠釗率衆敗之在鎮二十餘年軍民安堵歷升都督同知費瓛鳳陽府定逺縣人永樂八年以都督僉事總兵甘肅時叛賊虎保等侵掠涼州等處瓛率兵敗之於雙城賊遂潰散追至黑魚海降之後召征迤北還十二年復任邊境寧謐加封崇信伯卒於鎮和卓塔濟迪音史昭合肥人初哈密忠順王司徒和卓塔濟迪音等倔強梗西域貢道昭率兵往討擒逆首以歸永樂八年北征充鷹揚將軍十一年出鐵門關𠞰寇有功升都督鎮守西寧宣德中以察遜番寇邀劫貢使昭充總兵官直搗巢穴生擒首惡俘獲無算凱還遷鎮寧夏史釗以右都督總兵寧夏用兵有紀律能料勝負每置鐵燕子於帳前以候風色凡占驗毫髮無爽人以諸葛孔明方之置斥堠建關隘邊境利賴焉吳福鄞縣人歷官禮部員外郎升參政先是寧夏鹽池禁嚴民有一斗粟易鹽三兩者福奏許民納鹽課官為量給民甚便焉鄺野字孟質宜章人有詣闕告秦民羣聚謀不軌者上遂擢野為陜西按察副使敕以便宜調兵𠞰捕野白其誣詔誅妄告者宣德四年陜右飢華亭宜川尤甚公私廩皆竭野巡歷其地移旁縣粟賑焉民賴全活歷官兵部尚書諡忠肅羅汝敬名簡以字行江西吉水人正統初以工部右侍郎巡撫陜西督甘肅寧夏屯田分等第定賦則區處精密杜兼並廣儲蓄至今賴之轉刑部右侍郎王翺字九臯鹽山人正統六年以僉都御史鎮守陜西羌人服其令厯官吏部尚書卒贈太保諡忠肅金濂字宗瀚山陽人正統三年擢僉都御史參贊寧夏軍務舉賢任能人服其公寧夏舊有五渠而鳴沙州七星漢伯石灰三渠淤濓請濬之溉蕪田一千三百餘頃時詔富民輸米助賑千石以上褒以璽書濂言邊地粟貴請並旌不及千石者儲由此充邊民賴之八年拜刑部尚書王驥字尚德束鹿人正統初阿勒坦多爾濟巴勒數寇甘涼命驥以兵部尚書經略之驥至見沿邊城堡不堅將無紀律大會諸將問往年遇敵魚兒海先退者誰咸曰都指揮安敬即命引出斬之一軍股栗又大閲將士分兵畫地使各自防禦邊境肅然號令一新兵威大振敵首巴圗博囉寇莊浪即遣都指揮魏榮授以方略破其部落以還閲甘涼軍冗冒者定更番法兵休息而轉輸省汰三之一還報命上親慰勞之未幾敵復入犯復敕往至則遣大將蔣貴直搗狼山且戒曰不捷無復相見遣偏將趙安副之驥與都督任禮率大軍後繼擊敗之阿勒坦多爾濟巴勒走死降其部落窮追至黑泉而還邊境悉寧捷聞上遣人齎金幣奬勞加大理寺卿召還理部務後封靖逺伯卒贈侯諡忠毅柴車字叔輿錢塘人纍官至兵部侍郎多謀略熟習邊事正統初西鄙不靖命車協贊甘肅軍務調軍給餉悉得事宜初多爾濟寇涼州副總兵劉廣喪師不以實聞反要功賞車劾其罔詔械廣詣京又劾奏寧夏等守將失律亦召還前後章數十上甚剴切或以後患怵之車曰吾敢愛身以誤國耶每有功賞雖敕下必覆驗後行岷州土官后能冒功得升賞反覆論不可曰詐冒如能者非一人今宥能如餘人何若無功得官何以待捐軀死敵者卒罷所升官詔嘉之馬昂字景髙滄州人監察御史巡按陜西未幾以右副都御史參贊甘肅軍務時都督王喜玩寇失機昂劾其罪狀謫戌遼東一時官軍無不畏服先是邊人恣鈔掠至強劫總兵進貢馬駝昂帥將士討之盡得主名梟示又擒其大將數人並其妻子械送京師自是敵人不敢近邊已而甘肅戒嚴昂躬擐甲胄簡精鋭出屯山隘以待敵聞遁去升兵部尚書敵復內侵陜西告急命懷寧伯孫鏜為總兵昂仍總督刻日出師是夕曹欽反昂與鏜討之欽伏誅進太子少保仍掌兵事陳鎰字有戒吳縣人宣德十年擢右副都御史鎮守陜西巡延綏寧夏條奏軍民便宜多所廢置所部六府飢請發倉賑帝從輔臣請修荒政鎰請遍行於各邊由是塞上咸有儲蓄嵗滿當代以陜人乞留詔仍舊任時倉儲充溢足支十年鎰以陳腐委棄可惜請每嵗春夏時給官軍為月餉不復折鈔從之九年春進右都御史鎮守如故秦中飢乞蠲租十之四已命巡視甘肅寧夏延綏邊務聽便宜處置以災沴頻仍條上撫安軍民二十四事多議行尋還理院事進左都御史景泰二年陜西飢軍民萬餘人願得陳公活我監司以聞帝復命之鎰至是凡三鎮陜先後十餘年陜人戴之若父母每還朝必遮道擁車泣再至則歡迎數百里不絶其得軍民心前後撫陜者莫及也鎰在陜西恩惠並著規畫政務曲盡事情常先事豫防邊城賴以無患於延綏要害處奏置靖虜衛於寧夏甘肅邊境增墩堡千餘所陜西屢旱力為拯救奏減徭役蠲逋負發倉廩賑貧民人以無困三年春召還加太子太保掌院事明年以疾致仕卒贈太保諡僖敏耿九疇字禹範盧氏人以刑部右侍郎巡撫陜西持己端方政令嚴肅都指揮楊得青等私役操卒九疇劾之詔按治邊將請增臨洮諸衛戍卒九疇言邊城士卒非乏將帥能嚴紀律精訓練勤撫恤絶侵漁賞罰明信則人人思奮不然徒冗食耳竟不增戍邊民春夏出作田秋冬輒徙入塞九疇言邊將所以禦寇衛民也今使民避寇失業安用將帥因禁民入徙有被寇者治守帥罪四年布政使許資言侍郎出鎮與巡按御史不相統事多拘滯請改授憲職便乃改授右副都御史大臣鎮守巡撫皆授都御史自九疇始王槩廬陵人以右副都御史巡撫陜西設法救荒全活數萬人流民歸業馬文升字負圗鈞州人成化四年固原土兵滿四倡亂邊陲告急特起文升副都御史巡撫陜西與總督項忠劉玉討平之生擒滿四進左副都御史巡撫如故文升數條奏便宜務選將練兵豐財設險為守邊計翦除劇賊西固番族不即命者悉滅之修馬政易番馬八千有竒以給士卒賑鞏昌臨洮飢民撫安流移績甚著而是時博勒呼滿達勒奇木嘉色稜比嵗犯邊文升請駐兵韋州而設伏於諸堡待之至九年冬寇深入西路以有備不能大逞十一年春代王越為總制三邊軍務尋入為兵部右侍郎孝宗即位拜左都御史二年為兵部尚書土魯番據哈密侵掠沙州迫罕都諸部附已文升薦許進巡撫甘肅請敕發罕都齊勤哈密兵令副總兵彭清將之𨽻巡撫許進往討果克之西域遂定為兵部十三年盡心戎務數條上便宜率報可職守外所當及者亦言無不盡帝推心任之自太子太保屢加至少保遷吏部尚書加少師年八十五卒贈太師諡端肅項忠字藎臣嘉興人任陜西按察使嵗飢發廩不待報母憂歸部民乞留詔改右副都御史巡撫其地時洮岷羌叛忠發兵撫捕卒降其衆成化四年固原土兵滿俊即滿四叛聚衆據石堡城城險固俊據以為巢穴巡撫陳介進討復大敗賊衆至二萬勢益張詔命忠總督軍務與總兵劉玉討之時朝議欲益兵忠言益兵非便遂與巡撫馬文升分軍七道抵石城下與戰斬獲多伏羌伯毛忠戰死諸軍遽退忠即陳斬一千户以徇衆乃定會有星孛于台斗占者以為秦分不利忠曰昔李晟討朱泚熒惑守嵗卒以成功乃遣兵薄城下焚賊芻草絶汲道賊益窘邀忠與文升相見忠偕劉玉單騎赴之文升亦從數十騎往呼俊諭以禍福于是城中脅從者相率來降已而滿俊夜使愛將楊虎貍逺汲被擒忠貰其死解所束金帶鈎賜遣之約為內應誘俊出戰伏兵擒焉忠大小三百餘戰斬首七千六百有奇俘獲二千六百升右都御史兵部尚書卒贈太子太保諡襄毅余子俊字士英青神人成化六年以右副都御史巡撫延綏請沿邊築牆建堡謂延慶地平易利馳突寇屢來犯宿留重兵所費巨萬莫若於沿邊築牆置立堡寨今舊界石所在多髙山陡崖依山形隨地勢或剷削或壘築或挑塹綿引相接以成邊牆於計為便十年役陜西軍給食興工東起清水營西抵花馬池延袤千七百七十里咸鑿崖築牆掘塹其下連續不絶每二里置敵臺崖寨為巡警之所凡築城堡十一邊墩十五小墩七十八崖寨八百十九役軍四萬人不三月而成牆內之地悉分屯墾嵗得糧六萬石有奇初延綏鎮治綏德州屬縣米脂吳堡悉在其外冦入掠鎮兵覺而追之已不及故往往得利去自子俊徙鎮榆林增衛益兵拓城置戍攻守器畢具遂為重鎮寇抄漸稀民得安耕牧焉至十八年寇入犯扼于牆塹散漫不得出遂大衄邊人益思子俊功尋拜户部尚書加太子太保卒贈太保諡肅敏徐廷璋字公器羅山人成化初以僉都御史撫延綏再撫甘肅條上邊務劾貪將建設學校在鎮七年武備整飭調撫寧夏大築邊牆塹山堙谷增立寨堡繕亭障時與陜西馬文升延綏余子俊名相埒稱關中三巡撫蔣貴江都人正統中阿勒坦多爾濟巴勒屢寇甘涼拜貴將軍率京兵五千騎巡邊兵至鎮蕃出魚兒海子哨還得敵營所在貴欲即往副將李安沮之貴拔劍厲聲言敢復諫者死遂躡迹敗之于石城又追至阿嚕俘斬殆盡阿勒坦單騎走死西土遂安捷報加封定西伯鎮甘涼後征雲南金齒皆平之以病薨贈國公諡武勇鄭時字宗良舒城人巡撫陜西值大飢請得帑金四十萬賑濟分門給散疏平涼利民渠以溉田民感其德史琳字天瑞餘姚人歷官陜西布政司右參議時鞏昌蕃人為梗始至掩擊之盡降其衆遂出行部自安定會寧歷金蘭抵秦州相度地勢增繕屯堡斥堠以斷賊路既又轉關中之粟以實甘涼身自督輸往來邊徼凡二年由是盡得其形勝要害及戰守方略王越字世昌濬縣人成化五年冦入河套詔大同巡撫越帥師赴之越遣將三路破之寇乃退七年加總督軍務専辦西事敕陜西寧夏延綏三鎮兵皆受節制九月滿達勒及博勒呼竒木嘉色稜留妻子老弱於紅鹽池大舉深入直抵秦州安定諸州縣越䇿寇盡鋭西不備東偏乃率總兵許寧遊擊周玉各將兵兩晝夜行八百里薄其營大破之擒斬三百五十獲駝馬器械無算焚其廬帳而還及滿達勒等飽掠歸則妻子畜産已蕩盡相顧痛哭自是逺徙北去不敢復居河套西陲息靜者數年十年春廷議設總制府於固原控制延綏寧夏甘肅三邊總兵巡撫並聽節制以越任之三邊總制自此始論功加太子少保進兵部尚書仍掌院事成化十六年出塞大破虜于威寧海子封威寧伯𢎞治十年冦犯甘肅起越原官加太子太保總制甘涼邊務兼制延寧兩鎮明年分兵三路進𠞰皆破走之於賀蘭山加少保卒贈太傅諡襄敏范瑛字俊彥成化九年巡按陜西專理茶禁先是三邊缺馬廷議欲資茶以市馬瑛謂禁太嚴則利盡錐刀以病商太弛則利歸權勢以病國乃斟酌行之於是官茶行而邊馬足鄭己字克修山海衛人巡按陜西甘涼諸路嵗災告急已請蠲邊地逋賦而分别邊兵令壯者戰守老弱耕牧又上匡時圗治疏以安民練兵責將吏以將吏責銓樞以銓樞之得人歸人主之講學納諫亹亹數千言講賑濟飭邊備陜以西賴之時勳貴出鎮子弟怙勢凌下監司莫敢問已捕杖之濱死乃謀中之謫戌宣府秦綋字世纓單縣人先知秦州後升鞏昌知府調西安遷陜西右參政岷州番亂提兵破之成化十四年秋寇入花馬池敗官軍直抵平涼詔起綋户部尚書兼右副都御史總制三邊軍務綋馳至固原躬祭陳亡將士奏録死事指揮朱鼎等五人恤軍士戰沒者家劾治敗將楊琳等四人罪更易守將練壯士興屯田申明號令軍聲大振初寇未入河套平涼固原皆內地無患自博囉住牧後固原當兵衝為平慶臨鞏門户而城隘民貧兵力單弱商販不至綋乃拓其外城郭招徠商賈建改為州而身留節制之由是商賈流通公私兩便綋見固原迤北延袤千里間田數十萬頃曠野近邊無城堡可依議於花馬池迤西至小鹽池二百里每二十里築一堡堡周四十八丈役軍五百人固原迤北各築屯堡募人屯種每頃稅米五石嵗可得五十萬石又言花馬池至固原墩臺疏逺敵騎得長驅深入當增築墩堡卒行綋䇿修築諸邊城堡一萬四千一百所垣塹三千七百餘里固原屹為重鎮敵人不敢窺伺又以意作戰車名全勝車詔頒其式於諸邊在事三年四鎮晏然前後經略西陲者莫及十七年召還視部事以年老乞致仕卒贈少保諡襄毅許進字季升靈寶人除御史按甘肅有聲𢎞治七年以僉都御史巡撫甘肅時土魯番阿哈瑪特攻陷哈密執忠順王善巴去使部酋據其城久不復進與都督劉寧輩出調諸部為聲援冒雪夜進遂破其衆餘敵入城登臺自保進諭而降之復得哈密城獲善巴妻女或欲盡屠之進不可乃止録功升副都御史巡撫陜西未幾阿哈瑪特上書謝罪以善巴及金印來歸西域遂定官至兵部尚書贈太子太保諡襄毅楊一清字應寧雲南安寧人父景以化州同知致仕攜之居巴陵少舉竒童弱冠登進士父喪卜葬丹徒遂家焉授中書舍人久之遷陜西提學副使在陜八年𢎞治十五年擢左副都御史督理陜西馬政太祖著令以蜀茶易番馬資軍中用久而寢弛姦人多挾私茶闌出為利番馬不時至一清乃請重行太僕苑馬之官嚴私通禁盡籠茶利於官以服致諸番番馬大集屯牧政修軍用漸足李東陽劉大夏皆材之會寇大入花馬池命一清巡撫陜西仍督馬政甫受事寇已退乃選精卒教演之創平虜紅古二城以援固原築垣瀕河以捍靖虜劾罷貪庸總兵鄭宏裁鎮守中官冗費正德初寇數萬抵固原一清輕騎晝夜行抵總兵曹雄軍張疑兵脅寇夜發火炮寇疑大兵至遁出塞一清以延綏寧夏甘肅有警不相援患無所統攝請遣大臣兼領之即命一清總制三邊軍務進右都御史一清遂建議修邊其略曰陜西各邊延綏據險寧夏甘肅扼河山惟花馬池至靈州地寬衍城堡復疏寇毁牆入則固原慶陽平涼鞏昌皆受患臣久官陜西頗諳形勢寇動稱數萬往來倐忽未至徵兵多擾費既至召援輒後時欲戰則彼不來持久則師坐老防邊之䇿大要有四修濬牆塹以固邊防增設衛所以壯邊兵經理靈夏以安內附整飭韋州以遏外侵當務之急莫先於此今河套即周朔方唐張仁願築三受降城置烽堠突厥不敢踰山牧馬宜增築邊防延綏至橫城三百里設墩臺九百座剷削險崖峻阜連接寧夏東路花馬池帝可其議發帑築牆劉瑾憾一清不附已遂引疾歸安化王置鐇反起一清提督軍務西討未至故部將仇鉞已捕執之召還拜户部尚書加少保進武英殿大學士請歸世宗即位廷臣交薦改兵部尚書總制三邊一清三為總制部曲皆踴躍喜旌旗壁壘色為一新召為吏部尚書進左柱國華蓋殿大學士卒贈太保諡文襄羅明字時昭福建延平人𢎞治初巡撫甘肅奏罷貢獻以息橫斂奪勢家所擅草湖以還軍士均水利清兵馬蠲逋負於學校風俗尤為加意增貢額選秀民躬教之革丁祭循用俗樂講求古樂舞器而演習之河西文風於是大振仇鉞寧夏人為寧夏前衛指揮置鐇反鉞詐稱病卧賊黨周昂來視伏卒殺之集壯士馳詣置鐇第縛之賊衆遂大潰論功封咸寧伯祿千石復拜平賊將軍督三屯營進咸寧侯顔頤壽湖廣人正德間以大理寺少卿差查延慶諸務時劉瑾立法查糧各邊衛屯田欲有增益及查軍欲三丁抽一為正軍又以官銀散給軍民每銀四錢責運邊糧一石每二分五釐責納邊草一束賦重法嚴人不堪命頤壽不肯阿徇一切以寬大處之邊民受其德澤因忤瑾意撤回百姓感恩攀送遙望車塵拜祝李鉞字虔甫祥符人嘉靖元年鉞以兵部侍郎出總制陜西三邊軍務發內帑銀四十萬給軍需鉞長軍旅料敵多中初至固原寇入犯時援兵未集乃下令大開諸營門晝夜不閉敵疑有備不敢逼乃炮擊之寇引去以其間增築墩堡謹烽堠廣儲蓄選壯勇為備未幾寇復深入平涼涇州放兵大掠鉞密令遊擊時陳周尚文等分伏要害遏其歸路軍遂大捷斬首百八十級獲牛羊萬計諸將入賀鉞曰敵既失利必束犯延綏檄諸將設伏待寇寇果如延綏伏發邀擊之斬首百餘級或請以捷聞曰偶勝耳惡足為功鎮巡奏捷璽書嘉之進右都御史王瓊字德華太原人嘉靖七年起兵部尚書兼右都御史督陜西三邊軍務時土魯番據哈密數擾肅州廷議閉關絶貢已四年至是其將雅穆拉率衆求內屬沙州番人特默格等亦率衆入附番來寇者屢敗乃獻還哈密求通貢瓊奏乞撫納通貢西域復定八年北寇入犯莊浪靈州瓊統兵三萬按行塞下抵花馬池寇徙帳逺遁九年洮岷畨人掠鞏昌命將擊之斬首三百五十餘級撫降七十餘族又置下馬關門接修邊牆一百八十餘里起甜水堡至蘭州因地形勢挑壕塹八百餘里據險以守瓊在邊戎備甚飭土魯番率十國奉貢西北邊經嵗少烽警及是諸番蕩平西陲益靖甘肅軍民恐瓊去番寇復侵相率乞留帝嘉之優詔奬加太子太保十年冬召拜吏部尚書明年卒贈太師諡恭襄其督三邊人以比楊一清云唐龍字虞佐蘭溪人以監察御史升陜西提學副使歷吏部左右侍郎陜西方大飢濟農擁衆入據河套諳達亦出沒邊徼特升龍兵部尚書總制三邊軍務兼理賑濟龍奏行救荒十四事時濟農居套中諳達亦自豐州入套為患龍用總兵官梁震王效等分左右夾擊破之濟農自將入營花馬池龍督所部官兵迎戰大敗之時王效敗敵於興武營梁震敗敵於乾溝二旬三捷屢被奬賚召為刑部尚書龍於三邊四鎮山川地形險扼厯歷如指諸掌為圗置座隅坐而籌之咸中機要動必有功在邊四年朝廷倚重焉楊志學長沙人以右副都御史巡撫寧夏奏改稅糧以蘇民困創築威逺平逺靖逺三堡以遏寇路民皆德之張文魁字元甫河南蘭陽人嘉靖七年以右副都御史巡撫寧夏添置平逺迤北黃河戰船用扼敵人潛度劫掠之患既去人懷思之楊守禮字秉節蒲州人嘉靖初以右副都御史巡撫寧夏寇犯固原敗之以功升兵部尚書總督三邊軍務凡二嵗最有功加太子少保劉天和字養和麻城人嘉靖初以右僉都御史督甘肅屯政請以肅州丁壯及山陜流民於近邊耕牧奏當興革者十事屯政悉舉改撫陜西請撤鎮守中官帝從之洮岷番四十二族不順命天和討誅之十五年改總制三邊軍務倣前督秦紘製隻輪車練諸邊將士濟農寇涼州莊浪屢遣將敗之寇入黑河墩遇伏大敗入蒺藜川又破之進左都御史濟農犯河西禦却之進兵部尚書又築乾溝乾澗三百里十八年敵陷花馬池塞斬失守指揮二人敵侵固原東出乾溝令任傑等諸將襲其後捕斬二百餘級論功加太子太保兵部尚書天和年老乞休卒贈少保諡莊襄寇天敘字子惇榆次人嘉靖三年以右僉都御史巡撫甘肅以銀的教射賞中者回賊犯山丹命將截殺斬其魁帥及餘黨三十六人西域貢獅子犀牛西狗天敘請却之邊人愛戴進右副都御史巡撫陜西寇犯固原調度截殺有功關中飢奏蠲租稅大發銀鹽賑濟又奏罷織造內官民賴以安厯兵部右侍郎卒貧不能殮楊博字惟約蒲州人任職方郎中大學士翟鑾巡九邊以博自隨所過山川形勢土俗好惡士卒多寡強弱皆疏記之至肅州屬番數百遮道邀賞鑾慮來者益衆不能給博請鑾盛儀衛集諸番轅門數以天子宰相至不悉衆逺迎將縳以屬吏諸番羅拜請罪乃稍賚其先至者餘皆懼不復來鑾還薦博可屬大事濟農諳達嵗盜邊尚書張瓚一切倚辦博帝或中夜降手詔博隨事條答悉稱旨嘉靖二十五年超拜右僉都御史巡撫甘肅大興屯利請募民墾田永不征租又以暇修築肅州榆樹泉及甘州平川境外大蘆泉諸處㻻臺鑿龍首諸渠初罕都屬番避土魯番亂遷肅州境上時與居民戕殺博為築金塔白城七堡召其長令率屬徙居之諸番徙七百餘帳總兵官王繼祖却寇永昌鎮羌參將蔡勳等戰鎮番山丹三告捷斬首百四十餘級進博右副都御史陳九疇字禹學曹州人正德十一年兵備肅州值土魯番蘇勒坦稱兵擁萬騎入寇嘉峪關遊擊芮寧敗死城中寄住回人扎卜戩及實伯音德爾等將謀內應九疇先事覘察悉捕戮之躬擐甲胄隨機戰守克保孤城後實伯音德爾子穆爾瑪哈穆特赴京誣奏九疇被逮下獄時權閹用事而姦回舍音和珊者又賄通禁闥遂落職為民嘉靖初詔捕舍音和珊誅死起九疇陜西按察使尋升右僉都御史巡撫甘肅當地方變亂後極力鎮撫民用安輯二年親率兵援總兵官武振于涼州與寇迎戰大捷三年蘇勒坦莽蘇爾復擁衆入寇主將員缺九疇率裨將禦于嘉峪關覘賊有搗虛意乃率數騎從間道疾趨甘州賊果掩至聞九疇先已入城相顧錯愕寄住姦回間諜等欲為賊應詭請禦敵不許隨按驗得實捕斬之賊計窮分掠紅水黑城等堡又尾擊之始遁甘州無虞比屋尸祝之曽銑字子重江都人嘉靖二十五年以副都御史總督陜西三邊軍務寇大入延慶境銑率兵數千遣將搗寇巢寇始遁捷聞賚銀幣時套冦牧近塞居民不敢樵採間以輕騎入掠銑復率諸軍驅之逺徙詔增銑俸一級賜銀幣有加銑感帝知遇圗所報稱念寇居河套久為中國患上疏請復河套條八議以進欲西自定邊營東至黃甫川一千五百里築邊牆禦寇請帑金數十萬銑又條上方略十八事並下廷議廷議套必不可復遣官逮銑嚴嵩令仇鸞誣銑尅餉巨萬賂當途法司當銑交結近侍律棄市銑長于用兵嵗除夜命諸將出不得已丙夜被甲行果遇寇擊敗之問何以知曰以烏鵲非時噪也皆大服既死家無餘資隆慶初科道頌寃贈兵部尚書諡襄愍萬厯中敕陜西建祠王以旗字士招江寧人纍官兵部尚書先是陜西總督曽銑倡議復套業奉命集議俄旨出逮銑即命以旗代之陛辭馳入關亟罷郡縣軍需停造器具又嚴盜馬之罰禁劫營之弊雖倉卒建牙而能推布腹心哈密熟番久留甘肅患之乃召諭諸番為繕室授田示之生計仍約朔望族首得入關為市諸番感喻稽首聽命逺徙嗣後敵入山丹波羅堡及莊浪髙家堡皆督師敗之計連年破敵及番人出沒境上者屢多戰功奪獲諸器無算修完延慶等處城堡墩臺及蘭州邊牆二百餘里進階光祿大夫太子太保卒於固原諸鎮軍民為罷市贈少保諡襄敏毛伯溫字汝厲吉水人厯官都察院右僉都御史巡撫寧夏首罷衙前標軍三百人歸營諸辨無敢以兵司自衛檢屯田沒於河者蠲其軍租夏地早寒禾黍未實而霜隕禱於神仲冬始霜嵗大熟范鏓字平甫瀋陽衛人以右副都御史巡撫寧夏剛斷明察清查侵盜虛出糧料一十二萬餘石草五十餘萬束裁革冒功升賞旗甲時方無事政務弛廢一朝振刷邊境肅然王崇古字學甫蒲州人嘉靖四十三年以右僉都御史巡撫寧夏遣將吳鼎有清水營之捷招降敵三百餘人邊功甚著進兵部右侍郎總督三邊二嵗中敵三薄城遣大將董一奎趙竒等尋遣雷龍等出長城二百里至白城會流賊郭孟震鈔掠秦晉勢張甚崇古檄兩省兵平之進右副都御史汪文輝字都山婺源人以副使兵備寧夏寧夏屯田瀕河易圮無影諸田賦重督嚴丁耗役劇輝虛心咨訪斟酌損益探本成書且與豁免於是逃者復疲者蘇民始有更生之樂又周巡所部以閘口嵗費不資欲易以石土人難之輝程工量力通計所費三千兩較每嵗閘口支費僅多三分之一乃慨然曰吾所愛千金及半月之勞不為百年計遂決計行之至定鹽法決寃獄籌兵勸農通商課士皆經國長慮石永字壽卿威縣人歷升陜西副使駐甘州詢舊水田濬泉五十餘灌田八百餘頃居民爭復業升右參政巡視涼州土田乃募民墾闢導泉灌溉後皆為沃壤霍冀字堯封孝義人巡撫寧夏遍歷山川究其利害修內外諸關鎮城雉堞及逺邇堡寨各路斥堠修演武場射圃及兵車厰火器庫疏治河渠閘堰招撫流移寬賦役新學宫建書院革差遣繁擾禁吏胥需索稽狡卒影射罪積年姦慝查贖鍰以助工奬義士以厲俗威行化洽升户部右侍郎戴才字子需滄州人嘉靖四十年以僉都御史巡撫甘肅簡兵將足儲備敵入輒創去紅栁林鎗竿嶺之捷甘鎮向未有也以其間墾荒田興水利建學明教百廢振舉撫甘五年晉副都御史巡撫陜西尋升總督凡三蒞陜熟悉利弊舉劾咸當其人裴家川腴地萬頃民苦敵不得田作才相度地形築牆建堡奏請專官營田秦隴間屹然巨鎮王世揚字孝甫廣平人以御史按視茶馬值嵗祲蠲贖鍰二千金復疏請茶課二千金賑之甘肅故以蕃為蔽蕃與狄閧世揚卵翼約束烽燧頓消嵗增馬四百七十匹省椿朋銀五千有竒遷大理卿仍兼御史閲視延綏世揚故諳九塞詭讕咸為次第閲實馬如初市否者閉關其大賞轉賞勒如初額無侵士儲糈他所施設皆百年桑土至計最後條十事上嘉納之下所司覆著為令鄭洛字禹秀安肅人兵部尚書萬厯十八年經略陜西延寧甘肅邊務諸番往來率取道甘肅諳達迎佛建寺於青海奏賜名仰華留别部博勒呼守之齊哩克赴仰華博勒呼部卒闌入西寧副總兵李奎醉斫之遂譟射奎死進圍舊洮州副總兵李聨芳敗歿入臨洮河州總兵劉承嗣失利遊擊李芳等皆死詔洛經略七鎮以兵部員外梁雲龍僉事萬世德隨軍贊畫洛至甘肅與雲龍入西寧控扼青海齊哩克還所掠人口輸罪請歸洛陳收番有大利會齊哩克北歸乞復貢市於是招撫一百六十五族部落五萬八千餘口給賞築堡隨便安插自是番依中國為屛蔽我藉番人為耳目分撥隘口哨探敵情每得預聞洛首議禁借路以伐姦謀焚夷寺以絶禍本乃養士秣馬集糧治器又多方搖撼散其黨後李汶田樂收兩川之功皆本洛謀加少保仍召理戎政魏學曽涇陽人萬厯十九年起兵部尚書兼右副都御史總制三邊學曽立朝敷政直亮清正有古大臣風巴拜之亂董師平夏在事三時賊滅城全皆本其謀為萋菲所中以去廷臣交頌其功公論不泯麻貴大同人萬厯二十年巴拜之亂以貴協鎮寧夏時分五隊攻城貴以遊兵䇿應巴拜自北門出戰欲逃勾套部貴率參將馬孔英先登赴敵逐之入城套部塔沁自花馬池西沙湃入貴偵擊于石溝又與總兵李如松夾擊套部於張亮堡追至賀蘭山以所斬級舉示賊賊始奪氣城破賊平李如松巴拜之變命如松總寧夏兵與御史梅國正統遼左宣大兵至時套部數闌入援巴拜如松遣裨將李寧等馳赴黃硤口擊之以徑卒千餘身往䇿應至張亮堡遇賊搏戰自卯至巳敵鋭甚如松劍斬縮朒二人會李如樟麻貴亦至張左右翼夾擊之乃却追至賀蘭破南關賊猶墐門斷塹以守承恩既殺其黨劉東暘許朝等懸首城上求撫如松先登圍巴拜家賊自縊斬其首賊平捷奏以如松為第一擢左都督張銓字宇衡山西沁水人萬厯中巡視陜西茶馬會屬番肆掠銓立參起釁邊將整肅金牌納馬之法又條奏馬政四議為通變苑馬之計籌邊造士卓有善政繩姦斥佞直聲振天下後殉難諡忠烈張九德字咸仲慈溪人以按察副使為河東兵備時遼左川貴多調邊兵方遣行悍丁金白張威等殺領兵官焚掠而前德至固原聞變星馳進大書前導曰戍士逺役誠可念即有所需何不以請輕犯國憲幸吾未受事可開一面如悔罪速投戈以明無叛志衆環跪叩頭請死哭聲震山谷德慰遣歸營密擒渠魁置之法寧鎮以安時熊廷弼得便宜調發有偽充經略使者勒取馬價甚倨曰道逺恐疲折價至近關買馬為便德命簡故牒印文小異遂伏罪復創設商學以便商賈子弟肄業靈州瀕河嵗費數千金以禦河天啓二年河大決居民議他徙德相度水勢建石堤嵗省工役無算秦家渠常苦涸漢白渠常苦漲三農失業德築長湃以護秦别開蘆口以泄漢計疏渠道三十里復蕪田數百頃嵗額增數千石時號張公堤為政先事綢繆臨機制變聲色不動而指揮若神履任六年以卓異擢巡撫都御史去先是靈州有祠祀楊一清王瓊及九德去任鎮人思其功貌其像而三之更其額曰三賢李汶字次溪任丘人萬厯二十三年繼鄭洛為總督初洛請招番已有效汶踵行之遂有南川之捷獲頭目巴圗爾恰後以兵備劉敏寬分插白旗招回番族且請曰各番窘約告討買賣蓋求以氈皮牛羊易我米麵此亦於我有利宜訂期定物各於就近城堡換易資生其非時禁物仍宜嚴禁且各番素服於北一旦歸來一不得意縱兵讐搶不為保護必復外嚮凡有北警宜收其老小人畜於近堡令其精兵外禦我且救援彼欲築堡安居者亦為擇便久住永為保護之計邊方賴之田樂任丘人萬厯初涼永兵道鄭洛既還朝永寇劫掠番人與其黨潛居海上計圗復逞乃命樂巡撫甘肅樂選將治戎會諸將議方略樂曰青近窺甘泉永逼穴湟中首尾牽制我兵青恃強無備今出不意勢可必克青既克而永可擒也遂潛師搗青青單騎走於是為三伏待永密與西寧道劉敏寬授計參將達雲分布既定永謂九月九日漢兒遊賞必不設備乃率衆佯呼求欵伏其千餘騎於後欲俟既合而發達雲率精甲短兵直接鎮海遊擊合諸番殱其後番兵拉巴勒擊其左隆卜申中擊其右永死於番兵者無算餘落皆夜徙海西羊牛家帳多為番獲諸番被劫者相率而歸樂曰永雖創和碩獨完宰桑納喇等全部猶盛非諸將所能辦也自率中堅所過簡其精鋭晨夜赴西寧而納喇巴勒在前宰桑和碩後繼連絡數十里已攻拉巴勒寨樂曰賊以忿來本欲致死於我而先圗孤番誘我也乃間語拉巴勒曰若能堅守十日我必破賊拉巴勒急遂合於賊諸將歡焉樂曰拉巴勒非心背我者也已約彼紿賊賊氣鋭必直前薄我我攻其外拉巴勒應於內破之必矣乃合諸軍營於康纒溝賊方圍堡矢下如雨達雲等更代以應之自辰至申永死傷環壘忿甚以驍悍犯西寧兵終不能入樂度其將走乃令間道設伏親與劉敏寬按中道諭拉巴勒收精壯截擊永遂逸宰桑和碩之驍勇兩捷殱之殆盡又閲兵邊疆修築阿壩松山平城等堡設將辨以防邊境乃寧敘功封松山伯廕一子世襲錦衣百户達雲涼州人西寧副總兵時總督李汶撫諸番雲安插招致未期年收獲西寧甘州番萬一千餘人每出軍雲與密議指授方略南川之戰雲衷甲入陳手刃黠魁斬獲六百八十餘級西川之戰諸部並力致死巡撫田樂合諸營令雲統之營於康纒溝敵圍康纒溝堡以誘雲麾衆四靣齊攻矢下如雨雲鼓衆分鎗炮弓弩更番應之從辰至申百餘合敵人馬死傷無數復以驍悍重鎧長鎗鈎杆犯西寧兵終不得入敵始去方兩軍相接炮石如雷煙焰瀰漫獨片雲五色蓋罩雲營上時敵有擁坐纛者雲親提神炮擊傷之敵衆乃散將士咸呼神助云傅宗龍雲南人兩拜薊鎮督師為政綱紀分明賞罰信決再晉大司馬轉授三秦總督出關𠞰賊大戰於河南寶豐力竭而死曹文詔大同人以戰功推陜西臨洮總兵掃靖邊氛平可天飛殄鐵角城八年流寇高應祥張獻忠等率衆數十萬破隴扶鳳翔屬縣文詔同孫守法協力擊破之生擒高應祥獻俘京師會秦賊復熾慶寧告急文詔孤軍赴之遇于真寧和尚原賊驅民荷戈而鬬賊內鐵衣雜農樵文詔不忍概加誅戰時稍開一面衆逸不可止鐵衣農樵圍文詔文詔矢盡援兵不至大呼格殺百餘寇而死天下惜之至今原上有曹大將軍戰死處大勒於石皇清孟喬芳號心亭奉天人順治二年總督陜西軍務節制文武安撫地方陜西三邊四鎮八府文武官民俱就招撫三秦士民帖然安堵𠞰除逆賊賀珍胡向宸孫守法馬德等招降餘寇平定漢中興安州郡五年逆回米剌印等反叛攻陷河州蘭州臨洮等州縣進至鞏昌喬芳選將調兵𠞰擒逆回米剌印等恢復臨洮蘭州洮州等城平定地方時山西亂作復移兵征𠞰收復蒲州解州運城河西逆回丁國楝等叛據肅州喬芳遣將征𠞰密授方略攻克肅州擒賊首丁國棟黑二等陳斬火者哈只等恢復城池誅逆撫順師行到處民皆安堵大小數百戰皆躬自督陳將士奮勇每戰必克又請豁八府一州積年荒糧招撫流移民皆復業清釐驛弊裁革冗役請令守兵興屯以足兵食規取全蜀糧餉不增而士馬飽騰知人善任所用將佐張勇趙良棟等統兵征𠞰所向成功鎮全秦十年兵民感戴以老乞休加少保兼太子太保馳驛回京卒諡忠毅劉芳名字孝五寧夏人順治二年任寧夏鎮總兵官抵任即平固原叛將武大定三年秦州逆賊賀珍王元馬德作亂芳名以計先後擒斬之四年招降香山諸寇散其餘黨地方以安十六年加左都督領兵征海寇卒於江南贈太子太保諡忠肅詳人物傳劉斗字耀徽奉天人巡撫甘肅先是巡撫自甘駐涼康熙五年移駐蘭州自斗始為政嚴明綱紀肅清恩威並用清豁全省新舊荒糧民沾實惠又修學宫崇廟祀文教聿興士庶仰戴升福建總督圗海滿洲人康熙十三年以大學士出為撫逺大將軍威著邊疆西人懷服時王輔臣餘黨未平海招撫順逆盡來歸附逺近百姓安堵先是平涼一郡被輔臣荼毒尤深海撫綏安輯民樂更生建祠勒銘以志感洵功在封疆澤及生民吳丹滿洲人建威將軍康熙十三年同大將軍圗海討王輔臣贊勷軍務悉合機宜號令整嚴約束部卒兵臨之地市不易肆與士卒同甘苦恩威並用人懷敵愾平涼既下逆黨猶未盡除丹數騎入城宣布德意開誠撫慰人皆傾心向化百姓賴以安全陳福字東海本延綏人遷居寧夏康熙十三年任寧夏總兵時吳三桂反王輔臣據平涼遙應之遣偽將西陷洮蘭東占花馬池定邊時寧夏兵先經調赴征川留者甚少人情洶洶福按劍曰吾知有朝廷封疆敢有異議者齒此劍遂整兵東向復花馬池定邊斬偽將朱龍陳江倪五等寧夏東路平隨移師西向固原刻期至平涼會嵗暮氷雪衆兵欲暫歸福鋭意前進不許至惠安堡兵變遇害先是福家口留川吳逆遣人持逆書偽劄結福福得書不啓視即表封奏聞時賊據東路不得通福乃遣其弟壽由口外求蒙古引路七日至京上召壽問勞仍命壽從口外歸授福陜西提督加世職命未至而福已歿贈公爵諡忠愍詳人物傳張勇字非熊咸寧人順治二年授陜西督標右營遊擊在西安殺賊十七次後擒逆渠賀𢎞器李明義復斬王元馬德有功五年從總督孟喬芳征𠞰河西叛回身先士卒敢戰先登恢復鞏昌臨洮蘭州涼州甘肅城堡數百餘處斬偽王土倫太等生擒賊首丁國棟黑承印前後斬級二萬有竒擢肅州總兵官逆回定後城郭廟宇俱被殘毁勇捐資補修完固各處墩臺隘口凡羌番出沒之所築牆設柵控扼防守夷人不敢犯境城南黑水過硤處天雨水勢泛溢捐資數千鑿石築堤民田獲稔滇逆變叛全陜震動臨鞏已失河西數郡人心洶懼勇統兵援𠞰行至靖邊驛賊遣人投密書勇立斬之刻期渡河復蘭州後平慶諸處投誠全陜底定晉靖逆將軍一等侯在邊三十餘年軍民感戴卒諡襄莊趙良棟字擎宇延綏安邊堡人初任寧夏水利都司因家焉順治初從總督孟喬芳𠞰叛回以擒偽將恢復地方功升髙臺遊擊調征滇黔平水西諸苗升廣羅總兵聞父喪終制補任大同總兵移鎮天津滇藩反平涼提督王輔臣亦叛寧夏提督陳福被害沿邊擾亂上簡良棟安撫星馳至鎮宣布朝廷德意誅首惡寬脅從逺近悉安在鎮三年日練兵儲餉規畫已定乃疏請以徑卒五千獨當一面進取川滇康熙十八年冬遂自裹行糧由八堵山進密樹關復徽州略陽十九年正月朔兵臨白水江賊對江列營拒守江流湍湧時無舟楫良棟身先士卒躍馬浮渡兵從之賊潰走追至青川大敗之乘勝恢復成都申嚴紀律納降撫順市肆不移授勇略將軍兵部尚書雲貴總督復雲南省城毫無所取授鑾儀衛使卒諡襄忠詳人物傳王進寶字顯吾靖逺人順治初從總督孟喬芳討叛回立功授守備升遊擊值西夷狂逞隨提督張勇率師討之以功升洪水營參將既而海虜輸欵乞住牧大草灘地進寶力持不可並議城單于故址遂改名永固以進寶為副將駐之番人畏威無敢飲馬城窟者晉西寧總兵會逆藩吳三桂反王輔臣亦叛蘭州已陷即統兵直抵黃河夜以皮囊冒險暗渡賊兵更番迎敵屢戰屢捷遂拔安定復金縣乘雪夜破臨洮復蘭州南安天水相繼投誠功上晉陜西提督鎮秦州南扼川逆北復通渭靜寧平涼隴右既平晉奮威將軍進取四川鎮守巴蜀卒贈太子太保諡忠勇詳人物傳葉映榴字丙霞江南上海人康熙十八年任陜西提學道衡鑒公明一時人文蔚起升湖廣督糧道值夏包子亂殉節贈工部侍郎諡忠節孫思克字復齋鑲白旗人康熙元年任甘肅總兵四年移駐涼州剔蠧蝕汰冗卒簡將材核儲餉勵精振刷將士精強嘗戒諸將以戢兵安民駐涼二十年民不知有兵吳逆叛隴右諸郡皆陷思克提兵征討收復靖逺平涼削平南安天水師行之處秋毫無犯民皆安堵二十三年升提督甘肅軍務後征噶爾旦領兵出塞討平賊衆全軍奏凱晉振武將軍鎮守河西幾四十年恩威所被兵民感頌卒贈太子太保諡忠襄潘育龍字飛天靖逺人從軍督標屢立戰功康熙十四年值吳逆叛臨鞏秦蘭俱陷育龍隨征復涇州戰慶陽寧州功多固原失利寧夏道不通貝勒命由紅河川等處與賊連戰七晝夜卒達寧夏見提督陳福靣達機事從撫逺大將軍圗海討叛逆王輔臣恢復平涼一帶復興安城邑從征克川滇二十七年升肅州副將三十年升總兵在鎮八年出師敗敵於半箇山黑山兒湖察黑包月兒灣三家板等處凡五捷捐俸修築邊牆自野麻灣至下古城袤延一百七十里商旅安行番夷斂迹優恤軍士捐資修復嘉峪關七層城樓內安外攘夷人畏服三十五年征噶爾旦並糧減卒倍道抵昭磨多遇敵力戰以寡敵衆飛炮中右頤戰益力敵大敗凱旋調總天津兵四十年升固原提督捐資修學設義孰因米價騰貴令鄉莊米止聽民買兵不得購發銀買糧食以贍兵米多價平兵民俱裕秦隴連山曠野俗悍便弓矢多盜凡壯勇之徒悉致幕下飭汛防定緝捕賞格盜息民安固原士馬隊伍器械俱甲天下四十八年晉鎮綏將軍卒贈太子少保諡襄勇詳人物傳江琦字思韓江西上饒籍先世以功為寧夏衛世職琦生而英勇武藝絶倫康熙十三年吳逆叛亂從總督趙良棟征討有功後征噶爾旦奮勇先登大獲全勝論功纍升總兵調鎮延綏河北四十八年擢甘肅提督建威布恩慎選舉核冗濫簡士馬繕軍裝謹斥堠兵番畏服卒之日兵民為建坊焉殷化行號熙如咸陽人康熙三十二年以都督僉事任寧夏總兵三十五年五月內出口征𠞰至昭磨多地方大破厄魯特三十六年三月復出口𠞰噶爾旦加授都督同知富寧安滿洲人端方正直亷介謹慎康熙五十四年以吏部尚書辦理軍需嗣為靖逆將軍統師出塞馭兵紀律甚嚴而有恩塞外番夷畏威懷德在巴里坤十餘年賊人無敢近塞擾邊升大學士阿爾納滿洲人任副將軍持躬謹慎奉職公忠領兵出塞收復土魯番平定青海功績甚著兵之所至毫不擾民民皆感頌甘肅通志卷三十
