死任光啓妻朱氏甘州人夫被賊殺氏自縊百戶談文德妻趙氏甘州人文德給咨赴部賊入城氏及二女閉戶投繯同死生員李啓明妻黃氏甘州人賊執不屈被殺生員蔣明理妻王氏甘州人城陷自縊姑王氏見氏死亦投井死生員羅俊彥妻楊氏甘州人孀居二十三載城陷投井死鄒裔儒妻任氏甘州人氏有姿色賊入城投于井賊從井撈出撫慰之任怒罵甚厲終不肯屈賊斷其臂仍推於井投瓦石擊死生員張篤忠妻任氏甘州人流賊入城篤忠被執任恐見辱挾幼子投井死武宦妻王氏甘州人城陷懼辱投井死陳良䇿母孫氏甘州人流賊入城投井死趙國正妻王氏甘州人同趙國祥妻任氏俱孀居聞賊入城共飲藥死李天俞妻王氏甘州人崇禎癸未夫被賊執王謂妾匡氏曰此吾自盡時汝可逃命匡不肯逃遂同登山險處投崖死車氏甘州人遺其夫名氏年十七時孀居聞闖賊犯甘先語人曰我必死决不令賊氛汚我也及賊過峽口遂投井死烈婦石氏甘州衛人河南南陽府同知鄭我完之母我完既之官妻王氏奉姑家居明末闖賊圍甘州將陷石氏預戒家人積薪中庭及城陷攜王氏及一孫女入積薪中趨命縱火並自焚死越十日發視之姑婦遍體焦灼猶相牽挽女稍遠𩕄髮卷曲顔面如生時年十一趙濟美勒石紀事曰一門三烈有傳皇清韓桂姐張掖人四川重慶總兵韓成女年十四許字濟南參將孫進禮次子兆麟康熙三十三年兆麟病殁女聞訃悲泣不食即於是日自縊死時年十九歲雍正六年奉㫖加恩旌表楊運泰妻牟氏張掖人年二十二歲夫亡矢志守節撫育孤子歷四十餘年辛苦備嘗年至七十卒子進福監生雍正十年旌表姚巍妻楊氏張掖人夫亡時年一十八歲生遺腹子士新老姑在堂竭力奉養教子業儒李鳳印妻李氏年二十鳳印貿易江南殁於旅次生遺腹子撫養成立其姑權氏亦自幼孀居李奉事克盡婦道三十餘年如一日尉遲犒勛妻高氏張掖人生子一未周歲夫故髙時年二十守節撫孤後其子亦卒撫育孤孫備極艱苦志節愈堅年七十三而終生員保黃妻張氏張掖人夫死截耳自殘示無二志六十六歲卒客民秦忠龍妻曹氏夫死號慟幾絶飲食俱廢自縊柩傍指揮劉鵬妻朱氏甘州右衛人夫殁絶粒七日泣血而死孟文達妻劉氏張掖人生子宗賢方四歲夫亡守節撫孤四十餘年及宗賢死其婦劉氏有子三亦矢志守節奉姑教子雷顯妻張氏張掖人生子振域顯殁張時年三十撫育孤子矢志靡他四十餘年及振域死其婦陳氏年亦三十有子世榮堅志撫孤事姑以孝克盡婦職花君美妻陳氏張掖人生子二夫亡時年二十餘堅志守節撫孤四十餘年王國珍妻段氏張掖人年二十三夫亡子尚幼家極貧難誓死守節教子成立年七十餘卒凉州府明千戶王剛妻張氏鎮番人宣德間剛戰殁氏年二十八遺幼子二翁姑年七十餘氏以縫紉為奉養撫育之資二子俱成允稱節孝成化間建坊旌表指揮劉恭妻李氏鎮番人年二十三恭亡氏封髮矢死撫育子宇承襲世職歷至守戎嘉靖中旌表千戶蔡棟妻張氏武威人生子甫五月夫殁氏年二十七誓死守節養姑馬氏極孝嘉靖中旌表生員顧鵬妻劉氏武威人鵬沒氏年僅十九有遺腹生一子名宗學翁姑欲氏再嫁氏誓死不從孝奉翁姑撫育幼子備極艱辛萬厯三年建坊旌表蔡氏武威人年十六適邑人秦姓者甫一歲夫沒氏有遺腹家甚貧氏矢志靡他生子祚周及長以針指供其讀書後祚周入泮受室氏乃曰吾之所以不死者為汝未成立也今吾事畢矣遂絶食七日而死萬厯四十四年奏聞建坊旌表孟希顔妻董氏武威人苦志守節萬厯四十四年詔建坊旌表千戶文振妻陳氏永昌人嘉靖間振于黑潦池陳亡氏方十八歲聞夫死自縊者三救免後守節五十一年夀七十九歲奉文旌表千戶趙思義妻文氏永昌人嘉靖間敵入冦思義戰亡氏聞欲死以姑老子幼朝夕哭泣後事姑極孝撫孤襲職苦節四十餘年有司表之指揮何其顯妻劉氏鎮番人顯故氏年甫十七少艾無子誓死守節上臺憐其苦給以指揮半俸足不出門閾者終身如一日年七十餘卒生員陸之遇妻廖氏平番人自幼貞淑少寡遺孤襁褓氏艱苦備嘗教子瑜進學諸孫成立周士成妻郭氏平番人嫁逾年夫暴卒氏悲痛欲死姻戚勸之氏言夫死無子不死何待水漿不入口十餘日而死郭棟妻曹氏平番生員曹可敬女年二十八夫亡氏事姑嫜盡孝延師訓子相繼游泮通庠公舉節孝袁大器妻詹氏平番人天啓三年其夫援遼陳亡遺母垂老子勳甫四歲氏以女紅養姑教子取妻生孫孀居五十餘年鄉里罕見其面壽八十七卒常德妻甄氏永昌人年十八歲有姿色時遇闖變賊見而悅之氏用香頭燃面成泡賊怒將德凌虐而死氏負尸哭罵遂投井亡韓逢春妻馬氏平番人崇禎癸未闖賊入城虞其受辱投繯而死監生俞可極妻郭氏平番人年二十六孀居甘守清貧矢志不渝且嚴于義方教子成立閭里稱之徐氏平番人張繼宗子婦崇禎十五年闖賊入氏匿于屋壁被賊拽出氏遂左手扼賊吭右手持刀砍頸即自刎猶挺立不僵生員胡其美女延夀姐平番人其美常向壽講說曹大家烈女傳等書壽即領悟崇禎十五年正月闖賊用火攻燒堡門大肆殺掠欲挾之上馬壽多方脫身投井而死直指劉秉政表為烈女胡氏之門皇清劉金璽妻褚氏凉州衛人年二十八歲夫亡遺孤三人苦節五十餘年撫育後皆成立夀至七十七歲雍正三年旌表劉大濱妻金氏凉州衛人即褚氏之媳也大濱殁氏年二十二上有老姑下有幼子氏孝事其姑撫育幼子一門節孝雍正三年旌表徐可選繼妻李氏凉州衛人年二十四歲夫亡氏撫前妻所遺四子及氏出一子女工糊口諸子成立苦節三十餘年歲時伏臘身辦祭品必致豐潔雍正三年旌表徐自璧妻李氏凉州衛人節婦李氏之媳夫故氏年二十七孝事孀姑備盡婦道教養孤子與姑同寢晷刻不離年五十餘一門雙節雍正三年旌表王尚賓妻穆氏凉州衛人夫亡年二十七歲苦心守節志不更移上有年老舅姑下有幼稚子女氏紡績奉養苦節四十餘年已七十餘歲雍正三年旌表丁𢎞妻王氏凉州衛人氏年二十四歲夫亡守節孝奉翁姑存殁盡禮撫育幼子俱成立雍正三年旌表林可梧妻孫氏凉州衛人夫貿易殁于雲南氏年二十一歲立誓守節祗事姑舅撫遺腹子茹荼飲檗五十餘年壽七十六而終於雍正三年旌表馬逢雲妻牛氏武威人夫逝氏年二十二親老子幼孤苦難堪氏以事親撫子為己任四十餘年婦道無虧雍正八年旌表梁可正妻衡氏武威人正殁氏年二十五其子廕甫四歲家貧守節金石不移訓子勤學列名黌序雍正八年旌表安尚玉妻韓氏武威人庠生安偉母夫殁氏年二十六甘貧守節事親孝敬歷三十餘年如一日雍正八年旌表生員張璧妻楊氏武威人十七適夫張璧璧遊庠即故遺子道孔尚在乳抱氏年二十誓志撫孤成立入泮以明經歲薦雍正八年旌表兵丁張兆斌妻李氏年及笄于歸兆斌康熙五十四年其夫從征西藏病殁喪未能歸氏聞訃哀痛乘夜深投井而死雍正八年奉㫖加恩旌表段鐸妻牛氏武威人二十五歲夫故翦髮自誓孝養翁姑教子課讀守節二十六年雍正十年旌表侯用錫妻張氏武威人二十七歲夫亡遺腹生一子立志守節奉翁姑撫孤子歷二十八年雍正十年旌表狄金榜妻嶽氏武威人夫亡氏年二十九歲孝翁姑撫二子守節三十餘年雍正十年旌表蔡茂妻鮑氏武威人年二十九歲喪夫守節三十九年奉養翁姑教育二子親操井臼備歷艱辛雍正十年旌表孫瑞麟妻韓氏武威人夫亡年二十歲遺腹生一子家貧孝養翁姑訓子讀書守節三十餘年雍正十年旌表朱良貴妻張氏古浪人年二十三而寡二孤甫數齡度用艱窘氏矢志靡他撫子成立苦節四十餘年而殁李棲鳳妻俞氏古浪人夫故氏年二十五茹檗飲氷孝事其姑撫孤成立四十餘年如一日儒士吳道晃妻胡氏鎮番人年十九夫亡止有一女舅姑與父承璉憐其少艾無子欲移之氏誓不更適承嗣一子孝奉翁姑養生送老曲盡其禮千總周甲鼎妻張氏鎮番人年十六適周甲鼎合卺旬餘鼎從戎西寧以軍功授四川千總隨奉調赴部回家僅居七月赴任抵蜀而亡氏年二十餘痛不欲生遺産一男尋殞時幼姪繞膝耄姑在堂氏守節不改縫衽供之寧夏府明胡朂妻殷氏寧夏人年十六適朂朂病革語氏曰殁後幸無他適氏曰諾朂沒之夕氏遂自縊夫柩前事聞旌表都指揮王俶妻時氏寧夏人俶以戰死氏聞之即自縊殉夫死於敵妻殉夫死忠義兩盡號為雙節都指揮何淋妻施氏寧夏人夫亡氏年二十二誓節不辱撫其遺孤欽至於成立衛千戶孫泰妻王氏寧夏人年十八夫亡遺腹未娩氏以存宗祀不死及撫育遺孤慈且嚴不問門以外事强族利其有欲搆害王則閉門事女工以供衣食日夜號泣祝夫祈庇佑備歷艱苦及子洪成立而雙目瞽矣千戶彭泰妻李氏寧夏人夫陳亡年甫二十孀居撫孤旭成立誓守不改汪銓妻黃氏寧夏右衛人夫死乏嗣時氏年二十撫其女適配煢孑勤苦以終其身指揮曹潤妻雍氏寧夏中屯衛人年二十六夫亡遺孤宗堯二歲氏上事孀姑下育幼子暨宗堯承襲死於戰又撫遺孫伸歷官遊擊撫按題請旌表鄉稱三世節婦云都指揮李時妻劉氏寧夏人夫陳亡無嗣守節三十餘年夏人以夫為忠臣妻為節婦云都指揮汪鸞妻郭氏寧夏前衛人夫死時氏年二十五矢志不二守節三十七年而終教子有成千戶劉鎮妻陳氏寧夏人鎮禦敵戰殁氏年二十六父母欲奪其志氏抱其孤濟曰背夫不義棄兒不慈吾安忍為之遂不再適撫濟成立陶湶妻張氏寧夏人夫死氏年二十九遺孤在襁更無伯叔兄弟夫姊陶利人之賄逼之嫁氏自縊賴鄰婦救之活自是蓬垢自毁勤女紅辦衣食育其孤賓三十九年未嘗出外戶年六十八終事聞旌表後賓立功官正千戶參將种興妾陳氏中衛人景泰間興殁于賊陳自縊而死指揮黃雅仲妻耿氏中衛人夫亡氏年十八於葬夫時囑令預修雙壙人皆訝之以其幼無所出也後苦節至七十餘年卒同歸穴巡按表其門永康堡官侯儀妻張氏中衛人夫故茹苦飲氷堅持婦道孀居四十餘年西路同知張羽翀表其門生員蘇民望妻凌氏中衛人氏性柔婉孝於姑姑病失明旦夕扶掖不少倦聞姑聲即置兒亟前以聽使令躬女紅佐夫讀書每篝燈達曙民望疾革語氏自為計氏即以死許之民望故即引刃自裁家人匿其刃遂不食越日家人寢乃自縊時氏年二十二事聞建坊旌表指揮趙炳妻李氏寧夏人炳子承先妻李氏姑媳俱有淑德萬厯二十年哱賊反官軍至承先謀獻西城顧母有難色母曰兒苐往勿吾慮妻亦促之謂事不諧吾當先死及事泄被縛二氏果自縊慶憲王妃方氏憲王薨方年二十有七萬厯二十年哱劉構亂播虐宗祊妃匿嗣王帥錊于窨中賊益猖獗遂殉節以死事聞奉㫖建祠額曰褒節表坊曰宗烈千戶楊汝松妻朱氏寧夏人因男楊湛為王師糴糧决水哱賊恨執氏城頭欲汚之不從因囚之氏投繯而死千戶楊宷妻范氏寧夏人因夫運糧餉兵被賊執氏城頭欲汚之不從箠楚死百戶陳縉妻梅氏寧夏人縉擒殺逆丁張保賊縛縉殺之氏痛夫死又懼為賊所汚自縊死冠帶總旗白福妻王氏寧夏人因子葵獻城于官軍事泄被殺氏憤恨不食而死冠帶官熊彥吉妻林氏寧夏人彥吉從官兵討賊賊欲執氏配其黨氏聞死王明理妻王氏寧夏右衛人餘丁明理謀獻西城事泄賊持刀擊之傷伏地復蘇執氏氏不受賊汚至中途見殺孫時順妻謝氏夫係平羅家丁同夫俱被賊掠去氏懼汚暗抽賊刀自刎而死以上皆萬厯間建祠致祭廩生錢鏜妻楊氏寧夏人夫亡氏年甫二十七撫孤苦守四十餘年巡撫黃嘉善表其門李氏王氏寧夏常信堡女子其夫之姓名不詳被賊執至支解二婦至死罵不絶口又韓氏陸氏等三十七婦不詳夫姓名賊屠堡一時盡殺旌表祠祭把總王徹妻施氏寧夏人徹以密報巴拜逆謀為拜所殺並滅其族時氏年十八逃母家得免遺腹生子曰有光撫養成立得䕃千戶之職氏年九十餘歲卒副總兵戴三才妻劉氏寧夏人遭流賊之亂解赴襄陽自縊於旅舍中張守廉妻王氏寧夏人年二十五夫亡守節五十年慿機杼以營葬教子課讀家範謹嚴子奎成名以孝著百戶楊映春妻趙氏寧夏人夫亡始殮之夕氏以簪自刺其喉家人救之得活時年二十一長子開泰三歲次子開運甫周歲茹荼撫孤其嫂憐而迎之歸勸其改適氏怒以燈檠投之折其二齒終身不復過趙門壽七十卒開運仕為石屏營參將魯中元保寧夏人天啓間女子中元保其小字也受某家聘其家貧不能娶姑故以穢言汚女女聞之遂自經副使丁啓睿罪其姑與夫朱氏武氏孟氏寧夏人功加參將楊名題之叔祖母朱氏嫁夫一年而寡遺腹有子撫之成立其嫂武氏亦守志撫孤家道克昌又名題之妻孟氏亦年未三十而寡食貧撫孤三子成立人稱一門三節指揮張克簡妻季氏寧夏人年二十八夫亡守節五十餘年撫子成立知縣李杼妻王氏寧夏人年二十九夫亡撫其子子亡又撫其孫郁教養成名守節六十年壽八十八終慶藩宗屬允齊妻閻氏寧夏人年二十夫亡守節撫子暨孫成立百戶魯敏妻夏氏寧夏人年二十七夫亡閲歷饑饉堅志不移苦節五十年孝事公姑教子成立宗室妻閻氏夫故時氏年十八撫子倬子亡又撫遺孫竒貧苦守節凜氷霜千戶石崑妻孫氏寧夏人少年守節訓子成名督撫皆表其節馮國瑞妻王氏慶藩教授馮用賢子國瑞之妻也國瑞亡氏年二十四教授老而貧氏日夜紡織以供甘㫖教子爾暉成立年至七旬以壽終副總兵解文英妻徐氏寧夏人年二十七夫殉難守節三十餘年教子繩祖成立奉國將軍朱倪㸃妻眭氏寧夏人倪㸃被掠赴襄陽臨岐屬眭他適眭嗚咽不能出聲紿倪㸃出遂自縊死總旗李某妻王氏名善清寧夏人舅病風纍年遺穢卧榻氏日侍側滌除夫死夫弟逼之嫁氏不從又脅之析居氏不得已攜二子還母家其母病熱思氷時八月不可得氏夜以二器貯水露庭中祈祝明旦水果成氷母病遂愈生員胡璉妻陳氏寧夏人璉赴舉璉父病篤氏率幼子晝夜候寢門外調湯藥滌穢惡一出誠懇璉父將死呼氏之父語曰吾病甚苦纍汝女願汝女有子孫好如汝女也鄉黨皆稱孝婦千戶徐圯妻梁氏靈州人圮早亡氏年二十子勇少孤訓讀習射卒襲前職氏年九十四壽終盧士堂妻楊氏靈州人士堂之母年近七十兄士序夫婦早亡遺孤長三歲次兩月而士堂亦卒氏年二十有五生二子長夭次弱養姑撫幼備極艱苦卒能成立子姪奉葬孀姑陳鳳妻郭氏靈州人鳳賈於維揚死氏年二十一守節事姑巨室多求配誓不二夫年八十終羅伏受妻馬氏靈州人聞夫陳亡哭五日絶食而死事聞旌表指揮蘇俊妻楊氏靈州人俊故時氏年二十五子霈甫半歲戚豪欲奪其志氏堅守大義撫孤成立年至七十奉㫖旌表指揮楊珍妻楊氏靈州人珍暴卒氏年二十四遺腹生子善苦心撫育堅守四十餘年河東道張九德表其門李國俊妻黎氏靈州人察罕破吳堡國俊自刎氏亦自經韓某妻李氏靈州人年十八居村落遭察罕之變賊猝至見氏挾之上馬氏有乳下子抱之不舍因墜馬下賊復挾之氏大罵不絶且嚙賊手賊怒殺之守城者目擊其事三日後賊退家人覔尸原隰時五月酷暑氏面色如生嬰兒猶伏尸飲乳鄉里異之李世松妻李氏靈州人松死察罕之變氏年二十八無子惟有遺腹三月後生子愈薰撫養成立年八十四壽終王養杰妻趙氏靈州人察罕之變養杰戰死氏立志守孤年百有二歲卒千戶張俊才妻孟氏靈州人俊才故遺子出圖七歲撫育成立歷三十二年高關索靈州人高宣之女其父本軍籍善製火器遂為靈營炮手以年老無子贅壻于家不數載壻卒亦無子索年二十即不嫁其後父卒無充軍者索買一婦經營其家務竟代父職索軀長偉多力善射當事者試以弓馬火器諸務悉中竅㑹牛成虎圍靈州索隨衆守城賊作雲梯魚貫而上衆驚懼索為火筒燒之賊不得上且乘間更焚其梯靈城保全火器之力居多後寧夏總兵劄授火器千總河東道表其門曰女中丈夫徐氏後衛人生員鄭琯之伯母也年二十夫亡遺孤僅半歲又值兵燹家貧如洗氏備嘗辛苦撫孤成立守節五十年鄉人立碑表之貢生宣大治妻魏氏後衛人夫亡氏即撞夫棺而死巡撫陳價題旌其門曰貞烈生員寧汝愚妻鄭氏後衛人夫死氏年二十七教子成立任教授壽八十終毛倫妻徐氏後衛人夫亡氏年二十二子在襁褓苦節教育其子及孫振鷺俱入庠夀八十䝉旌表劉天祥妻王氏後衛人夫死自盡棺側王天渠妻張氏渭南人李自成之叛夫婦因兵荒逃竄天渠中途病故氏年二十九攜六歲之孤就食寧夏傭針指以度日守節五十三年慶府安西郡王妃鄧氏闖賊僞將牛成虎入寧夏塗炭宗藩妃守志不辱自縊而死慶世孫竒權妻王氏與鄧妃同日死後衛操守髙遴妻孫氏後衛人城破賊挾之憤罵不屈賊怒以刀刺之身被七創已死賊去復蘇皇清金夢暘妻王氏寧夏人年二十二歲夫亡翁姑俱老養生送死備極艱苦守節教子成名李茂功妻陳氏寧夏人年二十八夫亡守節撫前妻子如己出諸孫珣等皆氏教養成名周親撫孤施藥活衆以孀婦持家千總姚育俊妻劉氏寧夏人年二十六夫亡守節誓不再適撫兩歲孤兒教訓讀書成立守節四十餘年康熙三十七年旌表生員俞臯謨妻陳氏寧夏人年十八歲于歸二十二歲夫亡守節四十餘年事姑育子孝慈兩全教子成名康熙四十四年旌表參將羅萬倉妾蔣氏寧夏人臺灣朱一貴之亂萬倉戰殁蔣閉戶自縊于署雍正二年具題奉㫖給銀六十兩立碑墓旁鐫姓名表其貞烈鄭貞女寧夏都司鄭金女許字監生張鵬羽鵬羽前妻朱氏生一子而殁續聘鄭未娶鵬羽卒氏時年十八聞訃涕泣欲往父母不可女飲泣不食不得已聽之至則哀慟欲絶守節張門不復歸鄭先是女夢鵬羽捧一紗若付託者前妻子五歲乳名紗哥自此遂為張氏婦撫子如己出守節幾四十年雍正七年旌表千總劉盡孝妻馮氏寧夏人盡孝出征甕金陳亡遺子三歲氏年二十六歲立志守節雍正七年旌表王之茂妻楊氏寧夏縣人夫亡年二十八歲矢志守節上事翁姑下撫子女始終如一雍正八年旌表董立寰繼妻楊氏寧夏人年二十二夫亡矢志守節撫前妻子含璞如己出含璞亦早亡撫孫用威教之成名存兩世之孤備極艱辛生員王人龍妻石氏寧夏人人龍病死子廕才六歲時氏年二十六守節撫孤資女紅以養生年七十卒吳良宰妻蘇氏靈州人年二十七夫亡遺子豪六歲為娶馬氏生孫七歲而豪卒復撫養其孫守節育孤後蘇與馬俱享大年韓永祿妻沈氏寧夏人年十八夫亡並無子女孝事翁姑守節五十餘年指揮黃三鳳妻朱氏寧夏人十九歲夫亡撫三月之孤至於成立後子媳俱亡有孫女四人又劬勞撫養遣嫁而後終守節五十年張木工妻郭氏寧夏人二十八歲夫亡矢誓不嫁孝事翁姑撫子成立守節三十五年女適遊擊馮繡繡遣人迎氏就養氏以舅年九十不從其節孝皆可傳陳化先妻劉氏寧夏人年二十餘歲夫亡撫子念孝娶婦劉氏念孝復亡遺婦劉氏年二十三歲姑婦同守節教孫顯祖成立生員李桂妻武氏寧夏人年二十八夫故守節子幼家貧針工度日至七十五歲子孫成立無疾而終黃文璧妻管氏寧夏人年二十八歲夫亡遺孤三歲氏甘貧撫子守節終身其姪亦早失父母氏並撫之皆成立王咨母周氏寧夏人年二十夫亡撫子成立咨亦早亡遺妻蘇氏年甫十九同姑守節撫子佳賓成立樊韞秀妻江氏寧夏人年二十五夫亡守節四十餘年撫子邦彥又早亡邦彥妻高氏年十九立志苦守兩世貞節生員孟鏐妻張氏靈州人鏐早夭無所出氏矢志守節孝事翁姑視夫之兩幼弟鏋鈺篤如手足宋天寵妻王氏靈州大沙井人寵卒氏二十四歲守志撫孤子孫成立卒年一百一十七歲王盡忠妻鄭氏靈州人生二子一女年三十吳逆賊黨李黃鷹將攻靈州駐兵中營堡其部卒悅氏色乃鞭其夫出城刈草乘便挑之氏攖賊大罵賊拔佩刀挾之氏攜刃擊賊不中乃掩戶自刎者三暈絶仆地氏蘇復奮起刺肋者再卒以死殉張伯元妻孟氏靈州人伯元戍蜀卒氏年二十五育一女更無舊業茹茶飲檗者五十年顧吕妻李氏靈州人吕從軍滇省卒氏年二十六遺腹五月氏親攜骸骨歸里苦節撫孤成立五十有三載守備教允文繼妻孫氏寧夏中衛人允文任石空寺堡守備康熙六十一年四月病故時氏年二十九歲即欲從夫因三子跪勸至五月二十八日自縊于夫柩旁雍正七年具題旌表井田妻劉氏中衛寧安堡人年二十八夫亡守子體仁成立體仁又早亡同婦張氏共守其孫牧姑婦孀居各數十年生員馬逢禹妻朱氏中衛寧安堡人夫亡年二十歲遺子隆甫一歲氏上事翁姑下撫弱子克盡婦道氷檗之操始終不渝隆亦能孝養其母萬國元妻張氏中屯衛人夫亡時氏年二十有六舅姑垂白子女稚幼氏勤女紅事親以孝撫孤象新入泮卒年七十生員吳國儒妻王氏後衛人儒殁時子振基生甫五月氏年二十五歲食貧紡績撫孤成名苦節四十四載把總談英妻單氏後衛人英從征湖廣陳亡時氏年未滿二十誓不改節教子維翰成諸生旋復早卒撫孫宗舜入太學卒年八旬宋氏後衛人生員成明成清之母惠安遭兵變城破氏被執時年二十九罵賊不屈炙以火身無完膚終不屈遂殺之汪湧妻華氏惠安人城破人皆遁去氏以姑病在牀不肯遁賊挾氏欲去氏抗拒憤罵激怒殺氏於姑旁賊去夫至見血漬中嬰兒尚哺乳焉陳氏衛廩生陳安䇿之姊也夫故年三十歲號泣不絶聲深夜自縊柩前張良吉妻宋氏平羅人年二十八歲夫故守節四十七年雍正十年旌表張文聲妻李氏平羅人年二十三夫亡撫遺腹子棟成立守節三十餘年西寧府皇清生員郭榮祖妻鄒氏西寧人時年二十七歲榮祖赴長安鄉試疾卒氏立志守節事姑孝撫二子俱成立讀書出仕又撫諸孫孫守邦為長子縣令茹氷苦守五十餘年而卒順治十二年年已七十九歲十三年具題旌表烈女賈玉瑪西寧人賈洪基女許字本衛童生周琦未婚琦死訃至女欲往弔父母不許水漿不入口者七日父母勸慰令弟妹防守女乘隙即自縊死衆議與壻合葬順治十六年具題旌表李芝玉妻何氏西寧人年二十三生子昌甫一歲夫故氏矢志守節撫子入泮未幾昌亡又繼姪孫䕃桐不數年而亦殤苦節五十餘年樊增諫妻吕氏西寧人年十六于歸十年而夫亡遺四子皆幼氏歷盡辛苦撫子成立卒年七十有四賈多寧妻嚴氏西寧人年二十八夫故氏立志守節撫三子皆成立壽終七十三歲宋竒士妻任氏西寧人年十四歸宋門十二載而夫故家貧守節教子成立荼苦三十餘年張進東妻程氏西寧人年二十四夫死遺孤二歲氏誓撫孤成立守節三十餘年趙裔振妻楊氏西寧人年二十七夫故遺子緒周甫三歲氏上事孀姑下育幼子歷三十年艱苦備嘗生員趙裔錦妻談氏西寧人年二十八夫故親老子幼家計維艱氏堅持節操誓死無二奉姑教子歷三十年如一日杜成時妻賈氏西寧人年二十三歲夫故家貧子幼艱辛萬狀守節三十餘年郝麟妻張氏西寧人年二十九夫故遺孤子饔飱不繼誓死無二甘貧撫孤三十餘年田世爵妻王氏西寧人年二十九夫故遺二子皆幼氏食貧茹苦守節三十六載撫孤成立把總馬雲妻馬氏西寧人年二十七夫故立志守節撫孤成人歷三十餘年張廣均妻劉氏西寧人年二十六夫故遺子在襁褓氏甘貧撫子艱苦備嘗歷三十八年張天德妻李氏西寧人年二十四夫故守節三十年子文魁妻張氏年十八文魁亦死守節三十八年朝雲秀妻李氏西寧人年二十七夫故氏堅志守節撫孤親族有勸改適者氏面斥之孀居四十八載李標妻閻氏西寧人年二十七標疾氏籲天願以身代標故哀痛不欲生時子尚未周歲甘貧守節撫孤入泮賈涵珍妻崔氏西寧人夫故氏晝夜號慟絶食求死延至七日殯夫之夜伺人睡熟投井自盡時年三十二歲李舒妻張氏西寧人年二十五明末時流賊入室氏恐受汚投繯自盡遺長子永福娶張氏年二十四次子永祿娶張氏即張氏妹年十九兄弟相繼疫亡長婦守節四十一年撫子亨嘉入泮介婦守節四十五年撫子亨泰成立一門之內姑婦節烈直𨽻秦州晉苻堅妾張氏秦安人明辨有才識堅將入冦江左羣臣切諫不從張氏進曰妾聞天地之生萬物聖人之馭天下莫不順其性而暢之故黃帝服牛乘馬因其性也禹鑿龍門决洪水因水勢也后稷之播植百榖因地之氣也湯武之滅夏商因人之欲也是以有因成無因敗今陛下復何所因也聞人君有伐國之志者必上觀乾象下採衆祥天道崇遠非妾所知以人事言之未見其可願陛下詳思之堅不聽遂興兵張氏請從堅果大敗於壽春張氏乃自殺苻登妻毛氏不知何許人壯勇善騎射登為姚萇所襲營壘既陷毛氏猶彎弓跨馬率壯士數百人與萇交戰殺傷甚衆衆寡不敵為萇所執萇欲納之毛氏哭且罵曰姚萇無道前害天子今辱皇后皇天后土豈不鑒照萇怒殺之吕纂妻楊氏𢎞農人美艷有義烈夫纂為吕超所殺楊氏與侍婢數十人殯纂於城西超慮齎珍物出外使人搜之楊氏厲聲責超曰爾兄弟不能和睦手刃相屠我旦夕死人何用金寶超慚而退又問楊氏玉璽所在楊氏怒曰盡毁之矣超將妻之謂其父桓曰后若自殺禍即及卿宗桓以告楊氏楊氏曰大人賣女與氐以圖富貴一之已甚其可再乎乃自殺時吕紹妻張氏亦有操行年十四紹死便請為尼吕隆見而悅之欲穢其行氏遂开樓自投於地二脛俱折而死唐盧甫妻李氏成紀人父瀾永泰元年任蘄縣令梁宋兵興界內有劇賊二千餘人瀾挺身入賊結以誠信賊並降附百姓復業時徐州刺史曹升知賊降掩襲之賊得脫入縣將殺瀾瀾從父弟渤詣賊救瀾請代兄死瀾又請留弟女盧甫妻又泣請代父死並為賊所害宣撫御史以節義聞詔書嘉美贈孝昌縣君瀾渤亦賜官秩明關士毅妻王氏秦安人毅早卒無子氏誓以死不更事他姓事姑柴氏至孝家貧紡績自給宣德間旌表千戶阮泰妻楊氏秦州人泰卒於天順八年楊痛悼幾絶時年二十有三幼子在抱葬夫後矢不二節乃不輕出閨門守節五十餘年年七十五卒指揮陳耀妻馬氏秦州人耀早卒氏守節終身正德中旌表千戶髙鵬妻趙氏秦州人鵬早卒事姑撫子至老靡他正德中旌表指揮向璽妻堅氏秦州人璽卒氏堅守苦節終其身嘉靖中旌表董璧妻李氏秦安人璧早卒氏年二十有三撫遺腹子克用亦早卒氏耕織寡處垂四十餘年嘉靖癸巳有司上其事詔旌其閭安克慈妻劉氏秦州人慈卒氏撫二孤守節終身州牧建坊表之庠生侯清妻張氏兩當縣人清亡氏年近三旬甘貧守節教子成立嘉靖間奉㫖旌表其門生員李蘭繼妻胡氏秦安人蘭元配姚遺子邦乾及女皆幼氏撫之如己出二子視之猶生母焉蘭卒氏年二十有七乃斷髮閉帷飯蔬飲水人不能堪守節三十餘年郭進妻張氏秦州人進卒張年二十五甘貧守節四十餘年州守以聞旌表吳從道妻王氏秦州人從道早卒王誓靡他撫幼子昭成詔旌其門李書勤妻高氏秦州人高年十六慟夫早卒每欲同死其家百計防之得免高赤貧而持節益堅鄉閭義之孀居五十餘年御史題旌張緒妻王氏秦州人緒早卒王撫二孤以守節詔旌其門翟文妻李氏秦州人文早卒氏年二十苦守數十年如一日事聞旌表楊景和妻何氏秦州人和卒氏年二十有五守節至老楊一乾妻黃氏秦州人乾卒氏年二十至老不變李勇妻劉氏秦州人勇卒氏年二十有二守節至老徐尹正妻祿氏秦州人正卒氏年二十有五子在抱撫鞠至老指揮尹正妻徐氏秦州人正死於陳氏年二十有一無子矢志守節千戶王鳳妻髙氏秦州人鳳早卒氏孀居守節撫育幼子有司上聞旌表黃欽妻謝氏秦州人欽卒氏年二十四苦節至老有司表之郭祐妻孟氏秦州人祐卒氏年二十家貧日績麻拾禾以撫二孤年八十卒韓內妻薛氏清水人年二十夫亡誓不再醮撫幼子成立曹邦彥妻樊氏清水人少喪夫家貧守節撫子成立鄉人共推庠生頓謙妻雷氏清水人夫沒以節自守訓子成立柳盡性妻李氏清水人年十八喪夫又無子以死自矢更無異志後撫姪為嗣以供先祀庠生王柱妻馬氏清水人夫沒時年最少哭之喪明貞節自持訓孤成立庠生周訓妻李氏清水人家至貧夫故親族憐其苦皆勸之嫁終不易節杜邦基妻崔氏清水人年十九夫亡終身守節撫孤成立庠生王之耳妻雍氏清水人年二十夫沒痛哭瀝血撫遺孤至成立終身不改孫攀妻張氏清水人年十九夫亡守節終身不易撫子有成貞靜賢孝巡撫給匾旌奬劉仲妻柳氏清水人年二十有五喪夫苦節五十八年撫孤成立巡撫旌奬生員李翰傑妻王氏清水人年二十夫亡守節育孤成名監生李玘妻周氏秦安人玘卒氏矢死不二以女紅自給年逾五十而卒伏友英妻張氏秦安人年二十一英沒守節終身王愷妻李氏秦安人年二十愷卒遺腹生子環守節撫育雖親黨亦不輕見年八十八縣令給匾表之生員孫丕顯妻雷氏秦安人事公姑至孝因賊傷姑口罵逆賊觸石而死有司表之生員張登縉妻王氏秦安人年二十二歲流賊陷城賊欲辱之厲聲罵賊自刎而死有司表其門生員蔡兆魁妻黨氏秦安人夫死年二十撫子苦守終老事聞旌表貢生成三俊妻梁氏秦安人夫死氏年二十四二子惠吉迪吉尚孩抱甘貧守志終身俱撫成立魏景芳妻李氏禮縣人芳早喪氏年十九不飾服不修容笑不見齒年八十事聞旌表趙永妻孫氏禮縣人永死氏年二十以刀斷髮誓不再適遺子一歲名翰撫養讀書由貢生任寧海州判奉㫖旌表生員劉密妻趙氏禮縣人夫死氏年二十六歲誓死靡他撫二子完節趙貞妻趙氏禮縣人氏年二十歲夫死生子方三月紡績度貧始終完節獨𢎞士妻魏氏禮縣人氏年二十𢎞士亡遺孤二歲氏痛哭幾絶終身無二志贈員外郎郭璣妻淡氏徽州人璣早卒氏忍饑力田自活艱辛萬狀撫遺孤垂三十年鄉里無間然詔旌其門後誥贈太宜人于一化妻許氏徽州人氏年十九化卒子尚提抱氏傭績以葬其夫撫遺子成立年八十餘詔旌其門生員張統妻任氏徽州人統卒氏年二十一善事舅姑及舅姑亡殯葬如禮以夀終生員郭篆妻郭氏徽州人年二十篆沒茹苦四十餘年訓子成立尚夫其妻周氏徽州人蜀盜入徽夫婦避難至兩岐亭遇盜夫其逃奔周為所執强挾上馬周自投地再挾再投地大罵不從遂遇害王烈女名枝兒徽州人王文女也年十八蜀冦入徽父兄被殺又以刀脅枝兒欲汚之枝兒哭罵不從遂遇害州人為立祠祀之貢生孫光先妻羅氏徽州人光先廷試回殁於旅邸氏聞之痛哭飲毒而死題請旌表黃烈女兩當縣人庠生黃元凱之妹崇禎丙子年流冦入嘉陵江上烈女被虜强逼不從罵賊冒刃而死時年十九皇清鄒守業妻馬氏秦州人年二十四歲夫亡家貧矢志撫子成立守節三十六年雍正十年旌表楊啓泰繼妻張氏秦州人年十七適泰克修婦道鄉里稱賢吳逆之變氏避難南山中忽遇賊龜峯山之巔舉家驚散氏與弱子女被執氏遂抱一子二女投山崖下及暮家人跡之氏已殞命子女無恙人咸嘆異云四川副將吕錦妻馬氏秦州人錦亡守節四十年治家嚴肅教子讀書又建義學教吕氏族中子弟卒年七十一猶及見諸孫為生員閻臯妻韋氏秦州人臯得疾暴亡氏痛泣幾絶夜分自縊韓昌有妻李氏秦州人康熙十四年六月時值逆變遊兵四掠氏年二十二以負幼子遁遲為賊執氏連批賊頰詈不絶口賊恚創之氏身受七創氣不少挫以頭骨未斷至夜復蘇七日而絶張岐鳳妻侯氏秦州人鳳卒遺子璘五歲次子玠在襁褓氏痛哭泣血欲殉夫其姑勸止之氏葬夫畢茹荼絍績仰事俯育四十餘年璘玠俱遊泮陳堯道妻胡氏秦州人道早亡遺孤三省甫四歲氏備歷艱辛撫育成人食餼郡庠壽七十三郭邦域妻王氏秦州人域亡氏撫二孤成名子肇周復亡撫遺孫年七十六勤勞不倦監生胡汝薦繼妻王氏秦州人年二十夫故守節年五十九卒廩生胡如英妻周氏年二十而英亡或以氏無子勸嫁不從立志守節年六十八卒王氏子庠生胡璿娶路氏年二十五璿亡教育幼子志寅奉侍二孀姑色養備至年三十九先姑卒時稱一門三節張曙妻鄧氏秦州人佐夫奉親色養喪葬夫殁氏年二十餘子幼家貧紡績自給年八十餘如一日云生員蔡曰康妻張氏秦安人年二十八歲曰康殁未有子惟楊氏妾有孕氏以夫嗣未立禱於神祗冀生一子及産得男親為哺乳愛如己出苦節三十餘年如一日雍正三年旌表生員蔡曰乾妻周氏秦安人年二十七歲夫故哀痛不欲生以翁老子幼勉强存活逮翁棄世喪葬盡禮守節三十餘年二子成立雍正三年旌表生員張懷光妻龎氏秦安人二十七歲夫亡投繯幾絶家人救之得免親操井臼奉親撫九歲孤孩竟至成立年逾六旬雍正三年旌表儒童路灝妻孫氏秦安人灝卒氏年二十六歲無子欲以死報念孀母無依撫養猶子以承夫祀甘貧苦守四十餘年奉母九旬夀終雍正三年旌表吳順妻李氏秦安人夫亡無子氏年十九歲育兄子承祧苦節終身年七十三卒趙清望妻鄧氏秦安人年二十生一子名思春甫八月夫貿易不知所往氏守之終身衣不完食不飽撫子成立年六十七而卒何洛瑞妻楊氏秦安人年二十二夫卒子會僅二歲矢志撫孤及會亦夭與其媳安氏撫孫如信桑成章妻姚氏秦安人年二十六成章逝孤繡衣甫三歲守節茹苦及子長教以讀書遂入庠年七十有餘李漢生妻成氏秦安人年二十歲漢生亡守節撫子四十餘年伏氏秦安鄉民龎漢馥漢秀母也年二十守節身親稼穡撫二子成人至老不變庠生張金榜妻傅氏清水人夫亡誓以死從及葬之夕遂自縊焉儒生喬博妻張氏清水人年十九喪夫人勸之再醮指遺腹為誓果生男撫育成立壽及七旬陳俊妻白氏清水人年踰二十夫亡守節撫遺子帝訓為庠生儒童劉元湘妻怡氏禮縣人夫亡斷髮守節四十三年上事翁姑下撫幼子不出閨門雍正七年旌表周彩妻馬氏徽縣人彩有甥鎖克㑹佃種郭瑚之地彩夫婦移居同種彩病故氏守志撫孤瑚見氏年少有姿起意招贅氏拒絶不從瑚强立婚約氏見瑚奸計强鋒隨於次早自縊深山樹上郭瑚問擬發邊衛充軍氏荒村嫠婦守正捐軀不為强暴所逼雍正七年旌表邢世耀妻張氏耀死夜跪縊棺下直𨽻階州明張鎮妻王氏文縣人夫早死姑憐其少欲令再適王誓死靡他天順中旌表王某妻姚氏成縣人夫死誓不再適成化中旌表李某妻楊氏成縣人夫卒艾年守志終養嘉靖中旌表虎正威妻王氏文縣人年方二十威病死氏襄事畢乘夜縊於墓側嘉靖中旌表庠生張夢月妻閻氏成縣人娶二載而夢月亡氏年十七誓不再適戒腥茹苦撫養幼男昌期成立建坊旌表昌期既長娶閻氏昌期又卒遺孫幼小妻閻亦矢與姑同守撫孤歷二十餘載守養乳孫成名姑閻氏八十四卒媳閻氏六十五卒一門雙節萬厯中旌表二烈女俱階州竇氏女萬厯三十八年礦賊左朝登等作亂搶掠至竇家坪鄉人驚逃婦女被汚二女恐及其身踰牆投崖而死知州余新民以禮葬焉并表其門齊朝兒妻王氏階州人娶七日大雨江水泛漲木薪蔽江而下朝兒入水取木被溺王氏沿江哭三日求尸不得從夫溺處投下後於下流見二尸攜手而出事聞旌表千戶龍韜妻徐氏階州人甫嫁而夫死舅姑逼之改適氏翦髮刺目以示終身靡他州守上其事奉㫖旌表劉世經妻袁氏階州人夫死家貧苦守朝夕績紝以營生人有勸其改嫁者婦以大義拒之年七十卒生員司仕妻王氏階州人仕早亡氏有殊色人爭取之矢志不從子宗成立太守盧照表其門年八十六而卒劉進業妻王氏階州人年二十八夫故有子應竒守孀教子母績子誦夜分始寐後竒食餼於庠州牧上聞旌表生員司價妻党氏階州人年二十四價亡遺子七歲家貧無所倚甘心守節子亦成名年七十七而卒知州表其門處士趙孔嗣妻唐氏階州人孔嗣早逝氏年二十三守節撫子艱苦萬狀壽八十三而卒知州表其門王舉才妻趙氏階州人年二十二夫卒誓不渝節終身縞素孀居五十餘年生員王舉士妻鞏氏階州人舉士卒家貧冬夏皆衣單舅姑不能奪其志惟以女工自給終身苦節年七十卒王琰妻朱氏階州人朱年二十有五琰卒終身不改節年八十卒監生胡瀾妻王氏階州人瀾卒王年二十有四無子誓不再適守節五十年汪廷秀妻張氏成縣人廷秀卒氏年二十有三無子遺二幼女乃斷髮示信矢不再醮孀居六十年知縣傅賢上聞題旌喬某妻鮑氏成縣人夫故孀居六十餘年刁某妻陳氏成縣人夫卒守節終身詔旌其閭同知陳尚表妻姚氏成縣人夫卒崇禎七年流冦破城投井而死庠生石華如妻權氏成縣人賊逼掠不從賊怒連砍數刀氣尚未絶乃囑子曰汝年幼稚諒賊不殺當藏避以留石門之嗣異日在此處收我尸骸遂觸石而死李時暢妻張氏成縣人夫卒堅節茹苦紡績撫孤以終其身監生李含章妻張氏文縣人章殁於京邸氏聞訃即欲自縊勸者曰如三子何乃勉生撫子備歷艱苦年八十餘次子晉以明經起家表奏其節生員李含英妻陳氏含章弟婦夫故氏方二十未嗣張氏妯娌相誓守節生員李恆妻高氏恆係含章三子恆因考試故于秦州氏方青年無子苦志守節堅貞不移且事姑以孝奉㫖有一門三節之旌楊忠妻張氏文縣人忠因救父為畨所殺氏年二十伏尸痛哭幾絶至夜即自縊于家一門孝節並著張道育妻慕氏文縣人夫遇水淹死氏年二十有二家無寸産針指為生堅貞撫孤貧苦萬狀院司表其節劉元妻張氏文縣人元卒時氏年十八尚未育子立志守節甘貧茹苦年八十三乃卒院司表之百戶王政妻張氏文縣人娶方一年政以事故于秦州氏即求自盡為家人嚴守不得誓不再適無翁姑弟姪依母家為生年八十六而卒張維妻王氏文縣人夫故氏年十九哀痛絶漿志在必死有遺女甫七月父母力勸遂以節自誓閉戶獨居即親姻亦難覩其面有司表其門舉人秦日昌妻張氏文縣人夫卒于官氏年二十有一自官扶柩歸里家貧就母家守節哀悼成疾不食藥餌卒于母家生員郭萬春妻米氏文縣人居南橋山頭夫為虎銜去米追奪其夫以石擊虎虎怒舍其夫而食之邑人公舉上聞旌表生員米紹元妾王氏文縣人生一女未嫁流冦變避於山林母子被執氏知女難免以斧砍女頸幾死賊怒殺氏女遂得免任某妻李氏成縣人崇禎七年賊入其家執斧逼從氏矢死不辱賊怒以斧擊死庠生王植妻米氏文縣人娶甫一年崇禎十一年遇流賊亂避萬丈崖上忽崖破氏危坐不動賊以好言撫氏氏投崖而死皇清張榮德妻何氏階州人榮德出外貿易氏獨處在家有趙畨僧子在鄰家念經窺氏家無人潛入室强姦何氏不從聲喊因念經鼓聲喧混無人聽聞何氏情急喊救畨僧用左手掐住何氏咽喉按倒仆地右手取切麵刀將何氏連砍殞命何氏鄉村貧婦守節不辱以致殺身康熙六十年具題旌表生員夏鉶妻張氏階州人夫亡時年十九毁形自縊姑趙氏解救復蘇事姑撫子會吳逆變亂氏負姑抱子偕弟妻武氏逃入深山掘葛根以食苦節五十二年雍正三年具題旌表儒生夏志妻武氏階州人年十七夫死絶食五日姑勸之曰汝有五月孕當為亡兒延一脈遂不復死與嫂張氏歷兵荒遭豪强逼奪遠遁得免苦節五十一年與其嫂夏鉶之妻張氏同誠一門雙節雍正三年具題旌表營兵王天眷妻李氏階州人事繼母以孝聞康熙五十三年天眷出戍卒于汛所李氏痛不欲生有議姻者氏乃櫛沭拜姑復至母家告其故氏兄美素知氏秉性貞烈慮有他變因送之歸及入門兄方與姑致誠欵而氏已雉經于臥榻之右矣時六月二十有五日氏年始二十也宋德隆妻姚氏階州人年三十歲雍正八年德隆患疫身亡姚氏誓不欲生晝夜撫棺啼泣自縊柩前陳常修妻羅氏階州人年十九孀居子模方二歲甘貧守節延師教模入庠食餼生員葛雯妻張氏文縣人年二十夫亡生子未滿一月守節三十六年教子讀書成立康熙三十七年具題旌表生員葛絺妻周氏文縣人氏年二十八歲絺死即尋自盡奔救獲全事姑撫子守節二十七年與姑同操雍正三年具題旌表生員張明徴妻鄢氏文縣人夫故幼年守節順治四年遇土冦變避於山寨寨破攜其女投巖下俱死母月娃妻王氏文縣向化里人夫故未殮旋縊死於夫之左腿年方一十有八生員張于泰妻何氏成縣人夫亡氏年二十七歲遺子甫及周月後滇逆變僞守將欲逼娶之氏翦髮忿詈矢死不從教子讀書成立康熙三十七年具題旌表生員張拱宸妻袁氏成縣人拱宸卒氏二十三歲翁姑俱七十餘一子一女在襁褓送養嫁娶備盡心力苦節三十餘年雍正十年旌表鐔獻廷妻韋氏成縣人夫沒於水氏日往其處設飲食奠泣歷七日以身投水死直𨽻肅州漢趙娥親酒泉龎淯之母也父為同縣李壽所殺娥兄弟三人時俱病物故壽喜以為莫已報也娥傷父讐未報乃潛備刀兵常幃車以候讐家十餘年不能得後遇於都亭刺殺之因詣縣自首曰父讐已報請就刑戮福祿長尹嘉義之解印綬欲與俱亡娥不肯去曰怨塞身死妾之明分結罪理獄君之常理何敢茍生以枉公法後遇赦得免州郡表其閭太常張奐嘉嘆以束帛禮之明都指揮鍾振妻萬氏肅州衛人正統間振殁於戰氏年少守節終身不二人以忠節並稱之指揮周璽妻楊氏肅州衛人生子欽七月夫亡氏年二十守節四十餘年有司題請旌表指揮師經妻芮氏肅州人生子瑾甫四歲夫亡氏年二十二哀痛欲絶盡日不食戚屬勸慰之誓死守節後生遺腹子曰誥撫瑾承襲父職年踰六十卒參將崔麒妻徐氏肅州人夫亡守節五十餘年公請旌表生員劉體乾妻高氏肅州衛人年二十一歲夫亡痛哭雙目俱瞽鄉舉節操旌奬生員張德竒妻陳氏肅州衛人年二十九歲夫亡誓以死殉衆勸方止守節撫孤子政熙官至别駕萬厯十六年公舉旌表壽七十而終皇清高臺營兵福賜爵妻白氏高臺人年二十賜爵故孝敬翁姑養女訓子六十七歲無間言四十餘年如一日雍正十年旌表甘肅通志卷四十三
