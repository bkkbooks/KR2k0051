body:
  text: 甘肅通志卷四十三列女慶陽府明劉金住妻常氏寧州人父伯良洪武初謫戍夏州隨母郭偕行適同戍鄉人劉金住尋殁於戰常矢志不二事繼姑以孝姑殁喪葬如禮有惡少强通媒妁氏紿以終喪奉侍翌日赴水死越三日尸出面宛如生陳泰妻馬氏寧州人泰亡氏守志撫孤家貧織紡自給寒暑不廢永樂間詔旌其門仍復其家指揮黃啓妻陳氏慶陽衛人啓卒陳年二十四子澤尚幼家貧無以自存有勸改適者陳以死自誓撫澤成立官環慶守備澤又卒陳復撫幼孫正亦歷官指揮前後五十餘年節操凜然𢎞治間旌表吳旻妻龍氏慶陽衛人年二十五夫亡事親撫孤勞苦萬狀閨門靜肅節凜氷霜𢎞治間旌表曹鍾妻劉氏安化人年二十一夫亡事舅姑以孝撫二幼女守節不渝𢎞治間旌表王信妻沈氏安化人信卒沈年二十子二尚在襁褓撫以成立嫠守六十五年人稱節夀𢎞治間旌表李源妻朱氏寧州人源卒止遺幼女甫五歲朱事舅姑以孝源有弱弟華僅十歲撫而教之為擇婚配推家産悉付之四十餘年志節凜然正德間旌表曹奉祿妻尹氏慶陽衛人祿卒尹求一死戚屬勸之以遺子在襁褓乃撫孤以存宗祀時有勢宦欲娶尹以重賄賂姑姑將奪之尹誓死不從及子殤姑知尹必死防之尹紿之及兩月防稍弛乃自縊死時方盛暑蠅不侵尸面宛如生嘉靖間旌表生員劉朝宗妻王氏真寧人賦性端恪克嫻婦道宗卒家貧如洗王勵節撫孤二子俱各成立嘉靖間旌表余瑁妻牛氏慶陽衛人瑁卒氏家貧撫孤守志不渝內外肅然嘉靖間旌表吳欽妻張氏慶陽衛人欽卒張年二十五貧不能舉葬乃賣房治棺歸窆夫兄逼令他適張以死誓安貧撫孤五十餘年辛苦萬狀夀八十四而終嘉靖間旌表郭達妻沈氏慶陽衛人適達甫數歲有子尚幼夫亡家貧不能自保沈矢志愈堅女工度日後子亦卒沈以年老復貧苦有司憐之給以衣食及卒復給棺斂嘉靖間旌表楊承慶妻徐氏慶陽衛人夫亡子友桂尚幼撫育成立入太學後子亦卒復育諸孫垂三十年始終如一門閾肅然嘉靖間旌表張紀妻梁氏環縣人年二十七紀亡誓以死殉戚屬防之甚密越三日竟縊死與夫合棺葬當道致祭上聞嘉靖二十九年旌表陳經妻强氏安化人端莊沉靜不茍言笑年十七于歸值舅姑早逝經祖父在堂年九十餘卧病强朝夕奉侍年二十七經亡時家道蕭索遺三孤俱幼强躬任紡績辛苦萬狀撫育諸子成立後一子入太學歷四十餘年堅持如一日當道屢加優恤尚書張珩為之立傳嘉靖間旌表生員孫順妻王氏安化人年二十九夫亡遺孤伸甫三歲家貧衣裳百結日不再食躬女工以自給冉家河有莊攜孤涕泣往來負薪秉耒勞苦萬狀戚屬不堪王泣曰死易耳所以茍延者為弱息在期亡人一脈不絶耳歷四十餘年節操凜然伸充府庠生時年七十餘嘉靖間旌表慶陽衛百戶寧威妻方氏正德中威病死遺子勛尚幼方績紡撫育承襲未幾勛亦死方又撫孫吉承襲勛職而吉又死時方年七十八苦節四十九年與子妻何氏孫妻張氏誓同死守內外無間言稱為寧門三節余邦麟妻李氏夫死李年二十餘即翦髮泣焚蓬頭垢面誓以死守氷操四十餘年始終不二嘉靖間旌表茍廷瑞妻周氏環縣人年二十四夫亡願以死殉誓不他適事舅姑以孝撫育孤子至於成立四十餘年守節不渝嘉靖間旌表生員何虞鳳聘妻馮氏女安化人許字生員何虞鳳鳳殁馮欲往弔母不許悲泣三日不食母始憐而許之往弔遂觸柩前死萬厯間旌表廩生馮思聞妻劉氏夫亡七日不食而死萬厯間旌表有烈婦坊生員楊旒妻强氏安化人旒卒强年二十四遺子維勤維升女一俱在襁褓家貧如洗有富豪聞其美色求娶之叔翁欲奪其志强乃毁容擯飾攜二子白于官詞氣凜然誓以死守以女工所入給子讀書成名鄉人推重年七十以夀終有司具聞建坊旌表生員張敏妻劉氏安化人敏卒劉撫育四子俱至成立九思九臯貢入太學授職劉以夀終有司具聞旌表其門生員譙應運妻牟氏合水人運卒三日不食而死與夫合棺葬焉有司上其事建坊旌表魏邦妻王氏環縣人孝敬夙著嘉靖辛丑邦遘疾卒王抱痛不就寢室先期語妹曰夫死我必從之後月餘夜起易衣整簪飭容自縊而死有司上聞表其墓李廷璽妻沈氏環縣人璽兄弟同居妯娌甚相愛敬後璽兄弟繼亡嫂周有子三沈有子二共撫諸孤尋周亦亡沈年二十四獨撫五子如一俱至成立垂五十年內外凜然夀七十而終有司具聞旌表路拱樞妻袁氏真寧人夫亡守節終身建坊旌表鞏國正妻褚氏真寧人正卒長子焴方二歲次子烰甫三月氏年二十二誓以死殉妯娌戚屬勸以撫孤氏遂艱苦育子晝夜紡績後焴成進士烰補弟子員六十餘歲卒建坊旌表張小暢聘妻王買姐寧州人王加慶女父母早逝伯父撫之年十六許貧家子張小暢暢亡請往弔不許復請饋暢母湯饌許造令人饋之是日哭聲未絶勺水不入口至晚縊死解其尸則身挾一利刃意得請往弔必自刃柩前矣時盛暑停尸三日無一蠅至適督學按部題請旌表仍復其家指揮黃欽妻趙氏慶陽衛人欽有事繫官懼罪自縊時趙年二十二聞夫死亦自盡以殉王泰妻劉氏慶陽衛人適泰甫歲餘泰亡劉自縊死李深妻王氏慶陽衛人子甫周歲深疾王誓以死殉及卒果克踐其言子成立叨有衣冠其婦亦克盡婦道生員陳大綸妻宋氏寧州人綸死且乏嗣宋矢志守節四十餘年辛苦備歷屢遭荒歉人咸不堪宋曰吾夫名家子吾即饑死亦何害完節終身姚德妻楊氏慶陽衛人年二十三德以病殁氏生遺腹子矢志守節撫孤成立李堂妻徐氏慶陽衛人夫死哀毁欲絶人勸慰以弱息尚在冀延年以存宗祀乃得不死矢志守節五十餘年始終如一後子成立有司具聞旌表劉勛妻張氏慶陽衛人夫死守節誓不他適壽八十三卒徐衝妻蕭氏慶陽衛人子二衝卒蕭誓死靡他事舅姑以孝謹聞撫育二子至成立白承武妻張氏慶陽人姑疾弗起百藥罔效氏焚香泣禱割股以進姑獲愈有司以至誠格天匾奬之王圭妻王氏安化人圭病卒王矢志靡他安貧撫孤閭里重之有司表其門舉人蔡賢妻趙氏安化人賢任推官多所內助賢卒有顯豪欲强娶之趙毁容刺面誓拒守節終身劉榮妻姚氏安化人榮應軍役病殁姚哭之數日不食死蓋朝陽妻張氏安化人夫死乃潛縊于桑下遂合棺葬焉馮一清妻劉氏安化人夫卒年十九有子尚在襁褓氏欲死親戚勸撫弱孤乃止後事姑王氏克盡婦道守節四十餘年備歷辛苦夀七十五終生員孫箱妻陳氏安化人歸箱半載夫殁得遺腹子以貞節自誓苦守四十餘年後子為賊所殺即七日不食而死少卿麻僖妻楊氏安化人秉性聰慧讀書能通大義明末癸未城將陷僖誓必罵賊死楊曰君能死忠吾獨不能死節乎請先死以殉乃飲鴆酒數升比賊至已死矣侯舉妻夏氏安化人賊欲辱之堅拒不從强之再罵曰何物死賊敢吾辱耶遂抱子力求死賊怒碎母子尸王加賓妻楊氏安化人夫亡守節四十年城陷投井死麻惟清妻黃氏安化人城將陷語夫曰我必投井卒如其言廖𢎞毅妻曹氏安化人城陷同夫毅子光國俱攜手投井死曹思忠妻梁氏安化人賊至投城下復蘇又投水死蘇成麟妻蘇氏安化人賊執不屈投城下死李啓明妻楊氏安化人城將陷與夫永訣縊死張槐妻高氏安化人賊執其翁高哀泣請救賊并殺之孫養廉妻楊氏安化人賊陷城伏避柴堆五日不食而死陳逢蘭妻趙氏安化人賊執欲辱之氏正色大罵賊怒殺之棄其尸于井梁瑞妻趙氏合水人夫亡三子俱幼趙自縊以從戚屬覺而救之乃蘇後撫三子俱成立嫠處終身夀八十九而終魏倫妻何氏合水人訓導何其昌女幼佩姆訓人稱女中君子適魏倫無出以兄子天寵嗣焉倫卒七日不食自縊死石若璞妻李氏環縣人年二十五歲夫亡家貧苦節訓子成名八十一歲遇變自縊只應詔妻楊氏環縣人年二十八夫亡嫠居艱辛萬狀撫孤守節遇變自縊苗云芳妻賈氏環縣人德性溫良持躬淑慎聞賊至恐為賊辱自縊張鳳翎妻姚氏環縣人遇賊入城持節自縊知縣王鳴璨妻禹氏環縣人性貞慧通烈女傳諷誦不忘闖賊破城自誓全節投井死周某妻鄭氏環縣人夫早故止遺一女方二歲孀居五十年明末賊克城鄭舉火然房投火中而死劉某妻韓氏環縣人夫早故遺子澤深年方四歲撫育四十餘年積行善事賊破城自縊死生員路之逢妻何氏真寧人夫死不食屢欲自縊家人防護甚嚴氏治食奠夫畢乘間自縊而死生員趙一鳳妻董氏真寧人夫死拜辭舅姑投崖殉之有司親奠為造墳建坊鞏聖都妻何氏真寧人夫亡服毒而死府縣表其門焦思妻郭氏真寧人夫亡苦節終身沒齒無間生員鞏珍妻李氏真寧人年二十二歲珍亡無子家貧守節終身石應第妻鞏氏真寧人夫亡苦節終身以夀終生員王鴻典妻姚氏真寧人典卒氏甘貧訓子矢死靡他仲子皥如中鄉舉趙邦清妻張氏真寧人清殁於王事期以身殉以一子尚幼保孤報夫布衣蔬食教子持家者三十餘年以壽終鄉人稱之生員趙舉賢妻徐氏真寧人賢卒無子氏少寡苦節終身廩生趙任賢妻袁氏真寧人夫亡守節以夀終楊日進妻吳氏真寧人年十九夫亡守節無子甘貧茹檗生員王用竒妻何氏真寧人夫亡安貧教子苦節終身生員王養䝉妻閻氏寧州人年十七夫亡遺孤襁褓善事舅姑有富家生通媒妁氏惡恨逐媒出戶入寢自縊比人覺已鼻孔流血矣姑抱救竟日方蘇自是再無敢言者撫孤王元臣補郡庠生又撫遺孤姪女無異己出卒五十有三府州表之邵梅妻劉氏寧州人梅死遺孤五歲家貧躬自樵蘇耕耘糊口守志終身壽九十二而終劉恕妻米氏寧州人恕卒哀毁幾死舅姑憐其年少欲奪之氏以死自誓終執婦道內外無間言有司表其門廩生左司記妻王氏寧州人年十四于歸夫染疾王朝夕泣禱翦髮瀝血願以身代斷左手食指示夫夫卒遂以指殉毁容終身時二子俱幼氏嘗膽教子疊遭竒荒母子併日而食終無變志壽七十三而終二子俱列庠序王自實妻權氏寧州人隨夫京邸夫亡扶襯三千里抵家治窀矢志金石奉姑教子三十餘年如一日邵相周妻吕氏寧州人十四于歸事翁姑以孝夫亡氏年十九不食七日而死士民公舉豎貞烈碑於墓側朱顔妻李氏寧州人顔死氏年二十子甫三歲茹苦守節終身不二州守扁奬之邵厚妻閻氏寧州人年二十夫亡氏毁容垢面示無二志撫二子成就壽七十二終生員邵芝妻楊氏寧州人芝力學不第楊每苦之年十九夫亡氏深自痛悔撫遺孤汝棟教養兼備冀得伸夫志後入庠為廩生尋亦卒遺子甫周歲楊哭撫之曰兩世之望在此矣人莫不憐其節而哀之王遇隆妻賈氏寧州人年十八適王賊破堡姑暨夫婦被執繫至前村輒欲辱氏氏紿曰若釋母及夫便可相從不則寧先殺我决不從汝賊如其言見母夫行遠度賊追不及遂抽身投崖死州守匾表其門千戶王家芳妻姜氏寧州人芳妾李氏同芳子生員宏印妻邵氏見賊破堡姑媳相謂曰吾家世清白豈為賊辱攜手連袂投崖而死士民公舉題請旌其門曰一家三烈皇清貢生張鵬翎妻梁氏安化縣人年十五歸翎翎母老疾氏以幼婦偕夫奉湯藥頃刻不離二十八歲翎亡家貧姑老女幼氏奉姑撫女績紝度日苦節四十餘年雍正三年旌表麻印齡妻盧氏安化人年二十九歲夫亡立志守節孝養翁姑五子俱幼家貧衣食不繼針指度日教養五子成立苦節五十八年雍正八年旌表方䇿妻趙氏安化人夫亡年二十八歲翁姑老遺子幼姑以家貧媳少欲奪其志氏翦髮誓死供奉菽水撫三子成立苦節五十餘年雍正八年具題旌表張秉彝妻楊氏安化人夫