body:
  text: 甘肅通志卷四十八藝文贊魏曹植伏羲贊木德風姓八卦創焉龍瑞名官法地象天庖厨祭祀網罟漁佃瑟琴以作時通神軒曹植黃帝贊少典之孫神明聖哲土德承火赤帝是滅服牛乘馬衣裳是制氏雲名官功冠五帝晉王彪之伏羲贊悠悠皇犧體尊神澄無為而化出道之凝不知有始冥感自興因應之迹畫象結繩唐李華侯知道程俱羅二孝贊厥初生人有君有親孝親為子忠君為臣兆自天命降及人倫背死不義忘生不仁過及智就為之禮文至哉侯氏創巨病殷手足胼胝以成髙墳夜黑颷動如臨鬼神哭無常聲逈徹蒼旻苴斬三年爾獨終身嗟嗟程生其哀也均顧後絶配瞻前無鄰序唐杜牧李賀詩編序太和五年十月中半夜時舍外有疾呼傳緘書者牧曰必有異亟取火來及發之果集賢學士沈公子明書一通曰我亡友李賀元和中義愛甚厚日夕相與起居飲食賀且死嘗授我平生所著歌詩雜為四編凡二百三十三首數年來東西南北良為已失今夕醉解不復得寐即閲理篋帙忽得賀詩前授我者思理往事凡與賀話言嬉遊一處所一物候一日一夕一觴一飯顯顯焉無有忘棄者不覺出涕賀復無家室子弟得以給養恤問長恨想其人詠味其言止矣子厚於我與我為賀集序盡道其所來由亦少解我意牧其夕不果以書道不可明日就公謝且曰世謂賀才絶出前讓居數日牧深維公曰公於詩為深妙竒博且復盡知賀之得失短長今實敘賀公曰子固若是是當慢我牧因不敢復辭勉為賀序然甚慙賀唐皇諸孫字長吉元和中韓吏部亦頗道其歌詩雲煙綿聯不足為其態也水之迢迢不足為其情也春之盎盎不足為其和也秋之明潔不足為其髙也風檣陳馬不足為其勇也瓦棺篆鼎不足為其古也時花美女不足為其色也荒國陊殿梗莽邱隴不足為其恨怨悲愁也鯨呿鼇擲牛鬼蛇神不足為其虛荒誕幻也蓋騷之苗裔理雖不及辭或過之騷有感怨刺懟言及君臣理亂時有以激發人意乃賀所為得無有是賀能探尋前事所以深歎恨古今未嘗經道者金銅仙人辭漢歌補梁庾肩吾宮體謡求取情狀離絶遠去筆墨畦徑間亦殊不能知之賀生二十七年死矣世皆曰使賀且未死少加以理奴僕命騷可也明趙時春送鞠通判序鞠君吳松之産也時春與吳松馮御史子仁同賜第而其召為宮寮也復佐吳松徐洗馬子升於司經御史君以擊姦宰瀕死英聲振天下洗馬君晉為祭酒其道且大行衆將倚以經世之任者俱余所推重然皆與鞠君交親方君之擢判平涼也二君與時春書譽君之才且良惜其遠出邉郡畫然同辭則夫時春于君之釋吾郡而他之也豈敢以俚蕪辭無一言以贈之按吳松本江海奧暑之區而平涼據秦夏華羌之會黍粳異味羊魚改腥茗酪殊氣葛裘别服吳松齔者垂髫削剡而謳吟平涼三尺童子柞木為弓紉筋為絃被竹木以烏雉羽而射不避狼虎才離保姆已手掣生馬鬃騁乎峻阪兀崖之上以相笑樂使挽一葦茷行涇汭岸乃愕然失措嗟夫禹别九土周辨職方世以揚雍指為秦越其風土嗜好背馳懸絶固若是哉况宋以文獻渡江中原久委域外南北之俗尤異大聖人受錫四海行三尺法以用人故鞠君遠超南服蒞止西邑揆之人情似有不相宜者而平涼強宗悍牧藩衛兵騎星錯奕布三尺法六籍術亡奈之何而君周旋期月間數搏執強梗罔所恫悚使底于成必有可觀矣君遽以南北之分為解大僚不察從而聼之夫君子所詘者道非必其身之安也所存者志非貴乎外物之奉也居此而思彼營物而役志君子之戒也君豈為是哉不察其志而徇夫物情不用其道而茍榮其身此君子之所不敢安而鞠君之所必去此郡而他適也故敢于其行而僭言之且以章君之志也黃諫帝王紀年纂要序豫家西陲幼時聞老於從征者道使西域時出玉關數千里其地廣漠皆平沙一望無有涯際又無山阜林木城郭民居墩堠為之表識惟信馬徐行晝則視日之出入為東西夜則望北斗而西走暨抵其國則所行不少差比來京師會東南之士語及泛舟海中亦與是若吁使沙漠煙海之中茍不仰望日月星辰則趨向無方不惟迂其道里勞其心力而又未始不以終莫能至為怖也暑夏朝回日長無事因閲舊書得先子壽柏翁所藏歷代纂要乃元平章白雲翁察罕所編蓋取皇極經世書為凖一開卷而古今成敗國家興衰運祚長短皆瞭然可見真若茫茫萬里沙漠煙海中而獲舉目於日月星辰以得指歸也嗚呼自書春秋諸史以來簡籍浩繁雖易紀傳為編年其間數千年之事欲自首至尾觀之信有若司馬公所謂讀未半卷即已倦睡也然史學不可不知奈以賦稟所拘有朝讀暮忘者是編則托羣籍之要撮萬事之統損繁就簡約編年而為之蓋免搜索之勞使人不怖其煩因年以求運祚修短則古今國家成敗興衰具見于此遂為訂正自延祐戊午至洪武戊申凡若干年以便考閲宗友用和見而喜之請鋟諸梓以傳既不容拒並序諸篇首以畀之豫聞先輩謂觀史有要然則是編其亦觀史之要乎能熟觀此以知其大要則如日月星辰之在人目睫故雲海沙漠之渺無涯際亦自得之矣又奚以怖李夢陽𢎞德集自序李子曰曹縣蓋有王叔武云其言曰夫詩者天地自然之音也今途咢而巷謳勞呻而康吟一唱而羣和者其真也斯之謂風也孔子曰禮失而求之野今真詩乃在民間而文人學子顧往往為韻言謂之詩夫孟子謂詩亡然後春秋作者雅也而風者亦遂棄而不采不列之樂官悲夫李子曰嗟異哉有是乎豫嘗聆民間音矣其曲邊其思淫其聲哀其調靡靡是金元之樂也奚其真王子曰真者音之發而情之原也古者國異風即其俗成風今之俗既歷邊乃其曲烏得而不邊也故真者音之發而情之原也非雅俗之辨也且子之聆之也亦其譜而聲者也不有率然而謡勃然而訛者乎莫知所從來而長短疾徐無弗諧焉斯誰使之也李子聞之矍然而興曰大哉漢以來不復聞此矣王子曰詩有六義比興要焉夫文人學子比興寡而直率多何也出於情寡而工於詞多也夫途巷蠢蠢之夫固無文也乃其謳也咢也呻也吟也行呫而坐歌食咄而寤嗟此唱而彼和無不有比焉興焉無非其情也斯足以觀義矣故曰詩者天地自然之音也李子曰雖然子之論者風耳夫雅頌不出文人學子手乎王子曰是音也不見於世久矣雖有作者微矣李子于是憮然失已灑然省也于是廢唐近體諸篇而為李杜歌行王子曰斯馳騁之技也李子於是為六朝詩王子曰斯綺麗之餘也於是詩為晉魏曰比辭而屬義斯謂有意於是為賦騷曰異其意而襲其言斯謂有蹊於是為琴操古歌詩曰似矣然糟粕也於是為四言入風出雅曰近之矣然無所用之矣子其休矣李子聞之暗然無以難也自録其詩藏篋笥中今二十年矣乃有刻而布者李子聞之懼且慙曰豫之詩非真也王子所謂文人學子韻言耳出之情寡而工之詞多者也然又𢎞治正德間詩耳故自題曰𢎞德集每自欲改之以求其真然今老矣曽子曰時有所弗及學之謂哉傳隋皇甫謐酒泉烈女龎娥親傳酒泉烈女龎娥親者表氏龎子夏之妻祿福趙君安之女也君安為同縣李壽所殺娥親有男弟三人皆欲報讐壽深以為備會遭災疫三人皆死壽聞大喜請會宗族共相慶賀云趙氏強壯已盡惟有女弱何足復憂防備懈弛娥親子淯出行聞壽此言還以啓娥親娥親既素有報讐之心及聞壽言感激愈深愴然隕涕曰李壽汝莫喜也終不活汝戴履天地為吾門戶吾三弟之羞也焉知娥親不手創殺汝而自徼幸耶隂市名刀挾長持短晝夜哀酸志在殺壽壽為人凶豪聞娥親之言更乘馬帶刀鄉人皆畏憚之比鄰有徐氏婦憂娥親不能制恐反見中害每諫止之曰李壽男子也凶惡有素如今備衛在身爾雖有猛烈之志而強弱不敵邂逅不制則為重受禍於壽絶滅門戶痛辱不輕也願詳舉動為門戶之計娥親曰父母之讐不同天地共日月者也李壽不死娥親視息世間活復何求今雖三弟早死門戶泯絶而娥親猶在豈可假手於人哉若以卿心况我則李壽不可得殺論我之心壽必為我所殺明矣夜數磨礪所持刀訖扼腕切齒悲啼長歎家人及鄰里咸共笑之娥親謂左右曰卿等笑我直以我女弱不能殺壽故也要當以壽頸血汚此刀創令汝輩見之遂棄家事乘鹿車伺夀至光和二年二月上旬以白日清時於都亭之前與壽相遇便下車扣壽馬叱之壽驚愕回馬欲走娥親奮刀砍之並傷其馬馬驚壽擠道邊溝中娥親尋復就地砍之深中樹闌折所持刀壽被創未死娥親因前欲取壽所佩刀殺壽壽護刀瞋目大呼跳梁而起娥親乃挺身奮手左抵其額右摏其喉反復盤旋應手而倒遂拔其刀以截壽頭持詣都亭歸罪有司徐步詣獄辭顔不變時祿福長漢陽尹嘉不忍論娥親即解印綬去官弛法縱之娥親曰讐塞身死妾之明分也治獄制刑君之常典也何敢貪生以枉官法鄉人聞之傾城奔往觀者如堵焉莫不為之悲喜慷慨嗟歎也守尉不敢公縱隂語使去以便宜自匿娥親抗聲大言曰枉法逃死非妾本心今讐人已雪死則妾分乞得歸法以全國體雖復萬死於娥親已足不敢貪生為明廷負也尉固不聼所執娥親復言曰匹婦雖微猶知憲制殺人之罪法所不縱今既犯之義無可逃乞就刑戮隕身朝市肅明王法娥親之願也辭氣愈厲面無懼色尉知其難奪強載還家涼州刺史周洪酒泉太守劉班等共表上稱其節義刋石立碑顯其門閭大昌𢎞農張奐貴尚所履以束帛二十端禮之海內聞之者莫不改容贊善髙大其義故黃門侍郎安定梁寬追述娥親為其作傳元晏先生曰父母之讐不與共天地蓋男子之所為也而娥親以女弱之微念父辱之酷痛感讐黨之凶言奮劍讐頸人馬俱摧塞亡父之怨魂雪三弟之永恨近古以來未之有也詩曰修我戈矛與子同仇娥親之謂也唐李商隱李長吉小傳京兆杜牧為李長吉集序狀長吉之竒甚盡世傳之長吉姊嫁王氏者語長吉之事尤備長吉細瘦通眉長指爪能苦吟疾書最先為昌黎韓愈所知所與遊者王參元楊敬之權璩崔植為密每旦日出與諸公遊未嘗得題然後為詩如他人思量牽合以及程限為意恆從小奚奴騎距驢背一古破錦囊遇有所得即書投囊中及暮歸太夫人使婢探囊出之見所書多輒曰是兒要當嘔出心肝始已耳上燈與食長吉從婢取書研墨疊紙足成之投他囊中非大醉及弔喪日率如此過亦不復省王楊輩時復來探取寫去長吉往往獨騎往來京洛所至或時有著隨棄之故沈子明家所餘四卷而已長吉將死時忽晝見一緋衣人駕赤蚪持一版書若太古篆或霹靂石文者云當召長吉長吉了不能讀歘下榻叩頭言阿㜷長吉學語時呼太夫人云老且病賀不願去緋衣人笑曰帝成白玉樓立詔君為記天上差樂不苦長吉獨立榻邉人盡見之長吉氣絶常所居窗中勃勃有煙氣聞行車嘒管之聲太夫人急止人哭待之如炊五斗黍許時長吉竟死王氏子非能造作謂長吉者實所見如此嗚呼天蒼蒼而髙也上果有帝耶帝果有苑囿宮室觀閣之玩耶茍信然則天之髙邈帝之尊嚴亦宜有人物文采愈此世者何獨眷眷於長吉而使其不壽耶噫又豈所謂才而竒者不獨地上少耶天上亦不多耶長吉生二十七年位不過奉禮太常當時人亦多排擯毁斥之又豈才而竒者帝獨重之人反不重耶又豈人見會勝帝耶明李夢陽邵道人傳邵道人者蜀人也至慶陽年七十餘矣道人不欲言凡事頤指色授館于鐘樓街築土被衲無晝夜露坐郡中子弟爭事道人凡所指授諸弟子善承之道人能治病令病者張目噓氣即可活目諸弟子置飯病者前出袖中鐵尺橫飯上誦大悲呪已起尺摩病者曰瘥矣脫不可活道人則趨出病家以死日請出指示日如其數道人不取錢每歲自正月始活一人取布尺裏衲裏完弗取也飯道人無問多少美惡道人善飲水冬月氷道人齒間瀺瀺聲頃之肩踴面紅汗簌簌下豫世父患脛痬久不愈以問道人道人曰此祟也若往聘某氏謂其女陋將更聘之女慚而縊死此其祟也世父大驚伏地頓首曰奈何道人曰今遇我三日解矣三日痬果瘥居十餘年忽謂諸弟子將歸諸弟子曰先生福慶之人慶之人無敢慢先生者何遽言歸邪道人不應一日道人令設几三層坐其上諸弟子始悟環守之夜有登几伺其息者夜半霹靂隂隂起屋脊若戈士甲馬戰鬬之聲諸弟子震懾伏地天明起視則道人死矣贊曰子不語怪則道人者為何如人哉老氏惑人亂政而道人口悛悛不欲道辭急人之難斃而後已嗚呼是所謂逃于墨者非邪書皇清王全臣上巡撫言渠務書唐漢兩渠寧夏民命攸關康熙四十八年正月內蒙飭水利都司王應龍盡力春工而令職全贊理其事幸覩成效兹蒙以各渠情形及修濬利弊下詢謹詳陳之寧夏古朔方也黃河繞於東賀蘭峙於西相距或四五十里遠者亦不過百餘里南至唐壩堡之分守嶺北至威鎮堡之邊牆僅二百七十五里延袤不甚寬廣而所屬寧夏衛并左右二衛及平羅所共轄五十二堡約計田地九千八百二十九頃有餘其正供除麥饌等項納銀二千六百五十兩有零外田土之賦計納糧九萬八千三百八十餘石納七斤穀草并年例秋青草共三十八萬三百餘束零納壩草六十一萬零納地畝銀八百六十餘兩其湖灘又納潮鹻銀一千五百九十兩賦亦綦重矣況地大半盡屬沙鹻必得河水乃潤必得濁泥乃沃古人於黃河西岸開濬唐漢兩渠誠萬世利也四十七年春職全蒞任之時值春工方興隨本道鞠宸咨親詣各渠細勘竊查黃河自南而北其入寧夏之處兩岸俱係石山名曰硤口河初向東北流入硤微折注於西北不一二里即仍向東北出硤硤之盡處有一觀音堂古人於此傍石山之麓開唐渠一道渠口寬十八丈深七尺至明代寧夏道汪文輝於右衛之唐壩堡距渠口二十里建石正閘一座閘之外建石退水閘四座正閘下入渠之水以五寸為一分止以十分為率水小則閉塞退水各閘使水入渠水大則開退水以泄其勢其正閘係六空西四空為唐渠東兩空為貼渠每空各寬一丈唐渠自閘以下西北至玉泉橋名曰上上段寬八丈深三五尺長五十里自玉泉橋向東北流復微轉西至良田渠口名曰上段寬七丈深五六尺長七十里自良田渠口西北至西門橋名曰上中段寬六丈深七尺長四十里自西門橋西北至站馬橋名曰下中段寬六丈深七尺長六十里自站馬橋北至威鎮堡稍止名曰下段寬三丈深三四尺長一百三里合計共長三百二十三里其貼渠一道寬三丈五尺深六尺至郭家寺地方分為兩稍一至漢壩堡稍止長四十里名曰舊貼渠一至蔣鼎堡稍止長五十里名曰新貼渠此因唐渠正閘之東岸地土甚高故引此渠雖閘分兩𣲖而實與唐渠同口蓋唐渠之附庸也渠兩岸之堤及堵水之壩俱名曰湃沿湃居民挖小渠以引水入田名曰枝渠大者或百餘里小者或數十里及七八里不一各於湃上建小木閘以便蓄泄名曰陡口唐渠東西兩岸共陡口四百三十六道舊例百姓有田一分者歲出夫一名計力役三十日又納草一分計四十八束每束重十六斤又納桞樁十五根每根長三尺此輸將定額也其或需用紅柳白茨席萁則於草內折收每草一分折紅柳四十八束或折白茨或折席萁亦各四十八束每束重七斤總名曰顔料或石灰亦於草內折銀燒造每草一束折銀一分其草曰壩草以備於險要處和土築湃及啓閉各閘堵疊渠口也樁曰沙樁或釘閘底或釘湃岸使土堅固也渠內水衝之處必用土草築一墩以逼水而外用紅柳白茨護之更釘以沙樁名曰馬頭席萁則繩纜之具也或修理閘底亦必用紅桞白茨鋪墊而以沙樁釘之乃蓋以石條使無沖動之患也每歲河凍之時將渠口用草閉塞名曰捲掃至清明日𣲖撥夫役赴渠挑濬各官分段督催以一月為期名曰春工至立夏日掣去所捲之掃放水入渠名曰開水開水之後田地澆灌其法先委官閉塞上流各陡口以逼水至稍其名曰封封之之際各陡口仍酌量留水一二分其名曰俵俗作逮水已至稍乃開上流各陡口任其澆灌既足又逼令至稍封與俵周而復始上流下稍皆澆灌及時也唐渠貼渠原灌寧左右三衛及平羅所共三十四堡田地六千二頃有餘衛所各官分段封俵一歲須輪灌數次乃獲豐收至於漢渠在唐渠之下左衛陳俊堡四道河口地方距唐渠口三十里地形低窪直迎河流水勢易入其渠口寬三十一丈深七尺五寸明汪文輝於漢壩堡距渠口十二里建石正閘一座計四空每空寬一丈閘外建石退水閘三座自正閘北至唐鐸橋名曰上段寬五丈深六七尺長六十五里自唐鐸橋西北至張政橋名曰中段寬四丈五尺深六七尺長七十五里自張政橋北至殷家夾道稍止名曰下段寬三丈深五六尺稍末寬一丈長九十八里共長二百三十八里渠之東西兩岸共陡口三百六十九道原灌溉寧左右三衛所屬十八堡田地共三千八百二十七頃有餘後因開導西河水勢變遷何忠堡竟隔在河中各自開引小渠灌田三十餘頃今漢渠止灌溉十七堡田地共三千七百九十七頃有餘其挑挖封俵與唐渠一例此渠得水甚易而又稍短田少所以通利如故比年以來唯唐渠淤塞過甚濱於廢棄居民雖紛紛借助於漢渠不過稍分餘瀝地之高者竟屢年荒蕪而漢渠亦因以受困職全細按唐渠之大病有三一苦於渠口之不能受水也相傳先年唐渠口下河中有一石子沙灘障水之勢以入渠厥後灘漸消沒河流偏注於東而渠口竟與河相背其入渠者不過旁溢之水耳水之入渠也無力遂往往有澄淤之患一苦於地渠之不能通水也唐壩以下自杜家嘴至玊泉營盡係淤沙每大風起輒行堆積唐渠經由於此實為咽喉向者以風沙不時旋去旋積遂相與名曰地渠蓋因兩岸無湃與平地等故名之也此處自來不在挑濬之列因循既久竟致渠底與兩岸田地齊平甚有渠底高於兩岸田地者較唐壩閘底約高三四尺河水泛漲時入渠之水非不有餘乃自入閘以來至此阻梗由是旁灌月牙倒沙兩湖逮兩湖既滿然後溢於渠內徐徐前行不知費幾許水力經幾許時日乃得過玉泉橋也况有此阻梗水勢紆回水未前行而挾入之濁泥已淤積閘底數尺矣一苦於渠身之過逺也水之入口者原自無多而又苦於咽喉之不利以有限之水流三百餘里供數百陡口之分泄其勢自難以遍給若遇河水減落則束手無䇿矣唐渠有此三大病而又加以年年挑濬之法積弊多端如渠夫渠草除紳襟優免外豪襟地棍及姦胥猾吏肆意侵蝕每將百姓應納草束沙樁折收銀錢代為買備輸納名曰包納草則多係朽爛樁則盡屬短小又巧立名色隱射規避若橋梁若陡口倘有損壞俱屬官修乃藉稱須人看守每處免夫草一二分名曰看丁又曰坐免甚至徒杠亦有坐免有力盡為看丁即曰陡口須人啓閉未聞天下橋梁俱須人看守也是渠夫渠草祗為姦積之利窟而渠工已受病實多矣每年興工之時並不查明某處淤塞某處阻梗量度工程之輕重酌用夫役之多寡唐渠自口至稍止分三工五段漢渠自口至稍止分兩工三段如某工舊例用夫五百名年年撥給五百某段舊例用夫三百名年年撥給三百工輕之處夫多怠玩工重之處夫實短少且催納顔料之役必故為遲延及時至工迫各段督工者即令挑渠之夫役採取顔料兩岸園林莊栁任其砍伐微論止半供渠工半充私橐額徴顔料盡被乾沒而所撥三百五百之夫亦止虛有其數而已渠道灣曲之處東岸高者西必低西岸厚者東必薄以高厚者力逼水勢刷洗對岸也每年挑濬之法如夫一百名止有三四十名在渠內取土餘五六十名俱排列高厚岸上遞相轉運一鍬之土經七八人之手而對靣低薄之岸必不肯加幫尺寸謂低薄岸底必有刷洗深溝恐因加幫撒土填塞以致高厚者愈增低薄者愈減是以每年有沖崩之虞或水由湃底鑽俗作潰或水由湃上漫俗作坔倒皆不肯加幫低薄所致也至渠夫則止由衛所經承𣲖撥名曰安渠賄囑者𣲖之路近而工輕貧窮者𣲖之路逺而工重且將一段之夫雜𣲖數十堡之人聼其自赴工所管工者莫知誰何中有逃者報官查册拘提往返動至半月而一堡之夫又分𣲖數處必逺至百里或二百里以外使之奔走不遑更將撥夫單內故意填寫錯亂使之赴各工段自行查問總欲令民不得不致遲誤以便定取罰工又各工段設立委管渠長等役各五六人或七八人每人免渠一二分彼俱係用賄鑽營充當者一到工所每人包折夫役一二十名不等更有豪襟地棍指稱旁枝小渠請討人夫多至五六十名少亦二三十名官必如數撥給實無一名赴彼所請之處伊等竟折錢分肥是以額夫雖一萬一千有零而在渠挑濬者僅可得半又率以老弱充數官司查渠止走大路沿途問夫在何處就彼查點委管渠長人等探知即雇附近莊農應名點後即散甚且預知官司到來令人夫於渠內挖土堆積如塔形以堆土之高詐為挑挖之深使高低莫辨官司一見便誇稱工好並不問及上段如何下段如何官司去後夫役仍將所堆之土攤平渠內其運上高岸者不過數十鍬八段之內官司必由之處或挑挖數里其僻逺不到之處亦夫役足迹之所不到也總因兩渠分為八段每段必逺至數十里無一定之責成無一定之程式而姦棍折去夫役因循延至一月遂相率而散其未經挑挖者雖有十之六七祗謂工多夫少付之無可如何渠道之淤塞實由於此職全於蒞任之初巡視渠工見漢渠口之上有一小渠名曰貨蘭渠寬數尺長十餘里乃前任寧夏道管竭忠據居民所請開濬者别引黃河之水灌田數頃職全上下相度見河水直沖渠口而苐苦於口低身小導引不得其方莫能逺逹乃謀諸司水王應龍請於本道欲借此渠形勢另開一渠以助漢唐水力之所不逮本道謂此渠曾奉前撫憲據士民呈請飭委惠安堡鹽捕通判王惠民勘驗形勢甚有禆益後以工程浩大約計用夫萬餘一月尚不能竣又慮修理閘壩需費不資遂爾中止吾有志久矣汝苐力行之職全謂用夫不得其法雖數里亦覺艱巨若量土以計工量工以計夫此數十里之渠計日可成渠若告成閘壩自易易也本道乃令職全與都司役用額夫距舊賀蘭渠口之上三里許直迎水勢另開一口至馬家莊地方引入舊渠而擴之使寬行三四里至陳俊漢壩兩堡之交即棄舊渠而西引水由高處行以逹於唐渠雖逺至數十里而莊園墳墓皆繞以避之毫無所傷其所損田畝盡為除厥差徭居民莫不歡欣樂役於四十七年九月初七日興工至十三日渠成十五日本道親詣渠口開水不崇朝而遍注田間自來高亢之地一旦水盈阡陌婦女孩童咸出聚觀驚喜之狀若有意外之獲其渠口上距唐渠口二十五里下距漢渠口五里乃右衛唐壩堡所屬剛家嘴地方口寬八丈深五尺渠身長七十五里二分上三十里寬四丈深六七尺下三十里寬三丈五尺深五六尺稍末十五里二分寬一丈六尺深五尺東西共陡口一百六十七道灌溉陳俊蔣鼎漢壩林臯瞿靖邵剛玉泉李俊宋澄九堡田地共一千二百二十三頃有餘至宋澄堡地方仍滙入唐渠本道以此渠閲十數年聚議止為道旁之築者今告成於七日且相度形勢較王惠民向所勘驗引水更易不覺喜形於色謂移此用夫之法以修唐漢兩渠不難坐令各渠疏通也於是於四十八年竟以此渠聞之憲臺當蒙倡捐俸資於陳俊堡地方建石正閘一座計兩空每空寬一丈閘外建石退水閘三座工既成蒙命其閘曰大清閘渠曰大清渠職全復於閘上建橋房五間左側建遊亭一所其規模竟與漢唐兩壩鼎峙矣此建閘之處乃舊貼渠經由之地貼渠較清渠高六尺有餘竟為清渠截斷職全乃造木筧置諸閘後兩旁石牆之上中更用大木架之傍橋房之欄以渡貼渠之水自西而東筧寬四尺長三丈名曰過水此不特貼渠無傷而閘上閘下水流交錯波聲互應風景殊有可觀也彼陳俊等九堡田地乃素用唐渠之水者清渠既成則不須唐渠灌溉其入唐渠之水可使之直趨而下而所省灌溉九堡之水實足以補唐渠水利之不足不患渠身之過逺矣况清渠餘水滙入唐渠者又能大助其勢耶唐渠之病去其一至於唐渠口則於黃河內築迎水湃一道用柳囤數千內貯石子排列兩行中間用石塊柴草填塞上復用石草加疊過於水面更用大石塊襯其根基其湃寬一二丈高一丈六七尺不等自觀音堂起至石灰窑止共長四百五十餘丈逆流而上直入硤內中劈黃河五分之一以為渠口口寬至二十餘丈較舊渠口約高數尺挽河流東注之勢逼令西折入渠是迎水湃之力已能逆水使之高束水使之急吞噬洪流勢若建瓴不患澄淤矣而口又加寬受水實多渠內之水賴以倍增唐渠之病又去其一歷年不挑之地渠則多用夫役挑濬使之低於閘底以通水路兩旁復立髙厚湃岸使渠流至此得以疾趨不致繞道於湖水行既疾則沙隨水走莫能淤積唐渠之病又去其一由是口內洋溢咽喉無阻向之唐渠以有限之水灌溉三十四堡田地常慮不足者今以有餘之水又省九堡之分泄止灌溉二十五堡自無不充裕矣不須借助於漢渠而漢渠亦並受其益矣至若奉委協助都司挑濬各渠則革盡從前積弊唯以新渠用夫之法為例於清明興工前一月將漢唐各渠自口至稍逐細查丈更用水平量其高低如某處渠道淤塞應挖深若干寬若干某處湃岸低薄應築高若干厚若干某處工重應用夫若干某處工輕應用夫若干預造一工程册乃以額夫合算除修理閘壩迎水及各大枝渠用夫若干外計挑挖唐漢大清各渠實止夫若干於是量土𣲖夫每夫一日以挖方一丈深三尺為率夫數既定乃自下而上挨堡順序如威鎮堡在唐渠之稍該堡額夫若干名以土合算應挖若干里即定以里數分立界限開明寬深丈尺令從稍末挖起至分界處接連即用平羅堡之夫又接連即用周澄堡之夫餘俱逐堡順𣲖以近就近各照分定界限挑挖其夫即用本堡堡長督率每工開一丈尺細單務令挑挖如式挑挖之土俱令加疊低薄湃岸高厚之處不許妄排多人致妨正工其枝渠之大者俱度量工程撥給夫役但往歲於各堡中混𣲖今則止令受水之民自行挑挖夫數或稍減於舊額而用工則不啻數倍至十餘里及三五里之小枝渠即算入正渠工程之內一並挑挖不另撥夫役以杜隱射包折之弊職全復每日於渠身內往返巡查如某堡分工幾里其挑挖不合單開丈尺致渠底不平或低薄之岸疊築不堅即責究堡長工程無包折之弊夫役無逺涉之勞而逐假皆有責成皆有程式自相率盡力不敢怠玩况興工之後復蒙憲臺遣標下守戎王捷督查其工又蒙亷察壩草六十一萬不無侵漁特對半減免三十萬有餘民間有田一分舊例納草四十八束者今止納二十四束以是寧民踴躍趨事爭先恐後各渠疏通無阻湃岸又極堅固所以立夏開水之日黃河水不加增而每年開水月餘水不能到稍者今不過四五日稍末即澆灌遍足矣鎮城以北往年不沾涓滴者今且遍種稻稗矣寧鎮各渠之情形及修濬之利弊如此此皆差員王捷所目擊者也獨是職全革弊太盡立法太嚴委管渠長盡遭革除豪襟地棍勢難包折隱射之弊俱為清出枝渠之夫不能分肥而姦胥猾吏歲歲恃渠工以填溪壑者今且無所施其巧是數萬生靈雖云受利而積年姦宄未免側目矣竊思古人之於渠務額設有夫力役有期物料有備分五工八段使各盡其力立法何嘗不善迄於今非徒無益而又害之總皆趨利之輩作弊於所忽壞法於不覺竟使利民者反以纍民古人立法之美意泯沒殆盡職全亦何人斯安保其所立之法不即壞於旋踵耶伏乞嚴飭司水利者每年以去歲春工為例而再為神明變通於其間不使已效之法復致更張已通之渠復致淤塞憲恩直與河流並永矣説明劉紹周褒斜同谷説古今志褒斜者皆謂南北同谷惟何氏雍大記不然謂自秦入蜀有三谷四道西南曰褒谷南曰駱谷從洋入東南曰斜谷從郿入其棧道有四出從成和階文出者為沓中隂平道鄧艾伐蜀由之從兩當出者為故道漢高帝攻陳倉由之從褒鳯出者為今連雲棧道漢王之南鄭由之從城固洋縣出者為斜駱道武侯屯渭上由之此四道三谷余未履其地但就其所分疏求之夫既以駱谷為南則斜谷當在西南且斜駱二谷地望各異何得概稱一道為武侯屯渭所經由耶蓋褒谷在蜀漢西北不得為自秦入蜀之路若從秦川言則南曰駱谷在盩厔西南為郿則斜谷耳乃訛西南曰東南將以郿在盩厔之東乎哉故程大昌述高帝之入關也正月羽封沛公為漢王都南鄭封秦將章邯為雍王都廢邱四月漢王入蝕中至南鄭蝕中不見地書以地望言關中南面礙山不可直逹其有微徑可逹漢中者惟子午關在長安南次西有駱谷關又西則褒斜也此蝕中非駱谷則子午耳若大散則在西南不與咸陽對出非其地矣其年五月漢王引兵襲雍則自褒斜出蓋雍之陳倉也漢兵既出章邯走廢邱遂定雍縣東圍廢邱邯自殺復遣樊噲周勃引兵下郿安得謂駱谷在南而斜谷又在東耶又按鄭氏地理略當蜀魏時陳倉東北十五里為郿城亮攻陳倉不拔又攻郿不能克乃引還國志雖無其文而漁仲博雅必有所本則高帝後亮亦攻陳倉及郿而不獨屯渭上由斜駱道矣蓋駱谷出扶風隔南山中有三嶺一曰沈嶺近芒水在盩厔一曰衙嶺一曰分水嶺固郿斜谷水所從出以入渭者也乃知斜駱二谷在南山中其脈勢實相聫接緣本著末則郿與盩厔皆有駱谷而雍大記乃統稱斜駱道云所以記事者又有元僖西幸由斜谷之説見於柳氏舊聞及張彭耆舊傳辨明俞安期崑崙積石二山辨按後漢書志郡國云臨羌有崑崙山班固漢書志地理其金城郡臨羌縣下疏云西北有西王母石室仙海鹽池西有弱水崑崙山祠至唐而吐蕃自云崑崙山在其國中長慶中劉元鼎使吐蕃稱三山中高四下曰紫山古所謂崑崙亦曰悶摩黎山潘昻霄黃河志云吐蕃朵甘思東北鄙有雪山即崑崙明洪武三年西平侯沐英九年征西將軍鄧愈追羌人至此山咸云崑崙是昉於涼張駿時馬岌傅會之言也馬岌為涼酒泉太守上言酒泉南山即崑崙周穆王見西王母謂此山宜立西王母祠以裨朝廷無疆之福駿從之西王母既祠厥後范曄遂以崑崙載之臨羌而疏班固地理志者亦約曄書張大之酒泉之南山非臨洮之西北乎然禹本紀云河出崑崙崑崙高三千五百餘里日月相避隱為光明也其上有醴泉華池去嵩高五萬里地之中也龍魚河圖云崑崙山天中柱也水經云崑崙墟在西北去嵩高五萬里河水出其東北陬淮南子云高萬一千里有竒上有木禾珠樹沙棠琅玕在其東絳樹在其南碧樹在其北佛圖西域志云阿耨逹大山其上有大淵水即崑崙山康泰扶南傳云天竺恆水之源乃極西北出崑崙山穆天子傳云天子自崑崙山入於宗周里西土之數自宗周瀍水以西至于崑崙側瑶池上萬有一千一百里酈道元注水經按是數説參以山海經謂里至互殊難以詳究蓋考之山海經而不悟崑崙有海內大荒之别也山海經之海內西經云海內崑崙之墟在西北帝之下都方八百里高萬仭百神之所在河水出其東北隅入禹所導積石山郭璞注云言海外復有崑崙山又山海經之大荒西經云西海之南流沙之濱赤水之後黑水之前有大山名曰崑崙之丘其下有弱水之淵環之其外有炎火之山有人戴勝虎齒有豹尾穴處名曰西王母是有二崑崙焉蓋穆天子所登山海經所謂海內之崑崙班固西域傳所載南北有大山中央有河東西六千餘里南北千里東則接漢厄以玉門陽關西則限以䓤嶺計其里至度其在所是介䓤嶺于闐之間矣䓤嶺以西為天竺國又西有大崑崙是為天柱是為地中山海經所謂大荒中之崑崙西域志所謂阿耨逹大山禹本紀水經所謂去嵩高五萬里水經所謂河水出其東北陬屈從其東南流入于闐是其重源也張騫尋河源至于闐䓤嶺以為河源而司馬遷遂有烏覩崑崙之論不信大禹本紀山海經之載又言九州山川尚書近之獨不覩尚書亦有織皮崑崙析支渠搜之紀乎又水經載河水由䓤嶺徑西域十三國而注泑澤班固西域傳云河有䓤嶺于闐兩源合而東注蒲昌海一名鹽澤即泑澤也去玉門陽關三百餘里廣袤三百里其水冬夏不增減潛行地下南出積石山為中國河范曄云西域內屬諸國自玉門陽關西至䓤嶺六千餘里其紀河源同夫漢自燉煌西至鹽澤列起亭障戊巳校尉屯于車師都護之府置于烏壘介西域之中督察動靜是䓤嶺于闐之流入于蒲昌漢之官卒目所經見班固記之諒非綿邈計度之辭水經所載十三國酈道元亦引固書入證往往吻合是非誕妄至云鹽澤之水洄湍電轉為隱淪之脈當其環流飛禽上經無不墜之是即河水所潛出於積石亦豈臆造由漢以來彰彰較著嗣後唐咸亨元年薛仁貴征吐蕃敗績大非川二年乃以河關靜邊鎮置積石軍久之遂訛河關兩山夾峙河出其間者為禹貢所導之積石矧又輔以馬岌西王母之祠范曄臨羌之紀崑崙既在河關之上益為積石明證矣水經云河水南至積石山下有石門河水冒以西南流酈道元謂之重源東方朔十洲記云崑崙南接崑崙圃實崑崙之支輔與水經南至積石山之文合山海經云積石之山其下有石門河水冒以西南流萬物無不有郭璞注云山在金城河關縣西南羌中後漢書云段熲為護羌校尉追燒當羌北鬬且行割肉餐雪四十餘日遂至河首積石山出塞二千餘里隋置河源郡積石鎮命劉權鎮之統逺化赤水二縣在古赤水城又在曼頭城西宇文述追破吐谷渾處所謂得地東西四千里南北二千里置郡縣鎮戍徙天下輕罪居之者也注云有積石山河水所出又有烏海貞觀中詔李靖侯君集等西征吐谷渾軍次鄉州始議所向後戰于曼都山窮追出塞登漢哭山復戰于烏海破天柱部於赤海君集建宗行空荒之地二千里乃次星宿川逹柏海上望積石山觀河源自是以上曷嘗言積石在河關也唐置軍而更名積石借其嘉稱猶之征吐谷渾近在青海而以君集等為積石道鄯善道赤水道且末道鹽澤道也豈實𨽻其地耶置河源軍於鄯城縣又非河源郡之故地蓋可證也逮至開元中張守節作史記正義云河州有小積石山河源出大崑崙入鹽澤東南潛行入吐谷渾界大積石山又東北流入小積石山指河源所出者為大崑崙似以臨羌山為小崑崙矣又以河源關為小積石吐谷渾界者為大積石其名迹未盡混也肅代之季吐蕃據有河湟中外隔越既易五朝歷數十年邈無經載長慶中劉元鼎使吐蕃胡怪乎以關為積石紫山為崑崙以積石冒出之流星宿川為河源也而杜佑之通典歐陽元之潢記馬端臨之通考以至鄧展都實潘昻霄輩不悟置軍名所由起寖假相延遂堅執元鼎之説極詆山海水經以及班固郭璞酈道元之儔嗚呼曲士拘儒經見不廣及於知識未逮者輒為荒唐誠諺所謂少所見多所怪妄鼓筆札而令前人之與古迹受誣千載直如長夜至於昻霄之志一行奉為指南而明朝按河關者建立禹廟祀在有司積石之訛益莫可辨崑崙之墟終古不移深可慨惜矣客有難豫者曰尚書崑崙析支差次敘之所在相去似不應遙後漢書稱金城之西南濱于析支則臨羌之有崑崙獨不可以理推之而乃信不可知之載牒以置辨乎余曰不然水經云河自朔方東轉徑渠搜北蓋渠搜在今榆林北析支渠搜亦差次敘之相去大逺又析支即河曲羌所居蓋都實所稱九渡水是已又稱由九渡至崑崙行二十六日程河始行崑崙南經敘崑崙在析支之上又豈應山在析支下哉蒲昌之水潛出積石既有經證于漢而崑崙流入蔥嶺獨無是理乎矧尚書亦稱道沇水東流為濟溢為滎東出于陶邱沇水亦既潛而復見尚書亦詭誕矣余賦黃河悉陳羣籍究其源委會通其故乃備列之以發千百年之覆云皇清武全文涇源辨案地志涇水出原州百泉縣笄頭山山海經則曰數歷山之西百五十里曰高山涇水出焉考高山在平涼郡西水由瓦亭川而東笄頭山在平涼西南下有百泉流為涇皆滙于郡城之西數里如以地志為據則百泉為源高山為支以山海經為據則百泉為支高山為源兩説並存則涇水南北有二源與汭同矣揆二水之形百泉諸水大倍于瓦亭川水經小水入大水以大納小不以小納大則涇源當在笄頭以地里計之高山距平涼一百二十里地頗逺笄頭距平涼四十里地較近其瓦亭居空同之西北笄頭出高山之東南似又不當以遠者為支近者為源下者為源上者為支也無已則隨山而度其勢循流而考其源百泉之水由空同而東下山環水湧其勢澎湃於勢為最順高山之水西出瓦亭川地逺流細北亂于涇勢則少逆矣後世述河源者曰崑崙又曰星宿海涇之大也不及河而逹于河涇源人稱百泉者謂其離竒湍㵼不可狎視幾與星宿海同禹貢涇水兼屬渭汭綿亘八百餘里為雍梁之間巨浸則其發源必有神靈瑰異非常之觀高山諸流固不可與百泉深廣同日而語也故山海經雖出于前而紀涇源者必毅然屬笄頭禹治水必隨山順其勢也禮祭海者必先河神其源也然則山海經稱涇水出高山何以故曰高山支接終南原本太華雄峙隴山西北笄頭密邇高山視之如太山培塿然故志山者舍卑而從高猶志水者舍小而從大統笄頭於髙山而涇水因之朱子注汭源曰吳山義固與高山同也武全文汭源辨後世稱汭水者以誤沿誤千載滋疑止緣朱子注詩汭水出吳山西北蔡氏注禹貢出弦蒲藪之西北遂不復詳察其地而以隴州汧源縣為汭水之源今考隴州諸水皆由汧入渭不與涇通此不待辨而知其與汭無涉也惟吳山弦蒲藪二説先儒抑豈無據而妄稱之考古志華亭有隴山有汭水紀載甚確則汭水出華亭固無疑矣吳山即隴山華亭與隴州山連壤接界內諸山皆屬隴又曰小隴山且唐宋之際縣舊屬隴尚未入平涼也則朱子所稱吳山西北安知不在華亭境內而必執隴以問汭耶載考弦蒲藪在今隴州蒲峪是汧隴之西藪也而其西北即為華亭西山是蔡氏之説亦非刺謬後人不深考西北之義誤以汭水為汧則泥古所致不審于禹貢涇屬汭渭及公劉芮鞫之即果何所解也是不可不辨考皇清達禮善涇渭考水利者民事之所急也自周起西陲歷秦漢至唐關中遂為建都之地名山大川歷歷可數而渭清涇濁君子存鑒别之思焉按周官雍州其浸渭洛為關中三川周幽王時三川震是已涇渭二水合灞滻潦潏灃滈又謂關中八水渭水出隴西首陽縣鳥鼠同穴山東北過狄道縣南上邽縣北陳倉縣南武功縣北槐里縣南與潦灃二水合東至高陵與涇水合又與漆沮水合至潼津入河尚書所謂導渭自鳥鼠同穴東會于灃東會于涇又東過漆沮入於河是也涇水出安定朝那縣西开頭山東南經興平扶風至京兆髙陵縣而入渭與渭水合流三百里清濁不相雜東合漆沮水亦自潼津入河禹貢所稱導渭自鳥鼠同穴又東會於涇又云涇屬渭汭是也二水之所自出者如此詩云文王初載天作之合在洽之陽在渭之涘文定厥祥親迎于渭又云我送舅氏曰至渭陽何以贈之路車乘黃三輔舊事云秦都渭北渭南作長樂宫橋表河為秦東門表􅊈為秦西門二門相去八百里渭水貫都以象天河橫橋南渡以象牽牛漢都渭南開北闕以臨渭渭北則陵廟所在史記云太公釣渭周西伯將獵卜曰所獲非龍非螭非熊非羆所獲霸王之輔於是西伯獵果遇太公於渭之陽與語大悅又云漢文帝十五年趙人新垣平以望氣見因説上設立渭陽五帝廟欲出周鼎又云張釋之為廷尉文帝出中渭橋有一人從橋下走出乘輿馬驚使騎捕屬廷尉陳壽益都耆舊傳云漢武帝時蜀張寬為侍中從祀甘泉有女子浴渭水乳長七尺上怪遣問之女曰帝後第七車知我所來寬在第七車對曰天星主祭祀者齋戒不潔則見渭水之見於經史者如此詩云淠彼涇舟蒸徒楫之左傳晉侯伐秦帥諸侯之師以進濟涇而次秦人毒涇上流師人多死史記秦二世夢白虎齧其左驂卜涇水為祟二世乃齋望夷宫欲祠涇後漢章帝北巡下長平御池陽宫東至高陵造舟至於涇而還涇水之見於經史者如此而涇渠之利最大先是秦數伐韓韓命水工鄭國説秦鑿引涇水令秦師不得東伐秦覺欲殺之國曰為韓延數歲之命耳然渠成亦秦之利也於是秦令國卒成其功溉田四萬餘頃名曰鄭渠漢元鼎間左內史兒寬因鄭渠旁有田高不及溉者奏請開六輔渠以溉之趙中大夫白公又穿渠引涇水首起谷口尾入櫟陽注渭中二百里溉田四千五百頃因名白渠人歌之曰田於何所櫟陽谷口鄭國在前白渠起後舉鍤為雲決渠為雨涇水一石其泥數斗且溉且糞長我禾黍衣食京師億萬之口嗣後宋大觀中有豐利渠元至大間有王御史渠明成化中巡撫項忠又有廣惠渠渠名數更要之皆發源鄭國耳二水一清一濁各稟天地自然之氣無容勉強且皆足以備亢旱濟農功開億萬年民事之利非若君子小人判然有薰蕕氷炭之異也然易之道以陽畫為君子隂畫為小人陽則輕清而象天隂則重濁而象地所謂君子小人者特其象耳渭水之清非真有勝於涇而其象有似乎君子涇水之濁非真有遜於渭而其象有似乎小人君子所以起鑒别之思者此也跋宋曾鞏西狹頌跋武都太守漢陽阿陽李翕字伯都以郡之西狹閣道通梁益緣壁立之山臨不測之溪危難險峻數有顛覆霣墜之害乃與功曹吏李旻定䇲敕衡官掾仇審治東坂有秩李瑾治西坂鐉燒大石改髙即平正曲廣厄既成人得夷塗可以夜涉乃相與作頌刻石其頌有二其所識一也其一立於建寧四年六月十三日壬寅其一是年六月二十日立也又稱翕嘗令澠池治崤嶔之道有黃龍白鹿之瑞其後治武都又有嘉禾甘露木連理之祥皆圖畫其像刻石側蓋嘉祐之間朝仲約質夫為興州還京師得郙閣頌以遺余稱析里橋郙閣漢武都太守李翕字伯都之所建以去沉浚之患而翕字殘缺不可辨得歐陽永叔集古目録跋尾以為李翕余亦意其然又熙寧十年馬中玉為轉運判官於江西出成州所得此頌以示余始知其果為李翕也永叔于學博矣其于是正文字尤審近士大夫喜藏畫而漢畫則未有能得之者及得此圖所畫龍鹿露木嘉禾然後漢畫始見又皆出於石刻郙閣立於建寧五年然一西狹郙閣之道有益於人而史不傳則頌之作其可備史之闕與墓表漢馮奉世趙壯侯墓表永光二年秋八月奉世承命擊逆羌道出隴上騎都尉趙印侯謁狀父行請表嗚呼兹世友趙翁孫墓也翁與世有刎頸交表其行事以風來世固世心也亦世職也敢以不文辭先生諱充國字翁孫世居隴西上邽人也曾祖諱真秦為隃麋令祖諱巖臯高后朝拜校尉父諱破奴後元時為材官元封間以擊樓蘭功領前將軍太初戰歿三年己卯先生以材名見知二師將軍從征宛城補校尉領護西域輪臺渠犁田卒事天漢二年冬胸奴圍二師於酒泉先生督壯士百人潰圍陷陳身被二十餘創遂解二師圍詔徴詣行在所帝親視瘡嗟嘆良久拜中郎將征和四年罷輪臺亭隧詔回拜護軍都尉元鳯三年烏桓反大將軍欲邀擊問先生先生曰丐奴擊之於漢便我今發兵邀擊招寇生事非計也後共捕上官功拜中郎將車騎將軍元平秋大將軍捐館先生識霍氏微絶交及霍氏敗連坐者千計先生不與焉元康間胸奴弱上欲出兵擊右地先生首倡不可擊之䇿帝意未釋及丞相書進始罷謀三年先零諸羌叛先生謀方略諭安國及至西域違算羌侯楊玉怨怒背畔先生年已七十有六矣上老之使御史大夫問將先生曰無踰老臣復問卒數先生曰兵難隃度願馳至金城圖上方略羌戎滅亡不久陛下勿以為憂上笑賜後將軍印祖餞西行先生詣金城以逺斥堠為務行為戰備止堅營壁持重愛士先計後戰遂至西部欲樹恩威招降罕开辛太守首建急攻之䇿上從先生計罕开竟不煩兵而下度先零勢必敗壞罷騎兵留步卒屯田狹中以待其斃乃上留田便宜十二事及封事以聞每上輒下議初是十三中十五終十八上從之二年夏五月先生振旅班師糧卒不煩而羌戎自破封營平侯居京邸每有大議上親問籌策無何乞骸骨上賜安車駟馬黃金白玉歸第上後思股肱之美圖像麒麟閣家居八載杜門謝客不植私交不積錙重諭子以勤儉嘗曰無奢縱霍氏鑒也易簀之日則曰安國家靜西戎吾事畢矣為吾後者能以禮物身謹守家門瞑目甘矣生於武帝建元四年夏六月卒於宣帝甘露二年夏四月年八十有六葬邽山之陽嗚呼惜哉先生剛直沉勇有方略配楊氏生子二卬其長也印其次者孫曰汲女曰蘭適魏丞相公子先生歷事三朝奉職惟謹廟堂謀議邊務經略靡不精確不但為中興良將亦堪為救時賢相諡曰壯豈過情哉兹其概也奉世所共覩者謹掇之以表諸墓俾作傳者採焉唐張九齡牛意仁墓銘公諱意仁字行恭殷後有牛父者宋大夫邯為護羌校尉崇為隴西主簿因官安定爰處鶉觚為郡人公之族祖竒章公隋宗臣天下稱之大父通秉志守道交辟不起父會弱齡早代公考槃丘園屢空晏如或勸之仕但笑而不語開元六年隨子西征就養終于伏羌官舍時年七十有六冬十一月歸葬北原夫人同郡王氏先卒有子仙客官銀青光祿大夫太僕卿判梁州持節河西節度使兼隴右羣牧支度營田採訪處置使攝御史大夫隴西縣開國子以子貴贈公使持節涇州諸軍事涇州刺史夫人追封太原郡夫人銘曰隴上多豪山西好武使君貞獨幼不斯取惟道與徒與代立矩善有餘慶風亦變古不學而能不行而至迹有相混名無自異出入百年終始一意福流于後神明其事行止於身用存元體厥子嘉績中朝縟禮印回壠隧門重旌棨逸人之墓今同郡邸宋范仲淹种世衡墓銘君諱世衡字仲平國之勞臣也不幸云亡其子泣血請於豫豫嘗經略陜西知君最為詳懼遺其善不可不從而書之初康定元年春夏人犯延安我師不利朝廷以保障衆多有分兵之患其間逺不足守者即命罷之寇驕而貪益侵吾疆百姓被其毒君時為大理丞任鄜州從事建言延安東北二百里有故寬州請因廢壘而興之以當寇衝左可致河東之粟右可固延安之勢北可圖銀夏之舊有是三利朝廷從之以君董役事君膽勇過人雖俯逼戎落曽不畏憚與兵民暴露數月且戰且城然處險無泉議不可守鑿地百有五十尺始至於石工徒拱手曰是不可井矣君曰過石而下將無泉耶爾攻其石屑而出之凡一畚償爾百錢工復致其力過石數重泉果沛發飲甘而不耗萬人歡呼曰神乎雖敵兵重圍吾無困渴之患矣用是復穿數井兵民馬牛皆大足自兹西陲保障患無泉者悉倣此大蒙利焉既而朝廷署故寬州為青澗城授君內殿承制知城事復就遷供備庫副使旌其勞也塞下多屬羌向時將帥不能恩信羌皆持兩端君乃親入部落申勞問如家人意多所周給常自解佩帶與其賢豪可語者有得敵中事來告於我君方與客飲即取坐中金器以奬之屬羌愛服皆願效死青澗東北三舍而逺距無定河河之北有敵寨敵常濟河為患君屢使屬羌擊之往必破走前後取首級數百牛羊萬計未嘗勞士卒也故功多而費寡建營田三千頃歲取其利募商賈使通其貨或先貸之本速其流轉歲時間其息十倍乃建白凡城中芻糧錢幣暨軍需城守之具不煩外計一請自給愛養士卒病者遣一子視其湯餌常戒以笞責期於必瘳士卒無不感泣今翰林承旨王公堯臣安撫陜西言君治狀上悅降詔褒之曰邊臣若此朕復何憂二年就兼鄜延路駐泊兵馬都監制置本路糧草遷洛州副使慶歷二年春豫按巡環州患屬羌之多而素不為用與夏人等相助為邊患乃召蕃官慕恩與諸族君長犒於城下與之衣物繒綵以悅其意又採忠順者增銀帶馬紱以旌之然後諭以好惡立約束而俾之遵向然悍猾之性久失其馭非智者處之慮復為變時青澗既完人可循守乃請於朝願易君理環朝廷方以青澗倚君又延帥上言人重其去命豫更擇之豫謂夏人日夜誘吾屬羌羌愛其類益以外向非斯人親之不能革其心朝廷始如其請君既至環安邊之利病大要在屬羌難制懼合夏人為暴發之患又地瘠榖貴屯師為難聚糧則力屈損兵則勢危斯急病也君乃周行境內入屬羌聚落撫以恩意如青澗焉有牛家族首奴訛者倔強自處未嘗出見官長聞君之聲始來郊迎君戒曰吾詰朝行勞爾族奴訛曰諾是日大雪三尺左右曰此羌凶詐嘗與高使君繼嵩挑戰又所處險惡大雪非可前君曰吾方與諸羌樹信其可失諸遂與士衆緣險而進奴訛初不之信復會大雪謂君必不來方坦卧帳中已至蹙而起之奴訛大驚曰我世居此山漢官無敢至者公了不疑我耶乃與族衆拜伏額手曰今而後惟父所使自是屬羌咸服於君有兀二族受夏戎偽署君遣人招之不聽即使慕恩出兵誅之死者半歸者半盡以其地暨牛羊賞諸有功其僭受偽署如兀二族者百餘帳咸股栗請命納其所得文劵袍帶由是屬羌無復敢二君戒諸族各置其烽火夏戎時來抄掠則舉烽相告衆必介馬而待之破賊者數四涇原帥葛懷敏定川之敗戎馬入縱於渭豫領慶州蕃漢兵往扼邠城又召君分援涇原君即時而赴羌兵從者數千人屬羌為吾用自此始君曰羌兵既可用矣乃復教土人習􅓡矢以佐官軍吏民有請某事辭某事者君咸使之射從其中否而與奪之坐過失者亦用此得贖吏農工商無不樂射焉由是緣邊諸城獨環不求增兵不煩益糧而武力自振夏戎聞屬羌不可誘土人皆善射烽火相望無日不備乃不復以環為意前後經略使交薦君之才能朝廷益知可倚明年遷東染院使充環慶路兵馬鈴轄仍領環州西南古原州之疆有明珠滅臧康奴三種居屬羌之大素號強梗在原為孽寖及於環撫之狠不我信伐之險不可入北有二川交通於夏戎朝廷患焉其二川之間有古細腰城復之可斷其交路又明年豫為宣撫使乃諭君與原守蔣偕共幹其事君久悉利病即日起兵會偕於細腰使甲士晝夜築之夏戎固忌此城君遣人入敵中以計欵之兵遂不至又召明珠等三族豪長犒撫之俾以禦寇彼既出其不意又無外援因而服從君之謀也君處細腰月餘逼以苦寒城成而疾作慶歷五年正月七日甲子啓手足神志不亂享年六十一葬於京兆萬年縣之神和原君之先河南洛陽人也曽祖存啓河南夀安令祖仁詡京兆長安令贈太常博士父昭衍登進士第纍贈職方員外郎季父放字明逸初隱於終南山君少孤依之服勤左右以力學稱明逸道高德純太宗朝再召以事親不起真宗復加聘禮起拜左司諌直昭文館纍遷尚書工部侍郎大中祥符五年君用工部廕得將作監主簿五遷至太守中舍初監秦州太平監以母老求養又監京兆府渭橋君卭州惠民監知涇之保定京兆之武功涇陽三邑在武功毁淫祠崇夫子廟以來學者在涇陽有里胥王知謙者姦利事露逃之逼郊禮乃出君曰送府則會恩益以長惡從所坐杖脊於縣庭而請待罪府君李公咨奏釋之自是豪黠莫不斂手其嫉惡如此又邑有三白渠比年浚疏用數邑力主者非其才而勞逸弗等功利日削君使勤惰齊其力故功倍貧富均其流故利廣至今民能言之歷通判鎮戎軍環鳯二州鳯之守王蒙正托章憲外姻以私干君復欲以賄汚君君正色不納蒙正大怨之乃使人諭王知謙訟君蒙正內為之助獄成流賓州上親政量移汝州君之弟世材以一官讓君乃除孟州司馬龍圖閣直學士李公紘雪於朝授衛尉丞主隨州𣙜酤又禮部尚書宋公綬工部侍郎狄公棐皆言君非辜改知虔州贛縣君辭得監京兆軍資庫以同鄜交辟改僉署同州判官事又移鄜州因從軍延安乃有故寬州之請君少尚氣節昆弟有欲析其家者君推資産與之惟取季父圖書而已蒞官能摘惡庇民青澗與環人皆盡君之像而享事之及終吏民暨屬羌豪長朝夕臨柩前者數日朝廷深惜之賜三子恩君娶劉氏封萬年縣君男八人長曰詁文雅純篤養志不仕有叔祖明逸之風次曰診試將作監主簿曰詠同州澄城尉曰咨郊社齋郎曰諤三班奉職皆有立欣記誼三子尚幼一女適西頭供奉官田守政君在邊數年聚貨食教弧矢撫養士伍牢籠羌夷無賢不肖皆稱之又出竒以濟幾事嘗遣諜者入敵中凡半歲間而羌誅握兵用事二三人諜者還言某謀得行會君已沒又天子方事懷來故其績不顯銘曰嗚呼种君出於賢門吾志必立吾力是陳寧以剛折果由直伸還自瘴海試於塞垣權以從事意其出人捍羌之患乂邊之民夙夜乃職星霜厥身生則有涯死宜不泯邊俗祀之子子孫孫張舜民遊師雄墓銘遊本姬姓吉興於鄭元魏靖侯儒風聿修悠悠千􅑤典型孰繼公生陜州文武之器文則華矣其武伊何矢謀於軍書勞實多在昔熙寧鬼章方命先帝不誅以待嗣聖武功繼明公初請纓指蹤將士機發雷霆既破洮州仍執強虜告慶廟陵百寮蹈舞窮髮鬼區讋我皇武桓桓竒功焜耀海宇乘軺關隴剖竹蒲幽省曹卿寺出入拖紳忠以利國仁以愛民其所施設同風古人憬彼夏羌屢齧西境公提將符嶽立山挺忽徙一邦志不獲騁乃令強梁尚保要領大勳不遂非公獨然亷頗去趙樂毅離燕惟有令名炯如星懸刻銘幽宫萬世哀焉胡世將開府儀同三司贈少師吳玠墓志紹興九年春三月開府儀同三司吳公以寢疾奏乞謝事天子惻然憂之命四川安撫制置使成都守臣世將訪善醫治疾又馳國醫往視公以六月己巳薨於軍享年四十有七七月遺表聞上震悼輟朝二日贈公少師凡恤典悉加厚其弟璘與諸孤奉喪歸葬於德順軍水洛城北原先塋之次十一月上念公之已葬詔有司賜錢三十萬擢璘繼龍神衛四廂都指揮使以慰恤其家恩義備矣蓋自天下用兵乘輿省康吳會公以偏師起西鄙奮孤忠抑大難保川陜共五十六州以重上流之勢屏翰王室屹如長城方敵國深侵叛臣僭竊道路阻絶公未嘗得一見天子􅍦其精忠上逹聖主明見萬里之外謂公可屬大事當方面凡軍事不從中御而賞罰付之不疑以卒成却敵固圉之功者惟天子之明而公之忠也諸孤以行狀來請謹序而銘之吳氏出泰伯之後以國為姓自季札避位其子孫家魯衛之間厥後散處四方雖譜諜遺逸不可盡考而起守西河芮國長沙漢封廣平皆本德義尚忠實為世良將而公天挺英竒崛起數千載之後赫然功名與之俱盛迹其流風餘烈蓋有自焉公曽祖諱謙贈太子太保李氏永寧郡夫人公考諱扆贈少保劉氏嘉國夫人自少保而上世居德順以公貴追榮三世公諱玠字晉卿少沉毅有志節善騎射知兵法讀書能通大義未冠以良家子𨽻涇原軍政和中夏人犯邊力戰有功補進義副尉稍擢隊將從討浙西賊方臘破其衆擒酋長一人及擊破河北羣盜纍功轉忠訓郎權涇原第十將夏人攻懷德軍公以百餘騎突擊追北斬首級百四十有六轉秉義郎擢本路第二副將自是威名益震建炎二年金人內侵已三載矣渡河出大慶關略秦雍所過城邑輒下自鞏州至鳯翔隴右都護張嚴邀戰失利敵勢愈張謀取涇州大將曲端拒守麻務鎮命公為前鋒公進據青溪嶺逆擊大破之敵始有憚公意轉武義郎權涇原路兵馬都監兼知德順軍冬以本道軍復華州師入命將無殺略居民安堵轉武功大夫忠州刺史三年冬劇賊史斌寇興鳯據長安謀為不軌公執斬之轉右武大夫四年春擢涇原路馬步軍副總管金人謀取環慶大將婁室以兵數衆出麻務鎮公與戰於彭店原士殊死鬬殺傷過半敵引去而曲端劾公違節制坐降武顯大夫罷總管論者不平未幾復故官職改秦鳯路馬步軍副總管鳯翔府兼權永興軍路經略安撫司公進復長安轉右武大夫忠州防禦使宣撫處置司將合五路兵與金人決戰公謂宜各守要害以待其敝秋九月師次富平都統制會諸將議戰公又曰兵以利動今地勢不利何以戰宜據高阜先為不可勝者衆曰我師數倍又前葦澤非敵騎所宜不聽既而敵驟至囊土踰淖以薄吾營軍遂大潰而五路悉陷巴蜀大震公獨整衆保散關之東和尚原積粟給兵列柵其上或謂公宜屯漢中以安巴蜀公曰敵不可破我不敢進堅壁重兵以臨之彼懼吾躡其後保蜀之道也明年改元紹興春三月敵將沒立果率鋭兵犯我期必取而後進公擊敗之拜忠州防禦使兼帥涇原夏五月沒立復會烏魯折合衆數萬使大將由階成出散關先至公與之大戰三日大敗而去沒立方攻箭筈關公復遣擊退卒不得與二將合轉明州觀察使丁嘉國憂起復尋兼陜西諸路都統制敵自破契丹以來狃於常勝至每與公戰輒敗不勝其墳冬十月元帥四太子者會諸路兵十餘萬造浮梁跨渭水自寶雞連營三十里又壘石為城夾澗水與官軍對拒公指授諸將選徑弓弩號駐隊番休迭射矢發如雨敵稍却則以竒兵旁擊如是三日度其困且走則為伏於神岔以待其歸伏發敵衆大亂俘其將羊哥孛堇及酋領三百餘人甲士五百六十人尸填谷二十餘里獲鎧仗數萬拜鎮西節度使二年兼宣撫處置使司都統節制興文龍州敵久窺蜀必欲以竒取之三年春裒其兵又盡發五路叛卒聲言東去反自商於出漢隂搗梁洋金州失守公亟率麾下倍道疾馳且調兵利閬既至適與敵遇使人以黃柑遺其帥撒離喝驚曰吳公來何速耶遂大戰饒風關凡六日敵皆敗殺傷不可勝計撒離喝怒斬其千户孛堇數人以死犯關出官軍後公徐結陳趨西縣或曰蜀危矣公曰敵去國逺鬬而死傷大半吾方全師以制蜀何憂耶月餘敵果退加檢校少保充利州路階成鳯州制置使四年二月敵復大入犯仙人關公豫為壘榜曰殺金坪嚴兵以待敵據阜戰且攻壘公命將士更射又出鋭兵擊其左右戰五日皆捷敵復遁去上聞之嘉嘆賜以親札曰朕恨不撫卿背也是役也敵決意入蜀自元帥以下皆盡室以來又以劉豫腹心為四川招撫使既不得志度公終不可幸勝則還據鳯翔授甲士田為久留計自是不復輕動矣夏四月徙鎮定國徐州陜西宣撫副使秋七月録仙人關功進檢校少師奉寧保靜軍節度使五年春攻下秦州六年兼營田大使徙鎮保平靜難軍公與敵對壘十載常患逺餉勞民屢汰冗員節浮費歲益屯田至十萬斛又調兵命梁洋守將治褒城廢堰廣溉民田復業者數萬家朝廷嘉之每降璽書褒諭七年冬敵廢劉豫且益兵衆以為疑公䇿其將去九年春和議成上以其功高復賜親札進開府儀同三司遷四川宣撫使遣內侍齎誥賜公以病甚扶掖聽命自以賞過其勞固辭優詔不許時輿地既復方倚綏附而疾不可為矣公娶張氏封永寧郡夫人男五拱右武郎扶撝皆承奉郎擴㧾尚幼女四人公能樂善每觀史前事可師者必書而識之左右用兵本孫吳而能知其變務逺大不求近效故能保其必勝御下嚴而有恩視卒之休戚如已而同其甘苦故人樂為之用既貴而自奉之約不逾平時至推以豫士則不少吝故家無資而至無宅以居嗚呼雖古名將何加焉明盛以𢎞鉊山王繼妃楊氏墓志銘妃姓楊氏鉛山恭莊王聘為繼妃未婚而王薨妃歲甫十六泣請於父母欲入府弔不許則自縊屢解不得縊則潛入黃河濱追持不得溺則數日絶粒父母乃勉強從之入府妃拊王柩痛哭乞留曰父母業以兒許王不得殉王地下則願稱未亡人以撫成其孤父母泣喻以未婚與鉛山之貧窘令姑姊族姻百方譬阻之其志益堅不得已聽留苫次妃謝􅖳華衣布茹蔬躬司啓閉辦蒸嘗闈以內謐如肅如間剖決府內事未嘗不中窽於是閽較皆受約束而妃日以撫孤為己任厪心於飲食衣被省護無跬步少置既長令就外傅親考課業當恭莊王薨時嗣子方五歲賴妃以成立上聞其苦節特破例命封為鉛山王繼妃鉛山府貧嗣子少報生請名之典既缺令甲不得嗣封妃力請于肅王王憫之為轉奏請上亦以其節故特準嗣子紹封嗣踰年婚禮成嗣王妃亦得册命妃且喜且悲曰我幽憂甘荼者十六年往矣凡為王嗣計耳今幸以微節徼天貺得號繼妃兒封兒婚畢吾夙志踰年適歲三十可以報先王於地下矣左右訝其言勸止之明年甲寅九月二十六日果卒妃若預知云訃聞上命照例給祭葬仍加祭一壇以旌其節蓋至是而妃之貞操昭然播于天潢中而聖明惇尚風化至意亦曉然傳播于天下竒節懿典交相輝耀為熙時一庥蹤曷可以無紀勒哉妃父名桐母羅氏蘭州人也初生時有光如月照四壁母病泣涕禱神願身代之在府中日製女工貨于市以供費嗣王婚罄簪珥資之嗣王間進華美服飾堅却不受曰兒貰貸辦此余何心能著諸躬嗣王名紳調卜於某年月日祔葬妃于恭莊王之墓銘曰未耦也惇節倍耦未子也惇節是子皭然堅貞孚藩府而上動乎宸扆命號恩都以暨王封之續用溢常涘天下歎完操特旌而因灼然知聖皇重綱常之旨吁嗟乎其節震耀夫終始甘肅通志卷四十八
