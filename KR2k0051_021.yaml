body:
  text: 甘肅通志卷二十一風俗剛柔緩急氣感於人奢儉淳漓俗由於習風俗醇疵實關政治西北邊境水土之氣剛朴居多聲教漸摩草野之民皆知向義還金美事時見閭閻革薄從忠移風易俗信而有徵志風俗甘肅布政司山多林木民以板為屋迫近西戎修習戰備髙尚氣力以射獵為先以兵馬為務酒禮之會上下通焉吏民相親是以風雨時節穀糴常賤少盜賊甲于內郡漢書人性直尚儉約習仁義勤于耕稼多畜牧無復寇盜並有金方之氣隋書秦風獵野務農圖經雍州土厚水深其民厚重質直無驕惰浮靡之習以善導之則易以興起而篤于仁義以猛驅之其強毅果敢之資亦足強兵力農而成富強之業朱子詩傳土本膏腴民事耕植元一統志民俗質朴風土壯猛人性堅剛慷慨穴居野處採獵為生以織毛毼為業崇尚釋教荷戈執戟防姦禦侮之功居多明志臨洮府民以鞍馬射獵為事徑悍而質木宋志民俗質朴尚武務農元志番漢雜處敬鬼神畏法令崇氣節忌脂韋板屋韋服樂與俗同府舊志洮土徑燥民多願慤尚儉朴喜耕織不騖商賈技藝士質直醇謹不事曠逹不修華飾狄道志山髙苦寒盛夏不釋裘毼府志渭據山壤人直朴力農以勤儉相效士多坦率兼耕讀歷宦一如寒素渭源志民物阜繁風俗醇厚尚禮義務耕織州志蘭土柔澤人多秀逸好修飾美服居嗜草卉諸玩家營紡織有南土風士重氣誼禮度彬雅斐郁蘭州志重婚喪崇墓祭善末業精工萟文雅頗盛漸尚浮靡舊志金處山峪民朴力農家習儉素士亦願謹不競浮華金縣志習尚朴實急公樂輸婚姻輕財喪尚佛事金縣新志河境諸番雜處風俗不純附城居民敦忠信尚恭謹羌回諸種舊詭譎健訟近革心向化漸與中土無殊河州志鞏昌府髙尚氣力漢書尚儉約習仁義隋志獵野務農圖經厚重質直宋史婚葬之儀多循古制元志地連四郡隴西天水武都廣漢俗雜五方明一統志民性惇篤而氣徑悍務耕織習弓馬事浮屠士耻奔競抑浮華婚喪有禮府志人尚爭戰而武藝精四民樂業無澆浮之俗古為用武之國翰墨大全力學力農明成化志民務耕織鮮末作冠婚喪祭多循古制隴西志俗勤耕牧家有蓋藏貧不走險餓不乞丐安定志士勤詩書民號質實無華麗之飾多禮讓之風然信巫尚鬼習俗難移猾吏姦胥催科不易明一統志尚義輕生患難一心有忠君親上之風通渭志務本力農訟稀事簡漳縣志土瘠民貧風強俗悍業勤耕牧性喜鬬爭而崇禮義尚儒雅猶有儉陋深思之意明一統志性質實尚賙務獵士紳習儒雅崇禮度鄉逺之民足迹鮮及城郭會寧志士絶浮夸民崇儉朴然負氣好訟積習相沿未變明一統志川原平衍風土深厚有物産之饒淳龎好禮仕宦者慷慨磊落與人信厚無城府伏羌志生聚頗繁物産亦盛士鮮緣飾民習朴茂無逰間之習多禮教之風寧逺志邑居隴蜀之交有鹽井之利君子性質直小人樂田畝庶幾淳厚渾朴之風西和志人習武藝不憚攻殺明靖逺志負剛徑尚氣節雖身冒矢石而捍衛牧圉若性生靖逺志其人徑悍而質木好習弓馬以田獵為生髙尚氣力山居板屋岷州舊志地瘠氣寒饒林木之利士人修飾文行略有可觀岷州志習弓馬好射獵尚儉約衣毼食粗崇尚巫覡洮州衛志山峻水激俗徑悍而朴直士鮮佻逹無浮麗西固志平涼府人勤稼穡修習戰備漢志地接隴山節氣常晚仲夏花木始開不産絲蠶惟與西戎博易為利地多牛馬宜於畜牧人以騎射為事寰宇記民俗醇朴不尚侈靡專事耕種不為寇盜婚姻喪葬頗近古風明一統志地接邊荒多尚武節五方輻輳商賈競利不事文學亦鮮浮靡馬牛夜牧道不亡失府舊志俗信鬼神士無浮靡平涼志民質實不善訟力農字牧無他技業崇信志山髙地冷早霜薄收民居多板屋華亭舊志人以騎射為事寰宇志俗安簡陋鮮詣公衙華亭志民質而愚勤稼穡而罕末作鎮原舊志野多穴處耕牧為業鎮原志地廣人稀質木不寇盜寰宇記固原州水土雜於河西人煙接於北地迫近羌戎修習武備士則髙尚氣略人以騎射為先寰宇記涇州土瘠民貧家無餘積知本務農不爭捷巧靈臺志民雜番夷土饒畜牧便騎射尚氣力靜寧志好獵務農民淳易化一統志靜寧州民風淳質力農不諳技藝士無偽習莊浪志僻處山谷地瘠民貧居多陶穴女鮮織絍人性朴率崇簡務本隆德志慶陽府好稼穡務本業有先王遺風陶復陶穴以為居于貉為裘以禦寒婚喪倣古禮不惑于釋道異教舊志民淳而不爭士篤慤而有文宋章楶安化樓記務耕作事樵採人無逐末依然古風合水舊志習武備尚文學地瘠人勤淳朴少訟環縣志賦性朴拙男不事賈販女不知織紡真寧志人性勇健不尚浮華頗勤學問婚喪相濟寧州圖册甘州府民俗質朴漢竇融傳風土壯猛便習兵事晉載記人性堅剛慷慨寰宇記土人穴居野處採獵為生明一統志賴雪消之水為灌溉之利甘州志士風朴茂人知稼穡山丹志涼州府人事慷慨方輿勝覽烈士武臣多出涼州虞詡論雖居戎域然自張氏以來號有華風北史胡叟傳人雜羌戎習俗剛徑或土屋而居或穹廬而處以孳牧為生地里志崇節儉敦禮讓質而不野尚武興文武威志人性多慷慨質直尚武少文永昌志土沃澤饒可耕可漁人勇而知義俗朴而風淳鎮番志土磽風寒人性剛勇以騎射為能孳牧為業古浪志俗寡文教武尚韜鈐爭氣節崇釋老平番志寧夏府強梗尚氣重然諾敢戰鬭金史性勇鋭尚畜牧信釋重巫明初徙五方之民於此風俗不純明一統志人以技藝趨利畜牧為資同上工騎射信禨鬼富強日倍禮義日新寧夏志靈州人性勇悍以耕獵為事以畜牧為生寧夏志中衛昔也荆榛之地今也樂利之鄉惠農渠記新渠寶豐西寧府俗崇釋教士業儒術人專孳牧童習彎弧衣被毳毛饔飱湩酥西平賦夏秋少暑冬春多寒毳皮為衣酥湩為飲番人以皮馬為禮畜牧為業舊志風氣漸燠物力滋豐力農務學有衣冠文物之化西域志民勤儉士謹願得醇朴遺意碾伯志直𨽻秦州地本膏腴民事耕植元一統志山林蕃屏原隰敷衍尚直習讓勤于耕讀明一統志度汧隴無蠶桑五月乃凍解八月乃麥秦州記重然諾負氣節朴茂質實徑直強毅猶存古風而流弊或懻忮忿爭耗財廢業州志川原寥廓物産豐饒民無末作士重德行然猓人羣聚姦宄易藏馴擾為亟清水志勤稼穡廣畜牧民勞而儉俗朴而淳賙恤成習而薄華靡秦安志地僻一隅閭閻樂耕牧尚儉約然壤接羌戎性多強悍禮縣志人性質直俗尚儉約習禮義勤稼穡四民安業舊稱樂土舊徽縣志寒燠得中物産略備居水陸之通商賈輻輳四民樂業徽縣志舟楫不通商賈不至故民務本業而無羡心舊兩當志徽山鳳水間民不見竒邪務本力農兩當志直𨽻階州地雜氐羌民俗朴魯而徑悍尚鬼重巫力田而外倚樵採為生士尚禮法駸駸有文物之風階州志土瘠民貧力於農事士勤絃誦即武夫市井家咸知重學文縣志川原平衍田土沃饒以耕織為業而儉約自持然而人多獷悍俗號囂凌撫循非易成縣志直𨽻肅州織毛毼勤耕牧務本業尚釋教風土淳厚氣習剛勇好騎射循禮讓並肅州志土腴氣正稻麥兼宜髙臺志西域人性獷悍居有土房衣服異制飲食異宜山川景物頗類中國陳城西域記寒暑應候民物繁庶種五穀葡萄諸果不食豚肉齋戒拜天晉安志甘肅通志卷二十一
