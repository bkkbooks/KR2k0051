body:
  text: 甘肅通志卷十六驛遞置郵傳命逺近衝僻芻粟工餼皆有定制甘屬邊塞孔道凡政令下行職貢上達使車驛騎絡繹奔馳有驛有所濫應則乏怠弛則廢司郵政者宜知慎重志驛遞甘肅驛遞錢糧總數額設驛馬三千二百二十匹馬夫二千一百五十八名所牛四百四十四隻所夫一千二百二十六名歲支工料等銀一十一萬六千九百二十四兩四分三釐九毫五絲九纎六塵一渺六漠本色糧一萬三百四十四石料六千九百七十六石六斗草二十九萬九千七百四十束甘肅布政司一東路蘭州蘭泉驛并蘭泉所蘭州管理井東至定逺驛西至沙驛南至摩雲驛從此驛分馬六十匹夫三十五名牛二十二隻夫二十二名歲支工料外備支直等銀二千三百五十一兩六錢五十里至金縣定遠驛并定遠所金縣管理驛南至金縣從此分馬四十五匹夫二十八名牛一十五隻夫一十五名歲支工料外備支直等銀一千七百七十四兩四錢六十里至清水驛并清水所驛丞管理馬四十五匹夫二十八名牛一十五隻夫一十五名歲支工料外備支直等銀一千七百七十四兩四錢六十里至鞏昌府安定縣屬稱鈎驛并稱鈎所驛丞管理馬四十五匹夫二十八名所夫三十名歲支工料外備支直等銀一千六百六十六兩四錢六十里至安定縣延夀驛并安定好地二所安定縣管理南至通安驛從此驛分馬四十五匹夫二十八名所夫四十名嵗支工料外備支直等銀一千七百七十四兩四錢六十里至西鞏驛并西鞏所驛丞管理馬四十五匹馬夫二十八名所夫三十名嵗支工料外備支直等銀一千六百六十六兩四錢六十里至會寧縣保寧驛并㑹寧翟家二所㑹寧縣管理東至青家驛西至西鞏驛北至乾溝驛南至通渭縣從此驛分馬四十五匹馬夫二十八名所夫六十名嵗支工料外備支直等銀一千九百九十兩四錢九十里至青家驛并青家所驛丞管理馬四十五匹馬夫二十八名所夫三十名嵗支工料外備支直等銀一千六百六十六兩四錢九十里至平凉府靜寧州涇陽驛并靜寧髙家二所靜寧州管理驛南至莊浪縣從此分馬四十五匹馬夫二十八名所夫六十名嵗支工料外備支直等銀一千九百九十兩四錢九十里至隆德縣隆城驛并隆德神林二所隆德縣管理馬四十五匹馬夫二十八名所夫六十名嵗支工料外備支直等銀一千九百九十兩四錢五十里至華亭縣瓦亭驛并瓦亭所驛丞管理至南至本縣北固原州以至寧夏從此驛分馬四十五匹馬夫二十八名所夫三十名嵗支工料外備支直等銀一千六百六十六兩四錢九十里至平凉縣髙平驛并平凉安國郿現花家四所平凉縣管理馬四十五匹馬夫二十八名所夫一百二十名嵗支工料外備支直等銀二千六百三十八兩四錢七十里至鎮原縣白水驛驛丞管理縣北至本縣南至崇信從此驛分馬四十五匹夫二十八名嵗支工料外備支直等銀一千三百四十二兩四錢七十里至涇州安定驛涇州髙家二所涇州管理縣南至靈臺從此驛分馬四十五匹馬夫二十八名所夫六十名嵗支工料外備支乂直等銀一千九百九十兩四錢五十里至瓦雲驛驛丞管理馬四十五匹夫二十八名嵗支工料外備支直等銀一千三百四十二兩四錢五十里至西安府長武縣宜祿驛止北至慶陽府寧州政平驛從此驛分八十里至慶陽府寧州政平驛寧州管理馬四匹夫二名嵗支工料外備等銀一百三兩六錢六十里至彭原驛寧州管理馬四匹夫二名嵗支工料外備等銀一百三兩六錢九十里至真寧縣本縣管理夫二名嵗支工食銀二十一兩六錢九十里至合水縣華池驛合水縣管理馬四匹夫二名嵗支工料外備等銀一百三兩六錢六十里至安化縣𢎞化驛安化縣管理馬一十一匹夫八名嵗支工料外備等銀三百一十四兩四錢一百二十里至環縣額設無一涇州迤南一百里至靈臺縣本縣管理馬四匹夫二名嵗支工料外備等銀一百三兩六錢一白水驛迤北九十里至鎮原縣額設無一白水驛迤南五十里至崇信縣本縣管理夫二名嵗支工食銀二十一兩六錢一瓦亭驛迤南一百八十里至華亭縣額設無一瓦亭驛迤北八十里至固原州由固原迤北至渠口驛渠口驛迤東至寧夏驛路俱見後一靜寧州迤南九十里至莊浪縣本縣管理夫二名嵗支工食銀二十一兩六錢一㑹寧縣迤北九十里至乾溝驛并乾溝所㑹寧縣管理馬四匹夫二名所夫六名嵗支工料外備等銀一百六十八兩四錢九十里至郭城驛并郭城所㑹寧縣管理馬四匹夫二名所夫六名嵗支工料外備等銀一百六十八兩四錢一定遠驛迤南四十里至金縣額設無一西路蘭州蘭泉驛起四十里至沙井驛并沙井所驛丞管理馬四十五匹夫三十二名牛一十五隻夫一十五名嵗支工料外備站價等銀四百五十三兩一錢八分四釐五毫本色糧二百八十二石本色料五百九十四石本色草五千四百束七十里至莊浪廳屬苦水驛并苦水所驛丞管理馬四十五匹夫三十二名牛一十五隻夫一十五名嵗支工料外備站價等銀四百五十三兩一錢八分四釐五毫本色糧二百八十二石本色料五百九十四石本色草五千四百束五十里至紅城驛并紅城所驛丞管理馬四十五匹夫三十二名牛一十五隻夫一十五名嵗支工料外備站價等銀四百五十三兩一錢八分四釐五毫本色糧二百八十二石本色料五百九十四石本色草五千四百束四十里至南大通驛并南大通所莊浪廳管理馬四十五匹夫三十二名牛一十五隻夫一十五名嵗支工料外備站價等銀四百五十三兩一錢八分四釐五毫本色糧二百八十二石本色料五百九十四石本色草五千四百束三十里至莊浪㕔平番縣在城驛并在城所平番縣管理馬六十匹夫三十九名牛一十五隻夫一十五名嵗支工料