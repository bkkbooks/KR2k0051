body:
  text: 甘肅通志卷四疆域附形勝甘肅地處上遊禹貢以黑水西河為界三危弱水流沙皆極其逺而言版宇遼濶四塞為固河西衛所近改設郡邑同於內地控引崇山聯絡河渭畫界分疆廣袤逺近按籍可稽志疆域甘肅布政司駐劄蘭州治在京師西南四千四十里東至邠州長武縣界一千里西至河州暗門界一千一百二十里南至四川龍安府平武縣界一千三百七十里北至亦不剌山一千四十里東南至漢中府略陽縣界一千二百三十里西南至洮州衛番界九百三十里東北至延安府保安縣界一千四百三十里西北至沙州衛外境二千四百四十里喬峯四阻繚以大河趙時春忠烈碑捍禦秦雍聨絡西域襟帶萬里控制強敵同上北接沙漠西控戎羌為四方根本要樞之地楊一清察院題名碑渭河襟帶青海為瀆發難九篇北跨沙漠之險南吞巴蜀之雄山奔突而若馳水旋繞而如環曹璉朔方賦臨洮府治在布政司南二百一十里東至鞏昌府隴西縣界一百三十五里西至暗門番界一千九十里南至鞏昌府岷州界一百二十里北至涼州府平番縣界六百九十里東南至鞏昌府岷州界二百四十五里西南至鞏昌府洮州衛界一百四十里東北至鞏昌府靖逺縣界三百四十里西北至涼州府平番縣界二百六十里距京師四千一百九十里中原迤西山川扼塞明太祖諭徐達文境接巴巂之襟裔宋張舜民收復熙河頌據隴首撩西傾襟帶關河長城之險雄峙一郡抗衡三邊古形勝之地按府襟帶河湟為西陲之保障自秦築長城起臨洮而邊境大斥無南牧之患蜀薑維數出狄道以撓關隴魏人建為重鎮維不能得志晉之衰也河西擾亂大約據狄道則足以侵隴西狄道失而河西有唇齒之慮矣拓跋魏兼有秦涼以狄道為咽喉之地列置郡縣恃為藩蔽唐拒吐蕃臨州其控扼之地也寶應初臨州不守而隴右遂成荒外矣宋承五季之敝王官所蒞不越秦成熙寧以後邊功漸啓議者謂欲圖西夏必先有事熙河及熙河路建而湟鄯之域次第收復志曰郡土田膏腴引渠灌溉為利甚溥其民皆番漢雜處好勇喜獵故徐達亦云臨洮西通蕃落北界河湟得其地足以給軍儲得其人足以資戰鬭也狄道縣附郭治在府城內東至馬扎鋪渭源縣界一百六十里西至魏家寨鞏昌府岷州界一百四十里南至橋道鋪岷州界一百二十里北至摩雲驛蘭州界一百五十里東南至文家坪渭源縣界四十里西南至𢎞道峪岷州界三十里東北至普家寺金縣界八十里西北至𢎞濟橋蘭州界一百五十里蘭州治在府北二百一十里東至車道嶺鞏昌府安定縣界一百四十里西至張家河灣西寧府西寧縣界一百里南至摩雲驛狄道縣界六十里北至紅水堡涼州府平番縣界四百三十里東南至新營金縣渭源二縣界一百三十里西南至馬蓮灘河州界一百里東北至一條城鞏昌府靖逺縣界一百一十里西北至沙井堡平番縣界四十里一峯崔巍兩翼拱護舊志地勢蜿蜒有長城之險馬銜阻其東榆谷抵其西臯蘭峙其南黃河經其北明一統志為束帶之形要衝之地舊志臯蘭雄鎮峙乎前九州之臺障乎後巒嶠阜陵環左右金城賦按州控河為險隔閡戎羌自漢以來河西雄郡金城為最豈非以介戎夏之間隴右安危常係此地哉晉元康而後河隴多事金城左右嵗無寧宇隋唐盛時馳逐河湟未嘗不以蘭州為要害及廣德以後州沒吐蕃而西涼不復為王土大中間雖嘗收復亦僅同羈縻矣宋元豐四年李憲敗夏人始復城蘭州元祐初夏人求復得此地朝議欲割以畀之孫路言自通逺至熙州總通一徑熙之北已接夏境今自北關瀕大河城蘭州然後可以扞蔽若捐以與敵則一道危矣穆衍言蘭州棄則熙州危熙州危則關中震動唐失河湟西邊一有不順則警及京都今若委蘭州悔將無及遂不果棄明時自州以北常為寇衝往往設重兵駐此為府治北門之鎖鑰焉渭源縣治在府東南一百二十里東至鍬家鋪鞏昌府隴西縣界一十五里西至翠巖鋪狄道縣界六十里南至露骨山鞏昌府洮州衛界七十里北至常家碑鞏昌府安定縣界七十里東南至潘家岔隴西縣界一十五里西南至過那山狄道縣界六十里東北至林子溝隴西縣界四十里西北至連二灣狄道縣界七十里襟山帶河千峯環擁列嶂重圍縣志南接西傾東連朱圉西迤鳥鼠北枕鳯凰諸山環峙兩水合流一統志金縣治在府東北一百八十里東至車道嶺鞏昌府安定縣界七十里西至煤洞山蘭州界三十里南至清水溝口狄道縣界五十里北至一條城蘭州界一百七十里東南至劉家嘴狄道縣界七十里西南至新營蘭州界四十里東北至韋家堡營安定縣界一百三十里西北至豬嘴嶺蘭州界四十五里逺峯爭秀大峽分流豬嘴馬銜既如揖而如拱浩亹神濟亦若帶而若環地接兩驛之衝治介萬山之會舊志西枕馬鞍北據天塹三山拱翠二水分流縣志河州治在府西少北一百九十里東至𢎞濟橋狄道縣界一百一十里西至積石關口外循化營界一百二十里南至三渡水狄道縣界一百六十里北至鮑家嶺西寧府西寧縣界一百五十里東南至黨川鋪狄道縣界一百五十里西南至蓮花山鞏昌府洮州衛界二百四十里東北至毛籠硤蘭州界一百二十里西北至三川黃河沿西寧府界一百五十里南得鍾存北阻大河漢曹鳯議洮水繞於東積石峙於西南盤雪嶺北距黃河舊志乃中國之咽喉實西陲之藩籬州志界接羌戎其山峻聳元城隍廟記按州控扼番戎山川盤錯自昔西陲多釁枹罕嘗為戰地蓋犄角河西肘腋隴右州亦中外之要防矣明初置茶馬司於此以制番命資國用其後漸弛𢎞治末都御史楊一清言唐時回紇入貢即以馬易茶宋熙寧間行之所謂摘山之産易廏之良無害而有利者也我朝納馬謂之差發因納馬而酬茶體尊名順非互市交易之比且西番為中國藩籬其人非孝子順孫徒以資茶於我絶之則死故俯首服從此制番控夷之上䇿請申明舊制使番族各供差發蓋河洮二州實為西番之襟要故茶馬二司特設於此歸德所治在府西北八百五十里東至爾剛哇沙思定循化營界三百二十里西至沙溝察罕諾木罕界一百三十里南至揣咱都受一百五十里北至黃河一里東南至上下籠布河州界三百七十里西南至草地上喇安扎薩克喇嘛察罕諾木罕界一百一十里東北至南川番族阿失工界四十里西北至黃河籠羊硤果密番族界七十里鞏昌府治在布政司南四百二十里東至槐樹嶺秦州界二百二十里西至臨洮府渭源縣界七十五里南至殺賊驛階州界五百三十里北至靖逺縣松山邊牆七百里東南至小川驛階州界四百五十里西南至舊洮州番界三百二十五里東北至西安州平涼府固原州界七百四十里西北至臨洮府渭源縣界七十五里距京師三千九百八十里山川險阻襟帶隴蜀用武要地廣輿記黃河清渭前帶後環軒谷羲臺左遮右拱逺眺岷嶓秀啓西傾鞏昌府題名記鳥鼠盤紆渭河經緯姚鏌崇羲書院記江分番境階文洮固為之藩河限邊防安會蘭靖張其掖雲棧扼三巴之喉金城拊五涼之背府志按府翼蔽秦隴控扼羌戎東漢初隗囂據隴西動搖三輔諸葛亮伐魏欲先取隴右結連羌戎以圖關中隴右不下卒以無功魏亦以為重鎮鄧艾嘗云狄道今臨洮隴西南安祁山各當有守蓋其地山谷糾紛川原圍繞其俗尚氣力修戰備好田獵勤稼穡自古用武之國東上秦隴而雍岐之肩背竦南下階成而梁益之咽喉壞西指蘭會而河湟之要領舉是故唐初入長安即遣軍安撫隴右而秦涼之藩籬以次摧壞天寶以後吐蕃竊有其地窺伺畿輔大為唐患宋人議復河湟置通逺軍以經略之熙河遂為內地元併有鞏昌南窺蜀口而宋之西邊不支夫欲保關中先固隴右欲固隴右鞏昌豈非都會之所哉隴西縣附郭治在府城內東至寧逺縣界四十五里西至臨洮府渭源縣界七十五里南至漳縣界六十里北至安定縣界九十里東南至漳縣界六十里西南至岷州界一百里東北至通渭縣界七十里西北至安定縣界七十里首陽西峙筆架東屹南闢石門北羅重澗馬鹿之東千山列障貆道之險一夫當關渭上名邦洮陽雄鎮縣志安定縣治在府北一百六十里東至會寧縣界一百里西至臨洮府狄道縣界一百里南至隴西縣界七十里北至臨洮府金縣界一百二十里東南至隴西縣界七十里西南至臨洮府渭源縣界二百里東北至靖逺縣界三百三十里西北至臨洮府蘭州界一百八十里東聨靖會西控臨蘭北倚羣峯南臨雙峪舊志渭北之形援河西之保障府志通渭縣治安定監在府東北一百六十里東至王家鋪秦州秦安縣界一百三十里西至牛營會寧縣界二十里南至里辛鎮伏羌縣界一百一十里北至蒸餅山會寧縣界三十里東南至土橋子伏羌縣界一百六十里西南至杜家堡隴西縣界六十里東北至佟家堡平涼府靜寧州界一百里西北至腰食峴會寧縣界三十里一十八盤山天成之險二十四渡水地效之竒邊隘迫鄰金湯永壯縣志漳縣治在府西南七十里東至寧逺縣界七十里西至岷州界四十五里南至岷州界一百四十里北至隴西縣界十里東南至寧逺縣界九十二里西南至岷州界八十五里東北至隴西縣界三十里西北至岷州界四十里三台崒嵂漳水瀠回逺則西傾青陽猶捍衛近而青崖鹽山若拱揖彈丸之地扼番障鞏郡志會寧縣治在府北二百八十里東至平涼府靜寧州界一百二十里西至安定縣界二十里南至通渭縣界六十里北至靖逺縣界一百八十里東南至平涼府隆德縣界一百里西南至隴西縣界一百里東北至平涼府固原州界二百五十里西北至黃河界二百八十里地控三邊縣居四塞層巒列峙衆水合流舊縣志近而式虎龍頭逺而烏蘭鐵木當鞏臨之右臂為秦隴之北門一統志伏羌縣治在府東一百九十里東至秦州界三十里西至寧逺縣界五十里南至秦州禮縣界六十里北至通渭縣界二十里東南至秦州界三十里西南至寧逺縣界六十里東北至秦州秦安縣界四十里西北至隴西縣界八十里關嶺東峙朱圉西倚天門南蔽渭水北環郡志灘髙流急不通舟楫居秦隴間為運轂要區縣志寧逺縣治在府東九十里東至伏羌縣界五十里西至隴西縣界四十五里南至岷州界七十里北至通渭縣界六十里東南至秦州禮縣界九十里西南至漳縣界五十里東北至通渭縣界八十里西北至隴西縣界四十五里東通三輔西控五涼渭水環城南山瞰邑落門扼其前路廣吳捍于上遊當四衝要害之區具一夫當關之勢縣志西和縣治在府東南三百一十里東至秦州界一百里西至秦州禮縣界三十里南至階州成縣界六十里北至禮縣界三十里東南至階州成縣界七十里西南至階州界一百一十里東北至禮縣界六十里西北至禮縣界二十里西值青海之塞東連白馬之氐仇池峙於前祁山擁於後一統志豐阜龍盤紫金虎踞屏藩秦隴控扼羌戎府志靖逺縣治在府北四百八十里東至西安州平涼府固原州界一百五十里西至車路溝峴臨洮府蘭州界一百二十里南至韓家山會寧縣界一百三十里北至松山邊牆二百二十五里東南至鎖家河會寧縣界一百二十里西南至黑莊安定縣界一百三十里東北至大潦壩寧夏府中衛縣界二百一十里西北至青崖兒蘭州界八十里面山背河地勢險阻明一統志西襟甘涼南引隴岷北控朔漠東接寧固密邇遐荒頗號巗邑縣新志按縣面山背河地勢險阻九邊考云靖逺去敵最近北面濱河遇冬凍合一望平地千里冦若從賀蘭山後蹈氷馳踔勢如風雨未易禦也沿河置戍固不可緩而徐斌水以西舊邊一帶冬防