body:
  text: 甘肅通志卷三十五人物平凉府漢梁統字仲寧安定烏氏人晉大夫梁益耳之後性剛毅而好法律更始召拜酒泉太守㑹更始敗赤眉入長安統與竇融及諸郡起兵保境衆推統為武威太守為政嚴猛威行鄰郡建武五年遣使詣闕奉貢詔加統為宣德將軍八年光武自征隗囂統將兵㑹車駕封統為成義侯後詣京師更封髙山侯拜大中大夫統在朝廷數陳便宜以為宜重刑罰以遵舊典後出為九江太守封陵鄉侯統在郡有治蹟吏人畏愛之子松嗣梁松字伯孫為虎賁中郎將博通經書明習故事與諸儒修明堂辟雍郊祀封禪禮儀永平元年遷太僕子扈亦敦詩書為長樂少府梁竦字叔敬少習孟氏易嘗坐事南徙濟沅湘感悼子胥屈原乃作悼騷賦繫石而沉之後還本郡閉門自養以經籍為娛著書數篇名曰七序班固稱之性好施不事産業嘗嘆曰大丈夫生當封侯死當廟食如其不然間居可以養志詩書足以自娛州郡之職徒勞人耳後辟命交至並無所就章帝納其二女皆為貴人小貴人生和帝永元九年追尊恭懷皇后追封諡竦褒親愍侯封子棠為樂平侯棠弟雍乘氏侯雍弟翟單父侯雍子商梁商字伯夏竦之孫以外戚拜郎中陽嘉元年女立為皇后以商為大將軍商自以戚屬居大位每存謙柔虛己進賢京師翕然稱為良輔每有饑饉輒載租穀賑與貧餒不宣己惠檢御門族未嘗以權盛干法中常侍張逵等譖商帝怒收逵等悉伏誅辭所連染及在位大臣商上疏請罪止首惡帝納之病篤敕子曰氣絶之後斂以時服無更裁制祭食如存無用三牲及薨諸子欲從其誨朝廷不聽諡忠侯李恂字叔英安定臨涇人少習韓詩教授諸生嘗數百人太守潁川李鴻請署功曹未及到而州辟為從事會鴻卒恂不應州命而送鴻喪還鄉里既葬持喪三年後拜侍御史持節使幽州宣布恩澤所過圖寫山川屯田聚落封奏章帝嘉之拜兗州刺史以清約率下常席羊皮服布被遷張掖太守有威重名時大將軍竇憲兵屯武威天下州郡莫不修禮遺恂奉公不阿為憲所奏免後徵拜謁者使持節領西域副校尉西域數遺恂奴婢宛馬金銀香罽之屬一無所受道路夷清威恩並行遷武威太守後坐事免步歸鄉里與諸生織席自給會西羌反畔恂到田舍為所執獲羌素聞其名放遣之恂因詣洛陽謝時嵗荒司空張敏司徒魯恭等各遣子饋糧悉無所受居新安關下拾橡實以自給年九十六卒皇甫規字威明安定朝那人祖稜度遼將軍父旗扶風都尉永和六年西羌侵安定郡將知規有兵略乃命為功曹使將甲士八百與羌交戰有功梁太后臨朝規舉賢良方正對策梁冀忿其刺已下第免歸州郡承冀㫖幾陷于死遂以詩易教授門徒積十四年後梁冀誅旬月之間禮命五至皆不就泰山賊侵亂郡縣徵拜泰山太守到官廣設方略寇虜悉平延熹四年秋叛羌寇關中規請自效三公舉規為中郎將討破之諸羌慕規威信相勸降者十餘萬東羌乞降凉州復通論功當封而中常侍徐璜左琯欲從求貨規終不答遂排陷坐繫廷尉論輸左校諸公及太學生張鳳等三百餘人詣闕訟之會赦歸家徵拜度遼將軍上書薦中郎將張奐以自代規自以連在大位欲退避數上病不見聽會友人王旻喪還規越界迎之因令客密告並州刺史胡芳使舉奏芳曰威明欲避第仕途吾當為朝廷愛才遂無所問及黨事大起規自以西州豪傑恥不得與乃先自上言臣前薦故大司農張奐是附黨也又臣昔論輸左校時太學生張鳳等上書訟臣是為黨人所附也臣宜坐之朝廷知而不問在事數載北邊威服遷𢎞農太守封夀成亭侯不受轉護羌校尉所著書二十七篇皇甫嵩字義真規兄子父節鴈門太守嵩少有文武志介好詩書習弓馬舉孝廉茂才俱不起靈帝徵為議郎遷北地太守黃巾賊起召羣臣㑹議嵩以為宜解黨禁帝從之以嵩為左中郎將討黃巾波才於陽翟擊彭脫於西華並破之禽卜己又討張角弟梁寶悉破斬之先後生擒斬首降服三十餘萬人角死剖棺戮尸傳首京師封槐里侯領冀州牧奏請冀州一年田租以贍饑民帝從之民歌其德信都令閻忠說嵩建不賞之功北面庸主無以自安後悔莫及嵩守節不屈忠亡去中常侍趙忠張讓憾嵩奏收印綬更封都鄉侯五年梁州賊王國圍陳倉復拜左將軍督兵擊大破之斬首萬餘級國走死董卓故怨嵩及秉政乃徵嵩為城門校尉有司承旨奏嵩下吏將遂誅之嵩子堅夀泣救得免及卓誅復拜征西將軍遷車騎將軍又拜太尉為光祿大夫嵩為人愛慎盡勤前後上表陳諫五百餘事皆有補益皆手書毁草不宣於外又折節下士門無留客人皆稱而附之魏胡遵安定臨涇人才兼文武纍居藩鎮至車騎將軍封陰密侯晉胡奮字𤣥威安定臨涇人魏車騎將軍遵子性開朗有籌略少好武事司馬懿伐遼東以白衣侍從左右甚見接待驍騎路蕃討劉猛奮為監軍擊破之以功遷征南將軍都督荆州加散騎常侍奮家世將門晚乃好學所在有聲績居邊特著威惠女為武帝貴人甚見寵待加鎮東大將軍開府儀同三司時楊駿以后父驕傲奮曰卿恃女更益豪耶歷觀前代與天家婚未有不滅門者但早晚事耳駿銜之而不能害後卒於官贈車騎將軍諡曰壯皇甫謐字士安安定朝那人漢太尉嵩曽孫出後叔父年二十不學所後叔母任氏責其不學對之流涕謐乃感激居貧躬自稼穡帶經而農遂博綜典籍百家之言沉靜寡欲始有髙尚之志以著述為務自號𤣥晏先生遂不仕耽玩典籍忘寢與食時人謂之書淫舉辟皆不行或勸應命謐為釋勸論以通志武帝屢詔敦迫謐辭切言至遂見聽許自表就帝借書帝送書一車與之所著詩賦誄誦又撰帝王世紀年厯髙士逸士列女等傳𤣥晏春秋並重於世皇甫方回安定朝那人謐子少遵父操兼有文才永嘉初徵博士不起避亂荆州閉戶間居未嘗入城府𧖟而後衣耕而後食先人後已尊賢愛物南土人士咸崇敬之刺史陶侃禮之甚厚每造之著素士服望門輒下而進張軌字士彥安定烏氏人少明敏好學有器望與同郡皇甫謐善隱於宜陽女几山張華與軌論經義及政事損益甚器之除太子舍人纍遷散騎常侍公卿舉軌才堪御遠永寧初出為涼州刺史鮮卑反軌到官即討破之威著西州化行河右立學校行鄉射之禮及河間成都二王之難遣兵三千東赴京師永興中鮮卑若羅拔能為寇軌擊斬之俘十餘萬口威名大震惠帝遣加安西將軍大城姑臧永嘉初東羌校尉韓稚殺秦州刺史張輔軌討之稚降王彌寇洛陽軌擊破之又敗劉聰於河東帝嘉其忠進封西平郡公不受遣使貢獻嵗時不絶朝廷嘉之京師饑匱軌即遣參軍杜勳獻馬五百匹㲜布三萬匹帝遣使拜鎮西將軍都督隴右諸軍事劉聰逼洛陽軌遣兵入衛及京師陷軌馳檄關中翼戴帝室秦王為皇太子遣使拜為驃騎大將軍儀同三司固辭在州十三年寢疾遺令將佐盡忠報國務安百姓諡曰武子實梁席闡文安定臨涇人少孤貧涉獵書史齊初為雍州刺史梁武帝受禪除都官尚書出為東陽太守在郡有能名冬至悉放獄中囚依期而至改封湘西侯卒官諡曰威魏胡國珍字世玉安定臨涇人魏靈太后父也國珍少好學雅尚清儉太和中襲父爵為武始侯以女選入掖庭生孝明及即位靈太后臨朝加侍中封安定郡公進位中書監儀同三司同釐庶政與侍中崔光俱授帝經侍直禁中國珍上表陳刑政之宜詔皆施行靈太后以國珍年老加持節都督雍州刺史不欲令其在外就宅拜之靈太后孝明率百僚幸其第宴會極歡國珍年雖篤老而雅敬佛法時事齊潔自彊禮拜至於出入侍從猶能跨馬據鞍薨年八十追崇太師號太上秦公加九錫諡文宣席法友安定涇州人祖父南奔梁法友仕齊以膂力自效遷安豐新蔡二郡太守後歸魏拜豫州刺史恬靜自安不競勢利武宣末除濟州刺史以廉和著稱卒諡襄侯皇甫和字長諧安定朝那人祖澄秦梁二州刺史父徽安定略陽二郡太守和年十一而孤母夏侯氏才明有禮則授以經及長深沉有雅量尤明禮儀宗親凶吉多相咨訪終濟隂太守皇甫亮字君翼和弟神武命為大行臺郎中亮率性任真不樂劇職除司徒東閣祭酒後降梁以母兄在北求還梁帝不奪至鄴無復宦情入白鹿山恣泉石之賞賦詩超然自樂性純朴無片言矯飾後除任城太守病不之官終於鄴胡方回安定臨涇人父義周姚泓侍郎方回仕赫連屈丐為中書侍郎博史籍善文辭太武破赫連昌獲之為北鎮司馬為鎮修表帝善之召為中書博士賜爵臨涇子遷侍郎改定律制司徒崔浩與一時朝賢並愛重之清貧守道以壽終鄧彥海安定人祖羌為苻堅車騎將軍父翼為河間相彥海性真素言行可復博覽羣書長於易筮道武定中原擢為著作郎彥海明解制度多識故事與尚書崔宏參定朝儀律令音樂及軍國文記詔策謹於朝事未嘗忤旨韓茂字元興安定安武人茂年十七膂力過人尤善騎射魏明元征丁零茂為中軍執幢時大風諸旌旗皆偃仆茂於馬上持幢初不傾倒帝異之擢為武賁郎將從太武討赫連昌大破之賜爵蒲陰子又從征統萬大破之平平凉當茂所衝莫不應弦而殪進爵九門侯又征蠕蠕頻戰大捷進爵安定公太武南征茂出青州降者相繼還拜僕射文成踐祚拜尚書令加侍中征南大將軍茂沉毅篤實議論合理善於撫衆勇冠當時卒贈安定王諡曰桓胡叟字倫許安定臨涇人少聰敏年十三辨疑釋理知名鄉國學不師受披讀羣籍再閲於目皆誦於口好屬文入長安時京兆韋祖思多蔑時彥待叟不足叟拂衣而出祖思固留之叟曰論天人者其亡久矣與君相知何夸言若是遂去時年十八歸魏以其識機賜爵始復男家於密雲尋歸家不事産業飢貧不以為恥見榮華者視之蔑如也尚書李敷遺以財不取少孤每言及父母則淚下密雲左右皆祗仰其德齊金祚字神敬安定涇州人性驍雄尚氣俠魏末以軍功至大中大夫討平邢杲歷涇岐二州刺史賀拔嶽表授東雍州刺史令討仇池氐楊紹先於百頃嶽為侯莫陳悅所殺祚克仇池還莫知所歸神武遣行臺侯景諭祚遂解甲而還封安定縣公卒贈司空彭樂安定人驍勇善騎射隨齊神武韓陵之役樂先登陷陳賊衆大潰封樂城縣公除肆州刺史天平四年從神武西討與周文相拒樂請决戰因醉入深被刺腸出內之不盡截去復戰芒山之役樂以數千精騎為右甄衝西軍所向奔退遂馳入周文營俄告捷諸軍乘勝斬首三萬餘西軍退神武使樂追之周文大窘而走獲周文金帶一束以歸神武雖喜其勝且怒其失周文令伏諸地親按其頭連頓之取絹二千匹壓樂因賜之纍遷司徒封陳留王周梁昕字元明安定烏氏人祖重耳漳縣令父勸儒中散大夫昕少溫恭見稱州里周文帝迎魏孝武昕以三輔望族上謁周文見昕容貌瓌偉即授右府參軍纍遷東荆州刺史有仁惠聲後進開府儀同三司明帝進爵胡城縣伯出為陜州總管府長史性溫裕有幹能歷官咸著聲稱卒諡曰貞席固字子堅安定人少有逺志梁大同中為齊興郡守士多附之遷興州刺史大統中歸魏周文甚禮遇之拜豐州刺史纍封靜安郡公昌州刺史固居家孝友涖官頗有聲績卒於州諡曰肅子雅少以孝聞位大將軍隋皇甫績字功明安定朝那人祖穆魏隴東太守父道周湖州刺史績三嵗而孤外祖韋孝寬愍其孤幼不加嚴訓績嘆曰我無庭訓何以自立遂感激好學略涉經史周武帝時引為侍讀轉宫尹中士武帝避暑雲陽宫衛刺王作亂百僚多遁績聞難赴之遇太子於元武門太子執績手悲喜交集帝聞而嘉之開皇初拜都官尚書出為晉州刺史言陳有三可滅上嘉勞而遣之及陳平拜蘇州刺史髙智慧等作亂破之拜信州總管徵還京師卒諡曰安牛𢎞字里仁安定鶉觚人父允魏侍中臨涇公𢎞性寬裕好學博聞仕周為記室內史掌文翰襲父封臨涇公隋開皇初授散騎常侍祕書監𢎞以典籍遺逸上表請開獻書之路上納之詔獻書一卷賚縑一匹一二年間經籍略備進爵奇章公後拜禮部尚書敇修撰五禮勒成百卷行世𢎞請依古制修立明堂上以時事草創未遑制作竟寢不行六年除太常卿九年詔定雅樂又作樂府歌詞撰定圜丘五帝凱樂並議樂事上善其議詔𢎞與姚察等正定新樂是後議置明堂詔𢎞條上故事上甚敬重之時楊素恃才矜貴輕侮朝臣唯見𢎞未嘗不改容自肅素將擊突厥詣𢎞言别𢎞送素至中門而止素曰大將出征故來叙別何相送之近也𢎞遂揖而退素笑曰竒章公可謂其愚不可及也尋拜吏部尚書詔與楊素蘇威薛道衡許善心虞世基崔子發等並召諸儒論新禮隆殺輕重𢎞所立議衆咸推服獻皇后喪楊素謂𢎞今日之事決在於公𢎞斯須之間儀注悉備皆有故實素嘆曰衣冠禮樂盡在此矣非吾所及也𢎞在吏部其選舉先德行而後文才務在審慎用多稱職隋之選舉於斯為最時論彌服大業二年進位上大將軍六年從幸江都卒贈文安侯諡曰憲有文集十三卷行世梁睿字恃德安定烏氏人父禦西魏太尉睿少沉敏有行檢周太祖時襲爵廣平郡公進蔣國公歷凉安二州總管俱有惠政後益州總管王謙反命睿為行軍元帥率兵討謙斬之劍南悉平威震西川進位上柱國睿威惠兼著民夷悅服聲望逾重隋髙祖受禪眷待彌隆睿復上平陳之策上善之時突厥方彊復陳鎮守之策十餘事上嘉歎久之睿自以周代舊臣久居重鎮威名太盛內不自安遂謝病闔門不交當代卒諡曰襄梁毗字景和安定烏氏人祖越魏涇豫洛三州刺史郃陽縣公父茂周滄兗二州刺史毗性剛謇頗有學涉隋初拜治書侍御史遷雍州贊務直道而行無所回避頗失權貴心出為西寧州刺史先是蠻夷酋長以金多者為豪俊每尋干戈略無寧嵗毗患之後因諸酋長相率以金遺之毗置金座側對之慟哭謂曰此飢不可食寒不可衣汝等以此相滅今將此來欲殺我耶一無所納悉以還之於是蠻夷感悟遂不相攻徵為大理卿持法平允進位上開府因上封事抗言楊素擅權寵作威福利國家有事帝重其不屈素任寄隆重多所折挫朝士懾伏莫敢與相是非詞氣不撓者獨毗與柳彧李綱而已大業初遷刑部尚書攝御史大夫事劾宇文述私役部兵固爭之梁彥光字修之安定烏氏人祖茂魏秦華二州刺史父顯周荆州刺史彥光少有至性七嵗時父遇篤疾藥求紫石英不得彥光憂瘁忽於園中見一物不識怪而持歸即紫石英也人咸異之謂至孝所感隋髙祖受禪為岐州刺史甚有惠政嘉禾連理出於州境開皇二年上幸岐州悅其能下詔褒美岐州俗淳以靜鎮之合境大化課最第一轉相州刺史相俗多詐為之作歌稱其不能理化坐免嵗餘拜趙州刺史彥光請復為相州上從之豪猾聞而嗤笑彥光下車發擲姦隱有若神明合境大駭狡猾潛竄乃招致大儒每鄉立學教授策試人皆尅厲風俗大改吏民感悅略無爭訟卒諡曰襄子文謙𢎞雅有父風遷鄱陽太守治稱天下最徵拜戶部侍郎田德懋平凉人觀國公仁恭子少以孝友著名開皇初以父軍功爵平原郡公授太子千牛備身丁父艱哀毁骨立廬於墓側負土成墳上聞而嘉之遣侍郎元志就弔仍降璽書褒美賜縑二百米百石詔表其門閭歷太子舍人義州司馬尚書駕部郎唐吕向字子回涇州人工草𨽻學通古今開元十年召入翰林兼集賢院校理侍太子友諸王時嵗采天下姝好因奏美人賦以諷帝善之擢左拾遺帝好校獵向又獻詩規諫進左補闕從帝東巡帝令蕃夷酋長入仗內射禽向諫詔蕃夷出仗久之遷主客郎中始向之生父岌客逺方不還存亡莫知音信訪索纍年不獲它日自朝還道見一老人物色問之果父也向下馬抱父足號慟帝聞咨嘆官岌朝散大夫賜錦綵樂工娛懌其心向官至工部侍郎牛仙客涇州鶉觚人初為縣小史令隴西營田使傅文靜器之積功遷洮州司馬河西節度使蕭嵩委以軍政清勤不懈及嵩執政薦遷太僕少卿開元末為朔方總管嗇事省用倉庫積實器械鋒鋭遷工部尚書同中書門下三品為相謹身無他與百司咨決無所處可惟曰如令式而已卒贈貞簡牛僧孺字思黯隋竒章公𢎞後工屬文第進士元和初以賢良方正對策條指失政宰相怒調伊闕尉改河南遷監察御史穆宗時為御史中丞宿州刺史李直臣坐賕當死帝惜其才僧孺曰法以制有才者安祿山朱泚以才故亂天下帝從之賜金紫服以戶部侍郎同平章事韓𢎞卒帝遣使者收其家資簿得朝臣受賄者皆在惟僧孺注某月日送錢千萬不納帝善之遷中書侍郎敬宗立進封竒章郡公時宦官擅權僧孺數表去位授武昌節度使鄂城土惡亟圯嵗增築擾民僧孺陶甓以城鄂城無復嵗費又廢沔州以省冗官文宗立復為平章事尋進𢎞文館大學士他日帝召宰相問以致太平之道僧孺曰太平無象今四方不內擾百姓安生業雖未及至盛亦足為治矣更求太平非臣所及退固請罷出為淮南節度副大使三年召為尚書左僕射㑹莊恪太子薨為陳父子君臣大倫以悟帝帝流涕以足疾乞出為山南東道節度使賜彞尊龍勺詔曰精金古器以比君子卿宜少留固請乃行卒贈太尉諡文簡牛蔚字大章僧孺子第進士由監察御史為右補闕大中初屢條時政宣宗嘉之纍遷吏部郎中失權幸意貶國子博士咸通中進至戶部侍郎襲竒章侯久之為山南西道節度使治梁三年受代黃巢陷京師遁山南故吏民喜蔚至爭迎候後以尚書右僕射致仕牛徽蔚子蔚避地於梁道病徽扶籃輿歷閣路遇盜擊其首血流面持輿不息盜迫之徽拜曰親老而疾幸無驚駭盜感之曰此真孝子也共舉輿舍之家進帛裹創以饘奉蔚留信宿去擢吏部員外郎時選濫吏多奸嵗調四千員徽治以剛明抑杜干請法度復振後召為給事中李茂貞請假節鉞討楊復恭昭宗怒徽勸帝許之果有功後終刑部尚書皇甫鏞字和卿臨涇人第進士兄鎛為相時任河南少尹見權寵太盛每極言之鎛不悅乃求分司為太子右庶子鎛敗朝廷賢之授國子祭酒開成初以太子少保卒鏞能屬文工詩為人寡言正色衣冠甚偉所交皆知名士著書數十篇宋胡順之字孝先原州臨涇人登進士試祕書省校書郎知休寧縣有縣民汪姓者豪橫縣不能制嵗租賦常不入逮捕不肯出順之置諸法為青州從事髙麗入貢中貴人挾以為重使州官旅拜於邸順之獨不拜大姓麻士瑤陰結貴侍匿兵械服用擬尚方州縣被凌蔑莫敢發其姦又殺其兄子其母訴於州衆相視曰孰敢往捕者順之盡得其黨有詔鞫問士瑤論死子弟流放者百餘人改知常熟縣遷太常博士明道間再上宰相書乞太后還政仁宗嘉其忠遷尚書屯田員外郎其後數論朝廷事范仲淹愛其才州里皆敬之曲珍字君玉隴干世族寶元康定間夏人屢入寇珍諸父糾族黨禦之敵不敢犯於是曲氏遂以材武長雄邊關珍善騎擊劒嘗與諸父出塞游獵猝遇夏兵圍之奮擊大呼夏人披靡得出顧叔未出復持短兵還決鬬遂俱脫元祐初為環慶副總管夏師數十萬寇涇原珍馳三百里襲破之曲律山俘斬千八百人進東上閣門使忠州防禦使向寶鎮戎軍人善騎射年十四遇敵戰斬首二級及壯以勇聞有虎踞五原東西百里斷人迹寶一矢殪之道過潼關巨盜郭邈山多載關中金帛子女寶射走之盡得其所掠嘗至太原梁適射弩再中的授寶矢射之四發三中適曰今之飛將也神宗稱其勇比薛仁貴歷官至嘉州團練使姚兕字武之宋史五原人一統志隆德人父寶戰死定川兕補右班殿直為環慶巡檢與夏人戰一矢斃其酋衆潰因乘之遂破蘭浪敵大舉入邊有悍酋臨陳甚武兕射中其目斬首還明日來攻益急兕射殺數百人裂指流血又遣子雄引壯騎馳掩其後敵退攻大順城兕復往救轉鬬三日斬級數千卒全二城後慶軍叛兕守西關盜不得入而奔兕追及與語皆感泣羅拜誓不復為亂神宗聞其名召入覲賜銀鎗袍帶遷都監從攻河州飛矢貫耳戰益力河州既得又為鬼章所圍兕曰解圍之法當攻其所必救乃擊隴宗圍遂解從攻交趾有功領雅州刺史徙熙河與种誼合兵討鬼章於洮州擒之拜通州團練使兕以父戰死凡圖畫器用皆刻仇讐未報字事母盡孝力學兵法老不廢書尤喜顔真卿翰墨曰吾慕其人耳弟麟亦有威名關中號二姚姚麟字君瑞兄兕攻河州時俱在兵間中矢透骨以强弩出鏃笑語自若積功至皇城使從李憲討生羌擒冷雞朴再轉英州刺史元豐西討從劉昌祚出戰勝之督諸軍討堪哥平經略使盧秉上其功狀賜金帛六百元祐初擢威州團練使歷殿前都虞候紹聖三年拜武康軍節度使王贍取青唐麟以為朝廷討伐方息肩奈何復生此大患已而贍果敗徽宗立進檢校司徒卒贈開府儀同三司麟為將沉毅持重不少縱捨宿衛將常犯法詔釋之麟杖之於庭而後請拒詔之罪故所至肅然姚雄字毅夫兕子少勇鷙有謀年十八即佐父討金湯以百騎先登奪隘又成荔原之功歷涇原秦鳳將纍佐騏驥使紹聖中渭帥章楶城平夏夏人傾國來爭雄與鏖鬬流矢注肩戰愈厲敵引卻追躡大破之斬首三千級徙知會州王贍略地青唐羌人攻湟鄯雄與苗履援之羌驚潰履謂無虞雄嚴備以待俄而賊至雄整衆迎擊破之獻馘二千哲宗遣中使勞問徙河州种朴戰沒王贍軍陷敵中雄自鄯至湟四戰皆捷拔出之遂築安鄉關夾河立堡以護浮梁通湟水漕運商旅負販入湟者始絡繹於道復加防禦使建中靖國初議棄湟州雄以為可棄蔡京用王厚復河湟治棄地罪停雄官光州居住後竄金州及西寧諸戍阻絶乃起雄權經略熙河使召詣闕為中太乙宫使引疾納節鉞改左金吾衛上將軍尋以檢校司空致仕卒贈開府儀同三司諡武憲郭成字信之德順中安堡人從軍得供奉官王師趨靈武成將涇原兵擊破夏人於漫􅗹隘有羌馳突陳前大將劉昌祚曰誰能取此者成躍馬斬其首以獻朝廷築平夏城置將戍之問可守者諸將皆曰非郭成不可遂使往守夏人恚失地傾國入爭連營百里飛石激火晝夜不息成與折可適以萬騎異道並進遂俘阿埋都逋二大酋捷聞進雄州防禦使涇原鈐轄徽宗詔築綏戎懷戎二堡成獨當其役暴露雪中感疾卒帝悼之甚賻以金帛官其子成輕財好施名震西鄙廉訪使王孝竭白於朝帝手書報曰郭成盡忠報國有功於民宜載祀典榜其廟曰仁勇郭浩字充道成子徽宗時充環慶路第五將部將嘗率百騎至靈州城下夏人以千騎追之浩手斬二將首以還擢渭州兵馬都監尋升鄜延路安撫使時二敵交侵浩守保安一軍對壘一年敵不能犯後為秦鳳路經略使知秦州金人侵和尚原浩與吳玠隨方捍禦蜀賴以全遷防禦使金人以步騎十餘萬窺川口抵殺金坪浩與吳玠大破之遷彰武軍承宣使徙知金州金州殘敝特甚浩招集流亡開營田以其規置頒示諸路朝廷嘉之凡有奏請得以直達金人還河南地以浩充陜西宣諭使知金州後拜檢校少保卒贈少師諡恭懿楊政字直夫原州臨涇人崇寧初父忠與夏人戰殁政甫七嵗哀號如成人母曰此兒孝於親必忠於君其大吾門乎建炎間從吳玠擊金人九戰九捷紹興元年金人趨和尚原政引兵大破之拜恭州刺史四年金精兵十萬欲道仙人關入蜀政說玠曰此地為蜀厄塞當堅守玠遂築壘關外敵帥督戰益急政以神臂弓射之又出不意夜斫其營敵遁去授環慶路安撫使政母留敵境遣人省母母惟勉以忠義後和議成始迎母歸詔封感義郡夫人以政為熙河路經略安撫使知熙州又敗金人於鳳翔又敗金人於寶雞擒萬戶通檢凡大戰七斬獲甚多拜武當軍節度使和議成召還軍民詣部使者借留加少保久之拜太尉卒贈開府儀同三司諡襄毅政守漢中六堰久壞失灌溉之利政為修復漢江水決為害政築長堤捍之凡利於民者不敢以軍旅廢政為吳璘禆將及與璘分道建帥執門下之禮益恭世頗賢之吳玠字晉卿德順軍隴干人少沉毅知兵善騎射讀書能通大義以良家子𨽻涇原軍政和中為隊將從討方臘破之夏人攻懷德軍玠追擊斬級多擢第二副將建炎初金人略秦雍玠逆擊大破之追奔三十里金人攻延安府玠攻華州拔之張浚巡關陜授玠統制升涇原路副總管尋為秦鳳副總管時兵火之餘玠勞來安集民賴以生轉忠州防禦使張浚合五路兵欲與金人決戰玠言宜守要害須其敝而乘之不聽遂大潰玠收散卒保和尚原積粟繕兵為死守計鳳翔民感其惠相與夜輸芻粟助之玠償以銀帛民益喜金人怒邀殺之民輸如故敗金將烏嚕舍赫拜明州觀察使兼陜西都統制烏珠㑹諸道兵十餘萬攻和尚原玠命分番迭射號駐隊矢連發如雨注大敗之烏珠中流矢走以玠為鎮西軍節度使薩里哈長驅趨洋漢玠自河池日夜馳三百里以黃柑遺敵撒離喝大驚大戰饒風嶺六晝夜死者山積未幾金人北歸玠令邀擊之死者以千計盡棄輜重去進玠少保階成鳳州制置使敵復攻仙人關與弟璘合擊敗之金人宵遁復秦鳳隴三州拜少師保定軍節度使玠與敵對壘十年常苦逺餉勞民益治屯田嵗收至十萬斛治廢堰民知灌溉可恃願歸業者數萬家進四川宣撫使卒於仙人關諡武安玠善讀史用兵本孫吳務逺略不求小近利故能必勝御下嚴而有恩故士樂為之死用將佐視勞能為髙下先後方金人一意睨蜀微玠身當其衝無蜀久矣故西人至今思之立廟於仙人關號忠烈淳熙中追封涪王子拱亦握兵吳璘字唐卿玠弟也從玠攻戰積功至宣贊舍人紹興初箭筈關之戰璘功居多守和尚原烏珠大入玠兄弟死守分合三十餘陳璘隨機而應烏珠中流矢遁升副都總管玠命別營仙人關金帥薩里哈以兵十萬至璘血戰七晝夜金兵大敗自是不敢窺蜀者數年除知秦州金兵大入璘守河池屢敗之乂以疊陳法更休迭戰士殊死鬬金將和珍希卜蘇大敗降者萬人和珠走保臘家城璘圍而攻之城垂破詔班師秦檜主之世將浩歎而已後入覲拜少保三十一年金主敗盟拜四川宣撫使兼陜西河東招討使遣將屢敗敵兵乾道初入朝拜太傅封新安郡王改判興元府及還鎮兩宫宴餞甚寵入辭德壽宫髙宗解佩刀賜之璘至漢中修復褒城古堰溉田數千頃民甚便之卒贈太師追封信王璘守蜀餘二十年隱然為方面之重威名亞於玠吳挺字仲烈璘子纍遷利州東路統制紹興三十一年金人渝盟挺願自力軍前以為中軍統制既復秦州金人以兵來爭挺破其治平寨已而戰南市城挺率背嵬騎盡易黃旗繞出敵後敵遂驚敗擢榮州刺史以瓦亭功授郢州防禦使隆興初除陜西河東路宣撫使尋加熙河路經略安撫使時年二十五會議和旋軍淳熙十年加檢校少保成州西和嵗大祲挺力為賑恤分軍儲以佐之全活數十萬紹熙四年以疾乞致仕詔加太尉卒贈少師挺少起勳閥弗居其貴禮賢下士雖遇小官賤吏不敢怠忽拊循將士人人有恩璘故部曲拜於庭下輒降答之即失律誅治無少貸璘嘗對孝宗言諸子中惟挺可任金張中孚字信甫安定鎮戎人父達仕宋至大師封慶國公金圍太原戰殁於軍中孚涕泣率部曲十餘人入大軍中竟得父尸以還後降金睿宗以為鎮洮軍節度使知渭州劉豫括民田籍丁壯為軍中孚竟執不從涇原獨免掊克之患後拜參知政事遷尚書左丞相封南陽郡王卒中孚天性孝友剛毅與弟中彥居未嘗有間言喜讀書馭士卒嚴而有恩西人尤畏愛之張中彥字才甫中孚弟歷官至臨洮尹兼熙秦路都總管鞏州賊劉海構亂中彥惟論為首者戮之西羌恃險不服朝廷使御史就論方略中彥曰此羌服叛不常若非中彥自行勢必不可即至積石豪長四十來約降事遂定加儀同三司明楊思道字夢輔為元鞏昌總管善易學時明兵北伐思道乃棄官遁華亭西山大將軍知其賢命署縣事遭兵亂餘民止八戶思道乃招諭民戶凡千一百有奇遂葺縣治修學校久之思道退占籍為武村里人藩臣薦為本學訓導升山西襄陵教諭九年致仕劉偲靈臺人辟經明行修授福建道監察御史久居風憲有聲名張諒字子貞華亭人聰明過人有膂力善騎射居家孝友嚴肅輕財好義永樂中以貢生歷官貴州參議諸苗反英宗知諒嚴明可用詔至暖閣親諭賜白金及劍俾専征遂討平之升參政黃種隆德人永樂中貢生除戶科給事中鯁介不茍久居清要及歸行李蕭然楊諶字伯維華亭人舉永樂十五年鄉試有謀略善騎射初任工部主事升湖廣司郎中正統間寧德等縣礦賊反官軍討之失利英宗諭諶討之諶承命不歸私第既至宣布朝廷恩意招來王孟光等一千一百四十九戶給糧存恤諸縣遂安獨崇悅不降諶率衆直抵其寨悉擒之閲賊穴婦女財貨不可勝計令曰敢私者斬俾婦女各歸其家餘悉籍奏詔嘉之升本部侍郎兼撫治寧夏王珏涇州人登永樂十九年進士為監察御史骨鯁敢言朝野望其風采時人呼為鐵面御史余俊平凉人宣德正統間歷任介休聞喜二縣教諭俱教有成效升成都府教授王政字裕民華亭人天性孝友有學行善騎射正統中以監生授工部主事歷任員外郎中成化初擢浙江參政時有叛賊王好已作亂政率兵平之齊禮字克敏隆德人正統間貢性剛介居家以孝友稱授陜州知州有異政先是州多虎患禮至虎悉逺去又池生瑞蓮人以為德政所致九載考最升貴州黎平知府拊循苗夷興學校設科條以表正風俗為務卒於官黎人思之為立祠郭堅字屏翰靜寧州人正統十四年貢慷慨好義負有大志勤苦力學卓為時望歷知密雲順義束鹿三縣升涿州知州政績甚著石輅字君輿華亭人膂力善射舉景泰七年鄉試成化會試場災士爭踰牆輅援之悉生授南城兵馬指揮有盜百餘人聚劫東城富民輅馳救射殺數人獲其魁餘皆遁走憲宗聞之詔賜紵絲白金補東城兵馬繼擢髙唐知州路當要衝清約却饋大變奢風民貧者為置牛租母彘以為業逋逃者招歸凡有利可興者悉舉之髙唐民戴如父母及去民刻碑頌遺愛焉林廷玉字粹夫平凉人本福建侯官籍以父芝教授平凉遂家焉成化二十年進士授吏科給事中劾僧維曉棄市中外快之升工科都給事中學士程敏政主會試給事中華敞劾其賣題下獄廷玉言諫官下獄被劾官顧朝參非法請同敏政入獄以昭公道謫廷玉海州判官稍遷茶陵知州歷右通政僉都御史巡撫保定劾太僕丞索賂暴民者丞恃中助反誣訟玉罷之嘉靖初吏部侍郎胡世寧薦玉骨鯁有風裁宜引助新政不果用史書字獻忠靈臺人成化十一年進士授山西陽城知縣年尚少大猾路省祭輕之置諸法民皆驚服省里甲貰小罪徭賦如期百務咸集再知平山縣民習朴治以無事歷吏部員外郎擢守保寧多善政視事九年以清介稱郭遡靜寧人涿州刺史堅子工騎射成化四年從總督項忠討石城賊戰輒當先生擒僞招督王滿四授秦州衛鎮撫十三年從都御史余子俊討洮岷叛番有功升百戶纍官指揮僉事嘗將精兵摧鋒陷陳屢有斬獲尋升都指揮僉事張琡字文璧鎮原人少頴悟有幹局成化八年進士授工部主事查定魏二公敕賜蘆灘額外地奏屬有司以供官厰薪費升真定知府興修學舍積粟賑饑滹沱河泛溢沒民田廬琡疏新河泄水又築長堤百餘里民賴以安內官李廣奪民田奏檄踏勘歸田於民升河南參政督餉革弊歷官中外有名所至輒集事云張倫平凉衛人成化十四年進士清直自勵學以經濟為先任南京戶部主事郎中俸悉給官費無遺留丙午河陜大饑倫請發江淮運米數十萬往賑旱甚河漕運阻倫百方經畫濟以陸挽致米二十餘萬不能至者糶之河南以估金賑陜活數十萬人竟以勞卒於河南人為立祠趙斌字時憲平凉人𢎞治十三年進士溫厚寡言有膽略為舉人時路遇盜數十人斌下馬持弓盜問何人斌從容曰吾平凉趙斌矢不空發盜馳去以行人擢監察御史凡十餘年掌京畿道升應天府丞歷任為政咸有方略仇鉞字廷威鎮原人襲寧夏前衛指揮同知世職正德二年總制楊一清薦擢寧夏遊擊將軍五年安化王置鐇及指揮何錦周昂丁廣反鉞時駐城外聞變引兵入城解甲覲置鐇即歸臥家稱病以所將兵分𨽻賊營錦等信之時就問計鉞陰結壯士遣人令報官軍旦夕至紿錦廣出兵守渡口遏東岸兵勿使渡河錦廣果傾營出昂獨守城置鐇以禡牙召鉞鉞稱病亟昂來視鉞方堅臥伏卒猝起捶殺昻鉞乃被甲橫刀提其首躍馬大呼壯士皆集馳詣置鐇第縛之諭其部曲衆遂大潰論功封咸寧伯進署都督僉事充寧夏總兵官七年劉惠趙鐩等亂河南拜平賊將軍偕都御史彭澤討之連戰皆捷俘斬不可勝計盜首先後被擒出師四月河南賊悉平論功進世侯十年稱疾解營務世宗立再起掌前府事未上卒諡武襄周鑑字子明平凉人舉嘉靖三十一年鄉試第一三十二年進士授刑部主事考最升僉事督學四川山東其所品鑑一時得士最盛名士多出其門升河南左布政使遷右副都御史鑑有政才所至多風力持法嚴人不敢犯雖藩府每事必裁抑妖賊曹倫起儀封鑑擒斬之所司具狀上聞為忌者所沮抑竟未敘功張居正當國威讋朝野以葬親歸道過河南卿大夫迎謁禮甚卑鑑獨守常儀居正不悅語人曰周子明殊無東道意鑑遂抗章自劾求去凡五上未允部議擬調俄有中旨准致仕歸家何宗賢涇州人成化間進士官僉事弟宗禮亦官副使兄弟講學有文名姚爵字汝修靜寧人正德六年進士初授刑部主事歷升湖廣司郎中公明果斷廉正自持嵗戊寅武宗巡遊爵抗疏纍諫廷杖幾斃辛巳春奉命勘事大名府稱平允恤刑四川理冤伸枉尤多平反升河南開封知府未赴任道卒董希曾隆德人舉正德十一年鄉試初授保安知州礦盜可洪等衆二十餘連結鼓煽伺釁將發時承平日久郡縣無備希曾結以恩信開誠布公賊感悅相率斂輯卒不為亂尋升東昌府同知亦著政績趙時春字景仁平凉人為人嚴毅介特與士大夫處意有所不可議論有所不合必引繩按矩詰責之不少貸人服其正年十四舉於鄉踰四年為嘉靖五年會試第一授庶吉士改戶部主事尋調兵部九年疏請禁諛佞正士風又疏請崇治本信號令廣延訪勵廉恥惜人才固疆圉正治教七事下詔獄黜為民既起編修兼司經局校書帝有疾疏請東宫御殿受正旦朝賀復黜為民㑹京師被寇世宗用薦召為兵部職方主事仇鸞恃寵倡馬市損國擾邊時春抗議不合又以能兵為鸞所忌幾得罪稍遷山東僉事轉副使三十二年擢巡撫山西僉都御史提督鴈門諸關武備甚修其為政斥貪墨省征徭抑請托絶饋遺宗藩貴宦相戒不敢犯法其年九月寇入神池利民諸堡時春率兵往禦擐甲策馬至大蟲嶺遇伏兵敗績被論解官時春少喜談兵讀書善强記凡天文地理戶口錢穀多寡之數能歷歷誦之所為文章豪肆與唐順之王慎中齊名唐順之嘗曰宋有歐蘇明有王趙其推重如此著有浚谷集行世許理字伯溫鎮原人正德六年進士授丹陽知縣羣奸橫征苦誅求邑當要路理省費十之三豪右欺隱公帑各數千金纍請謁縣令莫能治理置之法而括財歸官會水災租不入悉以前金代輸升任兵科將行民垂涕贐金送者千餘人理悉卻之及給諫彈劾不避權貴大吏貪墨並時政之弊者輒上封事論皆得體中外憚之劉時中字大本華亭人國學生正德十四年授大名府檢校幹敏疏通太守任君中深賞之數任以疑事事皆辦開州豪吏韓甲為伯所訟州使徒往捕甲甲擊殺徒藏其衣壁中而尸於伯氏之門州收其伯掠治承服時中覆訊盡得枉狀部徒搜甲獲其衣刀闔府驚異大名縣喪尹吏民敗亂時中攝行數月即治剡懷德隆德人貢生授永川丞攝縣事嘉靖間值白蓮賊反勢甚張旬日陷七縣轉寇永川吏民震恐懷德以忠義激勸嬰城固守賊悉衆薄城攻甚力懷德應變俱有方略引弓射中賊帥衆乘勢百弩齊發賊敗遁率衆馳逐俘斬數百人楊文奎隆德人以資補國子生授靈丘知縣有幹才持正不阿縣故有虎為民害文奎齊沐禱祀三日虎竟死太白山有礦跡中官欲奏聞之文奎以為擾民堅執不可事得已近山多盜時出寇掠文奎諜知選壯士二百人躬擐甲胄率二子往討之斬首五十餘級賊遂平升衢州府同知李迪隆德貢生除房縣主簿居官務以善導人不喜刑名時縣以爭田訟者七十餘家迪嘆息曰是關風化非刑獄所能止也乃期日引諸訟者集列庭中為之陳遜讓敦睦之義往反開曉辭氣􅈤惻於是訟者感愧各願罷去無復以田為言者迪治理率多類此及去民思其德為立祠張世爵崇信人嘉靖間貢士任四川安居縣簿為政寬平廉靜不尚苛刻故事司糧務者嵗有例金里甲循例以獻世爵曰若輩以吾為何等乃以赤蹄相汚耶揮之去宥過奬善以誨諭代鞭朴安人感德立祠祀之居鄉睦姻尚義里黨矜式靳賢字子哲靜寧州人舉隆慶元年鄉試性至孝萬厯中知沁源縣俗多逋租率由田土未清賢履畝勘丈絶其兼並自是沁源無傕科之纍又捐俸置機房以教民織縣城土築賢至始甃以磚沁人感戴為之立祠尋擢潞安府通判署事澤州皆稱明決時值嵗歉捐資賑濟全活尤多賢丰姿挺秀自律甚嚴而待人和藹尚義好施親族賴之江渤字漢海靜寧州人性鯁介慎名節恬退自矢萬厯二十一年選貢除知山西芮城縣時縣有陋規新令赴任送途費三百金渤揮去曰此民脂膏耳何玷吾官針為解組日囊槖蕭然歸里杜門手不釋卷􅍦居衣冠危坐聞官司過門輒起立古冥行君子也董三秦隆德人萬厯十年選貢歷官河南真陽知縣為人廉正難干以私其治真陽誅鋤强豪拊循柔善深得寬猛之宜時白蓮教寇亂勢甚劇三秦往招之賊素服其威信胥受撫連捷字金門平凉人工舉子業試輒冠儕輩久著名諸生間舉天啓元年鄉試為人寬和尤敦友讓與弟芳同居終身無間言素恬靜不與人競未嘗見有睚眦之怨鄉曲皆稱之楊可教靈臺人萬厯間貢生任城武訓導其先仲記以貢尹豐潤長厚多善政以理學傳家可教博聞强記窮極經史時與弟可立互訂理學耄年不衰董三策隆德人萬厯間貢士授黃州府通判性廉介持正不阿其佐郡治以薄賦稅寬民力為急在官數年政化大行逺人歸慕去官黃州人思之為立祠萬厯四十五年隆德饑時三策居家出所積俸糴粟收養宗族計口授食舉宗無有飢者王琪字公甫靜寧州人少頴達好古博學家世藏書數萬卷為文有體詩亦入格善書法與弟瓆齊名而行誼素孚於人以副榜入貢所著有襪線集王瓆字藍璧靜寧州人明末進士授山西孝義知縣遷黃梅令除其錮害梅民立碑志德歷升湖廣武昌僉事道時闖獻猖獗江漢震驚瓆調兵駐防分守衝要設伏誘擊擒殺頗多而賊衆益集攻陷楚城瓆扣左良玉軍門號泣請師瓆擐甲督陳直抵鄂渚斬賊萬計不旬日而武黃漢三郡州縣皆復如故尋升參政卒年七十七皇清楊可立字止止靈臺縣人淹貫羣書少工文藝究心周程張朱之學體認求放心工夫樂教人為善建孰訓鄉里子弟逺近從之以明經授藍田訓導升鎮安教諭優恤貧生致仕歸設義田周窮乏晚尤好學篤行著述甚多學者稱為淡齊先生值嵗荒有百餘人採食苜蓿可立憫之各給米數斗去有羣盜攻掠居民謂其衆曰楊某名賢衆毋擾其為小人敬服如此慕天顔字拱極靜寧州人順治十二年進士初任浙江錢塘縣令升福建興化知府審理軍需案費關百萬事連府州縣官數百人屢年不決天顔得其要領庫帑以清尋攝太常卿招撫臺灣授興泉道升江蘇布政使入覲條奏八事其一黃淮全局情形其二淮揚涸田寬徵其三請除荒坍田糧其四請減浮糧額數其五永行均田均役其六選用守令能員其七恤給罪囚口糧其八閩海寨遊設防而治河閩防二事荒坍浮糧之弊尤為確切康熙十五年升江蘇巡撫十六年捐造鳥船四十隻火藥二十萬斤炮手一千二百名解送嶽州軍前加兵部尚書江南屢荒皆由水道不治復奏大興水利請濬常熟白茆港武進孟瀆河諸處蓋吳淞劉河白茅孟瀆為蘇松常鎮之四大幹河不可不急治也疏入報可又蘇松常太長等十州縣有歷久版荒之田有江湖衝塌之坍江有地入公家糧存編戶謂之公占三者歷年里甲包賠官司那墊至是因地震陳言請豁勘實坍荒田地共二千三百六頃歷年缺額銀二百三萬零而版荒坍江公占諸虛租遂得永豁以核京口駐防事去官二十三年起復湖北巡撫旋調貴州升總督漕運因條列漕政復嵗造船隻之例創渡江先後之法請江北紅白兼收以便土宜又嚴斛卒盤驗之法於過淮倡合幫互挽之條於上閘所著有撫吳封事楚黔封事督漕封事輯瑞陳言刻行後卒於蘇州葬於吳慶陽府漢李息郁郅人事景帝至武帝立八嵗為材官將軍軍馬邑後六嵗為將軍出代後三嵗為將軍從大將軍青出朔方凡三為將軍後常為大行渾邪王謀欲降漢是時大行李息將城河上得渾邪王使即馳傳以聞上乃令去病將兵往迎之元鼎間西域既通置河西郡後先零羌合兵十餘萬圍枹罕息與郎中令徐自為將兵十萬人擊平之始置護羌校尉持節統領焉公孫敖義渠人以郎事景帝至武帝立為騎將軍出代後五嵗以校尉從大將軍青封合騎侯後一嵗以中將軍從大將軍再出定襄後二嵗以將軍出北地後十四嵗以因杅將軍築受降城凡四為將軍公孫賀字子叔北地義渠人祖昆邪景帝時為隴西太守以將軍擊吳楚有功封平曲侯著書十餘篇賀少為騎士從軍數有功武帝即位遷至太僕賀夫人衛皇后姊也賀由是有寵元光中為車騎將軍從大將軍青出有功封南窖侯坐酬金失侯後八嵗遂代石慶為丞相封葛繹侯時朝廷多事督責大臣賀引拜為丞相不受印綬頓首涕泣曰臣本邊鄙以鞍馬騎射為官材誠不任宰相上與左右見賀悲哀感動下泣曰扶起丞相賀不肯起上乃起去賀不得已拜出左右問其故賀曰主上賢明臣不足以稱恐負重責從是殆矣賀子敬聲代賀為太僕父子並居公卿位敬聲驕奢不奉法坐事死傅介子北地人以從軍為官先是龜兹樓蘭皆嘗殺漢使者元鳳中介子以駿馬監求使大宛因詔令責樓蘭龜兹國介子至責其王各謝服因率其吏士共斬胸奴使者還奏詔拜為中郎遷平樂監復遣介子齎金幣揚言賜外國至樓蘭王貪漢財物來見使者介子與坐飲壯士二人刺之立死遂持王首還詣闕公卿議者咸嘉其功詔封為義陽侯食邑七百戶甘延壽字君況北地郁郅人少以良家子善騎射為羽林投石拔距絶於等倫嘗超踰羽林亭樓由是遷為郎試辨為期門以材力愛幸稍遷至遼東太守車騎將軍許嘉薦為郎中諫大夫使西域都護騎都尉與副校尉陳湯共誅斬郅支單于封義成侯薨諡曰壯梁慬字伯威北地弋居人也慬有勇氣慷慨好功名延平元年為西域副校尉都護段禧長史趙博守它乾城城小慬以為不可固乃說龜茲王欲入共保其城慬既入遣將急迎禧博合軍八九千人龜茲吏人並叛其王反共圍城慬出戰大破之二年春敦煌衆羌叛朝廷發兵西擊詔慬留援慬進兵擊破之追至昭武及至姑臧降其大豪三百餘人河西復安受詔屯金城聞羌犯三輔即引兵赴擊轉戰武功美陽關連破走之盡得所掠生口羌遂奔散朝廷嘉之賜書勞勉委以西方事三年行度遼將軍事救耿种于美稷破胸奴烏桓即拜度遼將軍王圍郁郅人為强弩將軍以勇武顯聞有射法五卷傅育北地人顯宗初與將軍馬武等擊羌功冠諸軍後為武威太守屢有戰功詳凉州名宦魏傅嘏字蘭石北地人介子之後弱冠知名司空陳羣辟為掾時劉邵作考課法嘏以殿最之課未盡人才作論難以針其失後為河南尹遷尚書時議征吳嘏言非便時不從出師果為諸葛恪所敗正元二年平母邱儉文欽之亂嘏謀居多進封陽鄉侯晉傅祗字子莊魏太常嘏子性至孝以才識明練稱武帝時起家太子舍人纍遷散騎黃門郎為滎陽太守時河濟泛溢乃造沉萊堰以時蓄泄兗豫無水患後以討楊駿功封靈州縣公氐人齊萬年反祗率夏侯駿討平之及趙王倫輔政祗辭疾倫強之使就職惠帝還宫請退不許懷帝即位加右僕射中書監祗明達國體朝廷制度多所經綜著文章駁論十餘萬言傅宣字世𢎞祗子年六嵗喪繼母哭泣如成人長好學趙王倫以為相國掾尚書郎懷帝即位轉吏部郎御史中丞宣弟暢少有重名以選入侍講東宫為祕書丞沒於石勒傅𤣥字休奕北地泥陽人燮之孫少孤貧博學善屬文解鐘律舉秀才除郎中選入著作撰集魏書歷官𢎞農太守典農校尉所居稱職太始四年有水旱之災上便宜五事詔稱善遷司𨽻校尉𤣥天性峻急不能有所容每有奏劾或值日暮捧白簡整簪帶坐而待旦於是貴游懾伏臺閣生風元雖貴顯而著述不廢撰論經國及三史故事評斷得失名傅子內外中篇凡四部六録並文集百餘卷行於世其後追封清泉侯子咸傅咸字長虞剛簡有大節風格峻整疾惡如讐推賢樂善好屬文咸寧初襲父爵拜太子洗馬纍遷司徒左長史在位多所執正以世俗奢侈上書極諫朝廷從之遷尚書左丞惠帝即位楊駿輔政咸規諫諷切駿漸不平駿誅咸轉太子中庶子遷御史中丞汝南王亮輔政専權咸又切諫亮不納僕射王戎兼吏部咸奏戎備位台輔兼掌選舉不能謐靜風俗人心傾動開張浮競咸纍自上稱引故事條理灼然吳郡顧榮嘗曰傅長虞為司𨽻徑直忠果按劾驚人雖非周才偏亮可貴也卒贈司𨽻校尉諡曰貞宋傅𢎞之字仲度北地泥陽人髙祖祗晉司徒𢎞之少倜儻有大志仕宋纍遷建威將軍順陽太守武帝北伐𢎞之等七軍自武關入𢎞之素善騎乘曾於姚泓馳道內緩服戲馬甚有姿致聚觀者數千人並嗟嘆稱善留為雍州治中從事義真東歸赫連勃勃傾國追躡於青泥大戰𢎞之躬貫甲胄氣冠三軍軍敗陷沒逼降不屈時天寒裸𢎞之𢎞之叫罵見殺魏梁祚北地泥陽人篤志好學歷治諸經尤善公羊春秋鄭氏易常以教授有儒者風而無當世之才與幽州別駕平恆有舊時請與論經史辟祕書中散後為中書博士撰訂陳壽三國志名曰國統又作代都賦頗行於世清貧守素不交勢貴子元吉有父風唐康夀真寧人任襄陽穀城令有美政野有馴翬村無吠犬子智任縣令政治公平有父風有墓碑宋王庶字子尚慶陽人崇寧間進士第知涇州保定縣以种師道薦通判懷德軍髙宗初為鄜延經略使纍立戰功進龍圖閣待制節制陜西六路軍馬金人大入破潼關庶傳檄諸路會期進討曲端與庶不協屢督不進延安遂陷自劾得罷紹興五年起復知興元府利䕫路制置使庶以士卒單寡籍興洋壯丁以時簡閲未半年有兵數萬六年除湖北安撫使知鄂州趨闕陳紹復大業上大異之進直學士七年以兵部侍郎召入對奏恢復之功未立失在偏聽欲速輕爵賞是非邪正混淆誠能賞功罰罪其誰不服又口陳手畫秦蜀利害上大喜即日遷本部尚書命庶措置江淮邊防京湖宣撫使當是時秦檜主和戎庶力詆和議乞誅金使不從七疏乞免官中丞勾龍如淵劾庶本趙鼎所薦欺君罔上奪職罷歸十三年御史胡汝明論庶譏訕朝政責道州安置至貶所卒孝宗追復其官諡節敏元旺札勒結寧州人元太祖命副珊蘇庫為中興路管民官國兵西征運餉不絶無毫髮私時號曰滿朝清世祖時以疾卒遺奏請謹名爵節財用帝嘉納焉托爾齊字道明旺札勒結子年十五通古注論語孟子尚書帝召見曰朕聞儒者多嘉言托爾齊奏當親君子逺小人帝曰汝言甚當因授中興路新民總管至官録其子弟之壯者墾田塞黃河九口開其三流凡三載賦額倍增尋升潼州府尹纍遷雲南廉訪副使時雲南諸蠻叛僚佐悉稱故而去托爾齊獨居守尋調廉訪使行省丞相特們德爾貪暴擅誅殺羅織安撫使法哈魯克都欲致之死托爾齊詰其専殺法哈魯克都竟獲免尋復其官托爾齊後卒於官明党理真寧人洪武三十年進士任宜陽縣丞以經術飾吏事政平化行境內以治永樂初纍升太僕寺少卿沉潛溫厚為文敷暢典雅蒞政公勤律身清白抑豪强撫遺孑俾遊食之民各安其業一時稱為良吏賀潤寧州人賦性聰明立志堅定讀書不泥舊習而能深契維新洪武初登進士第授監察御史張文字載道慶陽衛人明初法嚴學者恐貽後纍不樂進取文欲尋師受學父母難之乃潛遊寺觀覔藏經書之久之有悟取儒書讀之即大通里鄰申報郡守見而竒之曰此少年雋器也入庠給廩乃益修身勵行講學受徒文章德行推冠一時以嵗薦補博平訓導開說經義士彬彬向風文體一變致仕歸其貧如洗怡然自得孔文英字世傑安化人永樂十九年進士授廬陵知縣擢監察御史浙黃岩有健訟者搆揑齊民三千人相聚為非奉敕往鞫遂得其所搆造羅織者一訊皆服立遣之獨械首訟者來京時交口以明果稱之歷大理寺卿鎮守紫荆關提督邊務練兵有法設險防要內外晏然升刑部左侍郎卒於官張驥安化人永樂中鄉薦宣德中擢御史激揚有聲遷大理寺少卿平山東寇亂理兩浙冤獄特敕奬諭趙恭環縣人宣德間舉人任河南鈞州知州升彰德府知府歷河南參政執法不撓清苦自持張清寧州人宣德間鄉舉授四川道監察御史歷山東按察司居官以勤恪著時山東郡邑城垣毁塌清檄一切修築之凡七十餘座民不知勞官不知費趙銘安化人景泰二年進士任監察御史執法不避權勢升浙江布政使律身清苦涖政廉平逮終無一金遺子孫倪讓右所人正統七年進士授翰林庶吉士精通六書深明治體歷升太常寺少卿提督四驛館性行中和平生無疾言遽色且見事前知子英亦中鄉舉任雞澤縣尹陳旺安化人正統初襲指揮使資性英敏熟諳韜略凡攻戰守禦俱有成法又通曉譯語當道薦其有文武才遷淮安參將掛兩廣平蠻大將軍印歷升都督同知掌前府事時以名將稱之李福真寧人太學生任大同府同知英宗北狩福冒險進貢久無怠意回鑾日升本府知府進升參政劉僅慶陽人甘貧好學動遵禮義以嵗貢任石州通判理冤獄徵逋稅大有稱譽改判陳州惠政尤多其廉節之操始終不變人以為清白吏茂彪後所人性明敏有俊才登景泰五年進士擢監察御史嘗糾儀奏失儀者聲音如雷百官憚之尋升山東按察司僉事明法律識治體兼通醫術刻經史類證行於世田愈安化人字景和慷慨尚氣節中景泰四年順天鄉試授平遙縣令邑素號難治愈以清介自持涖事精察鋤奸去暴盡息刁風致仕歸以俸餘周給族屬足跡不履公門張達字文通安化人中景泰丙子舉人授蠡縣令撫字有方政平訟簡蠡民化之升蒲州郡守即乞休家人强之行達曰吾以農家得科目勛不逮祿有負國恩多矣乃復營營仕途為家人計耶竟浩然歸結廬柔逺山中耕田課子終身楊綸字大經安化人成化二十年進士知肅寧縣擢監察御史歷按宣府河南四川贓吏望風解綬發宣府總兵趙昶貪酷伏其罪孝宗謂為真御史歷升山西按察使不附劉瑾搆罪下獄瑾誅起升僉都御史巡撫宣府尋升右副都御史掌院事整飭風紀後纍疏乞休人皆稱為清白大夫韓鼎字廷器合水人成化十七年進士選禮科給事中孝宗嗣位首陳公銓選經財用嚴兵衛崇天道四事尋差寧夏給散軍賞盡革侵漁之弊遷右給事中西夷貢獅所過騷然疏罷遣之又以皇嗣未廣為憂上書極言上優詔答之進左給事中疏糾神樂觀董素雲竊祭服之罪且乞用文學之臣以充太常鼎抗疏極諫隨事納忠多人所不敢言屢䝉褒納遷江西按察司副使平反冤獄奉命統制陜西討平吐蕃之亂升兵部右侍郎正德間以疾歸所著有斗菴集慶陽府志陳震字文靜慶陽衛人成化二十三年進士𢎞治初授監察御史風裁凜然凡所按行平寃釋逮時稱平允歷兵部侍郎嘗總制大同諸邊勵志廉勤為政明肅人不敢干以私精兵法六壬三式之學善騎射敵人不敢入寇李夢陽字獻吉慶陽人父正周王府教授母夢日墮懷而生故名夢陽𢎞治五年舉鄉試第一六年成進士授戶部主事進郎中應詔上書言二病三害六漸中指陳閹宦並夀寧侯張鶴齡怙寵驕縱罔利賊民鶴齡奏辨誣夢陽訕母后為張氏下錦衣衛獄尋宥出奪俸武宗立太監劉瑾等八人亂政戶部尚書韓文流涕憂憤文令夢陽屬草奏之疏入詔廷議其事瑾知韓疏出夢陽手托他事下夢陽獄將殺之康海力救得免瑾敗起江西提學副使振古學變宿習士翕然向風以材髙負氣布政使鄭嶽與夢陽因詰問相忤下廣信獄按之坐前作宸濠書院記削籍夢陽才思雄鷙以復古自命與何景明康海王九思等號十才子皆卑視一世而夢陽尤甚所著有空同集王天祐字受之慶陽人舉𢎞治十四年鄉試祐世農家兒時樵牧即能畫地成字稍長覔書潛讀山間李夢陽見而奇之因授之學輒頴悟有得弱冠中鄉舉酷好魯公法帖遒徑逼真正德間纂修孝宗實録預選中書授介休令有分巡凌逼州縣祐曰是猶可以仕耶即解組歸吕經字道甫寧州人少孤貧負薪養母讀書不輟嘗荷薪市米見遺金坐而待之果有泣至者即檢還之歸母怪其久告之母大悅正德三年舉進士授禮科給事中廷議以經諳練邊情命専核山西諸路機宜體勘詳明晉都給事中疏陳弭災異及植國本諸事權奸惡之調山西蒲州同知鎮守太監黃玉求索弗遂誣奏繫獄嘉靖改元起復吏科升山東參政礦賊王堂作亂親督戰生擒之升雲南布政使土司文安邦反𠞰平之升都察院右副都御史巡撫遼東釐剔弊習太監王純等誣奏戍茂州恩詔釋歸有使邊録諫垣存稿諸集隆慶初詔復其官韓守愚字希哲鼎之子正德三年進士選庶吉士補兵部武庫主事值逆瑾被收凡同省士大夫株逮者多守愚獨以質直不與調山東濟寧通判時流賊猖熾當事以守愚素諳軍機委以提率民兵守愚諭以忠義相機𠞰殺賊相戒趨他境歷四川按察司僉事陳大綱字廷憲震子正德十二年進士授大理評事讞疑獄片言立折人咸驚服擢山西僉事土豪陳卿據青羊山作亂撫𠞰未决獨綱力主勦作平賊方略六篇遂度地形險易斷山伐木為飛梯望樓出其背三軍攀援而上賊驚潰卿遂降時宰相以前異議抑之命官覆勘以不合勳格竟不䝉賞升密雲兵備著修邊或問一卷時戴貴作亂久不平綱至立保甲法榜鄉邑失賊者連坐貴遂獲脅從各散去邑賴以寧上賚賞褒之綱為人志大才雄方嚴直徑時稱干城腹心之托韓奕字大之慶陽衛人家貧不能受讀以賦役見辱於軍吏始奮志向學登正德中進士授四川新都令持已廉慎涖政平易擢監察御史奉命巡鹽兩浙時值礦徒嘯聚橫行州縣奕曰鹽法不過商估一年利害耳今變起不滅禍延不淺多方招撫悉為解散升四川僉事致仕為陶穴之居于城南教授生徒講性命之學一時俊髦多出門下楊純字粹夫寧州人舉正德丁卯鄉試授井陘令清慎公勤升䕫州府同知以剛方自持不阿於時清實軍伍一時奸弊肅清見忤當道未竟施為時論惜之張鵬翰慶陽人訓導文子性敏篤學日記數千言登正德六年進士授襄垣令視民如子擢監察御史左遷解州判官申明吕涇野鄉約三年風俗丕變壬辰大饑鵬翰捐俸易粟活人甚衆尋升蘇州通判疏鑿淤河商賈稱便升南戶部員外鄰有新配軍苦于衛幕鬻女得十金未致而失之將求死翰遺之金如數又為贖女遣之除河南僉事有勸翰復礦洞者怒曰汝以利誘我耶遂踈其人歷官山東參議吕顓字幼通經猶子幼失恃隨伯父讀書京師舉正德己卯鄉試第一嘉靖二年進士授戶部主事升刑部員外郎審理冤滯多所平反升郎中出知河南衛輝府政治嚴明調山東東昌值大水河決淹沒館陶武城二邑乃分檄鄉村安插災民請賑全活計口給糧歷升雲南左布政使所著有仕進録上都稿諸子說括等書及定原集行世吕顒字幼誠經子學問宏博器識老成嘉靖十七年進士諳練明達歷升南京刑部郎中升襄陽知府理繁剖劇隨機應變致仕歸有諸書釋義芹谷集若干卷黃正慶陽衛人襲都指揮使父澤以勇幹著聞正少時已熟諳韜略人謂其有父風升靈州備禦都司值寧夏置鐇作亂潛謀刻日渡河正先機收斂渡船屯兵據守賊聞之大驚不敢輕動先事預防之速正實與有功焉升都督僉事胡獻金環縣人中正德己卯鄉試除榮昌縣令愛民省費行取赴京值父喪歸先居榮昌時每嵗盡以俸資奉父母止留柴薪自用一無所取于民到家窘甚至不能襄葬事服闋擢戶部主事楊蛟字巨嶠安化人登嘉靖三十二年進士操行方潔為文宏辨後以主事𣙜稅臨清革去一切陋規省民數萬金吏民戴之左桂字立卿寧州人舉嘉靖二十二年鄉試除胙城令胙稱難治桂至損徭役寬獄訟明法敕罰權豪屏息擢御史巡視西城奏大木厰失火中官悉置於法又上封事如弭災變謹修省侃侃皆大計按山西鹽法會河東地震破格發帑賑災以繼母憂歸悉以遺業讓諸昆弟麻永吉字慶川本衛人嘉靖中登進士秉性純篤嗜讀書母目失明飲食起居必親奉焉初授庶吉士纍官御史太守廉憲嘗抗書劾大臣正色立朝不避權貴文章氣節一時仰為山斗後卒於武昌宦邸囊槖磬然斂櫬無資邵苾字叔芳寧州人舉嘉靖七年鄉試歷任葉縣介休長山東鄉四縣所至除豪猾擒巨寇興廢袪弊歷有政聲遷石州知州政治益勵以鎮江府同知致仕周斯盛字子才寧州人登嘉靖三十二年進士歷官御史巡按遼東土寇犯廣寧身先士卒戰守六晝夜卒保無虞巡按浙江論列巨蠧罷斥貪墨吏治一清督學南畿簡拔英才抑絶刺競風教翕然歷岢嵐副使李楨字克菴慶陽人隆慶五年進士纍官至尚書為諸生時讀書樓上三年不出戶庭鄉試卷真草不塗一字其養定如此筮仕後政事簡易與物無忤立朝著節為世所仰重米萬鍾字友石安化人萬厯二十三年進士纍官太僕寺卿聰頴博雅尤善書畫名著一時時閹寺魏忠賢欲令書屛鍾聞之踰牆走終不與書忠賢黨倪文煥劾之遂削籍李巍然合水人天資頴異垂髫知孝友家貧苦志學業精専以明經授武昌府通判決斷如流獄無寃滯除奸革弊頌流江漢升安寧知州修舉廢墜教養士民甫一載而政聲倍著卒於官鞏國柱真寧人任葭州學正歷任四庠取與必嚴一介家門之內肅若師保雖私居言不妄發人無賢愚見者咸悚然起敬崔嵩慶陽人襲本衛指揮歷官參將器宇豪邁膽勇過人申明軍法恩威並著敵常至城下索酒不許因邀嵩飲嵩單騎往與賊對酌慷慨論議如識平生賊畏服之嵩由此知名一日以百騎出遇賊乃據髙岡下馬解鞍坐臥以示暇逸賊疑有伏終不敢近仍與賊對談嵩已令善射者洞其胸矣賊見徑兵解去魏錕慶陽人精騎射從兄鎮宦歷邊方熟習邊事諳曉韜略比兄出塞錕常在左右指麾調度率部下精騎與賊戰賊射墮兄指錕引弓射中賊目應弦而倒賊衆驚潰後錕以軍功授指揮使歷升參將甘州府漢金日磾字翁叔本胸奴休屠王太子也休屠王與昆邪王謀降漢後悔昆邪王殺之帥其衆來降日磾遂沒入官輸黃門養馬時年十四矣久之武帝游宴見馬後宫滿側日磾等數十人牽馬過殿下莫不竊視至日磾獨不敢日磾長八尺二寸容貌甚嚴馬又肥好上異而問之具以本狀對上奇焉即日拜為馬監歷遷至光祿大夫日磾既親近未嘗有過失上甚信愛之出則驂乘入侍左右日磾二子為帝弄兒及壯與宫人戲日磾殺之帝心敬日磾初莽何羅與江充相善後充族誅何羅懼及遂謀為逆上幸林光宫日磾小疾何羅矯制殺使者發兵入見日磾色變日磾得抱何羅因傳曰莽何羅反帝驚起擒縛之窮治皆伏辜由是著忠孝節日磾自在左右目不忤視者數十年賜出宫女不敢近上欲內其女後宫不肯其篤慎如此上尤竒異之及武帝病屬霍光以輔少主日磾為光副封秺侯卒諡曰敬金倫字少卿日磾弟為黃門侍郎蚤卒日磾兩子貴及孫則衰矣而倫後嗣遂盛金賞日磾子嗣侯爵宣帝即位賞為太僕霍光妻以女霍氏有事萌芽即上書去妻後霍氏敗獨得不坐金安上字子侯倫之子為侍中惇篤有智宣帝愛之發楚王延壽反謀封都成侯卒諡曰敬金敞安上子元帝時為中郎將侍中太后以敞世名忠孝留侍成帝為奉車水衡都尉至衛尉敞為人正直敢犯顔色左右憚之後病甚帝使問所欲以弟岑為托詔拜為郎使主客敞子涉明經節儉諸儒稱之歷官至長信少府唐烏承玼字德潤張掖人開元中與族兄承恩俱任平盧先鋒沈勇而決號轅門二龍遇敵輒先同恩擊破契丹於捺祿山又戰於白城斬首萬計後說史思明斬承慶等降李光弼表為冠軍將軍封昌化郡王石嶺軍使積粟厲兵出入耕戰久之移疾還京師卒年九十六子重𦙍烏重𦙍字保君張掖人河東將承玼子少為潞牙將節度使盧從史奉詔討王承宗陰與賊連重𦙍乃縛從史帳下士持兵合歡重𦙍叱曰天子有命從者賞違者斬士斂手還部無敢動憲宗嘉其功擢河陽節度使封張掖郡公詔重𦙍以兵討淮蔡大小百餘戰賊平遷檢校司空進邠國公建言河朔拒命者鎮將領兵能作威福也遂以所管三州兵還刺史各主其兵時以為宜長慶末檢校司徒同中書門下平章事文宗初真拜司徒未幾卒年六十七贈太尉諡懿穆為將善撫士卒蔡將李端降其妻為蔡人所殺將死呼曰善事烏僕射待官屬有禮名士如溫造石洪皆在幕府殁時二十餘人至刲股以祭趙武孟甘州張掖人少遊獵以所獲饋其母母泣曰汝不好書而敖蕩吾安望哉不為食武孟感激遂力學淹該書記自長安丞為右臺侍御史著河西人物志十篇趙彥昭字奐然甘州張掖人武孟子少豪邁風骨秀爽及進士第調為南部尉與郭元振薛稷蕭至忠善自新豐丞為左臺監察御史景龍中纍遷中書侍郎同中書門下平章事歷凉州都督為政嚴下皆股栗入為吏部侍郎持節按邊遷御史大夫蕭至忠等誅郭元振張說言彥昭與祕謀改刑部尚書封耿國公元昂吉爾張掖人世為西夏將家父堪布率所部歸元為千戶及昻吉爾領父軍從征諸國有功又略地淮南世祖時纍官行尚書省右丞時欲征日本昻吉爾上疏極諫請罷兵息民不從既而師果無功屢進直言帝雖怒甚其辭不少屈明陳瑗左衛人成化壬辰進士授戶部主事歷升江西左布政使南京都察院副都御史卒於官所至有政聲劉寬甘州中衛人刻意經史尤精於星厯筮卜之學嘗建議開髙臺所從學甚衆號心古先生著有河西賦張傑甘州人任寧夏總兵善撫士卒更多謀略哱拜之亂巡撫朱正色以傑嘗與拜善縋入城招安傑切責之被繫不屈兵臨城下賊乃縋出之馬渥野張掖人居恆専心理學萬厯間從父宦長子縣時焚香靜坐體認周程語録晨夕不懈者幾二十年著管窺序詩八首困學詩一帙武振山丹衛人有文武才任甘肅總兵嘗著哈密行録山川道里槩可考見何景陽張掖人任四川彭縣教諭好學不倦年八十猶精楷書河西壁經之傳推為第一壽百嵗而終蘇鏊張掖人號介石由嵗貢授四川保縣令以理學教士有孝弟廉讓詩集凉州府漢段熲字紀明武威姑臧人鄭共叔段之後西域都護段㑹宗之從曾孫也少習弓馬尚游俠輕財好學舉孝廉為陽陵令所在能政遷遼東屬國都尉鮮卑犯塞熲馳赴之恐賊驚去使驛騎詐齎璽書詔熲熲僞退設伏因大縱兵悉斬獲之永夀二年拜中郎將討太山琅邪賊東郭竇等大破之斬首萬餘級封列侯遷護羌校尉會燒當燒何等羌寇隴西金城熲將兵擊破之又出塞二千餘里擊斬燒何大帥上郡諸羌寇并凉二州凉州刺史郭閎貪功稽熲軍義從反叛熲坐徵下獄羌遂陸梁吏人守闕訟熲詔問狀熲但謝罪不敢言枉復為護羌校尉羌酋降者三千落又擊當煎種羌自春及秋無日不戰凡破西羌斬首二萬三千級獲生口數萬人馬牛羊八百萬頭降者萬餘落封熲都鄉侯西羌弭定而東羌先零等數寇擾三輔既降復叛熲將兵與戰羌衆大潰斬首八千餘級獲牛馬羊二十八萬頭拜熲破羌將軍復出橋門至奢延澤擊破之熲被甲先登士卒無敢後者羌遂大敗棄兵而走餘悉散入漢陽山谷間熲規一舉滅之窮山深谷處處破之斬其渠帥獲牛馬氊裘廬帳不可勝數東羌悉平凡百八十戰斬三萬八千六百餘級獲牛馬羊等四十二萬七千五百餘頭實用四十四億軍士死者四百餘人更封新豐縣侯邑萬戶熲行軍仁愛士卒疾病者親自瞻省手為裹創在邊十餘年未嘗一日蓐寢與將士同苦故皆樂為死戰後徵拜太尉初熲與皇甫威明張然明並知名顯達京師稱為凉州三明云段煨武威人以中郎將屯華陰特修農事李郭之亂車駕東遷煨具服御及公卿資儲請帝幸其營楊定與煨有隙誣煨欲反攻其營十餘日不下而煨奉給御膳稟贍百官終無二意建安三年泛既死詔煨與關中諸將討誅李傕以煨為安南將軍封閺鄉侯魏賈詡字文和武威人詡依張繡為謀主曹操征繡一朝引軍退繡自追之詡謂繡曰追必敗繡不從大敗而還詡促更追之繡謝曰不用公言以至於此今已敗奈何復追詡曰兵勢有變亟往必利遂收散卒復追果以勝還繡問故詡曰此易知耳將軍雖善用兵非曹公敵也軍雖新退曹公必自斷後故知必敗曹公攻將軍無失策力未盡而退必國內有故已破將軍必留諸將斷後諸將雖勇亦非將軍敵也故雖用敗兵而必勝繡乃服操拒袁紹于官渡詡勸繡歸操操表詡執金吾封都亭侯用其計敗紹時文帝為五官將而臨淄侯植才名方盛有奪嫡之志詡勸文帝不違子道又以袁本初劉景升父子諷操太子遂定詡自以非曹舊臣而策謀深長懼見猜嫌闔門自守男女嫁娶不結髙門當時論智計者歸之文帝以詡為太尉諡曰肅侯梁陰子春字幼文武威姑臧人晉義熙末曾祖襲隨宋武帝南遷至南平因家焉父智伯與梁武帝鄰居少相友善見帝臥有異光成五色因握帝手曰公後非人臣也天下方亂安蒼生者其在君乎帝曰幸勿多言及帝踐位拜梁秦二州刺史子春雖無他才能臨人以廉潔稱太清二年遷侍中屬侯景亂隨王僧辨攻平邵陵王又東討侯景力戰恆冠諸軍會郢州陷卒于江陵陳陰鏗字子堅子春子博涉史傳尤善五言詩為當時所重陳天嘉中為始興王録事參軍文帝燕羣臣賦詩徐陵言之帝即日召鏗預宴使賦新成安樂宫詩鏗援筆便就帝甚賞之纍遷晉陵太守散騎常侍有文集三卷行于世魏賈彞字彥倫武威姑臧人父為苻堅巨鹿太守坐訕謗繫獄彞年十嵗詣長安訟父冤獲伸逺近嘆之弱冠為慕容垂遼西王農記室參軍魏道武聞其名遣使求彝及即位拜尚書左丞預國政陰仲達武威姑臧人少以文學知名世祖平凉州內徙代都司徒崔浩啓仲達凉土才華同修國史除祕書著作郎北齊段榮武威人祖信以豪族徙家五原郡榮好厯術専意星象後魏正光中謂人曰吾今觀天象察人事不及十年當薦亂矣及齊神武起兵榮贊成之論功封姑臧縣侯段韶榮子有將領才略以武明皇后甥齊神武益器愛之韶襲父爵事神武文襄加廣平郡公出總軍旅入參帷幄功髙望重又教誨子弟閨門雍睦事後母以孝聞齊代勳貴罕有及者隋陰壽武威人少果烈有武幹髙祖嘗遣韋孝寬擊尉遲回命壽監軍時孝寬有疾不能親總戎事三軍綱紀皆取決於壽以功進位上柱國拜幽州總管封趙國公唐安興貴河西凉州人武德三年仕長安請說涼王李軌唐主乃遣之興貴至乘間說軌曰今唐殆天啓非人力也若往歸之則竇融之功復見於今日矣軌曰吾據山河之固彼若我何興貴退與弟修仁陰結諸羌起兵擊軌軌敗入城登陴須外援興貴傳言曰唐遣我來取軌不從者罪三族於是諸城不敢動修仁執送之長安詔以興貴為右武侯大將軍封凉國公李抱玉本安興貴曾孫世居河西嫻騎射為人沉毅有謀李光弼引為禆校纍有戰功安祿山亂抱玉上言世居凉州恥與逆臣共宗詔賜姓李史思明破東都光弼使抱玉守南城賊急攻抱玉縱竒兵出俘殺甚衆賊大敗因不能西論功封欒城縣公司空兼兵部尚書大厯二年加山南西道副元帥兼節度使屯盩厔在鎮十餘年禁暴安人為將臣之良卒贈太保諡昭武李抱真抱玉從弟沉慮能斷抱玉屬以軍事代宗時授澤州刺史兼澤潞節度副使抱真策山東有變上黨為兵衝乃籍民戶三丁之一蠲其徭租給弓矢習射三年皆為精兵遂雄視山東步兵為諸道冠田悅反圍邢及臨洺抱真破走之進檢校尚書右僕射朱泚李希烈反抱真以數騎馳見王武俊說之約為兄弟破朱滔進檢校司空卒詔贈太保李光進其先河曲諸部姓阿跌氏貞觀中內屬以其地為雞田州世襲刺史𨽻朔方軍光進與弟光顔少依舍利葛旃葛旃妻其女兄也初葛旃殺僕固瑒歸河東辛雲京遂與光進俱家太原以沉果稱從馬燧救臨洺戰洹水有功歷御史大夫代州刺史元和四年王承宗范希朝引師救易定表光進為都將時光顔亦至大夫故軍中呼小大大夫俄為振武節度使賜姓以光寵之別詔光顔拜洺州刺史弟兄榮冠當時光進徙靈武卒贈尚書左僕射光進有至性居母喪三年不歸寢光顔先娶而母委以家事及光進娶母已亡弟婦籍資貯納管鑰於姒光進命反之曰婦逮事姑且嘗命主家事不可改因相持泣如初李光顔字光遠葛旃少教以騎射每嘆其天資票健已所不逮長從河東軍為禆將節度使馬燧謂曰若有奇相終必光大解所佩劒贈之討李懷光楊惠琳戰有功從髙崇文平劒南數搴旗蹈軍出入若神益知名進代洺二州刺史元和九年討蔡詔以其軍當一面明年大破賊光顔將數騎突入賊中反往一再矢集其身如蝟子攬馬鞅諫無深入光顔挺刃叱之於是士爭奮賊乃潰北時諸鎮兵環蔡相顧不前獨光顔先敗賊始裴度為憲宗言光顔勇而義必立功俄又與烏重𦙍破賊小溵河捷聞進檢校尚書左僕射十二年敗賊於郾城守將鄧懷金令董昌齡開門降韓𢎞素蹇縱陰挾賊自重且惡光顔忠力思有以撓衊之乃飾名姝教歌舞六博遣使遺光顔約旦日納焉乃大合將校置酒引使者以侍姝至光麗秀曼一軍驚視光顔徐曰我去室家久以為公憂誠無以報德然戰士皆棄妻子蹈白刃奈何獨以女色為樂為我謝公天子於光顔恩厚誓不與賊同生因嗚咽泣下將卒數萬皆感激流涕乃厚賂使者還之於是士氣益勵裴度築赫連城於沱口率輕騎觀之賊以竒兵自五溝至大呼薄戰度危甚光顔力戰却之先是光顔策賊必至密遣田布伏精騎溝下扼其歸賊敗去由是賊悉鋭士當光顔而李訴得乘虛入蔡賊平加檢校司空入朝復鎮忠武吐蕃入寇徙邠寧軍時虜毁鹽州城光顔復城之初田縉鎮夏州開邊隙故党項引吐蕃圍涇州郝玭力戰破之光顔聞賊至料兵以赴邠人不肯行光顔為陳說大義聞者泣下遽即路虜走出塞穆宗立加同中書門下平章事敬宗初拜司徒河東節度使卒贈太尉諡曰忠光顔性忠義善撫士其下樂為用許師徑悍嘗為諸軍鋒故數立勳段平仲字秉庸武威人擢監察御史磊落有氣節敢言是時德宗春秋髙躬自聽斷天下事有所壅隔羣臣畏帝苛察無敢言平仲得對欲有所陳帝怒叱去由是坐廢然名由此顯元和初為諫議大夫再遷尚書右丞朝廷有得失未嘗不論奏世推其敢直終太子左庶子元髙智耀河西人世仕夏國祖良惠為右丞相智耀登本國進士第夏亡隱賀蘭山元太宗訪河西故家子孫賢者召見將用之遽辭歸皇子庫騰鎮西凉儒者皆𨽻役智耀謁藩邸請除之欲奏官之不就憲宗即位智耀入見言儒者所學堯舜禹湯文武之道自古有國家者用之則治不用則否養成其材將以資其用也宜蠲免徭役以教育之詔復儒士徭役無有所與世祖即位召見又力言儒術有補治道時淮蜀士俘者皆沒為奴智耀請除之帝從其言即拜翰林學士命循行郡縣區别之智耀又言宜倣前代置御史臺以糾肅官常從之擢西夏中興等路提刑按察使卒贈司徒柱國追封寧國公諡文忠子睿年十六授符寶郎出入禁闥恭謹詳雅除嘉興路總管生擒宿盜一郡以寧擢江東道提刑按察使討平草竊遷浙西道肅政廉訪使按治奸民除淮東道肅政廉訪使縱遣無辜皆有政績復拜南臺御史中丞務持大體有儒者風卒贈太傅諡貞簡桑節河西人少給事仁宗潛邸以精敏稱至治初拜監察御史有直聲出為江南行御史臺御史大夫桑節持風裁御史行部必敕厲而遣之移湖廣行省平章湖廣地連江北威順王嵗嘗出獵民病之又多萃名娼巨賈以網大利有司莫敢忤桑節至責王王謝之悉罷其所為有胡僧曰小住持者恃寵橫甚桑節命捕得其妻妾女樂十八人罪而籍之由是豪强斂手至正十一年汝潁妖賊起乃命募土兵完城池修器械嚴巡警悉以其事屬老將鄭萬戶賊來約降知其詐乃械其渠魁數十人以俟命適召為大司農同僚受賂釋所械者賊大至內外響應城遂陷武昌人泣曰大夫不去吾豈為俘囚桑節入見陳賊本末帝大喜命為江西行省平章令守江州時江州已陷募兵得三千人克銅陵乘勝奮擊擒其渠魁遂復池州石埭據鄱陽口綴江湖要衝日久糧乏援絶力戰衆死桑節中流矢昏仆賊素聞名舁置密室羅拜饋食桑節不食七日北面再拜而絶桑節為人公廉明決與將士同甘苦以忠義感激人心故能得人死力云沃掄北庭人祖哈喇本輝和爾國人自元太祖起兵四年來歸居于永昌故世為水昌巨族沃掄久居政府聰明典重通達國體敡歷中外繇直省舍人歷官平章政事元危素撰墓碑余闕字廷心唐古氏家世武威父官廬州遂為廬州人少喪父授徒以養母元統初賜進士及第授同知泗州事召入翰林修撰待制至正中廬州盜起以闕僉都元帥府事分兵守安慶抵官十日而寇至拒却之集將吏議屯田戰守計環境築堡寨選精甲外扞而耕稼于中明年大饑人相食捐俸為粥以食之且請鈔三萬錠以賑民十五年大熟得糧三萬斛乃浚隍增陴表裏完固盜環布四外闕居其中屹為江淮一保障時池州賊趙普勝帥衆攻城連戰三日敗去未幾又至相拒二十日始退陳友諒自上流而下闕遣兵扼於觀音橋而饒州祝寇又攻西門闕斬却之賊併兵來攻又却之賊恚甚乃樹柵起飛樓分攻三門闕以孤軍血戰身被十餘創日中城陷城中火起闕知不可為引刀自剄墮清水塘中妻雅希氏一子德生女福童皆赴井死賊義之求尸塘中具衣冠葬之西門外事聞贈行中書省平章政事追封豳國公諡忠宣闕號令嚴信與下同甘苦故人爭用命當出戰矢石亂下如雨士以盾蔽闕闕却之曰汝輩亦有命何蔽我為嘗修遼金宋三史而于五經皆有傳注為文淳古有氣詩尚江左髙視鮑謝徐庾以下不論也為篆𨽻亦工及安慶歸附明太祖嘉其忠詔立廟於忠節坊命有司嵗時致祭明吳允誠䝉古人本名巴圖特穆爾居甘肅塞外塔溝地永樂三年率妻子及部落五十馬駝萬六千因宋晟來歸賜姓名吳允誠授右軍都督僉事使居凉州八年從出塞敗巴尼雅實哩進左都督追獲庫圖齊封恭順伯允誠三子逹蘭圭徹克勤帝征衛喇特允誠父子皆從允誠卒贈國公諡忠壯正統王木之變克忠與其弟都督克勤為後拒寇至戰不勝官軍死傷略盡克忠下馬射矢竭猶殺數人與克勤俱殁於陳贈邠國公諡忠勇克勤贈遵化伯諡僖敏魯鑑其先西大通人明初率部落歸附命居莊浪父失加官莊浪衛指揮同知正統末鑑嗣父職成化四年固原穆蘇反鑑以土兵從征出則先驅入則殿後為賊所憚賊平進總兵官鎮延綏魯氏世守西陲有捍禦功帝命有司建坊旌其世績鑑條上邊䇿四事多議行鑑有材勇遇敵輒冒矢石數被傷不為阻故能積功至大將卒贈右都督賜恤如制鑑子麟襲指揮使豪健如其父由甘肅參將遷副總兵麟子經正德二年襲職積功以總兵官鎮延綏經驍勇奉職寡過繼祖父為大帥保功名稱良將李震字卯泉鎮番人以庠生襲祖職協守寧夏總督王崇古駐花馬池知套虜有異謀以輕騎三千屬震為虜所覺部分精鋭逆戰震劈其堅陳突入帳中所遇强壯盡殱之白城子之捷以震功為最升甘肅總兵掛平羌將軍印修葺五郡磚城達雲凉州衛人勇悍饒智略萬厯中嗣世職指揮僉事纍進西寧參將有順義王諳達從子永實卜者部衆强盛隨諳達西迎活佛留據青海更名衛喇特塔布囊嵗為西寧患嘗誘殺副將李魁二十三年九月九日擁徑騎直入雲伏兵托爾峽口外而已提卒二千與戰方合伏忽起夾擊大敗之雲手馘其帥一人斬首六百八十餘級獲駝馬戎器無算所馘巴圖爾徹爾即前殺李魁者其地即魁陳亡處為西陲戰功第一邊人快焉後寇復至雲衝擊寇死傷無算追奔數十里捷聞帝遣官郊廟宣捷永實卜敗逺徙雲招番復業者七千餘尸命雲以總兵官鎮守延綏未幾鎮甘肅有松山璸都阿齊圖等屢為邊患雲分道襲之寇逺竄攘地五百里松山既復為築邊垣分屯置戍寇入犯輒大敗之以功進秩增勳廕雲為將先登陷陳所至未嘗挫衄名震西陲為一時邊將之冠卒贈太子太保子竒勛昌平總兵甘肅通志卷三十五
