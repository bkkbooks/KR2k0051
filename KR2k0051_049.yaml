征馬驕嘶飛將出晶晶劍甲凜霜花被甲鞮鞪控驌驦霓旌羽纛奮干將分麾百道蕭關下何處飛來赤白囊賀蘭山後騎如雲接地風塵慘不分觱栗聲隨征雁過烏氏獨夜夢中聞已散長圍赤水灣秦雲漢月滿關山翩翩羽騎歡聲近麾下偏裨較獵還皇清宋琬杜子美草堂二首最愛溪山好因成秉燭遊碧潭春響亂紅樹晚香浮橡栗遺歌在蘋蘩過客修先生如可起為我聽吳謳少陵棲隱處古屋鎖莓苔峭壁星辰上驚濤風雨來人從三峽去地入七歌哀欲作招魂賦臨流首重回許孫荃題甘泉寺甘州城南甘泉寺檻泉觱沸流雲氣散作千家宛轉溪滙為絶塞清涼地我來寺下俯流泉歷歷遊魚併在淵秋髙潦水寒潭盡繪出天山雪後天郭朝佐積石詩嘗讀大禹書導河始積石神功洵巨哉兩山如削壁疑是鬼斧鑿疑是巨靈擘余來千載後山勢猶如昔煙嵐鬱不開與天常咫尺下瞰黃河流風翻昔浪白濤聲如怒雷奔騰何迅疾我欲溯其源星宿杳難即我欲登崑崙舉頭惟暝色君不見此地當年吐谷渾漢魏以來常反側而今四海頌升平羌戎稽顙烽煙息車書一統盡朝宗此山此水亘西域朱軾書王司馬渠圗碑隂後奔騰浩瀚出毫端唐漢新渠次第安三閘平分均水力長堤突兀挽狂瀾城依東壁知靈武雲鎖西山識賀蘭自是韓陵石一片行人莫作畫圗看蔡升元題大清渠二首為憐膏壤棄邊荒七日功成百里塘引入河流沙磧裏鑿開夾口賀蘭旁支分九堡通溝澮鼎峙三渠並漢唐作吏盡如君任事不難到處樂豐穰兩渠中劃大清渠畚築無勞民力紓心畫萬家溝洫志胸藏一卷水經書嵐光樹色晴川外鴻影鷗波夕照餘渾似江南好風景豈惟灌溉遍村墟通智惠農渠工竣恭頌四首竭盡駑駘力為臣分所宜自從膺使命惟欲答昌期渠水非容易民生實在兹規模初就緒聖主是明師疏濬路三百蟠延波浪髙渠心分暗洞龍尾架飛槽閘水開來湧餘波退去豪自然灌溉利翻覺桔橰勞邊庭諸父老常幸戴堯天豐熟年年慶恩波世世傳一方成樂土二萬是良田無限風光好都由鳳詔宣四十幾回役勞勞踏塞塵燉煌會計遍恆水繪圗頻疏鑿蘭峯下經營黃水濱借兹工告竣稍致事君身昌潤渠工竣恭紀黃河别𣲖六羊通石閘巍然跨彩虹激起衆流增浪力引開曲水灌田功川輝原潤千村聚野緑禾青一望同從此遐荒歡鼓腹羣歌大有慰宸衷作甘稼穡軫黎民西陜年來奉使頻力竭駑駘酬主德普沾雨露戴皇仁昭回人物山川舊吐納洪波氣象新共慶恩膏貽樂利銀疆北鄙萬年春單疇書昌潤渠工竣恭紀水利勞宸衷恩膏洽朔方九重親指授羣力共劻勷疏濬因川澤經營駕漢唐碧雲輝半月緑栁卧橫塘星宿來千里隂精劈六羊支條各滚滚挹注盡洋洋原隰初成界南東細畫疆篝車盈畎畝士女樂倉箱睿慮周荒服斯民迪永康敢言如史白豐豫賴天王惠農渠工竣恭紀長歌黃河之水來星宿江永漢廣共湯湯達乎秦晉豫兖之境奔放直抵夫淮與楊夏伏而秋汛處處固堤防安其就下性獨利在銀疆昔人相勢而利導兩渠並濬漢與唐用以資灌溉嵗嵗志農祥水澤不到處沃土膏壤棄為牧畜場我朝幅􅊷廣睿慮更周詳欽承天子命經營此一方率彼羣工力竭力共劻勷洪流劈一𣲖灌注萬頃荒爰採石以為閘兮更架木以為梁往來通乎行旅兮其蓄泄則有良方棟宇凌霄漢廟貌更堂皇渠堤三百里沿湃植垂楊緑樹隂濃處渠水恣汪洋昔也荆榛之地今也樂利之鄉兩城建百雉章設邑宰遴賢良招徠幾萬户恩膏發國帑渙汗來北闕天語更煌煌紳士首倡率子孫世業常翳彼南畝鬱鬱蒼蒼西成東作千倉萬箱士女樂乃積之殷阜軍國溢嵗取於紅倉兹惟聖天子在上邇不泄而逺不忘創此城郭田墅貽萬年有道之長汪漋城工告成四首化被流沙萬里清燉煌境闢建岩城使臣祇肅銜恩命邊士辛勤集庶氓基厚山川開蘊蓄地靈草木備經營帑金優給儲糧足力役歡趨喜氣盈塞垣堅築勢隆崇造作紛紜督百工事倚羣曹分效職期逾一載告成功雲巒翠列層樓外城郭煙環四望中疆宇新開增氣象邊民輻輳往來通牙旗幕府建高標雉堞光騰絶域遙屋宇環連排繡壤樓臺聳出逼丹霄春融沙境千禽集膏沃郊原百穀饒弓矢載櫜逢暇日清風遍野塞塵消鳴沙興作萃元元五堡新營接鎮垣鞏固藩屏依險設周防士馬比雲屯月明野水通蒲海風接巖疆控玉門盛世安攘𢎞締造金湯千載紀皇恩登沙州城樓出郊看千佛洞墩臺二首燉煌地拓極西邊縱步髙城望渺然逺磧荒煙連異域廢垣古塔建何年流沙環疊千峰岫黨水遙通萬頃田婦子藝藝編户盛秋成麥熟樂堯天塞垣清暇栁營開為覓邊郊策騎來峯指三危尋徑僻洞藏千佛半塵堆穿幽忽入溪岩路望逺同登斥候臺萬里秋澄天宇濶陽關絶域任徘徊惠回堡地起邊關第一程燉煌從此賦西征荒原猶指番回塜化宇今屯甲騎營山擁曉煙村店集風吹沙徑野泉清升平萬里遊蹤逺車馬轔轔過堡城黃燉堡郊原四望盡平疇壁壘新增聳雉樓浩渺河源來黨水嶙峋山色見沙州營開甲帳風清晝戍靖烽煙月照秋五堡邊疆推險隘伊吾北去是咽喉遊千佛洞古郡燉煌逺幽崖佛洞傳建垣新日月訪勝舊山川竇啓琳宫現沙凝法象懸神功勞劈劃匠手巧雕鐫排列雲迢遞嵌空境接連金身騰百丈碧影肅諸天貝葉雙林展維摩一榻眠威尊龍象伏慧照寶珠懸大地形容盛靈光繪畫宣莊嚴揮四壁妙善寫重巔門擁層層塔岩盤朵朵蓮恆河難指數法界詎云千側立衣冠偉分行劍佩聨炫竒疑異域締造自何年宗子唐家計西涼李氏延但誇祇樹景不惜水衡錢霜雪時頻易兵戈代屢遷汗塵迷淨土戰血染流泉閴寂慿誰顧摧頽實可憐兹逢清塞暇間眺化城邊色相嗟多毁丹青訝尚鮮問禪無釋侣稽首冷香煙字落殘碑在叢深蔓草纒徘徊荒剎外懷往意悠然姚培和沙州六月連得時雨聖主精誠格萬方如膏時雨遍燉煌點來沙磧絲絲密聲入渠流脈脈長一帶瓜綿齊引蔓千塍麥秀盡舒芒由來涓滴皆天賜拜手巖城切頌揚靉靆雲容向晚低楊枝灑盡列邊隄旁聽戍鼓三更濕遙望烽臺一路迷匪懈農官舒勸稼服勤田父罷澆畦城南煙景堪行樂泥滑偏愁礙馬蹄萬夀聖節奉使沙州恭同叩祝紅雲一朵日曈曨聖夀齊天拜舞同渥水隄長聞説澤鳴沙山近效呼嵩投醪挾纊涵濡內鑿井耕田胞與中軍士歡騰農父樂家家頂祝矢愚衷威儀猶是漢唐前一點葵心向日懸蕢缶聲喧諧舜樂土階班肅頌堯年望中紫氣關山滿到處瑤花奎璧連鵷鷺兩行齊拜手恍疑身在五雲邊萬年有道樂鴻鈞陽月暄和大地春葉滿楓林邊景麗香凝玉案瑞煙新由來北斗尊皇極恰遇西方祝聖人聞得崑崙縹眇處祠開王母頌聲頻南極呈祥紫殿髙曽趨鳳掖慶殊遭玉盤廣賚安期棗綵袖榮攜方朔桃禮洽百神司祝嘏疇陳五福羡詞曹于今塞上頻追憶似海君恩豈易叨王全臣漢渠之下舊有三暗洞泄各渠餘水嵗久寖廢余重為修葺且易以石夏秋之交竟免泛濫詩以紀之河流分㵼漢唐中並拖白練如雙虹唐來西繞蘭山麓漢延綿亘唐之東中間萬頃紛挹注餘波總向湖中聚羣湖宛轉東歸河漢延堤髙截去路古人立法妙有餘地底鑽穴透漢渠就下能消羣湖水倣佛滄溟泄尾閭慨自河遷唐口咽蓄之烏有焉用泄雖然古洞迹猶存一任泥沙久埋滅大清渠開水洋洋迎水堤成勢更狂田間水滿翻為虐到處泛溢嗟懷襄尋得古洞皆木植支撑渠底苦無力經營石甃洞惟三奧若蛟宫不可測石梁潛架邃且幽堅牢穩載漢渠流任他灌溉盈溝澮暗把狂瀾細細收老農欣欣喜相告年來鳴蛙産釡竈三洞賴我使君修夏不旱兮秋不潦曾聞河源來自天一曲伏流路幾千可是天吳聊小試暫移鰌穴到銀川紛紛行客頻過此驚看渠底水瀰瀰道是策馬歷東陽一𣲖宫商清人耳使君政暇可郊行洞側清涼好駐旌為聽澶湉河中去盡是三渠擊壤聲豫也聞之深愧謝功以幸成勞奬借開渠修洞踵先賢但願嵗嵗宜禾稼題大清渠落成二首規模直與漢唐同甃石浮杠落彩虹逺近縈紆分上下縱橫挹注任西東惟知順水行無事敢謂開渠輒有功最是亭成臨孔道喜聞過客話年豐順導洪河入地中漢唐得助益浺瀜羣氓久失千秋利此日新添一溉功沙際隄環春草緑橋頭額映晚霞紅間來徙倚虛亭下翻愛旁流筧向東甘肅通志卷四十九
