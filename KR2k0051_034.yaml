body:
  text: 甘肅通志卷三十四人物兩河郡邑山川雄峻土厚水深間氣所鍾篤生英俊代不乏人載在史册按籍可稽父老傳聞輿論可採或政績文章或武功事業其所建樹雖有不同皆為人傑本朝名臣接武節著封疆勳銘鐘鼎人才之盛度越前代尤當紀載流芳奕䙫志人物臨洮府漢辛慶忌字子真狄道人酒泉太守武賢子少以父任為右校丞隨長羅侯常惠屯田烏孫赤谷城與歙侯戰陷陳卻敵惠奏其功拜為侍郎遷校尉將吏士屯焉耆國還為謁者尚未知名元帝初補金城長史舉茂才遷郎中車騎將軍朝廷多重之者遷張掖太守徙酒泉所在著名成帝初徵為光祿大夫遷左曹中郎將至執金吾大將軍王鳳薦其通於兵事明略威重任國柱石乃復徵為光祿大夫執金吾後坐小法左遷雲中太守丞相司直何武上封事謂慶忌宜在爪牙官以備不虞尋拜為左將軍時朱雲欲請上方斬馬劍斬佞臣張禹頭上怒下雲將戮之慶忌叩頭流血爭之得免慶忌居處恭儉食飲被服尤節約為國虎臣遭世承平西域親附敬其威信年老卒官長子通為護羌校尉中子遵函谷關都尉少子茂水衡都尉出為郡守皆有將帥之風宗族支屬至二千石者十餘人魏辛毗字佐治其先自隴西徙陽翟毗隨兄評從袁紹魏王曹操為司空辟毗毗不得已應命表毗為議郎遣毗平下辨還為丞相長史文帝踐祚遷侍中帝欲徙冀州十萬戶實河南毗諫帝不答起入內毗引帝裾帝奮衣不還良久乃出曰佐治卿何持我太急耶乃徙其半帝以射雉為樂毗諷之亦為希出帝大舉征吳毗止之帝不從卒無功劉放孫資用事而毗不與往來子敞諫之毗正色曰吾之立身自有本末孫劉不過令我不作三公而已焉有大丈夫欲為公而毁其高節者耶終衛尉諡肅侯晉李含字世容隴西狄道人舉孝亷㑹州刺史郭奕素聞其賢擢含為别駕遂處羣僚之右尋轉秦國郎中令領始平中正後河間王顒表為征西司馬甚見信任終河南尹辛謐字叔重狄道人少有志尚博學善屬文性恬靜不妄交遊召拜太子舍人諸王文學纍徵不起永嘉末以謐兼散騎常侍撫慰關中謐以洛陽將敗故應之及長安陷沒劉石辟命並不應處喪亂之中頺然高邁視榮利蔑如也及冉閔僭號復備禮徵謐謐遺閔書勸其歸身本朝因不食而卒辛勉字伯力狄道人父洪左衛將軍勉博學有貞固之操懷帝纍遷為侍中及洛陽陷隨帝至平陽劉聰欲署為光祿大夫勉固辭不受聰遣其侍郎喬度齎藥酒逼之勉曰大丈夫豈以數年之命而虧高節事二姓哉引藥將飲度遽止之曰相試耳君真高士也嘆息而去聰嘉其節為築室於平陽西山月致酒米勉亦辭而不受年八十卒李皓字大業狄道人性沉毅寬和美器度通涉經史習知孫吳兵法後為燉煌太守及段業僭稱王六郡推皓為大都督大將軍凉公領秦凉二州牧遣使間行奉表詣闕國人諡曰武昭王魏辛紹先狄道人父淵以義烈見稱西土紹先性明敏有識量才勇丁父憂三年口不甘味頭不櫛沐髮遂落盡自中書博士轉神部令遷下邳太守為政不尚苛察舉其大綱惟教人為畜牧禦敵之備及宋將蕭順之等來侵畏紹先不歷郡境而去卒贈并州刺史諡曰惠辛子馥字元頴平原相穆之子早有學行纍遷平原相父子並為此郡吏民懷安之元皓入洛子馥不從莊帝反正封三門縣男天平中除太尉府司馬長白山連接三齊瑕丘數州之界多有盜賊子馥受使檢覆因辨山谷要害宜立鎮戍之所又諸州豪右在山鼓鑄奸黨多依之又得密造兵仗上表請罷諸冶朝廷善而從之後卒於清河太守辛琛字僧貴狄道人雄之族祖祖敬宗父樹寶並代郡太守琛少孤曾過友人見其父母無恙垂涕久之後魏孝文時釋褐奉朝請滎陽郡丞太守元麗性頗使酒琛每諫之麗後醉輒令閉閣曰勿使丞入也孝文南征麗從輿駕詔琛曰委卿郡事如太守也景明中為揚州征南府長史刺史李崇多事産業琛每諍折後加龍驤將軍南梁太守崇因置酒謂琛曰長史後必為刺史但不知得上佐何如人耳琛對曰若萬一叨忝得一方正長史朝夕聞過是所願也崇有慚色琛寬雅有度量涉獵經史喜怒不形於色當官奉法所在有稱卒於官辛術字懷哲狄道人南梁太守琛之子為清河太守政有能名纍遷散騎常侍魏武定六年侯景叛術破之擒蕭明遷淮南經略使天保元年侯景徴江西租術渡淮燒其稻數百萬石還鎮下邳人隨北渡淮者三千餘家又奉文宣敕凡刺史太守鎮將犯法者術皆案奏殺之有犯法者朝廷以其奴婢百口及資財盡賜術三辭不見許乃送詣所司不復以聞及王僧辨破侯景術招攜安撫城鎮相繼欵附於是移鎮廣陵獲傳國璽送鄴尋領太常卿議定律令遷吏部尚書銓衡黜陟咸宜甚為當時稱譽術清儉寡欲勤於所職臨軍以嚴牧民以惠少愛文史晚更勤學雖在戎旅手不釋卷辛雄字世賓狄道人有孝性居父憂哀毁異形殆不可識亷謹雅素不妄交喜怒不形於色清河王懌為司空辟為户曹參軍懌遷司徒仍授户曹參軍並當繁劇諍訟填委雄用心平直加以嫻明政事經其斷割莫不悅服懌重之詔令門下尚書廷尉議獄雄議曰春秋之義不幸而失寧僭不濫僭則失罪人濫乃害善人詔從雄議於是公能之名甚盛又為祿養論書奏肅宗納之以雄長於世務更除司空長史詔雄為行臺左丞與臨淮王彧擊賊平之在軍上疏請明賞罰除輔國將軍尚書右丞遷光祿大夫莊帝除度支尚書兼侍中關西慰勞使將發請事五條帝從之李琰之字景珍狄道人少有盛名彭城王協辟為行臺參軍纍遷國子祭酒孝莊初討葛榮以琰之兼御史中尉為北道軍司馬歷車騎將軍雍州刺史琰之素機警善談經史百家無所不覽朝廷疑事多所訪質當時人士咸宗之李延實狄道人性溫良襲父爵為清泉縣侯莊帝以元舅之尊超授侍中太保封濮陽郡王延實以太保犯祖諱又以王爵非庶姓所宜抗表固辭徙封濮陽郡公諡孝懿梁覽字景睿金城人其先出自安定太祖時祖皓為尚書封南凉公父釗為河華二州刺史封新陽伯至覽家世豪富資纍千金魏明帝孝昌初秦州莫折念生胡琛等反散財召募有三千人鎮河州從大軍平之歷凉河二州刺史封安德縣侯覽既為本州刺史盛修甲仗人馬精鋭吐谷渾憚不敢出曰梁公在未可行也永安中詔䇿授世為河州刺史封郡公趙柔字元順金城人少以德行才學知名河右沮渠牧犍時為金部郎太武平凉州內徙京師歷著作郎河內太守甚有信惠宗欽字景若金城人少好學有儒者風仕沮渠䝉遜為中書郎世子洗馬上東宫侍臣針太武平凉州入魏賜爵卧樹男拜著作郎高允甚相褒美有䝉遜記十卷念賢字蓋盧金城枹罕人美容質頗涉經史少時有善相者過諸生競詣之賢笑曰男兒死生富貴皆前定何用相為居父喪哀毁以孝稱後以軍功封屯留縣伯從爾朱榮入洛兼尚書右僕射大統中官至都督秦河二州刺史子華性和厚有長者風官至開府儀同三司河州刺史周辛慶之字餘慶狄道人父顯宗馮翊郡守慶之少以文學徵詣洛陽對䇿第一除祕書郎魏孝莊時楊津啓慶之為行臺左丞後兼鹽池都將東魏攻陷正平遂欲經略鹽池以慶之有備乃引軍退河橋之役慶之獨因鹽池抗拒强敵時稱其勇纍官至開府儀同三司位遇雖隆而率性儉素志量寬和有儒者風度為當時所重又以其經明行修令教授諸生拜祕書監卒於官辛昻字進君慶之族子為龍州刺史威惠咸著成都風俗舛雜昻登文翁講堂謂諸生曰子孝臣忠師嚴友信立身之要諸生感悟謂父老曰辛君教誡不可違也於是井邑肅然從化遷梓潼郡守時益州多盜昻撫綏荒梗頗得寧靜天和初陸騰討信州蠻詔昻運糧饋之民無怨言巴州萬榮叛圍郡城昻倍道兼行出其不意直趨賊壘賊望風瓦解朝廷嘉其功特進為驃騎將軍王傑本名文達金城人善騎射有壯志魏孝武時起家都督太祖奇其才擢揚烈將軍復潼關破沙苑爭河橋戰邙山皆以勇敢聞親待日隆歷遷涇州總管少從軍旅雖不習吏事所歷州郡咸以忠恕為心百姓慕焉卒諡曰威隋李禮成字孝諧狄道人凉王皓六世孫年七嵗與姑子滎陽鄭皓隨魏武入關皓母每謂所親曰此兒平生未嘗回顧當為重器及長沈毅有行檢不妄通賔客大統中遷太子洗馬時貴公子皆競習武事被服有軍容禮成善騎射而從容儒服不失素望後以軍功拜車騎大將軍時朝廷有所徵發禮成度蠻必為亂上表固諫周武帝從之又從帝伐齊力戰擊退之拜北徐州刺史未幾徵為民部中大夫隋高祖受禪進封絳郡公寧州刺史辛德源字孝基狄道人子馥子沈靜好學美儀容齊僕射楊遵彥尚書辛術並虛襟禮敬同舉薦之中書劉迪又上表薦除員外散騎常侍及齊亡周尉遲迥起以為中郎亡去隱林慮山著幽居賦以自寄後祕書監牛𢎞以德源才學顯著奏與著作郎王劭同修國史蜀王秀奏以為掾轉咨議參軍有集二十卷又撰政訓內訓各二十卷辛公義狄道人父季慶青州刺史公義早孤母氏親授書傳周天和中充太學生武帝召入御前令與大儒講論數被嗟異從平齊纍遷掌治上士開皇元年除主客侍郎遷并州刺史下車先决斷獄囚嘗宿㕔事曰刺史無德令百姓繫於囹圄而能自安乎罪人聞之咸自欵服後有訟者多兩讓而止仁夀初充揚州道黜陟大使官寮犯法無所縱舍煬帝除內史侍郎司𨽻大夫辛彥之狄道人少孤好學博涉經史周文帝引為禮曹修定儀注拜中書侍郎封五原郡公宣帝時拜少宗伯及高祖受禪除太常少卿與牛𢎞撰新禮高祖嘗命與碩儒沈重論議重曰辛君所謂金城湯池無可攻之勢帝大悅拜隨州刺史在州惟貢祭物帝善之曰人安可無學彥之所貢稽古之力也遷潞州卒官諡曰宣撰墳典六官祝文禮要新禮五經異義共六部並行於世唐李襲譽字茂實襲志弟也高祖已定長安召授太府少卿伐王世充拜潞州總管擢江南巡察大使揚州俗喜商賈不事農襲譽為引雷陂水築句城塘溉田八百頃以盡地利民多歸本業召為太府卿居家勤儉厚於宗族祿廩隨多少散之以餘資寫書罷揚州載書數車嘗謂子孫曰吾性不喜財遂至屢乏然負京有賜田十頃能耕之足以食河內千樹桑事之可以衣江都書力讀可進求宦吾歿後能勤此無資於人矣子元為桂州都督守桂二十八年政尚清省南荒便之渾瑊本鐵勒九姓之渾部也世為臯蘭都督父釋之有才武從朔方軍積戰功纍遷寧朔郡王廣德中與吐蕃戰歿瑊年十一善騎射隨釋之防秋朔方節度使張齊丘戲曰與乳媼俱來耶是嵗即立功後二年從破賀魯部勇常冠三軍祿山反從李光弼定河北及從郭子儀復西京討安慶緒平史朝義大小數十戰功最從子儀擊吐蕃破之積功官至檢校尚書左僕射平章事帝狩奉天瑊率家人子弟以從奉天圍解分道要擊朱泚與李晟收復京城泚平加侍中封咸寧郡王卒贈太師諡忠武瑊天性忠謹功高而志益下世方之金日磾云渾鎬瑊子謙謹喜交士大夫歷鄧曹二州刺史有政聲元和中延州沙陀部苦邊吏貪殘震擾不安李絳建言宜選才識稱者為刺史任鎬延州㑹討王承宗義武節度使任迪簡病不能軍以鎬將家可用乃遷檢校右散騎常侍義武軍節度副使俄代迪簡為使治兵頗有法然短於韜略不持重貶循州刺史卒贈工部尚書弟鐬以䕃補諸衛參軍遷殿中監開成中宰相言鐬嘗治郡有績授夀州刺史終諸衛大將軍辛雲京蘭州金城人世為將家有膽略以擒生斬馘常冠三軍遷太常卿史思明屯相州雲京將鋭兵襲滏陽追破其衆加代州都督太原軍亂帝以雲京沈毅授太原尹進封金城郡王雲京治謹於法故軍中畏而信之數年太原大治加檢校尚書平章事尋加左僕射卒贈太尉諡忠獻宋王淵字幾道熙州人善騎射應募擊夏國屢有戰功纍遷熙河蘭湟路部將權知鞏州寧逺寨西羌入犯淵大破之宣和中劉延慶討方臘以淵為先鋒賊勢張甚淵逆擊平之授閣門宣贊舍人高宗即位以淵為御營司統制帝如揚州時羣盜蜂起以淵為制置使平杭賊所向皆捷拜僉書樞密院事纍加少保諡襄愍元馬正卿名烏爾古納臨洮人父慶祥死節正卿好學負氣㑹國兵破汴北見憲宗辭容端謹帝命贊斷事官事以燕故城為治所正卿以治道自任政事修舉嵗壬子料民丁於中原凡業儒者試通一經即不同編户著為令甲儒人免丁始此常建言立常平倉舉海內賢士楊春卿張孝純輩分布諸郡號稱得人後世祖南征從行至汴令專饋餉運濟南鹽百萬斤以給公私之用所過州郡商農安業軍民不擾世祖親征額哷布格正卿出私財市馬五百以助軍帝厚贍其家拜禮部尚書諡忠懿馬祖常狄道人正卿曽孫延祐初廷試第二授翰林拜御史以直言忤上官意去起為翰林侍講官御史中丞立朝多所建明為文自成一家言文帝謂中原碩儒惟祖常云諡文貞趙昌本烏斯藏多族氏始附宋賜姓趙氏世居臨洮父巴莽富甲諸族昌貌甚偉有力兼人金貞祐中以軍功至熙河節度使金亡保蓮花山以其衆來歸皇子庫騰之鎮西土也承制以昌為疊州安撫使時兵興城無居民昌招逃亡立城壘課耕桑以安輯之百姓賴焉趙汝楫一名重喜潘子始給侍皇子庫騰為親衛癸丑從世祖征哈喇章數有功中統元年琿塔罕反從總帥汪良臣引兵至博索河納果爾和斯地逆戰以功授征行元帥四年從討呼圖克德濟沙卜珠台等克之使襲父職為元帥入覲賜金虎符為臨洮府達嚕噶齊在郡勸農興學省刑敦教以善治聞請老不許詔其長子官綽斯戩襲為達嚕噶齊升汝楫鞏昌二十四處宣慰使卒諡桓襄祁望芳西域人居狄道以巨家擢守臨洮偉績著於邊陲卒封本府城隍見碑記祁安狄道人元賜金虎符臨洮府尹嵗久以亷勤見稱超授中大夫同知鞏昌便宜都總帥府事歷升大司徒祁恭噶多爾濟丹子襲任臨洮知府兼宣政院都事至正十二年以王事沒於興元烏瑪喇西域人元授河南光州達嚕噶齊威德兼濟任滿光人立去思碑馬祖常撰文後升授亞中大夫僉通政院事授通議大夫浙江湖州府總管明王道亨狄道人舉建文元年鄉試弟道隆舉永樂九年鄉試忠孝並著時稱之為王氏雙鳳道亨任刑部主事卒於官道隆知內江縣政績卓異居民畏而服之何鎖南河州人善弓馬元末為吐蕃等處宣慰使司洪武三年率衆歸附升河州衛指揮同知世襲居邊數年烽燧不驚邊人懷之何賢字彥哲狄道人永樂中進士任中書舍人歷升詹事府少詹太常寺少卿資稟頴異學問博洽精傳譯工詞翰居館閣二十年不遷德行卓冠時流卒贈禮部右侍郎諡文敏所著有五經集解續古樂章東麓文集趙安狄道人永樂元年除臨洮百户使西域從北征立功進都指揮同知宣德二年松潘番叛充左參將從總兵陳懷討平之進都督僉事四年使烏斯藏明年復以左參將從史昭討曲先斬獲多九年中官宋成等使烏斯藏命安率兵千五百人送之巴喇瑪江尋與侍郎徐晞出塞討阿台敗之鎮番正統元年進都督同知充右副總兵協任禮鎮甘肅明年冬與王驥任禮蔣貴分道進師安至刁力溝縶酋乃顔忽及奄克台等封㑹川伯食祿千石安勇敢有將略與貴禮並稱西邊良將九年卒子英為指揮使立功進都督同知石執中字惟一蘭州人長身美髯舉永樂三年鄉試任刑部主事升郎中讞獄平允擢山東右布政使直而不華勤而能慎轉浙江左布政致仕平生亷介不阿卓有定守宣帝常記其姓名於御屏賜誥褒之王伯敬蘭州人舉永樂九年鄉試任户科給事中鄉人有以事干之者遺以文綺數匹固卻不受鄉人云縱不受第一視見意曰吾窮儒一見即愛之矣不如不見之為愈也鄉人愧服而去聞者以為名言王佐字良輔河州人世業儒常與解縉遊處家一遵朱文公家禮鄉人化之王竑字公度號戅菴河州衛人正統四年進士授户科給事中豪邁負氣節正色敢言英宗北狩郕王攝朝羣臣劾王振誤國王未有㫖百官皆哭伏地不起請族振錦衣指揮馬順振黨也叱百官令退竑怒奮臂起捽順髮倒地與衆共擊之立斃王起入宫竑率羣臣隨之王令中官金英問所欲言曰內官毛貴王長隨皆振黨請置於法遂出二人衆又捶殺之是時竑名震天下㑹也先入犯命竑為僉都御史督兵守禦冦退鎮守居庸關簡士馬繕厄塞劾將帥不職者壁壘一新景泰初總督漕運兼巡撫江北徐淮諸郡大水道殣相望山東河南流移民載道竑不待奏大發廣運倉糧賑濟前後全活無算因自劾專擅罪帝得疏喜曰真賢都御史也進左副都御史竑因言謹天戒當以進君子退小人為先又陳致治保邦二十事其言多指斥權貴天順初左遷浙江參政尋除名編管江夏後英宗於宫中見竑疏有正倫理篤恩義語因感悟命送還河州後以副都御史起理漕運至徐淮淮人迎拜數百里不絶㑹旱漕河涸竑禱祀大雨舟楫通行憲宗即位召為兵部尚書竑奏敕邊將各陳戰守方略簡練京兵勸屯政復武學時兩廣寇未平陜西寇在河套四川趙鐸作亂江西湖廣猺獞入境竑居中調度悉合事機薦都御史韓雍為總督有成功既而竑又請復京營軍士舊額革除諸將私役宿弊及薦修撰嶽正都給事中張寧上不報竑遂上章乞休以歸日惟課耕讀不問他事改號其菴曰休𢎞治初卒年七十五遣官諭祭葬正德中贈太子少保諡莊毅淮人立祠祀之黃諫字廷臣蘭州人德性謙和博學多藝工𨽻篆行楷登正統七年進士歷官侍講學士兼尚寶卿使安南往還議定迎詔坐次等儀及卻贐等書悉按經史風節凜然交趾人稱之常過河南澠池縣以名儒月川曹正夫沒葬霍州深以為恨出金屬知縣歸葬澠池升本院學士後謫廣州府判從學者甚衆廣人立祠祀之所著有詩經集解使南稿從古正文蘭坡集行世聊讓字公遜蘭州人少孤貧苦學景泰五年進士任南昌知縣以不附權貴被劾罷歸讓精於史學雖老而貧風采凛然可畏平生溫恭正直為後學師表滕佐字良輔號栗庵蘭州人少清介刻志於學景泰五年進士授監察御史肅振紀綱升山西按察司副使轉雲南副使四川按察司所至公亷有威不避權要以剛直忤物改直𨽻河間府知府有惠政及人卒於官朱紳字大用河州人幼聰敏從王竑學景泰五年進士授監察御史風采凛然後勘問郡王事協輿情景帝書其名於屏升浙江按察司副使巡督海道亷明公愛逺人輸誠興學校築海隄立義塜賑貧施藥重名節有靖海功尋升貴州左布政使致仕歸汪巨字志方蘭州人舉景泰元年鄉試任北直柏鄉知縣撫字有方持已亷介丁母憂歸邑人立去思碑服闋邑民保奏復留任柏鄉知縣張鐸字孟宣蘭州人舉景泰七年鄉試任山西嵐縣訓導尋為韓府教授學問該博尤長詩詞老年步履艱難王命扶掖上殿講讀士子有不循教者以王命撻之不少貸王感之後以女妻其次子趙英字廷傑狄道人㑹川伯安子幼武勇景泰初任臨洮衛指揮使尋以征實喇浩沁地擒僞祁王鎖南功升陜西都司指揮僉事協守凉州復於鎮番抹山斬獲羌首千餘級升右軍都督府同知充總兵鎮守凉州段堅字可久蘭州人讀書知正學志希聖賢薛瑄門人登景泰五年進士授山東福山知縣以德化民刋布小學令邑人講誦民俗胥化升萊州知府治如初萊人大化服闋補南陽病近世以利祿為學乃倡明周程張朱之學集郡屬諸生親授講說士習丕變又取屬治童䝉創志學書院教之刋小學孝經論語崇正辨文公家禮教民學孝俗言授之講習建節義祠祀諸貞烈日呼諸生以道德性命之言互相辨說退食至育英所考校朔望詣節義祠聚父老諭以正俗大義有處子未婚壻亡自經殉節者率僚友師生素服往弔擇地合葬奏表其閭郡人愛戴如父母致政歸民攀援不忍舍立木主於志學書院祀之有容思集柏軒語録行世子炅翰林檢討杜榮字景華蘭州人舉天順三年鄉試任朔州知州適嵗荒加意賑恤蠲徭役募開墾招流徙地方稍蘇即興學校崇風化公亷明恕民懷吏畏致政去州民攀泣走餞郡城為之一空居家二十餘年自處甚約足跡未嘗至公門自號樂閒老人吳字彥和蘭州人舉天順六年鄉試歷任河南閿鄉山東登州陜西隆德學訓導性耿介與人寡合鄉人有仕至御史者人皆稱賀獨遺書云當今言路久塞吾方為子憂之言論切直人皆敬之文志正字正夫蘭州人天順元年進士任行人建言以御史巡茶民皆便之歷升户部廣東司郎中明敏練達綽有能譽創修蘭志唐祐字良弼蘭州人舉天順三年鄉試任山東齊東知縣盡心民事一清如水取法前令姚顯微之善政士民感服杜宣字𢎞化蘭州人舉天順三年鄉試任山西汾州學正學問該博善詩文造士有方其所識拔後多至貴顯羅睿字文哲蘭州人成化二年進士授河南西華知縣升南京大理寺評事山東按察司僉事歷官以清白自持憲度嚴整吏民畏服周敏臨洮衛人舉成化十九年鄉試四川仁夀知縣治民事神處已待物一誠不欺居官清約如寒士鄉邦以此重之曹英字文華臨洮衛人成化進士任監察御史巡按四川監臨率稱得人嵗大荒有趙鐸者嘯聚為盜英摘首惡置大辟餘赦之悉令解散歸業以言事忤上㫖左遷湖廣邵陽知縣二年引疾致仕所著有遣興集恆齊實録默翁集三友主人傳姚誠字通夫蘭州人舉成化元年鄉試任山西聞喜知縣邑大饑即省徭蠲賦以賑飢民於鹽商過縣者每引勸輸粟一升以備賑後遂為例引縣東南泉水灌民田若干頃任數年興利革弊改任河南新鄭奉公守法不避權貴素喜飲以居官絶口不嘗及歸田日用淡泊如未遇時不事干謁惟以詩書教子孫卒年八十三所著有書經義休田集邵宗字以道蘭州人成化五年進士任户部主事博通經史才氣優贍詩文不煩繩削而自合矩度所交士大夫無不推服任僖字克敬蘭州人舉成化元年鄉試任直𨽻贊皇知縣公勤有為興利除害綽有治聲凡有所為事集而人不擾邑民頌之其敬兄睦族尤可稱述孫懋字行勉蘭州人舉成化元年鄉試授河南衛輝府通判蒞政公勤周知民隱綽有賢聲考績居上賜敕褒嘉升四川劍州知州在任數年境內乂安吏民稱頌趙英字儲秀蘭州人成童日記數千言舉成化八年進士授河南宜陽知縣升監察御史巡按山東改知保定府丁父憂服闋士民詣京奏留尋升山西參政仍管知府事英博通五經有才略居官所至有聲多遺愛所著有斐然稿防邊策修河類稿陳祥字吉夫蘭州人性孤介勤學成化辛卯鄉試第一成化十一年進士授刑部主事轉員外郎山西按察司僉事四川按察使歷任三十餘年檢身持法久而不渝所至奸貪屏跡祥端慎不妄交人致仕杜門謝客惟以詩書自娛有考庵集藏於家耿瑄字習珍蘭州人舉成化十六年鄉試授河南汲縣知縣慎於操修敏於幹理嘗被誣免既白改知河隂縣益盡心民事加意學校以逆瑾亂政罷歸瑾誅復取知山東青城縣是時羣盜起破郡邑青城獨全後改知淄川卒於官瑄素守亷介歷宰四縣囊無餘資黎獻字舜臣蘭州人刻苦勵行言動不茍嘗署學事教規克舉若師儒然後授陜州學正師範尊嚴誨人不倦諸生心悅誠服勤學慎行至老不衰鄉評推重陳琮河州衛指揮僉事成化戊子領軍攻石城奮勇當先為流矢所中死之周鳳狄道人登成化進士任兵部職方司主事歷升江南太平知府福建鹽運使浙江右參政鳳治郡寬恕亷明詢民瘼恭祀典衣食不異寒素任滿郡民遮道擁留泣不忍别劉源字大本狄道人成化舉人歷知永平府張虎等作亂源斬縛渠魁脅從盡釋所至亷介公勤造士愛民敦風化尚實行人不敢干以私調開封府軍民奏留加三品服俸卒於官源博通五經工詩文善臨池所著有翠屏集梁翰字文苑臨洮人進士任翰林檢討升授崇府左長史性純粹端靜言笑不茍詩文醇實典雅退食閉門端坐讀書鼓琴翛然自得收録名士最多輔導諸宗藩多所補益有詩文雜著若干卷高景字必大臨洮人舉人授嵩縣令興學造士約已愛民時嵩境有二狼噬人景詣嶽神䖍禱越一日二狼果至縣大吼而死尋調懷仁值艱歸復補彰明賢聲茂著未幾致仕行李蕭然其後三邑俱有召杜之思茍鑑字克明狄道人嵗貢任山東霑化簿時境內大饑民望賑甚急鑑請命當途弗許民幾變鑑倣汲黯故事竟開倉賑給全活甚衆人為鑑危之既而主計者亦察其賢云彭澤字濟物蘭州人𢎞治三年進士官刑部主事出守徽州府父喪歸正德初起知真定府閹宦數撓政治澤嘆曰我豈附人者哉具一棺於堂後曰倘有不測即附諸棺歷按察使總制湖廣四川澤體幹修偉腰帶十二圍平居寡言笑大音聲與人語如叱咤有文武才略霸州賊劉六劉七流劫入河南命澤同咸寧侯仇鉞帥兵討之始至大陳軍容擐甲召諸將校責以畏縮當死諸將惶恐伏罪請自效良久乃釋遂鼓行薄賊數十戰皆捷殺賊萬計四月賊盡平進右都御史尋總督川陜諸軍討蜀賊藍廷瑞鄢本恕平之進左都御史太子太保㑹土魯番據哈密執忠順王劫印遣大臣經略澤至甘州土魯番方冦赤斤苦峪遣使索金幣澤以番人可利啖遣使以幣二千銀酒鎗一賂之令還城印未得報輒奏事平乞骸骨召還院初兵部缺尚書廷推澤而王瓊得之且隂阻澤言官多劾瓊由是有隙澤又使酒凌瓊詈錢寧寧大怒澤乞歸瓊劾澤妄增金幣遺書議和為辱國遂斥澤為民嘉靖初起兵部尚書澤核功罪杜干請兵政一新又請敕九邊築牆濬濠修墩臺飭屯堡為經久計內地守臣練卒伍立保甲懲匿盜不舉者撫西南諸苗申海禁汰京軍老弱帝咸嘉納又請罷鎮守諸中官在部多所執持言者交劾纍疏乞休加少保乘傳歸錦衣百户王邦奇上書言哈密失國由澤賂求和所致澤復奪官為民家居卒尚書唐龍請復官加恤不從隆慶初復官諡襄毅段炅號河濱蘭州人南陽知府堅之子𢎞治十八年進士授翰林院檢討與王九思康海並以文學鳴世稱關中三老年八十卒所著有河濱集高良弼字夢說臨洮衛人𢎞治十二年進士官御史巡京倉查盤遼東邊儲首劾劉瑾苗逵不法數事調掌貴州道題設三邊宣大總制及京營兵十萬恃以有備巡按蘇松振綱紀慎舉錯風采凜凜卒於官時年三十七平生耿介與人寡合問學質實詩文雅健所著有西岩稿奏議若干卷田荆號西泉蘭州人少聰慧正德六年進士選庶吉士兵科給事中時京都嵗荒疏奏發太倉粟五千賑濟升四川按察司僉事以贖鍰造木桶數萬人笑為迂後遭水災緣木桶活者數萬人以不附權貴被誣罷歸長於詩學生平溫恭剛正後學咸師之馬應龍號雪峯河州人幼頴敏讀書一覽成誦登正德六年進士授户部主事歷升霸州兵備副使持亷秉正權勢不敢干以私督餉燕汴及總儲遼陽所至卓異轉四川按察使平鴇賊有功又治兵渤海劇盜屏跡士民立祠祀之為人操履不茍善屬文及卒尚書彭澤撰碑文極稱其忠清雅操云殷承叙蘭州人少負奇志正德九年進士任南陽府推官訓飭嚴明為政有體升刑部主事㑹議大禮抗疏極諫廷杖死隆慶初贈光祿寺少卿劉漳字永濟號南泉蘭州人正德十二年進士授户部主事歷升河南開封知府毁淫祠重民義斷疑獄若神明比入覲治為天下第一升四川按察使山東左布政使所至貪墨望風去升副都御史巡撫遼東遼饑發倉賑粥全活數萬人復著邊功遼人立祠祀之陳範字道宗蘭州人舉正德五年鄉試授靜海令靜海多貂璫嘗奪民田不入稅範下令許自新一時豪猾悉還民田急公賦改郟縣知縣尋升陜州知州所至有治聲段續號東川蘭州人嘉靖二年進士性誠篤精明有公輔器初以才堪風憲授雲南道御史㑹議大禮被廷杖復議宰臣阿逢謫河南郾城丞尋升把縣知縣均田革弊卓有政聲升廬州府同知南京兵部郎中四川僉事湖廣參議督工修顯陵調停節省巨萬計升密雲兵備陵工告成加三品俸致仕總督賈應春特薦云孝友忠信素重鄉評正直亷平允孚士論郡人以為實録未及起用卒張萬紀字舜鄉狄道人嘉靖二十六年進士授行人選吏科給事中劾僉事尹耕帝可其奏謫耕嚴嵩銜之尋升禮科右給事中上建醮西苑萬紀執弗進香被廷杖嚴嵩欲殺楊繼盛萬紀抗疏救遂出為廬州知府抵郡雪某指揮寃察胥吏抵換庫銀適以星變考察奪職歸撫按科道凡九薦以親老竟不復起所著有講學語録超然山人集張文泰渭源人嘉靖進士少頴悟善詩文學行端方言切世務所著有五竹遺稿劉朝麒字仁甫臨洮衛人舉嘉靖十三年鄉試授真定府通判敷政寬平署篆趙州富民王相讐其兄密使傭火兄屋傭弗從相懼謀泄縱火殺傭家七人以滅口傭婦翁白寃亦被謀死相以賂啖朝麒弗動更援有勢者以無證為詞朝麒不允竟置於法升知絳州築汾堤絳有靈丘藩招納無賴强糴為民害朝麒正其罪再丞德安值楚大饑麒開廩施賑全活甚衆父亡歸復補大同同知籌畫邊務墾荒田數千頃折獄清戎釐奸剔蠧賜綸音褒嘉至再擢口北僉事道謹敕憲度拮据兵食一郡賴之尋引疾歸楊啓充字子大狄道人少頴敏過目成誦舉嘉靖十三年鄉試任五臺令時世宗建三殿採木於邑充募民伐山得木時亢旱水竭艱運充禱於天是夕雨大霈木盡浮出尋知朔州㑹俺酋大入雲中充內捍郡邑外輸軍餉卒解右衛之困遷户部郎是時京師北急邊南急倭司農金錢不足充促漕挽攝𣙜㑹煮海之利以實廩庾後督餉榆林竟以侃直忤當路注年老致政歸時年五十二宦橐蕭然無異諸生時葛廷璋字朝憲蘭州人嘉靖十七年進士授行人選户科給事中歷鳳陽知府嵗祲盜起衆議撲滅廷璋曰此良民也奪於飢寒耳乃懸榜境內曲示禍福盜悉散隨發粟賑貸多所全活贖還民間散鬻子女三載治行稱最帑庫羡積數多一無所染升江西按察副使駐南昌省㑹簿牒填委廷璋剖决詳慎平反疑讞民皆愛而畏之既而抱疾猶批駁如素正襟端坐而逝顔鋭字進之蘭州人嵗貢為人剛毅博學通五經善楷書授河南新鄭令風行雷厲剖决如流權貴奸豪皆斂手為時名令陸坤字子厚蘭州人少頴異嘉靖十四年進士授刑部主事歷員外郎中持身清謹執法公平隆平侯縱妾殺人所司欲徇情引避坤按之如法恤刑四川活寃獄百餘人升霸州兵備河湮傷禾坤濬之令有田者服役遂忤權璫誣奏逮繫謫雲南浪穹典史尋起歷升至青州知府賑活青民以萬計升薊州兵備副使以勞瘁卒於任貧無以斂巡撫吳某助賻殯歸所著有如樗子集雲思漫稿等書胡執禮字汝立蘭州人嘉靖三十八年進士初授保寧府推官發姦摘伏知府羅紳歎為老吏不如升刑部主事改吏部拔淹滯起遺佚歷太常卿巡撫應天飭江防廣儲餉更置守令蠲恤㷀黎糾債帥肅軍伍綱目悉舉張居正私憾余懋學江文輝因絲絹鼓譟事移書執禮欲將二人名入疏內執禮不可止擒首惡又生員吳仕期撰欲上居正書讞者羅織其詞坐余江以罪㑹稿於執禮執禮曰殺人媚人吾不為也又特疏王錫爵之孝以刺居正三年升户部侍郎督倉場以居正忌抗疏歸後起户部左侍郎卒劉誼字正卿臨洮衛人博學能文善書法由太學生仕平陸令清慎勤敏發奸摘伏不避權貴尋以憂歸服闋補費邑令賢聲益著平徭賦勸農桑置官莊設義倉鑿惠井以親老乞歸何永達字拙菴河州人幼頴敏博極羣書嘗從三原馬理受業仕清豐縣丞幾五月即辭歸所著春秋井鑑林泉偶得李自發字伯生狄道人舉嘉靖三十四年鄉試任稷山教諭典蜀省文衡甄録多名士升垣曲知縣平獄訟均賦役設處磚料以固城垣雖勞怨弗恤竟以不善事上官挂議歸劉漸字進夫金縣人為陳留教諭性直才敏嚴考課啓迪有方賙恤貧士㑹學廟傾圮請於當道捐俸修之兩署縣篆吏畏民懷鄒應龍號蘭谷蘭州人嘉靖三十五年進士為人剛正敢為授行人選監察御史時嚴嵩竊權亂政言者被傷應龍論劾世蕃謫戍南海嵩罷政世宗嘉其盡忠言事升通政參議大理少卿太常卿㑹大祀太監馮寶預祀事應龍謂刑腐之人不可供祀事尋升都察院左副都御史巡撫雲南劾黔國公沐朝弼橫肆無狀安置南京未幾邊冦竊發劫掠逺近應龍興師平之廷議奪官萬厯癸未復職卒賜祭葬雍焯字暗中狄道人舉嘉靖十六年鄉試幼頴敏有大志任武鄉諭勤考校奬德行賙貧乏擢交城令復除河津令興利寬征捐俸新學建大禹廟葺子夏祠邑俗婚禮重財亟力正之民歌曰高如山明如鏡清如水平如稱擢御史條陳馬政世宗可其奏令刋行清軍河南清影射祥符尹被藩王誣繫獄力白其寃得復官劾嚴氏貴客巡按山東祀段知府之賢論梅提學之奸忤權貴引疾歸所著有中州使餘集麓原文集內臺奏稿刋周禮爾雅孝經書修城作義塜置學田繕祠宇宦蹟鄉評皆稱為名御史云段補字希仲蘭州人參議續子九嵗能詩文性亷行方識高才敏隆慶五年進士授直𨽻曲周知縣政績茂著凡所厝注行以實心調河間升南京户部主事監督糧儲出納惟明奸弊悉除丁母憂不飲酒不茹葷者三年哀毁骨立尋以疾卒王道成蘭州人博學有才萬厯二十九年進士授華陽令平徭賦開水利政聲大著升吏部郎不通一刺自矢惟不愛錢三字足以自效何奮武臨洮衛百户才勇過人方弱冠即有為國效忠之志萬厯中總兵劉綎闢新疆得紅水永泰等地千餘里奮武之戰功居多擢授右軍都督僉事贈榮祿大夫韓謙蘭州人天啓二年進士微時以父歿於揚州萬里扶櫬還葬其母性嚴正謙孝事奉養怡悅敬二叔如其父初仕宿松令革魚蘆諸稅繼調溧陽除漕軍折乾陋規平反死刑二十餘人升户部主事司餉寧逺力除扣尅陋弊給發片刻弗遲將士感頌出知重慶府釐剔不法一清征斂之弊百姓感頌潘光祖字義繩狄道人天啓五年進士歷任吏户二部山西參議道性清介執法不撓巡按某托令曲庇所知光祖不從巡按銜之㑹流賊入境光祖親冒石矢督軍拒戰賊皆敗走巡按以招降之誤劾其縱賊逮問光祖自以無罪恥對獄吏絶食而死晉民悲之立祠祀之皇清郝璧蘭州人順治初由太常博士擢給事中前後章凡數十上有漕運鹽法河道諸議遷安徽按察副使所著有蘭石集二十卷行世嶽鎮邦臨洮衛人幼竒偉當明末流冦充斥散家資招義勇大破逆回米剌印生擒左王三解赴總督軍前順治十二年率族隨軍討平逆賊刁爾吉弟鎮鼇死撫其遺孤一如己子康熙十四年靖逆侯張勇薦拔撫標中軍以克臨洮全鞏昌奪回樂門行營升洮岷副將十八年轉紹興協鎮副將居鄉謙讓和睦宗族教以忠孝遇無告者傾資周濟嶽升龍字見之鎮邦長子值吳逆變隨將軍王進寶復臨洮城既下懇求主帥禁輯部卒還所掠人口時遊擊許進忠潛通賊營受僞劄升龍密訪得實擒斬之歷升遊擊參將扈從北征平定噶爾旦任四川提督征建昌凉山諸番降十萬户升龍事母至孝友愛昆弟封榮祿大夫周化鳳狄道人康熙十四年以吳逆之變從奮威將軍王進寶復天水收嶽州進取辰龍關隨復偏橋興隆等處奪沙子哨攻拔臘茄坡恢復新興普安逆賊蕩平歷升湖廣襄陽總兵官又調雲南永順總兵署理提督印務化鳳在鎮整部伍肅軍實威德並著所向有功軍民悅服王潮海狄道人智勇絶倫康熙十四年吳逆變黃河以東悉為賊有潮海先鋒破敵夜渡黃河克復臨洮蘭州進勦寶雞連雲棧生擒賊將三百餘名進取漢中又進勦廣元縣朝天關蟠龍山梅嶺保寧等處凡經數百戰大破逆賊歷升四川重慶總兵調補貴州威寧鎮率師征勦蠻賊生擒賊首王成龍王騰龍等降其餘衆賊平升貴州提督張憲載狄道人由武生效力甘肅提督張勇標下千總康熙十四年隨征吳逆時賊攻圍寧逺甚急憲載奮力堵截保守城池隨寧夏提督趙良棟進勦四川克復成都解永寧圍恢復寧越越巂等城直抵建昌僞將胡國柱竄入雲南以功擢凉州參將陜西興安總兵官鞏昌府漢亷褒隴西襄武人成哀間為右將軍在河西以恩信結羌戎羌戎感之秦嘉字士㑹渭城人博學宏才為郡上計掾有贈婦徐淑詩三首傳世姜維字伯約天水冀人仕郡上計掾州辟為從事建興六年丞相諸葛亮軍祁山維詣亮辟為倉曹掾封當陽亭侯時年二十七亮與蔣琬書曰姜伯約忠勤時事思慮精密心存漢室凉州上士也後遷征西將軍亮卒維還成都為輔漢將軍進封平襄侯十年與大將軍費禕共録尚書事是嵗討定汶山平康夷與魏夏侯霸等戰於洮西胡王治無戴等舉部落降維自以練西方風俗兼負其才武欲誘諸羌胡以為羽翼謂自隴以西可斷而有也每欲大舉費禕常裁制之及禕卒維率數萬人出隴西斬首破敵多所降下遷大將軍景耀六年維表聞鍾㑹治兵欲規進取宜遣張翼廖化督軍分護陽安關口隂平橋頭後主信宦官黃皓言寢其事後鍾㑹進兵維保劍閣拒之而鄧艾自隂平入破諸葛瞻於綿竹後主降於艾敕令維詣鍾㑹降㑹厚待維還其印節謂長史杜預曰以伯約比中土名士公休太初不能勝也情好歡甚因將維等詣成都維知㑹有異圖教㑹誅北來諸將已殺㑹坑魏兵復蜀祚魏將士憤發殺㑹及維魏趙昻字偉章天水冀人馬超攻冀城昻與尹奉戮力攻超官統軍校尉功聞朝廷遷益州刺史晉彭祈襄武人為州别駕歷西郡酒泉𢎞農略陽四郡守纍官封侯所至忠以衛上清以守己威以克敵恩以惠下宋垣護之字彥宗貆道人少倜儻氣幹强果元嘉初為殿中將軍纍遷鍾離太守隨王𤣥謨入河為前鋒進據石濟及𤣥謨敗退魏軍悉牽𤣥謨水軍大艚連以鐵鎖三重斷河絶護之歸路河水迅急護之中流而下以長柯斧斷鎖魏人不能禁既還戌淮隂領濟北太守義宣反護之率水軍大破之封益陽侯後拜青冀二州刺史諡壯侯齊焦度字文績南安氐人少有氣幹便弓馬孝武初魏冦青州刺史顔師伯遣度領軍大捷師伯啓孝武稱度氣力弓馬絶倫帝召見壯之沈攸之反度守郢城於城樓上褰露形穢辱罵攸之事平封東昌縣子垣崇祖字敬逺護之弟子也少有幹略歷北琅邪蘭陵二郡太守及齊高帝踐祚徙為豫州刺史魏攻夀春崇祖乃於城西北立堰塞肥水堰北起小城使數千人守之曰寇攻小城吾破堰放水自然沉溺及魏軍攻小城崇祖著白紗帽肩輿上城决堰水魏衆溺死千數大衆退走齊高帝謂朝臣曰崇祖恆自擬韓白今果其人也進為都督給鼓吹一部崇祖慮魏復攻淮北啓徙下蔡戌於淮東魏果攻下蔡崇祖大破之領驍騎將軍垣榮祖字華先貆道人崇祖從父兄也榮祖善騎射宋孝建中為後軍參軍後歸齊高帝除東海太守榮祖善彈見翔鵠雲中曰當生取之乃彈其兩翅毛脫墜地無傷養毛生後飛去預佐命功封將樂縣子拜兖州刺史陳趙知禮字齊旦天水隴西人涉獵文史善書翰為文贍速占授軍書下筆便就初為陳武帝書記及武帝征侯景上表於梁元帝及與王僧辨論軍事其文並知禮所製及景平授中書侍郎陳受命每軍國大事文帝輒問之拜散騎常侍再遷右將軍卒贈侍中諡曰忠魏李冲字思順隴西人沈雅有大量善交遊不妄戲雜流輩重之高祖初遷中書令加散騎常侍尋轉南部尚書進爵隴西公冲恩寵日盛遂為富室而謙以自牧積而能散姻族鄉閭莫不分及虛已接物時以此稱之河南太守來崇子護糾冲兄佐贓罪佐及冲等悉坐幽繫㑹赦乃免至冲寵貴護為南部郎深慮為冲所陷而冲每慰撫之護後坐贓罪懼必不濟冲乃具奏乞原恕之遂得不坐冲從甥隂始孫往來冲家至如子姪有人求官因其納馬於冲始孫受而不言馬主自陳始末冲大驚執始孫以奏始孫坐死其處要自厲不念愛惡皆此類也冲竭忠奉上知無不盡出入憂勤形於顔色舊臣戚輔無不服其明斷慎密高祖深相仗信親敬彌甚尋遷侍中吏部尚書高祖以冲女為夫人詔以冲領將作大匠營改正殿車駕南伐加冲輔國大將軍統衆翼從至於洛陽霖雨不霽冲反覆進諫高祖諭羣臣曰若不南鑾即當移都於此高祖初謀南遷恐衆心戀舊外名南伐其實遷也於是定都洛陽委冲以營搆之任兼右僕射留守洛陽詔討漢中冲表諫止自鄴還京高祖欲南征冲以為未可冲機敏有巧思北京明堂圓邱太廟洛都新起堂寢皆資於冲勤志彊力旦理文簿兼臺匠制几案盈積終不勞厭卒贈司空諡文穆楊機字顯略天水冀人少有志節河南尹李平元暉並召署功曹由是聲名更著於時皇子國官多非其人詔選清直之士機見舉為京兆王愈國中尉當官正色不避權勢明達政事斷獄以情凡訴訟者一經其前後皆識其姓名并記事理世咸異之荆州蠻叛拜尚書左丞討平之建義初拜平南將軍光祿大夫除度支尚書方直之心久而彌厲奉公正已為時所稱家貧無馬多乘小犢車時論許其清白周趙貴字元貴天水南安人少頴悟有節概從賀拔嶽平關中遷大都督嶽為侯莫陳悅所害將吏奔散貴曰仁義豈有常行之則為君子違之則為小人乃詣悅詐降悅信之因請收葬嶽悅許之乃收嶽尸奔平凉周文帝以為大都督封南陽郡公又封楚國公辛威隴西人少慷慨有志略初從賀拔嶽征伐有功假輔國將軍都督及太祖統嶽之衆見威奇之引為帳內封白土縣伯從魏孝武攻回洛城及擒竇泰復𢎞農戰沙苑並先鋒陷敵勇冠一時進爵為公出為鄜州刺史遷河州保定初率兵討丹州叛兵平之又討綏銀諸州並平之拜大司冦進位上柱國宿國公威性持重有威嚴涖官數十年未嘗有過故得以身名終兼其家門友義世以此稱之趙昶字長舒天水南安人昶少聰敏以材力聞大統九年周太祖遣昶使於氐酋李鼠仁諭以禍福鼠仁感悟遂相率降復遣慰諭叛氐梁道顯皆即欵附以功封章武縣伯除大都督行南秦州事昶自擢居將帥之任傾心下士擒獲氐羌撫而使之皆為昶盡力録前後功進爵長道郡公趙善字僧慶貴從祖兄少好學沈毅有逺量普泰初以平關隴功拜驃騎將軍爾朱天光東拒齊師兵敗見殺善請收葬其尸齊神武義而許之魏孝武時歷尚書僕射進爵為公善性溫恭有器局功則歸人過則歸已時人稱其有公輔之量九年從戰邙山為敵所獲卒於東魏諡曰敬任果字靜鸞南安人果性勇决志在立功魏廢帝時率所部來附周文嘉其逺至待以優禮授南安縣公果因陳取蜀之策率兵征蜀及成都平周太祖以其方隅望族早立忠節授驃騎將軍進爵安樂郡公唐趙憬字退翁渭州隴西人志行峻潔寶應中天下薦饑憬褐衣上疏請殺禮從儉士林歎美建中初擢水部員外貞元中李泌薦之使回紇未還尚書左丞缺帝以命之進中書侍郎同平章事與陸贄同輔政穆贊等為裴延齡構擯憬救護申解得免憬精治道常以國本在選賢節用薄賦斂寬刑罰又陳前世損益當時之變獻審官六議一議相臣二議庶官三議京司缺官四議考課五議遺滯六議藩府官屬帝皆然之下詔褒答輔政五年卒諡貞憲憬性清約位臺宰而第室童僕猶儒生家竟不營産李晟字良器洮州臨潭人年十八從王忠嗣擊吐蕃號萬人敵鳳翔節度使高升召署列將擊疊州叛羌於高當川又擊連狂羌於罕山破之遷左羽林大將軍廣德初擊党項有功授特進試太常卿建中二年魏博田悅反晟為神䇿先鋒斬楊朝光乘氷度洺水破悅又戰洹水悅大敗加檢校左散騎常侍帝出奉天召晟詔迎拜神䇿行營節度使朔方帥李懷光遷延有異志隂通朱泚晟慮為所并適有詔使到晟軍乃令曰有詔徙屯即結陳趨東渭橋詔進晟尚書左僕射同中書門下平章事時晟家皆為賊質有言者晟泣曰陛下安在而欲恤家乎泚使人欵壁門曰公等家無恙晟怒叱斬之晟能與下同甘苦以忠義感發士心終無攜怨大破賊衆乘勝入光泰門再戰賊奔潰餘黨悉降晟引軍屯含元外廷令軍中曰五日內不得通家問坊人之遠者宿昔乃知王師之入也露布至梁曰臣已肅清宫禁祗謁寢園鍾簴不移廟貌如故德宗覽之感泣曰天生李晟以為社稷非為朕也拜晟司徒兼中書令帝紀其功自文於碑封西平郡王薨贈太師諡曰忠武有十五子知名者願憲訴聽李願少謙謹元和初領夏綏銀宥節度使政簡而嚴境內肅然後為左僕射節度鳳翔李憲性仁孝長喜儒以禮法自矜纍遷絳州刺史以治行稱太和初遷嶺南節度使所歷皆以吏能顯政績暴著善治律令性明恕詳正大獄全活無辜者甚衆李訴字元直有籌略善騎射補衛尉少卿出為坊晉二州刺史以治異等進詹事憲宗討吳元濟訴求自試遂檢校左散騎常侍為隋唐鄧節度使推誠待士賊來降者輒聽其便給粟帛遣還衆願為訴死居半嵗知士可用乃請濟師益河中兵二千吳秀琳降以其衆攻吳房賊以精騎尾擊訴下馬據胡牀令軍中曰退者斬衆决死戰射殺其將賊乃走李祐賊健將也設計擒之待之厚令佩刀出入帳下署六院兵馬使祐捧檄嗚咽始定襲蔡之謀元和十一年十月己卯夜師起祐為前鋒訴率中軍吏請所向訴曰入蔡州取吳元濟士失色監軍使者泣曰果落祐計天大雨雪行七十里夜半至城旁皆鵝鶩池訴令擊之以亂軍聲祐坎墉先登衆從之殺門者發關留持柝傳夜自如訴入駐元濟外宅元濟聞號令常侍傳語始驚曰何常侍至此擒吳元濟檻送京師不戮一人衆皆輸降以功進檢校尚書左僕射封凉國公卒贈太尉諡曰武李聽字正思為神策行營兵馬使討王承宗斬賊驍將憲宗壯之遷蔚州刺史召為羽林將軍帝討李師道出刺楚州聽日整勒士皆奮即掩賊不虞攻朐山降之以功授夏綏銀宥節度使統兵北討授檢校兵部尚書充河東節度使封凉國公卒贈司徒王佖洮州人李晟之甥武敢嫺騎射晟在師佖無不從攻朱泚於光泰門賊方鋭佖與李演鏖戰蹀血賊數北諸軍乘之遂大振以功為神䇿將擊吐蕃有功李益字君虞隴西成紀人長於詩名與宗人賀相埒每篇成樂工爭求之被聲歌供奉天子至征人早行等篇天下皆施之圖繪劉濟辟置幕府進為營田副使憲宗召為祕書少監集賢殿學士太和初以禮部尚書致仕李賀字長吉隴西人七嵗能辭章韓愈皇甫湜過其家使賀賦詩援筆立就自目曰高軒過由是有名為人纎細通眉長指爪能疾書每旦出騎馬從小奚奴背古錦囊遇所得書投囊中及暮歸足成之母使婢探囊中見所書多即怒曰是兒須嘔出心乃己耳以父名晉肅不肯舉進士韓愈為作諱辨然卒亦不就舉辭尚奇詭所得皆驚邁絶去翰墨畦徑當時無能效者樂府數十篇雲韶諸工皆合之管絃為協律郎卒年二十七尹思貞字季弱天水冀人明春秋擢高第常受學於國子博士王道圭稱之曰吾門人多矣尹子不可測也以親喪哀毁除喪不仕左右史張說尹元凱薦為國子大成每釋奠講辨聽者皆得所未聞尹愔思貞子博學通經尤精老子明皇召對甚喜厚禮之拜諫議大夫集賢學士兼修國史固辭不起詔以道士服視事乃就職專領集賢館圖書開元末贈左散騎常侍李翺字習之隴西人授校書郎元和初為國子博士史館修撰常條興復太平大略再遷考功員外郎禮部郎中翺性峭鯁議論無所屈常面斥宰相李逢吉過失逢吉詭不校翺移病有司白免官逢吉更表為廬州刺史時州旱民無食權豪賤市田屋牟厚利而窶户仍輸賦翺下令使以田占租無得隱收豪室稅萬二千緡貧弱以安入為諫議大夫出為湖南觀察使卒翺始從韓愈為文章辭致渾厚見推當時故亦諡曰文李中敏字藏之系出隴西元和中擢進士性剛峭辟觀察判官入拜侍御史太和六年大旱中敏上言宋申錫之寃不伸宜斬鄭注以快忠臣之魂則天且雨不省以病歸召諫議大夫遷給事中仇士良以開府階䕃其子中敏曰謁者監安得有兒士良慚恚由是復棄官去開成末為杭婺二州刺史李讓夷字達心隴西人擢進士第纍進諫議大夫開成初進起居舍人武宗初李德裕復入三遷至尚書右丞讓夷亷介不妄交位雖顯劇以儉約自將為世咨美李蔚字茂休隴西人舉進士拜監察御史纍擢尚書右丞拜京兆尹出為宣武節度使徙淮南代還民詣闕請留詔許一嵗乾符末以吏部尚書同中書門下平章事罷為東都留守宋王德字子華通逺軍熟羊寨人以武勇應募𨽻於熙帥姚古㑹金人入侵遣德諜之斬一將而還古曰能復往乎德從十六騎徑入隆德府治執僞守姚太師左右驚擾德手刃數十百人衆愕眙莫敢前古械姚獻於朝欽宗問狀姚曰臣就縛時止見一夜義耳時遂呼德為王夜義平濟南冦李昱池陽寇張遇叛將張昱圍和州德接戰斬昱俘其兵騎數萬劉光世謀討苗劉德至浦城斬苗瑀擒馬柔古送行在紹興元年平秀州水賊邵青餘黨復索戰諜言將用火牛德笑曰是古法可一不可再令諸軍持滿陳始交萬矢齊發牛皆返奔賊衆殱焉遷同州觀察使明年金兵破滁州德越江襲奪之追擒甚衆改環慶副總管金兵自合肥入侵德與夾河而軍兀术以鐵騎十餘萬陳於前德渡橋大呼令萬兵持長斧如牆而進敵大敗復追擊之劉錡曰昔聞公威略如神今果見之召拜清遠軍節度使諸軍都統制卒贈少傅元高斌安定人以明經舉授鳳陽路四川亷訪司僉事以亷能稱汪世顯字仲明鞏昌鹽川人皇子南征諸蠻與宋將潛兵相為犄角世顯以輕騎馳之殺其將乘勝定資州入成都中統三年論功追封隴右王諡義武汪德臣字舜輔世顯子年十四侍太子獵矢無虛發襲爵鞏昌等四路都總帥入覲憲宗所陳率嘉納命城沔州德臣繕治室廬部署官屬數日而集進攻嘉定克之又破宋軍於隆慶詔城益昌德臣入見乞免益昌賦稅及徭役從之蜀人憚其威名諸郡莫敢出鬭甲寅夏獲宋提轄令持檄諭告守將南清以城降所俘城中民悉歸之東南戌卒數百有去志德臣知之給劵縱去皆泣謝未幾帝幸益昌錫金帶俾立石紀功中統三年追封隴西公諡忠烈汪良臣世顯子年十六從兄德臣出征取四川世祖即位阿勒達爾琿塔哈逆命劫六盤府庫西陲騷動詔良臣討之賊大潰獲都海殺之西鄙輯寧捷聞賜金虎符中統三年浩里叛復討平之轉鞏昌路都總帥平四川良臣禁俘掠發粟賑饑民大悅捷聞授中書左丞四川行省平章事良臣陳治蜀十五事皆納之追封梁國公諡忠惠汪惟正字公理德臣子幼頴悟藏書二萬卷喜從文士議論古今得失尤喜談兵襲父爵守青居山呼圖叛擒殺之十四年藩王圖嚕叛於六盤惟正攻平凉麾兵逐之三踰山圖嚕就擒入朝授金吾衛上將軍命惟正分省於蜀留意拊循人便安之卒諡貞肅李呼喇濟隴西人從征西川以功為管軍總領取合江大獲山守臣楊大淵納欵已而逃歸憲宗怒將屠其城呼喇濟乃單騎至城下大呼入城曰皇帝使我來撫汝軍民執大淵手謂曰上方宣諭賜賞不待而來何也大淵曰誠不知國禮非敢有異謀也遂與偕來一軍皆喜呼喇濟入奏憲宗問之對曰城門不閉無他心也一聞臣言即從臣出憲宗悅賜葡萄酒二十年改四川南道宣慰使時蠻僚叛服不常往往劫掠邊民呼喇濟遣諭諸蠻豪長率衆來降二十三年入覲以老病乞歸田里許之二十七年拜資善大夫授陜西行省尚書左丞元貞二年入覲授資德大夫陜西行省中書右丞卒諡襄敏明曹銘㑹寧人洪武中進士任兵科給事中才名顯著聲振一時歷官都察院左僉都御史王慤寧遠人少有氣節倜儻敢言性至孝洪武初舉賢良方正授御史凡有利弊必以上聞數忤權貴不避艱險有鐵面之風趙克欽寧逺人以孝友聞置義田贍宗族社田以養士賑恤貧乏洪武間舉賢良方正為御史風節凛然京師豪猾斂手貴遊相戒勿犯及居家復為邑人開水利當時賴之王敬隴西人監生永樂間知太湖縣性毅直有膽略豪强斂跡吏民德之韓縉字子雲隴西人舉鄉試第一永樂四年進士任吏科給事中敷陳時政不畏權奸尋轉南京户部郎中歷事三朝才名懋著學者稱為關西韓夫子楊仕敏字克勤隴西人舉永樂十四年鄉試任監察御史在臺十有三載考最正統間改江南太平知府振學校廣儲蓄修城池舉廢墜郡大治遷河南按察副使太平民懇留具奏加三品俸仍管府事景泰初遷山西布政右參政五載引疾歸行李蕭然足跡不至公門隴人服其德化上遣行人李誠召問仍以疾辭命布政司嵗給米以優禮年八十六卒張勵字克勤安定人舉永樂十五年鄉試仕户曹主事員外郎中督儲袪弊有聲淮隂以建白中奄豎忌下詔獄讀書宴如也後得釋遂歸一日僕縛盜數人勵手解盜縛飯之誡令改行縱使去人以為有陳太丘之風居官以亷稱勤儉立家子姓不許衣文繡姬序通西和人正統辛酉以監生入朝賀是夜帝夢異人奏曰衣紅者忠臣也次日令察之獨序通衣紅褐襖帝心異之即除為山西汾州知州有善政趙榮字孟仁通渭人以能書授中書舍人正統十四年十月也先擁上皇犯京師邀大臣出迎衆相顧不敢行榮慨然自請即擢大理少卿偕右通政王復出城朝見也先以非大臣遣還景泰元年七月擢工部右侍郎偕楊善等奉迎上皇歸進左侍郎後英宗復辟天順元年擢工部尚書曹欽反榮䇿馬大呼於市號召壯士從者數百人卒擒逆賊上目之為忠臣七年以疾罷成化十一年卒遣官諭祭録其子珙錦衣指揮張勛字鼎彛㑹寧人正統初登進士授工部主事監儲兩淮復除南禮部遷知青州府在府持正以良吏稱復調知武昌府武昌繁劇治理有方給餉濟饑刑清弊絶遷山西布政右參政宋琮字朝用隴西人成化二十三年進士歷吏科都給事中琮知無不言有冒太后兄者琮上疏辨其詐罪之山西御史某以貪酷聞屢遣官問皆不伏命琮治之立伏道路稱搏虎手遷太僕卿直氣愈勵剛正不阿所至有聲王瓚字宗器通渭人成化十七年進士授工部主事轉員外𢎞治末同中使李瑾勘水災上疏略曰侍郎楊禮股肱之臣指揮劉剛爪牙之臣瑾召之如奴僕而二人望風奔命國體所關非小宜付瑾於法不報瑾執奏誣瓚下獄尋赦出推郎中奉敕督修興王府立法均役人皆悅服升懷慶知府其政以許衡為法復除開封剛明仁恕民歌之曰包公後王開府嚴如父慈如母不可犯良可慕范鏞字鳴逺鞏昌衛人𢎞治六年進士授御史鯁直敢言不避權奸因忤㫖下獄旋得釋補浙江僉事蕭山令鄒魯讐其邑紳何舜賓陷之死鏞亷得其情以魯抵何死進副使備兵建昌中宦聞鏞風采不敢橫以開礦厲民奏罷之歷擢操江都御史稽核行伍罷橫門占役劾罷懷寧侯巡撫雲南剗奸摘弊平賦均徭滇人戴之劉瑾用事兵部尚書王瓊與鏞左瓊中之左遷參議卒於官吳養亷字廷用通渭人文學俱優任唐縣知縣有善政致仕歸設教於西山院二十餘年人稱西山先生王璠字廷瑞寧遠人成化二十年進士授户部主事監督臨清倉力清中官剝尅之弊總理遼東糧儲閲實得羡米千萬儹運漕河值藩封之國河道壅塞璠晝夜巡視漕艘如期竣事晉山西參議分守冀北道以臺評罷歸何溥隴西人監生歷官至府通判清慎平易處鄉足跡不至公門鄉人敬服劉憲鞏昌衛監生成化間知奉化縣政平刑簡民皆悅服楊銘隴西人舉人歷官永寧府同知清慎愛民致仕家居三十餘年屏跡公門手不釋卷九十餘卒劉鉞字廷威隴西人正德中以鄉舉授遵化知縣素履清苦政多簡易蝗不為災質朴篤實有古人風高登字東山靖逺人任山西屯留主簿多惠政人不敢干以私遭母憂歸邑人泣送有士懷清慎民慕豈弟之頌繼任四川大竹舊賦納松潘登建議詳憲允貯綿州郡邑皆被節省以父耋歸養值嵗饑出資周濟鄰里戚黨咸受其惠高冠靖遠人父登冠初知浮山縣潔已愛民因詿誤降判解州議築城垣民䝉其利署夏縣值大荒條議賑粥事宜民賴全活又立慈幼局收撫棄嬰後因事左遷遂家居著述張錦字尚絅岷州人成化五年進士任刑部司官鞫讞明允審録山東平反甚衆會他司失官金屬錦按之屢鞫不承遣人紿其家得金示之遂伏罪畿輔災以錦往賑平糴勸貸分遣良吏饘給之所活不可勝計方山慶成二王府有大獄奉命往治還遷大理右丞再奉命治岷襄二府獄情罪皆協尋轉左丞擢副都御史巡撫宣府直枉除弊兵民畏服劾罷中官武將不職者卒賜祭葬長沙李東陽志其墓王鐸字大振岷州人成化二十三年進士為人敦古尚行事親以孝聞初任知永平縣再任知眉州旋升馬湖同知知府所至賢聲籍籍繼擢西蜀參議道功業恢廓於龍安一郡多所創建區畫悉得其宜致仕歸清風亮節益重於鄉里張潛字用昭岷州人錦之子𢎞治九年進士少應舉與慶陽李獻吉洵陽張光世齊名潛歷任户禮二部遷知廣平府時畿輔多盜潛善為防禦得以無事暇則按屬拊循廣施惠政民益安輯尋擢山東參議道鄒昊字宗大鞏昌人𢎞治十二年進士以御史謫真定推官教吏士習武民有劫盜悉擒之升按察僉事蜀盜藍鄢反昊簡驍勇千人分隊立長以待賊來逼城昊夜出擊賊營亂悉兵乘之斬首四千級乘勝直前賊方陳左而伏兵於右為應昊以正兵當左而身與百騎直搗伏伏驚潰左陳亦潰捕斬萬人遷副使治兵川東賊衆圍中江昊以五千騎與總督彭澤合擊大破之殺賊魁廖麻子進右僉都御史撫蜀賊餘黨竄東鄉山昊請于澤以步兵三萬據出入要道賊果請降卭𤏡人普法惡倡衆立寨僭號攻劫昊率兵捕之周視其寨遣兵據泉口兩日賊衆渴敗走擒普法惡誅之遷右副都御史廕一子錦衣百户暢華字子實隴西人六嵗即知學正德十二年進士知無錫縣縣繁劇華宰之有餘力嘉靖初擢刑部主事讞獄畿內平反明允進員外郎遷山西按察僉事值岢嵐冦發華率兵殄其渠魁脅從盡釋之分巡河東輯盜安民散白蓮之黨致仕歸劉晟字孔昭安定人成化二年進士授户部主事度支明斷剗盡積弊董儲臨清中官侵漁晟動裁以法督運河漕值旱水涸舟阻晟疏列穵運法隨路貯水遞運之漕期不滯人咸德之曹亷安定人𢎞治六年進士授大理寺評事恤刑河南申理寃滯全活甚衆遷黃州知府恪慎盡職居家端嚴子孫恪守王廷瑶字爾玉安定人父鑑寧國通判廷瑶正德九年進士授户部主事監京儲商稅以亷稱監湖湘兌運以時進繼遷員外郎度支嚴明張濟安定人舉𢎞治十一年鄉試由襄城教諭擢保寧府推官清雅端方足範後學王溥㑹寧人任成都知縣性淡泊僕從三二人在縣理繁劇平刑獄安靜明决百姓以青天呼之居家敦孝友世傳清白王弼㑹寧人山東嶧縣主簿負氣節正德七年署縣事忽流賊千餘騎來攻城躬率丁壯力戰擒斬賊遁去城賴保全升益都丞民為立去思碑王朝用字行甫隴西人正德十六年進士授懷寧知縣時值盜賊蜂起又當逆濠兵燹之餘恤民袪弊敏而惠士民懷之擢御史敕按鹺兩淮朝用請復舊額商稱便而課亦通巡按山西議平太行巨盜讞獄摘奸卓有風裁未幾以毁謫和州判於敖字叠州岷州人正德十六年進士授户部郎出知山西大同府升霸州道山西參政擢湖廣按察使尋任右布政使升副都御史巡撫遼東致仕為人孝友實踐藴藉淵深歷仕中外聲施奕奕在冀南時創立外城及四方堡寨賊不敢犯民永賴之乞休後杜門謝客時復周恤宗族鄉黨州人咸推重焉路瑛靖遠人鎮守寧夏總兵屢建大功朔方肅靜正德十六年聞本衛年荒運糧賑濟全活甚衆及致仕歸適祖厲河水泛漲勢將及城瑛捐資疏通北入黃河通邑建祠立碑以報功王民牧安定人少登科究精經義文歸正體學者多師之任順德叙州二府判雅持氷操行李惟圖書而已自蜀歸號林下散人鄉閭稱其正直王欽字敬之安定人清修苦節事繼母至孝年已强仕母猶箠楚之敬受弗避仕為萬泉令鋤强抑惡有聲三晉邑人紀其嘉績畫十二圖將內召以疾告歸貧無食鬻衣履以供竟飢餓死邑令伐石表其墓曰亷吏王敬之之墓楊瑞安定人舉正德五年鄉試知易州官至南京後府經歷平生清操一無所茍劉應熊字得陽隴西人嘉靖二十年進士任嵩縣知縣邑人中舍王臣嚴嵩客也橫里中應熊廉得其殺人事立置於法監司某亦嵩客也承嵩㫖陷之直指許某得情立為昭雪以卓異薦於朝授監察御史時西苑修醮命廷臣皆道服應熊獨朝服上心銜之出按河東久之以星變罷諸臺諫應熊時巡歷澤潞夕聞報朝即治裝歸歸而課耕蓮峯之陽不與外事一日無疾卒張嘉孚字以貞安定人嘉靖二十六年進士知長治縣身衣浣濯革舊規樣紬百七十匹折强宗之橫而給祿以期宗人畏服庭無黠吏里無追胥獄無滯繫又興學造士養老恤孤五年薦擢河南府同知一時上下咸敬憚之憂歸復除重慶攝篆治理人嚴憚之如河南時以憂歸起補鄖陽知府檢府藏有羡金萬餘失籍久即具以聞備兵餉遷建昌道飭兵振旅養士恤民旌旗壁壘赫然改觀种勛字世賞其先順天通州人父霄襲指揮同知成化末羌入冦與戰於黑山堡死之勛襲職正德初守備西固屢立戰功進參將守肅州嘉靖初以副總兵鎮凉州尋充總兵官佩征西將軍印鎮寧夏嘗自誓期靖邊塵賀蘭不復有烽燧之警雷龍字雲從鞏昌衛指揮使技勇過人為寧夏總兵中軍敵至沙湃龍以精兵二千張兩翼衝擊之斬首四千餘級升莊浪參將在河西纍立戰功晉凉州副總兵明年掛征西將軍印鎮寧夏首功最多晉都督同知復佩平羌將軍印出鎮甘肅邊用戢寧以疾卒龍由衛使至大將大小百餘戰斬獲萬計未嘗一衄閻震其先江都人以功授鞏昌衛指揮僉事震襲職勇而善謀提兵分戍酒泉撫軍士習戰守蟒墩遇虜奮勇當先斬獲甚衆㑹日夕矢竭力戰死之將士悉流涕朝廷賜祭廕子瓛指揮使衛人列於忠烈祠瓛亦能修軍政事祖母以孝稱張力字德夫漳縣人嘉靖庚子貢於鄉事繼母以孝聞族中後無人者葬之年老失養者養之居鄉恂恂雅飭信義自守博學好古每論性學直入藴奧遇後生小子輒講解誨諭之及仕夀陽知縣亷節自矢撫民如子盡置奸吏豪橫於法公論稱快歸裝惟書數卷而已夀陽尸祝不忘曹文輝安定人由郡博為縣令雖三見黜清操愈厲上官有希覬者或諷之不顧也居鄉孑孑孤行一意人呼之曰鐵曹其時權奸秉國賄賂公行文輝獨耿介不悔性同薑桂劉學禮安定人幼標清譽長擅文名為金華教授以母老致仕家居四十年城市不入夀百嵗而終栗在庭㑹寧人隆慶二年進士初授中書歷官吏户二科給事中擢河南右布政使德粹學優居官清慎所撰有詩文縣志等書張國綱字與立安定人舉萬厯二十八年鄉試知順義縣以卓異擢南陽推官攝南陽縣妖冦徐鴻儒亂山左勢逼中州國綱扼關阻之冦不敢窺唐端王好長生術殘孕婦國綱發於兩臺王請罪乃已以終養歸集元明名儒語録為續性理十五卷纂明代名臣奏疏二十卷張存㑹寧人任閬中教諭朴直禔身勤敏訓士居鄉婚喪一凖古禮士民化之絶不干謁有司楊恩隴西人字用卿萬厯二十三年進士授户部主事博學以能文稱有足疾閉户著述絶不及户外事天啓元年修郡志凡關隘民用鑒戒文獻獨有裁酌時稱信志閻化淳隴西人泰昌間恩貢仕吳橋令時兵躪山左畿輔震動化淳多所防禦城賴以全河決運窩運道為阻化淳捐資築隄河患遂息獲其澱淤為良田數十頃居家盡孝母夀百有十二嵗人以為孝感云何士瑋隴西人萬厯舉人授灤州知州升四川保寧同知平水冦知貴陽府卓有風裁升貴州按察司分巡畢烏永赤道諸苗叛命士瑋討平之四川宣撫奢寅貴州宣慰安堯臣妻奢社輝爭地仇殺士瑋往勘入其阻反覆開諭兩酋帖然因直言魏黨中讒歸連徵不起杜和春字還朴隴西人萬厯五年進士性朴直知魯山淶水樂亭三縣所至有聲擢刑部主事以孤梗失權貴意謫山西藩幕轉衛輝同知宗室有辱縣令者和春緝而置之法再為刑部主事多所平反持議獨立不合諸僚意即致仕歸閉門謝客與京兆馮從吾相友善柬牘往來質疑辨義所著有中庸祕㫖皇清王雄字玉山寧逺人順治五年河西回變征勦有功授遊擊領兵征川當陳生擒郝搖旗恢復武隆等八州縣議敘擢湖廣鎮筸副將升西寧總兵官孟家棟隴西人順治初授萊州通判始入境憩於新興鎮有賊數百騎直逼旅次居民各散家棟獨端坐從容語賊曰我若公祖官當撫汝若果改圖吾為汝謀不至汝失所賊皆下馬羅拜去及抵任賊果率衆來歸家棟為白於憲司安插得所自是境無盜嗣因軍書旁午上司委棟調劑緩急民不至困軍需不乏尋晉開封府同知值兵燹後招徠撫字民始有生聚之樂㑹河決金龍棟寢食河干與役者同勞苦河工始成升知河間府汰猾吏革驛弊調和兵民修葺學校去官之日士民泣送年八十六終王進寶字顯吾靖逺人英姿魁梧精騎射順治初年從總督孟喬芳討叛回立功授守備李定國竊據滇黔進寶隨提督張勇進勦師次萬溪懸崖千仞攀援而上直搗其穴賊衆奔潰長驅直入薦授標營遊擊值西夷狂逞隨提督張勇率師敗之以功授洪水營參將既而海虜輸欵乞住牧大草灘地進寶力持不可並議城單于故址遂改名永固以進寶為副將駐之番人畏威無敢飲馬城窟者晉西寧總兵㑹逆藩吳三桂反王輔臣亦叛蘭州已陷即統兵直抵黃河夜以皮囊冒險暗渡賊兵更番迎敵屢戰屢勝遂拔安定復金縣乘雪夜破臨洮復蘭州南安天水相繼投誠功上升陜西提督鎮秦州南扼川逆北復通渭靜寧平凉隴右既平晉奮威將軍適賊犯寶雞即率師前進命子用豫潛襲利橋遂取鳳縣直抵武關又遣用豫潛出關後夜半破關直趨漢中奪朝天關拔廣元昭化奪浮橋直抵保寧命用豫斬門而入逆帥王屏藩自縊僞將軍吳之茂降遣偏裨分道而出全蜀底定遣內大臣賜彤弓駿馬授長子用豫為四川松潘總兵尋改固原既而川賊復叛進寶移鎮巴蜀力疾馳赴保寧勦撫兼施賊黨悉平入覲恩寵有加卒贈太子太保諡忠勇王用豫字公安靖遠人奮威將軍王進寶長子從父征蜀驍勇先登所過披靡纍立大功歷任松潘固原太原凉州四鎮總兵以終養致仕黃虞再伏羌人任江西奉新令吏骫民疲積逋甚多册籍混淆前令坐纍者數人虞再涖任密訪得積胥廖某俾鍵户造籍以報曰成則賞否則抵死胥惴惴奉法逾旬呈籍完缺井然前令皆釋積逋盡清由是稱神明秩滿士民構祠以祀後𣙜關滸墅蠲除苛征視學江西兼督驛傳事務時值滇逆之變虞再獨鎮靜自如密畫戰守計當事倚重以父憂歸潘育龍字飛天靖逺人效力於陜督標下隨中軍副將張自臣勦竹山房縣賊斬獲獨多攻白岩塞功尤最勦茅麓山餘冦奮勇拔寨賊平後吳逆亂臨鞏秦蘭俱陷於三水淳化殺賊尅復涇州撲滅賊首周養民等歷升參將時寧夏道阻育龍奉差偵探率數十人由紅河川等處與賊連戰七晝夜卒達寧夏歸至省報命從撫遠大將軍圖海討王輔臣屢戰皆捷恢復平凉一帶斬僞遊擊李景才等降僞總兵王緒武復興安三秦既定進勦川東復大竹渠縣等處蜀疆底定乘勢進取雲南定曲靖奉㫖駐劄成都授肅州副將升肅州總兵前後在肅八年出師勝敵者凡五捐俸修築邊牆番夷不擾捐資修復嘉㟷關城樓夷人畏服三十五年同振武將軍孫思克征噶爾旦戰於昭磨多忽飛炮中右頤貫耳後仍奮勇力戰賊大敗凱旋調天津總兵戢士伍嚴緝捕勤訓練盜息民安屢奉褒奬罷錫鎮津六年升固原提督晉鎮綏將軍仍管陜西提督事務在任十八年卒贈太子少保諡襄勇王萬祥㑹寧人少英武雄偉慷慨有奇氣從戎𨽻奮威將軍王進寶麾下每遇敵奮勇先入恢復臨鞏平凉諸郡進取漢中攻取武關升興化總兵後移臺灣晉福建提督御將束兵愛民重士在任一十七載閩人建立生祠楊慶隴西人五六嵗見字即辨形審音父奇之課之書即能了大義稍長刻志攻研凡立身行己一以禮義為宗其學由窮理而慎獨坐立舉止皆中規矩中年著書屏去科舉之業凡制度典章下至名物莫不探索原委縱游齊魯燕晉間得閲故家圖書歸而闔門俯讀仰思有得則書著大成通志外有佐同録等書共一百七十二卷甘肅通志卷三十四
