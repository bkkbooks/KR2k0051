body:
  text: 甘肅通志巻二十六封爵歴代分封因革不一皆以篤本支報有功也魏析五等之爵隋减三等之制開國品爵肇於唐時加封實邑詳於宋代越元與明具有定制其在甘肅各郡者載在史冊輯録如左志封爵夏不窋后稷子后稷封於邰卒不窋立夏后氏政衰弃稷不務不窋以失其官而犇於戎翟之間不窋卒子鞠立鞠卒子公劉立公劉修后稷之業徙都於邠括地志云故在慶州𢎞化縣南三里即其所居之城今遺址尚存商宻宻須氏姞姓之國詩大雅皇矣曰宻人不恭敢距大邦侵阮徂共王赫斯怒爰整其旅以遏徂莒地理志云今寧州一統志在今靈臺縣阮國名詩曰侵阮徂共共阮國地名今涇州共池周秦非子秦國名虞舜時伯益佐禹治水有功賜姓嬴氏其後七世孫名非子者事周孝王養馬於汧渭之間馬大蕃息孝王封為附庸居秦谷使續嬴氏至曽孫秦仲宣王命作大夫既而西戎反殺秦仲其子莊公伐西戎破之後西戎與犬戎侵周殺幽王莊公子襄公救周有功周徙洛襄公以兵送平王平王封襄公為諸侯遂有周西都畿内八百里之地漢洮陽侯劉狩燕長沙定王第十四子武帝封無後今臨洮府安定侯劉賢燕剌王子宣帝封子延年嗣孫昱嗣免今平涼府隂平侯劉回楚孝王子成帝封子詩嗣免今階州文縣西平侯于定國東海郯人宣帝時以丞相封子永嗣永卒子恬嗣更始元年絶今西寧府東漢安定公孺子嬰宣帝𤣥孫也王莽居攝立為皇太子莽即真廢為安定公西平王李通南陽苑人王莽時為五威將軍從事新市兵起通勸光武起兵更始立以通為輔漢侯至長安封西平王定遠侯班超平陵人武帝時使西域為都䕶以安集諸國納質内屬功封按靈州有定遠城舊志云唐郭元振置漢時未有也三國魏鶉觚男傳𤣥北地泥陽人以典農校尉稱職封晉隴西王司馬泰宣帝弟武陵受禪封邑三千二百户秦獻王司馬柬武帝子泰始初封汝陽王後徙封秦邑八萬戸今秦州西平郡公張軌安定烏氏人永寧初為䕶𦍑校尉涼州刺史以破鮮卑功封安樂鄉侯進封西平郡公立十三年薨諡武公子寔嗣立進位大都督涼州牧侍中司空承制行事六年為閻沙等所弑諡昭公弟茂嗣五年薨諡成公兄子駿嗣時羣僚勸駿稱涼王駿不許然自後境内皆稱之為王立二十二年薨諡文公子重華嗣始自稱持節大都督太尉䕶羌校尉涼州牧河西公假涼王立十一年薨諡昭公子曜靈嗣為伯父長寧侯祚所弑諡哀公祚簒位改元為和平元年三年為張瓘等所弑曜靈庶弟元靚嗣廢和平之號復稱晉正朔立九年薨為天錫所弑諡冲公天錫立十三年秦王堅遣將茍萇伐之天錫兵敗降秦自軌為涼州至天錫凡九世七十六年涼公李暠隴西成紀人吕光末燉煌人推暠為太守六郡推暠為大都督大將軍涼公領秦涼二州牧義熈元年暠改元建初遣使奉表詣建康立三年薨國人諡為武昭王子士業嗣改元為嘉興為沮渠䝉遜所敗死國亡暠以晉安帝隆安四年立至宋少帝景平元年㓕凡二世二十四年按史稱晉祚中㣲羣雄割據惟二涼累世不失藩臣禮故晉書述於列傳酒泉公賈疋武威人愍帝時為雍州刺史封今肅州南北朝宋洮陽侯宗慤南陽湼陽人以征伐功封金城侯劉緬彭城人孝武時以討竟陵王功封今蘭州梁洮陽侯張𢎞䇿范陽方城人武帝母文獻后從弟帝起兵以定䇿功封後魏安定郡公胡國珍安定臨涇人肅宗時以外戚封薨子祥襲臨涇子胡方回安定臨涇人世祖時以征涼功封安定公念賢枹罕人以軍功封伯後進爵至安定郡公北齊安定公金祚安定人神武時封姑臧侯段榮姑臧人以功封西平伯平鍳燕郡薊人以軍功封後周秦王宇文贄武帝子建徳時封上邽公李賢隴西成紀人以功封今秦州武威公王雄太原人以戰功封子謙嗣今涼州府臨涇子蘇亮綽從兄文帝時以功封今涇州武威公韋藝杜陵人以擊尉遲迥功封張掖公王傑金城直城人以戰功封今甘州武都公賀若敦河南洛陽人其先居漠北為部落大人敦西歸周文積封至公今階州清水公楊薦秦郡寧彛人以迎孝武功積封至公今清水縣隋秦王楊俊文帝子開皇元年封臨涇公牛𢎞安定鶉觚人周時襲封金城公趙煚天水西人文帝受禪以進璽紱功封唐隴西王李博文梁王澄子武徳初例封隴西郡公李思訓郇王曽孫中宗時以宗室耆舊封涼王李璿元宗第二十九子開元二十年封薨子仕為安定郡王涇王李挺肅宗第七子至徳二年進封興元元年薨西平王哥舒翰其先本突厥人天寳中封武威郡王李光進光弼弟營州柳城人代宗即位封涼國公永泰初進封張掖郡王段秀實姑臧人代宗時封西平郡王李晟洮州臨潭人為鳯翔隴右節度使徳宗時封涼國公李愬晟子憲宗時以平蔡功封涼國公李聽晟子太和中以功封隴西郡王李克用僖宗時以破黄巢功封宋秦王趙廷美太祖弟太宗即位封齊王繼封秦王安定王趙元偁太宗子初封涇國公真宗即位進封金城侯趙徳潤廷美第七子洮陽侯趙徳存廷美第九子元秦王莽噶拉木世祖第三子至元十年益封其府在長安者為安西在六盤者為開成皆聽為宫邸十七年薨隴王呼喇繖太宗曽孫至大元年封肅王科綽天厯二年封西寧王和塔拉黙色天厯二年封蘓穆鼐天厯三年封明肅莊王朱楧太祖第十四子洪武十一年封漢王二十四年改封肅王於甘州建文元年内徙蘭州永樂十七年薨諡曰莊子瞻熖嗣薨諡曰康子禄埤嗣薨諡曰簡子貢錝嗣薨諡曰恭子靖王未封薨子弼桄嗣薨諡曰定子縉烱嗣薨諡曰昭子紳堵嗣薨諡曰懐無嗣靖王之孫弼柿子縉􅖷以輔國將軍理府事尋准封薨謚曰懿子神堯嗣薨諡曰憲子識鋐嗣闖㓂入城遇害安定王朱尚炌太祖孫愍王第六子永樂十六年以罪廢為庶人慶靖王朱梅太祖第十六子洪武二十四年封慶陽二十五年徙韋州建文三年徙寧夏正統三年薨諡曰靖子秩煃嗣薨諡曰康子䆳嗣薨諡曰懐無子弟䆳塀以岐陽王紹封薨諡曰莊子真錖嗣薨諡曰恭子台泓嗣有罪降為庶人薨復王爵諡曰定子端和世子未封薨無子弟鼒枋以桐鄉王紹封薨諡曰惠子倪􅖷嗣薨諡曰端子伸域嗣薨諡曰憲子帥鋅嗣明末國絶真寧莊惠王朱秩榮靖王第三子薨子康簡王嗣薨子温穆王嗣薨子榮僖王嗣薨子安惠王嗣薨子恭簡王嗣無子安化惠懿王朱秩炵靖王第四子薨子恭和王未封薨西平侯沐英定逺人洪武十年以功封後徙鎮雲南鞏昌侯郭興鳯陽人洪武三年以功封平涼侯費聚西寧侯宋晟懐逺人永樂三年以功封甘肅通志巻二十六
