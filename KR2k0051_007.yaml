body:
  text: 甘肅通志卷七城池城郭溝池職在掌固倚山臨水控扼險要崇墉深池以固封守甘處西陲城池所關尤重經始何代增繕何人廣隘崇卑往牒具在可考而知志城池蘭州城自隋開皇初徙西古城築臯蘭山北少西濱河眀洪武十年指揮同知王得增築東西長一里二百八十步南北長一里八十二步周六里二百步髙三丈五尺濶二丈六尺東西南池深三丈城北因河為池門四東曰承恩南曰崇文西曰永寧北曰廣源上各建層樓宣德間僉事卜謙指揮戴旺自城西北起至東築外郭城凡一十四里二百三十一步正統十二年又增築承恩門外郭自東至北七百九十七丈有奇名曰新關郭門九東曰迎恩東北曰天塹又東北曰廣武南曰拱蘭東南曰通逺西南曰永康又西南曰靖安西曰神川北曰天水𢎞治十年都指揮梁瑄又築東郭外牆三百六十丈為逰兵營使居守之萬厯八年甃以磚石皇清康熙五年甘肅巡撫移駐六年都御史劉斗補修重建城樓臨洮府狄道縣附郭府城自宋熙寧五年王韶大破羌人城武勝軍金元因之增修洮河上故曰洮城眀洪武三年指揮孫德增築周圍九里三分髙三丈池深一丈門四東曰大通西曰永寧南曰建安北曰鎮逺俱甃以甎上建重樓戍樓九角樓四二年增築北郭景泰四年知府劉昭重修闢東西北三門隆慶三年知府申維岱知縣何常春重修渭源縣縣城創建於宋土築周圍三里三分髙二丈五尺池深一丈建門二南曰渭川北曰清源上各有樓鋪敵臺北郭一𢎞治十七年知縣黨茂增修築月城康熙二十五年知縣張𢎞斌重修金縣縣城即宋龕谷寨城周三里三分髙二丈三尺池深二丈門二南曰安阜北曰清安各建層樓戍鋪外郭眀萬厯四年知縣劉去僻修築康熙二十四年知縣魏煜重修河州州城秦苻堅建元時逼近北塬眀洪武十二年指揮使徐景改築周九里三分髙五丈厚三丈池深三丈門四東曰平秩南曰安逺西曰定羌北曰鎮邊上各有敵樓嘉靖時知州聶守中因防邊警創南郭周三里有奇郭門一仍建重樓康熙四十四年知州王全臣同守備張祖淳重修歸德所所城眀洪武七年因其地處番夷建築土城以資防禦今仍其舊鞏昌府隴西縣附郭元中統二年都總帥汪世顯即通逺軍拓其故址甃以石眀洪武十二年指揮劉顯重修周九里一百二十步髙三丈一尺池深三丈七尺門四東曰阜安西曰靜安南曰武安北曰靖安皆建樓其上角樓四戍樓四磚堞六尺正德初增築東西北三郭嘉靖十二年總制唐龍增葺隆慶二年隴右道李維楨又增築北郭開東西北三門建樓其上安定縣縣城宋紹聖二年經略使章楶始築周三里三分眀正統中知縣杜讓城南郭增拓六里三分城髙三丈五尺池深二丈五尺鎮樓五座四角有飛樓門三有月城天順六年知縣趙通重修嘉靖十三年知縣張永茂重修通渭縣舊城周三里髙三丈東西南三門眀成化九年同知張洪定重修三門建樓萬厯初知縣張二南甃以磚康熙五十七年地震城圮雍正八年移治安定監去舊治六十里監係眀初創建舊𨽻平涼苑馬寺城踞北山麓並東西關為三城中城周一里有奇闢東西門郭城與門亦如之漳縣舊城在古城峪圮於水眀正統間移置三台山麓城周一里髙一丈八尺池深一丈闢三門東曰東暉西曰西成南曰眀逺各覆以樓角樓四敵臺五以磚甃萬厯十八年濬重濠一周比前加深會寧縣縣城眀洪武六年千户傅履知縣郁斌營建成化四年同知羅諭拓之周五里髙三丈池深二丈闢南北二門嘉靖十三年總制劉天和增南北西三關萬厯元年知縣史天祐闢東門營東郭甃以磚門四東曰東勝西曰西津南曰通寧北曰靜安皆有樓四郭門東曰賓陽西曰延暉南曰來薰北曰拱極伏羌縣縣在古冀城北百步許創於宋眀景泰元年知縣王珣增築成化十二年重葺嘉靖二十一年知縣李灌增築周四里髙二丈五尺池深一丈五尺門四建樓其上東曰凝曦西曰阜城南曰宣和北曰拱辰寧逺縣縣城即古貆道舊址眀洪武三年知縣劉冕重建周三里髙一丈九尺池深一丈東西二門瀕渭善崩正德十二年知縣江萬里以避水患改修闢東西南三門皆覆以樓東曰景眀西曰景橋南曰景仰北曰景濶嘉靖間知縣儀世麟增修崇禎初城圮復修康熙十一年知縣龎守謙四十四年知縣馮同憲重修西和縣舊城宋紹興間安撫使李永珙築於縣西南山之上眀洪武四年知縣于通政建于南山下周四里髙一丈五尺池深一丈闢東西北三門嘉靖間闢南門一皆覆以樓眀末寇再陷城乃遷上城康熙四十三年知縣董正仍遷山下舊城內南北門二靖逺縣即古會州城舊址眀正統二年指揮房貴增築成化十三年拓東城嘉靖二十年守備黃恩修築南郭萬厯六年少卿梁許重修城周六里三分高三丈門三東曰通化西曰治平南曰安逺城北有鎮北樓池深三丈岷州舊城築於西魏眀洪武十一年指揮馬華始築新城周九里三分髙三丈六尺池深二丈門四東曰春熙西曰安逺南曰政和北曰宸宿上建層樓四箭樓一角樓五𢎞治十一年副使張泰重修萬厯九年羅維垣增築西營小城隆慶二年副使劉侃拓北隅六年副使呂鳴珂增修洮州衛衛城眀洪武二年曹國公李景隆建周九里髙三丈池深一丈五尺四門各覆以樓東曰武定西曰懷逺南曰鎮南北曰仁和成化五年指揮李隆重修𢎞治十一年副使張泰重修萬厯十年副總兵李煦改築北城十二年副總兵李芳增修新城西固城古武都郡地宋紹興二十年福津令張俊良築眀洪武十四年千户姚富展築以舊城為西關周三里高三丈池深八尺闢四門東曰望陽西曰戎服南曰鎮靜北曰永泰南北西三門俱覆以樓東門在駝嶺上無樓萬厯三年增築平涼府平涼縣附郭府城自唐德宗令劉昌增築元末李思齊部將袁亨分為南北二城眀洪武六年總兵官平涼侯費聚修復如舊周九里三十步髙四丈池深四丈門四東曰和陽南曰萬安西曰來逺北曰定北康熙八年知府程憲知縣李煥然重修崇信縣縣城自唐建中元年武康郡王元諒建周三里一百九十八步髙二丈五尺池深一丈五尺東西二門眀末知縣髙斗垣裁錦屏山麓展築順治六年知縣武全文建敵臺濬池濠華亭縣縣城金大定中建周五里一百八十步髙二丈池深一丈五尺有東西南三門順治初知縣楊榮印截舊城北阜築新城十二年復增修雉堞舊城如故康熙五十五年知縣陳珣補修鎮原縣縣城元至正二十年平章李思齊遣僉院張德欽築眀成化末知縣徐鏞重修嘉靖二十二年增修周一里二百七十步髙二丈五尺池深七尺開南門小東門並舊西門共門三固原州州城土築宋咸平三年曹瑋所築鎮戎軍城也金興定三年地震城圮四年重築元末廢眀景泰三年修復成化五年增修周九里三分髙三丈五尺有東南二門曰安邊曰鎮夷𢎞治十五年總制秦竑更開西門曰威逺又築外城為關門四南曰鎮秦北曰靖朔東曰安邊西曰威逺萬厯三年始甃以磚康熙四十九年鎮綏將軍潘育龍重修大小樓二十四外城周一十三里七分髙三丈六尺池濶深各二丈遂為雄鎮涇州州城土築古建涇陽元至正十九年院判張庸築眀洪武三年同知李彥恭改築周三里計三百八十六步髙二丈五尺池深一丈南北二門成化十三年重修隆慶二年知州范岡增築西靣萬厯三年知州趙行可增築南北東三靣六年磚砌女牆修南北二樓門三曰東盛曰承熙曰永寧雍正三年知州楊文燦補修七年知州盧愈奇接修靈臺縣縣城隋大業初土築在臺山之麓周二里二百六十五步髙一丈五尺濶深各八尺元至正末平章李思齊令萬户丁處守修築眀嘉靖間知縣郤中式景管楊尚義萬厯間知縣姚繼先俱重修東北二門崇禎七年知縣敖浤貞依昔山城之半築堡其上順治十年知縣黃居中修城濬濠靜寧州州城建於宋眀天順初知州蓋重修增築外垣及東西邏城周七里八十六步成化嘉靖萬厯中俱相繼修葺順治十年知州劉瑞重築周五里一分髙三丈四尺池深一丈八尺十七年知州李聖民補築雍正二年知州李正發重修內城門三東曰迎春西曰餞暉南曰向離關門二西曰戢寧南曰保障又便門九莊浪縣縣城元初建至正二十七年守禦周僉重修周一里一百七十步髙二丈五尺池深一丈五尺南北二門南曰鎮逺北曰拱極眀成化五年知縣馮憲增築康熙五年知縣王鍾鳴補修六十一年知縣胡𢋫昌重修隆德縣縣古羊牧隆城宋慶厯初改為隆德寨金升縣眀洪武二年修建周九里三分髙三丈池深二丈五尺成化後相繼改築順治中知縣常星景重築今城周三里許有東南北三門慶陽府安化縣附郭城因原阜之勢其形如鳯謂之鳯凰城周七里十三步東髙十三丈西髙十一丈南北髙九丈引東西二河之水為隍池門四東曰安逺西曰平定南曰永春北曰德勝各覆以樓眀成化初參政朱英修築並建南關甕城周三里嘉靖三十五年知府梁眀翰重修順治十五年守道張元璘知府楊藻鳯復修葺合水縣宋熙寧中建北倚山髙五丈東西南皆在平陸髙三丈周三里一百八十步池深一丈五尺濶三丈三尺門二東曰綏定西曰慶寧順治十五年知府楊藻鳯知縣劉澄源重修環縣縣舊有城元李思齊部將楊黑哥重修周五里三百五十步髙五丈五尺池深二丈門三南曰崇義西曰安定北曰朝天嘉靖以後屢經修葺三十五年知縣劉宗舜重修順治五年知縣滑崙重修真寧縣在羅川故地元至正六年樞密副使張天福建周二里二十六步髙四丈池深一丈五尺門二東曰朝陽西曰永春眀末開南門曰安慶崇禎十三年知縣郭之麟增修寧州州城五代梁隆德二年刺史牛知業建東倚山南西北俱阻河為池周三里四十步髙四丈門三東曰賓暘南曰朝天西曰保寧南關城周二里眀成化初參政朱英知州閻定之重修萬厯初知州馬彥卿易土垜以磚更築關廂四靣髙城一道增設北門順治三年知州程維新於郭城內築堡順治五年知州趙鳴喬重修甘州府張掖縣附郭舊城周九里三十步眀洪武二十五年都督宋晟於東偏增築新城周三里三百二十七步總一十二里三百五十七步髙三丈二尺厚三丈七尺門四東曰延熙西曰廣德南曰延恩北曰永寧池濶三丈七尺深一丈三尺又於四靣俱築關城山丹縣舊城元至元二十六年建周一里二百六十步眀洪武二十四年指揮莊得展築周七里二百九步城髙二丈八尺池濶二丈五尺深九尺東西南三門萬厯中增築南關城涼州府武威縣附郭舊城唐初李軌所築周一十五里髙四丈八尺眀洪武十年都指揮濮英改築周一十一里一百八十步舊有東南北三門宋晟增闢西門共四門濠濶三丈深二丈萬厯二年甃城以磚增築東關廂城長里許永昌縣舊有土城眀洪武二十四年指揮張傑增築周七里二百三十步髙三丈六尺厚二丈九尺為門四東曰宣化南曰武勝西曰鎮西北曰安定皆有月城池濶二丈三尺深一丈二尺成化八年指揮髙升增築南關廂鎮番縣城垣元號小河灘周三里五分眀成化元年都指揮馬昭展築西北二靣周六里二百二十三步髙三丈一尺東西南三門嘉靖間巡撫楊博增築西關萬厯三年甃以磚月城三池濶三丈深一丈五尺古浪縣縣城即古和戎城眀洪武十年修築周二里七十五步髙二丈五尺厚二丈東南二門東南依山無池西北池濶二丈四尺深二丈五尺萬厯三年增築東郭周四百六十五步髙二丈厚一丈平番縣縣城元至元初建眀洪武十年重築甃以磚周八里二十六步髙二丈八尺池深二丈五尺內外八門寧夏府寧夏縣寧朔縣附郭府城本趙德眀舊址