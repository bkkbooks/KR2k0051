年詔刺陜西秦鳯路義勇為保捷軍是年冬復置經略安撫招討使總四路軍置府涇州益屯兵三萬元符二年始城會州以葭蘆寨為晉寧軍金太祖即位始命以三百戶為謀克謀克十為猛安與萬戶千戶制略同外有漢軍大定時所置有事則僉取於民無事或以放免鎮防軍諸軍中取以更代在西北邊則有分番屯戍軍及永屯軍驅軍之别邊鋪軍守河南陜西邊界者諸路效節軍章宗所置掌司弓手者河南陜西弩手軍宣宗興定二年選募二千人為一軍賜號威勇元太宗七年僉陜西五路人匠充軍每二十人出軍一名至元二年八月陜西五路行省言新僉軍七千人若發民戶恐致擾亂今鞏昌已有舊軍三千諸路軍二千餘二千人亦不必發民户當以便宜起補從之十三年命布色岱呼必賚巴圖爾二人為都元帥領蒙古軍二千人河西軍一千人守鄂端城十七年發炮卒千人入甘州備戰守中統八年二月以瓜州沙州鷹房三百人充軍十六年九月詔河西未僉軍之官及富強戶有物力者僉軍六百人大德元年陜西平章事圖魯卜領總帥府軍三千人收捕西番回詔留總率軍百人及階州舊軍圖沙瑪軍各二百人守階州餘軍還元翼十一年四月詔以禮店軍還屬吐蕃宣慰司明置都指揮以領衛所置總兵參將遊擊守備以司攻守又理以憲臣監以御史撫以都憲統以總制各衛官軍分番教閲置屯遣戍大率五千六百人為一衛一千一百二十人為一千戶所一百二十人為一百戶所每百戶所設總旗二人小旗一人管領鈐束大小相維以成隊伍其內地鄉兵則各州縣巡捕之官嵗時教閲以護守城池備遏盜賊者也陜西都司領慶陽衛平涼衛固原衛靖虜衛鞏昌衛秦州衛岷州衛臨洮衛蘭州衛河州衛洮州衛寧夏衛寧夏前衛寧夏左屯衛寧夏右屯衛寧夏中衛寧夏後衛金州守禦千户所文縣守禦千戶所靈州守禦千戶所陜西行都司領甘州左衛甘州右衛甘州中衛甘州前衛甘州後衛甘州羣牧所蘭州衛西寧衛莊浪衛鎮番衛永昌衛山丹衛涼州衛髙臺守禦千户所鎮夷守禦千戶所古浪守禦千户所固原鎮固原在寧夏之南成化以前套烽未熾獨靖虜一面備邊平固安會之區號為無事自𢎞治中火篩入掠後遂當衝始即州治為鎮以固靖甘蘭四衛𨽻之設總督總兵參遊等官總兵原駐省城移鎮於此者也總督陜西三邊軍務一員固原兵備一員洮岷兵備一員延安兵備一員臨鞏兵備一員鞏昌兵備一員靖虜兵糧道一員鎮守陜西總兵官一員分守洮岷副總兵一員河州參將一員蘭州參將一員靖虜參將一員階文西固參將一員遊擊固原東路一員固原西路一員總督左營一員總督右營一員守備固原一員岷州一員環慶一員西固城一員文縣一員永安堡一員舊洮州一員坐營中軍官二員城堡八百八十五座戰敵等臺八百二十座護城堡墩敵角臺四千一十座兵馬原額官軍一十二萬六千九百一十九員名餉原額屯糧料本色三十二萬四千六百二十二石四斗二升三合屯草二十二萬九千七百五束寧夏鎮明初置寧夏等五衛西北據賀蘭山東南帶黃河內有漢唐二渠險固饒沃河東三百里皆設備遞年修治牆塹正德間有外邊嘉靖以來增築內邊而清水興武花馬池定邊各營尤稱要害云巡撫寧夏地方贊理軍務一員寧夏管糧道一員兵糧道一員鎮守征西將軍總兵官一員協守副總兵一員分守東路右參將一員西路左參將一員靈州左參將一員北路平虜城參將員遊擊鎮城一員興武營一員廣武營一員守備玉泉營一員石空寺一員橫城堡一員坐營中軍官二員都司管理鎮城一員水利屯田一員城堡營堡城九十四座關城六座敵臺三十五座墩臺五百三十四座關隘三十三座兵馬原額馬步官軍七萬一千六百九十三員名餉原額屯糧料一十萬七千四百九十七石草一百六十八萬七千四百七十四束甘肅鎮甘肅即漢河西四郡地明初下河西棄敦煌畫嘉峪關為界由莊浪迤南三百餘里為湟中地今置西寧衛由涼州迤北二百餘里為姑臧地今置鎮番衛又設甘州等五衛於張掖肅州衛於酒泉蘭州衛於金城皆屯兵拒守全鎮之地幾二千里惟一線通道西遮南蔽北扞稱孤懸重鎮云巡撫甘肅等處贊理軍務一員甘肅兵備一員西寧兵備一員莊浪兵備一員鎮守平羌將軍總兵官一員協守甘州左副總兵一員分守涼州右副總兵一員莊浪左參將一員肅州右參將一員西寧參將一員鎮番參將一員蘆塘參將一員遊擊莊浪一員碾伯一員松山一員巡撫標下一員坐營中軍官一員守備紅水堡一員山丹衛一員紅城子堡一員鎮羌堡一員寧逺堡一員平川堡一員嘉峪關一員古浪一員巴暖三川一員北川一員鎮夷一員阿壩堡一員領班都司甘州頭班一員次班一員涼州頭班一員次班一員城堡城垣堡塞四百九十五座關隘一百四處兵馬原額官軍九萬一千五百七十一員名餉原額屯糧料六十萬三千一百八十八石四斗二升屯草五十四萬九千七百三束甘肅通志卷十四
