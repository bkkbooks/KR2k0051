  text: 甘肅通志卷十四兵防甘肅跨連邊塞兩提六鎮徑旅雄師雲屯棊布控扼險要鞏固巖疆直省重兵莫多於此干城鎖鑰毖飭域中揚威閫外司戎行之責也志兵防鎮守寧夏等處將軍一員駐劄寧夏滿城坐馬二十匹左翼副都統一員協領三員佐領一十二員防禦一十四員驍騎校一十二員筆帖式三員馬甲兵一千一百名步甲六百名弓匠鐵匠三十六名官馬二百七十七匹兵馬二千二百一十三匹右翼副都統一員協領三員佐領一十二員防禦一十四員驍騎校一十二員馬甲兵一千一百名步甲六百名弓匠鐵匠三十六名官馬二百六十五匹兵馬二千二百一十三匹將軍坐甲六名馬一十八匹左右都統坐甲六名馬一十八匹領催前鋒馬甲拴養駝八百隻內馱炮駝八十隻甘肅撫標左營參將一員守備一員千總二員把總四員馬戰兵一百七十五名步戰兵一百名守兵三百七十五名官馬二十四匹兵馬一百七十五匹右營遊擊一員守備一員千總二員把總四員馬戰兵一百七十五名步戰兵一百名守兵三百七十五名官馬二十二匹兵馬一百七十五匹陜西提督總兵官一員駐劄固原州坐馬二十匹中營參將一員守備一員千總二員把總四員馬戰兵五百九十八名步戰兵二百名官馬二十四匹兵馬五百九十八匹雍正七年新募馬戰兵八十名步戰兵四十七名守兵四十七名兵馬八十匹雍正九年新募馬戰兵一百三十二名步戰兵八十五名兵馬一百三十二匹雍正十年新募馬戰兵一百二十名步戰兵八十名兵馬一百二十匹左營遊擊一員守備一員千總二員把總四員馬戰兵五百九十八名步戰兵二百名官馬二十二匹兵馬五百九十八匹雍正七年新募馬戰兵八十五名步戰兵五十名守兵五十名兵馬八十五匹雍正九年新募馬戰兵一百三十二名步戰兵八十四名兵馬一百三十二匹雍正十年新募馬戰兵一百二十名步戰兵八十名兵馬一百二十匹右營遊擊一員守備一員千總二員把總四員馬戰兵五百九十八名步戰兵二百名官馬二十二匹兵馬五百九十八匹雍正七年新募馬戰兵八十三名步戰兵四十八名守兵四十七名兵馬八十三匹雍正九年新募馬戰兵一百三十一名步戰兵八十六名兵馬一百三十一匹雍正十年新募馬戰兵一百二十名步戰兵八十名兵馬一百二十匹前營遊擊一員守備一員千總二員把總四員馬戰兵五百九十八名步戰兵二百名官馬二十二匹兵馬五百九十八匹雍正七年新募馬戰兵八十名步戰兵四十五名守兵四十五名兵馬八十匹雍正九年新募馬戰兵一百三十二名步戰兵八十四名兵馬一百三十二匹雍正十年新募馬戰兵一百二十名步戰兵八十名兵馬一百二十匹後營遊擊一員守備一員千總二員把總四員馬戰兵五百九十八名步戰兵二百名官馬二十二匹兵馬五百九十八匹雍正七年新募馬戰兵八十名步戰兵四十五名守兵四十四名兵馬八十匹雍正九年新募馬戰兵一百三十二名步戰兵八十五名兵馬一百三十二匹雍正十年新募馬戰兵一百二十名步戰兵八十名兵馬一百二十匹以上提督參將遊擊守備千把共官四十一員坐馬一百三十二匹馬步戰守兵共六千九百四十九名兵馬四千六百五十七匹慶陽營副將一員都司一員千總一員把總三員馬戰兵二百五十名步戰兵一百三十五名守兵九十八名官馬二十四匹兵馬二百五十匹雍正七年新募馬戰兵九名步戰兵一十八名守兵二十名兵馬九匹雍正九年新募馬戰兵六十五名步戰兵五十八名兵馬六十五匹東路紅德城營遊擊一員千總一員馬戰兵九十五名步戰兵三十五名守兵一百三十五名官馬八匹兵馬九十五匹雍正七年新募馬戰兵五名步戰兵五名守兵四名兵馬五匹雍正九年新募馬戰兵二十五名步戰兵一十五名兵馬二十五匹平涼城守營遊擊一員千總一員把總一員馬戰兵七十三名步戰兵五名守兵一百三十六名官馬一十匹兵馬七十三匹雍正七年新募馬戰兵六名步戰兵五名守兵三名兵馬六匹雍正九年新募馬戰兵二十名步戰兵二名兵馬二十匹涇州營千總一員馬戰兵二十名步戰兵二十名守兵四十五名官馬二匹兵馬二十匹雍正七年新募馬戰兵一名步戰兵二名守兵三名兵馬一匹雍正九年新募馬戰兵六名步戰兵八名兵馬六匹西協靖逺營副將一員都司一員千總一員把總三員馬戰兵三百三十三名步戰兵一百六十名守兵一百名官馬二十四匹兵馬三百三十三匹雍正七年新募馬戰兵二十二名步戰兵二十二名守兵二十三名兵馬二十二匹雍正九年新募馬戰兵七十六名步戰兵七十名兵馬七十六匹固原城守營參將一員守備一員千總二員把總三員馬戰兵二百九十名步戰兵一百六十名守兵八十六名官馬二十二匹兵馬二百九十匹雍正七年新募馬戰兵一十六名步戰兵二十四名守兵二十五名兵馬一十六匹雍正九年新募馬戰兵七十六名步戰兵七十名兵馬七十六匹兼攝瓦亭營馬戰兵一十名守兵五十名兵馬一十匹下馬關營參將一員守備一員把總二員馬戰兵一百七十五名步戰兵三十五名守兵六十三名官馬一十六匹兵馬一百七十五匹雍正七年新募馬戰兵八名步戰兵二名守兵五名兵馬八匹雍正九年新募馬戰兵四十四名步戰兵一十五名兵馬四十四匹西安州營遊擊一員千總一員馬戰兵六十名步戰兵一十五名守兵三十六名官馬八匹兵馬六十匹雍正七年新募馬戰兵三名步戰兵二名守兵二名兵馬三匹雍正九年新募馬戰兵一十五名步戰兵七名兵馬一十五匹蘆塘營遊擊一員千總一員馬戰兵一百二十六名步戰兵三十八名守兵六十二名官馬八匹兵馬一百二十六匹雍正七年新募馬