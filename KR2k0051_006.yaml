body:
  text: 甘肅通志卷六山川甘州府張掖縣祁連山在縣西南二百里連亘涼肅東西延袤千餘里又名天山西域呼天為祁連西河舊事云祁連山在張掖酒泉二郡界産松柏古木美水草山中冬溫夏涼宜畜牧馬蹄山在縣南一百里一名臨松山前涼於此置郡巖石間有神馬足迹故名馬蹄山合黎山在縣北四十里一名要塗山迤邐至鎮夷所石峽口三百里按前漢地理志張掖西北有小硤蓋弱水與流沙相合之處禹貢所謂導弱水至於合黎是也甘浚山在縣西南八十里山下有泉味甘冽故名人祖山在縣東北四十里俗名快活山其山不毛一統志東北四十五里有甘峻山即人祖山與甘浚山别川巖在縣西南一百五十里十六國春秋沮渠蒙遜元始八年欲伐西涼引兵西至白岩偽南攻浩亹潛師還屯川岩平頂山在縣西南一百三十里産松柏木植通黑河源河水分澆民田雞山按水經黑水出張掖雞山至敦煌過三危山南流入於南海蓋雞山在張掖之北弱水自縣城東北環合黎山入居延澤禹貢云導弱水至於合黎餘波入於流沙王氏通釋弱水出吐谷渾界窮石山自甘州刪丹縣西至合黎山與張掖河合其水力不勝芥然可以皮船渡按西域傳弱水在條支自長安西行萬二千里又百餘日方至其地疑别有所謂弱水也張掖河自縣西南山中流出又名羌谷水源出擺通河經祁連山積雪消融其流益大旁合黎山下弱水入焉出羌谷口北入額齊納界喀巴哈巴爾海拉蘇三海子即居延海古流沙也黑水在縣西十三里從西南山谷間流經此有黑河橋跨其上其下流仍合於張掖河明正德時土魯番沁特穆爾羈寓甘州謂城南黑河可引灌城因導叛羌謀犯邊云千金渠在縣西又西流入高臺縣界漢書觻得縣有千金渠西流至樂涫入澤中一統志云即羌谷水所引為渠也赤泉在縣東南十六國春秋秃髮傉檀𢎞昌五年伐蒙遜次於氐池芟其禾苗至赤泉而還蓼泉在縣西九十里沮渠蒙遜與西涼交戰之處甘泉在縣西南八十里甘浚山下味甘又城南門內東三十餘步亦有甘泉北流出城引以轉磑九眼泉在縣西九十里草湖泉在張掖河兩岸數十處多生蘆草每年收草百餘萬束以飼馬龍首潭縣西八十里山峽內有潭張掖河所經也石井在縣南一百三十里普觀寺石洞佛殿內西南角井口四靣各長一丈四寸深四尺五寸水常滿不溢冬夏汲之不竭都瀆澗在縣西九十里蓼泉之西山丹縣石硤口山在縣東八十里兩峯相對下有石井焉支山在縣東南一百二十里漢霍去病擊胸奴過焉支山千里執渾邪王收休屠王祭天金人即此地也山在河西郡界東西百餘里南北二十里有松柏古木美水草宜畜牧與祁連山同一名刪丹山胸奴失二山乃歌曰亡我祁連山使我六畜不蕃息亡我焉支山使我婦女無顔色唐哥舒翰建神祠於山麓天寶間封山神為寧濟公祁連山在縣南一百五十里連亘甘肅又名窮石山金山隋志張掖縣有大柳谷舊志柳谷在甘州東南一百里與山丹接界即金山也石嘴山在縣西十里山下皆舄鹵雨後經日色白如鹽甘浚山在縣西北三十里延袤至甘州一名甘峻山俗名龍頭山山陰有泉旱可禱雨紅寺山在縣北二十五里土皆赤山上有崖深六尺高八尺內有石佛又名紅寺洞饅頭山在縣東北九十里形似饅頭故名大斗拔谷元和志大斗拔谷在縣南二百里一統志云即今扁都口也隋伐吐谷渾經大斗拔谷山路險隘魚貫而出唐貞觀八年李靖討吐谷渾還上遣使勞軍於大斗拔谷刪丹河在縣西源出祁連山西流入張掖河即弱水禹貢弱水既西是也南草湖在縣東南一里周圍九里中多蘆草因以為名其下有湧泉與西草湖水相合有渠灌田四百餘頃西草湖在縣西一十里周圍七里中多蘆葦水泉紅鹽池在縣北五百里池産鹽紅色明洪武中指揮莊得採貢歲辦後以地屬境外停蘋白鹽池在居延澤之旁暖泉在縣東南四十五里平地湧泉二穴冬寒不凍故名有渠溉田百七十餘頃馮勝泉在縣北二十里邊外山川浚稽山在府邊外漢太和二年遣趙破奴出朔方西北二千餘里期至浚稽而還及還未至受降城四百里敗沒天漢二年詔李陵出遮虜障將步卒五千人出居延北行三十日至浚稽山與單于戰敗降括地志居延縣有遮虜障路博德所築長老傳云遮虜障北百八十里直居延西北即陵敗處三木樓山在府東北塞外後漢永平十六年討北胸奴分遣耿秉秦起出張掖居延塞絶漠六百餘里擊胸奴于三木樓山建初六年北胸奴三木樓山部落欵五原塞降居延海地理志渡張掖河行至合黎山鎮夷石硤口旁河東壖屈曲東北行一千里有寧冦軍軍東北有居延海元至元時總管呼都克婁請鑿合即渠於其地屯田九十餘頃蒲離候水在府北邊外漢書本始二年范明友出張掖塞千二百餘里至蒲離候水鹽池在府北邊外元和志在張掖縣九百三十里周回一百步其鹽潔白甘美涼州府武威縣青山在縣東二百五十里上多松柏冬夏常青松山在縣東三百一十里上多古松天梯山在縣南八十里其山高峻路徑曲折如梯第五山在縣西一百二十里上有清泉茂林修竹懸崖石室昔為隱士所居今名石佛崖臧南山在縣西一百二十里冬夏多雪又名雪山山水灌甘涼一帶田西山在縣西二十里峯巒若蓮花又名蓮花峯下有石五色成文如獸形青巖山在縣南一百六十里下有湫甚廣人觸之風雹立至今名青羊山洪池嶺在縣東南涼州之大山也唐志涼州有洪池府又姑臧有二嶺南曰洪池嶺西曰刪丹嶺後涼楊頴諌其主吕纂曰疆域未闢﨑嶇二嶺之內謂洪池及刪丹嶺也白嶺山在縣西一百里山頂積雪望之皓然因名今名白水嶺祁連山在縣東南一帶聨絡甘涼延袤千餘里浚稽山在舊武威郡北漢李陵出居延至浚稽山金塔山在縣