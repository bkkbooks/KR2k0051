里至鄯州又東南四百餘里至河州入黃河黃河漢書西域南北有大山中央有河河有兩源一出蔥嶺一出于闐于闐在南山下其河北與蔥嶺河合東注蒲昌海潛行地下南出於積石為中國河云郭璞山海經注河出崑崙潛行地下至蔥嶺出于闐國復分流岐出合而東注泑澤水經注河水一源西出身毒國蔥嶺之上西去休循二百餘里異物志曰蔥嶺之水分流東西西入大海東為河源河水自此分源東徑岐沙谷分為二水又一源出于闐國南山俗謂之仇摩置自置北流徑于闐國西又西北流注蔥嶺河謂之南河屈東北流又東徑扞彌且末諸國合且末河通為注濱河又東徑鄯善國又東注泑澤又一水自岐沙東分為北河屈東南流徑龜兹焉耆諸國又東徑注濱城至樓蘭注於泑澤後魏書于闐國城東二十里有大水北流號拔樹水即黃河也一名計式水又城西五十五里亦有大水名逹利水與拔樹水合俱北流氐置水漢志龍勒縣有氐置水出南羌中東北入澤溉民田元和志壽昌縣有龍勒水在縣南一百八十里龍勒山上漢李陵發兵至遮虜障東浚稽山南龍勒水上徘徊視虜即此水也五代史沙州西渡都鄉河蓋即此懸泉水在敦煌縣東一百三十里出懸泉山漢將李廣利伐大宛還士衆渴乏引佩刀刺山飛泉湧出即此水也其水有靈車馬大至即多出少至即出少蒲昌海漢書西域傳于闐河與蔥嶺河合東注蒲昌海一名鹽澤者也去玉門陽關三百餘里廣袤三百里其水停居冬夏不增減皆以為潛行地下南出於積石為中國河云括地志鹽澤一名輔日海一名穿蘭一名臨海在沙州西北蒲類海漢遣竇固耿秉等出敦煌崑崙塞擊破白山虜於蒲類海上即此俗名婆悉厥海舊志蒲類海在今土魯番西南漢趙充國屯田於蒲類海交河水漢西域傳車師前國交河城以河水分流繞城下故名元和志交河出交河縣北山上分流於城下因名又徑前庭縣西又有大沙海在柳中縣東南九十里渥窪水沙州境內漢元鼎四年秋天馬生渥窪水中武帝得之作天馬之歌柳谷水元和志柔遠縣柳谷水有東西二源出縣東北天山南流十五里合流白玉河在于闐國城東國人夜視月光盛處必得美玉緑玉河在于闐城西烏玉河城西三河皆源出崑崙山去于闐國西一千三百里每歲秋國人取玉於河謂之撈玉鹽池元和志在敦煌縣東四十七里池中鹽常自生百姓仰給又鹽池海在伊吾縣南三百里周回百餘里又納職縣有陸鹽池在州南六十里周回十餘里無魚水自生鹽月滿則鹽多而甘月虧則鹽少而苦黨河源自南山北流繞城東西藉以溉田色爾騰海在衛西南雪山之陰為青海要道月牙泉在衛南十里藥泉在衛東南石包城味略如酒相傳飲之愈疾靖逆衛南山衛南一百二十里南山之陽又有雪山即古祁連綿亘東西昌馬河衛西南一百二十里由南山口流出東北徑衛城又西北入柳溝衛界赤金所獨登山元和志在廢玉門縣北十里其山出鹽鮮白甘美有異常鹽又玉門縣有神雨山寬臺山在赤金峽之東嘉峪關西山寬如臺故名金山元和志在玉門縣東六十里出金寰宇記引十三州志云金山在延壽縣東有玉石障齊勤山在衛西三十里即蒙古之山硤也當北來西去之通道明參將崔麒追賊至此大捷又遊擊和準自鉢和寺追敗賊於嘉峪關又追敗之於齊勤山蓋襲賊之徑道也石脂水後漢書博物記曰延壽縣南有山石出泉水大如筥處注池為溝其水有肥如煮肉羕羕永永如不凝膏然之極明不可食縣人謂之石漆元和志在玉門縣東一百八十里泉中有苔如肥肉然之極明周武帝宣政中突厥圍酒泉取此脂然火焚其攻具得水愈明酒泉賴以獲濟明一統志石油出肅州南山肅鎮志嘉峪關西有石漆今按赤金東南一百五十里有石油泉土人取以然燈即石脂水也金河五代晉高居誨使于闐記云肅州渡金河西百里又西百里出玉門關是也甘肅通志卷六
