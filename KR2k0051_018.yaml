body:
  text: 甘肅通志卷十八鹽法錢法附鹺政之設因地之利以裕民食以佐邦用經制得宜則民享其利甘屬鹽法靈産於池鞏産於井臨食土鹽課有定額引有定界路遥山險負載﨑嶇課本既重恤商便民權衡損益在因乎時𣙜山澤者鹽與冶俱志鹽法以錢法附甘肅所屬平慶二府分銷寧夏鹽捕㕔經管花馬池之鹽鞏昌府屬分銷漳縣西和二縣之鹽臨洮郡食本地土鹽原額鹽引六萬四千九百張内花馬小池分銷平慶靈州中衞鹽引六萬一千四百四十張額鹽一石徵課銀一錢一分五釐五毫鞏秦二屬分銷漳縣鹽引二千八百一張毎引額鹽一百七十八斤五兩該課銀一兩一錢三釐五毫七絲階屬分銷西和縣鹽引六百五十九張毎引額鹽二百斤二兩該課銀五錢八分五毫一絲六忽原額鹽課土鹽共銀一萬六百一十九兩一分内除寧屬本地動支祭祀等項銀三十二兩九錢九分九釐遇閏加引無加課銀二百八十九兩四錢七分四釐七絲三忽三微三纎三塵三𣺌三漠康熙十五年在於量増鹽課以濟軍需事案内寧鞏二屬毎引加増銀五分共増銀三千二百四十五兩鞏屬遇閏加銀一十四兩四錢一分六釐六毫六絲六忽六微九纎九塵九渺八漠康熙十七年在於遇閏増課等事案内寧屬遇閏加引五千一百二十張寧臨二屬加課銀八百五十一兩四錢四分三釐三毫三絲三忽三微三纎三塵三渺二漠康熙十九年在於鹽課議増等事案内鞏屬毎引加増七分共増銀二百四十二兩二錢遇閏加銀二十兩一錢八分三釐三毫四絲三漠又於商引之歲額有限等事案内文隴寧秦清禮洮靖撫民㕔八處按丁加引九百四十三張加課銀九百七十六兩八錢五分四釐一毫六絲六忽遇閏加引無加課銀八十一兩四錢四釐五毫一絲六忽一微九纎三塵三渺三漠毎引加増五分共銀四十七兩一錢五分遇閏加増銀三兩九錢二分九釐一毫七絲三忽三微三纎三塵三渺六漠毎引加増七分共銀六十六兩一分遇閏加銀五兩五錢八毫三絲三忽六微六纎六塵六渺七漠又於商引之歲額有限等事案内臨屬按丁増税免其領引共増銀三百二十七兩五錢二毫五絲加増五分共銀一百四十一兩七錢七分五釐加増七分共銀一百九十八兩四錢八分五釐又於鹽課之議増等事案内寧屬毎引加増七分共銀四千三百兩八錢康熈二十年在於商引之歲額有限等事案内鞏屬階文徽三處共増引八百四十五張増課銀四百九十兩五錢三分七釐七毫一絲遇閏加引無加課銀四十兩八錢七分八釐一毫四絲二忽五微毎引加増五分共銀四十二兩二錢五分遇閏加銀三兩五錢二分八毫三絲三忽三微三纎三塵三渺三漠毎引加増七分共銀五十九兩一錢五分遇閏加増銀四兩九錢二分九釐一毫六絲六忽六微六纎六塵六渺六漠又於欽奉恩詔事案内將十七年寧屬遇閏加引五千一百二十張寧臨二屬加増銀八百五十一兩四錢四分三釐三毫三絲三忽三微三纎三塵三渺二漠停徵豁免康熈二十一年於鹽課畫一以濟軍需事案内寧屬小池鹽引照綱引酌量加増三分共銀一千八百四十三兩二錢康熈二十五年又於商累未經上聞等事案内部議河東加増七分比照淮浙之例攤入引内作正額徵收至毎引加増五分原題事平之日停止大兵已經撤囘應將加増五分停止等因小池臨鞏二屬共該五分加増並遇閏加銀三千四百九十八兩四分一釐六毫七絲三忽三微六纎六塵六渺七漠停徵在案查二案内豁免遇閏増課並五分加増之外寧屬毎年額引六萬一千四百四十張毎引行鹽一石該課銀二錢一分五釐五毫銀一萬三千二百四十兩三錢二分臨洮府屬例食本地土鹽並無部頒鹽引毎年額徵鹽税並按丁加増共銀五百七十四兩九錢八分五釐二毫五絲原額鹽引三千四百六十張内分銷漳縣鹽引二千八百一張毎引行鹽一百七十八斤五兩該課銀一兩一錢三釐五毫七絲分銷西和縣鹽引六百五十九張毎引行鹽二百斤二兩該課銀五錢八分五毫一絲六忽鞏屬共原額課銀三千四百七十三兩六錢九分又鹽課之議増等事案内加増七分銀二百四十二兩二錢又商引之歲額等事案内隴寧等州縣㕔衞八處按丁加引九百四十三張又階文徽三州縣按丁加引八百四十五張共増課銀一千四百六十七兩三錢九分一釐八毫七絲六忽該加増七分銀一百二十五兩一錢六分以上鞏昌府直𨽻秦州階州原額並按丁増引五千二百四十八張額課不等該徵鹽課並按丁加課及加増共銀五千三百八兩四錢四分一釐八毫七絲六忽遇閏加銀四百四十二兩三錢七分七絲二忽三微六纎二漠以上寧夏小池臨鞏秦階四屬共額鹽引六萬六千六百八十八張額課不等實徵銀一萬九千一百二十三兩七錢四分七釐一毫二絲六忽内除寧屬動支祭祀銀三十二兩九錢九分九釐實應徵解司充餉銀一萬九千九十兩七錢四分八釐一毫二絲六忽遇閏加銀四百四十二兩三錢七分七絲二忽三微六纎二漠自康熈二十六年起至今照數徵解並無新増鹽引寧夏河西道屬寧夏鹽捕㕔靈州花馬小池一産鹽地方一處共鹽井二百眼􅄵夫二百名額徵紙價銀五百二十二兩三錢四分工食銀二千四百五十七兩六錢一鹽引數目毎年額撈鹽六萬一千四百四十石額引六萬一千四百四十張額徵課銀一萬三千二百四十兩三錢二分在於平慶兩府各州縣㕔衞所並寧夏各營堡行銷一平凉府屬行銷州縣衞所一十三處並鹽茶㕔屬紅古等四營堡平凉縣額引五千一百二十張額徵課銀一千一百三兩三錢六分崇信縣額引五百六十五張額徵課銀一百二十一兩七錢五分七釐五毫華亭縣額引一千四百三十張額徵銀三百八兩一錢六分五釐鎮原縣額引五千二百五十二張額徵銀一千一百三十一兩八錢六釐固原州額引一萬六百一十四張額徵課銀二千二百八十七兩三錢一分七釐涇州額引九千五百八十六張額徵課銀二千六十五兩七錢八分三釐靈臺縣額引五千四百張額徵課銀一千一百六十三兩七錢静寧州額引五千五百張額徵課銀一千一百八十五兩二錢五分莊浪縣額引八百張額徵課銀一百七十二兩四錢隆德縣額引四千五百五十張額徵課銀九百八十兩五錢二分五釐鹽茶㕔所屬紅古城等四堡額引三百四十一張額徵課銀七十三兩四錢八分五釐五毫一慶陽府所屬六州縣衞安化縣額引一千五百一十四張額徵課銀三百二十六兩二錢六分七釐合水縣額引八百一十五張額徵課銀一百七十五兩六錢三分二釐五毫環縣額引五百九十五張額徵課銀一百二十八兩二錢二分二釐五毫真寧縣額引五百四十三張額徵課銀一百一十七兩一分六釐五毫寧州額引五千四十張額徵課銀一千八十六兩一錢二分靈州所屬吳忠等一十九堡額引二千三百八十六張額徵課銀五百一十四兩一錢八分三釐中衞屬鳴沙州等十堡額引一千三百八十九張額徵課銀二百九十九兩三錢二分九釐五毫鞏昌府屬漳縣漳河側一産鹽井三孔原設竈户六十五名毎名鹽鍋一口共鍋六十五口毎年請引三千六百二十二道共額徵以及遇閏加増課銀四千六百四兩九錢二分五釐八毫九絲三忽五微二纎六塵七渺一分銷漳縣鹽引各州縣㕔衞所隴西縣原額並按丁加引四百四十九張額徵課銀五百七十兩八錢四分四釐一絲一忽六微六纎六塵六渺六漠寧逺縣原額並按丁加引四百三張額徵課銀五百一十二兩三錢六分一釐一毫四忽三纎三塵三渺四漠伏羌縣額引一百張額徵課銀一百二十七兩一錢三分六釐七毫五絲一忽三微三纎三塵三渺三漠安定縣額引二百張額徵課銀二百五十四兩二錢七分三釐五毫二忽六微六纎六塵六渺七漠㑹寧縣額引二百張額徵課銀二百五十四兩二錢七分三釐五毫二忽六微六纎六塵六渺七漠通渭縣額引一百五十張額徵課銀一百九十兩七錢五釐一毫二絲七忽靖逺縣原額並按丁加引一百一十七張額徵課銀一百四十八兩七錢四分九釐九毫九絲八忽三微三纎三塵三渺三漠漳縣額引八百五十一張額徵課銀一千八十一兩九錢六分六釐五毫一絲五忽七微六纎六塵六渺七漠岷州額引五百九張額徵課銀六百四十七兩一錢二分六釐六絲八微二纎六塵六渺八漠洮州衞原額並按丁加引六十七張額徵課銀八十五兩一錢八分一釐六毫二絲三忽三微三纎三塵三渺四漠西固㕔額引一百張額徵課銀一百二十七兩一錢三分六釐七毫五絲一忽三微三纎三塵三渺四漠直𨽻秦州原額並按丁加引二百四十六張額徵課銀三百一十二兩七錢五分六釐四毫一絲六忽五微清水縣原額並按丁加引一百一十張額徵課銀一百三十九兩八錢五分四毫二絲六忽四微六纎六塵六渺七漠秦安縣額引一百二十張額徵課銀一百五十二兩五錢六分四釐一毫一忽六微西和縣鹽官鎮一産鹽井一孔原設竈尸五十名毎名鹽鍋一口共鍋五十口毎年請引一千六百二十六道毎引一道行鹽二百斤二兩共額徵並遇閏加増課銀一千一百四十五兩八錢八分六釐五絲四忽八微三纎三塵三渺二漠一分銷西和縣鹽引各州縣徽縣原額並按丁加引三百一十六張額徵課銀二百二十二兩六錢九分三釐七毫三微三纎三塵三渺二漠禮縣原額並按丁加引二百三十二張額徵課銀一百六十三兩四錢九分六釐五毫六絲二忽三微三纎三塵三渺三漠兩當縣額引四十張額徵課銀二十八兩一錢八分九釐一絲三忽三微三纎三塵三渺四漠直𨽻階州原額並按丁加引一百五十一張額徵課銀一百六兩四錢一分三釐六毫九絲二忽八微三纎三塵三渺三漠文縣原額並按丁加引六百八十七張額徵課銀四百八十四兩一錢四分七釐八毫四絲六忽成縣額引一百張額徵課銀七十兩四錢七分二釐五毫六絲六忽六微六纎六塵六渺七漠西和縣額引一百張額徵課銀七十兩四錢七分二釐六毫七絲三忽三微三纎三塵三渺三漠臨洮府屬五州縣係食本地土鹽並無部頒鹽引除免過遇閏増課及伍分加増之外實應徵土鹽税及按丁加課並遇閏加増共銀五百七十四兩九錢八分五釐二毫五絲狄道縣額徵課税銀三十八兩六錢七分四釐九毫渭源縣額徵課税銀六兩四錢四分一釐二絲五忽蘭州額徵課税銀一十七兩五錢七分二釐五毫七絲五忽金縣額徵課税銀一十二兩六分二釐四毫五絲河州額徵課税銀五百兩二錢三分四釐三毫附歴代鹽法周鹽人之職鹽人掌鹽政令以共百事之鹽祭祀共其苦鹽散鹽賔客共其形鹽漢武帝四年置鹽鐵官元狩中以東郭咸陽孔僅為大農丞領鹽鐵事五年僅咸陽言山海天地之藏宜屬少府陛下弗私以屬大農佐賦願募民自給費因官器作鬻鹽官為牢盆浮食竒民欲擅斡山海之貨以致富羡役利細民其沮事之議不可勝聽敢私鑄鐵器鬻鹽者釱左趾没入其器物昭帝始元六年詔郡國舉賢良文學之士問民疾苦教化之要皆對願罷鹽鐵酒𣙜均輸母得與天下爭利御史大夫桑𢎞羊難以為國家大業安邊足用之本不可廢也魏明帝世徐邈為凉州土地少雨常苦乏穀邈上修武威酒泉鹽池以收虜穀唐食貨志載鹽州五原有烏池白池瓦池細項池靈州有温泉池兩井池長尾池五泉池紅桃池回樂池𢎞静池㑹州有河池三州皆輸米以代鹽安北都䕶府有胡落池歲得鹽萬四千斛以給振武天德周廣順二年勅令慶州𣙜鹽務今後毎青鹽一石依舊抽税錢八百八十五陌鹽一斗白鹽一石抽税錢五百八十五陌鹽五升此外不得别有邀求宋至道末凡禁𣙜之地官立標識候望以曉民其課鹽通商之地京西則京兆鳳翔府同華耀乾商涇原邠寧儀渭鄜坊丹延環慶秦隴鳳階成州保安鎮戎軍按宋初鹽筴只聽州縣給賣初未有客鈔也雍熈二年令商人所在納銀赴京請領交引葢邊郡入納算請始見於此端拱二年置折中倉令商人輸粟京師葢在京輸粟算請始見於此天聖七年令商人𣙜貨務入納錢銀葢在京入納錢銀算請始見於此天聖八年以兵部員外郎范祥鈔法令商人就邊郡入錢四貫八百售一鈔至解池請鹽二百斤任其私賣得錢以實塞下省數十郡搬運之勞行之既久鹽價時有低昻又於京師置都鹽院陜西轉運司自遣官主之京師食鹽斤不足三十五錢則歛而不發以長下價過四十則大發庫鹽以壓商利使鹽價有常而鈔法有定數行之數年人以為利文獻通考按授人以鹽而徵其錢謂之蠶鹽行之京東諸路免鹽之𣙜而均諸税謂之兩税鹽錢行之河北皆五代法也及其敝也鹽不給而徵錢如故税已納而禁𣙜再行葢誤以二者為經常之賦而不知其源出于鹽也河北之𣙜張方平言之仁宗聽之惠及一道矣獨蠶鹽錢之輸未有能如方平者力言之至和中僅免其十之三惜哉元各州縣户口額辦鹽課運官召商發賣惟陜西運司官毎年預期差人分道齎引遍散州縣陜西食鹽之户該辦課二十萬三千一百六十四錠内鞏昌延安等處認定課鈔一萬六千二百七十一錠慶陽環州鳳翔興元等處歲辦課一萬七千九百八十五錠其餘課鈔因闗陜旱饑民多流亡至順三年鹽課十分為率减免四分行之三載尚多虧負時至元二年監察御史特穆爾布哈及廉訪使胡通奉疏陜西百姓許食解鹽地逺脚力艱澁今後若因大河以東之民分定課程買食解鹽大河以西之民計日攤課任食韋紅之鹽則官不被擾民無蕩産之禍矣且解鹽結之於風韋紅鹽産之於地東鹽味苦西鹽味甘又豈肯舍其美而就其惡乎使陜西百姓一槩均攤解鹽之課令食韋紅之鹽則監吏免廵禁之勞而民亦受惠矣因命陜西行省官及李御史運司同知郝中順㑹鞏昌延安興元奉元鳳翔邠州等官與總帥汪通議俱稱當從特穆爾布哈胡通奉所言限以黄河為界陜西之民從便食用韋紅二鹽解引依舊西行紅鹽不許東渡獨郝同知言運司毎歲辦課四十五萬錠陜西該辦二十萬錠今止認七萬錠餘十三萬錠從何處恢辦議不合而散户部遂參照至順二年例以涇州白家河永為定界聽民食用仍督所在軍民官嚴行禁約毋致韋紅二鹽犯境侵課中書省如所議行之明鹽法靈州鹽課司西和縣鹽井漳縣鹽井洪武間歲辦西和縣一十三萬一千五百三十斤漳縣五十一萬五千六百七十斤靈州二百八十六萬七千四百七斤𢎞治間歲辦靈州西和漳縣共三百五十一萬四千六百七斤萬厯六年歲辦一千二百五十七萬七千六百六十八斤歲解寧夏鎮年例銀一萬三千三百四十二兩延綏鎮年例銀一萬三千七百一十四兩固原鎮客兵銀二千五十九兩固原軍門犒賞銀七千一百二十兩行鹽地方河東行西安鳳翔漢中陜西行鞏昌臨洮延安成化二十三年移萌城批騐所於紅德城堡令黒城乾溝二路鹽車俱抵慶陽府城市卸載商人同店主執引赴府騐過赴行鹽地方貨賣畢引目付店主銷繳𢎞治二年令靈州鹽課司行鹽地方仍舊于平凉静寧隆德慶陽環縣等處嘉靖八年議准大池増三萬三千六百二十六引小池増二萬二千四百一十七引毎引二錢五分卧引銀一錢共一萬九千六百一十五兩送平凉府收貯專備禄糧十四年題准靈州小鹽池額鹽三千一百零五引專供花馬池一帶修邊支用其加増鹽三萬引召商開中三邊輪流買馬或接濟軍餉支用三十四年奏准陜西行鹽地方毎鹽二百斤為一引毎引收銀四錢五分西鹽二分搭配漳鹽八分俱聽分守隴右道監理收銀年終解送花馬池營管糧衙門防秋兵馬支用隆慶五年題准花馬池大小二池鹽毎引照鹽四倍河東令各商報納毎引増銀一錢二分共五錢二分其卧引銀一錢二分西路斗底銀一錢五分共増課銀七千有竒又按固原志北四百里有大小二鹽池畦水日暴成粒無事爨煑所謂青鹽可入藥原設批驗所二一在固原一在慶陽紅德堡廵撫張敷華以固原經過鹽車於静涇二州立厰市收課以備賑濟𢎞治十四年總制秦紘移厰市固原固原兵備主其課引銀移批驗所於慶陽慶陽兵備主其割引銀以備邊用固原立五鹽塲置老人斗行毎厰五百引毎車收門鹽一斗五升石收票銀五釐州庫收備軍需批驗所引收卧引銀一錢州庫收備買馬斗行又納州公用銀十八兩嘉靖二十八年又增斗底牙銀一錢五分一厰五百引共七十五兩以備公用甦里甲之困然斗行過取斗底而豪猾為斗行倍收私放官少利商與里甲受病矣自洪武以来天下鹽課俱開中各邊上納本色米豆故邊方米豆不至甚貴並無年例銀兩自成化八年徙鎮榆林衞増治城砦民供不繼以南京折銀例毎石折銀五分至𢎞治初於運司開中納銀解户部送大倉銀庫收貯分送各邊鹽價銀積至百餘萬人以為利而鹽法壊成化九年差御史一員廵視河東運司并陜西靈州大小二池鹽課其陜西河南所屬分廵各道官帶管鹽法者悉聽節制慶陽府毎歲委佐貳官一員監支靈州鹽課司商人納馬官鹽及民間食鹽康熈六年各省開爐鑄錢甘肅於鞏昌府開局鼔鑄所鑄錢文一面鑄康熈通寳四字一面鑄鞏字後停雍正四年廵撫石文焯摺奏暫開鼔鑄以清錢法於五年四月内設寳鞏局於蘭州按察司經鑄河橋同知監鑄動用藩庫銀二萬兩收買各屬户釐工字小錢並古舊廢錢銅斤入局鼓鑄開爐一十二座七年三月内奉文停止附歴代錢法上古自太昊氏有錢謂之金髙辛氏謂之貨陶唐氏謂之泉商周謂之布齊莒謂之刀禹五年水湯七年旱禹以歴山之金湯以莊山之金並鑄幣以救人困管子先王用珠玉為上幣黄金為中幣刀布為下幣周太公立九府圜法黄金方寸而重一斤錢圜函方輕重以銖司布帛廣二尺二寸為幅長四丈為匹按九府者太府王府内府外府泉府天府職内職幣職金也圜謂均而通也周景王將鑄大錢單穆公諌王弗聽卒鑄大錢文曰寳貨秦兼天下幣為二等黄金以鎰名為上幣銅錢質如周錢文曰半兩重如其文為下幣按二十兩為鎰改周一斤之制半兩則八銖也漢興以為秦錢重難用更令民鑄莢錢至孝文五年為錢益多而輕乃更鑄四銖錢其文為半兩令民縱得自鑄錢故吳諸侯也以即山鑄錢富埓天下鄧通大夫也以鑄錢財過玉者故吳鄧錢布天下而鑄錢之禁生焉自孝文更造四銖錢至是歲四十餘年縣官徃徃即多銅山而鑄錢民亦盗鑄不可勝數姦或盗磨錢質而取鎔錢益輕薄而物貴令縣官銷半兩錢更鑄三銖錢孝武元狩五年有司言三銖錢輕輕錢易作姦詐乃更請郡國鑄五銖錢周郭其質令不可得磨取鎔天鳳元年罷大小錢改作貨布長二寸五分廣一寸首長八分有竒廣八分其圜好徑二分半足枝長八分閒廣二分其文右曰貨左曰布重二十五銖直貨泉二十五唐髙祖武德四年鑄開元通寳錢徑八分重二銖四參積十錢重一兩得輕重大小之中乾封元年鑄乾封泉寳錢徑寸重二銖六分以一當舊錢之十踰年而舊錢多廢開元初宰相宋璟請禁惡錢行二銖四參錢十一年禁賣銅錫及造銅器者二十年千錢以重六斤四兩為率宋太祖初鑄錢文曰宋通元寳凡輕小惡錢悉禁之太宗改元太平興國更鑄太平通寳自後改元必更鑄以年號為文後至王安石為政始罷銅禁姦民日銷錢為器邊闗船不復譏錢之出國用日耗凡鑄銅錢用劑八十八兩得錢千重八十兩十分其劑銅居六分鉛鐵居三分皆有竒凡鑄大鐵錢用鐵二百四十兩得錢千重百九十二兩此其大法也後度支判官許申建議以藥化鐵與銅襍鑄重如銅錢法銅居三分鐵居六分皆有竒贏亦得錢千費省而利厚然鐵澁多不就工人苦之明洪武初置寳源局于應天鑄大中通寳錢與歴代錢兼行已勅户部及各行省鑄洪武通寳錢太宗九年鑄永樂通寳錢宣宗九年鑄宣德通寳錢𢎞治十六年鑄𢎞治通寳錢嘉靖六年鑄嘉靖通寳錢是後毎改元必更鑄錢鑄錢之弊南齊髙帝時奉朝請孔顗上書曰鑄錢之弊在於輕重屢更重錢之患在於難用而難用為累輕輕錢之弊至於盗鑄而盗鑄為禍深人所以盗鑄而嚴治不能禁者由上鑄錢惜銅愛工也所以惜銅愛工者謂錢無用之器以通交易務欲令銅輕而數多使省工而易成不詳慮其患也自漢鑄五銖錢至宋文帝四百餘年制度有廢興而不變五銖者其輕重得貨之宜也以為開置錢府大興鎔鑄錢重五銖一依漢法則府庫以實國用有餘黄氏曰自太府圜法以来以銅為錢或為半兩或為榆莢或為八銖或為四銖不知幾變矣惟漢之五銖得其中五銖之後或為赤仄或為當千或為鵝眼綖繯或為荇葉又不知其幾變矣惟唐之開元為得其中二者之外或以一當三或以一當十或以一當百然皆行之不久而遽變惟其質制如開元者則至今通行焉甘肅通志巻十八
