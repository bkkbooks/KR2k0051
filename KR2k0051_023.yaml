body:
  text: 甘肅通志巻二十三古蹟涼州府武威縣姑臧故城今府治漢置武威郡治十六國春秋光熙元年張軌大城姑臧南北七里東西三里以地有龍形故名卧龍城咸康元年張駿於姑臧城南築城起謙光殿四面各起一殿依四時而居之又有間豫堂前有間豫池水經注姑臧城武威郡及涼州治也本渾邪所築張氏增築四城相去各千歩並舊城為五街衢相通開二十二門王隱晉書曰姑臧縣因姑臧山為名亦故蓋臧城語訛為姑臧焉其城不方有頭尾兩翅名為鳥城又城内有沮渠䝉遜所造七級木浮圖故名七級城一統志姑臧有永昌城在今衞東北三十里元永昌路治此休屠故城在縣北漢書元狩二年霍去病出隴西得休屠王祭天金人又大宛傳太初三年置居延休屠以衞酒泉地理志武威郡領休屠縣魏收志又襄武縣有休屠城水經注武始澤東北流逕馬城東即休屠故城也元和志休屠城在姑臧縣北六十里寰宇記縣有祖厲城一名馬城又有鸇隂城俗名正隂城蓋皆五涼所僑置也張掖廢縣在縣南漢置屬武威郡新唐志涼州南二百里有張掖守捉蓋因舊縣為名鸞鳥廢縣在縣南漢置屬武威郡寰宇記昌松縣有鸞鳥城前涼張軌時有五色鳥見於此因築城以美之後魏改名神鳥武興故城在縣北十六國春秋晉永嘉五年張軌移秦雍流人於姑臧西北置武興郡唐武德八年涼州叛冦睦迦多冦武興即故城也金昌城在縣東南胡氏鑑注金昌在赤岸西北寰宇記昌松縣有金昌城晉將馬隆所築石頭在縣東晉大寧初劉曜軍河上揚聲欲百道俱濟直抵姑臧張茂出次石頭以備之胡氏鑑注石頭在姑臧城東龍彛城通志在縣西即漢戊巳校尉所理靈鈞臺在府城内晉大興中張駿築周輪八十餘堵址髙九仞狄臺在城東五里相傳宋狄青為招討時所築劉林臺在城西北五里舊名竇融臺明洪武初千户劉林戰死於此人重其烈因改今名靈泉池十六國春秋靈泉池在南城中張元靚五年有大鳥青白色集池上舒翼二丈餘後涼呂光嘗宴羣臣於此建康軍在城西二百里祁連山下唐王孝傑開四鎮置軍張守珪嘗為使赤水軍在城内元和志本赤烏鎮以有青赤泉因名軍之大者莫如赤水幅員五千一百八十里前距吐蕃北臨突厥唐開元中改為大斗故移赤水入州城也寧冦軍後周保定中置號同城戍在城東北十里唐號同城守捉天寶中置軍𨽻張掖守捉永昌縣番禾故城今縣治漢置屬張掖郡唐屬涼州元和志天寶縣東至州一百八十里本漢番禾縣元志有永昌路本西涼府地至元十五年以永昌王宮殿所在置明設衛治金山之陽顯美故城在縣東漢置屬張掖郡後漢改屬武威郡三國魏黄初中涼州盧水胡反張既討之敵引還顯美既自武威復進軍顯美擊破之隋志姑臧舊有顯美縣周廢驪靬廢縣在縣南漢置屬張掖郡晉改屬武威郡永和十年張祚遣和昊伐驪靬戎於南山大敗而還即此顔師古曰取國名為縣也驪力遲反今土俗人呼驪靬疾言之曰力䖍焉支故城在縣西晉永嘉五年張軌置武興郡統焉支新鄣二縣魏收志番和郡領鄣焉支二縣開皇中併力乾安寧廣城鄣焉支五縣地入之恩宿在縣南十六國春秋苻堅建元十二年茍萇伐涼遣别將馬暉杜周帥騎西出恩宿邀張天錫走路期會姑臧暉等行澤中值氷失期堅特宥之大斗軍在縣西南通鑑集覽云涼州有大斗軍因大斗㧞谷為名總志在涼州西二百里唐開元中以赤水軍守捉改大斗軍西接張掖東連武威故曰大斗天寳六年以哥舒翰為大斗軍副使即此交城守捉在縣西唐置元和志在涼州西二百里又新唐志天寳縣有通化鎮鄂爾多古城在縣東南一百二十里俗傳為永昌王牧馬城地名廣城兒有永昌王避暑宮遺址尚存今畧黄城兒在詹詹口南八十里金昌城在縣北二十里地名金川又有破古城在縣北與昌寧砦相近又有金沙城在縣西南邊外今畧破古城在寧逺堡西北三十里鎮番縣小河灘城今縣治元存空城周三里有竒明成化中展築嘉靖二十五年巡撫楊博疏言鎮番地方北出涼州二百餘里曠逺寥廓實與宣府獨馬石營相類唐人謂於涼州北境磧中建置城垣即此處也乃今風沙壅積幾與城埒萬一猾虜突至因沙乘城宜添築關廂一則消除沙害一則增置重險從之武威故城在縣北漢置屬武威郡水經注武威縣在姑臧城北三百里馬城河經其城東漢太初四年昆邪王殺休屠王以其衆置武威縣屬郡即此宣威故城在縣南漢置屬武威郡水經注馬城河東北流逕宣威縣故城南元和志有明威戌在姑臧縣北一百八十里即故宣威也武安廢郡在縣西南後魏置地形志凉州有武安郡領宜盛一縣隋志姑臧有魏置武安郡西魏廢元和志姑臧有武安戍在縣西北一百六十里蓋即故縣也白亭廢軍在縣東唐書大足元年郭元振為涼州都督舊州界南北不過四百里元振始於南境置和戎城北界磧中置白亭軍拓州境一千五百里元和志白亭軍在姑臧縣北三百里馬城河東岸舊置守捉天寶十年哥舒翰改置軍因白亭海為名都司志有古城在衛北一百里相近有連城又有三角城在衛北一百十里與上二城鼎足相峙蘇武牧羝處在衞東南三十里蘇武山俗傳蘇武牧羝於此雍大記云西北拱來伏之岫東南峙子卿之山謂此也古浪縣和戎城今縣治唐書大足元年郭元振為涼州都督於南境峽口置和戎城元至元初於和戎城立巡檢司明江亨因舊水名改為古浪昌松故城在縣西元和志縣西北至涼州一百二十里本漢蒼松縣後涼改置昌松郡縣屬焉開皇初改永世復曰昌松有麗水府在縣城中蒼松故城在縣東北十里久視元年吐蕃將奔布支冦涼州圍逼昌松縣大使唐休璟與戰於洪池谷敗之漠口廢縣在縣南十六國春秋晉隆安三年秃髪烏孤謀伐涼使其將金樹屯昌松漠口秃髪傉檀嘉平元年姚興使其子弼等來伐濟自金城進次漠口魏收志昌松郡領莫口縣即漠口也周廢揟次故城在縣北漢置屬武威郡孟康曰揟如予反次音咨三國志魏黄初二年張既討盧水胡潛由且次出武威且次即揟次也晉志謂之揖次大寧三年有黄龍見於揖次之嘉泉魏收志揖次縣屬昌松郡隋志周廢揖次入昌松白山廢縣在縣東漢置樸􅯑縣屬武威郡孟康曰音蒲環寰宇記漢樸􅯑縣後為魏安在昌松東隋志昌松有魏置魏安郡周改置白山縣尋廢有白山新唐志昌松縣東北一百五十里有白山戍葢即故縣也烏城守捉在縣南新唐志在涼州東南二百里巴爾斯城一統志在縣西北二百里明正統十年靖逺伯王驥言陜西黄河迤北蘓海圖地面要害宜析靖虜衛中所軍於彼建立千户所其靖虜衞地非要害乞將全衛移立巴爾斯以扼虜衝勅命副都御史曹翼督治之既而翼奏巴爾斯在涼州東南二百五十里莊浪東北二百里應於此屯兵實足控禦外夷屏蔽内地而蘓海圖地面狹隘宜將原調靖虜中所軍於巴爾斯築城建置而罷蘓海圖役從之正徳十年總督彭澤言先年涼州副總兵趙英莊浪叅將魯鑑俱撥有官軍在巴勒巴爾斯暖泉蘓海圖等堡按伏蓋虜欲入犯必擁衆大松山探我虛實從巴勒巴爾斯等處分道而入此處有備縱有小失不至大挫自成化十二年後副總兵李寛等稱各堡孤逺掣回原役官軍百年險扼一失而各處城堡屯田皆棄境外使賊得侵入吾境宜踏勘舊址修復不果秦邊紀畧在鎮番東寧夏中衛之西亦謂之大沙子山明伏羌伯實生其地控扼涼夏屏藩莊靖故明制抽調邊兵更番按伏其後皆言水頗不足遂停止而涼之北面各築邊堵以代之不知自鎮番而東接乎中衛皆漢家行軍舊道棄而不守則南如莊浪靖虜遂當其衝故莊靖以鎮番中衞為左右門户而巴勒巴爾斯又當棖闑之間也古浪志巴爾斯在古浪縣東北今名大靖營設營制屬古浪縣平番縣金城屬國漢宣帝神爵二年夏五月趙充國振旅而還秋羌斬楊玉以降置金城屬國以處之西南為沿門古城又西為射斗城廣武故城在縣東南元和志廣武南凉秃髪烏孤都也又曰廣武縣南至蘭州二百二十五里本漢枝陽縣前涼張駿分晉興置廣武郡水經注逆水逕廣武城西故廣武都尉治枝陽故城在縣南接蘭州界漢置屬金城郡晉廢前涼張氏復置分枝陽屬廣武郡後魏廢水經注湟水逕枝陽縣逆水注之令居故城在縣西北漢置地理志縣屬金城郡西羌傳武帝西逐諸羌乃渡河湟築令居塞建武十年置䕶羌校尉於令居孟康曰令音連顔師古曰音零永登廢縣在縣西南晉建興四年張寔置屬廣武郡水經注㵎水自令居南逕永登亭西葢即永登縣治也允街故城在縣南漢置屬金城郡章懐太子曰故城在昌松縣東南臨麗水亦名麗水城寰宇記其城地勢極險沮渠䝉遜増築以為防戍之守元明圮廢振武城在縣西北晉永和二年石趙將麻秋攻涼陷金城涼將謝艾引兵出振武擊秋破之胡氏通鑑注振武在姑臧城南廣武西北長最城在縣南永和三年石趙將麻秋擊涼濟河城長最涼將謝艾軍神烏前鋒敗趙兵進擊秋破之秋遁歸金城隆安初後涼吕光擊乞伏乾歸軍於長最遣其子纂攻金城㧞之纒縮城在縣南晉太元初苻秦伐涼其將梁熙濟自清石津攻河㑹城茍萇濟自石城津與熙等㑹攻㧞纒縮城舊志河㑹城葢在大河與湟河㑹處纒縮城與故廣武相近楊非亭在縣西晉太元初秦兵濟河攻纒縮城涼將馬建懼自楊非退屯清塞水經注楊非亭在廣武北五代時有楊非谷首嶺葢即楊非亭之訛也街亭城在縣北十六國春秋秃髪烏孤太初元年據廣武吕光遣竇茍來伐戰於街亭涼兵大敗水經注街亭城又在楊非亭西北古城在縣北六十五里岔口之東偏夏趙元昊所築以拒兵元設防守明洪永間廢巴爾斯城今名大靖營汛屬古浪縣大通河古城去縣西一百三十里宋神宗熙寧間王韶使王厚收復河湟因大通河地形險要控扼夏境乃築塞以制夏人鐵褁城在縣東一百八十里金城志云火州即此寧夏府寧夏縣寧朔縣懷逺故城即今府城本漢富平縣地後周置懷逺縣唐儀鳯二年為河水泛損三年乃更築新城於故城西宋乾興二年李徳明城懷逺鎮為興州元昊升為興慶府元伐夏改中興府至元二十五年置寧夏路明洪武九年改置寧夏衞靈武廢縣有三一為漢縣在府西北地理志屬北地郡後漢省一為隋縣在府東北即渾懷鄣一為唐縣在府南即水經注所謂胡城也元和志靈武縣東南至靈州一十八里後魏破赫連昌收其户徙之於此因名保靜廢縣在府東南靈州界隋開皇十一年置𢎞靜縣唐屬靈州神龍元年改為安靜至徳元年又改保靜寰宇記引隋圖經云𢎞靜本漢城居河外三里乃舊薄骨律鎮倉城也宋咸平四年李繼遷改懷逺縣及保靜即此府志在鎮南六十里髙臺寺城府東一十五里有廢城臺在其東元昊建寺於此元時呼為下省久廢上河城在府南水經注河水自胡城又逕上河城東世謂之漢城又北逕典農城東俗名為呂城皆馮參為上河典農都尉所屯以事農者新堡城元和志在懷逺縣西北四十里永昌元年置舊名千金堡元昊故宮在賀蘭山之東有遺址又振武門内有元昊避暑宮明洪武初址尚存後改為清寧觀慶王府在南薫門内通衢之右明洪武三十五年慶靖王自韋州遷此基址尚存海寶塔在振武門外三里相傳為赫連勃勃所建百八塔在青銅峽内有古塔共一百八座在黄河岸左其創建不可考又有坎離窑青崖窟不計其數洪門鎮唐邠寧節度使張獻甫所築夏號洪州古戰塲即月湖廣斥無水草逺望瑩然畢照俗傳古戰塲也平羅縣古將臺在縣西北其地平曠圍三十里有將臺旗礩遺址靈州靈州故