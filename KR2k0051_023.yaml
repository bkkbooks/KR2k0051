楊氏始衰梁天監五年魏盡有漢中遂擊楊氏而滅之仇池之興始終凡二百一十一年建安城在縣北本名歴城後改建安隋志有建平縣後周省入倉泉即建安也通典曰建安城在同谷郡西七里去仇池九十里龍門戍在縣西南仇池東南濁水城在縣西南亦曰濁水戍水經注漢水東南逕濁水城南又濁水出濁城北皆即此赤亭在縣西南後漢虞詡破羌於此絳帳臺在縣東北一百七十里相傳漢馬融設教處杜甫宅在飛龍峽口東杜甫寓秦曾過夏於栗亭文縣隂平故城在縣西北古羌氐地漢武開西南夷置隂平道為廣漢郡蜀漢建興七年諸葛亮遣陳式攻武都隂平克之景耀六年姜維聞鍾㑹治兵關中表請遣張翼分䕶隂平橋頭既而魏將鄧艾自隂平入蜀由邪徑行無人之地七百餘里鑿山通道造作橋閣山髙谷深艾以氈自裹推轉而下將士皆攀木縁崖魚貫而進遂至江油華陽國志蜀克隂平魏亦遥置隂平郡屬雍州及蜀亡始合為一隂平自晉永嘉以後氐羌據之不為正朔所班至後魏平蜀始置文州理隂平郡隋罷州唐武徳初復為文州治曲水縣唐大厯十四年西戎犯邊刺史㧞城而走建中三年以舊城在平地窄小難守移故城東四里髙原上即今城也寰宇記曲水縣在南北二江之曲直西五里平地唐徙髙阜號曰文臺宋端平後兵亂州廢長松廢縣在縣西南百里本隂平縣地西魏析置建昌縣為盧北郡治兼置文州隋開皇初郡廢改縣曰長松以地多喬松為名大業初州廢唐屬文州貞元六年省入曲水正西廢縣在縣西南五十五里西魏置屬文州隋屬武都郡唐貞觀元年省入曲水甸氐故道在縣西漢志廣漢郡領甸氐道白水出焉晉省姜維故城在縣東七里姜維築此與鄧艾相守鄧艾城在縣東七里即魏景元四年鄧艾伐蜀時所築郭公城在縣東昔魏郭淮攻廖化於隂平所築水經注白水自合羌水又東逕郭公城南廢扶州在縣西魏置鄧州後改寧州唐初為扶州大厯中廢為鎮以屬文州元領同昌帖夷尚安鉺川四縣俱廢今按遺址在舊城西一百六十里夾清江域中有橋梁多平壤宜稻麥久為番所據盧北城在縣東五十里昔時戍守處後周置隋廢因葭蘆鎮為名安昌城在縣東北三十二里舊戍守處也後魏嘗置安昌郡於此西魏廢帝立寧州修築此城為州治飛仙閣在縣西一十五里山岩刻飛仙閣三字玉枕在縣東山有石狀如玉枕在巉壁間人跡所不能到但可望見之而已下有驛曰玉枕驛今廢文臺在舊文州治後天牢山麓宋劉鋭登此死節直𨽻肅州肅州酒泉故郡今州治漢置乃西羌通驛之路通典曰縣有古長城漢遮虜障也前涼張軌西涼李暠北凉沮渠䝉遜並都之隋志張掖郡領福禄縣舊置酒泉郡元和志後魏太武平沮渠氏以酒泉為軍屬燉煌鎮孝昌中改鎮為𤓰州復置酒泉郡開皇三年罷郡立酒泉鎮所領縣並屬甘州仁壽二年以境宇遼逺分置肅州河西舊事云福禄城謝艾所築城下有金泉味如酒故曰酒泉舊志有酒泉縣本漢福禄縣唐初更名西五十里有興聖皇帝祠安彌廢縣在州東漢置綏彌縣屬酒泉郡後漢改曰安彌晉因之後魏縣廢又漢志酒泉郡領天依縣後漢省顔師古曰其地有天依坂故名今無考威逺城在州東北新唐志肅州有酒泉威逺二守捉城肅鎮志威逺城在衛東北三百八十里明初立為所後因失悞秋表内部查究訛傳誅徙人民懼俱入西域今有旗杆山即當時立旗招撫叛民處威虜城在州東北明初置衛尋廢嘉靖七年番夷牙木蘭等内附巡撫唐澤議於肅州迤北境外威虜舊城及天倉墩毛目城白城子等地散處其衆二十八年監生李時暘上言邊外屬夷舊為土魯番所迫逐環肅城雜居不便巡撫楊博檄副使王儀等修葺威虜并金塔寺古城添設白烟墩等城堡凡七墩臺十有二安置番帳七百餘所於是肅城數十年番害頓平肅鎮志威虜城在衛東北一百三十里又白城子在衛東北一百二十里今皆廢金塔寺古城在衛東北六十里今為堡遮虜障在州北元和志在酒泉北二百四十里李陵與單于戰處隋鎮將楊元於其地得銅弩牙箭簇寰宇記酒泉有故長城在縣北漢書謂之遮虜障舊志古長城在衛北四百里東自狼心山西至哈密北山一帶俱有遺址又衛城極北有北大路元時為往來通道久廢轍跡猶存髙臺縣髙臺站今縣治都司志本漢樂涫縣地明洪武五年馮勝定河西置髙臺站因西有臺子寺為名正統中張掖人劉寛建言於鎮城西一百六十里設所景泰七年始設髙臺千户所舊志髙臺在所西二十里有古臺基相傳李暠所築後人建寺其上表是故城在縣西漢置屬酒泉郡後漢曰表氏五行志靈帝光和三年張掖表氏地動湧水民舍皆傾縣易處更置城郭章懷太子曰表氏故城在張掖西北杜氏通典張掖有表氏故城在西北又曰昭武城建康故城在縣南晉置十六國春秋咸康元年張駿分建康郡屬涼州呂光龍飛二年沮渠男成自樂涫進逼建康推太守段業為主稱涼州牧建康公後魏廢新唐志甘州西北一百九十里祁連山下有建康軍證聖初置名勝志建康城在所西南四十里舊志有建康軍城在所東南十里鎮夷營在縣西北明洪武二十九年都指揮馬溥於黒河之北築堡為哨馬營三十年就馬營展築設鎮夷千户所三十三年革永樂初總兵宋晟復奏置後為黒河衝决天順八年移今治樂涫廢縣在縣西南漢置後魏廢隋志有周置樂涫縣尋廢元和志肅州領福禄縣西至州一百里本漢樂涫後魏太武帝平涼改縣為戍𨽻燉煌鎮孝文帝改為樂涫縣隋改縣為鎮武德二年改置福禄縣取舊名也舊唐志福禄縣於舊樂涫故城置後陷西番廢㑹水廢縣在縣西北漢置屬酒泉郡地理志北部都尉治偃水障東部都尉治東部障闞駰曰衆水所會故名後魏廢祁連戍在縣西南元和志在福禄縣東一百二十里胭脂城在縣西南周一里毛目城在縣西北又有平朔城二城皆周二里相傳元時守禦屬威逺衛古連城在縣西北安西㕔晉昌故城在肅州西今安西衛西南本漢冥安縣屬敦煌郡因縣界冥水為名晉改屬晉昌郡周武帝省入涼興郡隋開皇四年改為常樂縣唐置𤓰州屬河西道吐蕃傳開元十五年攻陷𤓰州毁其城俄而張守珪為刺史修築之大厯十三年陷於西番大中五年張義潮以𤓰州來歸宋屬西夏夏亡州廢元至元十四年復立屬沙州路二十八年徙居民於肅州但名存而已明永樂二年建齊勤䝉古千户所東至肅州界四百三十里本故𤓰州地也今畧嘉峪西二百四十里為齊勤䝉古衛淵泉廢縣在肅州西今栁溝衛地漢置屬敦煌郡後漢因之闞駰曰地多泉水故名晉志元康五年分屬晉昌郡隋志周併淵泉入常樂章懷太子曰淵泉故城在晉昌東北廣至故城在肅州西今沙州衛地漢置屬敦煌郡晉因之周併大至冥安淵泉為涼興縣一統志云大至即廣至隋開皇初併入常樂唐改隋常樂為晉昌而别置常樂縣於此屬𤓰州杜氏通典廣至故城在常樂縣東後隨州陷廢舊志有涼興城在廢𤓰州西一百七十里敦煌廢郡在肅州西今沙州衛西古𤓰州亦月支戎地漢武帝元鼎六年分酒泉置敦煌郡應劭曰敦大也煌盛也晉志郡治昌蒲領敦煌縣十六國春秋咸康元年張駿分敦煌晉昌髙昌三郡及西域都䕶戊巳校尉玉門大䕶軍三營為沙州水經注敦煌郡南七里有鳴沙山故亦曰沙州隋裴矩西域圖記自敦煌至於西海凡為三道北道從伊吾至蒲類海中道從髙昌南道從鄯善總凑敦煌為咽喉之地隋志敦煌郡舊置𤓰州治敦煌縣周併入鳴沙縣大業初復置郡改鳴沙為敦煌唐復置沙州元和志沙州東至𤓰州二百里西至吐蕃界三百里北至伊州七百里治敦煌縣又有豆盧軍神龍元年置在州城内宋景祐二年趙元昊取沙州元太祖二十二年破其城至元十四年復立沙州十七年升為沙州路總管府明永樂三年置沙州衞正統十一年廢效穀廢縣在肅州西今安西衛西漢置屬敦煌郡桑欽曰縣本魚澤障也元封六年崔不意為魚澤尉教民力田以勤效得穀因立為縣故名後漢及晉因之隋志周併效穀縣及效穀郡入敦煌龍勒故城在肅州西今沙州衛西漢置屬敦煌郡後漢及晉因之周併入敦煌唐改置夀昌縣屬沙州以縣南夀昌澤為名新唐志夀昌縣治漢龍勒城隨州陷廢陽關廢縣在肅州西今沙州衛西漢書西域三十六國東則阨以玉門陽關地理志龍勒縣有陽關玉門關皆都尉治晉置陽關縣屬敦煌郡後省元和志陽關在夀昌縣西六里以居玉門關之南故曰陽關本漢置謂之南道西趨鄯善莎車後魏嘗於此置陽關縣周廢五代髙居誨使于闐記出玉門關入吐蕃界西至沙州南十里鳴沙山又東南十里三危山其西渡都鄉河至陽關是也安定衛在罕都衛西沙州衛南本韃靼别部其地廣袤十里無城郭廬舍明洪武七年安定王布延特穆爾遣使入貢立安定鄂端二衛永樂十一年其孫伊瑪丹來朝成化中為土魯番殘破正徳七年額布勒破安定據其地餘衆内徙嘉靖復命部酋領其衆然安定王後無傳而鄂端久没莫知其處察遜衛在安定衛西古西戎部落明洪武四年置察遜衛授土酋薩竒蘓永樂四年徙治藥王灘宣徳以後屢入朝貢成化中為土魯番所擾率部屬内徙遂失故地罕都衛在齊勤䝉古南嘉峪關西南本漢敦煌郡地明洪武三十年其長索諾木策喇實遣使入貢立罕都衛授之與齊勤哈密同主西域各國貢道至𢎞治中土魯番據哈密侵掠鄰境諸部皆不能支王徳中䝉古大酋入青海罕都益遭蹂躪其衆益衰後土魯番犯肅州罕都復殘破相率求内徙其城遂棄不守罕都左衛在沙州衛故城明成化時建初罕都部人阿克展與種族不相能數仇殺乃率其衆逃居沙州耕牧部落日蕃益不受罕都統屬至其子巴特瑪斯結久住沙州朝廷屢敕還本衛不奉命正統中沙州全部内徙巴特瑪斯結盡據之孫嘉克嗣職部衆益盛時土魯番侵據哈密嘉克請自立一衛與相抗乃置罕都左衛𢎞治十七年衛喇特及安定部人大掠沙州嘉克不能自存正徳十一年其子竒塔特被土魯番廹脅徙肅州塞内其部下特黙格圖卜二人仍居沙州服屬土魯番㑹番酋徵求苛急嘉靖七年率所部來歸沙州遂為土魯番所有苦峪城在廢𤓰州東東至肅州四百里明天順四年哈密忠順王母訥衮塔舒爾主國被北部竒木嘉色稜襲破其城率親屬部落走苦峪成化中哈密都督哈尚又為土魯番阿里所襲退居苦峪時哈尚方依罕都齊勤而二衛自相讎殺哈尚勢益孤朝命築苦峪城移哈密衛於其地其後哈尚糾衆襲哈密破之還居故土𢎞治中忠順王善巴為土魯番阿哈瑪特所執哈密居人亦以窮窘難守盡焚室廬走肅州詔賜牛具榖種并發流寓三種番人及哈密之寄居齊勤者盡赴苦峪及𤓰沙州俾自耕牧以圖興復正徳後土魯番益張苦峪諸城皆為所殘破鄯善故城在肅州西今在沙州衛西漢書鄯善國本名樓蘭王治扞泥城去陽關千六百里元鳳四年傅介子刺殺樓蘭王更立其弟尉屠耆為王更名其國為鄯善水經注鄯善國治伊循城其樓蘭扞泥城謂之東故城隋本紀大業五年伐吐谷渾以其地置鄯善郡地理志鄯善郡置在鄯善城即古樓蘭城也有蒲昌海鄯善水領顯武濟逺二縣隋亂廢舊志在哈密衛東南且末故城在肅州西今沙州衛西漢書且末國治且末城東至鄯善七百二十里後魏書太平真君三年鄯善王西奔且末後遂役屬鄯善且末西北有流沙數百里夏日有熱風為行旅之患後屬吐谷渾隋大業五年平吐谷渾置且末郡地理志且末郡置在古且末城有且末水薩毗澤領肅寧伏戎二縣隋亂廢新唐書自于闐東關東行入大流沙行千里至古折摩耿即古且末也舊志且末城在曲先衛西南伊吾故城在肅州西北今沙州衛西北本漢匈奴地後漢書永平十六年北征匈奴取伊吾盧地置宜禾都尉以屯田遂通西域西域傳自敦煌西出玉門陽關渉鄯善北通伊吾千餘里自伊吾北通車師前部髙昌壁千二百里伊吾地宜五穀桑麻葡萄故漢甞與匈奴爭之以制西域其後復為西域及匈奴所據隋大業四年遣薛世雄擊伊吾伊吾請降世雄於漢伊吾城東築城號新伊吾留戍而還唐貞觀四年置西伊州六年去西字天寶初曰伊吾郡乾元初復曰伊州在敦煌大磧之外南去玉門關八百里東南去陽關一千里元和志伊州治伊吾縣本後漢伊吾屯又領柔逺納職二縣皆唐貞觀四年立髙居誨使于闐記沙州西曰仲雲小月支之遺種其牙帳居胡盧磧即漢伊吾盧地舊志伊吾城元時族屬哈納實喇封威武王居此明永樂元年遣使入貢明年設哈密衛在諸衛極西為西域襟喉其後累被土魯番奪據哈密衛在肅州西北一千八百里南抵沙州西距和卓北連衞喇特即古伊吾地其城在平川約周三四里南北二門苦峪城在哈密東南東去肅州四百里髙昌故城在肅州西北今沙州衛西北本車師前王國也漢元封三年擊破姑師分為車師前後王及山北六國其車師前王國治交河城河水分流繞城下故名地節二年鄭吉田渠犁車師宣帝元康中罷車師田者徙其國令居渠犁以車師故地與匈奴神爵三年置西域都䕶匈奴益弱不得近西域初元元年始置戊巳校尉屯田車師前王故地西域傳前王城去長史所居栁中八十里自伊吾北通車師前部髙昌壁千二百里自髙昌壁北通後部金蒲城五百里此西域門户故戊巳校尉更互屯焉伊吾栁中皆膏腴之地故漢嘗與匈奴爭車師伊吾以制西域云十六國春秋晉咸康元年張駿使沙州刺史楊宣定西域又禽戊巳校尉趙貞以其地為髙昌郡後魏書髙昌東西三百里南北五百里四面多大山地勢髙敞人庶昌盛故云髙昌去敦煌十三日行國有八城地多石磧氣候温暖北有赤石山七十里有貪汗山夏有積雪此山北即鐵勒界也真君中沮渠氏據其地和平元年為蠕蠕所併蠕蠕以闞伯周為髙昌王其稱王自此始也自敦煌向其國多沙磧道里不可凖記惟以人畜骸骨及駝馬糞為驗又有魍魎怪異故商旅徃來多取伊吾路云隋書髙昌都城周回一千八百四十歩唐貞觀十四年壅掠西域朝貢詔侯君集等討之分兵畧定凡三郡五縣二十二城西昌州改曰西州更置安西都䕶府天寶初改交河郡乾元初復曰西州置郡曰髙昌取舊髙昌國為名又有天山軍在州城内開元二年置領栁中交河天山蒲昌四縣貞元中州沒吐蕃五代時為回鶻所據宋末號畏吾兒國其地南距于闐西南距大食波斯西距西天歩路渉雪山葱嶺皆數千里有水源出金嶺導之周回國城以溉田元太祖五年平其地置達嚕噶齊監之明初改曰和卓在哈密西七百里至肅州一千七百五十里其栁中訛為栁陳永樂宣徳間俱遣使入貢成化以後土魯番强而和卓之後無聞矣庭州故城在肅州西北今沙州衛西北本漢車師後王國也漢書後王治務塗谷後漢書後王居去長史所居栁中五百里北與匈奴接永平十七年置戊巳校尉屯後王部金蒲城章懷太子曰金蒲城即車師後王庭今庭州蒲昌縣舊唐志貞觀十四年討髙昌西突厥遣其葉䕶屯兵浮圖城與髙昌相影響一統志云浮圖即務塗之轉音也及髙昌平懼而來降以其地置庭州長安二年改北庭都䕶府治金蒲縣又領輪臺蒲類二縣五代時為囘鶻所據宋史王延徳至髙昌歴交河川凡六日至金嶺嶺上有龍堂刻石記云小雪山也度嶺一日至北庭西扺安西即唐之西境云元史囘紇五城即唐北庭都䕶明初地屬和卓後亦併於土魯番金蒲廢州在肅州西北今沙州衛西北唐書沙陀者西突厥别部處月種也處月居金婆山之陽蒲類之東有大磧名沙陀故號沙陀突厥貞觀中統屬於賀魯貞觀末賀魯降詔拜為瑶池都督徙其部於庭州之莫賀城處月亦内屬永徽初賀魯反攻破之罷瑶池都督府即處月地置金蒲沙陀二州長安二年以處月酋沙陀金山為金蒲城都督貞元中附於吐蕃徙部甘州遂廢安西故城在肅州西北今沙州衛西北本漢龜兹國也漢書龜兹國王治延城東至都䕶治所烏壘城三百五十里十六國春秋呂光討西域破龜兹入其城城有三重廣輪與長安城等塔廟宫室甚盛西域傳龜兹國在尉犁西北白山之南一百七十里東去焉耆九百里南去于闐一千四百里西去疏勒一千五百里北去突厥牙帳六百餘里東南至𤓰州三千一百里漢舊國也其王姓白即白震之後所居城方五六里其南三百里有大河東流號計式水即黄河也唐書貞觀二十一年討龜兹徙安西都䕶府於其國統于闐疏勒碎葉號四鎮永徽中以其地為龜兹都督府儀鳯中沒於吐蕃長夀元年王孝傑破吐蕃復四鎮復置安西都䕶府於龜兹五代時復為回鶻所據宋史龜兹本回鶻别種舊志有額爾巴拉在哈密西一千六百七十里東西凡三千餘里南北二千餘里元初地名巴實伯里憲宗分建諸王哈坦於此世祖立宣慰司後又置元帥府以領屯田明時其國王遣使入貢龜兹國城在其西南也烏壘城在肅州西北今沙州衛西北漢書烏壘城西至龜兹國三百五十里去陽關二千七百三十八里土地肥饒於西為中故都䕶治焉渠犁城在肅州西北今沙州衛西北漢書渠犁城在烏壘南三百三十里至龜兹五百八十里武帝伐大宛之後置校尉屯田於此地節二年鄭吉田渠犁輪臺城在肅州西北庭州之西亦曰侖頭今沙州衛西北漢書侖頭皆作輪臺桑𢎞羊奏言故輪臺以東捷枝渠犁皆故國地廣饒水草可遣屯田卒置校尉詔曰輪臺西於車師千餘里欲起亭燧是勞擾天下非所以優民也朕不忍聞昭帝時以扞彌太子賴丹為校尉田輪臺與渠犁地相連也後魏書龜兹國東有輪臺唐置輪臺縣以故城為名非即故地也于闐故城在肅州西今沙州衞西漢書于闐國治西城後魏書于闐國在且末西北葱嶺之北二百餘里東去鄯善千五百里南去女國二千里北去龜兹千四百里其地方亘千里連山相次所都城方八九里部内有大城五小城數十城東三十里有苜㧞枝河出玉石新唐書于闐所居曰西山城王姓尉遲氏名屋密本臣突厥貞觀六年遣使入獻上元初以其地為毗沙都督府析置十州舊唐志安西府領毗沙鎮本于闐國也五代晉髙居誨使于闐記自仲雲西渉鹻磧陷河又西至紺州于闐所置也在沙州西南去京師九千五百里矣又行二日至安軍州遂至于闐其國東南曰銀州盧州湄州其南千三百里曰玉山云漢所窮河源出于闐而山多玉者此山也舊志于闐在哈密西南四千八百里至肅州六千三百里東抵察遜北連額爾巴拉焉耆故城在肅州西北今沙州衛西北漢書焉耆國治員渠城近海水多魚王莽時始建國後漢書焉耆國居南河城北去長史所居八百里其國四面有大山與龜兹相連道險阨易守有海水曲入四山之内周匝其城三十餘里後魏書焉耆國在白山南七十里南去海十餘里東去髙昌九百里西去龜兹九百里皆沙磧東南去𤓰州二千二百里其王姓龍名鳩尸卑那都城方二里國内凡有九城恃地多險多剽刼中國使真君九年詔萬度歸討之以後入朝唐貞觀二十二年討龜兹以其地為焉耆都督府天寶常朝貢五代以後不復見舊志焉耆國在額爾巴拉東東去和卓七百里疏勒故城在肅州西北今沙州衛西北漢書疏勒國王治疏勒城後漢書疏勒國去長史所居五千里後魏書疏勒國在姑黙西白山南百餘里南有黄河西帶葱嶺東至龜兹一千五百里東北至突厥牙帳千餘里東南至𤓰州四千六百里漢舊國也都城方五里國内有大城十二小城數十髙宗末其王遣使獻佛衣其後臣於突厥唐書疏勒國王居伽師城姓裴氏自號阿摩支髙宗時為安西四鎮之一天寶中來朝五代以後不復見莎車故城在肅州西北今沙州衛西北漢書莎車國王治莎車城有塞山出青玉後漢建初五年班超上言莎車疏勒田地肥廣草木饒衍兵可不費中國而糧食自足章和元年擊莎車降之其後為匃奴所滅舊志莎車城在于闐西北又西北為疏勒城碎葉城在肅州西北今沙州衛西北唐初西突厥之地也唐書貞觀十四年西突厥咥利失可汗分其國為十部左五咄陸部居碎葉東右五弩失畢部居碎葉西號十姓部落貞觀末安西都䕶府統碎葉鎮後西突厥别部烏質勒寖盛屯碎葉西北稍攻得碎葉即徙居之謂碎葉川為大牙弓月城伊麗水為小牙其地東直西庭州聖厯二年遣子來朝舊志碎葉城在焉耆西北哈密衛在嘉峪關西一千六百里漢伊吾盧地明帝置宜禾都尉領屯田唐為伊州宋入於囘紇元末以威武王納蘓呼喇鎮之尋改為肅王明永樂初遣使來貢馬改封忠順王賜金印四年立哈密衛其地北衛喇特西土魯番東沙州罕都齊勤諸衛正統中其王達斡達實拉被鄰國侵掠天順中王母主國事衆益離散成化八年土魯番蘓勒坦阿里襲破其城執王母奪金印以歸哈密絶封者十餘年至𢎞治元年以托歡特穆爾外孫哈密都督哈尚襲封忠順王土魯番阿哈瑪特誘殺之據其地時哈密酋帥阿穆爾請援兵襲破其城天子却其貢拘留使臣阿哈瑪特懼以城印來歸五年以故忠順王托克托從孫善巴為忠順王主哈密而阿穆爾勾引哈喇輝夷人潜往土魯番地方盜馬殺人阿哈瑪特攻哈密殺阿穆爾執善巴以歸留酋帥伊蘭據其地八年巡撫許進與總兵劉寧襲哈密伊蘭遁去阿哈瑪特獻還善巴十一年王越總制三邊兼理哈密仍復善巴舊封修哈密城善巴嗜酒掊克失衆心部下阿巴拉等咸怨十七年隂搆阿哈瑪特迎其㓜子津特穆爾主哈密善巴懼挈家走苦峪時肅州百户董傑與哈密酋帥雅克巴拉抵哈密謀誅阿巴拉送善巴還國津特穆爾還土魯番正徳元年善巴子巴雅濟襲封八年巴雅濟以貪殘致怨走入土魯番莽蘇爾遣人據哈密要重賞時總制彭澤量犒金幣始以金印來獻既又索取無厭十一年莾蘇爾分兵脅沙州衛擁衆入㓂至兎兒壩遊擊苪寧禦之戰殁賊薄肅州城兵備副使陳九疇固守絶其内應賊知事洩慮援兵至大掠而去嘉靖三年閉嘉峪關絶西域貢自是置哈密不問而土魯番猶許其通貢其後哈密為實伯音徳爾子穆爾瑪哈穆特所有服屬土魯番朝廷猶令比嵗一貢迄隆慶萬歴間猶入貢不絶云土魯番在哈密西八百餘里至肅州一千八百五十里即漢車師前部之交河城屬和卓永樂六年番僧青拉率其徒來朝命為國師其徒法泉等為僧綱司歴年朝貢十三年授其酋長為都督都指揮等官宣徳正統天順間皆恭順成化初阿里始强控弦五萬自稱蘓勒坦華言王也九年攻破哈密𢎞治元年誘殺哈密王哈尚四年以哈密來歸明年阿哈瑪特復攻執哈密王善巴遂自稱為汗畧罕都諸衛七年朝議閉嘉峪關絶西城貢十年阿哈瑪特以絶貢失互市窘急乞歸善巴貢如舊正徳元年莽蘇爾逐哈密王巴雅濟既而還之八年復據哈密十一年冦肅州敗去嘉靖三年入犯甘州敗去四年復據哈密犯肅州八年復據哈密耕種沙州隆慶中穆蘇穆爾嗣自是朝貢不絶四夷考土魯番一名土爾番本交河縣之安樂城城方三里地平四面皆山其西二十里有崖兒城城僅二里相傳為故交河縣治靖逆廳沙頭廢縣在肅州西漢置池頭縣屬酒泉郡後漢改曰沙頭三國志魏黄初初敦煌功曹張恭遣弟華攻酒泉沙頭縣即此晉志元康五年分沙頭縣屬晉昌郡後魏廢玉門廢縣在肅州西九百餘里漢置屬酒泉郡地理志玉門關在龍勒縣西北一百十八里敦煌縣西北元和志謂之北道西趨車師前庭及疏勒為西城之門户後漢永元中班超久在西域上書言不敢望到酒泉郡但願生入玉門關闞駰曰漢罷玉門關屯戍徙其人於此置縣故名又晉志元康五年别立㑹稽新鄉二縣屬晉昌郡隋志敦煌郡領玉門縣魏置㑹稽郡周廢郡併㑹稽新鄉延興為會稽縣開皇中改為玉門併得魏玉門郡地唐屬肅州元和志縣東至州二百二十里本漢舊縣後魏孝明帝改為玉門郡周武帝省入㑹稽縣隋改為玉門縣開元中為吐蕃所陷因於縣城置玉門軍天寶十四年哥舒翰奏廢軍重置縣新唐志貞觀元年廢後復置隨州陷廢杜氏通典晉昌郡南至新鄉鎮一百八十里五代晉髙居誨使于闐記自肅州渡金河西百里出天門關又西百里出玉門關經吐蕃界亦即故縣也寰宇記玉門縣長三百里有石門周匝山間裁經二十里衆泉北流入延興海又十六國春秋建初三年分酒泉中州人五千戶置廣夏郡又分置武威武興張掖三郡皆無考延夀廢縣在肅州西南今靖逆衛東南後漢置屬酒泉郡晉因之後魏廢寰宇記縣在郡西劉昭注延夀縣有石漆元和志石脂水在玉門東南一百八十里延夀縣當在其地或曰隋志之延興即此乾齊廢縣在肅州西漢置屬酒泉郡地理志西部都尉治西部障孟康曰乾音干三國志魏黄初初張恭攻酒泉乾齊縣即此晉改屬燉煌郡後魏省騂馬廢縣在肅州西晉志酒泉郡領騂馬縣後魏廢寰宇記昔有騂馬二匹為敵所掠數載自還以其地為邊防因立騂馬戍涼寧廢郡在肅州西晉置魏收志為梁寧領園池貢澤二縣周隋時省齊勤䝉古衛嘉峪關西行二十里曰大草灘又三十里曰黒山兒又七十里曰回回墓墓西四十里曰騸馬城並設墩臺置瞭卒城西八十里即齊勤䝉古本漢燉煌郡地明洪武十三年都督濮英西討次白城獲䝉古平章呼圖克特穆爾進至齊勤站獲豳王額琳沁及其部曲千四百人金印一師還復為䝉古部人所據永樂二年有塔爾尼者自稱丞相庫珠子率所部來歸乃設齊勤䝉古所尋升衛至善巴塔爾㓜弱成化十九年鄰番伊瑪克哷來侵齊勤殘破不復振正徳中被土魯番蹂躪部衆不能自存盡内徙肅州之南山其城遂空嘉靖七年授善巴塔爾子索諾木舒為都督統治其部帳又按一統志衛東至肅州界四百三十里與鎮志不合其舊城基址俱無考甘肅通志巻二十三
