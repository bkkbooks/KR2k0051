body:
  text: 甘肅通志卷四十七藝文記唐裴度西平王李公碑記惟天錫成命於我唐保兹國祚生此大傑則西平王李公其是乎不然何覆暴如風振稿葉戴君若鼇冠靈山橫流之中一匡而定公諱晟字良器其先隴西人徙京兆曾祖嵩皇岷州刺史祖思恭皇洮州刺史贈幽州大都督考欽皇金吾衛大將軍隴右節度經略副使贈太子太保代有名迹雄於西土公幼好學學不為人及讀吕張孫吳之書慨然有經邦濟物之志未弱冠遊秦涼間元侯宿將見者咸器異之乾元初嘗客武都值渠豪以缺守搆亂殺略平人公與所從十數騎馳而射之殪其為魁者餘黨遂遁冦所虜獲積如丘山公一無所取椎牛釃酒享士而去邦人感服具狀以聞特拜左清道率飾金紫將朝京師自獻方略冦盜紛擾有土急賢河隴將帥相繼表用歷二府右職所至常以才謀為其委重纍遷至光祿太常卿階爵在第一品涇原四鎮北庭節度都知兵馬使懸識冦態周知地形應變不窮有奪有豫驥驟庭而莫展雲出岫而斯飛代宗徴以左金吾衛將軍為神䇿兵馬使屬羌蠻犯蜀朝廷濟師命公督禁旅絶棧道而往救焉公銜枚過險出賊不意連下堅壁遂誅首惡還授檢校太子賔客且復舊職建中二年田悅以魏叛德宗極意致討悉起徂征以公為神䇿先鋒都知兵馬使加御史中丞與河東河南等道諸軍合擊公濟河而行能以衆正及破洹水陳解臨洺圍轢魏屬城抵燕通邑其摧鋒衄鋭皆先羣帥而勩力焉遙拜左散騎常侍兼御史大夫厥功未成聞賊泚肆逆皇居失守西嚮慟哭載馳載驅行及代北授檢校工部尚書充神䇿行營節度公提孤軍募散卒拊循訓勵以達行在值懷光中叛大駕再遷加檢校右僕射餘如故尋轉左僕射同平章事兼京兆尹神䇿軍京畿鄜坊節度觀察管內及商華等州副元帥公固守渭城決平秦壘調食制用先發我私捐甘攻苦皆自我始每一言一誓聲淚俱發勇夫義士感而使之蔑不濟矣時自雍而東延於汝洛震於河汴所在征鎮亂掠相從公介巨盜之間使聲援斷絶立成師之法致號令嚴肅搜補十旬指揮一舉乘墉壑而通軌道磔梟獍以清宫禁俾九市三條無輟肆之驚無秋毫之犯羽書速告鑾輅爰歸廓氛祲為祥光攄憂憤為喜氣詩曰允矣君子展也大成斯之謂歟考古視今論功稱忠者多矣若至危而安至難而易卓犖跨邁如公莫儔拜司徒兼中書令俄以凶孽未寧邊防猶警岐下任重乃以本官兼鳳翔尹鳳翔隴右節度觀察使及四鎮北庭涇原等州副元帥改封西平郡王加食邑實封至一千五百戶公名懾遐方政和蕃部始至而生植少安而訓齊逮四載賦輿十倍其初會詔入輔拜太尉中樞如故或謂公勳望已髙寵渥已極宜從容頤養稍稍遜避公曰不然人臣外則盡力內則盡心若止偷榮孰為且哲故每承帷幄之間則言咈無隱理奪不回大指以東夏可平西陲可復或已行而事終不顯或未用而身遽不遺以貞元九年八月四日薨於位春秋六十七德宗撫几哭於寢次自都邑達關畿無士庶無老幼皆發哀相弔則曩時安人戢兵之德可謂浹於元元之骨髓矣明贈太師賻賵加等以其年十二月十六日葬於髙陵縣奉正原鄭國夫人杜氏祔焉自捐寢至安宅皆上所辦護中貴反覆萬情所奉如不及焉嗚呼以公之靖難扶傾不言所利雖存殁極位始終殊禮而天意若曰其福享未至故迤延於後有子曰願故檢校司空河中節度等使贈司徒五列雄鎮三為上公曰聰故光祿司主簿曰揔故太子中允贈兵部郎中曰懸左神武大將軍贈洪州都督曰恕故光祿卿贈右散騎常侍曰慿故右威衛大將軍曰憲檢校左散騎常侍嶺南觀察等使進因貴胄達以善政曰訴故檢校左僕射同中書門下平章事贈太尉克廣前修仍執醜逆曰懿故渭南尉曰聽檢校司徒義成軍節度使統戎安俗是以似之曰惎右羽林將軍曰殷嵐州刺史並地勢吏用兼而有焉粵太和元年秋七月聽拜疏上言以公之徽烈則御製碑文於渭川矣以公之風度則詔命圖形於靈臺矣惟大其丘隴鬱彼松檟望有祁山之象拜無峴首之碑將刋貞石式表幽隧乃命臣度稱代言詩其詞曰建中季年大盜忽焉皇輿避冦狩於梁川顧謂太師汝才汝略將威致討必殄冦虐太師泣奉捐軀誓衆度其成城可以利用赫矣墉壑傅於牆垣手搏足踦如衝如援一鼓而破一麾而奔掃清宫闈刷蕩妖昏我師涖止我令行矣都人不知己事方喜飛章告慶飭駕言旋鴻烈耀古歡聲動天車服之錫河山之誓九命而俯一心若厲俾侯於岐阜安邊陲藩政既成衮職攸宜嶽降帝賚矢言危詞我后嘉猷我躬何為道直氣和勞謙終吉福履所綏未至萬一上天不惠厚穸遄歸垂裕流光用延恩暉翼子承家將壇台席繼立竒功代傳休績聽與伯仲永懷髙蹤請於朝廷表是丘封帝曰孝哉胡可不從宣我祖之丕業繄爾父之嘉庸乃詔作銘以觀億齡韓愈故相國權公碑上之元和六年其相曰權公諱德輿字載之其本出自殷帝武丁武丁之子降封於權權江漢間國也周衰入楚為權氏楚滅徙秦而居天水略陽苻秦之王中國其臣有安丘公翼者有大臣之言後六世至平涼公文誕為唐上庸太守荆州大都督長史焯有聲烈平涼曾孫諱倕贈尚書禮部郎中以藝學與蘇源明相善卒官羽林軍録事參軍於公為王父郎中生贈太子太保諱臯以忠孝致大名去官纍以官徴不起追諡貞孝是實生公公在相位三年其後以吏部尚書授節鎮山南年六十以薨贈尚書左僕射諡文公公生三歲知變四聲四歲能為詩七歲而貞孝公卒來弔哭者見其顔色聲容皆相謂權氏世有其人及長好學孝敬祥順貞元八年以前江西府監察御史徴拜博士朝士以得人相慶改左補闕章奏不絶譏排姦幸與陽城為助轉起居舍人遂知制誥凡撰命詞九年以類集為五十卷天下稱其能十八年以中書舍人典貢士拜尚書禮部侍郎薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意奏廣歲所取進士明經在得人不以員拘轉戶兵吏三曹侍郎太子賔客復為兵部遷太常卿天下愈推為巨人長德時天子以為宰相宜參用道德人因拜禮部尚書同中書門下平章事公既謝辭不許其所設張舉措必本於寬大以幾教化多所助與維匡調娛不失其正中於和節不為聲章因善與賢不矜主已以吏部尚書留守東都東方諸帥有利病不能自請者公常與疏陳不以露布復拜太常轉刑部尚書考定新舊令式為三十編舉可長用其在山南河南勤於選付治以和簡人以寧便以疾求還十三年某月甲子道薨於洋之白草奏至天子痛傷為之不御朝郎官致贈錫官居野處上下弔哭皆曰善人死矣某年某月日葬於河南北山在貞孝東五里公由陪屬升列年除歲遷以至公宰人皆喜聞若己與有無忌嫉者于頔坐子殺人失位自囚親戚莫敢過門省顧朝莫敢言者公將留守東都為上言曰頔之罪既貰不竟宜因賜寬詔上曰然公為吾行諭之頔以不憂死前後考第進士及廷所䇿試士踵相躡為宰相達官與公相先後其餘布處臺閣外府凡百餘人自始學至疾未病未嘗一日去書不觀公既以能為文辭擅聲於朝多銘卿大夫功德然其為家不視簿書未嘗問有亡費不偫餘公娶清河崔氏女其父造嘗相德宗號為名臣既葬其子監察御史璩纍然服喪來有請乃作銘文曰權在商周世無不存滅楚徙秦嬴劉之間甘泉始侯以及安丘詆訶浮屠皇極之扶貞孝之生鳳鳥不至爵位豈多半塗以稅壽考豈多四十而逝惟其不有以惠厥後是生相君為朝德首行世祖之文世師之流連六官出入屏毗無黨無讐舉世莫疵人所憚為公勇為之其所競馳公絶不窺孰克知之德將在斯刻詩墓碑以永厥垂卻昻岐邠涇寧四州八馬坊頌碑垂象者元上昭乎天廏天駟體元者聖下列乎庾人校人驥稱其德亦已遠矣願言馬之志曾有意乎粵若乾道為良坤元利牝駒從渥水駿發中廬屈産貴其能鳴雁門多其美脊豈止宗生冀北功施汧西而已哉自相士運其天機孫陽明其骨性夫贊涖其前後許衛評其色毛悲伐任其股膺寒管議其唇齒麻朝訿其頰頦女厲辨其目眸昔軒轅得之過寒門穆滿得之遊崑崙周王得之平東鄰漢帝得之定西秦我髙祖得之四方至我開元得之五輅備敢問毛蟲三百六十其誰力多於是乎夏殷以還經傳莫紀周制廏馬始頒厥官凡十二間馬三千四百五十六始皇吞并宇內六萬騎之國馬盡歸秦漢武大修甲兵崇飭戰馬至四十萬匹是多乎哉自魏及隋天下騷動勞疲死轉數不足徴我有唐之新造國也於赤岸澤僅得牝牡三千匹命太僕張萬歲傍隴右馴字之四十年間孳息成七十萬六十匹屬張氏替職圉師敗官馬之教駣日失其序逮開元初惟得二十四萬匹至十九年復成四十四萬匹今之盈縮亦不甚過上耕籍之明年命我邠公典斯馬政公齊其飲食視其良駑廥芻庌涼網惡去害天子以公有伯翳宜生之德爰錫土田日磾圉養之功真堪宰相即召公入掌三事外司百揆調飪鼎實緝熙帝繇夷吾果理於髙徯咎單諶暢於伊尹帝曰若豫邠之後亮采惠疇僉曰元祐帝曰俞咨祐汝作小司空兼孜牧圉李公言成允令才實允宗恪居本朝能率大戞載習載步之秣之疏穢鎮浮受劑聽訟匪燒匪剔斯馬斯材荷天之寵未可涯也判官尚乘奉御長孫朂壽安尉賀蘭弼華隂主簿常冀並心懸規鏡家韞賜書投刃靡全應機立斷侣昌門之驂乘行翼聖仙偕子况之能官坐登卿相有原迓浦非大而何雅所謂愷悌君子干祿愷悌信矣先是國家以岐山近甸豳土晚寒寧州壤甘涇水流惡澤茂豐草地平鮮原當古公走馬之郊接非子犬丘之野度其四境分署八坊其五在岐其餘在三郡保樂第一蘇忠主之甘露第二劉義尸之南普潤第三田敬董之北普潤第四邵業監之岐陽第五李行守之太平第六馬慶尹之宜祿第七曾睿領之安定第八李仙正之八人者或折衝禦侮或果毅嫻兵射御不違始終惟一又命朝散大夫都苑總監韋績總以統之韋公敢行利物克壯遠猷悉心效官盡瘁事國口授諸吏躬親百為攻特執駒禁蠢春原驅䗽撫和趣馬慰薦扈人陳損益以示其方明賞罰以防其慢立封凖以程其課均衆寡以節其宜告之以畏威申之以誘掖曰善而筐􅜹而瓔纕除而兹翦而蓋偕當循爾職制無使我馬元黃抱公絶私匪怒伊教君子曰韋公之􅋏下如此欲辭福祿得乎人從話言馬賴調豢將蕃其類必謹其初故春祭房星尊祖也夏祭先牧尚養也秋祭馬社敬乘也冬祭馬步存神也然後時其出入偵其肥羸一其種性殊其皂櫪旌别淑慝無相奪倫試言夫名且曰獻狀其名則汗血山子桃驂緑耳金喙騰黃騶吾吉光蒲梢啓服野糜娥鹿白蟻雞斯蜚鴻母兒遺風腰裊兹白鐡離項王之騅符主之騧桓氏之驄晉侯之駮魏公絶影唐國驌驦劉之的顱吕之赤兔其狀則八尺之𩣊七尺之騋六尺之駮三尺之果下文臂花肩隂唇白顛握蜿作足昆蹄素懸縞形如練紫目如電有龐有騱有􅨎有驠隲騇異羣驪騵亦分散如摛錦聚若屯雲若乃審其容貌觀其尾鬛司其正骨鑑其回毛膺為宜桀肘為咸陽幹為茀方背為閼光水火又明城郭又張逸躍翹陸䟃𧽼局顧升巚齕草降阿飲沱騤而翔馺而走如龍如彪或寢或吪驫至特立仰鳴俯噴威儀變態不可談羣田事既昭軍容大備有馬如此何憂乎兵由是判官長上果毅都尉成公雅貞尹承順兼諸寮吏及四郡齊人八方長戶因雜然相與謀曰天子亭育我邠公覆露我李公司牧我韋公噢休我君臣同德其利溥哉若不毛舉數事指牧大較雖𨽻圉之後將不食其餘且保樂者隋石門馬坊也其舊制逼狹多歷年所棟折榱摧隤牆填塹甘露先置在九成苑外土良薦美不逮苑中今兹數公得請於帝有詔令新保樂徙甘露所云創葺許用正錢今則量抽掌間供飼國馬數內商𣙜納其資課回給工人計一歲省庫錢七百貫有竒以約財禆國其利一也甲令曰諸坊馬每年四月十一日停料野放今則以三月中候陽崖墳盈春草先長使停稿穀俾逐川原計一歲減菽粟四千石箕杆三萬圉徯來年之用以隨時預蓄其利二也八坊營田一千二百三十餘頃析置十屯密邇農家悅來租墾王在京邑則稅其生芻天旋洛師乃藏厥嘉實歲中收貯二萬五千石新蒸倍之以安氓盡地其利三也又緣馬所須羈絆翦刷釜鑊畚帚油藥灌劀之物乂疀滌除之器比年皆旁勞州縣長度公錢誅求無時不給其用寖以承弊人多懼憂今則權差夫丁率自采造成二萬六千五百三十石升枚具歲中省百姓供費三千貫以柅煩激惰其利四也內廏馬每年有瘠者病者老者疲者擇其不任者以頒諸坊則必餧之艾之行之節之俟其跳梁俟其充腯而後入之以內癯起廢其利五也是五者有仁人焉有正政焉何獨師古始為成憲則知從邠公之教可以阜從李公之法可以經從三判官之幹蠱可以事事無留從韋公之詞可以孜孜不怠古者有勞於國則紀之有功於人亦紀之里克賦在坰之頌燕公篆監收之作吾從二史臣之後安敢墜於斯文其詞曰天生乘玉兮德山陵澤馬於阜兮屢惟休至徴君命臣力兮庶績其凝八坊載就兮畢來斯升岐山之下兮田疇好涇水之將兮多媺草繚垣墉兮積芻稿天馬來兮從東道羣紫燕兮駢緑蛇骨象竒兮歸帝家毛御風兮蹄踐雪舉籋雲兮低噴沙既伯既禱兮無災害有駜有容兮真沛艾縞身朱鬛兮又白顛睨影長鳴兮聲造天今安匹兮龍為友吾君馭兮夀千年宋范仲淹寧州狄梁公廟記天地閉孰將闢焉日月蝕孰將廓焉大厦仆孰將起焉神器墜孰將舉焉巖巖乎克當其任者惟梁公之偉歟公諱仁傑字懷英太原人也祖宗髙烈本傳在矣公為子極於孝為臣極於忠忠孝之外揭如日月者敢歌於廟中公嘗赴并州掾過太行山顧瞻河陽見白雲孤飛曰吾親在其下久而不能去左右為之感動詩有陟岵陟屺傷君子于役弗忘其親之深吁嗟乎孝之至也忠之所由生乎公嘗以同府掾當使絶域其母老疾公謂之曰奈何重太夫人萬里之憂詣長史府請代行時長史司馬方眥睚不協感公之義歡如平生吁嗟乎與人交而先其憂况君臣之際乎公為大理丞決諸道滯獄萬七千人天下服其平武衛將軍權善才坐伐昭陵柏髙宗命戮之公抗奏不却上怒曰彼致我不孝左右矚公令出公前曰陛下以一樹而殺一將軍張釋之所謂假有盜長陵一抔土則將何法以加之臣豈敢奉詔陷陛下於不道帝意解善才得恕死吁嗟乎執法之官患在少恩公獨愛君以仁何所存之遠乎髙宗幸汾陽宫道出妬女祠下彼俗謂盛服過者必有風雷之災并州發數萬人别開御道公為知頓使曰天子之行風伯清塵雨師灑道彼何害哉遽命罷其役又公為江南巡檢使奏毁淫祠千七百所所存惟夏禹泰伯季子伍員四廟曰安使無功血食以亂明哲之祠乎吁嗟乎神猶正之而况於人乎公為寧州刺史能撫諸夏郡人紀之碑及遷豫州會越王亂後緣坐七百人籍沒者五千口有使促行刑公緩之密表以聞曰臣言似理逆人不言則傷陛下好生之意既成復毁意不能定彼咸非本心惟陛下矜焉有詔貸死流於豐州道過寧州之舊治父老迎而勞之曰我狄使君活汝輩耶相攜哭於碑下齋三日而去吁嗟乎古謂民之父母如公則過焉斯人也死而生之豈父母之能乎時宰相張光輔率師平越卒之亂將士貪暴公拒之不應光輔怒曰州將忽元帥耶對曰公以三十萬衆除一亂臣彼脅從輩聞王師來棄城而降者萬計公縱暴兵殺降以為功使無辜之人肝腦塗地如得上方斬馬劍加於君頸雖死無恨光輔不能屈奏公不遜左遷復州刺史吁嗟乎孟氏有言威武不能屈是為大丈夫其公之謂乎公為地官侍郎同鳳閣鸞臺平章事為來俊臣誣搆下獄公曰大周革命萬物維新唐室舊臣甘從誅戮因家人告變得免死貶彭澤令獄吏嘗抑公誣引楊執柔公曰天乎吾何能為以首觸柱流血被靣彼懼而謝焉吁嗟乎陷穽之中不義不為况廟堂之上乎契丹陷冀州起公為魏州刺史以禦焉時河朔震動咸驅民保郛郭公至下令曰百姓復爾業冦來吾自當之敵聞風而退魏人為之立碑未幾入相請罷戍疏勒等四鎮以肥中國又請罷安東以息江南之饋輸識者韙之北兵再冦趙定間公出為河北道元帥敵退就命公為安撫大使前為敵人所脅從者咸逃散山谷公請曲赦河北諸州以安反側朝廷從之吁嗟乎四方之事知無不為豈虛尚清談而已乎公在相日中宗幽房陵則天欲立武三思為儲嗣一日問羣臣可否衆皆稱賀公退而不答則天日無乃有異議乎對曰有之昨陛下命三思募武士歲時之間得數百人及命廬陵王代之方數日之間應者十倍臣知人心未厭唐德則天怒令䇿出又一日則天謂公曰我夢雙陸不勝者何對曰雙陸不勝宫中無子也復命䇿出又一日則天有疾公入問閣中則天曰我夢鸚鵡雙趐折者何對曰武者陛下之姓相王廬陵王則陛下之羽翼也是可折乎時三思在側怒發赤色則天以公屢言不奪一旦感悟遣中使密詔廬陵王矯衣而入人無知者乃召公坐於簾外而問曰我欲立三思羣臣無不可者惟俟公一言從之則與卿長保富貴不從則無復得與卿相見矣公從容對曰太子天下之本本一搖而天下動陛下豈以一心之欲輕天下之動哉太宗百戰取天下授之子孫三思何與焉昔髙宗寢疾令陛下權親軍國陛下奄有神器數十年又將以三思為後如天下何且姑與母孰親子與姪孰近立廬陵王則陛下萬歲後享唐之血食立三思則宗廟無祔姑之禮臣不敢愛死以奉制陛下其圖焉則天感泣褰簾使廬陵王拜公而謂曰今日國老與汝天子公哭仆地則天命左右起之拊公背曰豈朕之臣社稷之臣也已而奏曰還宫無儀孰為太子復置廬陵王於龍門備禮以迎中外大悅吁嗟乎定天下之業斷天下之疑其至誠如神雷霆之威不得而變乎則天嘗命公擇人公曰欲何為曰可為將相者公曰如求文章則今宰相李嶠蘇味道足矣豈文士齷齪思得竒才以成天下之務乎曰此朕之心也公曰荆州長史張柬之真宰相才誠老矣一朝用之尚能竭其心乃召拜洛州司馬他日又問人於公對曰臣前言張柬之雖遷洛州猶未用焉改秋官侍郎及召為相果能誅張易之輩返正中宗復則天為皇太后吁嗟乎薄文華重才實其知人之深乎又嘗引拔桓彥範敬暉姚元崇等至公卿者數十人公之勳德不可殫論有議論數十萬言李雍載之别傳論者謂松柏不夭金石不柔受於天焉公為大理丞抗天子而不屈在豫州日拒元帥而不下及居相位果能復廢主以正天下之本豈非剛正之氣出乎誠性見於事業時優遊縉紳之中顛而不扶危而不持者亦何以哉仲淹謁公之祠而述焉且系之曰商有三仁弗救其滅漢有四皓正於未奪嗚呼武暴如火李寒如灰何心不隨何力可回我公哀傷拯天之亡逆長風而孤鶱遡大川以獨航金可革公不可革孰為乎剛地可動公不可動孰為乎方一朝感通羣隂披攘天子既臣而皇天下既周而唐七世發靈萬年垂光噫非天下之至誠其孰能當張載大順城碑記曰兵久不用文修武縱天警我宋羌蠢而動恃地之強謂兵之衆傲侮中原如撫而弄天子曰嘻是不可捨養姦縱殘何以令下講謨於朝講兵於野鍖刑斧誅選付能者皇皇范侯開府於慶北方之師坐立以聽公曰彼羌地武兵徑我士未練宜勿與競當避其強徐以計勝吾視塞口有田其中賊騎未近卯橫午縱余欲連壁以禦其衝保兵儲糧以俟其窮將吏曹掾軍師走卒交口同辭樂贊公命月良日吉將奮其旅出卒於營出器於府出幣於帑出糧於庾公曰戒哉無敗我舉汝礪汝戈汝鑿汝斧汝干汝誅汝勤汝與既戒既嚴遂及城所索木箕土編繩奮杵敵騎之來百十其伍自朝及晨衆積我倍公曰無譁是亦何害彼姦我乘及我未備勢雖不敵吾有以恃爰募強弩其衆纍百依城而陳以堅以格戒曰謹之無鬭以力去則勿追罷我以役賊之逼城傷死無數莫大我加因潰而騖公曰可矣我功汝全無怠無遽城之惟堅勞不纍曰池埤以完深以如泉巋焉如山百萬雄師莫可以前公曰濟矣吾議其旋擇士以守釋民而遷書勞賞才以斂以筵圖列而上薦聞於天天子曰嗟我嘉汝賢錫號大順因名其川于金于湯保之萬年陶穀王母宫碑記祭法曰法施於人則祀之辨方之為法制也不亦大哉神有所職足以垂訓者孰可闕焉按爾雅觚竹北戶西王日下謂之四荒王母事迹其來久矣名載方䇿理非語怪西周受命之四世有君曰穆王享國五十載乘八駿宴瑤池捧王母之觴乃歌黃竹西漢受命之四世有君曰武帝享國亦五十載期七夕會甘泉降王母之駕遂薦仙桃周穆之觀西極也濯馬潼飲鵠血踐巨搜之國乃升弇山故汲冡有穆天子傳漢武之禱靈境也祀雍畤幸朝那立飛廉之館以望玄圃故樂章有上之回曲嗚呼湘靈鼓瑟虞舜二妃也黃姑有星天河織女也或楚詞所傳或巫咸所記猶能編祀典配嚴祠簫鼓豆籩預四時之享犧牲玉帛陪百神之祭豈若王母為九光聖媛統三清上真佩分景之玉劍納瑤瓊之鳳舄八琅仙璈以節樂九色班驎而在馭嘯詠則海神鼓舞指顧則嶽靈奔走輔五帝於金闕較三官於綘河位冠上宫福流下土則回中有王母之廟非不經也年祀寖遠棟宇隳壞壇欹杏朽蔽荆棘於荒庭井廢禽亡噪烏鳶於古壘物不終否崇之在人太師清河公受脤建牙三臨安定軍功政事紀在旗常是邦也壓涇水之上遊控西羌之右地土宜菽麥俗習騎射撫之有道則風能偃草馭之非理則水亦覆舟中權失政不可一日而處矧三鎮乎歲戊辰春二月公介圭入覲天子設庭燎以延之奏肆夏以寵之臨軒絶席以綏懷大輅繁纓而錫命禮成三接詔還舊鎮公既旋所理來謁靈廟齋莊有感肸蠁如答申命主者鳩工繕修剃蔓草於庭除封植嘉樹易頺簷於廊廡締搆宏材丹青盡飾於天姿黼藻增嚴於羽帳雲生畫棟如瞻西土之遙水閲長川若訝東溟之淺容衛既肅精誠在兹何須玉女投壺望明星於太華瑤姬感夢灑暮雨於陽臺合徴幼婦之辭庶盡上真之美穀也學非博古才不逮時論思謬冠於詞臣敘事敢踰於實録久直金鑾之殿視草無功強窺朱雀之窗偷桃知愧頌曰崑崙之墟崦嵫之下戴勝蓬髮虎豹為伍是耶非耶怪哉王母丹臺命駕七夕為期雲軿鳳輦劍珮光輝倩兮盼兮穆若仙姿宅元都兮如彼降漢宫兮若是奚靈聖之多端駭變化之神異考山經與竹書故兩留於前事山之巔兮水之湄奠玉斝兮薦金徽白雲零落歸何處黃竹摧殘無一枝撫弇山之舊石紀涇水之仙祠元潘昻霄窮河源記河源在吐蕃朵甘斯西鄙有泉百餘泓或潦水沮洳渙散方可七八十里且泥弱不勝人迹近觀弗克傍立髙山下視燦若列星以故名鄂端諾爾譯言星宿海也羣流奔湍近五七里滙二巨澤名鄂楞諾爾自西徂東連屬吞噬廣輪馬行一日程迤邐東騖成川號齊必勒河二三日程水西南來名伊爾齊合齊必勒三四日程水南來名呼蘭又水東南來名伊拉齊合流入齊必勒其流寖大始名黃河然水清人可涉又一二日岐裂八九股名伊遜鄂羅木譯言九渡通廣六七里馬亦可渡又四五日程水渾濁土人抱革囊乘馬過之民聚部落糾集木幹象舟傅毛革以濟僅容兩人繼是兩山岐束廣可一里二里或半里深莫測矣朵甘斯東北鄙有大雪山名伊拉瑪博囉其山最髙譯言騰格哩哈達即崑崙也山腹至頂皆雪冬夏不消土人言遠年成氷六月見之自八九股水至崑崙行二十六日程河行崑崙南半日程既又四五日程至地名庫濟及克特二地相屬又三日地名哈喇伯勒齊爾四達之衝也多冦盜有官兵鎮防崑崙迤西人簡少多處山南山皆不穹峻水亦散漫獸有犛牛野馬狼狍羱羊之類其東山益髙地亦漸下岸狹隘有狐可一躍而越之處行五六日程有水西南來名納琳哈喇譯言細黃河也又兩日程水南來名竒爾穆蘇二水合流入河河北行轉西至崑崙北二日程地水過之北流少東又北流入河半月程至歸德州地名必齊勒始有州治官府州𨽻河州置司吐蕃等處宣慰司所轄又四五日程至積石州即禹貢積石云明徐蘭鎮遠橋記維明既受命威德遠加道通西域蘭州古屬金城郡距河為城河故有津控扼衝要洪武四年宋國公奉命西征守禦指揮僉事趙祥去城西一里許造浮橋以濟師師還遂撤弗用又四年魏國公帥師定地置西涼西寧莊浪諸衛仍去城西約十里造橋以通往來給饋餉因而弗革名曰鎮遠然河流悍急堤壖弗固咸謂非久遠計又十年蘭州衛指揮相城西北河水少緩擬改置橋近且易守詢諸父老以為古之金城關在焉謀諸同僚僉以為允某月某日圖上形勢陜西都指揮使轉聞制若曰可爰於六月內鳩工明年春二月氷解齋袚率僚屬虔祀於神協心齊力某日橋成士民咸請文以紀成績按漢史趙充國初擊西羌遣三校銜枚夜渡即營陳以防衝突時則橋未造也逮上方略其一以為治道橋以制西域信威千里從枕席上過師是橋之利涉自古而然今祗承上命屏翰藩維乃能以古良將自期躬督吏士決意改作造舟二十有八常用二十有五河漲則用其餘以廣之每舟相去一丈五尺上流定以石鱉如舟上加板欄楯兩旁以衛行者橋南北岸各樹鐡柱一木柱六繫鐡鎖大繩貫橋令相屬隨波升降帖若坦途橋之南去城八十步新築小城延袤數丈中置門以詰行旅城上建樓東偏創公廨凡若干橋門西偏創祠宇以奉河神橋之北因山為城延袤百餘丈東西置門悉建樓其上又創壽亭侯祠制度一一各適其宜嗟夫大河沄沄天險莫逾舟梁橫亘徑接康衢棟宇翬飛照耀丹碧雉堞環繚隱約蔽虧誠邊徼要津千古之偉觀也諸葛武侯有曰治世以大德不以小惠若斯橋者其可謂上昭聖天子威德下以康濟斯人者乎夫善作者必藉夫善繼善始者必賴夫善終若是橋也咨謀之詳審規度之宏深財用之完美將事之勤恪作始之善謀蔑以加矣歲月滋久風水撼頓葺理敝漏必賴後人承繼之重敢因士民之請為之紀其始末俾鋟於石以垂不朽庶嗣事者之有所徴焉黃諫蘭州衛哨馬營記正統十二年四月初六日丁酉都閫李公奉命築哨馬營堡於河北大岔口越十有四日工完二十又二日癸丑大合衛縣之官屬將校熊羆之士及邑人之老稚以落之軍民和會闐郭溢郛既卒事其邑之官僚士庶咸以此為禦邊之重務不可不紀其歲月乃致書於豫請為之記豫邑人也既受命不敢辭其詞曰粵維臯蘭乃古金城郡西控大河素稱雄鎮大河之北有山嵲嶫環衛列峙下瞰廣川既平且曠通乎絶塞不毛之地介乎西境大夏之墟迢遞綿邈來通斯邑冦賊往來必經乎是然其形勢險隘允為厄塞聖天子在位之十年以是為重鎮命公守此單車來臨遂相其土地用是規畫逮次年之冬請於朝今年春申命陜西藩臬之司乃往偕公相其地宜集工庀材經之營之人皆樂趨不曰而就崇墉接漢髙壘連雲邊備以固邑居以寧控扼險要束制咽喉斯為重事大莫是舉天子之武惟公是布天子之文惟公是宣山勢巍巍河流渾渾天子萬年邦國永安乃伐山石刻之日月尚俾來者知作之所始婁謙平涼利民渠記陜之平涼郡治東抵涇州有平衍壤地廣袤數百里而涇河之水實經流其間引以津灌則土田膏液年穀可擬豐登尚何熯旱之足恤乎特圖志所載故無渠埭而居人習以成俗舉目前湞閼之水則信其奔流置為棄物凡有播種歲率仰給於天天雨及時則坐享有年一遇魃虐流行則計無所施不但距河入深之地不霑其利雖夾河兩岸之間亦不蒙餘波之潤局蹙告災之外惟束手待斃而已歷千百載間竟無興念於此而倡之者成化甲辰歲夏秋不雨屬歲大祲侍御史中丞南舒鄭公時實受簡命重託鎮撫關中嘗符移六道周諏民隱興堰淢以佐耕至冬會卭僰有警告變日急上命版曹亞卿媯川李公衍畀以節鉞之寄越今年乙巳春推轂入境內即檄籲守臣疏決河渠以勸農事其弭災興利之心蓋與中丞公不謀而自同也僉憲陽城李君經分道關西首以所部平涼之地論列請命二公曰急圖之勿後也憲使延平羅君明時與聞之亦力贊興事維時李君續食平涼敦琢官屬荒度土功適郡之豪右強梁齟齬百出君則不暇顧恤毅然調役屬工始自府治城北瀹暖泉以灌蔬圃而官民賴之繼分引涇水五里鋪至東二十里鋪為一渠楊家磨抵四十里鋪為四渠袁家莊至七十里鋪為二渠迤東至九十里鋪北引涇水一渠南引金龍池白水驛河二渠合流花家莊東行三十里逾平涼境連亘開一大渠又流四十里抵涇州城西會汭入涇官路之南渠不可通乃疏百泉王村等溝析為七渠涇河之北河岸漸髙又疏金池瓦窰等溝析為六渠州城西引汭水幫城北析東山下蔭注附郭田園獨令成渠汭迤西至崇信縣界散引河子楮家等溝别為一十一溝州城之東地髙河下難於築堰𨽻南山者引木家溝至范家溝作一十五渠𨽻北山者引路家溝至白水溝作為一十一渠合而計之以渠則六十有二以道里幾二百里許以溉田則三千頃有竒也渠之制深十五六尺淺者亦居其五之四廣六七尺窄者亦居其三之二長短大率不齊惟視水力所至故不限於丈尺也渠當路衢則就渠身􅴓土剜通為梁以便行旅又揵石刋木架水槽以接不通壘堰壩以固河防始事於是歲三月之朔民歡趨之百日而告成部吏工匠皆無所預惟拱手以受李君成算而已未幾亞卿公按節平涼因命之曰利民渠於是渠水衍溢土脈漸漬來牟獲收成之望秋田遂長養之天其功甚大而費則省使非亞卿中丞發端開示於前憲使君慫慂於成則李君規撫綜理之密亦將遏佚而弗章矣又况穹壤間利民盛事祕久不發必有神物以撝護之者失此機會抑不知當幾何出以建萬年無窮之澤也有司礱石請記其事豫惟此渠之功州郡利戶與凡往來目擊之人固已頌而歌之宜不待記而顯且二公當此兵殣之日分閫鎮靜決䇿如流非獨烽堠煙消邊徼安堵而八郡垂亡所賴以全活者動以萬衆水利之興又特其一事也姑以志其本末以告後之長民者使知成之不易如此相與維持而增葺之是固二公之心抑亦羅君李君之志也遂書為記王華甘肅行太僕寺記甘肅古河西諸郡地交戎虜之區距京師數千里至明洪武二十四年始置行都司於此以𨽻甘肅諸衛所三十年復建行太僕寺設官以綜理馬政而諸衛所亦𨽻焉然官之名位視京秩雖同而力勢反出連帥郡守下故士之勇於功名者率不樂居是職至或以老疾棄去由是視廨宇如逆旅之視邸舍不特人無固志政亦因之以弛人與政而交病其來非一日矣孰肯以補敝興廢為己任哉𢎞治八年皇上明見萬里知馬政之弛由於官之不舉其職特詔所司慎選材賢以居而廷章田美遂以治襄陽乾州有聲獲與簡擢適都憲周公按節於兹宣上德以柔遠人嚴憲度以貞百辟修戎政靖夷魯以安固疆圉撫治之暇詢視寺署見其棟宇摧壓垣墉頽圮心甚病之遂慨然以修建為己任乃會計公私羡利貿羣材召衆工易朽敝以堅良治殘毁為完固其中為前堂五間後亦如之其左為主簿廳三間右亦如之為廊房翼於東西者各五間為重門蔽於其前者各三間并修葺廨舍之可依棲者總計其成共五十餘間外內周匝公私輯寧由是官有常宇吏有定居不特數十年之廢墜至是聿興而昔之弛政亦因之畢舉人與政而交理固都憲公經營謀度之功而董功役按度程以迄於成田美則尤有勞焉公昔旬宣於浙於汴汴浙人至於今思之不置顧豫亦浙人而廷章昔為御史與豫比鄰相知復稔義不容虛其請遂為記之楊一清巡撫陜西都察院題名碑今天下藩省重地朝廷敕遣內臺重臣以臨涖之謂之巡撫巡撫之職凡有司政務若錢穀士馬若刑名若賦役農桑水利之類悉聽剸裁文臣自方伯監司武臣自連帥偏裨而下咸奉法令遵受約束事有益於兵民得承制以便宜從事不拘文法焉可謂重矣陜西古稱秦中天府四塞之國內領八郡綿亘數千里北接沙漠西控羌戎為四方根本樞要之地若延綏寧夏甘肅三鎮雖俱宿重兵各有內外重臣仗節握符開府其地然饋餉供億率仰給內郡至於屯戍之兵統領之將多自陜西調遣三鎮不得專焉是其為任又非他省巡撫比矣凡巡撫闕人吏部請於上於廷臣及方嶽中舉才行素著者二人以聞而親簡其一用之比歲陜西巡撫闕人則又多自他省巡撫有勳績負時望者改命而來蓋難之也𢎞治戊午都察院右副都御史汝南熊公自巡撫山東移鎮於兹顧瞻行臺宏麗靚深稽閲庶務察凡所以安內全外者規畫井井纎細備具嘆曰前任經理之功大矣求其名位世次之詳不可悉得爰命有司稽之籍牒詢之父老礱貞石將刻之乃進提學副使楊一清而屬之以文惟廳事有石題名有記非古也而後世行之於政治不為無助列賢不肖有勸戒之義焉識寬猛弛張繁簡先後得損益之宜焉邦人之去思士林之仰止率於是乎在而豈徒哉按陜西巡撫宣德間吉水羅公汝敬以工部侍郎始受兹任自羅公而下所及知者凡二十一人或以惠愛聞或以風力顯或以討叛樹勳烈或以修築城塹疏通水利著勞效進位尚書者已十二人位兼保傅者五人為冡宰者一人為大司馬者三人而今在朝者方來所進固未涯也其無聞於世者才一二人爾嗚呼可謂盛哉夫惟天下之重地當用天下之正人夫惟天下之正人斯受天下之重任之數公者咸以正人被簡擢臨重地其卒當天下之重任而有餘力也宜矣繼自今巡撫於兹者宜何如紹承之哉國家設郡縣以統民設衛所以統兵慮其不職也而領之以三司復慮三司之不職也而糾之以巡按又以巡按歲代不常且官有常職未免為文法所制勢有所格柄有所不專於是乎有巡撫都御史之設焉今之民與兵皆創傷困憊之餘愁苦之狀有不忍言者郡縣不能為之所望之三司三司不能為之所望之巡按又望之巡撫至巡撫則止矣巡撫不能為之所民將復誰望哉故為巡撫者知為朝廷愛養兵民而已政有為民病者我得而釐之事有為民利者我得而興之諸司百執事有剝民財窮民力殘民肌體以行若私者我得而除之宿姦巨盜慿藉以逞為民大蠧者我得而發之坐一堂之上有兵有刑有挺有創有斧鉞有華衮有陽春有霜雪其未來也以無心待之其已來也以至公將之不詭不隨不矯不亢不撓不奪為之在我者盡吾心焉而毁譽榮辱成敗利鈍皆有所不計嗚呼為巡撫者不當如是耶抑此皆數公所常行而已效焉者余將致忠告於後來意無出此故承熊公命於題名之石極言之公名翀字騰霄舉己丑進士起縣令為御史歷山西按察使進擢都憲好善惡惡出於天性刮姦剔蠧風采凛然義所當為不遺餘力其樹立卓卓他自有述之者兹不及致詳云王寧窮汭記汭水紀於禹貢廣韻汭音儒説文汭從水從內訓曰兩水合流之謂也又曰小水入大水之名質其實雍豫二州有專名之者有通名之者專名者以義也通名者以類也以類通名如會於渭汭東過洛汭是也蓋渭自鳥鼠而東逝涇出笄頭而北來二水至髙陵而滙於河經龍門東注豫州洛由熊耳東北入河既皆小水入大水且兩流合為一以故不曰涇渭而曰渭汭不曰河洛而曰洛汭由是推之則凡諸州之水類於是者皆不拘於定名而得通稱為汭也以義專名者涇屬渭汭是也汭在華亭城東三里乃兩水合流而其北源西出小隴山之馬峽俗呼北河南源西出隴山之仙姑峪俗呼南河北河環朝那山前蓋山有古朝那王廟其西北有湫東去縣東三里而别稱為雨山南源環王母山山巔有古王母宫東去四里别稱為儀山俗呼為回頭山儀州實以是名也儀雨兩山南北對峙豁開如門故兩水合而東流名之曰汭也又二水交流而下亦專名為汭也汭滙為深潭潭名合水水之北岸一臺髙廣平夷荆榛瓦礫錯雜相傳為禹王廟也北陟兩山之巔遙見東南隱隱峯巒侵入太虛隴州吳山也沿汭峽石三十里皆斷崖摧壁神禹疏鑿之迹也峽行十五里南堧有女神之廟扁曰坻汭元君土人呼底茹娘娘汭讀為茹茹孺同音廟東十五里至石堡汭北受柴邸水源出朝那湫山之陽而隂即為涇水又東五里至安口峴牛心山南受武村水汭至是益大北有斷萬山自馬鋪嶺柴邸而來南有五馬山自石匱寺武村而至兩壁削立巉嵓百仞束汭於中雪浪湍激經行五里為屯城唐李元諒屯兵扼吐蕃者也屯東為崇信川汭水益大深不可涉湍不可亂行旅皆袒而濟又東三十里北過崇信縣城崇信人曰汭水繞北又東七十里東過涇州過回山乃屬於涇𢎞治戊午督學憲副虎谷王公按涇州試諸生竣乃涉水登王母宫寧從行王公東眺曰北流而濁者何水乎寧對曰涇也南流而清者何水乎寧對曰汭也公曰是禹貢雍州屬涇之汭乎周職方其川涇汭乎昔公劉有汭鞠之即吾過豳西行三十里涉一大河北入涇是何名乎寧曰靈臺之達溪也公曰朱子注汭鞠之即曰豳地日廣也試且廣求之斯地有百泉乎寧曰去華亭西北三十五里山朝那湫隂有泉百餘為涇源乃百泉也有溥原乎寧曰亭口靈臺之西汧陽隴州之北華亭龍門之東有廣原唐尉遲敬德破突厥郭子儀破吐蕃之西原也李元諒開美田千頃號曰良原今為溥潤原公又曰此與吳山南北乎寧曰正相南北公曰必兹西去百里外有兩水合流者始可謂之汭矣若其窮之乎寧計華亭至涇程一百三十五里果符公言還白之公曰朱子注詩言汭水出吳山西北者以名山而志名水窮源泝流也今遂謂出隴州東入於涇今隴水乃汧入渭去涇遠矣且將置溥原於何地乎管律鐡柱泉記去花馬池之西南興武營之東南小鹽池之東北均九十里交會之處有水甘冽是為鐡柱泉日飲數萬騎弗涸左右數百里又皆沃壤可耕之地北虜入冦往返必飲於兹而散掠靈夏長驅平鞏實自兹始以其嬰是患也委沃壤為曠土者百七十年矣嘉靖十五年丙申都察院左都御史兼兵部左侍郎松石劉公奉天子命制三邊軍務乃躬涉諸邊意在悉關隘之夷險城寨之虛實兵馬之強弱道路之緩急而畫禦戎之䇿以授諸將是故霜行藿食弗避厥勞至鐡柱泉駐瞻移時喟然諭諸將曰禦戎其在兹矣可城之使虜絶飲固不戰自憊何前哲弗於是是圖哉維時巡撫寧夏右副都御史字川張公謀與公協乃力襄之即年秋七月內申按察僉事談大夫誾度垣墉量髙厚計丈尺鎮守總兵官都督王效率師徒具楨幹從畚鍤人樂趨事競效乃力越八月丁酉城成環四里許髙四尋有竒而厚如之城以衛泉隍以衛城工圖永堅百七十年要害必爭之地一旦成巨防矣置兵千五兼募土人守之設官操馭皆檢其才且能者慮風雨不蔽之患則給屋以居之因地之利而利則給田以耕之草萊闢禾黍茂孳畜蕃棄於百七十年者一旦大有資矣其廨宇倉場無一不備宏綱細節無一不舉又肇來者無窮之益是皆出於公之卓識特見而能乎人所未能今年丁酉去兹泉南百里許亘東西為牆塹于所謂梁家泉者亦城之重關疊險禦暴之計益密矣借虜騁驕亡忌入境騎不得飲進則為新邊所扼退則為大邊所邀天授之矣用是以息中原之擾休番戍之兵寬饋餉之役功在社稷與黃河賀蘭實相悠久公之功謂有紀極哉松石名天和湖南麻城人字川名文魁中州蘭陽人俱正德戊辰進士談誾西蜀蓬溪人正德辛未進士王效陜西榆林人正德丁丑武舉法得備書胡纘宗卦臺記成紀之北約三十里曰三陽川其西北隅有臺焉羲皇畫卦處也夫成紀故地名也漢為郡唐為州宋為軍國朝亦為州然自晉至南北朝與雍州並稱焉隴坻亘於東朱圉雄於西嶓冡屏於前空洞望於後漢起於南渭衍於北乃生羲聖而三陽則渭河納隴河處也今為三陽里三陽云者朝陽啓明其臺光瑩太陽中天其臺宣朗夕陽返照其臺騰射卦山儼於南長山負於北龍馬山集於西尉遲峽約於東承渭於上流而資沃納隴於下流而納汚故是臺也前揖卦山卦山若屏若拱後俯龍馬山龍馬山若圍若掎渭水環乎其北周道修乎其南而卦山自西傾南蜿蜒隨引漳而來未至三陽之東南而止於其止也突出一小山其出如維其止如佇自上視之如綴珠自下視之如充纊髙可若干丈廣可若干畝其臺層起俯視之如臺之出其周壁立仰視之如臺之升故今謂之卦臺龍馬山自西傾北迤邐約渭截隴而來至三陽之西北而止於其既止也循渭之濵若啓軒開襟納臺然者而臺與龍馬山若相連而實不相連也蓋界以渭矣渭水自隴西首陽縣鳥鼠山東流經襄武獂道冀三縣乃受荆泉諸水出岑峽徑新陽川自西循北徑東沿洄臺下其溪才容其流而兩岸皆濵山其水若為臺環抱然者前有新陽下城下瞰新陽川後有番城下瞰三陽川故登臺而望之視卦山若却若顧視龍馬山若抱若倚視渭水若環若帶視新陽川若吞若吐視三陽川若沉若浮視隴水若引視長山若附故二山一水之間其臺若坐若盤而羲皇觀天察地於此畫卦於此也豈天設此以啓其神哉抑地因此以兆其靈哉夫豈偶然哉嗟夫岷江之源也嶓冡漢之源也鳥鼠渭之源也河出於崑崙揚於積石也洮出於西傾也隴出於隴首也則西北水流皆自隴而之東南支委繁衍不有淵源耶是羲聖之所以育而卦爻之所以畫也郡人相傳臺有羲皇遺畫著雪即融今候之無驗蓋居人見諸田畦界址橫直層列卦山之麓有類於畫雪將融而形益彰遂指以為先聖靈迹不知羲皇天生大聖也務駭人視聽而遺是迹示人以黎丘之幻耶抑豈居人仰瞻聖皇不欲見其遺臺荆棘而互為相傳耶趙錦陜西行都指揮使司記仰惟我高皇帝混一區宇稽古建官分理四海內而諸藩外而諸邊各設都指揮使司以統領衛所禦侮防姦之任雖均而輯戎固圉之責尤重也惟兹甘肅古雍州河西之域據三秦之上流控全陜之厄塞因以陜西行都指揮使司建焉嘉靖甲辰春平陽李子忠奉命來視司篆於凡政之弊者釐之利者與之期月之間煥然振舉暇與同僚寧夏黃子綺西安夏子繼武言及名宦因喟然曰先達仕兹者多矣善不善皆吾輩師也何姓氏之不載而漫無所稽耶於是礱石以題名記請豫惟西北之邊有九全陜實當其三而甘肅又為關隴重地東有金城之固西有玉關之嚴南有祁連之屏翰北有合黎之拱護轄甘涼山永肅鎮西寧莊浪十五衛所之官軍撫齊勤蒙古罕都哈密安定察遜苦峪諸部落之番族近而藩垣四鎮遠而綱領九邊通玉帛於天方列氈廬於疆場黃河黑水青海流沙崑崙崆洞際天極地巍然一大鎮也國初以都督重臣臨之畀以干城之責付以分閫之隆政令惟其弛張甲兵歸其掌握又降以璽書給以關防凡機密重情許其徑達至於各衛經歷蔡秉彝張納等亦蒙頒敕賜以禦寒裘服特示優異聖祖明見萬里之外肇建永世宏基淵乎微矣是以上之晉錫駢蕃下之忠義感奮西夷職貢重譯來庭屬番歸心軍民樂業過化存神之功效真足以比隆唐虞三代猗歟盛哉爰自成化年來土魯番酋敢肆悖逆仇襲哈密回忠順以西遷侵逼瓜沙逐羌戎而內徙聲教雖及乎昧谷藩籬實徹乎燉煌且西海為海冦竊據南山皆番回環居套賊出沒於河湟衛喇特睥睨乎嘉峪千古之金湯始多事矣嗚呼璽書責任之專關防奏疏之密不亦廢閣也哉雖然文武之道待人後行要亦在乎轉移間爾誠能憂時憤敵殫力畢心撫黔黎練士卒足兵食之計修安攘之規以大義結番夷以至誠安反側酌古而宜於今撥亂而反之正則大禹之西戎即敘成周之底貢旅􅋙將復見於今日矣我聖天子中興之盛豈不與商髙周宣同光萬世也哉若夫虛文塞責徒事紛紜尸位素餐罔知展布祗見日流於敝公議安能逭耶豫承乏撫循用是深懼所賴同志二三子以匡厥不逮因述其張本以告夫將來之勒名於兹者抑愚又有説焉昔豫行役各邊形勢險隘頗得其詳嘗謂京師猶人之腹心也宣大項背也晉薊東遼肘腋也延寧肢體也甘肅踵足也邇者西北諸邊率為賊藪若殘元遺孽住牧於宣府之窩穴諳達賊酋屯集於大同之青山濟農羣醜盤據於延寧之河套深根固蒂黨惡肆凶近又假以收捕海冦迫脅諸番外交內攻姦謀叵測正吾人卧薪嘗膽之日也茍或少有怠忽則榮衛滯虛腠理疏弱元氣漸耗矣能免腹心之無恙乎是知甘肅一鎮寓乎全陜之動靜全陜動靜繫夫雲晉之安危雲晉安危關乎天下之治亂廟堂之上必有能建萬世治安之長䇿者而區區遠臣寧忍已於言哉因併以為記李夢陽華池雜記華池古樂蟠縣也故城川華池東天子溝夫人洞並故城川蒙恬斬山堙谷處也今馳道存焉稍東則陽周城也牡丹園華池城東北太和觀牡丹園西張將軍墓華池城北邊路將軍名吉宋范仲淹卒也以節死贈將軍詳見郡志興陽洞華池西崖也不窋陵慶陽東山傅介子墓西山范仲淹宅今為府庫范純仁遺棟今為府儀門過木鵝池慶陽城鑿通河處臨川閣鵝池上宋蔣之竒建今廢威武樓慶陽北城樓也宋建公劉廟在慶陽其兩壁畫周三十七王云李子曰余如華池在𢎞治乙卯年焉居蓋三年云從豫遊者尉氏左國璣慶陽髙尚志暨其弟尚德華池王祐馬理忠節祠碑記嘉靖間中丞趙公節鎮河西下教諸道俾修舉祠事教至西寧兵備憲副李侯報曰兹湟中自漢迄今多柔遠殿邦及委身報國人副使欲祠之未敢公曰兹國典匪僭盍舉諸憲副得報乃經營因闢地一區為垣門二堂廡碑亭維備乃擬應祀賢報公曰某祠於張掖某地某法不應祀他所擬漢後將軍壯侯諱充國趙公強弩將軍樂成侯諱延壽許公伏波將軍忠成侯諱援馬公平壽敬侯諱訓鄧公隋衛尉諱權劉公唐平章事幽州都督諱師德婁公宋秦鳳經略使諱韶王公河州團練諱永年髙公隴右節度使諱厚王公明長興侯諱秉文耿公世襲土官指揮諱南哥李公會寧伯諱英李公合序列正祠指揮使陳治千戶李淳百戶佛元葛昶丁顯合序列兩廡祠依文廟式為木主四位一席春秋致祭憲副得報遂以時禋祀如公言光祿寺卿馬理聞而善之曰湟中自漢武使去病開疆至壯侯討叛用王師屯田其間前後降羌至三萬一千二百餘人卒全勝以還及老朝廷有四夷大議常與咨謀比卒後思其功德不置圖形未央至成帝時尤感事追美召黃門揚雄即圖頌焉伏波建議不棄湟中以除羌害討叛至矢貫其脛桓桓自若卒恩威遠孚諸羌咸附又為奏置長吏開導水田勸以耕牧敬侯用恩信結羌得其死力破殱迷唐使諸羌歸服威信大行羌俗親死歌呼不哭比侯歿羌臨者日數千人至欲捐生以殉遂家立侯祠恆禱祀焉是皆功德著於中外垂於後世真社稷礎楹人臣表模何可訾也樂成下獨婁公長者無忝先烈足為後矩其次長興諸賢亦開疆展土仗節死義宜報祀者然遺棄弗祀久矣不有君子何以勸忠於戲兹舉中丞公之教也憲副之力也有裨風教多矣王家屏中路寧河臺記河從崑崙積石歷河州注於峽口流經寧夏東南直北穿障下其於寧夏猶襟帶之固也顧自東勝既棄敵入據套中時時猖猘侵我瀕河諸寨疆事滋棘矣會大中丞羅公以文武俊望被上簡命鎮撫寧夏至之日率諸將暨憲大夫按行塞西望賀蘭北視髙闕東瞰洪流南遊目於環慶之野還至渡口見津人操舟渡焉渡者蟻集河壖而無亭以守之則顧謂諸將曰嗟乎天設之險以扞蔽區夏而棄與敵共之又弛要害不為備奈何欲郤敵使毋數侵也吾兹揣敵所嚮一旦有變不踰河而西繞賀蘭之北以臨廣武則有乘長城遡流而南下以窺橫城之津耳然踰河之敵有河山以闌之有列屯以間之我知而為備猶距之外戶也敵即南下地無河山之闌列屯之間颷馳而狎至賊反居內我顧居外急在堂奧間矣計宜益築長城塞用遮敵使不南下而建亭堠於河之東涯以護橫城之津此要害之守也諸將敬諾乃約日發卒築長城塞橫亘凡五百餘里别徴卒築臺河上臺髙五丈五尺周環四倍之上構亭三楹廂房四墁前施迤橋數級上嶟嶟翼翼如也外列雉為城城周環九十餘丈髙二丈四尺繚以重門設津吏及堠卒守焉是役也卒皆見兵材皆夙具不五旬而告成事衆且以為烽堠且以為津亭登眺其上而山巖隴坂委蛇曲折歷歷在目偉哉誠朔方一壯觀矣憲大夫解君馳狀徴記王子王子曰昔南仲城朔方而玁狁襄重在守也趙阻漳滏之固用能抗秦漢據白馬之津終以蹙項則守要之謂矣今瀕河亭堠牙錯棋布守非不堅顧徒知守疆而不知守要要地不固即列堠數萬舉烽蔽天安所用之寧夏雖邊鎮而京朝之使藩集之長列郡之吏下逮行商遊士工技徒𨽻之人往來境上者繦相屬也有如津吏不戒猝值道路之警曽不得聚廬而託處安能問諸水濵豈惟客使是虞橫城之津厄則靈州之道梗靈州之道梗則內郡之輸挽不得方軌而北上而寧夏急矣此公所計為要害者也人見是臺之成居者倚以為望行者恃以為歸乃指以為烽堠以為津亭嗚呼公之意豈直為烽堠津亭計哉公甓坒鎮城石甃閘壩築控夷堡修勝金關建庾興學疆理之功不可殫述述其防河者如此後之登斯臺者尚有味乎余言薑圖南雙忠祠記雙忠者何祀明大中丞鄒公應龍廬江太守張公萬紀也金城人物自武賢慶忌李晟渾瑊而下衆矣何為乎於二公祀之曰以諫曰諫何為乎以今祀之先此矣不有太康王公請祭葬復爵秩額忠諫乎既祀矣曷為乎合之曰二公地同時同建言同也同則從同曷為祀於書院曰以講學明道也講學明道曷為乎不廡曰以忠也嗚呼憶明世宗時代來入繼大禮議起杖竄殆數百人以為人才用之不勝用矣不數十年士氣頽落姦邪雜出以濁亂朝政而時之在位者奄奄如抱葉蟬無復敢有出聲者唯二公抗疏直陳一枚一戍而所為姦邪亦稍稍削去由今思之明之世宗得稱為中興神穆得延為至治皆二公一擊之力也張公之救楊忠愍也曰如以臣為黨護將臣處死萬不足惜鄒公之糾分宜也曰如臣言不實願斬臣頭懸之藁竿以謝世蕃父子當乎此時豈意得全首領為完人哉即貿首椹胸血藏化碧不易於此矣撫軍六詔出守廬江猶是天王聖明不忍以未死之身茍且耳嗚呼凡為國家平居無事九賔庭燎萬里風行以為所欲為百世無憂也既勢屈形盡顛覆一朝朱全忠欲以牙將為太常卿裴樞執不可全忠殺之天子不能救而唐因以亡嗚呼使言路得如裴樞者數十人相與消弭逆折必不至於亡即亡矣亦不至於如此之速也賢者不位而位者不賢急者不諫而諫者不急此萬世之所以嘆息痛恨於昭宣也二公之忠猶鈎黨也其為李杜猶睢陽也其為張許漢世之所以亂而不亡者數十年唐世之所以得安驅至蜀皆此物此志也蘋藻之祀出於觀風河湟之靈式於英絶直養無害戍杖西市與談道天年總是一致故即以雙忠祠次忠愍之右嗚呼凡為國家必當思所以開通言路而言路亦必思所以為於可為之時吾蓋因雙忠而有所感矣劉敏寬北山鐡厰碑往者主和議邊備久弛塞上數苦兵輸率敝於道田公鎮撫五郡峙儲簡鋭主客騎步各程其材鹽策屯田靡廢不舉介胄鋒鏑炮石神器戰守之具也而悉資坑冶故事陜西行省歲供甘州軍需熟鐡十萬九百餘斤鳳翔歲供西寧熟鐵七千五百餘斤乏則復齎行李鬻之關以東稽程則數千里而遙稽時則以月以歲徒糜費罷徴發轉輸已耳且無能濟緩急公乃䇿諸監司遍搜山澤復徴冶氏於秦晉得冶氏來襄其事余不佞備兵湟中始得礦下馬圈北山之麓既得之大山硤冶氏謂北山礦廣而堅視大硤良便其山崷崒澗中石𥻘𥻘積無算踰數里山木蕃殖薪槱者報曰可以冶鐡余躬詣相度乃即北山下置官廳六楹鐡爐二座營舍五十間跨山為墩上建墩柵四楹周圍牆塹足備不測合簡西寧各營步卒四百供版築之役擇指揮盧忠爰督厥成仍選士習其藝復令如周官所載物其地圖而授之煆者採者各責其人為長久計是役也有五利焉河西四面用武之國朝冶而夕效取之源源一利也無輸運數千里之勞民獲休息二利也隨取隨給無歲月之淹三利也工役則取諸坐食之步卒炭石則採諸無禁之山林下不擾閭閻上不煩公帑四利也以五郡之材資五郡之用旁郡額供止輸折價以備除器之需五利也况邇者彼數內奰數為我兵所衄為之咋舌稱鐵壁云今復聞在在坑冶寧復有不逞志堅甲利創烈火迅機行且凌崑崙沸青海建萬世無窮之利公可謂忠於國矣昔管子以䇿試齊遂表東海管子䇿士耳且富強之説不足述也顧齊以管子霸乃今用事豈少管子哉即局促因循而以綱紀經畫為迂且擾奈國事何誠能度不費之利興不怨之勞事半而倍於古人務久遠以裕國計當保世世無疆場憂余惟前事者後事師也因伐北山之石而紀之若此公名樂戊辰進士任丘人張九德靈州河堤記靈州阻河而城其西南當河流之衝復趨而北可十里每夏秋湍激受害不啻剝膚雖秦漢二渠溉田至數千頃而利與害錯其侵城實甚粵稽洪武甲子迄今城凡三徙皆以河故而河亦益徙而東自不佞來受事不一載去城僅數十武矣先是禦河歲役夫三千束薪十萬亡慮數百千金率委諸壑人情洶洶議徙民徙城以為長䇿不佞則謂禦河猶禦敵也敵闌入不逼之去更延之入乎且勢若建瓴而僅僅積薪委土與陽侯爭此助之決耳計非巨石砥柱之不可獨慮費且不訾計無出不佞即捐月俸二百金為役者先而謀之薦紳邑令戴君任及諸生輩議堤以石無所事薪改徴河西年例柴價五百金軍民願輸地基銀八十兩暨諸捐助驗庫藏之羡合之得千四百有竒資用集矣則議民間量地畝出夫量田里出車調兩河營卒更番受役工力備矣乃造船百艘運硤口石往來不絶材具庀矣遂請於先撫寧夏今制臺少司馬介石李公前制臺今大司徒瞻豫李公俱報可則以守備張大綬董隄務指揮孟養浩司出納經歷李盛春程工作大興石隄之役而議者紛若謂濵河皆流沙不任受石恐卒無成功適旋築旋潰衆口愈囂豫堅持之曰此根虛易傾耳水豈能負石而趨耶益令聚石投之一日盡八百艘三日基始定於是從南隅實地始纍石為隄首四十餘丈用遏水衝繼以次迤西而北其纍石亦如之計隄長六千餘丈功甫成而河西徙復由故道視先所受嚙地淤為灘可耕可藝去城已十數里矣是役也經始於天啓癸亥之正月告成於天啓乙丑之四月凡費時二年有半費金九百一十兩有竒費米麥六十石而貯尚有餘羡念往歲議隄請帑金萬二千業奉旨下部覆不果今議約三千金猶慮不足至厪少司馬公捐俸金百兩而同守盧君自立參戎高君師孟等亦醵助有差然卒以有餘羡故藺還是皆百執事殫心經畫靡有虛糜之成效也憶不佞初抵靈行河籌之再三始而秦渠隄隤水暴泄不能灌溉為築長隄瀦之歲比稔而漢伯渠又苦無尾閭腴田皆成巨浸因以治隄之餘為開蘆洞長十三丈五尺髙廣各三丈五尺自秦渠北岸抵窪橋疏渠道三十里瀉水入河復故田數百頃增稅額數千石凡費金五十六兩有竒而椿鐵諸費不與焉古有言河者天下之大利大害也故周禮慎水政以防止水以瀦蓄水以溝蕩水其法甚備自隄石而城無受嚙庶幾於河之害遠矣而二渠之役亦借以收其利不佞三年於此未事則憂物力方事則憂成勞已事則憂久遠今幸三憂且釋得藉手告終事矣抑天下事惟賢者能慮始其次莫若因是三役者因法於古因石於山因力於民因能於衆因主裁於上獲逭喜事之辜是皆今日所以成功之本也例不可以無記遂次其終始以系之銘銘曰渾渾經瀆亘以金隄順流而西潛於靈府禔福下土聿鞏靈武爰固我圉用昌我稷黍匪處白璧而崇紺益是維川后之仁俾無逢其災害亦越千䙫曰寧以泰沈猶龍河東兵備道張公去思碑記靈州自秦漢以來或稱州或稱郡或稱軍與鎮城僅隔一河而東西兩道並建蓋其重也神廟之季天下紛然用兵矣廷議遴選才德宿望之臣分涖九邊而曙海張公以按察副使飭河東兵備當是時遼左川貴並軍興多調邊兵為援繹騷無寧日本鎮援卒方遣行而悍丁金白張威等路殺領兵官偽署左右將軍焚掠而前遠近震駭公至固原聞變星馳進大書前導曰戍士遠役誠可念即有所需何不以情請而輕蹈國憲且父母妻子各在城而自貽族滅何也軍門發兵擒勦汝進退何以自全幸本道未受事可開汝一面如悔罪者速投戈隨本道涖鎮以明無叛志也衆環跪而哭聲震山谷間叩頭請死有流血者公隨路慰遣原營安插而密擒渠魁置之法寧鎮以安其定變有如此者銀定賔歹擁衆牧邊聲言搶花馬池公曰彼素利我市賞且中國無釁不敢叛可不勞師而服也因計誘通事僧人宣諭朝廷恩威通事曰無他也意求增歲賞耳公怒曰國家定制誰敢議增必欲增者當決一戰後雖稽顙求貢豈可得哉乃勒兵令遍觀營伍而縱之歸二部各誅帳下一人以謝過焉其制勝有如此者熊經略廷弼威震九邊得便宜調發有偽充經略使者勒取馬價傳鼓而入甚倨公曰鎮故市馬然不取馬而價者何也其人曰道遠恐疲折價至近關買易為便耳公疑之簡故牒印文小異遂伏罪其發姦有如此者鎮臨極邊武備盛而文事寡公攝學政月有課歲有較朔望涖黌宫講業論道辛酉獲雋疊雙邊方侈為盛事其育材有如此者復創設商學以便商賈子弟肄業於是羣商輻輳歲課羡溢其柔遠有如此者靈州瀕河而城歲費薪夫數千金以禦河壬戍河大決居民屢夜驚議他徙公相度水勢從十里外建石隄為一勞永逸䇿歲省薪價工役無算而向所衝淤轉成腴壤其保障有如此者秦家渠常苦涸漢伯渠常苦漲三農失業輟耒而嗟公築長湃以護秦别開蘆洞以泄漢計疏渠道三十里復蕪田數百頃而歲額驟增數千石時號張公堤又創制水戽利民灌溉號張公車其裕農有如此者公為政大抵先事綢繆臨機制變聲色不動而指揮若神日光如電坐堂上人從轅門外窺閃閃如雙燈故雖色笑親人而人不敢干以私若夫內靖冦氛外銷邊釁談笑折衝豈不賢於甲兵百萬哉公庚申以按察副使受事壬戍長按察使甲子加右布政使履任六年而攝河西者再至乙丑凡兩考卓異擢巡撫都御史去先是城北有二賢祠祀楊公一清王公瓊以報修邊之功也及公去任二年而鎮人思公之功不下楊王於是貌公像而三之更其額曰三賢今年春寧夏舉人張先春沙圻貢士沈諫等以計偕至京師謁豫請為文以留公愛夫龍向奉命閲邊已疏公治狀入告所為聞且見之而非無徴不信者矣前二十年公守雲間全活飢民數百萬奬育士類龍亦厠門下知公非一日也又烏敢以不文辭哉今上即位公以少司馬陳新政六要上嘉納召對行見秉中樞如王公掌綸扉如楊公事業彪炳真堪鼎足而立矣公諱九德字咸仲别號曙海浙江慈溪人登萬厯辛丑進士南居仁三賢祠碑記成天下事者豈不存乎其人哉今之人見古人之豐功駿烈可傳後世者或遡瞻廟貌未嘗不敬而慕之以為吾亦可以為此也及乎臨事則又畏縮遜謝謂此殆有天授抑或遘時會之便以成厥功而非吾所能及嗟乎豈古今人若是遼絶哉昔武廟初楊公邃菴以都御史臨邊奏築延寧二鎮長城為復東勝計會逆瑾阻之功雖未竟而先聲馳塞外戎馬裹足及置鐇謀叛就家徴起公鎮人聞公至鬭氣百倍至則鐇已就擒遂留制三邊踰二十年而王公晉溪位大司馬督三邊軍事循楊公之緒拓城四百餘里夏人念二公功不忘合祠靈州城北所由來久矣又百年而張公曙海以藩臬長備兵河東適陽侯鼓怒吞噬城闉民將棄厥居而巢窟是棲先是河屢決而東城亦屢避而東且迤北洪武以來三徙城矣張公曰若此是無靈州也城可徙而東水獨不可徙而西乎乃循河故道躬理畚鍤築石堤長六千丈初河流甚駛少投石則旋傾張公曰此力弱不能勝耳石能砥水水豈能浮石乎遂排羣議為艘者百從峽口運石積而頓投之一日罄八百艘石堤克鞏河乃西徙城賴以全由前言之夏人之不捐於鋒鏑楊王二公之所留也由後言之夏人之不汩為魚鱉張公之所生也於是躋張公與楊王並祀旌曰三賢嘻亦盛矣豫因思兵猶水也治水與治兵孰難意者隄猶水之城與水決而移民以避之猶兵交而割地以求和也雖欲永保其不壞詎可得哉且疆場之事吉凶存亡我與敵共者也或望塵而避焉若夫驚濤迅湍一掃而為黿鼉之窟豈有幸乎况兵但避其害而水更收其利張公又築長湃於秦渠開蘆洞於漢渠使涸者有所蓄而潦者有所泄今兩渠間翼翼彧彧緑野如雲伊誰賜與至於挺而走險者感片言以投戈是劉𢎞一紙書勝十部從事也狡焉啓疆者懾天威而稽顙是趙充國以威信服罕幵也嶪嶪乎無形之長城也哉楊王振卓軌於前張公接芳躅於後孰謂古今人不相及耶楊公諱一清丹徒人王公諱瓊太原人張公諱九德慈溪人頌曰屹屹金墉區分昴畢燧寢鋒銷天險是設文襄創始司馬紹述倬彼二公俎豆有秩張公繼起循禹之迹昔也洪流今藝黍稷買犢棄劍計安反側鼎鼎三賢貞珉永勒楊博甘州山南關記甘州城北四十里有人祖山內通瓦窯太平草湖諸寨外連硯瓦孤山木架諸墩兩峯夾峙殆若紫荆居庸然敵騎每襲甘州率多由此蓋敵衝也先是鎮守太監陳浩於硯瓦溝南嘗伐石作疊水一丈四尺疊水之南又鑿石井深一丈許丙申十月敵三萬騎突至疊水上不能踰遲回良久始由城兒溝入烽燧所到藉以收保甘之人至今誦陳浩之功不衰博撫政少暇得與副總兵吉象遍閲諸隘東自東樂大口子灰溝煙墩大小盤道觀音山抵逃軍溝西自紅牆青山小口子抵茨兒溝上下山坂靡不究極幽顯稍有缺漏不舉之處尋即繕治如法已而至人祖山博謂象曰丙申之役初不知有疊水以故倉皇無以為計今若來人持束草可以飛渡此險不足恃也必須大建關城屯兵戍守庶幾萬夫莫敵之義象曰山形北仰南俯時值隂雨水瀰漫一二丈前人不設關者惟恐其衝決故爾都司柳棟熟知地利可令棟相度之棟承檄周爰咨諏三宿始還曰石井迤南半山有原如掌天造地設可以作關近關更作疊水一道不惟可免壅淤之患自是重險疊障矣時總兵王公繼祖甫至議亦合簡屬吏之精敏者得指揮曹鳳千戶張勛董其事鳳與勛議曰是關一成實為扼吭先制之計但役夫千人晨夕炊爨苦於無水相與祝於神一日偶於巖石間掘地盈尺泉流沛發役夫賴焉棟曰維漢壽亭侯關公自我明啓運以來歲歲有功河右此泉靈異或漢壽亭侯錫也請作廟以答神貺博曰善爰即關城之中構屋一楹敬塑公象飾以丹青蔽以幃幕左鐘右鼓百爾咸備輪兵三十人戍之官一人領之兼以司神之香火云是役也肇工於嘉靖二十七年四月十又二日訖工於是年六月十又九日關城髙一丈七尺四面凡二十丈有竒城墩三面凡三十丈有竒城有懸樓如矢如翬頗為壯觀增舊疊水九尺通髙二丈三尺新疊水髙一丈三尺尾長八丈斬城兒溝崖二丈廟之左右小屋各二楹為戍兵棲止之所關之北山絶頂又作一墩防敵乘髙擊射且大書題諸關門曰山南關其它工之微者不復具載後之守斯土者幸時加修濬俾勿壞焉陳棐防邊碑記關中出崤函之西去今京師二千七百里臯蘭大河所經與禹導水積石相接去關中一千二百里而張掖去臯蘭復一千二百里酒泉尤遠六百里撑突河外孤懸絶塞開一路以通西夷之貢所謂斷北敵之臂義則次矣乃我境開拓於戎狄之區而迤邐祁連北阻龍荒南遮青海西引陽關之外瓜沙之墟皆自古氈毳息喙之區千里昃途三靣鄰敵今之勝算不在於能逐之在能禦之耳禦之方城守為上而河西城堡土沙鹹而制低薄全無磗石券洞皆板門關無鐡穵之即頽燒之即煨乃知金墉玉關徒為稱美全無事實也豫歲丁巳夏以陜臬廉訪奉命撫兹土大以弗稱為懼渡河即行四道各將令於大小城堡俱築垣陴浚池湟劵更甓石門表鐵葉切慮近歲囊俺黠酋導以周丘攻城輒以鉤竿梯繩扎架穵墱填壕洞堤鑿門燒櫓諸巧併力環以甲騎層射陴人陴人不敢倚堞而瞰彼即毁堞登陴雖垣塹稍修仍不足恃乃鎮城先築敵臺屹倚城外臺圍夾牆牆開放火器孔洞向外者遠擊出壕堤向兩傍者順城雉而擊孔洞留三層下層用石鑿孔徑五七寸可放將軍炮擊賊近城下者中層用水刳通中孔徑三四寸可放盞口諸炮擊賊附城而上者上層孔可放快槍強弩擊賊已攀近睥睨者每臺周圍洞孔開向八方而城每靣六臺則火器往來交擊繞一城矣鎮城先築東南面十二臺乃照式行各衛所城堡各設四隅四座雖小堡亦各二座河西新設敵臺一時僅千座以聯接不可無大墩因敵臺之式推廣之先製木墩為式令各築大墩中建實臺用懸洞天橋而上墩外築城垣四靣暗砌鐡門放將軍大炮多安放火槍孔券名曰鐵城迅擊臺復廣前墩之式於墩之圍城外二隅建火洞炮眼敵臺二座臺制如城堡者而差小厝火器向外點放二臺護城四面名曰轟電却胡臺復廣前墩之式中建一臺即安火炮鐡門劵洞於臺之下通出四面以大將軍炮諸火器向外擊賊臺上有房多儲器糧臺中之底鑿井防久攻困名曰玉空飛震臺復廣前墩之式中建墩臺四隅築二實臺二虛臺虛臺中設火洞炮眼懸空安門置梯從此以上下名曰風雷太極臺造轉軸翻拍鹿角陷馬品字坑木鑽地網總名曰厄邊六險以城堡敵臺雖增而守之不可無械乃造諸械一曰夜叉懸木儡併架一曰懸石併架一曰流星鐵飛炮并架一曰鈎頭銃一曰鐵巨斧一曰四股飛義總名曰守城六將鎮城造一千二百座件衛所次之雖城堡小者亦造六十座件計河西各城堡總造萬餘又鑄鐵飛炮萬餘以諸械雖可守而行可為陳止可為營尤莫便於火車乃竭智殫思先造飛輪遊創八靣應敵萬全霹靂火車一百輛召選家丁勇士千二百立一營考火車陳圖為書付主者習演修整舊旋風炮火車百輛令洪水黑城等五堡共造百輛修整衝槍飛火獨腳車四百輛諸種車通行各道各衛照樣製各千餘輛安置兵火器各萬餘名為破虜三車以勝敵莫利於火器而大炮尤可以擊厚敵破堅陳乃奏討京制大將軍二將軍炮各十位三將軍十五位討京製鳥觜銃二十杆隨用火藥什物及皮袋藥規藥管等皆備再行分巡道行局用京降式造鳥觜銃造金剛腿諸大炮連珠雙頭諸槍及鑄生鐵石榴炮共二千餘行分守兵備三道各造炮數稱是再發價山西造快槍等近千件以火器尤資於硝黃馬子行闔鎮地方各熬硝各俾人赴局學製未幾各處俱能熬硝製火藥藥逾數萬且令局鑄石榴炮一千餘鑄生鐵馬子三萬各處俱令鑄鐵及磨石者而尤慮鉛則難繼泥則易碎有獻計謂磁窯造磁子可多辦試之大小八等堅圓光滑可用乃令鎮城燒百萬箇每萬箇量一石今已造五十餘石行各道俱如式造先是委官向京領年例硫黃逾年未返豫遣騎督責乃領硫黃三千斤來而往晉省造火器者亦鬻硫黃二千斤至顧火器已夥煮硝更繁硫足配合鐵磁子盈屋堆積剩供習放於是河西火器雄甲諸鎮矣此皆分巡王副使繼洛協謀效力分守張參政玭兵備陳副使其學太僕寺黎卿堯勳咸資畫理諸務稍次第而總戎徐雙峯公仁適至將城垣敵臺未完者相與督責築完即議併堡浚壕凡闔鎮之堡城隘人鮮者歸大堡而堡垣之趾俱浚壕深闊以三丈為凖足堪障禦豫惟在昔哲臣問學功業致極中和寅亮天地而今膺籌邊之寄者祗從事於制度修為之間雖悉心綜理未免馳情機械宜乎來曲智之評而非輔世之略然漢之諸葛孔明宋之范文正稱百代殊絶人物諸葛之治軍流馬木牛以供運餉制作精妙後世莫傳而營成八陳開合竒正豫觀魚復江邊之疊見者稱為天下竒才文正之治邊通斥堠城十二寨細微纎悉豫觀其峽山之屯取水祕井偵卒間道舊迹故在也二公當中夏稍弱敵勢方張故於此求殫心盡職隨事補裨固開誠布公之運用先憂後樂之敷施豈可以煩細而議二臣哉不此從事而清談廢事沉淟玩時以惜隂為俗吏以名教為贅物卒至荒偷墮落靡可收拾此晉魏之所宜戒而近世亦或崇尚浮虛論議空寂鈎竒延譽至目經略為曲智彼自謂棄知之學不自覺其為不智之歸矣以若人而任之鎖鑰其能克副哉後來者以兹為鑒庶修此防邊之緒而不使墜焉矣陳祥蘭州衛重疏水利記天地之利於人者莫大乎水然必託諸人而後利始大焉吾蘭古金城郡密邇北塞城郭內外軍民屋廬不下萬餘區北逼黃河岸峻東西兩川田畝水不能上下經寧夏始渠引以佃以漁獲大利焉城西南水自馬寒山經阿干來者傍城直瀉黃河東去厥後守土者采衆謀乃於阿干河鑿渠引水十分之三一自龍尾山麓經關王廟下入灌東川田圃隨渠勢有力者置水磑焉一自西郭入注東西南三面隍塹以固城垣禦突衝城北黃河已當一面之天塹一自髙崖子經古峯寺下入灌西川田圃居民始獲利矣成化間巡撫都憲眉陽余公以兩川水利微而弗能當歲旱欲倣寧夏漢延唐來等渠於黃河上流引水以灌溉籌畫已具會轉佐部回京未果既而水入西郭者亦湮塞隍塹久涸識者病之今年秋總制都憲河間張公行部過蘭政暇注意舉廢遂允蘭州衛之請循西郭故道而疏通之復開小渠以利城居者餘悉由東郭出亦達於川甫彌月間而隍塹周滿城郭溝渠所經之衢巷凡官民蔬圃暨藝業者無不沾其利然阿干之利固若此而黃河之利尤大焉矧吾蘭俗業耕牧而土地莫善於河北所謂金城沃壤千里者在是顧以數年邊備弛而敵侵擾耒耜不敢越河梁租賦竭産以盈數者非一日倘後來者勢可為而時可舉購求余公之議以成之吾蘭之利不尤大與因併記之以俟王鴻儒都察院題名記甘肅在中原之西數千里當玉門陽關之內漢史稱為故胸奴渾邪王休屠王地豫考之於書殆不其然昔唐虞都冀即今平陽帝都四距各五千里所謂弼成五服至於五千是也夏書亦曰黑水西河惟雍州燉煌在甘肅為極遠地而後漢志注乃謂燉煌去洛陽五千里則其去平陽又不充此數矣且黑水又在其地昔商道既衰棄稷不務不窋處豳邰之壤而猶曰自竄於戎狄之間周末小雅盡廢四夷交侵畿甸之中尚有戎落況甘肅之遠乎由是觀之甘肅在三代之前固中國諸侯封畛也其疆域如此初漢武徙民或以關東下貧或以報怨過當或以悖逆亡道後皆為衣冠大族名臣良將䇿畫之士藝能之人纍出其地石虎逞其凶逆氣吞四海及敗於謝艾也乃嘆曰吾以偏師定九州今以九州之力困於枹罕彼有人焉未可圖也其人材如此酒禮之會上下相通政事寬厚吏民相親風雨時節穀糴常賤盜賊稀少和氣之應賢於內郡其風俗如此地廣民稀水草宜芻牧其畜為天下饒不但如張天鍚革響之對陳伯玉採玉之篇而已其土産如此王莽末關東兵起竇融獨以河西殷富帶河為固屬國精兵萬騎一旦緩急杜絶河津足以自守而可為遺種之處其險固如此詩列十三風茍有所關繫微如曹鄶猶録於經不然雖吳楚之強大亦在所棄也後世之樂雖非古樂比亦各有取焉古今樂府兼收并包九州萬國所採無幾而郭茂倩所録乃有燉煌樂西涼伎其聲樂如此即是數者而觀之夫豈可以荒漠其地而鄙夷其人哉明太祖髙皇帝既定中原之五年命宋國公馮勝拓地西陲而甘肅始入職方氏自是而後率以宿將鎮守其地後復益以文臣保釐其所以南輯羌戎北禦胡虜西控西域城郭諸國者無復遺算自是關中無事而海內晏然矣正德戊辰內鄉胡公由山西左布政使進拜都察院右副都御史被以璽書出殿兹土公至鎮與元戎敕使協規一心搜軍實繕甲胄積芻粟完亭障謹斥堠校旗簡士號令精明而賞罰信必內足以固圉外足以遏敵矣暇日因稽按故牘考求嘗巡撫於此者礲石題名置於公署用存政績遠遣使幣而命豫記之竊聞自宋司馬溫公著諫院題名記而有忠詐直回可權之説天下之論莫能易之豫嘗以為中人之資可導而上下者以是懼之可也自利仁之士其為善也非誘之以賞其不為不善也非畏之以刑而況又有出乎利仁之士之上者乎題名之意疑不出此昔趙文子枚數晉之名卿而獨取士會謝混歷評族之子弟而深與𢎞微君子尚友千古之士而論其世必有所從違以為處身應事之則而況居邊州之雄鎮當國家之隆委前人之政或寬或猛或繁或簡通變適宜各有攸當耳目之所暏記掌故之所藏録尚可徴也勒其名於石公務有暇召老校退卒指其名問其事而訂其取舍之宜事會之來資以應卒不亦善乎此與徒懼之以忠詐直回之迹而不示之以主善得師之方者亦若有間矣公之意或兼出於此乎豫昔與公同遊於容思段先生之門每見公屬綴流速固已服公之敏及公之仕也鳴玉禁庭均勞外服者二十餘年益明悉天下事今兹持憲臨戎統制千里其機神算略雖非愚淺所能測知然緣此而求之亦可以得其阡陌矣傳曰作而不法後嗣何觀公之作法矣公行還朝此則當附涼州故事以為百世之觀云趙時春典祀忠烈碑記昔夏后氏之王天下也窮河源濬弱水以敘西荒聲教被於流沙故全涼之境遂屬雍州其後王略寖微淪於西域漢武帝始播威靈雷振西庭風行塞外表河曲而列四郡芟樓蘭以震百蠻雖文德未稱而雄略廟算巍哉邈乎按漢初置涼部刺史郡太守令長丞官以治民都尉護軍護羌諸校尉屬國官以捍邊後復有河西都尉行大將軍權宜諸職異代因革雖名稱異宜要在強兵富民而已地既僻遠衆雜羌回犬牙相錯怙力負強競鋭爭先人懷賁育之志喬峯四阻繚以大河黃沙白草瀰漫連天風騎森列獸屯鳥散形擬金湯之險捍禦秦雍聯絡西域襟帶萬里控制強敵勢居必爭之最德隆後服道汚先叛周被驪山之難漢列河津之營唐設涇原之戍宋罷洮河之師小者稱公侯大者僭帝王強弱相噬互為雄長積骸崇丘流血丹川代有秦項之禍有明受命海宇內外各奠方位奉琛效順惟臣惟妾絃誦之聲洋溢四表然猶建關設戍􅡟虎之將熊羆之師棊布角張法罔或渝時用刀斧鋤誅鯨鯢威讓文告羽檄四馳故有䇿勳王府勒名石室祚流子孫聞望無窮其效端可睹矣然則升平之世良臣布德以宣化搶攘之時勇夫陳力以除凶大節既臨烈士隕身而效義潤澤流於生民勤勞在於社稷五祀之典禮莫先焉而令血食靡備報享未稱僉以為歉嘉靖間釐定典禮百神禋祀或興或革具如經義於是甘肅撫軍趙君載祗承德意考據圖籍質諸見聞自漢迄於近代卓然可表者具以爵里姓氏檄下有司建忠節祠以報功崇德既而涼州始興營田都御史牛君天麟初設行院亦共惇厥典遂下憲副崔君允鳩工程作祠以落成蓋表其尤著者自孔奮而下凡十八人北堂南嚮中分左右以差其次則吳克忠慕𢎞義東序西嚮李晟丁剛西序東嚮兩廡則指揮包翼等八人主書爵里姓氏具如式春秋祀事如典制無或不虔牲將麗崔君屬時春為文以記之時春惟古之忠臣賢士沒而廟食於其土者非惟人心有所不忘且將使後之人見之者有所勸而興起今諸君祀前人忠賢以示後人安知後人不有髙諸君之風復將以繼前人而示後人也法當為銘銘曰崑崙西極實生大河千里一曲秦涼是過惟河萃靈蛟龍黿鼉其光屬天寶藏興焉駿馳名馬沄沄如泉國之所重以制百蠻基自漢皇遡乎神禹右臂既渥九山實旅茫茫涼野遂通諸華張官置吏屮外一家紛紛五王陵籍魏晉凶德參爭居仁則潤叔唐衰宋九州振動天人濟時百則咸正雲雷解屯旱極而雨喁喁黎庶云胡不喜亦有俊豪能捍大患芟柞獍梟救災止亂或勤王家奉以義勇有嘉折首不戁不悚是曰忠賢實惟文武名垂竹帛震耀今古帝畀重臣來撫來巡佐以憲使保釐邊民既繩徽績爰修祀典佑啓後人永矢弗諼為臣思忠為政思賢佐我升平於億萬年趙時春遊崆洞記雍山之鎮維吳山之阪為隴其西而北二百里為笄頭山涇水出焉涇出山放之花平川四十里束於崆洞山之前峽至於山之東麓與後峽水會循龍尾山之北十餘里至於龍尾始與彈筝峽之水會而涇始大龍山下至平涼府十里而既而南北兩原廓然對峙而川始闊涇之水引而陟之兩岸以為磑為池為圃卉木茂而禽鳥聚則府城西北之勢愈增竒凡遊崆洞自城者西之自東郭者循城之北而會於西余家東郭而别墅距笄頭甚邇故凡崆洞之首尾能悉之崆洞得涇而勢愈尊蓋由鑿前後峽以疏涇而崆洞始敻出譬猶正人君子禮義以峻其防巍然莫屈彼淫夫小人望之而可知其卑且陋故凡言崆洞者舍涇則無以見其尊凡逰崆洞遵涇南岸道府西越乾溝銀洞溝經石頭塞西嶽廟掠大洞山亂涇汭至於問道宫宫者軒后與赤松廣成二子授受之所故以為名正德間有道流王翁自號全真貌若七八十者頗自矜大然亦不能辟穀但能啖巨豚肩粟至數升膞􅞷一壯酒飲百觥俗云解為五龍轉降術其術亦非道流所甚異然王持此術眩耀於士大夫間以居其資將侈其宫羣執役者艷而劫焉王斥其名以怖之盜懼敗露遂取其元以滅口素與王全真者爭執城市之惡少劾之獄又期年始獲真盜乃云云然其先枉死者已數輩矣今宫之後建一閣閣下為王全真像云江南有商遘疾得道士療之而愈自稱崆洞道士王全真命商肖像於崆洞以為報且彰其異此為其徒羞全真之死故設計以解之不足信由宫之北遂升前峽坡皆流石飛沙可四里許至山腰一巨石僵道左內有小石光圓如月狀攀躋而倦者據石而休且飲再登一里許西壁有石碑嵌岩間宋遊師雄題名處夫王全真求長生而橫罹夭折遊師雄欲得名而埋沒荒蕪可一為之慨嘆又上穿薈蔚歷曲盤如前途之半始得平地為滹沱寺寺之後稍東髙峯寺中峯益東之髙峯為東峯寺東峯之旁為眺豐亭亭之下去崖幾百丈有洞焉皂鶴巢其中亭上坐則涇川南北山之流峙城郭村塢之羅布煙雲花鳥之變態操之指掌而無遺故曰眺豐眺豐之南曰南峯寺亦懸出涇之上中峯北行半里有小岡岡上喬松六株崆洞之松以萬數皆俯仰衆植中而此松獨逈然透出噫可敬畏也松岡有小宇亦禪居北有二絶澗獨木為橋南橋丈餘北橋倍之號仙人橋過橋登峻坡即北峯寺寺後萬壑峥嶸幽巇莫測而一塔懸立其西北隅塔後下數仞為丹穴穴竇圮泐余昔曾遊焉思之可竦神也其西南林木愈蘢鬱徑愈險捫藤蘿百折而上為西峯寺西峯之右為故虎穴虎穴益西有冽泉大旱則微而終不涸泉之上復里許登馬嵕山真武廟廟之南平視為三官廟其西仰攀為香山寺三峯崆洞之絶巘下瞰眺豐五峯覽涇川南北三原若波浪之伏挫焉真武廟之東直下滹沱寺為石蹬千百級折回以數十視諸徑為極艱曲余昔遊未之及今與大梁熊子修氏乃登之云熊子曰余昔遊嵩岱華升峨嵋絶頂視此山互有異同其俱得稱為名山宜矣獨疑其靈泉抱閟嗚呼世代往矣元化推移陵谷變易吾安知其終無是與吾安知其終無是與皇清武全文芮谷諸勝記芮谷距邑城二里出城西郊由新桞灘北渡汭水桃柳夾岸畦園成列居民背山倚谷者十餘家曰芮谷莊莊行百餘步芮谷口直其東回峯環抱隱不見谷中有溪水橫塞谷口卒不獲人蹊曰橫溪渡溪前一帶林樹迷離惝恍四顧如武陵人舟行入桃源曰迷溪林渡溪而北山麓靈湫湧出深闊各數尺許禱雨輒應土人立碑祠之湫畔老柳蓊翳濃隂掩蓋望之翼然如亭復有勺泉褊小深冽在栁蓋亭之西逶迤北向泝曲道以盤登經丘繞谷數折至疊石橋橋中處山谷之半西接山門循扉而入依山靣藝建聖母宫於東搆梵剎于西昔人稱殿子坡自此始殿西北隅有沼渟泓荇藻交浮遊鱗隱見其際曰化魚沼沼傍築室數楹燒鼎烹茗是曰丹室室西崖次垂石如幕不厦屋而帡幪是曰幕石洞又西則峭壁幽岩敻峙邃處攀髙臨壑最極者曰摩雲頂側立數仞欵跨而下覆者曰覆壁凌空晴崖霽日淋灕滴岩平空作雨聲者曰懸崖浮雨若乃飛泉瀑墜散布如珠則曰瀑珠嵓晶瑩窟聚錯落如星則曰聚星窟蒼佶玲瓏可與探竒抉祕則曰石穴藏書水滴石受日久成穿則曰石穿處巨石臨隈獨坐兀如則曰兀坐石水集渠成回曲可以流觴則曰曲水渠中産蟹泥潛而族類繁衍則曰蟹渠鏤迹攬勝美不勝書是曰芮谷深處稍南則巖石竒聳秀削不成是為嶙峋石石上古柏挺生蒼枝老幹千百年如是不聞消長榮衰自柏而南突於崖半苔石團結中空外萃圜亘盈尺有泉汔汔由苔石出繩貫股分森然直注至底曰貫珠泉水石相搏響音激越目擊耳聆言莫能喻芮谷諸泉當推此為第一泉上架梯鑿石穿洞吐納煙霞反而扳乎北崖别為石洞者九安神靜息萬慮屏除既下則由山門左側出觀積氷嵓諸嵓莫不凝氷光怪離竒斯為最盛故有積氷之目又北而東陡壁絶立水源瀟灑如櫛比如簾垂又如濃露零零絡繹不絶視瀑珠嵓貫珠泉水勢更殊故曰濃露崖崖下浚地為泉曰濃露泉泉東林木叢雜途窮境阻緣木以濟闢山通道附藤蘿而北上曰攀藤徑隨徑西轉更上一層曰更上坂坂行見峪石渠摩蕩獨臨峪口下聽濃露泉其音淙淙然曰俯聽峪又西徐步忽至一所周回履坦勢如平臺憑高遠眺物無遁形遊人眼界至此曠然一闢曰曠觀臺臺南東下削壁孤傲曰寄傲巖危石迭峙曰箕踞石又南躡柳陌翺翔至縱遊原喘息俱定遊衍間適無邅迍局蹐之度原前昻首凌風屹立峯頭俯視汭水波洄瀾湧直達涇川洋洋乎又一大觀曰觀汭峯由峯北還下踐駝丘丘勢延袤有類偃駝既乃達橫豎嶺嶺小而峻自成一岑益降而北急流澎湃磴折層翻曰疊浪坡突兀無枝虬顔下垂曰覆渡柳鞠躬跨渡則東至古槐峯槐歷年永根産連珠接峯使髙柱日承天撫槐憩止雖逈臨深谷險不可即而潛溪低樹莫不獻技峯前爰為施斤鑿拓鳥路蜿蜒遞降厥步盤跚曰盤跚坂坂盡及壑林深瀨爽任意所如曰縱壑林林北羅渡布株聚蔭垂柯上蔽晴空下息人影時方盛夏可辟暑而忘薰曰密林渡逆流上溯亂石稠沓嵬碞波瀉遙望疊石橋門如雲衢天闕非復人間恆覯曰霛槎門順流而南則貫珠泉之水自縱壑林來濃露泉之水自密林渡來皆交會於滙口紆回旋繞東流為回溪新蒲細柳雜植其間遊人每低徊久之不能去溪背有石雄踞如岡振衣登嘯不啻置身千仞之上曰振衣岡又東則碣石盤據左夾溪水轉而南流行經石磴湍折不可狎視曰碣石峽峽南溪坦其執委蛇俄至半流磐石中亘水分為二上開而下合曰盤石磧環石列坐容客可什八九飛觴泛月或曰如臨島或曰如登舟去磧數武溪行窮處層澗繼之流并入而力加勇磅礴震撼瀾雪濤飛心目俱為洞駴曰戛石衝此外則回巒屏其內煙樹彌其闕谷口于是乎在佳境既盡能事復殫是曰觀止宋琬重修秦州城垣記隴以西為州者五惟秦為最巨官之所涖為衛城環郭而為城者東西有四睥睨相屬如聯珠南通巴僰北控朝那東則關山峻險此為上遊轅蹄絡繹冠蓋接武西則康居大夏燉煌張掖述職修貢織皮採玉之使歲無虛日故其規模闊壯麗譙雉櫓之雄非他郡所敢校陽九以來生齒凋耗哀我黔黎鑿山穴谷麋鹿散而熊虎鄰也順治甲午六月乙未坤維失馭陽驕隂奮載震載崩丘夷淵實氓居蕩圯覆壓萬計屹屹堅墉壞為平壤三版靡存跛羊可越余小子躬率吏民素服郊哭遍禱羣望旁行原隰飛鴻爰集百堵斯作但城罔遺堞疆圉是憂夙夜倣徨當餐廢箸或曰楨幹之需鄉遂是徴徒輦之役丘甸是問鈎金束矢之入可以庀材木焉子大夫下尺一以令國人其孰敢不從余曰吾聞之也國有大祲咎在邦伯是以澤中之謠子晳興刺城築不以其時則春秋書之今天方降威俾我民不康厥居余小子省愆毖往災患之不恤而興土工以召怨余則曷敢爰出匪頒之賜購杞梓于岷山已而遣健足括故園囷廪以益之於是秦人乃歡知其非厲已也勝衣之男占畢之士連肩踏踊負簣而趨郡守薑君身自編於畚鍤之間量廣狹凖尋尺視其勤窳而先後之縮版既興憑慿登登曽未期月而厥工告成太子太保總督尚書金公慿軾天水顧而嘉之即日拜疏列狀以請詔增僉事臣琬秩一級賜蟒服知州臣光頴豫紀録鳴呼余于是而知朝廷激勸之典與秦人風義之盛也夫詩雅所稱元黃朱芾之錫惟功德之顯爍者當之今微末小臣以區區版築之勞蒙天子之錫賚恩至渥也然小臣何功之有亦惟是父老子弟執公而急社稷之務故得藉手成事以免復隍之虞君子謂是役也庶幾猶有小戎袍澤之遺義焉語曰十人樹楊一人拔之此言成功之難今秦之為秦其城郭峙如也其樓觀翬如也其館廨翼如也其壇壝亭鄣巍如也煙火萬家鳴吠之聲相聞也皇華之使攬轡而至止幾以為未始有災焉而不知余與薑君躬丁大厄篳路襤褸呼號于荆榛瓦礫之場者秦之人實耳目焉後之君子念前人音羽之勞軫兆姓阽危之苦御之以恕載之以寬為保障勿為繭絲為韋珮勿為束濕二三孑遺庶有豸焉不然者雖金城湯池安知不鑿山穴谷相率而去我也世不乏尹鐸召信臣其人因記城工之始末而並致相朂之意如此劉斗蘭州新建撫署題名碑記粵稽在昔甘涼置中丞以專彈壓重疆域也我朝中外一家率土普天悉入版圖治在偃武修文以底三秦是以皇上初御九五即歸兵事而以臨鞏肩之敻哉聖謨矢文德以洽四國之道也余從青瑣特簡西陲銜敦本安內之意拜命而出式遄其行歷太華逾關隴問津天漢爰抵五涼滿目黃沙寒煙數點巖城一線孤繫天垠且地瘠民貧逃亡過半賦逋如山餉亟於雨余喟然曰聖天子加惠元元無遠弗屇逖矣西土咸荷炯鑒中也爰殫力拮據如葺破屋如整亂絲如斧錯節請免積逋三十萬竒奏可民命稍蘇越五年上復量地酌官總九圍而計之劃然分陜又以寧夏平慶裁歸甘屬仍敕移駐蘭州宅中圖治余凜顔咫夙夜不遑即進僚屬而謀之僉曰蘭蹂躪之餘未有衙宇其何以息事而寧人無已惟故肅邸遺址可建焉余惟捐俸經營而各司屬復量輸以襄厥成揮瓦礫披荆榛鳩工庀材肇於春竣於夏於六月上浣而視事是役也地取諸廢藩材取諸市易磗石取諸燼餘夫匠取諸雇募不勞民不捐帑屹乎峙都會焉斯役也慨然念南壘岫而北松山西玉門而東銀夏蜿蜒數千里跨州郡者五十餘區半壁長城咸責匪躬非穆之治劇之才而膺遺大投艱之任即黽勉從事曷以仰答宸衷哉或曰凡建公署必紀事題名昭兹來許蓋蘭為七劇九達之地酒泉張掖武威湟中則班定遠趙營平衛霍諸公之所開拓也回中原州則李西平范文正之所經營聲教也摩雲嶽麓雪山嶓塜則馬文淵虞升卿信與紀玠與璘之所馳驅固守也白豹烏侖賀蘭鳴沙則方叔南仲狄懷英种仲平之所築鑿招輯也曠古人豪赫赫若覩今皇上奠萬世丕基毋俾往哲專美於前余曰嘻之數君子後先相望良慕之重之敢謂車書萬里遂以優遊塞太平乎顧名思義用是瞿瞿苐名者實之賔也有其實斯垂鑒勿替余固不敢不勉踵此意以矞皇之俾一代勳名紹休前烈光簡册著旗常磨崖志美銘碣紀功于不朽使此碑與臯蘭永峙而姓氏之芳當一度之河清更有望於後之君子則今日擇言是為異日之嚆矢也歟爰鑱石而記其事許孫荃孫將軍碑記孫提臺者喬木故家也康熙壬寅公秉鉞來鎮甘肅是時海氛不靖厪聖明西顧之憂公以世臣而膺重寄則保障兩河屏翰三秦胥于一身是賴公勵精振刷不遑寧處剔軍政之蠧蝕汰冗食之羸卒簡才良以備扞禦核儲餉以資飽騰凡所以籌邊計而固封疆者靡不劃然畢舉而將士精強威令嚴整甘肅一鎮稱為天下雄藩矣由是海夷喪膽西羌寒心二十餘年不復萌窺邊之志者惟公之先聲有以奪其氣也嘗戒諸將曰河西戎馬之地兵民雜處兵戢則民安民安則國本自固況此一塊之土先經冦擾繼罹回殘煢煢孑遺瘡痍未復正宜安全而蘇息之或可以漸至起色也奈何一意治兵而于此殘黎竟不曲為保護乎於是勸飭文武衙門輕徭薄斂慎獄清刑利者興之弊者除之即或纎毫有病於民民不敢瑣瀆者公聞之轉囑有司立行剔革而後已蓋公胸懷豁達舉動光明雖屢以民事忤當路者而屬僚同寀皆諒其大公無我之心所以誠能動物而德孚于上下羣情也故駐節涼州二十載井里市㕓熙穰自如而民若不知有兵者所謂兵戢民安而威令素行故如此至于因材器使一秉至公吐賢豪之氣杜幸濫之門參將遊擊半出部伍以至領節旄而專閫者接踵而起皆公造就提拔為國得人之效班班可指數也吳逆之亂隴右諸郡皆陷公提兵東渡所向成功靖遠平涼相繼收復南安天水以次削平然師旅所經秋毫無犯室家廬舍安堵如故至今靖遠諸處家尸戶祝蓋報公生全之德有如此者底定後春秋有加而公撝謙自如好賢樂善厚下親民二十載如一日也甲子歲奉命提督三鎮移駐甘州公去涼三歲而闔屬官紳兵民思之而不能已也會荃視學來西按部至涼則有大靖所屬營員兵民以去思碑記來請余想夫公之在涼其湛恩汪濊之所被既深且久而涼人戴天而忘其髙履地而忘其厚今去三載如嬰兒之失父母謂有能已於思者乎雖然甘州去涼五百里政令威惠可呼吸立至者甘與涼何分遠邇惟是公之功業在社稷德澤在生民紓朝廷西顧之憂奠疆宇磐石之固荃備員學職宜得珥筆而記其事以俟纂入史册傳之後世為封疆大臣之鑑豈不爛然光大也哉公諱思克字復齋奉天之廣寧人通智惠農渠碑記黃河發源於崑崙歷積石經銀川由石觜而北繞鄂爾多斯六部落入黃甫川逾潼關會泗沂合淮歸海源遠流長而朔方一帶導引灌溉厚享其利焉獨查漢托護地方沃野膏壤因漢唐二渠餘波所不及遂曠為牧野我皇上軫念寧夏為邊陲重鎮建新城設將軍領兵駐防特命侍郎臣通智會同督臣嶽鍾琪詳細踏勘嗣命臣通智偕侍郎臣單疇書專董是役復揀選在部道府州縣十五員命赴工所分司其事又奏請調取守備官辨武舉等十有二人共勷厥工乃相土宜度形勢以陶家觜南花家灣為進水口近在葉升堡之東南也黃流自青銅硤口而下支派分流至此而滔滔汩汩順流遠引足溉數萬頃之田其渠口石子層纍底岸維堅由此而東北遍歷大灘擇地脈崇阜處開大渠三百里口寬十三丈至尾收為四五丈底深丈一二尺以至五六尺不等高者窪之卑者培之引入西河尾並歸于黃建進水正閘一曰惠農閘建退水閘三曰永護曰恆通曰萬全節宣吐納進退無虞設永泓永固暗洞二以通上下之交流設彚暗洞一以接漢渠之餘水正口加幫石囤頭閘堅造石橋則渠源不患沖決特建尾閘以蓄泄之外纍石節以鞏固之則渠稍可以永賴大渠口以東俱引灌大渠水其田勢髙處刳木鑿石為槽以飛渡漢枝渠之水而東之仍不失其已然之迹西坂渠尾以南直抵渠口其西岸不能歸暗洞之小退水特留獾洞放之大渠一帶出之亦絶無漲漫之患任春葉升二堡為往來孔道於正閘覆造橋房旁列數楹可為守者居兼為行者憩建龍王廟立碑亭以記工程並壯觀瞻沿渠之橋二十有二西河之橋十六行旅往來賴以普濟其枝渠四達長七八里以至三四十里者百餘道均作陡口飛槽而戶口人民沿渠又各制小陡口小獾洞千餘道以相引灌自此溝塍繡錯二萬餘頃良田無不霑足于渠之東循大河涯築長堤三百二十餘里以障黃流泛溢於渠之西疏通西河舊淤三百五十餘里以瀉漢唐兩渠諸湖鹼水各閘旁建水手房四十二所以司啓閉遍置塘房三十七處稽察邊汛而大渠長堤以至西河兼恃防護渠堤兩岸俱夾植垂楊十萬餘本其盤根可以固湃岸其取材亦可以供歲修至於東北隅一帶其地尤廣其土尤沃改六羊河為渠一百一十餘里以佐大渠所不及奏請建縣城二其一在田州塔南為新渠縣其一在省嵬城西為寶豐縣立縣令以膺民社設通判以司水利建學校以育人材置營辨以備防汛移市口于石觜漢夷皆便建城堡於山後守禦相資兹役也蒙皇上特頒帑銀十六萬兩以為工匠車船一切物料之用纎微不纍於民肇始於丙午之孟秋工竣於己酉之仲夏向之曠土今為樂郊復蒙皇恩廣被又頒帑銀十五萬兩以為招徠戶口恆産耕種之資由是億兆歡呼爭先趨附闢田園葺廬舍犁雲遍野麥浪盈疇勤耕鑿者歌帝力安隴畝者頌高深奏之九重錫以嘉名曰惠農渠遐陬赤子盡戴光天邊塞黎民欣逢化日誠國家萬年之基而民生世享之業也爰立石而為之記通智欽定昌潤渠碑記雍正四年歲次丙午皇帝命侍郎臣通智單疇書會督臣嶽鍾琪經營查漢托護地方開大渠以資灌溉築長堤以障狂瀾易畜牧為桑麻者三百餘里但大渠之東北隅灘形廣闊水難遍及有黃河之支流名六羊河者口形如列指泝遊數里復合為一迤邐而北經大小方墩越葫蘆細歷省嵬城而仍歸於大河沃野腴壤綿亘百餘里因迤黑龍溝而西故水勢順下漫無停蓄不能引之灘中河之下流遂淤率諸執事循其已然之迹順其勢而利導之凡湃岸之傾圮者培之使平河流之淤塞者濬之使通爰於渠口建正閘一曰昌潤閘外設退水閘曰清安使水有所瀉以備歲修堵口也內設退水閘曰清暢使水有所分以殺湍流漲溢也相地制宜分列支渠二十餘道中多高壤不能盡達復設逼水閘三曰永惠永潤永屏束之使其勢昻而盈科而進仍由故道以入于河諸閘既建俱跨橋以通耕牧往來正閘之上覆以橋房其旁則立有龍王廟碑記亭渠兩旁俱插柳秧資其根力以固湃岸自此啓閉以時蓄泄有方而大渠以東遂無不溉之田矣欽定名曰昌潤渠以昭示來兹垂之永久是役也用以仰副我皇上仁育萬物無遠弗屇之至意渠之兩旁良田萬頃比戶千家白叟黃童均沾聖德青山緑水悉載皇仁誠盛世之𢎞模而萬年之樂利云楊應琚新建慶祝宫記并序乾隆三年八月壬辰新建慶祝宫成欣逢聖天子萬夀之期文武寮屬將校盛服博帶聚於會城商賈士庶張目拱手歡呼動地癸巳五鼓官吏畢集咸次於位燈火如晝修陛飛闥雲布於上華旗鳳蓋金節析羽星羅於下鐘鳴樂奏蹌蹌翼翼如對丹宸猗歟盛哉既退西寧僉事應琚請紀其成詞曰維甘寧八郡自軍興後檄書旁午文武士吏趨事不遑故凡禮文典章略而未舉中丞奉命涖止即詢朝賀之所竟無專宫曰官吏雖誠敬在心而億兆之觀瞻國家之大典不可缺也爰擇地選官徴工僦役築高墉礱巨礎伐木陶埴力協功速門闕崇閎殿楹棘翼表道有坊待漏有舍邊陲之地亦可謂規模少備矣且夫事貴因時值此邊烽已息海宇清和士庶無內外之繇商賈有殷富之樂冠裳濟濟恪恭盡職正當修明典禮以答升平而朝賀之所威儀首重尤不可緩書不云乎一人有慶詩曰君子萬年此物此志也夫河水發於崑崙皓月盈於南極維地維時天子受祉百工稽首永勒金石四方來賀於斯萬祀知作之所始楊應琚西寧新築黑古擺羊戎九城堡碑記背郡城東南馳一日二日抵雪山下為黑古城千戶莊亦雜石癿思觀什扎巴擺羊戎甘都堂折而西百五十里為河拉庫托渡河而南為康家寨皆古羌戎地逼介諸畨歲為商旅邊氓害以貽官憂今天子即位之叁年前制府相國查公巡閲至郡余與古鄯遊擊將軍楊君垣條悉其事謂非就險建城設官增兵不可以理制府毅然以俞奏可適四年寧郡飢余任其責巨細必躬親半歲未嘗蓐寢小民幸免於轉死而少壯者不可俾以坐食爰請於大府割工價六分之一加糧升六合以價自養以糧養家檄西寧靳令夢麟碾伯徐令志丙分督之始於四年之孟夏迄工於五年之仲秋完城堡九周回自一百二十丈至三百八十四丈咸相其隂陽依其巖阻隨其廣袤而成言言仡仡實墉實壑諸畨悉縮項橋舌屏氣而伏起視四境羊牛滿野一童子牧之矣帑以兩計凡九萬四千九百七十廩以石計凡一萬四千八百增兵將益俸餉其為役亦大矣哉然小民不以為勞度支不以為多皆仰荷聖主寬大之德也嗚呼國家設一官而帑廪增一費將以利民也地方設一官而百姓增一纍以其有害也何謂利慎固封守撫畨恤下是也何謂害鍵閉不修征私擾衆是也同一官耳利害如反覆手可不懼哉昔人云有其患而圖之無其具有其具而守之非其人皆足以致敗故紀其俶末以告後之司險者甘肅通志卷四十七
