書貞元中隴右節度使李元諒築城屯軍名曰崇信九域志在渭州東南八十五里銅城在縣西地形志安定縣有銅城即此宋志慶厯四年陜西漕臣張奎采儀州黄銅置博濟監蓋在此明一統志城在縣西四十里廢潘原縣銅城山以此為名舊志黄巢之亂土人築以禦㓂北枕髙山南面平原踞汭水峽口故趾尚存今南移二里許為中原堡赤城在縣南五十里府志相傳秦始皇田獵至此築城駐蹕以土赤故名今為新安堡又廏城在縣南一里唐李元諒築以畜馬九宫城在縣東十里北山之麓初欲建城於此築九堵而罷故又曰九工華亭縣儀州故城與縣城相連西抵華尖山麓東瞻儀山後魏普泰初築城置鎮以扼蕃戍之路唐為神䇿軍地後唐同光中改置義州周置華亭縣於州郭宋太平興國間避諱改儀州熙寧中州廢化平故城在縣西北一百二十里宋置本名安化屬儀州西北至番界十里尋改屬渭州金大定七年改為化平元併化平入華亭都盧城在縣西都盧山下武王伐啇不期而會者八百國誓師牧野有曰盧人傳曰盧彭在西北是為盧國古城屯城在縣東唐李元諒屯兵拒吐蕃時所築也地近崇信縣界瓦亭砦在縣西北八十里金佛峽内控隴山一帶即古蕭闗也後漢隗囂使牛邯守瓦亭山唐肅宗幸靈武牧馬於此大震門舊號大震門宋慶厯中改制勝闗管沿山小砦五十五䖏熙寧七年改制勝闗為安化縣廢舊縣為鎮皇甫山居在縣西黄家山山連華尖下有九龍池相傳為皇甫氏别業今池廢九曲址存朝陽樓在縣東四十里鎮原縣臨涇故城在縣西二里漢縣晉安定郡治唐屬涇州唐書大厯九年吐蕃冦臨涇元併入鎮原州按縣本古臨涇地歴代諸志可考唐置行原州宋為原州明一統志謂即隋唐原州遂謂即古高平縣悮甚彭陽故城在縣東八十里漢縣以在彭水之陽也屬安定郡後魏屬原州後置雲州唐置豐義縣宋復曰彭陽元昊入冦种世衡將景泰遇于彭陽城依山為陣安武廢縣在縣南漢置屬安定郡後漢省後魏復置屬西北地郡元和志臨涇縣兼有漢安武安定彭陽撫夷四縣之地舊志安武故城在府東北撫夷廢縣在縣北漢置屬安定郡後漢省後魏復置屬隴東郡隋省安定故城在縣東南漢置屬安定郡後漢省後魏復置移於南界即今涇州也元和志安定故城在臨涇縣保定城在縣南唐貞元七年涇原節度使劉昌築保定城捍青石嶺十年又請于臨涇界保定城置陰盤縣又武亭城在縣南六十里西城屯在縣東南九十里唐興元初李晟復西京朱泚自涇州北走至彭原西城屯其將梁庭芬等殺之趨涇州降佛空坪堡古縣也宋慶厯中修捍北邊栁泉鎮在縣西北七十里舊名鵓鴿泉宋慶厯置西即熟户明珠滅臧康奴等族北綏寧砦回中宫秦時建漢武帝元封四年行幸雍通回中道遂出蕭闗應劭云回中在安定平髙有險阻秦置回中宫于此凌雲閣在縣東玉山巔下臨萬仞常有雲氣書臺在縣北潜夫山金大定間因書臺舊址建思潜亭固原州髙平故城即今州治漢置漢志武帝元鼎三年置安定郡治髙平地形志新平郡有髙平縣又云大延二年置髙平鎮正光五年改置原州並置郡縣治髙平城隋志平涼郡治平髙縣魏髙平縣後改為平髙元和志原州治平髙縣本漢髙平縣九域志鎮戎軍至道元年以故平髙縣地置有髙平砦慶厯三年置嘗建州在軍北宋志髙平領髙平砦元改置開城府明成化四年討平滿四陞固原所為衛𢎞治十五年總督秦紘開閫固原請于固原衛城設州遂為重鎮開城廢縣在州西南四十里宋為開逺堡元至元十年皇子安西王分治秦蜀遂立開城府仍視上都號為上路至治三年降為州治開城縣明廢州為縣成化三年縣省入州三水故縣在州北漢置三水縣屬安定郡屬國都尉治有鹽官晉廢今于城東北有故城城北有三泉疑即鹽官也後魏改置於今邠州界非故縣也他樓廢縣在州北舊唐志貞觀六年置緣州領突厥降户寄治平髙縣界他樓城神龍元年移于地犍縣元和志隋有他樓縣寰宇記本漢髙平地水經注太婁故城太婁即他樓之訛䔥闗廢縣在州北唐神龍三年廢他樓立蕭闗大中五年以縣置武州宋志蕭闗砦崇寧四年建築大觀二年以砦𨽻懷徳軍金廢舊志以為在鎮原西北通志以為在華亭西北即瓦亭驛俱悮西川廢縣在州境三國魏郭淮傳正始中涼州休屠降使居安定之髙平其後因置西川都尉傅元傳泰始四年疏請置一郡於髙平因西川都尉募民充之晉志安定郡有西川縣蓋即故都尉置縣也後廢後魏時有西川侯彭文暉蓋亦即封於此東山廢縣在州東南四十里九域志鎮戎軍有東山砦咸平二年置金陞為縣屬鎮戎州元初改屬鎮原州後併入鎮原至元十年安西王封守西土立開城路改為廣安縣十五年陞為州仍𨽻開城路明初廢今為東山砦三川廢縣在州西北三十里九域志天聖八年置三川砦屬鎮戎軍今陞縣屬鎮戎州元併入鎮原州西安故城在州西北二百十里宋志元符二年以南侔會新城建金志皇統六年以西安州沿邊地賜夏國廢懷徳軍在州東北一百五十里即細腰葫蘆硤城通韋州靈夏諸䖏其路兩山相夾最為要害宋范仲淹請築細腰葫蘆諸砦紹聖四年章楶請城葫蘆河川據形勢以逼夏人賜名平夏城大觀二年改懷徳軍増置將兵於西安鎮戎互為聲援應接靖康間軍廢豫望城在州北二百二十里宋時與西夏分界䖏即今平虜所明𢎞治十七年總督秦紘言固原迤北地名豫望城騍子川獅子川石峽口及寧夏之韋州延袤千里可墾田土無慮數十萬頃請築屯堡議耕種長城在州西北十里有遺址綱目秦滅義渠築長城以拒敵即此石城堡在州西北一百五里四壁削立山頂平曠四圍石牆髙二丈中有石井五各濶丈餘以貯水惟一路可登地甚險窄明天順中土達滿四據此以叛