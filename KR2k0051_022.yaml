地上郡漢置義渠道屬北地郡西魏始置寧州府志有公劉邑在州治西一里許周之先公劉居此謂之北豳春秋時為義渠即此元和志夏時公劉邑地也後為義渠國地秦為北地郡地大故城在州東南漢志大縣屬北地郡顔師古曰古要字金志真寧縣有要闗鎮或以為即古大舊志鎮屬寧州乆廢定平廢縣在州南六十里唐置屬寧州元和志縣北至州七十里自漢至晉並泥陽縣地後魏至周並為定安縣地唐武徳二年析置定平縣新唐志定平縣嘗屬邠州寰宇記周顯徳五年還屬寧州宋又𨽻邠州元志至元七年併入寧州襄樂廢縣在州東北六十里本漢襄洛縣屬上郡在今延安府界後魏徙置于此改為襄樂大統十六年置燕州因築此城皆後周廢唐屬寧州金志仍屬寧州元志至元七年併入寧州明設巡檢司州志舊縣在州東北燕原下今為襄樂鎮獨樂故城在州東南漢置縣屬上郡在今延安府界後魏移置於此屬趙興郡後漢晉罷後復尋廢安定故城本名定安金大定七年更名旁有洛水九陵水城在州南六十里政平里明設政平驛并遞運所石鼓坪在州東六十里襄樂原有石如鼓擊之有聲其地腴可田黄龍亭舊名高岡亭後漢建武中曹鳯為北地太守政化尤異黄龍應於九里谷之高岡亭角長三尺大十圍稍至十餘丈天子嘉之賜帛百疋加秩中二千石交城鎮金天徳二年置又棗社鎮大昌鎮俱金皇統間置李思齊城在州南一里元將李思齊屯兵之䖏安定閣在州西五十里對安定砦分竒挹秀如畫障然見方輿勝覽巖色濃如黛石可鑴硯宋張舜民有詩詠之六君子堂在州西宋建舊碑毁廢名氏不存明洪武初知州林善以隋元諧梁毗唐李勣狄仁傑宋孔道輔李允則六人皆有徳於寧州者乃重建堂祀焉臨海詹鼎作記九龍池在州東南十里相傳唐狄仁傑為刺史時人有賣劍牛者議價間賣者忽失所在仁傑怪之次日有九小兒擁水泛漲將沒州仁傑使人馳牛而徃斬小兒俱化龍形水遂消州遂保全因此名池梁公墮淚碑狄仁傑為寧州刺史能撫戎夏郡人紀之碑及遷豫州會越王亂緣坐七百餘人籍沒者五千口仁傑宻表奏貸流罪人于九原郡道出寧州父老迎而勞之曰我狄使君活汝耶相攜哭於碑下三日而去甘州府張掖縣觻得故城漢書元狩二年霍去病出隴西渉鈞耆濟居延遂臻小月支攻祁連山揚武乎觻得地理志張掖郡故昆邪王地太初元年開治觻得縣孟康曰觻音鹿按漢書觻作鱳又作轢徳臨澤故城在府西北漢置昭武縣屬張掖郡晉志張掖郡領臨澤縣本漢昭武避景帝諱改名後魏廢金澤廢縣在府南十六國春秋晉建元元年張駿田於建西䃋石縣改䃋石為金澤縣吕光麟嘉元年張掖金澤縣有麟見光以為已瑞改元臨松故城在府南魏收志臨松郡領安平和平二縣隋志張掖有臨松縣周廢寰宇記後魏太和中置臨松郡在臨松山下吐蕃賛普即其郡異稱也西安廢郡在府東南十六國春秋段業神璽二年徙治張掖遂築西安城以臧莫孩為太守尋為吕纂所敗沮渠䝉遜永安元年為西安太守起兵攻張掖殺業而代之後魏郡廢祁連廢縣在洪水堡南三十里晉志永和中張祚置漢陽縣以守牧地張元靚改為祁連郡魏書李寶父翻為祁連晉昌二郡太守尋廢唐開元十六年金吾將軍杜賓客破吐蕃于祁連城下即故城也胡氏鑑注城在祁連山旁故名張掖故郡漢置後魏於張掖郡分置西涼州尋改甘州以西南有甘浚山故名居延故城括地志在張掖東北一千五百三十里漢置武帝紀元狩二年霍去病出北地二千餘里過居延太初三年路博徳築居延澤上天漢二年李陵出居延至浚稽山地理志居延縣屬張掖郡為都尉治郡國志張掖居延屬國故郡都尉安帝時别領居延一縣建安末立為西海郡新唐志張掖河西出合黎山硤口旁河東壖屈曲東北行千里有寧冦軍軍東北有居延海元志有亦集乃路在甘州北一千五百里城東北有大澤西北俱接砂磧乃漢西海郡居延故城夏國嘗立威福軍太祖二十一年内附至元二十三年立總管府明洪武初馮勝拔肅州進至掃林山亦集乃路即此千秋城萬嵗城二城皆光武時竇融所築懷城縣十六國春秋沮渠䝉遜元始八年太史令張衍曰今嵗臨澤縣西當有破兵䝉遜遂西誘李歆敗之於懷城歆退走追至臨澤斬之後魏廢蓼泉城在府西北九十里祁連山北有建康軍軍西北二十里有蓼泉守捉城苕藋在府東十六國春秋禿髪傉檀嘉平四年伐北涼五道俱進至番和苕藋掠五千餘户而還沮渠䝉遜元始二年西入苕藋遣兵襲卑和烏啼二部五年祀金山西至苕藋復襲卑和一統志謂苕藋在金山之西舊志謂在番和界誤均石在府東十六國春秋秃髪傉檀𢎞昌六年伐沮渠䝉遜於張掖入自西陜䝉遜來拒戰於均石傉檀敗績乃率騎運穀以給西郡復為䝉遜所敗胡氏鑑注均石在張掖之東西陜之西葢西郡界三門闗在府東十六國春秋吕光龍飛四年遣子紹纂討段業於張掖及南涼救至引還紹欲從三門闗挾山而東纂曰挾山示弱取敗之道不如結陣衝之紹乃引軍而南業案兵不動留花門山堡新唐志寧冦軍北三百里有花門山堡又東北千里至囘鶻牙帳山丹縣刪丹故城今縣治漢置屬張掖郡以刪丹山為名元志甘肅行省有山丹縣本刪丹縣元至元六年阿濟格行山丹城事刪訛為山日勒故城在縣東南漢置屬張掖郡郡國志獻帝分置西郡治日勒縣志云自姑臧西北出張掖度大嶺而西西郡當其要嶺謂刪丹嶺也十六國春秋䝉遜永安八年敗秃髪傉檀於均石進攻西郡太守楊統於日勒拔之隋志刪丹有西郡永寧縣西魏郡廢改縣為弱水周省入刪丹屋蘭廢縣在縣西北漢置屬張掖郡後魏省氐池廢縣在縣西南漢置屬張掖郡晉省後復置十六國春秋秃髪傉檀𢎞昌五年伐䝉遜次於氐池䝉遜嬰城固守芟其禾苗至赤泉而還胡氏鑑注氐池故城在張掖縣界仙提廢縣在縣東晉志西郡又領仙提萬嵗蘭池三縣舊唐志晉分刪丹置仙提萬嵗臨松三縣煬帝併入刪丹新志有仙堤舖在縣東十里蓋以故縣為名金山廢縣在山丹縣西南十六國春秋沮渠䝉遜永安十年以從伯羅仇子成都為金山太守蓋以近金山故名後魏省隋志刪丹有周置金山縣尋廢甘肅通志巻二十二
