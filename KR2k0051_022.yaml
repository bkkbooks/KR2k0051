body:
  text: 甘肅通志巻二十二古蹟山林藪澤舊宫故壘古人徃矣其蹟猶存流風餘韻繫人懷想或訪諸樵牧以知軼事或廣稽碑碣以讀遺文紀其盛衰資為聞見歷世不嫌久逺考古可以證今詳為摉採著之於篇志古蹟臨洮府狄道縣狄道故城在今府西南史記匈奴傳隴西有翟䝠之戎百官志縣有蠻夷謂之道漢因置狄道縣為隴西郡治後漢永初五年羌亂詔隴西郡徙治襄武延光二年還治狄道寰宇記縣在蘭州南一百九十里晉恵帝時以狄道縣為降狄道也府志有舊土城俗名番城在縣南一里許東西北三面與府城濠相連即故城也安故故城在府南漢置屬隴西郡武帝元鼎五年西羌反攻安故圍枹罕城葢與河州境接也前涼錄永昌元年張茂分安故郡置定州宋白曰安故在蘭州南州志縣在隴西郡南四十七里唐時為安國鎮五代周廣順中自安國鎮至涼州立三州以控扼諸羌三州臨河蘭也按此則寰宇記安國城在五泉縣西南明一統志在蘭州西八十里舊志在今縣西南一百六十里皆悞武街故城在府東東晉置晉志恵帝分隴西之武街縣屬狄道郡水經注濫水自白石山又西北逕武階城南即武街之訛也長樂廢縣在府西元和志天寶别置安樂縣屬臨州舊唐志長樂縣舊曰安樂後陷吐蕃廢或曰即宋康樂寨也康樂廢縣在府西三十六里九域志熈州領康樂寨宋熙寧六年置金升為縣元廢當川廢縣在府西四十里九域志熙州領當川堡宋熙寧六年置金升為縣元廢水池廢縣在府西南魏收志河州有洪和郡首領水池縣隋志枹罕郡領水池縣魏曰蕈州周改名唐廢舊志水池城在洮州衛東北一百六十里長城在府北三十五里史記秦始皇遣䝉恬發兵三十萬北築長城起自臨洮唐置長城堡吕布城在府西二里洮水東岸相傳吕布所築鶴鳴城在府西南相近又有三足城明一統志皆唐時吐谷渾所築鞏令城在府西南吐蕃所築也宋熙寧六年王韶圖武勝使徳順將景思立分兵自南甲趨鞏令即此舊志鞏令城在府西南一百五十里或曰南甲在府南三十里故闗城在府北三十里佛兒崖今廢址尚存洮陽城蘓林注曰地居洮水之陽也後為吐谷渾據之周明帝逐去因立洮陽郡今謂之洪和城通谷堡在府東三十五里一名寸金城其谷東西僅踰百歩上有竅可覩天日名曰通谷宋熙寧間置臨川閣在府城中唐天寶中建下臨清流為一郡登臨之勝超然臺在府東一里本名鳳臺宋熙寧中蔣之竒改名明嘉靖三十年楊繼盛改建超然書院於其上西湖在府西南二里嵗五月五日引洮水注之郡人遊樂於此渭源縣首陽故城在縣東北漢置舊唐志渭源漢首陽地西魏改首陽為渭源縣上元二年復改曰首陽復於渭源故城置渭源縣儀鳳二年併首陽入之渭源故城在縣東北與今城相連址存渭源堡在縣西北岡上三百歩許宋王韶屯兵於此遺址尚存蘭州金城廢縣今州治漢置屬金城郡孟康曰初築城時得金故曰金城薛瓚曰取其堅固也後魏省尋復置子城縣兼移置金城郡來治隋志金城縣舊縣曰子城帶金城郡其後又改縣曰五泉宋志崇寧三年復改置蘭泉縣為倚郭縣金省入蘭州石龜城在州城北河畔州志石龜城即州基也北臨黄河有石如龜伏城垣下俗名大禹决河故道允吾故城在州西漢置始元六年置金城郡治此應劭曰允吾讀曰鉛牙水經注允吾縣在黄河之北湟水之南通志在廣武縣西南一百五十里又明一統志允吾縣在蘭州西南五十里州志土人謂之西古城𢎞治十年重修為堡按允吾在黄河之北今屬涼州西古在河南即金城故址非是阿干廢縣在州西南四十里九域志元豐六年置阿干堡元一統志金大定二十二年陞為縣屬蘭州至元七年併入州媪圍廢縣在州東北漢置屬武威郡水經注河水經媪圍縣界東北流至勇士即此嵻㟍城在州南一百四十里嵻㟍山下晉義熙四年西秦乞伏乾歸子熾盤在苑川畏姚秦之偪築城於此而據之後廢石城在州西北水經注河水東經石城南謂之石城津又梁熙攻涼河會城降之葢在大河與湟河會處故又名河會城西市新城蘭州舊志在州東南七十里又大定城在州北元豐中與夏人分界處也明嘉靖中議邊事者謂復大定城可屯礦兵以守河北葢其城常為冦衝云安西城在州南三十里天都山宋神宗時苖綬伐夏嘗經此山瓦川會城在州西南一百二十里馬啣山宋時李元昊所築定火城在州黄河北四十五里王保保城有二一在州東東岡坡一在金城闗北王保保即元庫庫特穆爾明洪武初保保據州時築元昊臺在州西十五里有級數十重元昊攻阿干駐兵於此肅王府在州治北明太祖第十四子洪武中封肅王三十一年自甘州移國於此候馬亭在州西北十五里漢武帝聞大宛有天馬遣李廣利伐之遣使候馬於此故名望河樓在州西北二里傍黄河岸唐岑參有詩後代名人徃徃題咏鐵冶在榆谷元一統志去州五十里先代民冶故址今跡尚存金縣龕谷廢縣在縣南二十里本宋之龕谷寨元祐七年廢紹聖四年復修為堡金升為縣正大三年河州陷河西因以龕谷為金州治所元至元七年併縣入州明洪武初改州為金縣在蘭州東九十里定逺廢縣在縣西北三十里宋志定逺城舊名李諾坪种誼知蘭州時所築金升為縣元廢為鎮今為定逺驛勇士廢縣在縣東北漢置屬天水郡舊志在靖逺衛西南二百里苑川城在縣東北水經注苑川水北逕牧師苑故漢牧苑之地羌豪迷吾等萬餘人到襄武首陽平襄至勇士抄苑馬焚燒驛亭即此處有東西二苑城相去七十里元和志苑城在五泉縣時未置今縣也元一統志在蘭州西悞平地城明一統志在縣北四十里唐戍兵所築又有三角城在縣東十里亦唐戍兵所築又東古城在縣東二十里亦唐時築一條城在縣東北一百里宋狄青巡邊所築本名龍溝堡明萬厯二十五年兵備張棟疏請改建為一條城河州枹罕故城今州治漢置縣屬金城郡應劭曰故罕羌侯邑也後漢改屬隴西郡晉張軌分屬晉興郡咸康元年分晉興郡置河州寰宇記州東南至狄道縣一百四十八里後陷吐蕃廢九域志宋熙寧六年收復置河州以唐枹罕縣地置枹罕縣九年省紹興初陷於金金志貞元二年復置縣為州治元又省府志枹罕廢縣在縣西又有東古城在州東二里乃唐舊城西古城在縣西二十里相傳宋時築北古城在州北一里乃元城大夏古城在州東南漢置屬隴西郡晉初縣廢恵帝時張軌復置改屬晉興張駿又置大夏郡後魏復為縣屬金城郡隋屬枹罕郡唐屬河州元和志縣西北至州七十里宋廢又寰宇記大夏城西二十里有金劍城一名金栁城前涼曽置金劍縣於此白石廢縣在州西南漢置屬金城郡後漢改屬隴西郡晉初省十三州志曰白石縣在狄道西北二百八十五里鳯林廢縣在州西南本白石縣地晉恵帝時張軌分置永固縣晉志軌置晉興郡領縣有永固是也後入吐谷渾廢唐改置鳯林縣屬河州元和志東北至州八十里臨津廢縣在州西北一百二十里晉志張軌置晉興郡領縣有臨津是也後魏省水經注河水東逕臨津城北白土城南為緣河津渡之處武城廢縣在州東晉時涼張氏置十六國春秋咸康元年張軌分武城郡屬河州寧河廢縣在州南六十里九域志熙寧七年置寧河寨宋志本吐蕃所置香子城也崇寧四年升寨為縣明初廢後改和政驛定羌故城在州東南一百里即吐蕃所置阿諾城宋熙寧七年王韶克河州破阿諾木藏城改名定羌城元升為縣後廢安鄉故城在州東北五十里臨河吐蕃所置城橋闗宋置安鄉闗屬河州元升為縣後廢澆河廢郡在州西古西羌所居相傳趙充國所築水經注河水東經澆河故城北有二城東西角倚東古城在州東二里遺址尚存近由塔寺乃唐舊城西古城在州西三十里牆垣猶存乃宋城北古城州北一里號番城乃元城東北去西平二百二十里宋少帝時拜阿豺為澆河公即此城也元和志秃髪烏孤以西平河南地為澆河郡後周建徳五年於今州理南東達化縣界澆河故城置廓州取廓清之義詳西寧志米川廢縣在州西唐置唐志米川本漢枹罕縣地貞觀五年於此置米州及米川縣十年廢屬河州永徽末移於河北屬廓州此城遂廢又見西寧府廢積石州在州西元和志積石軍在廓州西南一百五十里儀鳯二年置西臨大澗北枕黄河即隋澆河郡所理宋慶厯後屬西夏其後入吐蕃名溪哥城金升為州明初廢今為積石闗出闗即屬境外懷羌廢縣在州西南宋置金升為縣屬積石州金志縣西至生羌界八十里龍支城在州北一百四十里後魏名北金城隋屬枹罕郡宋為宗哥城平夷城在州西南元和志平夷守捉在州西南四十里開元三年郭知運置鹽泉城在州西開元二十六年隴右節度使杜希望發鄯州兵奪吐蕃河橋於河左築鹽泉城置鎮西軍在州西一百八十里又元和志有天成軍在州西八十里開元三年哥舒翰於索磨川置又有振武軍在天成軍西百餘里天寶十三年哥舒翰攻吐蕃雕窠城置又有耀武軍在廓州南二百里黒峽川亦天寶間置宋元符初俱廢為砦循化城舊志在州西一百三十五里西至生羌界一百里宋志循化城舊名一公城崇寧二年收復改名金屬積石州元廢大通城在州西北宋志舊名達南城崇寧二年收復改名金屬積石州元廢來羌城在州西北三十里宋志崇寧三年王厚收復金屬積石州元廢講米城在州西南一百里本番族所置宋志洮西安撫使收復河南一公錯鑿當標􅊮撒東迎講米六城尋棄之崇寧二年再收復金廢歷精城在州西南宋史唃厮羅三妻喬氏有色居歷精城府志州西南有喬家闗當以喬氏得名城當在其地踏白城在州西北吐蕃所置宋熙寧八年王韶解河州之圍復還熙州遶踏白城後燒賊廬帳木征來降城在寧川驛景古城在州東南一百三十里金志狄道縣有景骨城即此骨古聲相近而訛也黄沙戍在州西新唐志達化縣東有黄沙戍河州衞在州治西鞏昌府隴西縣古渭砦九域志皇祐四年以渭州地置古渭砦熙寧五年以砦建通逺軍崇寧三年升軍為州治䝠道城元和志隴西縣西至渭州五十里本漢䝠道縣秦孝公元年西斬戎之䝠主漢置縣屬天水郡後漢屬漢陽郡靈帝分置南安郡治焉晉志南安郡置䝠道縣宋志作桓道隋改武陽縣又改隴西後陷吐蕃縣廢襄武城在縣東五里漢置縣屬隴西郡三國魏為隴西郡治蜀漢延熙十六年姜維圍魏襄武不克晉隴西郡治此隋為渭州治唐因之寶應後沒於吐蕃縣廢宋鞏州移今治城周九里有竒環城有濠稱為險固中陶城在縣東北晉志南安郡領中陶縣魏眞君八年併入新興隋志隴西舊有内陶即中陶也長城在縣北境一百里烏龍溝北山有遺跡驀山越澗若龍蜿蜒其土獨黒俗名長城嶺西起臨洮經府北東至遼東延袤萬里宻艾亭在縣東北漢志䝠道縣有騎都尉治宻艾亭赤亭在縣西三十里羌酋姚弋仲之故居弋仲之先世居其地晉永嘉中東徙榆睂部内從之者數萬後降晉首陽城在縣西五十里鳥鼠山漢書渭水自首陽東至京兆船司空入河舊志載縣西七十里為首陽山夷齊避周採薇處舊有清聖廟二賢塚明萬厯中復建廟立碑置田崇祀雲下田在縣北輿地紀勝云隴西有耕天村其田曰雲下田又古諺云郎樞女樞十馬九駒安陽大角十牛九犢謂其地宜於畜牧也六泉在縣東南五里西秦乞伏國仁率騎兵襲鮮卑三部於六泉即此五谿聚隴西記襄武有五谿楊盛分羌為五部錯居谿傍每谿為五聚故名玉漿泉在縣西四十里有山俗呼為髙武隴其山絶壁千尋由來乏水後周武帝時豆盧勣為渭州刺史有惠政馬跡所踐忽飛泉湧出又