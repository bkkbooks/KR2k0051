body:
  text: 甘肅通志卷三十六人物寧夏府漢傳燮字南容北地靈州人少師事太尉劉寬舉孝廉後為護軍司馬與左中郎皇甫嵩俱討張角燮素疾中官因疏言閹豎弄權忠臣不進張角起於趙魏黃巾亂于六州皆是故也書奏宦者趙忠見而忿惡及破角功多當封竟不得以為安定都尉拜議郎會西羌反司徒崔烈議棄涼州燮厲言曰斬司徒天下乃安因對言涼州不可棄帝從之由是朝廷重其方格頃之趙忠為車騎將軍遣弟延謂燮曰南容少答我萬户侯不足得也燮正色拒之忠愈恨出為漢陽太守燮善恤人叛羌懷其恩化並來降附乃廣開屯田置四十餘營刺史耿鄙討金城賊王國韓遂敗死賊進圍漢陽城中兵少糧盡燮猶固守時北胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里子幹年十三從在官舍因進諌勸燮從之燮慨然呼幹曰聖達節次守節世亂不能養浩然之志食祿又欲避其難吾行何之必死于此遂麾左右進兵臨陳戰歿諡曰壯節侯幹知名位至扶風太守晉傅瑗晉司𨽻校尉咸之子也以學業知名仕晉官至安成太守宋傅迪字長猷北地靈州人父瑗與郗超善超嘗造瑗見二子迪及亮亮年四五歲超令人解亮衣使左右持去初無吝色超謂瑗曰卿小兒才名位宦當逺踰于兄然保家傳祚終在大者亮方貴迪每深誡之傅亮字季友瑗子迪之弟亮博涉經史尤善文辭義熙中纍遷中書黃門侍郎宋國初建除侍中加中書令永初元年以佐命功封建城縣公入直中書省專典詔命太祖登阼加散騎常侍開府儀同三司傅隆字伯祚北地靈州人少孤有學行不好交遊義熙初年四十始為孟昶建威參軍纍遷尚書左丞徙太子率更令元嘉初為御史中丞甚得司直之體轉司徒右長史出為義興太守在郡有能名尋轉太常太祖以新撰禮論付隆使更下意隆因表上五十二事明年致仕拜光祿大夫歸老於家手不釋卷博學多通特精三禮南齊傅琰字季圭北地靈州人父僧祐山隂令有能名琰美姿儀仕宋為武康令遷山隂令僧祐在縣有稱琰尤明察又著能名其年賜爵新亭侯元徽初遷尚書左丞母喪鄰家失火延燒琰屋抱柩不動鄰人競來赴救乃得俱全琰股髀之間已被煙焰齊髙帝輔政以山隂獄訟煩積復以琰為山隂令有賣針賣糖老姥爭團絲來詣琰琰挂團絲於柱鞭之密視有鐵屑乃罰賣糖者又二野父爭雞琰各問何以食雞一人云粟一人云豆乃破雞得粟罪言豆者縣內稱神明無敢為偷琰父子並著竒績時云諸傅有理縣譜子孫相傳不以示人升明中遷益州刺史傅翽琰子為官亦有能名後為吳令别建康令孫廉廉因問曰聞丈人發姦擲伏惠化如神何以至此答曰無他也惟勤而清清則憲綱自行勤則事無不理憲綱自行則吏不能欺事自理則物無疑滯欲不理得乎時臨淮劉玄明亦有吏能歷山隂建康令政常為天下第一終於司農卿後翽代玄明為山隂令問玄明曰願以舊政告新令尹答曰我有竒術卿家譜所不載臨别當相示既而曰作縣令惟日食一升飯而莫飲酒此第一策也天監中為建康令復有能名梁傅昭字茂逺北地靈州人晉司𨽻校尉咸七世孫昭六歲而孤哀毁如成人宗黨異之十一歲隨外祖為雍州刺史袁顗客顗嘗來昭所昭讀書自若神色不改顗歎曰此兒神情不凡必成佳器太原王延秀薦昭於丹陽尹袁粲禮辟為郡主簿使諸子從昭受學粲每經昭戶輒歎曰經其戶寂若無人披其帷其人斯在豈非名賢尋為總明學士纍遷尚書左丞梁武帝素重昭梁臺建以為給事黃門侍郎領著作兼御史中丞歷位左戶尚書安成內史郡自宋來兵亂相接府舍稱凶在任者鮮以善終及昭至有人夜見甲兵出曰當避善人乃騰虛而去俄而風雨忽至數間屋俱倒自後郡舍遂安咸以昭正直所致郡多猛獸嘗設檻穽昭命去檻穽猛獸竟不為害歷祕書監太常卿遷臨海太守郡有蜜巖前後太守封固專收其利昭教勿封與百姓共之縣令餉栗置絹於下笑而還之入為散騎常侍光祿大夫昭所涖官常以清靜為政不尚嚴肅居朝廷無所請謁不交私利終日端居以書記為樂雖老不衰博極古今尤善人物性尤篤慎子婦嘗得家餉牛肉以進昭召其子曰食之則犯法告之則不可取而埋之其居身行已不負暗室類如此後進宗其學重其道人人自以為不逮卒諡曰貞傅映字徽逺昭弟三歲而孤兄弟友睦修身勵行非禮不動始昭之守臨海陸倕餞之日昏不返映以昭年髙不可極樂自往迎候同乘而歸兄弟並已斑白時人美焉及昭卒映喪之如父年踰七十哀戚過禮映有文才而不以篇什自命後為武康令纍遷光祿卿大中大夫傅岐翽子字景平仕梁起家南康王左常侍除始新令後去縣人無老少皆出境拜送號哭聞數十里至都除廷尉正兼舍人岐美容止博涉能占對大同中與魏和親其使歲中再至常遣岐接對岐在禁省機事密勿亞於朱異大清元年貞陽侯蕭淵明伐彭城兵敗陷魏明年淵明遣使還述魏欲通和好敕近臣定議左衛朱異曰和為便議者並然之岐獨曰髙澄既新得志其勢非弱何事須和必是設間故令貞陽遣使俾侯景自疑當以貞陽易景景心不安必圖禍亂此和殆不可許髙祖從異議遣和景果疑遂反入冦京師請誅異二月景於闕前通表乞割江右四川安置部下當解圍還鎮敕許之乃於城西立盟求遣宣城王出送岐固執宣城嫡嗣不宜許乃遣石城公大欵送之及與景盟訖城中文武喜躍冀得解圍岐獨言曰賊舉兵為逆未遂求和其心不可信及景背盟莫不歎服尋有詔以岐勤勞封南豐縣侯固辭不受宫城失守岐帶疾出圍卒於宅陳傅縡字宜事北地靈州人縡幼聰敏七嵗誦古詩賦至十餘萬言長好學能屬文依湘州刺史蕭循循頗好士廣集墳籍縡肆志尋閲因博通羣書後主即位遷祕書監右衛將軍兼中書通事舍人掌詔誥縡為文典麗性又敏速雖軍國大事下筆輒成未嘗起草沉思者亦無以加然負才使氣陵侮人物朝士多銜之會施文慶沈客卿以佞見幸專制衡軸而縡益疏文慶等因共譖之後主收縡下獄縡素剛因憤恚上書言小人專制宦豎弄權惡忠直若仇讐視百姓若草芥恐東南王氣自斯而盡書奏後主謂曰我欲赦卿卿能改過不縡曰臣心如面臣面可改則臣心可改後主益怒賜死隋李徹字廣達和子朔方巖緑人性剛毅有器幹偉容儀多武藝周武帝時從討吐谷渾賜爵同昌縣男從拔晉州與齊王憲屯雞栖原齊遣驍將率徑騎躡憲戰於晉州城北憲敗徹力戰憲軍獲全復從帝破齊師於汾北乘勝下髙壁拔晉陽宣帝即位從韋孝寬略定淮南每為先鋒淮南平授淮州刺史安集初附甚得歡心隋髙祖受禪進爵齊安郡公明年沙鉢略率兵犯塞上令衛王爽為元帥以徹為長史遇虜於白道徹率精騎五千掩擊大破之沙鉢略潛遁以功加上大將軍沙鈢略因此稱藩其後徹復擊突厥于塞上破之左僕射髙熲之得罪也以徹素與熲善因被疏忌不復任使史祥字世休朔方人少有文武才幹隋髙祖踐阼拜祥儀同領交州事頗有惠政轉驃騎將軍從王世積伐陳破之進拔江州後以行軍總管從晉王廣擊突厥於靈武破之遷右衛將軍仁夀中率兵屯𢎞化以備敵煬帝初漢王諒作亂帝以祥為行軍總管軍於河隂令軍中修攻具簡精鋭於下流潛渡討綦良等良衆潰祥縱兵乘之殺萬餘人進位上大將軍轉太僕卿尋遷鴻臚卿從征吐谷渾祥率衆出間道擊破之拜左驍衛將軍唐韓遊瓌靈州靈武人始為郭子儀裨將安祿山反使阿史那從禮將同羅突厥五千騎偽降於朔方誘河曲九蕃府六胡叛部落凡五十萬子儀使遊瓌率辛京杲擊破之九蕃府還附纍進邠寧節度留後奉天之狩兵未集遊瓌與慶州刺史論惟明以兵三千來赴有詔引軍屯便橋次泥泉與泚兵值遊瓌還奉天衛天子泚兵躡攻之奪門遊瓌殊死戰乃解泚大治戰棚雲橋士皆懼遊瓌曰賊取佛祠乾木為攻具可以火之賊大譟攻南雉遊瓌曰是分吾力也趨北雉遣鋭士傅滿直出火其棚投薪於中棚皆燼賊氣沮故諸將推遊瓌赴難功第一帝置統軍一員以遊瓌處之李懷光叛誘遊瓌為變遊瓌白發其書帝嘉其忠義懷光檄假遊瓌邠州刺史欲因張昕殺之遊瓌統舊部兵馳入邠説昕戴王室昕不聽伏甲斬昕遊瓌屯七盤關受李晟節度詔拜邠寧節度使與渾瑊戴休顔分扼京東西要險李晟入長安遊瓌破泚兵咸陽京師平遷檢校尚書左僕射帝至自興元遊瓌及瑊休顔從而李晟尚可孤李元諒奉迎論功皆第一吐蕃請盟遊瓌諫帝不從盟之日遊瓌以徑騎五百屯洛口待非常瑊被劫馳免虜見兵出即解去後吐蕃冦大回原即選騎迎擊敗之吐蕃夜遁後還京師拜右龍武統軍卒諡曰襄戴休顔夏州人家世尚武志膽不常郭子儀引為大將討平黨項羌以功封咸寧郡王兼朔方節度副使朱泚反率兵馳奔行在德宗嘉之賜實封二百後留守奉天李懷光屯咸陽使人誘之休顔斬其使勒兵自守遷奉天行營節度使合渾瑊兵破泚斬首三千級追至中渭橋京師平又與瑊率兵趨岐陽邀泚殘黨加檢校尚書右僕射從乘輿至京師拜左龍武軍統軍卒贈揚州大都督弟休璿歷開府儀同三司封東陽郡王休晏歷輔國大將軍封彭城郡公俱以將略稱康日知靈州人少事李惟嶽擢趙州刺史惟嶽叛日知與别駕李濯及部將百人共盟固州自歸惟嶽怒遣先鋒兵馬使王武俊攻之日知使客説武俊引兵還斬惟嶽以獻德宗美其謀擢為深趙觀察使會武俊拒命遣將攻趙州日知破之上俘京師興元元年以深趙益成德徙日知奉誠軍節度使又徙晉絳加檢校尚書左僕射封會稽郡王卒贈太子太師子志睦工馳射𨽻右神策軍以功進平盧軍節度使李同捷反志睦挫其鋭下蒲臺盡奪其械加檢校尚書左僕射封會稽郡公子承訓亦以功封會稽郡男何進滔靈武人少客魏事田𢎞正𢎞正攻王承宗承宗使健將引精騎千餘馳魏壁進滔率猛士逐之幾獲從討李師道以功兼侍御史史憲誠死軍中傳呼曰得何公事之軍安矣進滔下令曰公等既迫我當聽我令衆唯唯執殺前使及監軍者凡斬九十餘人釋脅從者素服臨哭將吏皆入弔詔拜留後俄進授節度使居魏十餘年民安之進檢校司徒同中書門下平章事卒贈太傅諡曰定史敬奉靈州人事朔方軍為牙將元和中吐蕃數犯塞敬奉白節度使杜叔良請兵三千齎一月糧深入虜地分賊勢乃由間道繞出虜後大破之驅其餘衆於瓠蘆河獲馬牛雜畜逮萬數敬奉走逐奔馬挾鞍勒以上而後羇帶之矛矢在手前無強敵甥姪部曲二百人每出輒分其隊為四五隨水草數日不相知及相遇已皆有獲以名雄邊宋周美字之純靈州回樂人少𨽻朔方軍以材武稱契丹犯邉帝幸澶淵常令宿衛陜西用兵經略使夏竦薦其材夏人既破金明諸寨美請於經略使范仲淹曰金明當邉衝我之蔽也今不亟完將遂失之仲淹屬美復城如故數日賊衆數萬薄金明美領衆力戰抵暮援兵不至乃多設疑兵夏人引去復敗敵于金湯城焚其族部二十一元昊入冦美西出芙蓉谷大破其衆龎籍范仲淹交薦之除鄜延路兵馬都監又破敵於無定河加副總管每邉書至諸將各擇便利美獨不辭難所向輒克諸將以此服之卒諡忠毅美前後十餘戰平族帳二百焚二十一招種落內附者十一族復城堡甚多祿賜多分其下家無餘資周永清字肅之世家靈州州陷於夏祖美歸京師永清以蔭從仕宰相龎籍薦其忠勇加閣門祇候押時服賜夏國至宥州夏人受賜不跪詰之恐而跪遷渭州鈐轄渭兵徑而陳伍不講永清訓以李靖法帥蔡挺上其圖以令諸軍知德順軍夏衆入冦擒其酋吕效忠募勇士夜襲夏帳斬三百級俘數千人獲駝馬甲器萬計並寨禁地三百里盜耕不可禁永清拓籍數千頃置射士二千聲聞敵廷降者引入帳下待之不疑多得其死力威名甚著擢涇原路鈐轄知涇州斡道沖字聖宗靈武人其先從偽夏主遷興州世掌夏國史道沖通五經為番漢教授譯論語注别作解義三十卷又作周易卜筮斷以其國字書之行於國中後官至其國之中書宰相元李徴字幹臣西夏國族子金末以經童中選既長入為質子以文學得近侍元太宗嘉之及下河南諸郡兵餘歲凶民人流散賑恤飢寒歸者如市十三年師圍夀春久雨不止言於察罕曰城久拒命破必屠之生靈何辜請身往招之遂單騎入曉以利害明日與其將率衆來降以功賜銀五千兩後纍官襄陽軍馬萬戶來阿巴齊寧夏人憲宗伐宋奉命監元帥納琳軍遏宋人援兵駐重慶下流之銅羅峽夾江據崖為壘預積薪於二壘明火鼓譟矢石順流而進宋人敗走帝聞賜銀至元末調征東招討使招徠遼左降附逺近帖然征交趾領中衛親軍千人至思明州賊阻險拒守于是選精鋭與賊戰於女兒關斬馘萬計進至交州陳日烜空其城而遁日烜屢遣使約降阿巴齊往攻之晝夜迎戰會將士多疫乃議班師巴延河西人襲父和多都千戶職宋師侵成都四川僉省嚴忠範遣巴延迎擊大敗之又從攻嘉定瀘敘重慶數有戰功總帥汪田哥用兵忠州巴延將兵涪州策應宋人以舟師邀於青江巴延領兵馳赴擒其部將十七人瀘州復叛巴延領兵趨瀘州敗其將遂克瀘州行院副使布哈進兵圍重慶遣巴延將兵降之制授宣武將軍蒙古漢軍總管李恆字德卿唐末賜姓李世為西夏人恆生有異質世祖時纍加為益都淄萊萬戶從取宋襄陽江西及崖山平纍官中書左丞後從皇子征交趾中毒矢卒諡武愍追封滕國公楊多爾濟河西寧夏人少孤幼即知自立語言儀度如成人事仁宗於藩邸甚見倚重命多爾濟與右丞相哈喇哈遜定議迎武宗於北藩仁宗還京師多爾濟密致警備仁宗嘉之親解所服帶以賜既佐定內難論功為大中大夫家令丞日夕侍側雖休沐不至家衆敬憚之帝他日與中書平章李孟論元侍從人材孟以多爾濟為第一拜禮部尚書有論朝政闕失面觸宰相宰相怒將取旨殺之多爾濟曰詔書云言雖不當無罪今若此何以示信天下帝悟釋之加昭文館大學士為權臣特們德爾所害而死初特們德爾為丞相恃勢貪虐平章政事蕭拜珠牽制之多爾濟拜御史中丞糾正其罪有詔逮問特們德爾逃匿多爾濟持之急太后召至宫門責以違旨仁宗恐傷太后意但罷其相位英宗立特們德爾復相乃宣太后旨名蕭拜珠多爾濟責以前違太后旨之罪載諸國門之外與蕭拜珠俱見殺後贈上柱國夏國公諡襄愍時權臣欲奪其妻劉氏與人劉氏剪髮毁容自誓乃免子布哈楊布哈幼有才氣能以禮自持好讀書仁宗欲以為翰林直學士力辭後補武備司提點轉僉河東廉訪司事嘗出按部民有殺子以誣怨者獄成布哈讞之得其情平反出之河東民飢先捐已資以賑請未得命即發公廪繼之民賴以不死文宗立除通政院判將行值陜西諸軍拒詔布哈率衆出禦陳潰見殺二僕亦見執曰吾主既為國死吾茍得生何以見吾主於地下亦皆被殺至順二年贈布哈禮部尚書明徐琦寧夏人永樂十三年進士天資篤實德望鎮靜士林重之纍官至南京兵部尚書參贊機務嘗諭降安南贈太子太保諡貞襄張泰寧夏人正統間以都督同知鎮守寧夏凡關堠之設營陳之法兵車火炮之制皆出其謀畫自束髮用兵纍建邉功從無挫衄卒後恤贈宋儒寧夏人正統七年進士歷任江西按察司僉事有德行以範俗常泰寧夏人受學薛瑄明性理之學任定州學正以正學教誨士人及卒貧不能歸諸生留葬於定州程景雲寧夏人景泰五年進士有重望家貧或饋之不受為御史有風裁直聲大著仇廉寧夏人景泰間以指揮使充副總兵協守寧夏時值也先以萬騎攻城旬日不解廉以忠義固結人心竭力守禦敵遂引去城賴以全後沒于戰任信寧夏人前衛指揮製兵車督教演衆稱其長胡汝礪寧夏人成化二十三年進士官至兵部尚書敏捷練達臨事裁決如流凡所在請託不行能持法夏景華寧夏人舉成化十年鄉試任河南彰德府推官正直尊嚴人莫敢干以私即上臺亦嚴憚之相戒毋瀆夏推官也張嘉謨字舜卿寧夏人𢎞治十五年進士授兵部主事釐剔宿弊盜起山東侍郎陸完督軍嘉謨獻議謂當出竒以遏其鋒審勢以奪其氣若徒尾其後是驅賊以自戕也賊犯濰縣陸以偏師屬之賊易之不為意乘其怠即夕掩擊大破賊斬首二千級賊平升車駕司員外詔起兵部尚書彭澤征蜀冦疏請與行乃告澤曰蜀地險阻用兵為難公若分兵屬謨由漢中取道以入夔峽公以大兵取重慶交蹙之則成禽矣澤深然其䇿後卒奏功升山東兵備僉事以禁礦忤藩邸罷平生好書學𨽻篆行草各得其妙詩文敏捷自成一家有雲谷集西行稿潘九齡寧夏人舉正德八年鄉試歷任四川右布政使清白著聲平麻陽冦却雲南沐國公餽金定其世爵時論歸焉史鏞寧夏人以右衛指揮同知值置鐇變倡義率衆據河奪船賊平以功充遊擊將軍升都督僉事歷鎮甘肅長於籌略尤善攻守有良將風楚書字國寶寧夏人嘉靖二年進士初任兵部主事大同之變書觀兵城下城中俱登陴請曰吾輩非殺主帥者亦無他志但畏死自保耳請書入城書諭慰之且言用兵非朝廷意衆皆望闕呼萬歲書陳朝廷威德曉以禍福令獻首惡賊平纍升右副都御史黃綬寧夏人嘉靖八年進士風裁峻整名重朝紳督學北直𨽻巡按山東士仰民懷清白之聲大著嘉靖甲辰大學士翟鑾二子俱登第物議蜂起綬彈之有一鑾當道雙鳳齊鳴之句其不避權勢如此江潮中衛人嘉靖間選貢任沐陽縣丞性淡泊一衣一食動以民膏為念廉明特著淮上號為青天及居鄉淳朴敦厚有古君子之風焉李廷彥寧夏人萬厯二年進士才品端方器識𢎞逺巡按雲南平羅冦叛為大理奏活無辜巡撫周光鎬疏舉人才稱為偉器王英寧夏人指揮同知萬厯壬辰巴拜之變為賊所拘因密偵賊中事報軍門卒為內應既殱羣凶撫軍疏薦之云身在賊旁志存國事招降用間實賴之以周旋宗社士民多因之而保護較之斬獲軍功不啻倍之馬世龍字蒼元由世職舉武會試歷任宣府遊擊三屯營總兵官孫承宗出鎮薦授世龍府銜拜大將賜尚方劍敘功進左都督尋謝病歸崇禎六年察罕呼都克圖合套冦犯寧夏總兵賀虎臣戰歿詔起世龍代之世龍生長寧夏習其形勢為大修戰備明年二部入犯邀擊大破之踰月套冦犯賀蘭山世龍遣降丁潛入其營斬其長薩勒扎黃台吉等半歲中斬二千餘級屢奏捷威名震西塞敵退事平無何以疾卒於官論功贈太子太傅廕子世襲錦衣僉事賜恤如制子獻圗負圗呈圗皇清劉芳名字孝五寧夏人順治二年任寧夏總兵平固原叛將武大定三年秦州賊賀珍王元馬德作亂芳名先後擒斬之四年招降香山諸冦散其餘黨地方以安十六年加左都督領兵征海冦時賊犯崇明芳名同提督梁化鳳擊之奪船拔幟擒獲偽將以疾殁於軍贈太子太保諡忠肅馬寧寧夏人順治初從總兵劉芳名擒王元馬德有功又以恢復河州莊浪功授督標中軍副將征𠞰畨回功最著升四川總兵克取川雲駐防緬甸平水西殱餘氛於交趾功又最著升湖廣提督陳福字東海本延綏人遷居寧夏順治初以守備從征有功纍升四川夔州副將康熙十三年擢寧夏總兵官會吳三桂叛王輔臣據平涼遙應之遣偽將西陷洮蘭東占花馬池定邉時寧夏兵先經調赴征川留者什之二三人情惶迫衆議紛紜福按劔怒曰敢有異議者齒此劍遂整兵東復花馬池定邉斬偽將朱龍倪五等寧夏已平移師西向固原前至平涼歲暮氷雪衆欲暫歸福鋭意前進十四年十二月二十二日駐惠安堡定期次日進𠞰固原是夜福被亂軍殺死先是福家口留川吳逆遣人持逆書偽劄結福福得書不啓即表奏聞時東南路阻遣弟夀由口外求蒙古王引路七日至京上召夀問勞仍命夀歸授福陜西提督未至而福已歿後贈公爵世職諡忠愍趙良棟字擎宇榆林衛安邉堡人後官寧夏因家焉順治初隨親王入關定陜西委署寧夏水利都司從總督孟喬芳𠞰叛回以擒偽將功升髙臺遊擊調征雲南以平水西功授廣羅總兵聞父喪吳三桂蓄異志欲為題留良棟力請終制奔歸補大同總兵移鎮天津滇藩反平涼提督王輔臣亦叛寧夏提督陳福被害沿邉擾亂上簡良棟安撫星馳至鎮宣布朝廷德意誅首惡寬脅從逺近悉安在鎮三年日練兵儲餉規畫已定乃疏請以徑卒五千獨當一面進取川滇康熙十八年冬遂自裹行糧由八堵山進密樹關復徽州略陽十九年正月朔兵臨白水江賊對江列營拒守江流湍湧時無舟楫良棟身先士卒躍馬浮渡兵從之賊潰走追至青川大敗之乘勝直抵成都申嚴紀律納降撫順市肆不移捷聞授勇略將軍旋晉兵部尚書總督雲貴軍務復克象嶺奪大渡河取建昌全川既定進取雲南時楚粵兵圍城久弗克良棟至周視壁壘晝夜急攻凡七日而城下良棟駐兵城外不以一卒入城賊私積充牣毫無所染滇省蕩平即移師曲靖具疏乞休詔入京授鑾儀衛使明年以疾歸三十四年征噶爾旦命良棟隨師出塞追敘前功授一等精竒尼哈番世職五十六年上巡幸寧夏良棟已殁特命皇子弔奠閣臣致祭賜諡襄忠御製碑文以敘其功良棟早歲從戎身經百戰所向有功馭兵嚴而有恩皆樂為之用克滇毫無所取有古大臣風趙𢎞燦字天英良棟長子良棟下四川時燦奉使至軍前授寧夏總兵官隨進討川雲取建昌撫永寧平定滇黔歷川北真定總兵轉贑州黃巖康熙三十八年升浙江提督四十二年調廣東提督四十六年以兵部侍郎副都御史總督兩廣升兵部尚書卒諡敏恪李日榮字君寵中衛人幼從軍康熙十五年王輔臣變洮蘭俱陷日榮從奮威將軍王進寶夜渡黃河恢復臨洮加右都督又從征四川平定保寧勞績最著歷升廣東順德總兵官所至俱有聲師帝賓寧夏人趙良棟征川帝賔以中營遊擊留守寧鎮時𣲖寧民挽運軍需帝賓以寧民半已出征加以挽運必致兵心不安固請止之及良棟凱旋奏云臣之得以成功者以有師帝賔在無內顧憂也歷升襄陽總兵調涼州總兵居官絶扣尅杜苞苴屏聲色介然特立涼州立祠祀之馬際伯字逸聞寧夏人從勇略將軍趙良棟恢復建昌抵雲南以功加參將征厄魯特際伯裹糧出塞屢立戰功授寧夏前營遊擊擢靈州參將又擢陜西督標副將升四川建昌總兵官撫戢軍民招徠苗人大有方略移西寧鎮恤兵惠商羌人斂戢聽命西寧人立祠祀之升四川提督江琦字思韓寧夏人世為寧夏衛職琦生而英武會吳逆亂從提督趙良棟征討取四川復雲南後𠞰噶爾旦論功纍升石匣副將擢河北總兵官尋移鎮延綏馭兵籌餉軍民仰賴康熙四十八年遷甘肅提督宣威布德忠誠待下士卒感服西寧府魏源賀西平樂都人自署河西王秃髮傉檀之子也傉檀為乞伏熾磐所滅賀自樂都奔魏賀偉容貌善風儀太武素聞其名及見器其機辨賜爵西平侯謂曰卿與朕同源今可為源氏太武征涼州問攻戰之計賀曰姑臧外有四部鮮卑皆臣祖父舊人臣願軍前宣國威信必相率請降外援既服然後攻其孤城拔之如反掌耳乃遣賀招慰涼州平以功進爵西平公又與尚書陸麗定䇿翼戴文成及即位賀有力焉以定䇿勳進爵西平王時班賜百僚敕賀任意取之賀惟取戎馬一匹是時斷獄多濫賀上書諌帝從之出為冀州刺史改封隴西王上書請赦坐贓及盜與過誤之愆恕死徙邉帝納之賀之臨州鞫獄以情徭役簡省時考殿最賀治為第一賜衣馬器物班宣天下徴拜太尉及獻文將傳位於京兆王子推賀固執不可卒立孝文河西叛敕賀討之多所降破賀依古今兵法採至要為十二陳圗獻文覽而嘉焉三年薨贈侍中太尉隴西王諡曰宣陪葬金陵子延襲源懷賀子謙恭寬雅有大度襲父爵為雍州刺史清儉有惠政善撫恤劫盜息止景明二年除尚書左僕射詔姦吏犯罪每多逃遁肆眚乃出自今犯罪不問輕重而藏竄者悉皆逺流若永避不出兄弟代徙懷奏以為宜停宣武納之又詔持節巡行北邉連年旱儉百姓困敝懷銜命撫導存恤有方時后父于徑勢傾朝野徑兄子祚素與懷通婚祚郊迎不與語劾祚免官懷朔鎮將元尼須與懷少舊表劾其貪其奉公不撓皆此類也百姓為豪強凌壓積年枉滯一朝見伸者日有百數上事宜便於北邉者凡四十餘條皆見嘉納正始元年蠕蠕南冦詔懷以本官便宜從事時年六十一至雲中蠕蠕亡遁乃案視諸鎮左右要害可築城置戍及儲糧積仗之處凡表五十八條宣武並從之卒贈司徒公諡曰惠懷性寬容簡約不好煩碎恆語人曰為政當舉綱維何必須太子細也性不飲酒好接賓客雅善音律源子雍懷子字靈和少好文雅篤志於學推誠待士士多歸之纍遷夏州刺史以平賊功封樂平縣公安樂王鑒據鄴反敕子雍與都督李神軌討平之改封陽平縣公後討葛榮殁於陳贈司空諡曰莊穆源子恭雍弟字靈順聰明好學稍遷北主客郎河州羌却鐵忽反詔子恭為行臺討之子恭示以威信二旬悉降朝廷嘉之屢以軍功封臨潁縣侯閔帝初以預定䇿勳封臨汝縣子天平初除中書監三年拜魏尹卒贈司空公諡曰文獻周源彪子恭子字文宗學涉機警少有名譽魏永安中以父功賜爵臨潁縣伯天平四年為涼州大中正皇建二年纍遷涇州刺史彪以恩信待物邊境輯和鄰人欽服纍遷秦州刺史及齊平入京授儀同大將軍司成下大夫隋開皇中拜莒州刺史源師字踐言少知名明辨有識悟仕齊為尚書左外兵郎中周武帝平齊授司賦上士隋纍遷尚書左丞以明幹著稱時蜀王秀頗違法度乃以師為益州總管司馬嘗苦諫秀秀敗州官多連坐師獨獲免煬帝即位拜大理少卿卒於刑部侍郎源雄子恭弟纂子字世略少寬厚美姿容周以伐齊功封朔方公歷冀平二州刺史及尉遲迥作亂以書誘雄雄卒不顧遣衆平之陳人遣其將陳紀蕭摩訶等侵江北雄擊走之悉復故地遷朔州總管平陳後以功進位上柱國復鎮朔州明李納木喀河西土人元西寧州同知洪武四年歸附授本衛鎮撫招安番族開創西寧其功居多升指揮僉事張經字道器西寧人正德間以歲薦為固安縣丞值歲歉民飢經多方救濟百姓德之居家嚴肅跬步不茍室徒四壁晏如也李完西寧人舉嘉靖七年鄉試任直𨽻衡水知縣甫釋褐以家産推於兄生平衣不重采食無兼味清苦有氷檗操尋解任歸閉戶讀書無間寒暑絶迹公門工古文詞皇清馬進良字棟宇西寧人甫弱冠從戎技勇冠軍後征吳逆以功纍擢古北口總兵從征噶爾旦多著竒績加提督康熙五十三年以年老乞休回籍卒諡襄毅直𨽻秦州周壤駟赤字子徙秦州人孔子弟子唐封北徽伯宋封上邽侯明稱先賢從祀孔子廟庭秦祖字子南秦州人孔子弟子唐封少梁伯宋封鄄城侯明稱先賢從祀孔子廟庭石作蜀字子明秦州人孔子弟子唐封石邑伯宋封成紀侯明稱先賢從祀孔子廟庭漢李廣隴西成紀人其先曰李信秦時為將逐得燕太子丹者也廣世世受射文帝時廣以良家子從軍用善騎射功多為郎騎常侍數從射獵格猛獸文帝曰惜乎子不遇時如令當髙帝時萬户侯豈足道哉景帝初為隴西都尉徙上谷太守典屬國公孫昆邪為上泣曰李廣材氣天下無雙自負其能數與虜確恐亡之於是乃徙廣為上郡太守又徙隴西北地雁門代郡雲中太守皆以力戰為名武帝立入為未央衛尉廣行無部曲行陳就善水草屯舍止人人自便不擊刁斗自衛莫府省文書已為右北平太守胸奴聞之號曰漢之飛將軍避之數歲不敢入右北平廣廉得賞賜輒分麾下飲食與士卒共之終廣之世為二千石四十餘年家無餘財其射見敵急非在數十步之內度不中不發發即應弦而倒元狩四年廣為前將軍從大將軍青出塞令廣軍出東道軍亡導惑失道大將軍責廣之幕府上簿廣曰年六十餘終不能復對刀筆之吏遂自剄百姓無老壯皆為垂涕李蔡廣從弟少與廣俱事孝文帝景帝時積勞至二千石孝武帝時至代相從大將軍青擊右賢王以功封樂安侯元狩初代公孫𢎞為丞相蔡名聲出廣下甚逺然廣不得爵邑而蔡為列侯位至三公坐侵孝景園壖地下吏自殺李敢廣少子廣三子當戶椒敢為郎天子與韓嫣戲嫣少不遜當戶擊嫣嫣走天子以為能當戶早死椒為代郡太守皆先廣死廣死時敢以校尉從驃騎將軍擊胡左賢王力戰奪左賢王鼓旗斬首多賜爵關內侯代廣為郎中令當戶有子陵李陵字少卿少為侍中建章監善騎射愛人謙讓下士武帝以為李氏世將使將八百騎深入居延視地形還拜為騎都尉將勇敢五千人教射酒泉張掖天漢初二師將軍出酒泉擊左賢王欲使陵將輜重召見武臺陵叩頭自請願得自當一隊以少擊衆率步兵五千人涉單于庭上壯而許之出居延北行三十日至浚稽山與單于相值以兵三萬圍陵軍陵搏戰千弩俱發殺數千人且戰且引南行近塞日殺傷胸奴積數萬人胸奴得軍候管敢降言軍無後救遮道急攻漢軍南行未至鞮汗山一日五十萬矢皆盡韓延年戰死陵遂降邉塞以聞帝怒甚問太史令司馬遷遷盛言陵事親孝與士信常奮不顧身以徇國家之急有國士風其不死者誠欲得當以報漢也久之上悔陵無救乃遣使勞賜陵餘軍得脫者陵在塞外二十餘年卒趙充國字翁孫隴西上邽人以六郡良家子善騎射補羽林為人沉勇有大略少好將帥之節而學兵法通知四夷事武帝時以假司馬從二師將軍擊胸奴為虜所圍充國乃與壯士百餘人潰圍陷陳二師引兵隨之遂得解身被二十餘創武帝嗟歎拜為中郎昭帝時武都氐人反充國以護軍都尉將兵擊定之遷中郎將為水衡都尉擢後將軍定册尊立宣帝封營平侯義渠安國使行諸羌先零豪言願時渡湟水北畜牧元康三年先零遂與諸羌種豪解仇交質盟詛上問充國對曰羌人所以易制者以其種自有豪數相攻擊藝不一也胸奴使人告諸羌張掖酒泉本我地地肥美可共擊居之欲與羌合宜豫為備敕視諸羌毋令解仇義渠安國備羌至浩亹為虜所擊失亡甚衆時充國年七十餘帝使御史大夫丙吉問誰可將者充國對曰亡踰於老臣者矣兵難遙度願馳至金城圖上方略充國至金城夜遣三校銜枚先渡渡輒營陳虜來令軍勿擊充國常以逺斥候持重愛士卒先計後戰虜數挑戰充國堅守遣罕开豪雕庫告種豪大兵誅有罪犯法者能相捕斬除罪賜錢欲以威信招降罕开解散虜謀乃擊之酒泉太守辛武賢奏七月分兵並出合擊罕开充國欲捐罕开之過先行先零之誅公卿議上以書敕讓之充國乃上書謝罪因陳兵利害謂先誅先零則罕开不煩兵而服矣上從充國計充國引兵至先零斬虜甚衆罕羌自歸竟不煩兵而下遂上屯田奏願罷騎兵留田條屯田十二便帝從其計充國振旅而還賜安車駟馬黃金罷就第朝廷每有大議常與參兵謀問籌䇿焉年八十六薨諡曰壯侯段會宗字子松天水上邽人竟寧中以杜陵令舉為西域都護騎都尉西域敬其威信三歲更盡還拜沛郡太守徙雁門太守坐法免西域諸國上書願得會宗陽朔中復為都護會宗為人好大節矜功名與谷永相友善嘗與書戒之會宗既出諸國遣子弟郊迎小昆彌安日前為會宗所立德之歲餘小昆彌為國民所殺諸翎侯大亂徴會宗為左曹中郎將光祿大夫使安輯烏孫立小昆彌兄末振將定其國而還明年末振將殺大昆彌會病死復遣會宗發戊巳校尉諸國兵即誅末振將太子番丘會宗恐大兵入烏孫驚番丘亡逃不可得選精兵三十弩徑至昆彌所在召番丘責以末振將骨肉相殺殺漢公主子孫使者受詔誅番丘即手劍擊殺之還奏事天子賜爵關內侯黃金百斤明年會宗病死烏孫中年七十五城郭諸國為發喪立祠焉錫光略陽人為交址太守教民以禮義風俗漸變王莽篡位據郡不附光武即位遣使歸順焉帝嘉其忠節拜大將軍魏楊阜字義山天水冀人初為韋康别駕馬超戰敗渭南曹操追至安定將引兵東還阜言於操曰超有信布之勇甚得羌人心若軍還不為之備隴上諸郡非國家有也操軍還超擊隴上諸郡縣盡有之阜與外兄薑敘定計起兵閉冀城門拒超超遂南奔後轉武都太守威信素著百姓襁負從之劉曄稱阜有公輔之節在郡十餘年徴拜城門校尉時既作許宫又營洛陽宫殿阜上疏諫每朝廷會議阜常侃然以天下為已任數諌諍不聽屢乞遜位薛夏字宣聲天水人博學有才天水舊有薑閻任趙四姓雄於郡中而夏為單家不為降屈魏武宿聞其名甚禮遇之後文帝雅重其才黃初中為祕書丞帝與夏推論書傳未嘗不終日也每呼薛君而不名夏甚貧嘗顧其衣薄解御袍賜之征西將軍曹休來朝帝引入座顧謂休曰此君祕書丞天水薛宣聲也其見遇如此晉苻雄字元才天水略陽臨渭氐洪季子堅之父也少善兵書多謀略好施下士兄健僭位為佐命元勳權侔人主謙恭奉法及卒健哭之曰天不欲吾定四海耶何棄吾元才之速也苻融字博休天水略陽人堅季弟也少魁偉美姿度封安樂王融固辭堅深竒之及長令譽彌髙為朝野所屬堅立拜侍中聰明辨慧下筆成章耳聞則誦過目不忘嘗著浮圖賦世咸珍之銓綜內外刑政修理進才理滯尤善斷獄發姦摘伏為堅所委任遷司𨽻校尉時慕容垂姚萇説堅平晉融每諫曰江東天之所相終不可滅垂萇吾之仇敵冀因變以逞其凶堅不聽遂及於敗權翼天水略陽人仕苻秦為給事黃門侍郎與北海王猛太原薛讚並稱王佐之才堅令共典機密朱彤勸堅謀晉翼曰晉祚雖微未聞喪德謝安桓沖皆江表偉人君臣輯睦未可圖也慕容垂請安集北鄙翼諫曰國兵新破四方皆有離心宜徴召諸將置之京師以固根本垂勇略過人世家關東顧以避禍而來譬如養鷹飢則依人每聞風颷之起常有凌霄之志正宜謹其絛籠豈可解縱任其所欲哉堅不聽吕婆樓氐人也其先吕文和漢文帝時自沛徙焉世為首豪與梁平老為特進苻生僭位遂以婆樓為侍中尚書苻堅將廢生謀之婆樓對曰某不足以辦大事里舍有王猛者謀略不世出堅因婆樓招猛一見如舊交堅大悅堅既廢生除生苛政秦大治後官至太尉閻鼎字台臣天水人為東海王越參軍轉豫州刺史京師失守秦王出奔於密鼎與撫軍長史王毗等懷翼戴之計奉秦王西行至藍田值賈匹敗劉聰遣迎秦王鼎遂至長安同心推戴立王為皇太子登壇告天立社稷宗廟以鼎為太子詹事梁楊公則字君翼天水西縣人父仲懷為宋豫州刺史殷琰將叛劉勔討琰仲懷力戰死公則冒陳抱尸號哭氣絶既斂徒步負喪歸鄉里由此著名後領白馬戍主氐賊李烏奴攻白馬公則矢盡糧竭陷於冦抗聲罵賊烏奴壯之要與同事公則偽許而隂圖之謀泄逃歸齊髙帝下詔褒美除晉夀太守梁武帝下建業命公則先驅秋毫不犯大軍至新林公則嘗登樓望戰城中遙見縱弩射之矢貫胡床左右失色公則談笑如初進平南將軍遷衛尉卿時議北侵詔公則假節先屯洛口公則受命將發遘疾語人曰馬革還葬吾志也力疾登舟至洛口夀春士女歸降者數千戶尋卒於師武帝深痛惜之諡烈侯魏趙逸字思羣天水人逸少好學仕姚興歷中書侍郎後入魏事世祖神麚二年上已帝幸白虎殿命百寮賦詩逸製詩序時稱為善拜寧朔將軍赤城鎮將綏和荒服十有餘年百姓安之性好墳典白首彌勤年踰七十手不釋卷凡所著述詩賦銘頌五十餘篇趙超宗天水人河東太守卒於官超宗在河東更自修厲清靜愛民百姓追思之贈大將軍華州刺史諡曰成周李弼字景和隴西成紀人從周太祖破齊師以功封趙國公每征討朝受命夕便引路略不問私事其憂國忘身如此性沉雅有深識故能以功名終曾孫密志氣雄逺少襲父爵隋末兵亂自稱魏公李㯹字雲傑弼弟長不盈五尺果決有膽氣為周文帝帳內都督從復𢎞農破沙苑㯹時跨馬運矛衝堅陷陳隱身鞍甲之中敵人見之皆曰避此小兒文帝嗟嘆之曰但問膽決何如何必八尺之軀以功進爵為汝南郡公出為延州刺史李賢字賢和隴西成紀人幼有志節不妄舉動九歲從師受業略觀大指至於忠孝之道實銘之於心年十四喪父撫訓諸弟友愛甚篤魏文西征守原州州人豆盧狼叛賢率敢死士與戰斬之授原州刺史蠕蠕圍逼州城賢發兵擊之斬獲無算人得安堵周太祖至原州命以諸侯禮見授河州總管大營屯田以省漕運多設斥堠以備冦戎羌渾斂迹不敢犯塞徴拜大將軍諡曰桓李逺字萬歲賢弟幼有器局志度恢然屢以戰功進陽平郡公授河東郡守敦奬風俗勸課農桑修守禦之備百姓懷之後破東魏兵進左僕射柱國大將軍諡曰忠權景宣字暉逺天水顯親人曉兵權有智略仕周為南陽郡守郡鄰敵境舊制發民防守多廢農業而姦宄猶作景宣至並除之惟修造城樓多備器械冦盜斂迹百姓稱之東魏將劉貴平來攻景宣隨機奮擊退走之景宣號令嚴明戎旅整肅仍留鎮荆州威行南服乃授六州諸軍事尋進爵千金郡公隋趙煚字賢通天水西縣人祖超宗魏河東太守父仲懿尚書左丞煚少孤養母至孝年十四盜伐其墓中樹號慟送官見魏右僕射周惠達長揖不拜自述孤苦涕淚交流惠達為之歎息及長深沉有器局略涉書史周文引參相府軍事與齊人前後五戰斬獲甚多吳明徹屢為冦煚與前後十六戰每挫其鋒以功授開府儀同三司煚與宗伯斛斯徴不協徴坐事下獄自知罪重踰獄走帝大怒購之甚急煚密奏曰徴自以罪重懼死遁逃若不北走胸奴則南奔吳越徴雖愚陋久歷清顯奔彼敵國無益聖朝今炎旱為災可因兹大赦帝從之徴賴而免煚卒不言隋文帝踐阼進位大將軍賜爵金城郡公未幾出為冀州刺史甚有威惠煚嘗有疾百姓奔馳爭為祈禱市多姦詐煚為銅斗鐵尺置於肆百姓便之詔頒天下以為式嘗有人盜煚田中蒿者為吏所執煚曰此刺史不能宣化彼何罪也慰諭遣之令人載蒿一車賜盜者盜者愧恧過於重刑趙芬字士茂天水西縣人少有辨智頗涉經史明習故事每朝廷有所疑議衆不能決者芬輒為評斷莫不稱善李穆討齊引為行軍長史隋髙祖既為丞相深見親委遷東京左僕射開皇初拜尚書左僕射與邽公王誼修律令出為蒲州刺史加金紫光祿大夫賜錢百萬粟五千石李詢字孝詢成紀人賢子沉深有大略周武帝拜儀同三司遷長安令纍以軍功加大將軍爵髙平郡公隋髙祖為丞相尉遲迥作亂以詢為元帥長史擊之尉遲迥平封隴西郡公卒諡襄李景字道興天水人容貌竒偉驍勇善射開皇中以行軍總管從王世績伐陳有功進位開府檢校代州總管仁夀中拒漢王諒與劉嵩戰于城東斬獲略盡諒復遣徑勇三萬攻景景大破之拜大將軍明年破吐谷渾於青海又攻破髙麗城進爵滑國公王仁恭字元實天水上邽人工騎射秦孝王引為記室轉長道令遷車騎將軍從楊素擊突厥于靈武以功拜上開府討平山獠又從楊素擊漢王諒以功進大將軍歲餘改汲郡太守遷信都太守汲郡吏民叩馬號哭于道數日不得出境遼東之役以仁恭為將軍及班師仁恭為殿遇賊擊走之進左光祿大夫唐薑謨秦州上邽人隋大業末為晉陽長謨前識髙祖謂所親曰隋政亂將亡唐公負王霸資必能撥亂得天下乃深自結從平霍邑絳郡除長道縣公薛舉冦秦州以謨山西豪望詔安撫隴外委以便宜將行請唐公早正大位髙祖嘉納及薛仁杲平擢秦州刺史謨撫邉俗以恩信盜賊衰止改守隴州卒贈都督諡曰安薑確字行本以字顯謨之子性明敏雖祁寒烈暑無懈容凡營繕所司必咨而後行貞觀中為將作少匠護作九成洛陽宫遷宣威將軍太宗選趫才衣五色袍乘六間馬直屯營宿衛仗內號曰飛騎每出幸即以從遂拜確左屯衛將軍分典之髙昌之役為行軍副總管與侯君集進平髙昌戰有功還為金城郡公帝自征髙麗從至蓋牟城確中流矢卒贈郕國公諡曰襄子柔逺薑晈秦州人柔逺子事明皇于藩邸知其有非常度委心焉及即位自潤州長史召授殿中少監出入卧內呼之不名賜宫女廏馬及他珍物後將誅竇懷貞等晈與密議以功進殿中監楚國公或議任遇太過帝以其藩邸舊恩下詔曰晈往事朕于藩國雖彭祖同書子陵共學不過也朕既即位又參誅姦臣將厚以光寵每所撝遜昔漢昭之任霍光魏祖之用程昱朕之不德庶幾乎此尋遷太常卿監修國史薑晦晈弟起家蒲州參軍為髙陵令尋遷長安令治有聲開元初擢御史中丞轉太常少卿請以詔市馬六胡州間廄乃稍備除兵部侍郎滿歲改吏部主選曹史嘗請託為姦晦處事精明私相屬諉罪輒得皆以為神始晦革舊示簡廷議恐必敗既而贓賕路塞流品有敘衆乃伏李揆字端卿系出隴西揆性警敏善文章開元末擢進士第補陳留尉獻書闕下遷右拾遺以考功郎中知制誥扈狩劍南拜中書舍人乾元二年宗室請上皇后號揆諫止肅宗欲立太子而意未決從容語揆曰成王長有功將定太子卿意謂何揆曰陛下此言社稷福也因再拜賀拜中書侍郎同中書門下平章事修國史揆美丰儀善奏對帝歎曰卿門地人物文學皆當世第一揆素為盧把所惡用為入蕃會盟使拜尚書左僕射揆至蕃酋長曰聞唐有第一人李揆公是否揆畏留紿之曰彼李揆安肯來耶還卒於鳳州贈司空諡曰恭權臯字士繇秦州略陽人父倕與席豫蘇源明以藝文相友終羽林軍參軍臯擢進士第為臨清尉安祿山表為薊尉署幕府臯度祿山且叛欲行慮禍及親天寶十四載獻俘京師還過福昌尉仲謨謨妻臯妹也密約以疾召之臯陽喑直視而瞑謨盡哀含斂臯逸去人無知者臯母謂實死慟哭祿山不之虞歸其母臯潛奉母南奔祿山反天下聞其名爭取以為屬明皇在蜀聞之拜監察御史浙西節度使顔真卿表為行軍司馬召拜起居舍人固辭李華栁識韓洄王定皆仰臯節與友善卒贈祕書少監元和中諡貞孝子德輿權德輿字載之臯子少以文章稱德宗聞其才召為左補闕貞元八年淮南浙西大水德輿建言宜擇羣臣問民疾苦蠲其租入裴延齡判度支上疏劾之疏奏不省遷起居舍人兼知制誥凡撰詞命九年以類集為五十卷知禮部貢舉拜侍郎凡三歲甄品詳諦所得士相繼為公卿宰相十九年大旱德輿上陳闕政請蠲除租賦澤潞盧從史詐傲不制成德王承宗父死求襲德輿請赦承宗徙從史後皆如所料自太常卿拜禮部尚書同中書門下平章事德輿善辨論開陳古今本末以覺悟人主為輔相寬和不為察察名復拜太常卿徙刑部尚書復檢校吏部尚書出為山南西道節度使乞還卒贈左僕射諡曰文德輿積思經術無不貫綜自始學至老未嘗一日去書不觀雖動止無外飾其醖藉風流自然可慕子璩元和進士歷御史有美稱為中書舍人劾李訓傾覆亂國不宜出入禁中不聽後貶徙鄭州刺史訓誅人多璩明禍福大體能世其家趙昌字洪祚天水人始為昭義李承昭節度府屬纍遷虔州刺史安南叛拜昌都護逺人向化後入為國子祭酒未幾州將逐裴泰德宗召昌問狀時年踰七十占對精明帝竒之復拜安南都護詔書至人相賀叛兵即定憲宗初立檢校戶部尚書遷嶺南節度使召入再遷太子少保卒年八十五贈揚州大都督諡曰成五代王仁裕字德輦天水人年二十五尚未學夢人剖其腸胃以西江水滌之顧見江中砂石皆為篆籀之文由是文思益進以文辭知名秦帥辟為判官秦州入於蜀仁裕事蜀為翰林學士唐莊宗平蜀仁裕事唐復為秦州節度判官廢帝得仁裕置之軍中其馳檄諸鎮詔書告命皆仁裕為之充翰林學士晉髙祖入歷司封左司郎中漢髙祖時復為翰林學士承旨纍遷戶部尚書太子少保仁裕曉音律晉髙祖初定雅樂宴羣臣於永福殿奏黃鍾仁裕聞之曰音不純肅而無和聲當有爭者起于禁中已而兩軍校鬭升龍門外聲聞於內人以為神仁裕在五代與和凝皆以文章知名又嘗知貢舉仁裕門生王溥凝門生范質皆至宰相有詩集百卷號西江集宋尹崇珂秦州天水人初事周為殿前都指揮使宋初出為淄州刺史有善政民詣闕請刻石頌德太祖命殿中侍御史李穆撰文賜之討平湖南授朗州團練使又與潘美克郴州乾德中征嶺表以崇珂為行營馬步軍副都部署克廣州擒劉鋹録功遷保信軍節度使未幾南漢開府樂範容州都指揮使鄧存忠等叛崇珂討之數月盡平其黨卒贈侍中初太宗在周朝娶崇珂妹追諡淑德皇后崇珂子昭吉洛苑使次子昭輯閣門祇候弟崇圭西京作坊使李仕衡字天鈞秦州城紀人進士第授鄠縣簿田重進守京兆命仕衡鞫死囚五人活者得四重進曰子有隂施門當髙大遷大理評事冦凖薦其才徙知劍州賊攻劍州仕衡迎擊之斬首數千級擢尚書度支員外郎歷陜西轉運使請弛鹽禁悉除之纍遷河北轉運使河北歲給諸軍帛七十萬方春民不足請戶給錢令夏輸帛詔優其直仍推其法於天下後運粟塞下至巨萬斛棣州地下苦水患仕衡奏徙西北七十里既而大水沒故城遷知青州前守捕盜妻子置棘圍中仕衡至悉縱之未幾其徒有梟賊首至者遷吏部侍郎改觀察使子丕緒以蔭補將作監主簿及仕衡歸老丕緒時為虞部員外郎請解官就養後起僉書永興軍判官丕緒居官亷靜不為矯激家多圖書集歷代石刻為數百卷藏之崔立字本之河池人祖周度仕周為泰寧軍節度判官慕容彥超叛度以大義責之遂見殺立中進士第為果州團練推官役兵輦官物道險乃率衆錢傭舟載歸知州薑從革論如法當斬三人立曰此罪杖耳從革不聽論奏詔如立議真宗記之特改大理寺丞會滑州塞河決調民出芻楗命立提舉計其用有餘而下戶未輸者尚二百萬悉奏弛之知江隂軍立教民濬治水港溉田二千頃及開橫河六十里通運漕遷太常卿立遇事敢言前後上四十餘事以尚書工部侍郎致仕趙隆字子漸成紀人以勇敢應募從王韶取熙河又從李憲破西市師討鬼章外河諸羌皆以兵應之隆率衆先至斧其橋鬼章失援乃成擒夏人冦涇原師至鐵山隆先登士皆殊死戰夏人解去童貫與論燕雲事隆極言不可貫曰君能共此當有殊拜隆曰隆武夫豈敢干賞以敗祖宗二百年之好異時啓釁萬死不足謝責知西寧州充隴右都護羌豪信服卒贈鎮潼軍節度使徽宗自篆碑額曰旌忠劉仲武字子文秦州成紀人熙寧中試射殿庭異等補官為涇原將夏人犯天聖寨力戰却之遷皇城使知河州吐蕃趙懷德等叛仲武與相持數日潛遣二將領千騎扣其營戒曰彼出勿與戰亟還伏兵道左二將還羌果追之遇伏大敗斬首三千級復西寧州懷德等降纍進榮州防禦使童貫招誘羌王子臧以征布格邀仲武計事仲武曰王師入羌必降或退伏巢穴可乘其便但河橋功力大非倉卒可成緩急須豫辦耳若稟命待報慮失事機貫許以便宜布格果約降而索一子為質仲武即遣子錫往河橋亦成仲武帥師渡河挈與歸貫掩其功仲武亦不言徽宗訪知召對勞之曰布格之降河南綏定卿力也問幾子曰九子悉命以官仲武歷拜瀘川軍節度使再起為熙州卒贈檢校少保諡威肅張俊字伯英成紀人好騎射負才氣徽宗時以討河朔羣冦為都指揮使靖康初以隊將擊敵于太原殺傷甚衆獲馬千匹金人圍汴俊勒兵勤王擢元帥府後軍統制髙宗即位為御營統制苗劉之變引兵問罪戰於臨平傅等敗走入城見於內殿帝嘉勞久之尋為浙東制置使又敗金人于明州及討平羣盜改江南招討使復筠州江州諸郡悉平拜太尉金人劉豫分道入侵薄諸淮大敗之劉麟入冦兵十餘萬俊率大軍鼓行而前遇劉猊與戰殺獲略盡降者萬餘復屢敗金師加太傅進益國公尋進封清河郡王追封循王劉錡字信叔仲武第九子美儀狀善射聲如洪鐘嘗從仲武征討牙門水斛滿以箭射之拔箭水注隨以一矢窒之人服其精髙宗即位差知岷州為隴右都護與夏人戰屢勝夏人兒啼輒怖之曰劉都護來紹興三年復官宣撫使統制十年充東京副留守部八字軍駐於汴家留順昌至渦口方食暴風拔坐帳錡曰此主暴兵即兼程而進抵順昌金人來侵諸將皆請還江南錡曰敢言去者斬鑿舟沉之置家寺中積薪於門戒守者脫不利焚吾家錡於城上躬自督厲金人圍順昌錡擊之殺虜頗衆募壯士百人夜斫其營是夕天欲雨電光四起命折竹為嘂如市井兒以為戲者人持一以為號電所燭則奮擊電止則匿聞吹聲即聚金人不能測終夜自戰積尸盈野退軍老婆灣烏珠在汴聞之七日馳至錡聞烏珠至募二人作間遇敵佯墜馬為敵所得敵帥問錡何如人曰太平邉帥子喜聲伎圖逸樂烏珠喜即置鵝車炮具不用至城下責諸將喪師皆曰南朝用兵非昔之比錡遣耿訓約戰毒潁上流及草中戒軍士雖渴毋飲於河時天大暑敵逺來疲敝人馬飢渴食水草者輒病方晨氣清錡按兵不動逮未申間敵力疲氣索出兵接戰令匆喊入其陳刀斧亂下敵大敗北去遣兵追之死者萬數金人自用兵以來以鐵騎號拐子馬所向無前至是為錡所破棄尸斃馬器甲山積時洪皓在燕密奏順昌之捷金人震恐喪魄意欲捐燕以南棄之秦檜議和王師亟還十一年自太平渡江與金人戰屢勝敵望見順昌旗幟即退走三十一年為江淮浙西制置使金萬戶髙景山攻揚州錡大敗之斬景山俘數百人捷奏賜金五百兩銀七萬兩以犒師卒贈開府儀同三司諡武穆金主亮南侵舉宋朝諸將問其下孰敢當者皆隨姓名答至錡莫有應者其為敵人所畏如此張子蓋字德髙俊從子金人破開德府父宏戰死子蓋初從韓世忠討苗傳補承信郎又從俊擊劉猊授宣贊舍人十年以興復宿亳功遷登州防禦使金兵圍海州急子蓋往援之即日渡江進次石湫堰金人陳萬騎于河東子蓋率精鋭數千騎擊之謂麾下曰彼衆我寡利在速戰遣統制張玘掠陳玘中流矢子蓋曰事急矣奮臂大呼馳入陳諸將繼之殊死戰敵大敗圍遂解尋復來戰子蓋再率精鋭擊之獲其車馬鎧仗萬計孝宗召對授檢校少保淮東招撫使卒贈太尉諡恭壯王煥徽州人煥以進士知武當縣建炎間賊犯鈞州煥率邑人保山寨賊至或勸之遁煥曰使吾有此心則不能與邑人為此謀耳遂力戰守之遷京西湖北路制置使授忠訓郎弟焯修職郎知同谷縣主管勸農公事煒從仕郎元趙世延字子敬秦州漢陽人其先永古特族人祖按札爾幼孤鞠於外大父卓裕勒嘉訛為趙家因氏為趙自金而元世以武功顯世延天資秀發喜讀書究心儒者體用之學官監察御史與同列五人劾丞相僧格不法中丞趙國輔抑不以聞按平陽郡監額森呼圖贓巨萬鞫左司郎中董仲威殺人獄皆明允出僉湖北道肅政亷訪使敦儒學立義倉撤淫祠修壞堤嚴掠賣良民之禁除安西路總管前政壅滯者三千牘世延至不三月剖決殆盡陜民飢省臺議請於朝世延先發廩以賑所活者衆改四川肅政亷訪使修都江堰民便之右丞劉深討八百媳婦兵敗棄市右丞阿固台當繼行世延言蠻夷事在羈縻重煩天討致軍旅亡失誅戮省臣使得其地何補于國兵宜止勿用章再上事卒罷延祐元年拜中書參知政事遷御史中丞世延劾奏右丞相特們德爾罪惡詔奪其官職進昭文館學士乞補外拜四川行省平章政事墾江津巴縣間田七百八十頃歲得粟萬一千七百石明年特們德爾復居相位誣以罪逮世延繫刑曹左丞相拜珠言世延無辜得旨出獄泰定四年復為御史中丞加翰林學士承旨文宗即位拜中書平章政事與虞集修經世大典屢奏衰老乞解政務養疾于金陵之茅山卒贈上柱國魯國公諡文忠明髙斗南字拱極徽州人明初以州薦授四川定逺知縣惠政多方民為之謡曰江上髙樓鼓角鳴至今吹出斗南聲三載考績以他故下刑部獄定逺耆民赴闕奏其亷能太祖赦之仍命知定逺賜賚特優宴而遣之時舉天下亷官斗南與焉九載考最升雲南新興知州新興人愛戴如定逺居數年以衰老乞間薦子恂以代上允之厚遣以歸髙恂字士信斗南子十二歲通五經博極羣書尤善屬詩文習騎射以父薦召至京太祖竒之命翰林兵部兩試焉文武皆優等授禮科給事中奏劾不避權貴涖父職知新興州時安南王陳日煃為黎季所弒阻聲教新興密邇安南上遣成國公朱能往討之命恂權行司馬大將而下咸聽節制乃以大軍二十萬協能航海趨安南宣揚教化撫順凶逆備諭慰安之意蠻人肅然清平獻功方至新興病卒年三十七三軍慟哭門克新禮縣人以儒士為秦州訓導生徒多有成效洪武二十六年秩滿入覲上親詢以民間政事得失克新敷奏亮直特命為左贊善應制作萬里長江圖記晉禮部尚書卒於官上自製祭文遣官諭祭胡彥祥徽州人少有大志刻苦力學永樂中以鄉貢為肅寧令自奉清約取豫不茍擢監察御史巡按非直除強扶弱貴戚斂手遷知眉州德威並施重農興學修堰以廣水利升知保寧府再遷河間擢山西參政祿俸自給外悉以給公家無私焉髙儒字崇文恂之子以鄉貢授豹韜衛經歷改懷來衛亷謹勤事九年升山西石州同知石州田賦積年逋廢儒亷慎仁信凡利弊因革力贊長吏為之而隂運其機踰年大治王恕秦安人永樂中以衛經歷被選督修皇城文皇帝幸城見恕老成諭左右曰此可作臺諫者事竣擢御史巡按廣西遷雲南按察僉事所在以風力稱劉紀秦安人永樂間以國子生授工部主事奉敕巡視淮北河道屢疏頗中時弊當道不恱乃罷歸張翼秦安人永樂間鄉舉授御史巡按江西歲大祲莩殣相屬翼繪圖上疏請賑之發帑金數十萬全活甚衆又江岸地斥鹵可田翼命開墾給牛種鑿渠道灌田萬餘頃民以殷富劾寵臣劉觀貪婪不法帝即遣戍觀又劾中涓陽進怙寵要恩為中官所嫉忌致仕歸胡璉字大用秦安人國子生景泰間授南皮知縣嚴以懲姦平以近民盜不涉境蝗不害稼民用乂安九載乞休攀送者相望於路若失慈母王福秦安人以國子生任蒲州知州剛直有聲張錦字尚絅秦安人成化中進士授刑部主事歷郎中鞫訊明審奉命賑畿輔災及治方山慶成二王獄還稱旨遷大理寺丞右少卿擢右副都御史巡撫宣府劾罷中官武將守備不職者未幾巡撫保定諸府有貴臣為都御史秦紘所劾贓以萬數怙勢求免卒正其罪以疾乞歸子潛𢎞治六年進士歷官山東右參政張鋭字抑之秦州人成化十一年進士在刑曹以平恕稱知吉安府政教並舉以剛直忤權貴調漢陽益厲嚴操參政山東歸講學不倦閭里薰德隴西學者稱之王爵字錫之秦州人自少潛心力學及長從周蕙學知操存法郡守秦紘恱之與講求操存之學其教後學以誠敬為本𢎞治初以國子生仕保安州判出納惟公會計允當日不憚勞及歸秦紘贈以揚州鹽引數百石爵辭不受布衣疏食坦如也文獻徽州人成化中舉人為監察御史以正直稱巡按北直雲南河南所至貪汚吏望風遁去河南有賊殺人奪貨誤坐平民獻密訪得賊捕訊獲贓及凶器人稱其神奉命閲盧氏銀幣搜剔宦官監督弊以紓民怨宦官銜之令人暮踰牆投金寢所翌日劾獻被繫下獄值風雷之變即日赦出升山東僉事擢湖廣副使治行卓異威聲大振王謙徽州人由監生知夀州單車赴任將入境移檄杜絶奔競至州宣布德威勸農桑别善良恤鰥寡發姦摘伏號稱神明除去弊端疏通利源百姓安樂九載考績民赴京乞留朝廷褒之加參議赴任三十餘年以衰老致仕夏景和字時雍秦州衛籍成化二十年進士授行人擢監察御史持紀剛正人不敢干以私孝宗以其好直諫每曰黑秀才知之又上疏矣升山西副使劉瑾誣以事逮繫獄論輸米八百石後事白遷右副都御史巡撫宣府蘇民字天秀秦州人𢎞治中進士授榆次知縣榆次健訟且易騰謗民亷以直已訟息謗弭徴為兵部主事逆瑾搆之謫為梓潼驛丞時蠻人叛巡撫進𠞰民領兵從征有功瑾誅復官工部主事改吏部歷文選郎中澄别流品有清譽歷光祿卿節財萬計升工部右侍郎改南京兵部考滿道經榆次父老百姓萬人遮道邀迎尋補刑部侍郎王綸字大經秦安人國子生授湯隂令剛方不撓摧抑權豪民翕然稱頌瑾用事遣官校過縣恃勢不遜綸執而杖之坐事下詔獄奪職張潛字川昭秦安人錦子𢎞治六年進士歷官山東參政學問淵博明習練達歷任所在政事有聲胡士濟字濟民秦安人璉子以貢入太學成化末仕成都訓導以文行導諸生遷鹽亭學諭又除雙流諭亦以文行教諸生兩攝縣印惠政及民頌聲載道侯一元字應乾秦安人進士授工部主事監閘濟寧中官恆乘樓船匿賈客貨越次開閘官無敢問一元至令舟以序進閘啓閉以時有敢匿貨貿進者懲以法自是中官不敢橫改兵部職方郎中病免以薦起吏部郎中卒於官堅晟字伯明秦州人由國子生歷知博平縣東郡盜起東昌屬邑半不守漸逼博平人心思遁晟嚴戒固守乃閉妻子於宅圍之以棘云賊到爾輩可自裁人心感動盜攻五日去百姓為建生祠遷薊州改通州通衝而劇晟敏而直中貴迫董同知墮河晟以狀聞置中貴於法心銜之明年以郡守罪中貴挾私波及晟謫雲南同知尋復遷安州改寧州所至藉甚尹琭秦州人𢎞治進士授太平知縣剛方梗介民以真父母稱之徴入將擢臺諫改知平定州後以大計誤陷郡邑寃之張鳳字廷儀徽州人以貢士任長子深澤二縣教職升林泉王府教授輔導匡正王不聽遂乞休歸性豪邁有才辨議論若決江河成化末居家上疏論時政十事皆切時弊居鄉亷介不干人以私胡纘宗字可泉秦安人正德三年進士知蘇州府釐革積弊興講學書院表義烈歷浙江參政升副都御史巡撫山東魯王愎諫恣惡奏請詔奪其祿裁護衛總理河道經畫有方改撫河南疏請賑飢歸築别墅日閉閣著書有鳥鼠山人集秦安秦州鞏郡諸志春秋本義等書黃世經字時濟秦州人成化進士授修武縣縣當衝路政事勤敏聽訟明決輸賦均平修武大治擢監察御史遷雲南副使提刑惟慎肅政惟明滇民感之胡來縉字東泉秦州人舉於鄉知大興縣大興在輦轂下貴戚雜沓人皆為縉恐縉曰京縣之難難在逐情棄理惜官曲法吾惟視理守法人心孰無公道得失何知焉氷檗自矢勤敏供職三年權貴懾伏進司農郎革宿弊殆盡升山西按察司副使郭莊字子莊徽州人隆慶二年進士以庶吉士授御史辛未按吳吳貴人子弟多關説一切以法治之癸酉按蜀會多盜檄府道剿治盜遂息蜀府有所請於朝久沈閣莊為請得允王饋以金莊却之王益重之丁丑掌河南道主計吏不敢通餽遺再入吳督學黜纎巧崇醇雅士風翕變胡欣字慕東來縉子萬厯十七年進士知臨汾縣庭無滯訟獄無縲囚日惟申明鄉約官民相習若父子晉工科給事三殿大工閹商扶同冒破幾百萬上疏發其姦弊請身任其事以二十萬起工遂減十之五其他論陵寢論河工轉禮垣請郊祀請日講參稅監祈撤回梁永論虛礦開豁賠纍秦人並受其福引疾歸楊名顯字心虞秦州人明末舉人除山西山隂縣令善政為良吏最行取刑部主事晉郎中差恤刑山東全活甚衆升廣東布政使罷除差官及挂添火耗之費歲省民財無算直𨽻階州魏楊大眼階州人武當氐難當之孫少有膽氣跳走如飛孝文南伐令尚書李沖典選征官大眼往求沖弗許大眼曰請出一技便出長繩三丈許繫髻而走繩直如矢馬馳不及沖曰逸材也遂用為軍主所經戰陳勇冠六軍除輔國將軍宣武徴為太尉長史持節東征人慕其勇觀者如市還加平東將軍大眼善騎乘裝束雄竦擐甲周旋撫循士卒自為將帥常衝突堅陳當其鋒者無不摧拉出為荆州刺史荆蠻不敢為冦雖不學常令人讀書而坐聽之悉能記識令作露布皆口授之而竟不多識字也宋丁焴字晦叔福津人為人剛直不受私謁纍官至太府少卿嘉定間為利州路安撫使兼知興元府決事明白吏民信服魏了翁稱曰丁晦叔武階一人而已張威字德逺成州人貧甚賣藥自給或言其才勇乃令戍邊開禧用兵威與敵每戰輒捷以功補本軍將領吳曦既誅遣將復西和州威率衆先登敗金人於板橋遂取西和升統制由是威名大振升天水縣為軍命威為守屢立竒功擢利州副都統制嘉定間金分道入蜀威却之又破之於金斗鎮潛遣石宣等襲於大安軍大破之威以勇見稱每戰輒克臨陳戰酣則精采愈奮兩眼皆赤時號張鶻眼金人憚之軍律整嚴兵行常若銜枚每與百姓避路買食物則價倍于市無敢多取張詔字君卿成州人少𨽻張俊帳下積功守和州嘗奉命使金一日金國持所繪祐獻二陵像至館中皆北地服詔向之再拜館人問之答曰詔雖不識其人但龍鳳之姿天日之表自非恆民祖宗也孝宗聞而嘉之初趙汝愚奏請以詔代領武興軍杜吳氏握兵之漸及汝愚既知樞密力請於光宗曰若武興朝除帥則臣夕拜命上許之乃以詔為成州團練使興州諸軍都統制詔在興州甚得士心明汪滸成縣人世顯七代孫正統進士授戶部主事升員外郎中景泰間奉敕選募隴右民兵禦敵有功遷蘇州知府政績著聞王存禮階州人成化十四年進士授評事轉左寺副讞獄明允升山西僉事松潘副使詢民疾苦杜科斂定更番轉戍法軍民便之尚儉崇厚闢邪匡正松潘稱治歸田築草堂吟咏自適著書課子不干謁當事龍光階州人成化舉人知巴縣以清勤稱最居家孝友李文明階州人正德中舉人授敘州同知治政清亷蜀民稱頌及歸宦橐蕭然寠居丘園不謁公庭崔觀階州人正德中舉人為巴縣教諭師道端嚴士多成就分俸濟貧不營家計著學庸補説葉紹先文縣人舉正德十四年鄉試授寧津知縣清亷著聞蹇來亨階州人嘉靖甲子舉人知峩眉縣補綿竹渠縣所至清慎蜀民感頌王繼禮字行之文縣人嘉靖中進士知常熟縣海冦擾民相機擒之冦平賜白金文綺以薦擢監察御史巡視團營權度兵餉整肅軍容劾罷役占科剋諸將領巡按兩浙懲姦不少假而居心持平都御史臺稱為賢後遷徽州知府在郡持廉秉公大獄立判遷浙江按察司副使巡察河濵嚴防禦廣儲犒敵人不敢犯境歷遷至湖廣按察使朱希晦文縣人貢生知新樂縣居官亷明歸里蕭然日與故舊相歡剛正無曲過門者必式張九經文縣人嘉靖中舉人任太原府通判居官守正不求聲譽一生嗜古好學不問家産晚年尤究心窮理之功鄉人矜式張九功文縣人嘉靖舉人初任河南武安知縣升知涿州遷王府長史居官清慎解組歸克敦孝友精岐黃術在官在家全活無算武彥成縣人剛徑嚴明才識過人初任湖廣按察司經歷能聲逺播薦監察御史風裁峻厲升浙江寧波知府蕭籍文縣人萬厯二十二年舉人授澠池知縣歷升澤州知州居官精明吏不敢欺澠池為立生祠處鄉清正尤善詩文陳尚表成縣人萬厯中恩選初任厯城丞有賢聲升知井研縣廉明益著升眉州知州會奢酋作亂築城防禦募兵驅敵勞績顯著升湖廣常德同知劉大猷文縣人萬厯舉人初任萬泉知縣調太平升戶部主事至潞安知府所在多政績處繼母異弟孝友並稱言動不茍鄉評推重趙守廉階州人以明經授東昌推官振幽理寃黜貪舉賢升崇慶州直𨽻肅州漢張奐字然明敦煌酒泉人父惇為漢陽太守奐少遊三輔學歐陽尚書舉賢良對䇿第一拜議郎遷安定屬國都尉南胸奴合羌入冦奐擊降之郡界以寧羌豪帥感奐恩德上馬二十匹先零酋長又遺金鐻八枚奐並受之而召主簿於諸羌前以酒酬地曰使馬如羊不以入廏使金如粟不以入懷悉以金馬還之羌性貪而貴吏清奐正身潔已威化大行遷使胸奴中郎將時休屠各及烏桓同反兵衆大恐奐坐帳中與弟子講誦自若乃潛誘烏桓使斬屠各渠帥襲破其衆諸胡悉降明年梁冀誅奐以故吏免官禁錮皇甫規上章薦舉復拜武威太守舉尤異遷度遼將軍數載間幽并清靜徴拜大司農鮮卑聞奐去招結南胸奴等冦掠緣邊九部復拜奐護胸奴中郎將諸羌聞奐至悉降凡二十萬口又復擊破先零諸羌論功當封奐不事宦官賞遂不行惟賜錢二十萬除家一人為郎並辭不受而願徙屬𢎞農華隂舊制邊人不得內移惟奐因功特聽竇武陳蕃謀誅宦官事泄中常侍曹節等矯制使奐圍武武自殺蕃見害後知為節所賣加封不受明年青蛇見於帝座大風雨雹拔木奐上書言竇武陳蕃志寧社稷方直不回以讒受誅災眚之來蓋為此也天子深納其言左右皆惡之下詔􅋀責遂陷以黨罪禁錮歸田里奐閉門不出著尚書記難三十餘萬言董卓慕之遺縑百匹奐不受卒年七十八武威多為立祠所著銘頌書教誡述志對䇿章表二十四篇張芝字伯英奐長子少持髙操勤學為儒宗太尉辟公車徴皆不就號張有道尤好草書學崔杜之法為世所寶韋仲將謂之草聖弟昶字文舒亦善草書魏龎淯字子冀酒泉表氏人也初以涼州從事守破羌長會武威太守張猛反殺刺史邯鄲商猛令曰敢有臨商喪死不赦淯聞之棄官晝夜奔走號哭喪所訖詣猛門衷匕首欲殺猛猛知其義士敕遣不殺由是以忠烈聞太守徐揖請為主簿後郡人黃昂反圍城淯棄妻子夜踰城出圍告急於張掖燉煌二郡感其義遂為興兵未至而城已陷揖死清乃收斂揖喪送還本郡行服三年乃還魏王聞之辟為掾屬文帝踐阼拜駙馬都尉遷西海太守賜爵關內侯楊豐本名阿若字伯陽酒泉人少遊俠常以報仇解怨為事建安中郡中強族黃昂殺太守徐揖重募取豐豐遂逃走武威太守張猛假豐為都尉使齎檄告酒泉聽豐為揖報仇豐遂單騎入南羌中合衆得千餘騎從樂浪南山中出指趨郡城未到三十里令騎下馬曳柴揚塵酒泉人望見以為東大兵到遂破散羌捕得昂豐遂殺之黃初中河西興復豐乃還郡舉孝亷州表其義勇詔即拜駙馬都尉晉祈嘉字孔賔酒泉人少清貧好學年二十餘西至燉煌依學官讀書貧無衣食為諸生厮養以自給遂博通經傳精究大義西遊海渚教授門生百餘人張重華徴為儒林祭酒性和裕教授不倦受業弟子二千餘人隋趙才字孝才酒泉人祖隗魏樂浪太守父夀周順政太守才少驍武便弓馬性粗悍仕周為輿正上士隋髙祖受禪以功至上儀同煬帝即位轉右驍衛將軍以才藩邸舊臣漸見親待才亦精勤匪懈所在有聲從征吐谷渾為行軍總管出合河道破賊以功進金紫光祿大夫帝將幸江都才見四海土崩諫請還京師安兆庶帝大怒以才屬吏旬日乃出之安西漢蓋勳字元固燉煌廣至人舉孝亷為漢陽長史時武威太守恣行貪橫從事蘇正和案致其罪涼州刺史梁鵠欲殺正和訪之於勳勳素與正和有隙或勸因此報隙􅈴曰不可謀事殺良非忠也乘人之危非仁也乃諫鵠從其言正和得免詣勳謝􅈴不見曰吾為梁使君謀不為蘇正和謀也怨之如初叛羌圍護羌校尉夏育勳與州郡合兵救育為羌所破士卒多死􅈴被三創堅不動羌滇吾素為勳所厚乃以兵扞衆曰蓋長史賢人汝曹殺之為負天􅈴罵曰促來殺我滇吾下馬與􅈴勳不肯上為賊所執羌人服其義勇不敢加害送還漢陽後刺史楊雍表􅈴領漢陽太守時大飢人相食勳調榖廩之活者千餘人徴拜討虜校尉勳與宗正劉虞佐軍校袁紹同典禁兵􅈴曰上甚聰明但壅蔽於左右耳若誅嬖幸拔英俊以興漢室豈不快乎未及發而司𨽻校尉舉􅈴為京兆尹時長安令楊黨父為中常侍􅈴案得其贓千餘萬并連黨父威震京師􅈴雖在外每軍國密事帝常手詔問之及董卓擅權公卿莫不卑下惟􅈴長揖爭禮􅈴雖強直不屈而內厭於卓不得意卒遺令勿受卓賻贈張恭敦煌人為郡功曹恭素有學行郡人推行長史事恩信甚著時酒泉張華張掖張進各據郡恭遣從弟華攻酒泉沙頭乾齊二縣又遣鐵騎二百出張掖北河逢迎太守尹奉於是張進張華遂詣金城太守蘇則降黃初二年下詔褒揚賜爵關內侯拜西域戊巳校尉數歲徴還授以侍臣之位恭至敦煌固辭疾篤太和中卒贈執金吾後子就為金城太守父子著於西州晉張斆字祖文就之子𢎞毅有幹武帝時為廣漢太守王濬在益州受中制募兵討吳無虎符斆收濬從事列上由此召斆還帝責斆何不密啓而便收從事斆曰蜀漢絶逺劉備嘗用之輒收臣猶以為輕帝善之官至中郎將子固字元安有斆風為黃門郎段灼字休然敦煌人世為西土著姓果直有才辨少仕州郡稍遷鎮西司馬從鄧艾破蜀有功封關內侯武帝即位灼上書追理艾事帝嘉其意前後陳事輒見省覽擢為明威將軍魏興太守索靖字幼安敦煌人靖有逸羣之量與鄉人范衷張甝索紒索永俱詣太學馳名海內號稱敦煌五龍四人並早亡惟靖該博經史兼通內緯州辟别駕郡舉賢良方正對䇿髙第拜駙馬都尉出為西域戊巳校尉張勃表靖才藝絶人宜在臺閣武帝納之擢為尚書郎與尚書令衛瓘俱以善草書知名拜酒泉太守惠帝時賜爵關內侯靖有先識知天下將亂指洛陽宫門銅駝歎曰會見汝在荆棘中耳元康中卒贈司空諡曰莊所著有五行三統正驗論辨理隂陽氣運索子晉詩各二十卷又作草書狀索綝靖少子字巨秀少有逸羣之量靖每曰綝廊廟之才非簡札之用州郡吏不足汙吾兒也舉秀才除郎中屢立戰功除安西將軍馮翊太守綝有威恩華夷嚮服賊不敢犯及懷帝蒙塵長安又陷綝紏合義旅小大百戰頻破賊黨復定宗廟尊立愍帝遷尚書左僕射索襲字偉祖敦煌人虛靜好學不應州郡之命舉孝廉賢良方正皆以疾辭遊思隂陽之術著天文地理十餘篇多所啓發不與當世交通張茂時敦煌太守隂淡竒而造焉經日忘返出而歎曰索先生碩德名儒真可以咨大義淡欲行鄉飲之禮請襲為三老魏宋繇字體業敦煌人少以孝聞長博通經史事涼武昭王歷位通顯家無餘財雖兵革間誦講不輟後入魏拜河西王右丞相賜爵清水公劉昞字延明敦煌人父寶以儒學稱昞年十四就博士郭瑀受業妻以女後隱居酒泉不應州郡命弟子受業者五百餘人李皓徴為儒林祭酒從事中郎遷撫夷護軍雖有政務手不釋卷著略記敦煌實録方言靖恭堂銘諸書注周易韓子人物志黃石公三略行於世世祖平涼州夙聞其名拜樂平王從事中郎尚書李沖奏昞河右碩儒除其一子為郢州雲陽令太保崔光奏復其孫等三家河西人以為榮索敞字巨振敦煌人為劉昞助教專心經籍盡傳昞業涼州平入魏以儒學為中書博士京師貴遊之子皆敬憚威嚴多所成益敞以喪服散於衆篇遂撰為喪服要記後出補扶風太守在位清貧卒贈涼州刺史諡曰獻張湛字子然敦煌人魏執金吾恭九世孫湛弱冠知名涼土好學能文有大志魏太武平涼州賜爵南浦男司徒崔浩重之曰敦煌張湛有俊才見稱於西州湛至京師家貧不立而操尚無虧浩嘗給其衣食薦為中書侍郎湛知浩必敗固辭每贈浩詩頌多針規之言闞駰字玄隂敦煌人博通經傳聰敏過人三史羣言經目輒誦時人謂之宿讀注王朗易傳撰十三州志沮渠蒙遜甚重之常侍左右訪以政治損益拜祕書考課郎中典校經籍刋定諸子三千餘卷牧犍重之拜大行遷尚書及姑臧平樂定王丕鎮涼州引為從事中郎丕薨後遷京師家甚貧敝不免飢寒范紹字始孫敦煌人少聰敏年十二父命就學師事崔光以父憂廢業母誡之曰汝父卒日令逺就崔生希有成立今已過期宜遵成命紹遂赴學太和初充太學生頗涉經史孝文選為門下通事令史遷録事掌奏文案帝善之歷位并州刺史太常卿北齊宋遊道繇曾孫弱冠隨父任父亡吏人贈遺一無所受事母以孝聞後魏時為殿中侍御史臺中語曰見惡能討宋遊道孝莊即位除左兵中軍後入北齊為尚書左丞宋顯字仲華敦煌人性果毅有幹用初事爾朱榮稍遷為記室參軍後歸齊神武為行臺左丞拜西兖州刺史遇事勇決有氣幹及河隂之戰深入沒於行陳贈爵司空公周令狐整字延保敦煌人幼聰敏沉深有識量學藝騎射並為河右所推刺史魏東陽王元榮辟整為主簿加蕩冦將軍進趨詳雅對揚辨暢謁見之際州府傾目嘗謂僚屬曰令狐延保西州令望豈州郡之職所可縶維但一日千里必基武步當委以庶務畫諾而已河右擾亂榮仗整防扞州境獲寧張保據河西殺刺史成慶晉昌人吕興等復害郡守郭肆以郡應保整先定晉昌斬吕興進軍擊保平之以狀聞遂立為瓜州義首整以國難未寧常願舉宗效力遂率鄉親二千餘人入朝隨軍征討整善於撫馭躬同豐約是以士衆並忘羈旅盡其力用纍遷驃騎大將軍加侍中初梁興州刺史席固以州來附周文以固為豐州刺史固多虧政典朝議密欲代之而難其選令整權鎮豐州整廣布恩威傾身撫接數月之間化洽州府除豐州刺史及秩滿代至吏民戀之老幼送整逺近畢集數日停留方得出界其得人心如此拜御正中大夫整雅識情偽尤明政術恭謹廉勤常懼盈滿故歷居內外所在見稱進位大將軍宇文護執政欲委以腹心整辭頗忤其意護疏之及護誅附會者伏法整獨保全人稱其先覺卒諡曰襄子熙令狐休整弟幼聰敏有文武才與兄整同起兵逐張保授帥都督後為敦煌郡守在郡十餘年甚有政績隋令狐熙字長熙整子性嚴重有雅量雖在私室終日儼然不妄通賔客凡所交結皆一時名士博覽羣書尤明三禮善騎射為夏官都上士母憂去官殆不勝哀其父戒之稍加饘粥服闋除駕部復丁父憂非杖不起人聞哭聲莫不下淚及武帝平齊以留守功進位儀同隋髙祖受禪進爵河南郡公討吐谷渾以功進上開府拜滄州刺史風教大洽開皇四年上幸洛陽熙來朝及還百姓出境迎謁歡聲盈路在州有瑞麥甘露八年徙為河北道行臺度支尚書兼吏部尚書號為明幹上甚任之汴州殷盛多有姦俠以熙為刺史下車禁遊食抑工商星居者勒為聚落僑人逐令歸本決遣滯獄令行禁止上聞而嘉之其年來朝考績為天下之最以嶺南夷數起亂徴拜桂州十七州總管諸軍事封武康郡公熙至部大𢎞恩信溪洞渠帥相率歸附為建城邑開設學校邊夷感化薛世雄字世英本河東汾隂人其先寓居敦煌世雄兒童時與羣輩戲輒畫地為城郭令諸兒為攻守勢不從令者輒撻之諸兒畏憚莫不齊整其父見而竒之謂人曰此兒當興吾家年十七從周武帝平齊以功拜帥都督隋開皇中數有戰功纍遷車騎將軍煬帝即位為右監門郎將進位通議大夫世雄性亷慎凡行軍破敵之處秋毫無犯帝嘉之超拜右翊衛將軍歲餘為玉門道行軍大將從帝征遼遷左禦衛大將軍仍領涿郡留守卒子四人並以驍勇知名唐薛萬均敦煌人世雄子與弟萬徹事唐授上柱國永安郡公破竇建德平梁師都從李靖討吐谷渾勇蓋三軍遷本衛大將軍又副侯君集討髙昌降麴智盛皆有功進潞國公薛萬徹與兄萬均歸髙祖授車騎將軍武安縣公從李靖討突厥頡利可汗副李績擊薛延陀以功遷代州都督右武衛大將軍太宗嘗曰當今名將惟李績江夏王道宗薛萬徹而已王君㲋字威明瓜州常樂人為河西節度使開元十四年吐蕃冦甘州焚掠而歸君㲋勒兵躡其後至青海大破之獲其羊馬輜重萬計而還以功遷大將軍五代李珽河西敦煌人唐末舉進士為監察御史丁內艱貧無以葬乞食而後葬飢卧廬中聞者哀憐之趙匡凝鎮襄陽辟掌書記梁太祖破匡凝得珽喜曰此真書記也除知制誥辭不拜出知曹州曹州素劇難理珽至以治聞遷兵部郎中崇政院直學士許州馮行襲有牙兵二千故蔡卒太祖懼為變行襲嚴酷欲誅從事魏峻遣珽代行襲為留後乃理峻寃立出之太祖喜曰珽果辦吾事會歲飢盜劫汴宋間曹州尤甚太祖復遣珽治之珽至索賊得大校張彥珂珽甥李郊等及牙兵百餘人悉誅之召拜左諫議大夫右散騎常侍李琪字台秀河西敦煌人少舉進士博學宏辭仕梁為翰林學士梁兵征伐四方所下書詔皆琪所為下筆輒得太祖意梁亡仕唐為御史中丞纍官至尚書右僕射琪為人重然諾喜稱人善少以文章知名亦以此自負以太子少保致仕卒甘肅通志卷三十六
