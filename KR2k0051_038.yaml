body:
  text: 甘肅通志卷三十八孝義三物六行膠庠訓士首重於孝純孝敦倫鄉閭矜式可以風勵世俗至於慷慨仗義崇尚亷隅敦重然諾捐資恤患道不拾遺甘雖邊徼民風淳厚亦時見焉志孝義臨洮府魏辛穆字叔宗狄道人舉茂才為雍州别駕初隨父鳳達在下邳與彭城陳敬文友善敬文弟敬武少從師遠遊久不歸敬文病臨卒以雜綾二十匹託穆與敬武穆久不得見經二十年於洛陽見敬武以綾還之封題如故厯義陽太守領戍雅有恤人之志再轉汝陽太守遇水潦人飢上表請輕租賦帝從之敕汝陽一郡聽以小絹為調除平原相徴為征羌將軍大中大夫卒於郡贈後將軍辛少雍字季和狄道人少聰頴有孝行尤為祖父紹先所愛嘗呼共食羊肝及紹先卒少雍終身不食羊肝性仁厚有禮義門內之法為時所重始為田曹參軍清正不憚强禦請托路絶時稱賢明正始中詔百官各舉所知高陽王雍及郎中李憲俱以少雍為舉首卒於給事中少雍妻王氏有德義少雍與從子懷仁兄弟同居懷仁事之甚謹閨門禮讓人無比焉士大夫以此稱之明嶽宗狄道人由舉人任江油縣知縣清苦慈明民愛而畏之去後立碑頌德歸里後為學宮置祭器二百餘舉宦中俸資及祖遺産業令子與姪均分之趙奈臨洮人㑹川伯安之孫府學生事親至孝父有疾晝夜祈禱於天父歿哀毁而卒曹邦豸臨洮人知縣俊之孫府學廩生善事父母父染疾籲天祈以身代父歿數日不食哀毁而卒遠邇以孝子稱之雍蘭狄道人郡諸生母患瘡蘭咂之母卒廬墓三年楊豸狄道人父桂戍貴州豸隨戍所竭力奉養桂歿豸扶櫬歸里母病篤豸侍湯藥衣不解帶母卒號泣幾絶舉二親合葬段鳴鶴蘭州人性至孝父疾籲天求以身代刲臂肉燔為灰和湯藥以進疾尋愈鄉人以孝重之孫堅南陽知府石恆蘭州貢生任直𨽻正定府經歷正統間父喪廬墓母失明恆籲天餂而愈人共稱焉唐泉字本清蘭州人天性孝友母蕭氏病篤嘗割股和藥飲之而愈與弟海友愛最篤後海卒每食必號哭不一載得疾亦卒嘗赴京同衛汪姓者沒於京負其骨歸葬之陳泰蘭州人與弟和極相友愛和卒遺二子曰簡曰䇿俱幼泰養育周至不啻已出陳和泰之弟天順間泰被選從征和念泰年邁且乏嗣遂請於總戎願代泰往既中流矢官司給輿以歸病十餘年鏃始潰出及卒毫無怨悔鄉士大夫咸稱之周海字克容蘭州千戶嘗師事段堅篤學好禮以古人自期居官公勤清愼戎務畢舉事親純孝母嘗病籲天求以身代妻張氏割股和藥以進母疾遂愈殷富蘭州人純篤孝友舉成化丁酉鄉試任樂平縣訓導升昌平州學正弟曰實曰安曰寧富皆勉以舉業後先俱登鄉薦後寧卒遺孤養育周至不啻已出士林重之殷實蘭州人舉成化庚子鄉試學行端毅居父喪三年不入私室丁母憂枕塊寢苫中寒疾而卒王麟字廷瑞蘭州人事繼母以孝聞成化間父用以訟繫獄遘疾幾危麟禱於天願以身代尋疾愈謫戍廣西麟代父行踰二年中瘴癘卒於戍所僕負骨歸葬於蘭士林皆稱為瘴江孤孝蕭憲字孟章蘭州人端淑純謹性至孝舉成化十三年鄉試以親老不赴㑹試後授中牟知縣未任而卒鄉人惜之李鋭字徐之蘭州人監生任四川簡州訓導性敦實好學甘貧不茍取事繼母盡孝撫育諸弟及弟之孤甚厚性行純篤有前輩風卒於官禹祥字廷珍臨洮衛人舉成化十三年鄉試任劍州知州生平亷能性至孝家嘗被火祥惟抱先人主餘悉不顧彭錠蘭州人父早卒事母盡孝嘗客於外有友卒於邸錠負骨還葬不求人知以子澤貴誥贈柱國光祿大夫張儒字為已蘭州人𢎞治乙卯舉人勤苦有志行事父母克孝事伯亦如父伯無子卒即奉養伯母於家事如母授新繁知縣未任蔣漢蘭州人天性孝敬家雖貧凡力所能者無不奉親遘時新品物親未嘗不忍入口每出飲必先置父母所用酒肉而後往人稱孝養段增字志崇蘭州人性耿介刻苦問學親歿三年不赴飲燕處家一絲粟不入私室其從妹孀居一子一女增撫愛如子鄉人賢之子續登進士仕御史李敦渭源人父早喪母撫育成立敦孝敬異常及母歿遂廬墓側朝夕拜哭萬厯二十八年直指表其門羅應誥狄道人府學生事父孝菽水必親捧起居必親扶夀八十有五卒應誥哀毁骨立既葬廬墓三年哀慕如一日劉雄蘭州人少失恃力農為養事繼母韓稱孝韓性嚴急屢被譴責愈加敬謹韓因化為慈母迄長父命與兄異爨力辭不忍乃以田園讓兄而自取敝廬至於葬舅喪焚負券鄉人最重之陳鑑蘭州人以孝聞里閈母歿哀毁踰禮不入私室者三年事師孟生極厚孟將終托孤寄金帛於鑑其後孤成立悉還所寄封識宛然鄉人咸服其義王純字原誠河州人竑仲子事父母寒暑不怠以父廕國學生修業未竟聞母疾不踰月鬚髮盡白疏乞歸養詔允之例授狄道縣丞侍疾籲天請以身代比卒悲痛三日不食哀毁踰禮旌表楊均蘭州人立心制行邁出等倫父及伯父早卒均孝事伯母及母撫姊遺孤營舅氏喪篤於恩義人所難及任重蘭州人𢎞治初庠生母卒廬墓三年有盜犯廬所欲劫衣糧重守墓號泣盜感其孝遂去王朝相狄道庠生從遊楊繼盛之門清操不茍一日市有遺金呼遺金者還之繼盛贈其門曰十兩白金輕一芥百年清操重千鈞後三世孫王汝明登第楊啓蒙狄道人萬厯中為郡推官吏時學政嚴有五廩生得罪推官欲揭以行劣命蒙録過蒙請曰五生半世寒帷休之一旦小人弗忍請之至再推官怒笞之蒙叩頭流血堅辭而出曰吾不忍以刀筆殺子孫次早推官呼蒙至曰豫因汝言五生劣狀俱焚之矣嘗聞有隂德者必大其門閭爾子孫必有登第者其子行恕果登天啓二年進士官翰林院庶吉士曹守忠蘭州人性慷慨萬厯初兩遇竒荒煮粥救饑全活甚衆又出其積粟平價出糶流離者資助還鄉貧病者施藥療治當道以義民旌之李守文蘭州人幼有至性母李氏甫二十餘孀居多疾文晝夜侍湯藥及長夜必數起視寒溫家雖貧竭力以供甘㫖母夀八十奉母五十餘年略無懈志內外以孝子稱之駱興周蘭州人幼年喪父母郭氏孀居四十餘年竭奉甘㫖曲體慈心微聞母愁戚聲伏榻婉慰竟夜不寐撫姊妹四人情義切篤肅藩旌曰母慈子孝趙重琮臨洮人指揮使掌衛事十餘年先是屯政多以常例病民琮力革舊習萬厯中捐粟千餘石賑饑存活甚衆尤通經史雅意文學每以屯政所嬴厚賔興禮士林重之屢有戰功受上賞官至鎮國將軍廖恕狄道人性至孝家貧葬母負土築墳構茅茨以廬墓者三年張行敏字公孺狄道人舉天啓辛酉鄉試淹貫六經諸子刻隂隲文以自佩嚴冬捐資煮粥人皆德之仕觀城知縣甫三月㑹李逆之變挂冠歸里天性孝友言動有法郡子弟皆矜式焉張漢俊字今房臨洮衛人舉天啓丁卯鄉試三嵗喪父其母與大母俱孀姑婦相守紡織撫孤稍長日夜悲思其父孝事母若成人肆力經史以理學自期言不妄發人不妄交人皆重之與兄漢偀同居友愛諸戚貧者代為婚嫁賑窮周乏恤孤養老望重一時以疾卒於家張旺狄道人生平積行纍仁嘗一日平旦入城拾旅人金三百五十鍰密藏僧舍候至午見二人號泣詢之二人備道遺金情事旺盡還之毫不受謝後孫萬紀登進士袁應舉臨洮人幼讀孝經小學心佩之事親色養父母亡合葬之廬墓三年朝夕悲號不入家門日手作三坯及三年成大冢後生孫玠博碩宏通為時大儒所著有臥雪集六卷傳於世李一桂臨洮人郡庠生性純孝天啓中父柱材授靖邊學正升四川渠縣令未赴任卒桂奔喪扶櫬中途被劫資斧一空時值隆冬雨雪桂鬻身衣覔人同已輿櫬及衣盡乃抱柩號泣仆地適上官經過捐給路費始得扶柩歸葬皇清喬漢儒渭源人庠生家貧父早亡母侯氏儒躬耕侍養誠敬不衰及沒後膝行搬土成墳廬墓三載吳成德河州人初喪父哀毁骨立葬之日即廬墓以母故朝侍母夜廬墓周年始歸母沒既葬廬墓三年酒肉未嘗入口人歎以為難朱祚長字敬符金縣人三嵗喪父祖父母撫之勤學勵志祖國弼任河南河內縣丞卒於任聞訃哭死復蘇事祖母純孝㑹土冦破城欲殺其祖母長挺身願代賊感其誠兩釋之張經綸狄道人素精醫術與郡人許虎臣為莫逆交未幾臣夫婦俱亡遺孤幼家且貧綸禮葬臣憐其孤曰余與臣善若子即余子也納諸家撫育如巳出比長就外傅尋以女妻之傳以醫術與巳子平分其産郡人皆高其義劉煥然字文甫金縣人庠生為人清潔寡欲貧淡自甘順治七年拾銀百兩俄而縣役李通本呼號尋覔不獲蓋遺失領解餉銀也煥然還之鞏昌府宋程俊㑹州人紹興初居栗亭之泥陽鎮俊幼時父母陷於夏常號泣自毁逮長捐家財數十萬以贖未至日北向號泣寢食俱廢夏人感動還其母邵氏俊日夕承順奉養周至又事族兄恭謹撫諸弟友愛贍母黨百餘口服食器用必與已同鄉里稱至孝元劉文德安定人父病三閲月朝夕侍湯藥恭敬弗懈父卒葬廬墓三年五辛不入口時有白兔異草之瑞有司舉為孝亷授鞏昌衛經歷明曹敬德親沒廬墓三年康堯寧遠人宣德年民飢堯輸粟千石有司以聞敕賜冠帶至今號萬石康家成勳隴西生員親沒廬墓三年張世昌隴西人父母沒前後廬墓六年關世安隴西生員父玘年八十餘卒世安哀毁幾絶既葬廬於墓側日績毛線自給偶值兵變鄉民驚逃世安墓居自若致白鼠群烏之異張世恩安定人父母謫戍海南客死數萬里外世恩朝夕號泣幾至殞絶乃盡鬻産業竟航海扶櫬而歸張宗讓鞏昌衛人幼孝得一味不奉親不入口及長闔家遘疫父母兄弟皆死號泣尸側治喪而疫不染有子七人亦能孝邢自明鞏昌衛人母卒負土築墳廬於墓側三年書夜號泣形銷骨立石友瑢安定人輕財重義每嵗荒粥以賑飢棺以葬亡邑人頌之成化間大飢瑢輸粟千石及豐都御史馬文升令民償粟瑢不肯受文升義之表授正七品冠帶孫璜大名府教授素有孝行邑令榜其閭曰世孝義之門徐徹隴西人平遙縣令諸生時事親色養備至不求人知嘉靖甲子將赴省試宿於逆旅主者曰君非隴西徐徹乎對曰然主者曰吾早起聞空中人語隴西徐徹以孝中今科四十二名榜發果如其言魏文曇寧遠人成化間隴右饑文曇輸粟二千石有司聞於上敕賜七品冠帶漆金伏羌人天性至孝母張氏病卒金哀毁踰禮既葬廬墓三年號泣如一日有玉兔白狼繞眠冢上天雨雹惟墓所周圍十里不害其稼人以為孝感所致𢎞治五年旌表吳瑛靖逺衛指揮少孤母馬氏撫育成立及嗣職事母孝厯官都督俸資胥歸於母惟母分給諸弟共食一堂一日母疾醫曰人肉可療瑛遂割肉投粥母即愈官至總兵高文靖遠庠生父俊歿於陳家寒諸弟冲幼竭力事母友愛諸弟嘉靖七年赴中衛糴糧忽心惕即馳歸果母病弟武亦往河南經嵗適至三日母卒鄉人皆稱至孝所感張總靖逺人篤於好善明末大荒飢民死者不可勝計總獨捐資雇夫掘大坑各處收埋尸骸三千有餘衛人義之劉世經岷州舉人任直𨽻深澤令好古博學力行孝弟既葬親廬墓三年皇清楊純臣字衷丹漳縣人性至孝五十八嵗舉㑹試第五事母備極色養侍側不忍逺離母亡哀痛時年已六十二嵗每出入必拜母主既葬始筮仕青城令清纍年賠苦蠲無藝之征釋舊令之羈輸資米立義倉善政種種告老歸青人扳轅號泣觀者歎息年八十一正襟危坐而逝周祚寧遠人嵗貢生明末甲申之變邑諸生溫元春等倡義不成死於是賊謂寧逺皆頑民將屠之衆訩懼計無所出祚曰舉事不成死自其分貽禍桑梓使一邑無噍類可乎吾固不惜七尺軀以請一邑之命獨往賊營見僞侯袁某百端開譬始免一邑於難邑人頌之周之正寧逺人庠生家貧力學以行誼孚鄉里旦日出行官道見遺囊拾之至家視之中皆白金及銀器私念此必官府遺物即持物尾至縣果某官差役所遺已妄訴無辜刑訊不服正即出其囊曰此非遺物耶令大喜詰其人叩頭服罪實不知遺所妄意衆人以自解耳令于是具始末及正素行請於上官表其閭且置義田若干畝以旌之吳元孝靖逺人家貧一日偶見道有小包拆視之乃黃金一兩九錢候至晚不見有覔者次日潛至南街布店見失金者與店客相爭元孝詢其故果所拾物罄數付還衆論稱之平凉府明馬襄靜寧州人永樂八年入貢任魏縣丞性至孝凜遵庭訓每事必告值父疾躬侍湯藥夜不安寢父疾尋愈與母皆八十餘終襄哀毁骨立幾不欲生廬墓三年猶孺子號德孚於人久而無間人皆稱道不置云桑桂平凉人成化間舉人授大名府通判亷靜好古重風教酌定禮儀鄉人踵行初母宋氏疾篤籲天割股疾愈後在京師父卒於家終身悲號追思想像以祀之人咸稱其孝趙玉平凉人正德二年省親平谷途拾旅金二百兩還之以貢任元城霑化學博實心課士循循善誘登科甲者十餘人子時春貴贈翰林院編修侯政平凉人監生母疾危晝夜禱天祈以身代割股和藥以進母疾愈後任濟陽知縣聞母喪悲號不食而卒常經鎮原縣庠生以孝稱於鄉親有疾侍湯藥衣不解帶者四年及卒依喪次讀禮終制未嘗出戶庭入私室嘉靖時旌其孝蒲政崇信縣學生孝友純篤廬墓三年生平足不履公門口無擇言追踪古純儒胥恭固原人父亡哭三日勺水不入口遂致疾終喪始愈事母呂氏年七十遘宿疾衆藥弗效恭齊沐籲天祈以身代刲股和藥飲之母疾愈齒更生髮反黑夀至八十七卒人以為孝感所致閭漳涇州人好古力學博通經史纍舉不第以貢入太學家居甚貧事親內外稱孝父中憲歿三年不入私室母疾衣不解帶朝夕親嘗湯藥母雖無疾每夜必數起赴寢室外察氣平息年踰六十敦行不怠雍朝相涇州人家素貧窘事母極孝盡力以供蔬水之歡母有疾弗愈朝相割股肉和羮進食而愈母沒三年守墓不茹葷嵗時追慕哀痛聞者悲之劉芳靈臺人父母合葬廬墓三年披髮頂土赤足膝行填其墓冢約五丈餘王化靈臺縣庠生素以孝聞父染重疾化嘗糞割股父疾即愈後父卒母哭失明化籲天號泣舌䑛再明及母逝與父合葬廬墓六載化盜饋食至愛弟讓産與之博施粟布以濟飢寒給藥調病捨棺殯孤時稱關西孝子姚謹獨靈臺人為人敦厚敬愼有古君子風事親竭力承歡友于兄弟産業盡讓其弟平生好善樂施人稱為孝子義士張企仁靈臺縣廩生葬親廬墓三年妻亡終不更娶以孝義旌表薛湘華亭人天性至孝母沒廬墓三年張四恩華亭人家有蓄資喜施豫不責其報萬厯中嵗饑民多殍恩白縣令願出粟五百石賑之賴以全活者甚衆事聞以尚義旌之萬邦寧靜寧人家貧力學父早逝母孀居邦寧奉養竭力母病醫藥哀號動人及卒廬墓三年高位靜寧人親疾祝於天割股以進親疾尋愈及卒廬墓三年後經旌表鄉黨稱為高孝子云董魯隆德廩生母李氏病危昏憒七日魯籲天割股合藥以進母病隨愈夀登九十人以為孝感所致王秉衡字初暘平凉人萬厯乙酉舉人仕至河間府同知性孝友嫂性嚴每怒詈令其妻跪受之兄死遺子四人皆撫訓為諸生以已産分諸姪與子適均遇諸族人及內外親無一不篤厚教子姪甚嚴遇賢士必敬禮聞人有過常正言責讓一時鄉里士人咸敬憚之張麟字天瑞靈臺人以嵗貢授榮河丞清亷奉公子病思食魚僧饋一魚給以俸米厯任六年或公出受民食必以俸給價居家執喪三年不與妻言每遇生日靜坐哀思滋味不入口適邠州遇盜劫所乘騾并行李曰此騾非鞭不行吾尚有鞭以遺汝盜驚曰必靈臺張古人也盡還所劫羅拜而去麟平日教人不倦非禮不行故邑人稱為張古人張金榜字耀吾平凉人性剛直倜儻尚義氣聞人有不平事輒挺身出為直之不避權勢以嵗貢授商州訓導州士數為强豪侵虐金榜至集諸生訓以恪守學規母干紀敗度及預外事茍有非意之侮吾為爾任無何王生某有田數十畝巨室欲之密屬州判困生生以田遺巨室求解金榜聞之力辭官判與巨室俱詣學謝讓以大義遂不奪生田李自成初陷商南殺令屠城監司檄金榜署縣事金榜掩死骨招遺民厚為撫恤請蠲田租三年舊例蠲租不蠲徭徭為縣費金榜一切貸之遷寧州學正歸陳典字五典平凉人少讀書警敏開卷即能見大義文章力追史漢不落尋常蹊徑為博士弟子員表表諸生間生有至性執親之喪臥苫食蔬終三年如一日李楹隆德人家貧負薪以供孀母明末竒荒妻一子三不令分母之食妻子餓斃奉母董氏獨生鄉人嫓美郭巨焉董俊隆德人與弟任並至孝俊以貢生授溫州府訓導歸家母喪未葬賊入城殺戮人競奔匿俊與弟還守柩前號泣不肯去賊不忍加害左旋涇州人性孝友為府掾奉孀母盡禮兄轉早卒遺二子愛踰已子祖業盡以遺之與二弟友愛無間撫弟姪成立涇人推其孝友後官遼陽經歷遷雅州判郡守范岡旌其門曹麒字文瑞華亭縣監生勤學多識邑舊事始撰縣志為人和易孝友教諸弟諸生皆有法北城土惡數潰輒徴民治之監工者因取賂剝民衆以為患舉麒督治麒使貧者負善土富者輸材木瓦石工用咸備因繕修亭堞半載完美張良金鎮原人山海衛教授有孝行親沒廬墓當道上聞旌表朱勇平凉羣牧所千户五世同居旌表其門石德贊華亭人萬厯間貢任夏縣少尹持躬清勤以義自律一監生有寃獄賂三百金求伸贊亷得其情卻其饋立為直之居家嵗饑募邑煮粥所活者衆陳篤靜寧州人萬厯間貢厯鞏昌階州學正母病痿篤左右善事母逝破産營葬手植松檜廬墓三年丁甸景樂王重福張廷弼閭朝義俱涇州人萬厯十年大饑尚義輸粟加冠帶不就甸粟二百石重福六百石廷弼二百石朝義二百石樂二百石院旌其義朱氏二孫平凉人失其名年甫垂髫往莊取租兄為賊所獲弟已潛匿聞賊欲殺兄即挺身出求以已代兄死兄亟麾弟去語賊曰願殺我請釋弟兄弟爭死不已賊并殺之皇清馬從龍固原州人嵗貢任工部屯田司主事從龍九嵗喪父事母孝母病衣不解帶母沒廬墓三年教幼弟及諸姪有成共爨讓産非公不入官署王宗鶴字聞天靜寧州人順治四年貢性孝友鶴祖遺少子于鶴叔父也方數齡祖歿飲食教誨鶴必篤敬少叔學於鶴每復書鶴必立聽不敢坐有佳肴必問少叔嘗否然後舉至成人無間性不與物競家亡驢一日䭾布入門家人欲執之鶴不可曰是將為市商纍也通庠舉優行學使欲旌之鶴固辭曰是將形劣者短也終身不入城市齒德兼優胡廷佐平凉縣人由選拔歷官淮徐兵備僉事居官多善政處鄉里敦厚和平能周人急難時府縣兩庠以拖缺錢糧被黜者七十餘人佐皆代為完納悉復其名人咸感之尹廷弼平凉縣人嵗貢生讀書刻苦性嚴正遇物少容事有不可即拂然去人有不善即正色切責之三十失偶終身不再娶人皆稱為義夫後授文縣訓導楊金玉固原州人城守營兵康熙十年拾里民糧銀二十七兩五錢還之陳大寅固原州人孝友和睦篤於本支七世同爨慶陽府明高雄慶陽衛人正統間兄通販淮鹽久絶音問雄方弱冠遍訪江淮閲數嵗始知兄為鹽徒陳景諒所殺具控江都令諒賄囑公私不得理令以利誘之曰汝兄既死盍相解和雄不從竟坐諒死得兄尸歸葬鄉人義之衡鏞慶陽衛人舉正統六年鄉試長鬚偉幹靣如冠玉力學修辭不愧前人事繼母最孝鄉黨以純德稱之凃詳慶陽衛人舉景泰間鄉試父臥病三年詳躬侍湯藥頃刻不離日夜籲天願以身代及父歿晝夜哭泣哀毁骨立勺水不下咽期日而死有司名其坊曰孝子門魏大用慶陽衛人早嵗喪父孀母臥病七年大用躬侍湯藥無時刻少懈及卒哀毁過甚哭泣至於喪明廬墓三年負土成墳在衛城西原畔三里人指為孝子墳玉良慶陽衛人良方在妊父恭逺出商販莫知所之及長貢入太學遂辭母覔父所在遍歷江淮忽夢老人曰何苦逺遊汝寧爾父在焉隨至果遇時父年八十餘不能歸良盡鬻衣裝傭輿而還時稱王孝子錢經慶陽衛人早孤事母撫弟以孝友著宗族鄉里無間言死之日自士大夫以及閭巷無弗痛悼者倪斌慶陽衛人襲指揮父病醫藥罔效每夜焚香告天願以身代割股和羮父果瘳人謂孝感所致劉英寧州人年二十八始奮志讀書晝夜不輟三載登成化甲午鄉舉秉性公直嘗出粟救荒全活甚衆以親年老朝夕奉養不仕趙璧慶陽衛右所千戶少有大節力能搏數人善騎射好讀書通春秋左傳都督仇亷器其才能拔置帳下天順間從亷出征戰於莊浪師潰亷中五矢璧以身翼蔽不去亷知其為巳遂自刎璧乃奪路而出賊莫敢追後年七十餘臨終謂其家人曰吾生平所恨未得與仇將軍復讐耳子孫勿忘吾志李恭寧州人慷慨好施成化中大饑恭捐粟千餘石賑本州及真寧民全活甚衆州守旌其義劉廷燧寧州人正德間鄉舉事親最孝及歿廬於墓側三年妻妾不使饋餉趙璋環縣人事親至孝母卒廬墓負土值大水家産漂沒恬不為意卒終三年每夜有野雉伴廬而宿人謂孝行所感嘉靖間詔旌其門楊來鳳安化人少販江淮事親以孝聞父歿年已逾七十哀痛七日不食及葬廬墓三年事母朝夕不離至白頭强為壯容娛母母夀逾九十人以老萊子擬之嘉靖間詔旌其門楊雲鳳安化人字應祥太學生為汾州吏目頗以清幹聞為人倜儻好施豫嘉靖戊子嵗大饑雲鳳與弟雛鳳設法全活頗衆丙午邊事嚴急南關居民數萬人一時爭入門有死者賊退雲鳳倡率居民請於官願捐巳資築城以為民望不期年而告成郡人賴焉己酉大水暴漲南關居人漂沒殆盡獨雲鳳一門無大小得登前樓免患人以為隂德之報趙一䕫安化庠生嘉靖己酉秋大水南關居民漂沒殆盡䕫為人所援得登岸聞母已溺復投水覔之不得俱死有子方數嵗亦同入水忽於波浪中得渡人謂孝感所致蔡蕃慶陽人為人莊雅溫厚言動循禮少有文名父病扶掖起居奉侍湯藥未嘗離側初授寧國丞有政聲以母憂復除費縣升大寧令民有去後之思歸隱於河西圃每入城市見其皓首龎眉人爭從之以為耆德歸焉康錦慶陽人世襲千户有膽略敵寇邊將至城下錦單騎往探之遇敵前鋒即短兵突擊身被數創卒能拔歸母歿哀毁骨立又念祖父陳亡三世皆寄殯各邊特匍匐輿櫬歸葬即廬墓側負土築封踰年親友以錦衰年乏嗣强之歸不從其忠孝蓋天性云閻應儒字一菴寧州人隆慶庚午經魁性至孝幼家貧茹苦攻帷志期顯親初授山西孟縣教諭歷升雲南廣西府通判所至有政聲時滇洞苗為亂應儒出竒制之克就底平致仕歸賙鄉里恤宗族年七十餘歿市巷皆為震哭李澄環縣人母病二年雙目俱盲求醫百方弗效澄自檢藥書得羊肝補目之說乃曰以羊補不若以人補以子補母是為還元其效必矣遂焚香告天刺脅割肝一片和羮以進母食之一夕病釋雙目復眀澄亦無恙人謂至孝感神呼為李割肝子杲以恩拔佐獲鹿忠蹟在獲鹿志中李棟澄之子早失怙母罹風疾百治弗效因建孫真人祠朝夕泣禱後夜夢一道人來醫病果愈荀鍧環縣人天資孝友賦性磊落不事詩書而禮義不失大節凜然嘗督修庠序每出已資以助有司重之與列鄉飲事嫂節婦周如母待姪志仁無異已出德義著鄉里張經合水人三世同居經益敦孝友且賦性慷慨年饑輸粟賑貸嵗熟貸者償之不受人目為義士曹瀛寧州庠生家貧至孝父死京邸不能舁歸徒跣負骨而還樵採奉母母疾篤泣禱潛割股和羮以進母遂愈士民公舉府州表其門王復古寧州人七嵗失怙母年二十五守節撫育稍長奉母盡孝母嘗患一頑瘡百方罔效幾危古泣禱自割股啖母旬餘大愈母年八十四董八紘寧州人貢生父歿廬墓頂土築墳後母病篤醫藥弗瘳紘籲天願以身代偶遇一僧望氣投餌母飲之吐塊如石而愈覔僧竟不知所之咸服神異督學旌其孝傅偉寧州人母久病目瞳反背貧不能延醫哭禱於神自割股肉假湯藥跪進病頓愈瞳睛如初陳志聰寧州人親歿廬墓三年手掬土成墳鄉里重之强不息安化人節孝傳家親歿廬墓於河西樊家坪負土三年未嘗少懈天啓丙寅欽賜節孝雙全碑楊維勤安化人節婦强氏子事母至孝博物洽聞經史過目終身不忘家貧廣授生徒藉束修以奉母雖身無完衣而事親必極滋味方允德環縣人庠生性至孝敦睦族黨尤尚氣節賙貧乏曽焚券百紙遇變堅守孤城死難李萃安化人廩生父病祈禱願以身代及闖賊破城力戰被執大罵賊義釋之創建義學造就邑中子弟人感其德所著有志孝圖解仇傳香真寧人中庚午鄉舉事親至孝朝夕定省四十年如一日父病五載日侍湯藥父減粒則已輟食嘗糞以驗其輕重居三年喪哀毁骨立事繼母友兄弟內外無間言楊光才寧州人事親以孝聞嘗遇失金投河者詢其數以二十金對才出已囊償之眀末嵗饑捐資賑粥全活者衆督師洪承疇餉匱才以豆二百餘石慨助王師督師義之旌其門栗有恩寧州人性長厚嘗出粟救荒不留餘資郡士大夫稱重之州守屢延鄉飲固辭不赴楊督師撫賊神一魁等恩慨以身許質於合水賊義之拱手以降當道屢旌其門朱用賢字藎齊寧州人生員孝繼母撫幼弟助人㛰葬周給貧乏嘗焚券百餘紙倡衆捐資砌南門坡成南河橋董建文昌閣勸人為善至老彌篤年八旬無疾而逝楊光柱寧州人眀末屢遇竒荒俱出粟賑貸負債貧不能償者焚其券三百餘紙鄉人德之王僖寧州人眀末大饑斗粟三兩貸粟數百石以活人不計其償閻鳴陽字文瑞寧州人博通經史善屬文孝弟謹朴親睦族黨尤好施豫賑飢恤苦罄囊橐以行其志垂老甘貧略無怨言督學使優旌其門王訪環縣人因兵馬缺糧捐米豆五十石兵丁得食大獲全勝將領官給銀二百五十兩堅辭不受有司旌其門曰義助軍糈李芳安化人李自盛家僕主既破家寄食於芳芳事之愈謹適賊有仇芳者執其主縛之且曰我得芳乃釋芳主遂毅然赴之主還芳見殺皇清穆三益真寧縣人母歿頂土築墳廬墓三年甘州府漢吳詠張掖人為護羌校尉馬賢所辟後為太尉龎參掾參賢相誣罪應死各引詠為證詠計理無兩直遂自刎死參賢慚悔自相和釋晉凉州刺史張軌祭其墓而旌其子孫元寧豬狗山丹衛人母年七十餘患風疾藥餌不效豬狗割股啖之遂愈嵗餘疾復作不能行豬狗手滌溷穢護視甚周造板輿載母夫婦共舁行田園以娛之後居喪盡禮鄉人稱之眀徐行甘州人儒學生少喪父事祖孝成化間祖卒廬墓都御史唐瑜奏請旌表其門𢎞治壬戍母病復割股啖之毛剛甘州右衛軍性至孝居喪廬於墓側有司上其事旌表其門應夀甘州後衛軍家貧竭力事親母病割股啖之後父母俱喪夀結廬墓側三年不飲酒不茹葷朝夕悲號止有一子或月一至以饋菽粟皇清馬負圖張掖人明末闖賊陷城巡撫林日瑞抗節被害一門俱殉無收殮者負圖同郡人賈大玉收日瑞並其家人尸殮之後負圖令其子天祿大玉令其子文衡為扶櫬送歸故里巡撫黃圖安大加優奬給額以旌之賈大玉見馬負圖事內馬俊昌張掖人順治初年闖寇雖平甘鎮兵餉莫給昌助銀五千兩以濟軍需總鎮旌其門曰捐金助國後逆回之叛黑城兵糧不足昌復助一月糧兵賴以安張勇時為總兵至其家深嘉慰之張育秀張掖人性至孝時年十八其父嵐年六十久病諸藥無效秀割股佐湯藥以進父病遂愈越三年父以無病端坐而逝劉子奮甘州鎮營兵路拾遺金五十兩待至次日失主至原封與之姚亷張掖人監生自幼孝心篤摰竭力事親先是母卒因父老不得遂其廬墓之志在家長齊茹素三年及父卒遂廬於墓側寢苫枕石晨夕哭奠至雍正三年冬廬墓將及三年㑹值生辰酬祭一慟得病死於墓所雍正七年具題旌表凉州府眀魯麟字玉書平番土司人官南直提督恂恂有儒將風尤重士大夫語所親曰勿為南人所笑洎致仕家居好義樂施建修學宮泮池捐助腴田百畝為宮牆補茸費值嵗荒散米麥千石周鄉黨急煮粥全活飢民甚衆人皆呼為活我魯公石韞璧字德輝古浪縣人𢎞治時廬庶母邸氏喪於西山下孤守三載猛虎入園者數並未嘗遇害人皆駭異以為孝感所致有碑勒孝行載入縣志藝文內孫奉先永昌縣生員朝夕供子職盡禮父母有病輒籲禱求欲代及卒哀毁骨立及葬後廬墓三年武登雲永昌縣人父病欲食肉苦無資遂割股肉以奉父病果愈顧言平番人事母彭氏啜菽飲水極盡其歡𢎞治八年母年八十有七卒言時六十有七以號慟而歿李讓平番人性孝友與弟訓甚歡愛訓卒每時號哭父喪廬墓三年年八十一卒皇清郭懷德武威貢生素以孝聞父病親嘗湯藥克盡子道及歿廬墓三年魯大誥字愼九平番土司性寬和好義嘗置義田以贍宗族焚契券以免貧纍又以郭外東南地水利不通輸金買沿途地修濬溝渠資灌溉者十餘里邑人德之張允澄武威例監居城北陳春堡置朱家莊一處價五百金允澄念窮鄉荒僻子弟多因貧寒不能學遂建義學捨其地為義田每年以所出租作束修紙筆之資鄉鄰高其義刋立碑記劉英武威人素肄醫業一日其子於路拾金白英英曰積金不如積德不可私藏須還之少頃邑庠生尹思任尋至英問其數曰八十兩慨然與之寧夏府唐侯知道程俱羅俱靈州靈武人居親喪穿壙作冢皆身執其勞鄉人助者即哭而卻之廬墳次哭泣無節知道七年不止垢塵積首率夜半傅墳踴而哭鳥獸為悲號李華作二孝贊表其行曰厥初生人有君有親孝親為子忠君為臣兆自天命降及人倫背死不義忘生不仁過及知就為之禮文至哉侯氏創巨病殷手足胼胝以成高墳夜黑颷動如臨鬼神哭無常聲逈徹蒼旻苴斬三年爾獨終身嗟嗟程生其哀也均顧後絶配瞻前無鄰眀王綗字子紋寧夏指揮綸之弟母喪廬墓足不履城郭者三年事聞宣德中旌表安廷瑞寧夏監生自始祖安禮保至千戶廷璧與廷瑞六世百口同爨家門雍肅事聞旌表茅貴寧夏人正統五年寧夏大饑都御史金濓請於朝設預備倉勸鎮人之尚義者各輸粟三百石以賑飢奉㫖旌表其門同時輸粟者有杜海朱禋焦原趙友德虞海韓寅黃銘葉榮孫俊繆顯葛謙陳祥張敬唐顒管矩吳仲名並貴十七人吳過寧夏人嘉靖庚子舉人歷任袁州府同知嘗出廩粟賑飢多所全活後聞變為母棄官官著亷眀鄉稱孝友徐勇靈州人事母孝謹母年九十有四勇自少至老凡飲食起居未嘗刻離鄉黨稱之遭劉東暘之變率守孤城兩獻俘馘趙諴靈州人奉繼母孝母歿朝夕哭奠齊戒三年如一日李雲寧夏人父兄罹哱劉之害最慘雲以遺腹子賴母氏苦節鞠成升左參將奉母盡孝居官盡職尤熟練屯政致仕後當事委重挑濬渠工萬人重寧夏人眀季道拾鏹三十兩係旗甲張加義完官租之銀人重悉以付之明三畏寧夏人明末輸粟三百石以助兵餉陳謨萬厯間中衛庠生與西安客孫尚義友善孫病故遺子尚幼謨撫之如已子孫子長將回籍謨舉其父所寄銀百兩米百餘石付之錙銖不染皇清鄭興基後衛花馬池人為後衛弟子員值年荒其父為虜掠去興基詢知父在板城隻身徒步趨父所板城在北口外道經山西時晉省大旱人相食興基奮不顧身決意長往尋至殺虎口得達板城父子相見抱持大哭見者俱感動有喇嘛僧憐其孝贈馬二匹銀十兩衣二襲令其歸興基遂奉父旋里馮爾暉寧夏人順治丁酉副榜孝事節母王氏母終爾暉廬墓三年馬中驊寧夏等衛學生至性過人嗜先儒語録每日正襟默誦親喪廬墓三年鎮人稱之嶽應孝咸陽人寄居中衛椎魯願謹素貿布有資數百金人貸輒與或不償亦不往索夫婦織毛資生少有所積猶濟貧不已鎮靖堡被賊陷有王氏老嫗無所依應孝迎養于家貧者生子不育棄於野犬囓之血淋漓尚未死孝見而抱歸覔婦乳之長成臀足囓㾗猶在也有賣兒於他鄉者母子號泣不忍離孝與原值贖歸道拾金持白於市三日未得其人歸納之罐中越數日有踵門哀求者質其數符還之其行如此周調元後衛庠生年十四為流賊所掠置營中賊復掠得子女數十閉之空室令調元守之調元放之而身亦乘間脫歸事親誠孝寓館中有竊其衣物者知而弗言康熙三十年西安饑有馮畫者出外其妻為父所鬻一日相遇夫妻對泣不忍捨調元出銀贖歸之西寧府明張文學字元素西寧人成化間以嵗貢選山西隰州吏目為官清亷有政聲居家長厚推誠待人藹然有古君子風張萊西寧人國學生性篤孝友父母有疾晝夜侍湯藥不一入私室居家以寬持身以儉處里閈以恕以子問仁貴屢封山東按察司僉事皇清柴自建西寧人年三十妻鄧氏故遺子宗續甫二嵗别無婢媵誓不再娶躬親菽水茹檗訓子歷四十六載賀增夀西寧永安堡人豪俠好義和睦宗黨周急濟貧人多德之雍正元年逆夷羅卜藏丹津冦北川官兵赴討時天氣嚴寒增夀以皮衣三百餘件散給守禦兵丁又捐大布二百餘匹縫袋盛土置之城闉蔽賊矢鏃兵有所恃城得保全楊永華西寧人賦性仁厚樂善好施夏捨鎌鏟冬捨衣袴康熙四十一年嵗饑道有餓殍華煮粥醫藥毫無倦色於無主尸骸捨棺收葬以千計市井中有貧不能葬者捐資瘞於所置義冢凡㛰喪乞貸者應之並不取償夀至七十一嵗端坐而逝其子太學生志遠亦克繼父志馬雲龍字御霄寧邑太學生性篤孝友五世同居相睦無間言且輕財重義樂善好施每春耕時散種於鄉貧者不取值康熙四十一年嵗饑米價騰貴龍盡出所積以濟貧乏賴以全活者不可數計設家孰延師以課宗族子弟遇有差徭龍獨任之不使纍及鄉鄰見人鬭訟諭以情理曉以利害排難解紛必不使爭訟鄉人重之直𨽻秦州元畢也速答婁穆爾氏元時家秦州父喪廬墓次晝夜悲號有飛鳥翔集墳土踴起之瑞明王英秦州衛軍少孤事母孝母卒英廬墓所跣足負土者三年時暴雨害稼墓側禾稼無損有司上其事旌表其閭謝繼昭秦州人父卒繼昭廬於墓哀慟悲號三年如一日乃有馴鹿産芝之異有司以聞詔旌其閭夏時字尚寅秦州禮縣庠生事母孝母卒既葬遂不問家事獨廬墓側穴寢匏食僕供薪水者亦不許入墓所每雞鳴戴土於斗跪敷於冢冢大如屋初葬鳩傍穴為巢將禫兔孕於穴人以為誠孝之感州守表章其事後以貢授敘州府照磨丁儀秦安人父泰官知事歸儀日侍左右父嬰疾醫藥無效儀惶懼求代乃號泣於天百拜以禱因割左股以進父疾愈張之矩秦州人參政潛子嘉靖癸未舉於鄉卒業國學歸省夢母病兼程抵家母病延醫衣不解帶禱天以身代母歿哀毁踰禮既葬冬夏不扇不爐雪夜伏墓而泣墓所有烏鳥群集泉水湧出之異潘𢎞秦州人成化間隴右饑𢎞輸粟千石有司聞於上敕賜冠帶孫居業秦安人幼失母事父孝敬備至廬墓三年奉文旌表安期晟秦安廩生賊陷城以身護母被賊殺害蔡廷棟秦安人明末竒荒罄家所有得粟百石輸官賑飢事聞詔旌以仁人立達錫命冠帶雍周清水人有才略善經營白手致萬金賑困救急扶助才俊之士著名隴右嘗行遊天下訪交賢善惟以惠施廣濟為務貧者至折券雖千金不顧巡方使聞其賢欲表以官固辭不願令畫工繪其貌持以厲俗及其歿也萬金巳罄家貧自若項謙清水學生少喪父事母至孝母疾謙割股啖之母終廬墓三年旌表張孔教清水庠生父喪明母多疾孔教侍左右未嘗少離及卒廬墓三年雍浹宮清水庠生事親至孝及卒廬墓三年鄉人稱揚邑令旌表康天保清水庠生居弓門寨賊尅其堡以威脅之使從大罵不屈死兵巡副使為建凜有生氣坊馬班才清水書生居代家堡强健有力善騎射賊破其堡欲脅以從痛罵不屈賊怒縛于樹樹為之拔亂矢射之至死罵不絶口丘陵清水圬者為賊所獲逼之攻城罵曰要殺便殺我不攻我城賊殺於城下趙一岩禮縣人以選貢赴監監期止少一日聞母訃人勸次日舉哀監事滿矣一岩不從歸廬墓三年一方推重後仕絳縣主簿馬根學禮縣人流賊作亂獲其父應勛將殺之根學泣告曰請以身代賊從其言竟殺之任希䕫徽州人正德辛未流賊劫掠城幾陷希䕫獨呼鄰人陳鸞等登城與賊戰竟日殺傷甚多賊幾退中流矢死御史以聞命下旌表梁基恩陳邦登俱徽州義勇明末率兵逐賊至白水江衝破敵鋒多所克捷後深入重地遂被害憤罵不絶有司旌其門曰真男子楊其昌何養德俱徽州武生流賊犯境率義勇何獻祥等戰於銀杏鋪賊大至圍之血戰愈厲矢盡被害有司表之皇清梁必擢秦州人家傳孝謹五世同居時人以方張公藝必擢亡妻陳氏主家五十餘年長幼百口咸相敬愛無間言吳殿契秦州人性長厚時鄉民劉𢎞失銀契拾還之一夕聞穿壁聲意必某為盜也因呼曰天寒胡為此或饑餒莫支明朝來資汝汝去我不汝泄嗣出城晚歸遇劫者數人于道一人前急止之曰吾恩人也毋相逼且拜謝不泄恩因諭其人勿復為盜兼給以資其人感悟卒為善類直𨽻階州明張文貴文縣人洪武初補百戶張嚞因逼亂挾為謀主不從與弟文富同被害弟文才隂與居民馬桑者軍人巨伍兒倡率土人捕嚞亂遂平洪武二十八年以功升千戶卯應辰階州人垂髫知孝母杜氏卒哀毁踰常廬墓三年飲食服用皆純素每食必涕泣嘉靖間御史臺遣使慰問旌其閭喬挺成縣庠生性至孝總角時即知定省鄉人譽之父母既歿泣血骨立三年不出戶窺園既葬廬墓每日負土積冢時有白兔繞其塋有司聞於上賜之冠帶邑皆以孝子稱之李晉文縣貢生任宜陽主簿事孀母以孝聞及終哀毁過情祭葬如禮三奏闕下告陳親節得建坊旌表人稱其孝子思忠性亦純孝途聞母訃一慟幾絶水漿不入口者七日哀毁骨立三年如一日以此抱恨終天朝夕不離父側依戀如嬰兒人稱有父風楊忠文縣人其父為賊所執挺身赴救父得脫忠遂為賊所臠殺李碩馥文縣人性至孝父死三年不出户庭斷酒葷哀毁如一日事母備盡孝養舉德行蘇藩成縣人年甫三十妻亡不再娶或勸之藩曰娶妻為後也業有子矣復娶何為孑身居室四十餘載非禮不行教子課孫一堂五代鄉族稱為義夫公舉鄉飲各官旌奬免其雜徭夀九十三嵗魏瞻階州人家貧鬻販以養親親所欲必竭力奉之親歿廬墓三年未嘗返室徐應麟階州人貢於鄉以孝聞父母亡哭泣躃踊水漿不入口者數日葬廬墓三年蔬食飲水奉㫖旌曰榮旌實孝李自英翟化鵬俱階州生員明末李賊陷階州罵賊被害同時死者有貢生趙維新李桂枝徐養氣劉顯名茍大魁五人生員則有趙兹祚馬大亨司寧汪得溥孫振業蘇民泰楊州牧郝升高馬呈圖郝升遠劉應龍董國士司儋趙人龍趙思賢巨卿徐景思徐景曽徐景孟凌熙秦冦來源趙朱正趙州牧賈邦偉蹇恆濟邢必動二十六人王賢階州人年十五喪父事母以孝聞家貧棄儒商吳楚間纍致千金性豪俠喜施豫有貸資貧不能償者即焚其券里中搆訟遇賢輒解人高其義葉見陽文縣布衣家徒四壁安分無營循循雅飭古貌古心屢舉鄉耆不受享年百嵗權本時成縣國子生任東平州判轉經歷回籍遇賊陷城力抗不屈賊誘之降大罵不休賊怒遂亂鞭而死丘維嵩成縣嵗貢賊破城力敵不勝而死武述文文縣廩生流賊攻縣甚急邑人奔逃文混出城外傍視無母輒泣臥地旋挺身入賊夥扶母而出賊逼之罵賊不屈母得全述文被殺李元朴成縣人舉癸酉鄉試七年城陷朴與其父廩生華國俱被繫父子抗罵不屈賊滅其家直𨽻肅州唐薛萬備居母喪廬墓太宗表其門仕至左衛將軍明芮攀龍肅州衛人父承誨早逝龍奉母至孝朝夕起居未嘗離側孺慕之誠有如一日顔秩肅州衛人年三十嵗妻亡誓不再娶處家有序教子有方鄉人稱為義夫顔希孔秩之孫幼凜家訓奉祖三十餘年未嘗少忤鄉人稱為順孫甘肅通志卷三十八
