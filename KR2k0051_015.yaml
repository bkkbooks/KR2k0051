body:
  text: 甘肅通志卷十五水利畎澮時濬土多沃壤川源既滌畝盡膏腴相其流泉度其原隰因地之宜順水之性修復渠堰節宣蓄泄俾灌溉有資農事首務志水利臨洮府洮河渠新渠在狄道縣北六十里雍正三年新開灌新店子田一百頃北流二十里至古城兒灌田二百頃又北安家河李家灣水溝靈石寺八哈斯一帶俱開渠灌溉三岔河在狄道縣西北十里自河州界流至野門口灌田百餘頃栁林溝水在狄道縣北四十里由七十里至好水溝入洮河灌地一頃餘牛頭溝水在狄道縣北六十里至朱家溝灌田三十頃唐古泉在狄道縣南二十五里由清水渠至番城灌田二百餘頃阿干河在蘭州西南四十里源出馬銜山自分水嶺分為二南流金縣為浩亹水北流蘭州經阿干峪為阿干河由龍尾山麓分一渠灌州東南北田園並入城內由古峯山麓分一渠灌州西田園五泉水在蘭州南臯蘭山下有泉五眼泉流成溪至南園灌田二十餘頃黃峪溝水在蘭州西七里筍羅溝在州西南六里大小金溝在州西二十里東栁溝在州東三十里西栁溝在州西五十里以上五水俱資灌溉共計三百餘頃萬眼泉在州東北三十里沿河諸山巖間湧泉甚多可資灌溉黃河水在蘭州城北橫流東西兩灘為翻車導引灌田自州人段續始大峽河在金縣西南源出馬銜山至馬家溝分流夾城南曰浩亹北曰神濟兩河可灌田一十餘頃龕峪河在金縣南十五里北入浩亹河可灌田三頃餘官溝水在金縣南分馬家溝水由長川入城可灌田園新添溝水在金縣南分馬家溝水灌大峽口田地大夏河在河州南國朝康熙六年郡人自西古城引大夏水至十里屯三十里開渠灌田無數年久廢壞康熙四十三年監督同知郭朝佐知州王全臣重修並引水入城居民利便洪水河在河州南頗資灌溉老鴉山口水在河州西自土門關口至九眼泉有古渠明成化癸卯守備康永設具編次人户輪流灌溉開壩百五十里灌田千頃田間水道周流不息民咸利焉年久湮廢隆慶四年參將張翼知州聶守中開渠疏通上下百十里兩岸共植木二千本後渠壩衝壞萬厯壬寅知州陳文焯新開長渠自焦家壩入九眼泉三十里灌溉如故漫灣水渠在河州西南明永樂間都督劉釗創開知州陳文焯重修灌田百餘頃鞏昌府渭水在隴西縣北宋熙寧八年秦鳯提點鄭民憲自通遠軍熟羊寨導渭河至軍溉田引流入城分東西南北四池以資汲取又有頭渠在縣西十五里引渭水至下中川澆圃轉磨二渠在縣西教場西引渭水至下川澆圃轉磨三渠在縣西三里嶽家墩引渭水至城東角澆圃轉磨上下四十里皆引渭灌溉下流仍入渭永利渠在縣西三十里明萬𩔶間開引科羊河水入府城以資汲取為民永利粟水在縣東南由南門引入城以給民用西河在安定縣西南六十五里源出甸子川東北流繞城西又東會於東河東河味苦亦曰苦水西河味甘亦曰甘水二水交流東西二十里南北三十里其間通渠流水以資灌溉物産繁甚實為民利得羅川在安定縣西南二十里土脈肥饒灌田千畝甜水河在通渭縣七里引流入城歲久湮塞明嘉靖中築堤數十丈復引入城由西北出灌溉取汲至今民賴其利錦雞峽水在通渭縣西二十里可資灌溉龍尾溝水在通渭縣南十里可以溉田華川在通渭縣西八十里四圍平坦草茂水清明置安定苑於此為牧圉之所𨽻苑馬寺漳河在漳縣南自三岔引水通渠灌田三十里壤泉在會寧縣北四十二里又有紅栁泉在會寧縣北二百里皆可灌溉米家峽河在會寧縣南六十里岔河在縣南松樹岔河在縣東三十里響河在縣東一百里四水味甘居民資以灌汲通濟渠在伏羌縣西一十里自延泉鋪引渭水穿城至東川復入於渭東西灌地四十餘里又於城內修官磨一輪官民便之陸田渠在伏羌縣西二十里引渭水至邑北安元川灌地二十餘里以上二渠俱明知縣王珣創開廣濟渠在伏羌縣西中川十五里引水至邑南黃羊堡灌地二十餘里惠民渠在伏羌縣西引朱圉河至邑東石人川灌地三十餘里明知縣王從善開寧遠縣東路紅峪溝舊水渠灌田二里廟峪溝水渠灌田三里野南溝舊水渠灌田三里新渠一道灌田三里樂善河渠灌田十五里龍泉堡水泉渠灌田三里渭水舊渠灌田五里䃰石川大佛峽舊渠灌田三里䃰石川新渠灌田二十里屈家橋渭水新渠灌田五里木林峽新山水渠灌田二里髙橋鋪渭水新渠灌田二十里蓼川鋪河新水渠灌田五里按縣志寧遠縣東路舊有十三渠今縣東南川渭水通渠自城東北祭祀壇入渠經廟峪河灘陳家門紅溝鄧家川等處至髙橋鋪共灌二十里濶三二里不等是舊志十三渠所稱紅峪廟峪渭水屈家髙橋五渠實止一渠也或當時隨地開濬其後引而通之耳寧遠縣西路脫篆川渠灌田五里大人溝渠灌田五里遮陽口渠灌田五里魯寺觀渠灌田六里湫子坪泉渠磨渠灌田五里盤谷川渠灌田五里硤龍坪山水渠灌田五里納泥古迹山水小渠灌田五里磨石峪古迹山水小渠灌田五里鴛鴦鋪舊唐渠灌田五里廣吳鋪渠灌田三里山丹鋪渠灌田十里坡崙溝山渠灌田二里杜家馬鬃河新水渠灌田五十里右寧逺縣西路十四渠按縣志明萬厯間知縣鄒浩東路開五渠西路開二渠餘失考桃花峽水在寧遠縣北五里見資灌溉古流泉水一在寧遠縣東一里山畔石中瀉出為瀉泉一在縣西南百步平地湧出為湧泉俱引流北注渭水資民灌汲九龍泉在西和縣西北居民引以灌溉官泉去縣百步許亦資灌汲之用黃河在靖遠縣城北一里沿河上下多製水車開渠引水以資灌溉黃河堰在靖逺縣北唐刺史安敬忠築以捍河流小水在靖遠縣達喇齊堡西南五里屈吳山麓溉田十餘頃瓦窑水在靖遠縣達喇齊堡南三里引渠資灌西泉在靖遠縣達喇齊堡西一里注則