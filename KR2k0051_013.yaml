body:
  text: 甘肅通志巻十三貢賦甘屬山多土瘠地氣早寒自明季遭流冦蹂躪民生凋敝我朝休養生息元氣已復近更濬渠招種田野日闢民力日裕生齒繁盛庶而且富昔日邊徼今臻上理矣志貢賦一民田臨鞏平慶四府直𨽻秦階二州屬原額各等共地二十五萬三千九百四頃四十𤱔五分四釐四毫三絲三忽六微内安化真寜二縣原額大𤱔地六千四百五頃五十𤱔三分八釐八毫據慶陽府冊報以大𤱔折小𤱔地二萬三千九百四十六頃五𤱔八釐九毫六絲九忽又合水縣照糧起科地四千五百九十二頃八十二𤱔四分通共地二十七萬六千三十七頃七十七𤱔六分四釐六毫二忽六微内除奉㫖豁免過荒地一十六萬七千八百五十五頃五十八𤱔二分六釐四毫八絲九忽四微二纎八塵七𣺌實熟共地一十萬八千一百八十二頃一十九𤱔三分八釐一毫一絲三忽一微七纎一塵三𣺌内除階州等處歸併西固等廳州縣地六百一十頃七十三𤱔九分七毫九絲六忽三微九纎在於後開接収歸併登造外止該實熟并漳縣接収岷州歸併共地一十萬七千五百七十一頃四十五𤱔四分七釐三毫一絲六忽七微八纎一塵三𣺌又首報隠匿地一百四十一頃六十八𤱔四分八釐七毫二項共地一十萬七千七百一十三頃一十三𤱔九分六釐一絲六忽七微八纎一塵三𣺌實徴本折共糧一十七萬八千二百三十四石六斗二升一合九抄七撮一圭六粟二粒四顆内本色糧二萬四千三百七十石三斗三升一合一勺二抄一圭二粟九粒六顆内起運糧一萬九千四百一十石六斗六升三合一勺一抄三撮七粟三粒存留糧四千九百五十九石六斗六升八合七撮五粟六粒六顆實徴民糧折色并均徭停免協濟共銀二十萬二十七兩三錢一分一釐六毫二絲九微四纎七𣺌六漠外遇閏加銀一千四百六十一兩六錢五分三釐八絲二忽二微五纎三塵五𣺌三漠原額實活俱折下下丁二十九萬八千一百九十六丁内除歸併各屬接管丁二千六百七十丁半在於後開接収歸併登造外止該丁二十九萬五千五百二十五丁半奉文以糧載丁共載丁銀三萬五千五百三十九兩三錢一分四釐八毫九絲九忽九微二塵三𣺌九漠外遇閏加銀一千六百三十二兩三錢四分六釐八毫六絲四忽一微一纎六塵一𣺌一漠盛世滋生永不加賦丁七千四百一十丁額外課程地税匠價年例盤纒料價丁站農桑共銀二千六十六兩一錢五分三釐四毫外遇閏加銀一百三十二兩六錢一分一釐八毫六絲六忽六微一纎九塵九𣺌額解岷山驛站銀一百八十七兩四錢八分一釐額解裁府朝覲造冊路費銀七十一兩三錢三分三釐四毫續增崆峒山糧銀二十八兩五錢七分六釐三毫二絲九忽六纎一塵三𣺌河濵棄土糧折銀二十一兩五錢二分二釐一毫三絲七微以上額内額外連閏并朝覲共銀二十四萬一千一百六十八兩三錢四釐五毫九絲三忽五微九纎三塵九𣺌九漠内除寜州在於望減無路等事案内奉㫖豁減過重賦銀一萬二千六百四十八兩七錢四分八釐八毫八絲九忽八微二纎一塵一𣺌止該銀二十二萬八千五百一十九兩五錢五分五釐七毫三忽七微七纎二塵八𣺌九漠内起運銀一十五萬四百五十一兩三錢五分九釐九絲四忽四微七纎五塵六𣺌八漠應該存留銀七萬八千三百三十七兩九錢六分一釐一毫五絲四忽五微七纎九塵八𣺌今止存留銀七萬七千八百八十兩一錢三分一釐六毫七絲一忽七微七纎四塵一𣺌一漠尚該存留不敷銀四百五十七兩八錢二分九釐四毫八絲二忽八微五塵六𣺌九漠奉文在於接管屯衛起運銀内留抵支食解藥脚價盤纒藥材折價茜草鋪墊等銀一百三十七兩九錢六分六釐四毫七絲七忽七微六纎一塵八𣺌續增崆峒山起運糧銀二十八兩五錢七分六釐三毫二絲九忽六纎一塵三𣺌河濱棄土糧折起運銀二十一兩五錢二分二釐一毫三絲七微溢額起運糧二百五十六石六斗六升六合六勺六抄六撮六圭八粟額徴本色起運草二千一百四十四束一斤三兩九錢七分四釐八毫六絲四忽六微九塵一𣺌八漠存留草一千束額外開墾河濱棄土地五十一頃八十六𤱔三分八毫實徴本色起運糧二十六石二斗六升三合八抄臨鞏二府秦階二州屬接収各州縣實熟地六百一十頃七十三𤱔九分七毫九絲六忽三微九纎又河州接収寜河里溢額地四頃九𤱔二項共地六百一十四頃八十二𤱔九分七毫九絲六忽三微九纎實徴本色起運糧二百五十四石二斗五升九合一勺七抄一撮一圭六粟三粒五顆實徴折色并均徭共銀二千一十三兩一錢四分九釐二絲六忽六微一纎四塵八𣺌五漠民丁二千六百七十丁半奉文以糧載丁銀三百七十七兩七錢四分二釐九毫六絲八忽八微二纎四塵八𣺌外遇閏加銀四十五兩二錢九分七釐七絲四忽五微五纎九塵四𣺌一漠以上地丁二項連閏起運共銀二千四百三十六兩一錢八分九釐六絲九忽九微九纎九塵六漠一監牧鞏平二府屬接収開城等七監原額牧馬草場共地一十七萬七千一百六十一頃六十二𤱔二分八釐六毫内除不堪耕種地一十四萬四百六十頃一十一𤱔二分六釐四毫止供芻牧不堪徴銀外堪種荒熟山坡地三萬六千七百一頃五十一𤱔二釐二毫安定廣寜二監於不堪耕種草場内設苑學學租并開墾共地五十頃七十六𤱔一分二項荒熟山坡共地三萬六千七百五十二頃二十七𤱔一分二釐二毫内除奉㫖豁免過實荒共地二萬六千二百八十頃六十𤱔二分九釐四毫實熟共地一萬四百七十一頃六十六𤱔八分二釐八毫實徴折色并均徭共銀六千二百八十三兩九毫六絲八忽原額實活牧丁五千五十四丁奉文以糧載丁共載丁銀一千五十三兩六錢七分七釐五毫五絲二忽三微六纎外遇閏加銀三十八兩四錢一分八釐一毫七絲六忽七微四纎八塵八𣺌盛世滋生永不加賦丁二百九十二丁額外監課程并開墾地租糧折銀二十五兩二錢八分二釐一毫三絲七微以上額内額外起運連閏共銀七千四百兩三錢七分八釐八毫二絲七忽八微八塵八𣺌一屯田臨鞏平慶四府秦階二州屬接収各衛所並沙井保安二堡原額共地四萬九千二百三頃四十五𤱔八分九釐六毫九絲一忽七微又水地一千六百二十塊旱地四百六十三塊内除荒地二萬七千二百一十三頃三十一𤱔四分七釐三絲九忽四微六纎六塵六𣺌七漠實熟地二萬一千九百九十頃一十四𤱔四分二釐六毫五絲二忽二微三纎三塵三𣺌三漠又水地一千六百二十塊旱地四百六十三塊又額外地一千一百三十三頃七十二𤱔八分五釐八毫實徴本色起運糧一十萬五千八百二十三石九斗七升六合一抄五撮七圭九粟六粒三顆實徴本色起運草二萬五千七百二十二束二十九斤三十四兩四錢一分八釐一絲四忽三微五纎三塵四𣺌實徴地𤱔地租均徭公條草價九釐等項共銀六千二百兩七錢七分一釐二毫九絲四忽一微八纎九塵八𣺌屯丁三萬九千二百五十八丁番民九百九十户奉文以糧載丁銀一萬八千五百一十兩一錢七分三釐一毫三絲七忽九纎一𣺌六漠外遇閏加銀八百八十一兩一錢八分五釐三毫九絲一忽二微六纎六塵九𣺌五漠以上地丁二項連閏共銀二萬五千五百九十二兩一錢二分九釐八毫二絲二忽五微四纎六塵九𣺌一漠額外屯租銀八兩以上額内額外共銀二萬五千六百兩一錢二分九釐八毫二絲二忽五微四纎六塵九𣺌一漠内起運銀二萬四千七百九十五兩八錢一分六釐六毫六絲四忽二微九纎一塵五𣺌二漠存留銀八百四兩三錢一分三釐一毫五絲八忽二微五纎五塵三𣺌九漠甘凉寜西四府直𨽻肅州安靖二㕔屬原額屯科秋站并新墾共地六萬八千七百八十三頃五十五𤱔七分六釐二毫三絲三忽四微内除荒免徴地五千八百六十八頃六十一𤱔七分九釐三毫二絲九忽又除沙井驛歸併蘭州旱地四十頃一十八𤱔一分九釐六毫又除鎮番改歸武威地五頃八十六𤱔九分七釐四毫八絲二忽實熟并新墾共地六萬二千八百六十八頃八十八𤱔七分九釐八毫二絲二忽四微一収鎮番歸并武威地五頃八十六𤱔九分七釐四毫八絲二忽二項共實熟地六萬二千八百七十四頃七十五𤱔七分七釐三毫四忽四微又水磨二盤實徴墾軍并地𤱔折色銀五千五百兩九錢七分二釐七毫八絲六忽六微一纎實活屯丁二萬一千八百五十六丁九分三釐盛世滋生永不加賦丁五萬九千九百四十八丁奉文以糧載丁共載丁銀三千二百三兩八錢四分二釐五絲六忽二微六纎二塵四𣺌二項共實徴銀八千七百四兩八錢一分三釐八毫四絲二忽八微七纎二塵四𣺌内起運銀六千六十二兩一錢九分七釐九毫九絲二忽八微七纎二塵四𣺌存留銀二千六百四十二兩六錢一分五釐八毫五絲實徴倉斗起運本色正糧三十三萬六千一百三十五石八升七合七勺一抄六圭二粟三粒實徴京斗起運本色正糧七百八十八石七斗五升五合三勺九抄八撮實徴倉斗起運本色馬糧九千八百六十九石九斗二升四合六勺二抄三撮四圭七粟二粒實徴京斗起運本色馬糧三十九石四斗三升七合七勺六抄九撮九圭實徴倉斗存留本色糧八百四十三石六斗七升八合九勺實徴起運本色新例草四百七十四萬八千六百七十九束八分三釐二毫五絲八忽八微七纎六塵五𣺌三漠一更名並養廉臨鞏平三府并秦州屬原額共地二萬二千三百九頃五十九𤱔四分九釐一毫八忽六漠内除荒地九千四百二十八頃三十八𤱔八分九釐五毫四絲七忽又地一十一處煤硐一眼又荒田園多半處該油五百四十二斤九兩四錢實熟地一萬二千八百八十一頃二十𤱔五分九釐五毫六絲一忽六微又田園數處下地一處零少半處又無頃𤱔地六十六處六段一十八窖一百四畦煤硐六眼地基一十處民房二十八間民磨四十五輪油磨一輪磁窰一座各徴不等實徴本色省斗糧一萬一百三十五石二斗四升八合五勺七抄七撮六圭二粒内起運糧一萬八十石一斗三合七勺九抄一撮五圭九粟二粒八顆存留糧五十五石一斗四升四合七勺八抄六撮九粒二顆實徴起運本色草一百三十五束實徴折色銀八千一百一十三兩七錢三分五釐八毫六絲五微七纎五塵五𣺌六漠更名丁七千一百二十八丁盛世滋生永不加賦丁二百五十三丁奉文以糧載丁銀三千七十九兩一錢三分三釐一毫三絲二忽三微六纎一塵六𣺌五漠外遇閏加銀一百一十二兩二錢六分八釐五毫四絲二忽三微一纎七塵八𣺌五漠以上地丁二項連閏共銀一萬一千三百五兩一錢三分七釐五毫三絲五忽二微五纎五塵六漠内起運銀一萬一千九十一兩二錢一分七釐四毫七絲四忽四微五纎五塵六漠存留銀二百一十三兩九錢二分六絲八微甘凉寜三府直𨽻肅州屬原額更名并新墾共地二千一百一十八頃八十七𤱔七分三釐八毫三絲内除荒免徴并猛水衝没無存地二百八頃七十五𤱔七分二釐八毫又油房一處又除武威改歸古浪地八頃八十八𤱔六分九釐五毫實熟并新墾共地一千九百一頃二十三𤱔三分一釐五毫三絲一収武威改歸古浪地八頃八十八𤱔六分九釐五毫二項共實熟地一千九百一十頃一十二𤱔一釐三絲又水磨一十三盤園圃三處油樑一條草湖場四處實徴油樑磨税房課木植地𤱔折糧草起運共銀一千八百二十五兩一錢六分五釐四毫七絲七忽四纎實活丁八千三百三十九丁半奉文以