body:
  text: 甘肅通志進呈表太子少保文華殿大學士兼兵部尚書仍管川陜總督印務臣查郎阿吏部尚書暑川陜總督兼甘肅巡撫臣劉於義等前於雍正六年奉敕纂修甘肅通志係前任巡撫臣許容專司纂輯臣等向在肅州時許容已經付梓今剞劂告竣共成書五十卷謹奏表上進者臣查郎阿劉於義等誠惶誠恐稽首頓首上言伏以泰皇御籙即傳邱索之書軒后膺圖乃成疏仡之紀文命敷於四海而川山土物爰道其詳周官董正萬邦而風俗人民職司其要齊秦晉楚備于魯史之編雍豫徐楊載在職方所掌元和上計之簿著自唐家太平御覽之篇成於宋代蓋傳考四方之廣記乃彚成一統之全書但網羅放佚自古為難而釐定闕疑於茲匪易方輿紀載未免亥豕魯魚郡邑圖經猶多米鹽凌雜向非博識鴻才曷副盛朝巨典欽惟皇帝陛下德協清寧道隆覆載繼志述事昌明典謨訓誥之傳厚澤深仁普被南朔東西之廣惟兹甘肅逺處西偏邠邑邰鄉舊是公劉之國流沙弱水昔傳禹貢之區金城為隴右襟喉連延湟鄯玉門為關西鎖鑰控扼羌番由朔方以至敦煌長城屹峙於北自岷山以至積石大河橫貫其中祁連青海天設險以為屏疏勒伊吾地資生而作輔自漢武開疆分置涼州刺史暨唐宗闢土兼統河右諸軍禮樂文明之藪未逮中州制防形勢之規獨當三面顧自宋明以來經營措置未盡合宜惟我國家之盛創建宏模斯為盡善以至廣開屯田而邊儲有賴屢行蠲賑而百姓蒙恩科舉額數頻加則士林鼓舞學校師儒增設則文教振興衛所改為郡縣同諸內地編氓關外設鎮安西收復前朝故宇軍需殷繁而寬裕發帑民間無絲粟之勞邊烽寧息而挽運全停婦子有含哺之樂至於回夷慕化襁負來歸䇿妄輸誠欵關入貢凡此巍巍炳炳盡賴聖德神功所當灑灑洋洋勒諸玉函金版者也臣等識愧看詳學慚校勘敷藻揚輝未與編摩之役因陋就簡難辭疏略之譏惟緣雕鏤之既成謹以裝潢而恭進伏願景卿常耀雲漢時章緯地經天不止甲乙丙丁之部聲金振玉永垂商周虞夏之文則書軌偕同六合被誕敷之教享王重譯萬年昭樂利之風矣謹按通志圖考一卷星野一卷建置一卷疆域一卷山川二卷城池一卷公署一卷學校一卷關梁二卷祠祀一卷貢賦一卷兵防一卷水利一卷驛遞一卷蠲恤一卷鹽法一卷茶馬一卷物産一卷風俗一卷古迹二卷祥異一卷陵墓一卷封爵一卷職官三卷名宦三卷選舉一卷人物三卷忠節一卷孝義一卷隱逸一卷流寓一卷仙釋方伎一卷列女二卷藝文六卷雜記一卷刋刻告成臣等曷任瞻天仰聖激切屏營之至謹奉表隨進以聞乾隆元年九月初六日太子少保文華殿大學士仍管川陜總督卬務臣查郎阿吏部尚書署川陜總督兼甘肅巡撫臣劉於義謹上表欽定四庫全書史部十一甘肅通志目録地理類三都會郡縣之屬卷首凡例目録修志銜名卷一圖考卷二星野卷三建置卷四疆域附形勝卷五山川一卷六山川二卷七城池卷八公署卷九學校卷十關梁一卷十一關梁二卷十二祠祀卷十三貢賦卷十四兵防卷十五水利卷十六驛遞卷十七蠲恤卷十八鹽法附錢法卷十九茶馬卷二十物産卷二十一風俗卷二十二古迹一卷二十三古迹二卷二十四祥異卷二十五陵墓卷二十六封爵卷二十七職官一卷二十八職官二卷二十九職官三卷三十名宦一卷三十一名宦二卷三十二名宦三卷三十三選舉卷三十四人物一卷三十五人物二卷三十六人物三卷三十七忠節卷三十八孝義卷三十九隱逸卷四十流寓卷四十一仙釋方伎卷四十二列女一卷四十三列女二卷四十四藝文御製碑文諭旨卷四十五藝文奏疏卷四十六藝文賦論議頌銘卷四十七藝文記卷四十八藝文贊文序雜傳書説辨考題跋卷四十九藝文詩卷五十雜記臣等謹案甘肅通志五十卷國朝巡撫甘肅都察院右副都御史許容等監修甘肅所領八府三州明代皆𨽻於陜西布政司至本朝康熙二年始以陜西右布政司分駐鞏昌轄臨洮等府後又改為甘肅布政司增置甘涼諸郡設巡撫以蒞之於是甘肅遂别為一省雍正七年各直省奉敕纂修通志撫臣許容以甘肅與陜西昔合今分宜創立新稿而舊聞缺略案牘無存其衛所新改之州縣向無志乘尤難稽考因詳悉搜採擇其可據者依條綴集分為三十六類乾隆元年刋刻竣工文華殿大學士仍管川陜總督查郎阿等具表上之其書雖據舊時全陜志為藍本而考核訂正增加者什幾六七與舊志頗有不同其制度之係於兩省者如總督學政題名及前代之藩臬糧驛各道俱駐西安兼治全陜不能強分則亦多與陜志互見焉乾隆四十六年十二月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書甘肅通志卷首凡例一甘肅舊無志書向總於陜西通志顧陜志詳於西安延安鳳翔漢中興安諸郡而略於平鞏臨慶至河西諸衛所則尤在所略今分為二省各修通志自應詳為編緝但邉徼之地既少書籍又從前兩遭兵燹康熙十四年以前案牘焚失無存其衛所新改設之州縣則向無邑志諸事無從稽考甘志之難實倍難於他省今搜羅考訂分為三十六類列為五十卷一省志與府州縣志體裁各别州縣志書理宜詳備省志務從簡核總其大綱裁其瑣細一建置沿革各州縣志書率皆訛舛今以皇輿表為主與舊一統志相參酌仍分各府州列表於前以備查考一各府州縣疆域四至里數臨鞏平慶四府雖有舊志可稽河西衛所原屬簡略近改衛所為州縣即河東衛所亦多改歸州縣者其疆域里數俱照州縣新造之册與舊志頗有不同一田賦雖有舊額但河西衛所近改郡邑即衛所之在河東者亦多裁併所有田賦分歸州縣者其田畝賦額悉以雍正十年為凖一志內田賦兵防職官各項總扣至雍正十年以前入志一兵制莫重於西北而甘肅為尤重兩提六鎮各協星羅碁布鞏固萬年今詳查列册而以歷代兵制附紀於後一職官先列前代而後本朝先文職而後武職其文職自督撫下至直𨽻州武職自將軍提鎮至遊擊俱列名志內餘俱照例止列官制而不及姓名內有因案牘無存無憑查考者姑從闕略不敢傳疑一名宦必政績素著歷久論定者始從身後作傳或平常稱職及事實不確者槩不敢入一人物理學經濟忠節儒林循吏武功若分標名目恐涉繁瑣但於合紀之中務核生平實行若名不副實不敢濫登一列女除奉旨建坊者詳載年月即旌奬未逮而懿行可風亦倣賈志例確採量存不敢盡沒一史書之體善惡兼載志書體例記善而不記惡舊時賈漢復陜志後列鑒戒盜賊一條因明季流賊殘破陜西本朝王師勦除逆冦地方甫經平定不得不略記事迹另列一條今海宇升平已經百年所有鑒戒盜賊一欵無庸復贅一藝文一項一統志概在所略省志舊例收採亦必取其有關地方或根本經術禆益政治者始彚成卷帙其餘文章雖工與甘無涉及篇什投贈吟咏景物雖有佳章概置不録甘肅修志銜名監修字位過密無法顯示臣查郎阿字位過密無法顯示臣劉於義字位過密無法顯示臣許容提調字位過密無法顯示臣趙挺元字位過密無法顯示臣楊應琚字位過密無法顯示臣徐杞字位過密無法顯示臣李世倬字位過密無法顯示臣齊式字位過密無法顯示臣吳廷偉協理字位過密無法顯示臣宋安仁字位過密無法顯示臣馮慶曾編輯學習進士今補平番縣知縣加一級臣李迪學習進士今署鎮番縣知縣加一級臣張能第學習進士原署中衛縣知縣今改教職臣甄汝翼學習進士候補知縣臣鄭鐸學習進士原署寧逺縣知縣今補蒲州府儒學教授臣樊初荀隴西縣儒學教諭臣田吕叶嵗貢生今補紫陽縣儒學訓導臣曹最校訂學習進士今署西和縣知縣加一級臣王崑學習進士今署鎮番縣知縣加一級臣張能第繕録生員臣楊國棟生員臣匡懋生員臣陳玫生員臣顧璋
