傷殆盡遂亡於陳魯希聖莊浪土司世襲指揮闖逆賀錦設計擒之愛其剛勇迫脅萬端毅然不屈且哭且罵淚盡繼之以血守卒稍懈脫身入山不知所終李昌齡鎮畨人總兵震孫明末任榆林總兵闖冦變與兵備道都任集榆紳辨侯世祿尤世威等據城誓守以强弩大炮擊賊殺萬餘人賊以衝車穴城城陷昌齡等巷戰數十合被執賊脅之降不從賊斷其臂割其腿與都任等四十八人俱就義而死其妻並舉家數十人皆自殺任與世祿世威等家屬俱自焚陳則從平畨生員甲申聞京城陷莊烈帝殉社稷謂子大勳曰謝枋得何如人耶遂不食積九日而死馬良御鎮畨人由指揮任蔡旗堡守備調征湖廣流冦與張獻忠對敵被執不屈支解死皇清張鵬翼昌平人順治四年任分守凉莊道參議中正廉明五年死於逆回之難張仲金武威人官把總康熙三十五年隨振武將軍孫思克征𠞰噶爾旦奮勇先登歿於陳李蘭鎮畨人新城堡守備康熙五十七年進征西藏於哈喇烏蘇隨總兵康海兵戰矢盡陳亡傅瑾武威人西寧千總俸滿歸家雍正元年莊浪畨夷作亂凉莊道蔣泂團練民兵以瑾為統領二年正月率衆攻打石門寺與鄉民吳廷周田棟愈仲宗力戰陳亡陳昌武威人莊浪把總雍正元年畨夷作亂隨提督楊進善進𠞰棹子山遇賊奮勇戰死寧夏府明王俶寧夏人陜西都指揮鎮守寧夏永樂辛卯與賊戰於河西被重創死同時有指揮諸鼎千户沈傑亦戰歿許顒寧夏人都指揮守備靈州天順間追敵至河套鹿泉顒乃據險掣全軍回力戰射死酋長數人又斃酋子三人力盡自刎敵乃刳其肉煮其骨以灌駝王震寧夏人指揮成化四年石城滿四作亂與鎮人蘇諒同領軍戰死趙璽寧夏人指揮𢎞治六年與賊戰靈武口廟山墩下遇害姜漢寧夏人總兵正德五年置鐇為變賊黨憚漢威名伏兵府署詭致漢執之漢數其負國背叛之罪罵不絶口被殺臨死其氣益厲李睿寧夏人都指揮置鐇之變憤罵不屈為亂軍所害事聞賜祭廕楊忠中衛人官寧夏都司置鐇變叛辨擁衆入行臺殺巡撫安惟學忠執杖擊賊為賊所執罵愈烈賊怒碎其尸於都堂事聞賜祭襲廕張欽寧夏人右衛百户置鐇變欽不肯臣逆自縊於演武場事聞廕子表門成賢寧夏人膽勇出衆嘉靖十三年套騎四萬餘入境賢從總兵官王效為前鋒率八百騎迎於秦壩力戰移日賢獨當一面敵被傷者衆因併力攻之遂死事聞廕子梁為都指揮楊璘寧夏人為神木參將與賊血戰而死李時寧夏人指揮嘉靖三十二年領兵入衛行至浮圖峪遇賊血戰一日殺敵頗多碎尸而亡虜自是不敢入犯以捍禦功建祠祀之時鎮人戰死浮圖峪者指揮張第江嵒百户楊汝松周時戚文寧夏人指揮驍勇素著虜畏之不敢近邊猾者以計誘之出伏兵邀截文遂力戰死韓選寧夏人都指揮嘉靖三十二年敵由橫城入選以千總從總戎姜應熊出禦奮勇堵截自卯至酉力竭而死為賊碎尸靈州不失皆其力也事聞贈恤建祠致祭李承恩寧夏人原任守備萬厯二十年謀擒巴拜機泄被執不屈為賊所殺其子佩見父死即渡河請兵欲報父仇被縛挺立罵不絶聲為賊磔死又陳漢寧夏人百户撫標供給官賊忌之與承恩同日見殺安宗學寧夏總旗賊索總兵符印旗牌宗學不屈被執殺之陳棟寧夏人原任遊擊以驍勇聞萬厯二十年巴拜之叛與原任守備朱綬謀擒賊事覺賊殺棟縳綬於北樓殺之王徹寧夏把總曽揭巴拜父子青海侵冒錢糧不法事於經略至是謀賊不密巴拜以恨殺之周哲中衛學生萬厯二十年巴拜反遣僞將王虎攻中衛參將熊國臣棄城走哲招集士庶分城據守叛辨韓范為內應城遂陷賊怒哲等拒守欲殺之或勸哲往見求解哲怒觸柱曰寧死耳肯屈賊求生耶賊猶欲收人心未即殺越數日出攻他城留左右十餘人哲偵知即令其子約同志僞賀各藏兵器擇家僮之健者將羊酒隨入虎聞紳士來喜出迎甫拜揖遽擊之虎被擒殺餘賊十餘輩其黨乃逸時總督魏學曽駐兵下馬關聞中衛從賊遣兵來討比至以賊級獻乃按兵而入中衛得全皆哲之力哲事親孝黃元會作忠孝紀略載其事李金寧夏人謀刺許朝事覺父子俱戮張沛寧夏人指揮與百户施威皆以謀殲賊而死呂擢寧夏百户赴鎮河灘驅巴拜牛馬仍運窑草以供征兵賊縛至鎮殺之李沛寧夏人應襲謀殲賊被執罵賊極烈為賊所害王極中衛指揮領兵追巴拜至古場兒被殺賜恤錢柏中衛人巴拜亂於中衛奮勇堵戰被殺賜恤張世傑寧夏百户屢報賊情於王師且輸供芻草賊執去鞭撻無完膚死施威寧夏百户守李剛堡偵賊動靜報平鹵將官仍約弟男內外同謀除賊賊執而殺之蔣三重寧夏人謀殺僞把總雷鳴機泄被執不屈罵賊裂眦而死姜應奎寧夏人同宗子謀獻東城於官軍且約刺賊賊拘諸宗子遍受箠楚獨支解應奎時陳文通孟舉張大勳亦會議獻城賊俱殺之納賦寧夏生員因其姪指揮納舟從廣武渡官兵許朝執賦并其子楫族人納坤納稅納福納書等殺於市罄其家髙蓋寧夏健丁追賊入北門內蓋無後繼遂為賊所臠陳縉寧夏人常信堡官殺賊黨三人賊執至鎮支解之妻梅氏自縊死張伏三寧夏常信堡民堡官陳縉恨賊黨張堡等逼取民間牛車芻米豬羊鵝鴨為害殺堡賊誘縉出城縛去伏三與堡民張大經胡希禹李現潘奉謝邦林等追救縉賊伏突起執伏三等六人同縉支解孫九齡寧夏人賊邀入黨不從斷其手膊仍梟之趙承先寧夏人指揮與鎮人指揮戚卿張佩等同謀獻西城納官軍策就密報西營將領以城中火起為號至期城外杳然乃遣武生張遐齡縋城下往促兵賊覺分布緝捕同謀死者趙承先戚卿張佩而外為武生陳松等鎮民陳九叙等軍丁賈謨等皆死之任天慶慶陽人流住寧夏製鐵杆與張應魁謀擊賊事泄許朝執二人詰之應魁不伏天慶厲聲曰與應魁無與汝背違朝廷我恨不得早殺汝耳朝怒縛斬之王繼哲寧夏人恃勇立誓擒賊賊執禁古廟殺之張龍寧夏人掣船東岸以絶賊渡又擒賊黨解靈州梟示賊恨捕龍至鎮斬之王琦寧夏人奉軍門令易糗糧賊緝磔死杜祥寧夏人為吏識賊掠諸堡祥具禀平鹵營將官防禦賊失利加祥劓刖刑臠其肉以飼犬瞿桂寧夏人其族百户瞿坊管魏信堡擒殺許朝族丁朝因拘桂與瞿相瞿樞瞿棟瞿材瞿東瞿尚禮瞿尚義八人盡殺之夏之時寧夏人與鎮人何廷璋生員王懋等三十人閉南關之北門計飲僞千總馮佐等以酒醉而殺之遣衷朝縋城馳報遂得南關蘇彚中衛生員巴拜之變倡義守城遏賊河上靈州保全時同事者掌印指揮李繼先學正馬文明武進士盧養龍生員金佩等十五人事平奉旨勒石紀功李世松靈州人性忠直善左右射耕於晏湖墩側插漢入世松率衆拒賊衆寡不敵人悉奔松獨守墩上以矢射賊中者輒斃賊恨甚攻圍益力凡兩日夜松左右大指皆裂見骨身被七創死史開先都督鏞五世孫歷官寧夏中路副將明季察哈爾入率兵禦敵斬馘甚多陳亡賜贈諡忠烈耿光榮寧夏人世指揮任玉泉營遊擊插漢入犯奮勇出禦與指揮趙有牧千總周崇雅把總唐國俊許城王朝俱殁於陳皆賜恤典江孔學靈州人居胡家堡插酋之變賊圍堡孔學登城罵賊城陷孔學自刎一家大小俱罹於難解文英寧夏人以副將守延安府李自成據關中遣兵至延安文英率衆死守及城破賊授以官文英罵不絶口囚於獄又於獄中約榆林總兵尤世威等舉義圖恢復賊怒支解之呂之䕃寧夏貢生授真定通判委攝獲鹿縣篆未旬日冦臨城下䕃率士民堅守七晝夜城破被執罵不絶口死妻劉氏妾張氏偕幼子二人及其奴僕俱殉死䕃受刃亂軍中不辨其骸事定與城中被殺者作二大冢别男女而封之敕建祠致祭王風水寧夏人賊將牛成龍入寧夏風水與指揮彭凌雲等十三人糾合山後蒙古舉義事泄賊磔風水於市凌雲等皆被殺生員保國璧死尤慘酷李學牧寧夏人指揮賊將牛成龍知其技勇授以官不應與王風水謀舉義單騎往召河東人圖恢復賊防之嚴不得出或勸之亡去學牧曰賊索我亟必殘殺無辜我一身當之以解衆難遂復入城賊露刃擁之學牧具冠帶北向再拜端坐受刃鄧德寧夏人官百户逆闖檄至寧夏諸宗屬及紳士集慶府議降德排闥入灑淚申大義曰諸公皆欲賣城自全獨不為王計乎後與王風水等舉義欲誅僞官陳之龍賊將牛成虎謀泄被執挺身仰面受刃厲聲曰吾死當為神盡殺賣國臣遂遇害馬獻圖字興之寧夏總兵馬世龍子以廕補指揮同知李自成據關中勒降不屈械繫軍中至山西候馬驛殺之弟負圖呈圖俱襲指揮自成遣僞將牛成虎陷寧夏負圖兄弟約表兄彭姓者圖恢復事泄同被害於靈州兄弟殉節人稱馬氏三忠獻圖死時年三十三負圖年十九呈圖年十六丁孔應寧夏人以世指揮授北川守備升遊擊闖逆變孔應守義不屈賊擁戈逼之孔應厲聲曰吾頭可斷身不可屈遂遇害雍締中衛人以歲貢任四川仁懷知縣張獻忠入蜀締率百姓死守城破闔家自焚死先是宣和堡歲飢人日逃散締傾資全活之蔡應昌興武所千户任花馬營千總明末羅凸土賊搶掠應昌統兵剿賊自卯至酉力盡血戰而死鄭感民後衛舉人任遼東寧逺州推官總制洪承疇稱其臨機决策措置有方擢為遼東監軍道後城破闔家死難韓嘉爵寧夏人平虜中軍指揮有勇略臨陳直前手刃數十人為賊支解孫祚昌中衛鳴沙堡生員明末冦入堡欲降之祚昌怒罵拔刀自刎賊碎其尸去黃儒煐中衛永康堡生員明末香山賊攻陷永康堡人皆順從儒煐獨挺立不屈危言抗賊賊加桎梏絶其飲食殞李維新中衛威武堡人業商慷慨多大略明末賊朱國端等嘯聚螺山出沒峽口楊栁泉劫殺行旅廣武遊擊奉檄征𠞰至威武聞維新名委令領民兵入山合剿既遇賊維新奮勇獨戰殺賊無數以衆寡不敵歿於陳遺子淋幼妻張氏少後守節撫孤成立烈節萃於夫婦包永成後衛人庠生弟永明亦庠生明末賊破惠安堡聞永成兄弟有技勇欲挾之去不屈為賊所殺皇清吳繡以千總隨總兵陳福出征臨陳先登死於固原城下子繼統襲其職每臨陳亦奮勇爭先相繼陳亡劉進孝總兵體義次子任千總康熙三十五年隨總兵殷化行征噶爾丹同中營遊擊陳維屛守甕金陳亡司九經字聖典寧夏人從征川雲又從征出塞俱有功績歷任宣化總兵罷職歸康熙五十七年隨征效力遇敵陳亡杜呈源寧夏人隨陳福克復定邊以功任本鎮右營千總後隨征川雲屢立戰功陳亡於建昌馮琇寧夏人任固原參將隨征進𠞰至穆壘烏蘇地方遇凖噶爾賊冦與戰爭先殺賊歿於陳許世隆寧夏人任永固城參將進𠞰至巴爾庫爾殁於陳羅萬倉寧夏人歷任臺灣北路參將朱一貴反亂總兵歐陽凱戰死府治陷萬倉鼓勵將士堅守賊攻北路連發大炮擊仆賊旗賊四面圍困萬倉突圍力戰兵孤無援踰溝墜馬賊以竹篙鎗戳其喉猶揮刀殺賊而死西寧府宋髙永年西寧人任西寧知州建中靖國三年夏人冦涇原羅撒合兵逼宣威城永年出禦之行三十里為羌人所執多羅巴謂其下曰此人奪我國土使吾宗族漂無處所遂殺之明李淳西寧衛千户勇敢善戰能以寡敵衆多所克捷嘗承委追撫畨族有剽掠者淳直搗廬帳得首惡殲戮之用是諸畨恚恨相與發誓必欲生噉淳肉正德十四年追畨至內隆卜賊衆拒敵從者潰散淳手殺數人力盡被執賊逼令跪淳罵不絶口遂被賊砍死祁秉忠西寧世襲土司指揮同知以功升甘州鎮總兵萬厯中西賊入冦力戰死之皇清馬金良西寧人任守備隨征凖噶爾與賊戰奮不顧身兵敗遂自刎死直𨽻秦州漢紀信成紀人項羽圍漢祖於滎陽甚急將軍紀信曰事急矣臣請誑楚可以間出於是陳平夜出女子東門二千餘人楚因四面擊之紀信乃乘王車黃屋左纛曰食盡漢王降楚皆呼萬歲之城東觀漢王得與數十騎出西門遁羽見紀信問漢王安在曰已出去矣羽燒殺信魏閻溫字伯儉天水西城人魏凉州别駕守上邽令馬超奔上邽溫馳還州超圍州甚急刺史韋康遣溫告急於夏侯淵溫夜從水中潛出明日超追獲之超解其縛使告城中云東方無救溫向城大呼曰大軍不過三日至勉之超怒殺之隋李崇字永隆隴西成紀人賢子英果有籌略膽量過人以父封爵時年尚少拜爵之日親族相賀崇獨泣下賢怪而問之對曰無勳於國而幼小封侯當報主恩不得終於孝養耳賢竒之以伐齊功擢開府儀同三司建德初攝太子宫正周武引參謀議以勳進爵郡公開皇初除幽州總管突厥犯塞崇力戰死諡曰壯唐姜寶誼秦州上邽人父逺仕後周為秦州刺史寶誼遊太學受書業不進去為左翊衛領府兵唐髙祖起兵授左統軍下西河霍邑爵永安縣公與裴寂拒宋金剛戰於汾州兵合寂棄軍走寶誼被執帝聞為泣下曰彼烈士必不下賊死矣厚賜其家果謀還被害賊平詔迎其柩贈左衛大將軍幽州總管諡曰剛直隸階州宋曹友聞字允叔同慶栗亭人武惠王彬十二世孫少有大志與弟友諒千里尋師取友登寶慶二年進士授綿竹尉改天水軍教授城已被圍友聞單騎夜入與守臣張維糾民厲戰罄家財募健士乘髙據險身冒矢石為士卒先敵敗去檄知天水軍北兵入鳳州友聞遣統制王漢臣等授以方略出戰部分諸將各守一門取間道出戰自提兵乘敵後大戰有功北兵又自西和至階州友聞引兵與諸軍㑹命弟萬及友諒督戰自冷水口渡嘉陵江屢戰有功夜銜枚直趨青野原截戰圍解特授左驍騎大將軍北兵破沔州搗大安友聞遣統制王資等趨雞冠隘王資等出戰敵乃解去特授眉州防禦使弟萬知同慶府明年友聞引兵扼仙人關北兵大至友聞語萬曰以寡擊衆非乘夜出竒內外夾攻不可乃遣弟萬友諒上雞冠隘多張旗幟示敵堅守選精鋭萬人設伏銜枚突戰㑹大風雨淖濘深沒足諸將欲待霽友聞斥曰敵知我伏兵在此緩必失機遂五鼓出隘口內外兩軍皆殊死戰北兵以鐵騎圍繞友聞殺所乘馬血戰愈力與弟萬友諒俱死元將汪世顯過戰地歎曰蜀將軍真男兒也事聞特贈龍圖閣學士賜廟褒忠諡曰節牛皓福津人仕為川陜宣撫部將紹興五年金犯秦州宣撫副使吳玠遣諸將分道伺之皓至瓦吾谷與金將呼珊遇皓所部不滿二百乃下馬與戰金將異皓欲招之皓力戰死有承信郎髙萬且罵且戰與部將任安隊官秦元薛琪張亨皆死於陳後皆贈官録其子明孟宗孔階州貢生授漢隂教諭李賊破漢隂宗孔朝服自縊於明倫堂贈國子助教蹇遇泰階州人鄉貢初授髙郵州同後升瓊州府判解綬歸日較書課子明末李賊破城至其門猶聞讀書聲賊劈其門而入仗義大罵遂遇害趙明盛階州恩貢授太原照磨回籍城陷舉家驚逃其子强之行盛不從賊至其家盛登屋以瓦擊賊賊焚屋盛端拱北面而死鍾其碩成縣人貢生任鎮平縣令時值兵荒民多流離多方招撫百姓復業遇旱登山步禱精誠感格甘雨立沛修城池建營房創修書院出館穀延師課士催科撫字備極鞠勞流冦陷城罵賊不屈殉難直隸肅州晉宋矩字處規敦煌人慷慨有志節張重華據凉州以矩為宛戍都尉石季龍遣將麻秋攻大夏護軍梁彧執太守宋晏以城應秋秋遣晏以書致矩矩既至謂秋曰辭父事君當立功與義茍功義不立當守名節矩終不背主覆宗偷生於世先殺妻子自刎而死秋曰義士也命葬之重華嘉其誠節贈振威將軍車濟字萬度敦煌人果毅有大量張重華以為金城令為石季龍將麻秋所陷濟不為屈秋必欲降之乃臨之以兵辭色不撓曰吾雖才非龎德而受任同之身可殺志不可移乃伏劍而死秋歎其忠節以禮葬之後重華迎致其喪親臨慟哭贈宜禾都尉明胡麒本衛指揮鎮守肅州正統十四年賊攻臨水堡麒率千户來斌楊祥百户朱安陳五王貴蔣忠崔達等追賊至永勝墩對敵陳亡董和百户𢎞治十年賊黨出沒隨參將劉勳追賊至昌平三墩對敵陳亡黃義百户𢎞治十年回賊犯邊統兵隨中軍劉忠追賊至北沙窩地方陷陳身亡田志深百户正德五年隨中軍鍾紀追賊至石峽墩地方對敵陳亡芮寧本衛人任遊擊將軍正德丙子土魯畨速檀滿速兒入冦肅州寧率千户許釗百户張璽吳英陳泰王忠劉威等至黃草壩與賊對敵賊衆我寡自朝至暮矢盡寧中流矢死之全軍陷沒事聞贈寧都督同知世襲指揮使恩賜葬祭立襄愍祠餘祀忠勇陳進千户正德十四年隨甘肅總兵栁湧截賊至新河地方對敵陳亡任虎百户嘉靖八年回賊犯邊追至老鸛窩地方與賊對敵陳亡司彥明百户嘉靖三十一年南山西畨搶殺人畜隨指揮姚仲夀追賊至中寨堡陳亡王臣千户嘉靖三十九年賊犯肅州同千户邊威李相百户梁棟等隨參將許經追賊至三尖海子對敵陳亡錢濟民百户隆慶四年虜犯肅州統兵追賊至石頭莊歿於陳甘肅通志卷三十七
