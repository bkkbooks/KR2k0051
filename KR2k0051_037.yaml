body:
  text: 甘肅通志卷三十七忠節人臣委質事君平時竭忠盡職遇難殉節致身自古忠臣烈士彪炳史冊當時傳為盛事後代猶深景仰甘肅自漢迄今代有其人謹列姓名垂諸奕世志忠節臨洮府晉辛賔狄道人勉弟愍帝時為尚書郎及帝蒙塵於平陽劉聰使帝行酒洗爵賔起抱帝大哭聰曰前殺庾珉輩故不足為戒耶引出遂加害焉辛恭靖狄道人隆安中為河南太守會姚興來寇恭靖固守百餘日以無救而陷被執至長安興欲官之恭靖厲色曰我寧為國家鬼不為羌賊臣興怒幽之别室經三年誑守者乃踰垣遁歸於江東安帝嘉之桓𤣥請為咨議參軍置之朝首鞠允金城人為雍州刺史愍帝即位以允為左僕射領軍持節西戎校尉録尚書事劉曜逼長安允擊破之擒殷凱於陳曜後圍北地太守鞠昌遣使求救允率步騎赴之曜復攻長安允與帝至平陽為劉聰所幽辱允伏地號哭不能起因自殺聰嘉其忠烈贈諡節愍侯周劉雄字猛省臨洮金城人少機辨慷慨有大志初為文帝親信後拜中大夫賜姓宇文氏天和中封周昌侯武帝以雄為河州刺史雄先已為本縣令復有此授鄉里榮之後進爵趙郡公宣政元年突厥寇幽州雄戰沒贈亳州總管隋李襲志字仲先狄道人始安郡丞大業末盜起襲志傾私財募士三千乘城拒之或勸其據嶺表取百粵效尉陀事襲志曰當相與戮力為宗社雪恥寧蹈忠以死不逆節以生遂固守凡二年竟為蕭銑所害唐辛讜蘭州人雲京孫也學詩書能擊劍重然諾急人之急初事李嶧主錢穀性廉徑慨然常有濟時意後龎勛攻杜慆於泗州讜聞之乘舟趨泗口貫賊柵以入慆素聞其名握手相慰賊焚淮口讜乃出求援至洪澤見戍將郭厚本流涕告急付兵五百與慆表裏擊賊大敗之讜入人心遂固圍三月城益危讜復與壯士徐珍等夜斬賊柵詣浙西見杜審權時皆傳泗州已陷疑讜為賊計囚之防禦使李嶧稱其忠可信審權乃許救合淮南兵五千讜引兵大戰斬賊六百級入城慆表其功於朝授御史圍凡十月乃解卒完一州以功第一拜亳州刺史乾符末終嶺南節度使明何銘河州衛指揮同知永樂十年領軍凉州衛遇賊力戰而死漆堅渭源人任四川重慶府照磨值蜀賊反領鄉兵力戰而死何勳字朝用銘之孫本衛指揮同知正德九年征西寧及嘉靖五年征洮州俱有功九年戍甘州賊臨境同百户孫福力戰陳亡陳鍾蘭州衛左所正千户成化四年從大將軍征叛賊滿俊於石城臨陳呼副千户李旺盡力報國遂揮兵奮擊力戰同死於陳一時壯之張瀛字士元蘭州衛左所正千户性孝友忠實臨事有為升指揮僉事正德十二年秋臨鞏參政張禴檄瀛隨征至安定先令軍士入城為保全計挺身出探遇敵衆寡不敵戰死至剖其腹事聞加指揮使世襲命有司致祭姚震河州衛指揮同知升遊擊將軍正德辛未調四川征勦流賊力戰陳亡朱輔蘭州衛右所正千户委守河北安寧堡外敵至斬獲有功俄而勢益衆輔力戰為流矢所中而死性孝友勤職善撫士卒人共悼惜之事聞贈指揮僉事世襲妙齡河州人由軍功升本衛正千户𢎞治十四年領兵固原等處遇賊戰死贈指揮僉事馮琦河州衛指揮僉事正德癸酉追𠞰四川流賊戰死子恩襲職嘉靖元年領軍於洮州遇賊亦戰死蔣繼勳河州衛指揮使嘉靖十一年領軍甘州遇賊戰死贈都指揮僉事黃命河州營千總明末從參將費邑宰統兵進征四川流賊於五丁硤力戰而死朱家仕字翼明河州人明末戊辰進士升山西兵備道治蹟有聲李逆陷京師山右訖無堅城家仕義不屈投井而死韓一麟蘭州人明末以明經司訓寧羌寇至城陷麟以身殉難事聞贈國子監學録石崇德字峻吾狄道人早喪父其母張氏殉節死德寄養外家及長襲祖父職升金鎖關守備有戰功升固原鎮左營都司㑹流賊襲隆德崇德從兵備道陸夢龍出兵禦之賊圍陸數匝德突出重圍聞陸困賊中復殺入與陸俱戰死奉㫖贈副總兵李承先蘭州衛百户勇略出衆騎射邁倫天啓間以功升參將殉節蔣嘉印蘭州人年弱冠善騎射從督撫𠞰寇有功題授都司明末李賊壓境嘉印扈王出城為伏莽土回所劫拒敵河滸矢盡被害碎骨層氷中段字辛蘭州庠生南陽知府堅曽孫闖寇至衣冠再拜自縊於祖祠子婦王氏亦同時自盡溫楏蘭州人肅藩侍書李冦入城夫妻子女八口闔門俱縊死林培梁蘭郡庠生李寇入城殉難自縊死朱文美蘭州耆民李寇入城同妻王氏並縊死李芳李如玊劉子都魏承勳李國琦何天衢賀守王官俱固鎮標辨萬厯十八年從總兵劉承嗣征𠞰俱奮勇當先殺賊甚多賊更出驍騎伏精兵衝營時天大雨承嗣敗績芳等八人俱戰死後立廟致祭皇清王世德河州衛人博學多謀以軍功升授臨洮道標中軍守備順治五年遇回變不屈而死李絮飛遼東人順治五年任臨鞏道履任未及兩月值逆回米刺印叛殉節趙翀鄭州人順治五年任蘭州同知回變殉節李淐定興人順治二年知渭源縣政尚平恕五年回變淐議守城奸民為賊內應遂被執淐罵賊不屈死督撫上其事贈按察司僉事廕一子白旗蘭州學正回變殉節鞏昌府魏龎德字令明南安貆道人初平中從馬騰擊反羌有功遷校尉封都亭侯以不降蜀漢死魏封其二子為列侯諡壯侯宋李彥仙字少嚴寧州彭原人徙鞏州靖康元年應募為石壕尉堅守三觜金人攻之彥仙戰佯北金人追之伏發掩殺千級纍功知陜州初金人得陜用降人守之招集散亡彥仙隂遣人厠其間乃引兵攻南郭潛師薄東北隅所納士內應譟而入復陜州乘勝渡河列柵中條諸山郡邑皆響附金羅索竒其才啖以官彥仙斬其使復遣人招降彥仙命强弩一發斃之金益兵攻城城陷彥仙率衆巷戰矢集身如蝟左臂中刃不斷戰愈力既而投河死之贈彰武節度使建廟號忠烈諡忠威馬坤宕昌人家世以忠勇為名將坤以六郡鎮撫使咸淳中元將楊文安與坤同里諭使降坤不從文安乃列柵攻城潛遣勇士躡雲梯宵登斬關納外兵坤悉力巷戰兵敗力屈而死馬塈坤弟咸淳中知欽州徙雍州撫諸蠻及治關隘皆有條理邊陲晏然宋亡塈因留靜江總屯戍諸軍守城元將阿里哈雅以兵夾攻塈兵敗哈雅使人招降塈發弩射之攻三月前後百餘戰訖無降意城破塈率死士巷戰被執殺之斷其首猶握拳起立踰時始仆金郭哈瑪爾㑹州人以善射應募纍立戰功官蘭㑹洮河元帥大興初西州望風降元哈瑪爾堅守孤城集州內金銀銅鐵雜鑄為炮殺牛馬食戰士悉焚廬舍積聚曰無使資敵軍士死傷過半益奮力死守度力不支乃命積薪州廨呼集家人及城中將校妻女盡焚之城破猶鏖戰良久士卒弓盡矢絶者即先挺身入火中哈瑪爾獨上大草積發三二百矢皆中矢盡自焚死明王良輔隴西人正德間以國子生授河南沈丘縣學訓𨗳汴東盜起流劫郡縣賊至城下良輔督兵防禦竭力拒賊城陷良輔帥子禮諸生陳善等與賊接戰被執罵賊不屈與禮及家人俱受害當路奏聞賜恤程斌㑹寧人為戎伍總旗有勇略先是虜犯蘭靖遊擊哈欽與戰敗績幾為所及斌力救得免萬厯二年西畨劫階岷境總兵孫國臣以斌為先鋒斌手刃畨賊百餘人焚斃不可勝計後入叢林失歸路被殺軍門為護其喪葬具奏厚恤其家劉躍龍安定人舉天啓元年鄉試任河南開封府同知威治豪强惠撫小民解任歸適當闖冦龍盡出已囊繕城郭募鄉兵為捍禦計城破罵賊不屈而死趙率教靖逺人萬厯中歷延綏參將屢著戰功為將廉勇待士有恩勤身奉公勞而不懈經略袁應泰薦擢副總兵以樞輔孫承宗令編次難民為兵悉加精練餘給牛種屯田承宗上其功於朝擢總兵官右都督後因戰中流矢陳亡贈恤立祠關永傑字人孟鞏昌衛人狀貌竒偉登進士授開封推官强直不阿攝府事興利去患民畏愛之以憂歸起官紹興遷兵部主事擢河南按察僉事備兵陳州多異政時李自成擾亂中州永傑繕城修備率士民分堞守賊遣使說降斬其頭懸之城上賊怒攻破之永傑格殺數賊身中數刃大罵而死事聞恤贈光祿寺卿戴天安定貢生闖賊陷鞏昌屬縣皆降獨安定拒守賊圍城邑人欲開門迎降天與貢生張國紞甲胄至縣堂按劍號令誓死守城城陷與紞死之時諸生張大才同弟大訓分守南城城陷不屈罵賊死監生張大韶墜城死僕掌兒亦死李茂實隴西人歲貢授青州府通判時飢民嘯聚劫掠州縣茂實自本城至新泰縣凡十餘戰屢挫賊鋒既而衙兵潰散茂實力戰遇害瀕死罵不絶口崔𢎞宇鞏昌衛世襲百户明末流賊薄郡城勢甚熾巡按賈多男坐東城樓陳兵簡將令出師破賊諸衛辨懼𢎞宇獨請行賈降坐與揖把酒手扶上馬出東郭與賊遇𢎞宇善射賊應弦落馬乘勝追殺之矢盡遇害賈哭之慟關永傑為文誄之張傑隴西生員李賊破西安袁宗弟取鞏昌傑倡義糾衛辨崔光祖等據寧逺魯班山思欲恢復鞏昌自成逆將攻山破之傑罵賊死妻李氏亦殉其難王保民安定庠生賊李自成攻安定保民號於衆曰協心堅守賊進城無噍類矣率諸子姪力戰三晝夜兄保泰弟保貞子敬俱庠生一時同被賊刃姪孫𢎞毅射殺二十餘賊賊多識之入城碎其尸同時監生陳周鼎庠生石瑄髙朝鳳罵賊不屈死康維新李洲楊育秀陳周瑞陳周哲俱墜城死楊中葵巷戰死劉翹名楊九儀王璽薛三戒楊道泰與保民同議守城者賊指名審訊皆不屈被殺義民梢柏張問行孫印于應泰張一才張懋齡李太升王臣竭力捍守手刃多賊俱被殺馮維京通渭諸生貧不自給為人訓詁性耿介明末闖賊冦渭維京攜其婦避於水岔遇賊叱之跪維京指賊大罵賊斷其足罵不絶口而死張永祚字錦基通渭諸生少失父奉母至孝明末闖賊圍渭永祚登城以守時勵於衆矢石盡永祚知不免乃持杯酒與母兄訣城陷賊露刃逼降永祚張目大罵即投井中死次日扶尸出神氣如生怒目未瞑溫元春拔貢郭梁監生杜桂枝金章王汝盤生員皆寧逺人明莊烈帝殉國五人散家資募丁勇以大義激衆衆多從之其後勢不敵俱死於難無一人肯幸脫者薛國正西和庠生明末流冦破西和國正率鄉兵迎戰於西門巷口衆皆逃潰賊圍之挺身力戰矢下如雨罵賊自刎而死巡方旌其忠烈王國興靖逺選貢授山東壽光縣丞署縣印遭闖賊變殉難死房加寵靖逺人任四川綦江參將殁於戰徐承斌岷州百户崇禎四年領兵赴秦州𠞰流寇陳亡楊承芳岷州衛指揮僉事升環縣守備回籍賊登城承芳率家僕數十人拒戰復抵賊壘大戰疊河之南死於陳梁建中岷州衛諸生崇禎七年十一月初一日夜賊踰城而上建中上城拒之復繞城大呼城中人起時建中遇害賊亦帶傷而下城賴以完曹思正岷州人以孝廉授河南襄城令氷檗自矢襄人愛戴之李自成陷城遂殉於難丁光耀光彩洮州庠生明末流冦圍洮光耀等奮不顧身出城與賊血戰而亡王廷璋洮州歲貢歷任四川璧山知縣致仕回家流冦至洮不食而死奐緯西固人明末任直𨽻巢縣訓導李賊破巢罵賊死之皇清杜懋哲直𨽻人順治四年任岷州同知立法嚴整諸弊悉除五年四月回賊作亂執懋哲欲降之懋哲罵不絶口被害劉繼祖順治三年補道標中軍守備值回變率兵巷戰死之韓國元藁城人由行伍任西固守備康熙四十八年番夷猖獗搶掠邊民國元身先士卒與賊戰殺數十人力屈遇害洪章同安人西固所千總康熙四十八年番賊犯境守備韓國元率兵堵禦章亦督鄉壯奮勇擊賊鄉民潰章力竭遇害李邦棟靖逺人四川成都府遊擊順治十八年征茅蘆山陳亡平凉府晉皇甫重字倫叔安定朝那人性沉果有才用為司空張華所知元康中為秦州刺史重弟商為長沙王乂參軍河間王顒遣四郡兵攻之商間行齎帝手詔使四郡罷兵令重進軍討顒顒捕得商殺之乂既敗重猶堅守四郡築土山攻城重輒以連弩射之所在為地窟兵不得近城將士為之死戰後知商為顒所殺無外援遂遇害張肅軌弟實叔父建威將軍以京師危逼請為先鋒擊劉曜實以肅年老不許肅曰受晉寵秩剖符列位今國運方艱朝廷有難不奮何以為臣實以軍旅非耆老所堪終不用既而肅聞京師陷遂悲憤而卒隋皇甫誕字𤣥慮安定烏氏人少剛毅有器局周畢王引為倉曹參軍隋髙祖受禪為兵部侍郎出為魯州刺史復為刑部侍郎俱有能名遷治書侍御史朝臣無不嚴憚上以百姓多流亡命誕為河南道大使以檢括之及還奏事稱㫖上甚悅令判大理少卿尋轉尚書左丞時漢王諒為并州總管朝廷盛選僚佐上以誕公方著稱拜并州總管司馬總府政事一以咨之及煬帝徵諒入朝諒發兵作亂誕數諫止不納因流涕曰願王奉詔入朝守臣子之節如更遷延陷身叛逆求為黔首不可得也諒怒囚之及楊素將至諒屯兵清源以拒之諒主簿豆盧育出誕於獄協謀閉城拒諒諒襲擊破之抗節遇害帝以誕亡身殉國嘉悼久之下詔褒顯贈柱國封𢎞義公諡曰明宋郭滸德順中安堡人宣和中從軍積官至武經郎為涇原第八副將金人犯陜西渭帥以下叛降獨滸不從乃下之獄脅使降滸奮呼曰大丈夫今得死所矣終不為叛逆為天地所不容吾死當訴爾於地下耳衆惡其語即殺之建炎間贈武翼大夫忠州刺史劉惟輔涇州人以同州觀察使為熙河副總管金人既得秦州經略使張深遣惟輔將三千騎禦之惟輔留軍熟羊城以千八百騎夜趨新店黎明短兵相接殺傷相當惟輔舞矟刺其先鋒將貝勒哈富洞胸墜馬死敵為奪氣退深檄隴右都護張嚴往追之與曲端期而不至遇伏死惟輔自間道得歸金人掠熙河惟輔顧熙河尚有積粟急出焚之金人追及執惟輔誘之百方終不言金人怒捽以出惟輔奮首曰死犬斬即斬吾頭豈汝捽也即閉口不復言而死贈昭化軍節度使官子孫十二人立廟成州號忠烈明巨敬靈臺人初為御史伉直敢言建文中擢户部主事充史官清慎有聲靖難兵起與陳迪同被逮責問不屈死之滅其族後諡節愍閭鉦字靜之涇州人舉成化八年進士授户部主事升大同知府陜西饑鉦分俸涇州以賑活族人守大同六年多惠政升山西參政代王乞留以參政秩知大同又三年遷江西參政大同民為立去思碑遷貴州布政使福米祿作亂以鉦帥兵討之至安南衛禆將潘江輕敵深入鉦屢言不聽後同敗死贈禮部尚書䕃子賜祭葬王續宗字繼志靜寧州人習騎射𢎞治間國子生正德間授羅山主簿時流賊猖獗汝南府州縣多陷羅山舊無城續宗督工築城垣復引淮水灌注濠塹賊入冦羅山保全時都御史彭澤委領汝南各州縣民兵數千遇賊奮身當先每多克捷常奪獲婦女輜重頭畜不可勝計澤復令信陽衛指揮沈鏜連兵合營賊復攻羅山續宗同鏜發民衛兵與賊衆對敵鏜敗走續宗勢孤賊衆攻圍挺身深入賊營格殺數十人賊見其驍勇重圍誘降曰吾朝廷臣子奉命𠞰賊肯從狗彘同生遂被殺事聞恤廕立廟羅山祀焉齊敏字克魯隆德人為浦江縣主簿髙陽土賊作亂敏率兵討之戰歿贈浦江縣知縣立祠曰忠勇廕孫入監齊恩字承之隆德人敏孫以祖父廕初授鴻臚寺鳴贊升河曲知縣有惠政治縣九年考最當升遷百姓守闕乞留朝廷嘉其治理命光祿寺署正蔣琅齎金幣賜之尋升無為州同知倭冦叛抄掠州境恩率弟姪親黨十一人督吏民討死之十一人俱殁於陳事聞贈光祿寺丞廕子入監朱𢎞道崇信人萬厯年間貢以霍州判官歸值冦亂堅守不避同邑令龎瑜赴難事聞贈陜西都司經歷梁孕龍崇信人邑學生為冦所獲欲殺之龍不少屈寇曰但能屈膝婉詞則生汝矣龍曰吾名教正人肯受汝賊奴辱耶碎口裂舌至死弗變楊泰運隆德縣諸生為人磊落不羈明末賊克隆德被執泰運見賊不屈賊叱之跪泰運曰殺即殺膝不屈遂罵不絶口賊怒斷其舌臠殺之楊泰初隆德人性剛介明末貢生授松江府通判去官賊陷隆德泰初率其子諸生善同赴井溺死張士俊隆德縣諸生賊克城士俊與妻齊氏並三子俱赴井死朱傑軒平凉人明末闖逆陷西安西向平凉傑軒知城難保率妻及子女闔家服藥死孟肖池平凉人醫藥為生明末闖逆陷潼關肖池見賊勢漸近服藥死平凉馬夫失姓名明末隨驛使逢賊賊殺使留馬夫誑城至城下大呼賊至賊怒磔之皇清郝全善固原提標前營遊擊從奮威將軍王進寶討吳逆戰於永寧被執堅不從逆絶食六日而死馮明雨鎮原縣典史康熙十四年值王輔臣之變城破遇害慶陽府宋張吉合水人熙寧三年為懷安鎮守烽卒夏人秉常入寇東谷掠得吉脅至城下使呼曰諸寨已破宜速降吉反其辭曰努力諸寨無虞賊糧盡去矣不可降賊怒殺之罵不絶口而死事聞贈內殿崇班録其子明景清真寧人生有異質讀書過目成誦性剛介初赴舉宿淳化民家有女為妖所憑是夕妖不至曰吾避景秀才也女父語之清書景清在此四字令粘其户妖遂絶洪武二十七年進士及第授翰林改監察御史太祖召見命署都察院左僉都御史建文初擢左都御史以剛直聞靖難兵起清率師戰白溝河乘勝追之將及馬蹶而止成祖即位方孝孺練子寧輩俱相繼死清獨詣闕自歸命仍其官委蛇侍朝人皆疑之欽天監奏文星犯帝座甚急成祖故疑清及朝清獨衣緋遂收清得所帶劍曰欲為吾君報仇肆罵斷其舌清含血直前噴帝衣帝殺之剝其皮實以草繫朝門族其家後帝出草人忽斷索向前為犯駕狀是後精英迭見時入殿庭為厲遂赤其族宣德間詔建文時死者皆忠臣乃得贈諡魏璽慶陽人世襲指揮領兵戍安邊營成化初毛里孩將三萬衆掠安邊伏其精騎以老弱牧誘城下璽悉兵擊之敵佯敗追至師婆澗伏兵四起軍被圍無水者七日飲馬血併力突陳璽手殺數十人身被九矢墜馬而死朝廷憫其忠節賜諭祭張羽慶陽衛人襲指揮遇賊至主將謀遁羽示以忠義緣營督戰軍士殊死無不一以當百賊衆我寡全軍覆沒羽猶鏖戰至夕力竭被害麻僖字立軒慶陽人父永吉湖廣按察使以清操聞僖舉萬厯三十五年進士授翰林庶吉士改兵科給事中疏陳納諫諍舉枚卜補大僚登遺佚速考選數事劾湯賔尹四十五年京察謫按察司知事天啓二年起太常寺少卿五年魏忠賢亂政御史陳世俊劾之落職居家三十年布衣糲食不涉公庭癸未李自成陷慶陽不屈死之伯叔子姓同死者四十餘人趙邦清真寧人進士因奢寇之變起四川遵義參議招撫降叛恢復地方深入藺穴殉難捐軀追贈光祿寺少卿䕃一子邦清任吏部時以本縣貧纍疏革鹽商協濟邑人德之建祠立碑申請從祀李增環縣人歲貢歷授通判同知自幼頴異博學膽略出衆每以忠義自矢及遇變獨立十字街賊衆擁至縣前大罵被殺郭伏羌環縣人指揮防守曲子鎮賊入伏羌隻身血戰立殺數賊而亡王信寧州人天性純孝幼好讀書敦大節居家遵行文公家禮父歿廬墓三年頂土築墳不食鹽醋菜果遘疾幾危母病信年已六十母臨終泣囑戒勿廬墓乃居祠三年足不出户齊素哀毁一如父喪由嵗貢除靈壁訓導遷知正陽縣出𠞰土冦遇流賊猝至兵敗被執賊擁信脅降羅山縣信大罵不從斷頭剖腹而死閲四日其子來覔猶舒指握子手贈光祿寺少卿諭祭葬朱國禎環縣歲貢授照磨免官村居賊執國禎紿環城禎臨城呼曰幸固守城賊怒殺之任秉衡環縣人貢生德行兼優節義堅固遇變株守孤城至死張𢎞道環縣人吏員授武邑縣典史賊至赴敵而死人稱義勇曹爾奏環縣人素明大義志節凛然賊入城與子庠生天心同罵賊而死任崇德安化生員明末與同學生員陳三仁俱為賊執交口叱罵詞義激烈賊怒碎其尸李彝安化生員率鄉兵擊賊戰死子之元闖賊入關誓以殉難曰吾父既成仁我亦當取義及城陷自縊而死巡按旌其門曰俠烈真儒石瑄安化生員明末城陷瑄衣冠端坐賊至大罵之且曰死為明鬼不作賊人賊怒刃死蘇升階合水人生員明末賊克縣階被執賊索金帛階厲聲大罵至死不改色道府旌其門曰罵賊捐生段復興字仲方陽穀人歷任分守慶陽道明末闖賊入關旁郡皆陷賊檄諭降復興裂其檄集兵固守賊圍城數匝復興發炮殺賊滿濠日夜守禦度勢不可支預置妻妾子女於樓積薪其下拜辭其母攻四日城陷復興趨署火其樓母踊火自焚子小瑞方十二歲有僕引出見火起大哭奔入火中婢僕皆從之復興復抵城上往來殺賊數十輩而後自殺慶民輿復興尸葬於西河坪立祠祀之甘州府唐烏承恩張掖人天寶末為信都太守河北諸將欲迎承恩鎮常山承恩以無詔命不從及史思明降上以承恩為范陽節度副使令隂圖之謀泄為思明所殺明王綱甘州中衛人授本衛指揮正德初敵兵大入綱與都指揮祝泰指揮王佐追之至巴咱爾地方轉戰三晝夜援兵不至泰佐俱戰死綱力戰獨久殺賊甚多力竭被執刳腸支解之路保甘州衛人中衛百户嘉靖三年回賊冦甘州堡寨多破保固守畢家堡賊攻圍旬餘援救不至堡陷被賊執磔之葛永甘州衛人明末以隨征參將調河南𠞰流賊永有威名賊呼為葛鷂子援兵不至被害髙國恩甘州衛人明末以行都司奉調河南𠞰賊每臨陳奮勇先登力竭被執不屈死之羅一貴甘州衛人任鎮海參將征沙嶺陳亡奉㫖旌奬歐陽衮甘州衛人任臨洮副將衮守甘州闖賊圍甘數日不退焚其家屬城陷巷戰而死段自宏字海若甘州衛人知山西垣曲縣有清望已行取竟辭疾歸闖賊犯甘宏捐資餉士與郡紳羅俊傑同守西城城陷被執罵賊自刎死童志道甘州衛人任靖逺衛教授致仕歸闖賊陷衛城志道肅衣冠端坐賊至遇害著有恆心録良知圗二書羅俊傑甘州衛人鎮海參將一貴子任山西宣府總兵致仕歸闖賊渡河圍城捐資助餉盡力堅守城陷自縊死髙登科甘州衛人授行都司城陷被執不屈見殺萬峘甘州衛人撫標遊擊同巡撫林日瑞守城殺賊甚衆城陷戰死於市賊恨之磔其尸姜𢎞基甘州衛人任屯都司闖賊陷城罵賊不屈死之張攀甘州衛人任洪水營遊擊城陷被執不屈死之姚世儒甘州衛人任鎮標營都司闖賊陷城率衆巷戰力竭自焚死劉國棟甘州衛人任固原副將子燦任千總城陷父子率親丁巷戰殺賊甚多力竭一門俱焚死趙宗禮甘州衛人官遊擊年七十餘解任家居賊陷城僕欲負其幼子金剛保以逃禮曰設不得脫必為賊隸遂手刃之閣家俱焚死趙宗祝同子寀俱指揮城陷父子率親丁巷戰力竭命妻妾投繯死父子俱刎楊威甘州衛人任寧夏洪廣營遊擊戅直不阿因忤當道解任歸闖賊陷城被執罵不絶口賊恨之斷喉折脛而死姚天寵甘州衛人官指揮闖賊陷城率家人迎戰被殺閣家放火自焚死張洪勳甘州衛人官指揮闖賊入城躬披甲胄率家僮巷戰殺賊無數力竭自焚死王嘉官甘州衛人官指揮賊入城持弓矢升屋射殺賊數十人賊率百餘衆圍攻遂自刎李汝璋甘州衛人任阿壩嶺遊擊致仕回籍闖賊入城同子起鳳集鳳祥鳳射賊俱被殺朱文選甘州衛人練兵守備闖賊至調度守城大有方略城陷同貢生張之衡縊死於茶馬司署中李棲鵾甘州衛人官指揮闖賊入城披甲躍馬突出衝戰殺賊甚衆力竭自刎羅俊士俊傑弟闖賊圍城城陷被執遇害郭秉忠羅俊傑家將闖賊入西門忠提大炮打傷賊首數人被執罵不絶口遂被殺張之衡甘州衛貢生善射賊至盡力守城射傷甚衆城陷同朱文選縊死茶馬司署中保獻書甘州衛貢生賊至守城防賊掘壕及城陷被害張聖翼甘州衛生員闖賊至城陷遂被害蔣明理甘州衛