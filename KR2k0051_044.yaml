body:
  text: 欽定四庫全書甘肅通志巻四十四藝文藝文首重王言徳音已列蠲䘏欵内綸綍宣布安内攘外除暴安良上荷天庥下恤民隠勒珉澤宫播告天下垂諸萬世永為法則志藝文御製聖祖仁皇帝諭陜西四川總督吳赫康熈三十六年上諭朕廵幸沿邊地方詢察閭井生聚及土田沃瘠之状自晉抵秦經行二千餘里直抵寧夏所以勤求民隠至殷且切惟朔方資大河之灌注疏渠溉田宜於稼穡當兹春氣鬯遂正三農盡力南畝之時誠恐有司官員不體朕懐因車駕經臨調遣師旅借辭供億擾累小民既東作之有違将西成之奚望今一切軍需芻糗俱經儲備足以資用至扈從人役概從簡約所有馬匹悉牧放水草善地並不須以供辦草豆動煩民力爾可傳飭有司禁勿借端妄行科派違㫖事覺定行處分仍徧諭地方百姓各安本業㕓無廢市隴無輟耕庶不負朕親歴邊圉軫恤民依之意特諭諭寧夏官紳兵民康熙三十六年上諭朕體天育物日以治安為念雖身在宫庭而心恒周四海頃因指畫軍務不憚勤勞逺涖寧夏無非為盪滌㓂氛綏乂生靈計也緣邊千餘里土壤磽瘠惟寧夏洪流灌輸諸渠環匝廵覽所至甚愜朕懐夫農桑者衣食之本積儲者殷阜之原爾官吏宜董勸父老子弟三時力田以盡地利比屋勤殖以裕盖藏縱使嵗偶不登亦可無憂匱乏若夫秦風健勇自昔為然其在朔方尤勝他郡爾等或職居将領或身列戎行尚各厲精鋭以効干城禦侮之用斯國家有厚望焉至於忠孝慈惠服官之良規孝弟齒讓生人之大經法紀不可不明禮教不可不肅勿以地處邊陲而不治以經術勿以習尚氣力而不澤以詩書總期上率下從庶㡬馴臻雅化兹乘輿返蹕距靈朔雖逺而睠念塞垣如在几席爾等誠能敬體朕言将吏協恭兵民咸理生聚日益厚風俗日益淳則疆圉實有攸禆朕心亦用深慰慎毋視為具文辜朝廷惓惓牖道之意欽哉特諭聖祖仁皇帝御製平定朔漠告成太學碑康熈四十三年維天盡所覆海内外日月所出入之區悉以畀予一人自踐阼迄今蚤夜殫思休養生息冀臻熈皥以克副維皇大徳好生之意庶㡬疆域無事得以偃兵息民廼厄魯特噶爾丹阻險北陲困此一方人既荼毒塞外輙狡焉肆其凶逆犯我邊鄙虐我臣服人用弗寧夫蕩㓂所以息民攘外所以安内邊㓂不除則吾民不安此神人所共憤天討所必加豈憚一人之勞弗貽天下之逸於是斷自朕心躬臨朔漠欲使悔而革心故每許以不殺彼怙終不悛我師三出絶塞朕皆親御以行深入不毛屢渉寒暑勞苦艱難與偏裨士卒共之迨彼狂授首脅從歸誠荒外君長來享闕下西北萬里灌燧銷烽中外乂謐惟朕不得已用兵以安民既告厥成事廼蠲釋𤯝災潔事禋望為億兆祈昇平之福而廷臣請紀功太學垂示來兹朕勞心於邦本嘗欲以文徳化成天下顧兹武畧廷臣僉謂所以建威消萌宜昭斯績於有永也朕不獲辭攷之禮王制有曰天子将出征受成於學出征執有罪反釋奠於學以訊馘告而泮宫之詩亦曰矯矯虎臣在泮獻馘又禮王師大獻則奏愷樂大司樂掌其事則是古者文事武事為一折衝之用具在樽爼之間故受成獻馘一歸於學此文武之盛制也朕嚮意於三代故斯舉也出則告於神祇歸而遣祀闕里兹允廷臣之請猶禮先師以告克之遺意而於六經之指為相符合也爰取思樂泮水之義為詩以銘之以見取亂侮亡之師在朕有不得已而用之之實或者不戾於古帝王伐罪安民之意云爾銘曰巍巍先聖萬世之師敬信愛人治平所基煌煌聖言文武道一禮樂征伐自天子出朕臨域中逾兹三紀嘗見羮牆寤寐永矢下念民瘼上承帝謂四海無外盡𨽻侯尉維彼兇醜凟亂典常既梗聲教遂窺我疆譬之於農患在螟螣秉畀不施将害稼穡度彼游魂險逺是怙震以徳威可往而取朕志先定龜筮其依屬車萬乘建以龍旂祝融驂鸞風伯戒途宜暘而暘利我樵蘇大野水涸川瀆效靈泉忽自涌其甘如􅌬設為掎角一出其西一出其東中自将之絶域無人獸羣受掩五日窮追彼狂走險大殱於路波血其孥翦其黨孽俘彼卒徒衆烏晝號單馬宵遁恐久駐師重為民困慎固戍守還轅於京自夏徂冬雨雪其零載馳載驅我行至再蠢兹窮㓂昏惑不悔我邊我氓以休以助爰寧其居爰復其賦藩落老稚斯恬斯嬉嵗晏來歸春與之期春風飃翩揚我斾旓我今于邁如涉我郊言秣我馬狼居胥山登髙以眺閔彼彈丸天降兇罰孤雛就羈三駕三㨗封狼輿尸既腊梟獍既獮豺貙大漠西北解甲棄殳振旅凱入澤霈郊卜明禋肆赦用迓景福昔我徃矣在泮飲酒陳師鞠旅誓屈羣醜今我來思在泮獻功有赫頌聲文軌來同采芹采藻頌興東魯車攻馬同亦鐫石鼓師在安民非出得已古人有作昭示此㫖緬維虞廷誕敷文徳聖如先師戰慎必克惟兵宜戢惟徳乃綏億萬斯年視此銘詞皇上御製平定青海告成太學碑雍正三年我國家受天眷命撫臨八極日月所照罔不臣順遐邇乂安兆人䝉福乃有羅卜藏丹津者其先世固始汗自國初稽首歸命當時使臣建議畀以駐牧之地其居雜番羌宻近甘凉我皇考聖祖仁皇帝睿慮深逺毎厪於懐既親御六師平定朔漠威靈所加青海部落扎什巴圖兒等震讋承命聖祖仁皇帝因沛殊恩封為親王兄弟八人咸賜爵禄羈縻包容示以寛大而狼心梟性不可以徳義化三十年來包藏異志朕紹登寳位優之錫賚榮其封號尚冀革心輯寧部衆而羅卜藏丹津昏謬狂悖同黨吹拉克諾木齊阿爾布坦温布藏巴扎布等實為元惡謂國家方𢎞浩蕩之恩不設嚴宻之備誕敢首造逆謀迫脅番羌侵犯邊城反状彰露用不可釋於天誅遂命川陜總督太保公年羮堯為撫逺大将軍聲罪致討以雍正元年十月師始出塞自冬涉春屢破其衆凡同叛之部落戈鋋所指應時摧敗招降數十萬衆又降其貝勒貝子公台吉等二十餘人朕猶憫其蠢愚若悔禍思愆束手來歸尚可全宥而怙惡不悛負險抗違乃決翦滅之計以方畧宻付大将軍羮堯調度軍謀簡稽将士用四川提督岳鍾琪為奮威将軍於仲春初旬禡牙徂征分道深入搗其窟穴電掃風驅捜剔巖阻賊徒蒼黄糜潰窮蹙失據羅卜藏丹津之母及逆謀渠魁悉就俘執擒獲賊衆累萬牲畜軍械不可數計賊首逃遁我師踰險窮追獲其輜重人口殆盡羅卜藏丹津子身易服竄匿荒山殘喘待斃自二月八日至二十有二日僅旬有五日軍士無久役之勞内地無轉輸之費克奏膚功永清西徼三月之朔奏凱旋旅鐃鼓喧轟士衆訢喜四月十有二日以倡逆之吹拉克諾木齊等三人獻俘廟社受俘之日臣民稱慶伏念聖祖仁皇帝威靈震於遐方福慶流於奕葉用克張皇六師殄滅狂賊行間将士亦由感激湛恩厚澤為朕踴躍用命斯役也芟夷凶悖綏靖番羌俾烽燧永息中外人民胥享安阜實成先志以懋有丕績廷臣上言稽古典禮出征而受成於學所以定兵謀也獻馘而釋奠於學所以告凱㨗也宜刋諸珉石揭於太學用昭示於無極遂為之銘曰天有雷霆聖作弧矢輔仁而行威逺寧邇維此青海種類實繁錫之茅土列在藩垣被我寵光位崇禄富負其阻遐禍心潛搆恭惟聖祖慮逺智周睠念荒服綏撫懐柔朔野既清西陲攸震爵號洊加示之恩信如何凶狡造謀逆天鼓動昏憝㓂侵於邊惟彼有罪自干天罰桓桓虎貔爰張九伐王師即路冬雪初零日耀組練霜響鼙鉦蠢兹不順敢逆戎旅奮張螳臂以當齊斧止如山岳疾如雨風我戰則克賊壘其空彼昏終迷曽不悔戾當翦而滅斯焉決計厲兵簡将徃𢷬其巢踰歴嶔嶇坦若坰郊賊棄其家我縶而獲牛馬谷量器仗山積蹇兎失窟何所逋逃枯魚遊釡假息煎熬師以順動神明所福旬日凱歸不疾而速殪彼逆謀懸首藁街獻俘成禮金鼓調諧西域所瞻此惟雄特天討既申羣酋惕息槖戈偃革告成辟雍聲教遐暨萬國來同惟我聖祖親平大漠巍功煥文邁桓軼酌流光悠久視此銘辭繼志述事念兹在兹甘肅通志巻四十四
