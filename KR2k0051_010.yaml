  text: 甘肅通志巻十關梁山林川澤憑髙臨深界分壤接周禮司險設有專官達其道路甘屬巖疆險阻扼塞置亭列障申畫郊圻除道成梁資民利渉王政所先志關梁臨洮府狄道縣摩雲嶺關在縣北一百五十里摩雲嶺上明置最為髙險乃通蘭州要路舊設巡司南關堡在縣南二十里宋熙寧六年置北關堡在縣北二十里宋熙寧五年置三坌關在縣西三十里打璧峪關在縣北三十五里皆臨洮戌卒防守以保障近郊湼家關在縣西三十里西南通河州二十四關要口又明一統志下襯關在縣南一百里八角關在縣南一百一十里十八盤關在縣南一百二十里臨洮堡在縣北七十里宋置明洪武二年改築大城周五百七十丈有竒髙三丈六尺北築郭東西北三門今塌損通谷堡在縣東二十五里宋熙寧五年置又南川堡在縣南三十里宋熙寧六年置結河堡在縣北二十里宋熙寧七年置永寧橋舊在縣西洮河上宋熙寧中熙州梁承建賜名永通明初移建于縣西三里造船十二兩岸置木柱十二維以鐵䌫草䌫各二更名永寧康熙十三年靖逆侯張勇因用兵輓運芻糧仍移建城西北五里至今續修往来通利宏濟橋在縣西北一百三十里洞子溝洮河上為蘭河二州通道明萬歴中建用船十二濶四十餘丈冬撤春建今廢但用舟以渡長濟橋在縣東五里明萬厯三年剏建渭源縣分水嶺關在縣西十五里分水嶺上自嶺以西之水悉入洮河以東之水悉入渭河置關于此入府孔道為縣境之襟要慶平堡在縣西北三十里宋熙寧五年置金改為鎮府志在縣西北有垣墻常繕治之可以避兵乞神平堡在縣西南宋熙寧五年王韶擊降番部城渭源堡及乞神平堡鍬谷河橋在縣東十五里清源河橋在縣南門外通順橋在縣西十里渭河橋在縣北五里蘭州金城關在州北二里黄河西北山要隘處倚山臨河乃通甘肅要路周武帝置金城津隋開皇十八年改津為關明設巡司于河南岸萬歴二十五年易土以磚京玉關在州西北四十五里本名把拶橋宋置關賜今名元廢東關堡在州東十八里宋元豐四年置本名鞏哥關後改為東關堡西關堡在州西二十里宋置關逼臨黄河與夏人接界元廢臯蘭堡在州東南九十五里宋元豐四年置明宏治十八年重修質孤堡在州東五十里宋元豐二年置勝如質孤二堡買子堡在州東五十里又把石溝堡在州東六十里十字川堡在州東北一百三十里一條城堡在州東北一百五十里五堡皆在河南西古城堡在州西南四十里又積積灘堡在州西南八十里皆在河南安寧堡在州西北三十里又鹽塲堡在州東北十里皆在河北明萬厯三十三年置守備駐防今廢鐵古城堡在州北八十里即定火城亦明置紅水河堡在州北五百四十里堡城周一百二十丈髙三丈一尺濠深一丈五尺明萬厯二十七年平松山兵備副使荆州俊建又三眼井堡在州北五百里亦是年建城池髙濶如紅水册說紅水營堡在州北三百三十里三眼井堡在州北二百九十里城皆周二里五分又萬厯二十六年以松山平定議築新邊府同知馮詢等踏看得松山雙墩子以東至紅水河西四十里有水可以築墻紅水河以東三十里俱石山無土不堪挑築應砌石墻自鹻灘墩至永安堡索橋三十里川險間斷或築墻或挑濠各相便宜又五邊考新邊自靖虜衛界黄河索橋起至莊浪界土門山共長四百里而蘭靖莊浪千四百里之衝邊始安第蘆塘三眼井等處土疎易圮時費修築若按明初舊址自鎮番直接寧夏中衛通樹長邊則外鑰尤壯矣永泰城堡在州東北三百七十里明萬厯三十二年建府志永泰城在紅水迤南一百二十里周四百八十丈髙四丈又保定堡在天池水永泰迤南一百五十里鎮虜堡在滚巴川保定迤南一百二十里二堡與紅水相唇齒鎮逺橋在州西北二里黄河上明洪武五年宋國公馮勝建於城西七里以濟師越四年移建於州西十里名曰鎮逺十八年又移建於城西北二里金城關用巨舟二十四艘横亘黄河上架以木梁棚以木板圍以楯欄南北兩岸為鐵柱四繫鐵纜二各長一百二十丈冬河凍則拆春氷泮復建以通河西甘肅等路宏治初馬文升言陜西之路可通甘凉者惟蘭州浮橋一道敵若據此橋則河西隔絶餉援難通矣通濟橋在州東二十里黄河上今廢西津橋在州西二里以木架空俗名卧橋跨阿干水金縣把石堡在縣西北四十里又買女堡在縣西北五十里接蘭州十字川堡在縣東北八十里東二十里為一條城定逺鎮在縣西北四十里豬嘴山下一名豬嘴堡清水鎮在縣東三十里浩亹橋在縣南郊外神濟橋在縣北郭外河州積石關在州西北一百二十里東去積石山五十里明置茶馬司于河州此為市易之處有官軍戌守崔家峽關在州西一百五十里石榨一道樊家峽關在州西一百二十里石榨一道大峽關在州西八十里石榨一道五台關在州西九十里石榨一道紅崖關在州西九十里石榨一道闇門一座癿藏關在州西七十里老鴉關在州西九十里癿藏之南莫泥關在州西七十里土門關在州西南九十里闇門一座石嘴關在州西六十里邊榨一道闇門一座朶只巴關在州西七十里石榨一道舡板嶺關在州南六十里槐樹關在州南七十里闇門一座西兒關在州南九十里喬家岔關在州南八十里牙塘關在州東南七十里沙麻關在州西南八十里林麓控隘足以守禦自此而西舉足侵髙又行一日至嶺西其地益髙與西域相出入處元遣都寔訪河源路出於此迤東為思巴思關思巴思關在州南八十里陡石關在州南八十里邊榨一道大馬家灘關在州南七十里邊榨一道小馬家灘關在州南四十里麻山關在州南一百四十里俺隴關在州南二百里以上二十四關明俱設官分守今裁以塘丁把守歸德堡册說州西至老鴉關九十里又西至起臺堡