body:
  text: 甘肅通志卷五山川郡邑城市時有變更山川形勢終古不易紀其髙深詳其險易體國經野所宜講也兩河形勝奧區髙山擁衛於邉塞羣川縈繞於境中近接遠拱𣲖别支分山經水牒具載可考志山川臨洮府狄道縣嶽麓山在縣東二里宋時建東嶽廟於上故名崆洞山在縣東北五十里府志云俗名空頭山非平涼之崆洞也白石山在縣東南水經注云壠水自隴坻西北至白石山抵狄道按水經注云山在縣東南界抹邦山在縣南三十里宋神宗時羌人屯兵於此一統志云熙寧五年王韶引兵趨抹邦山逆擊破羌於此十八盤山在縣東南一百里其路﨑嶇有石級一十八盤一統志云古有驛遞通岷州碧井山在縣東南二十里一名玉井峯峯頭有井峯後有洞翠屏山在縣南六十里林木森鬱儼若翠屏煤山在縣南八十里明楊繼盛始開居民賴之蓮花山在縣西南一百五十里山聳數峯宛如蓮花故名珠翠山在縣西南五十里俗名花架山幞頭山在縣西南三十里以形似名常家山在縣西南六十里與西傾山相連一統志宋元祐二年夏人寇邉羌酋鬼章駐兵於此為宋將遊師雄所破上有龍湫深廣凡九曲十八灣西傾山在縣西南一百五十里謂即禹貢之西傾非也蓋隴右諸山多以西傾名西平山在縣西五里通志云唐西平王李晟所封其地為西平里之蘭家灣上有坪地百頃寶鼎山在縣西十里以峯似爐鼎故名卧龍山在縣西北二十里山勢蜿蜒如龍偃卧有泉遇旱禱雨於此夏牟山在縣西三十里與寶鼎山相連下産牟麥故名龜山在縣西北五十里以形似名黎紫山在縣西北八十里黑石山在縣西北一百里翠微山在縣北六十里馬銜山在縣北九十里史謂馬銜俗誤為寒接蘭州金縣界其山綿亘數百里勢極髙峻雖炎夏氷雪不消青重山在縣東北三十五里竹牛嶺在縣東一統志云宋熙寧中王韶引兵度竹牛嶺破蕃酋於此胭脂嶺一統志云在縣西三十里下有胭脂川摩雲嶺在縣北一百五十里與蘭州接界雄峻參天上有關胡麻嶺在縣東北一百二十里路通安定玉井峯在縣東南三十里以峯頭有井而名伏氷巖在縣東五里谷中幽邃雖炎夏猶有伏氷焉阿姑山在縣西南八十里亥母山在縣西南四十里上有亥母洞滴水巖在縣西十里水自石竇中出隴坻在縣東應劭曰隴西郡有隴坻在其東水經注隴水西經隴坻其山岸崩落者聲聞數百里揚雄稱響如頽坻是也麝香坡在縣西南與夏牟山近中産麝香髙峯坡在縣東北十五里新道坪在縣南三十里或謂新為辛以辛氏多居於此嵐關坪在縣南二十七里一名南關關口險隘坪上髙敞延袤可十餘里墓塜坪在縣東北三里中多古墓故關原在縣北三十里魏正元中王經與薑維戰於故關不利即此相近有太平原上有平地百頃可以屯軍鎖林峽在縣南六十里洮水所經兩崖聳峭如削林木森森宛似封固故名石井峽在縣北一百二十里中有泉四時不竭木婆谷在縣東三十里東谷在縣東八十里一統志云宋王韶自東谷徑趨武勝克之即此南峪在縣東南八十里贊嘉谷在縣南七十里中有龍湫池紅道谷在縣西南三十里一統志云明嘉靖十八年敵首火落赤入寇由紅道谷潛入遊擊劉子都戰於此十公谷在縣西南四十五里通谷在縣西六十里一統志云其谷東入西出往來不踰數十步中可容千百人上有竅見天日宋熙寧初嘗於谷口置堡打壁谷在縣北三十里東巖在縣東一里山如兩屏中建蘭若層樓飛閣登陟其上可覽一邑之勝西巖在縣西三里上倚寶鼎下瞰洮流中建蘭若髙閣危樓視東岩為尤佳丁龍谷在縣東南二十五里內有贍學田百頃志府文廟碑隂水簾洞在縣西三十里超然臺在縣東一里嶽麓山上古名鳯臺後宋蔣之竒登臺眺望易名曰超然有超然臺詩明楊繼盛謫狄道典史建書院於上洮河在縣西二里一統志云自洮州衛東北流經岷州流入又北入蘭州界水經注洮水自步和亭北出門峽歷求厥川菌川水注之又北歷峽徑偏橋出夷始梁右合菌塏川水又東北經桑城東又北會藍川水又北經外羌城西又北經和博城東左合和博川水又北經安故縣故城西又北經降狄道故城西又北隴水注之又右合二水又右會大夏川北流入黃河明一統志洮河在府城西南源出番地流入本境盤束山峽中千數百里始經府城南浩然奔放聲如萬雷府志洮河在城西三里由深溝兒至府城可灌田園百餘頃年久淤塞明萬厯乙巳知縣閻士望疏通之雍大記桓水源出西傾山吐谷渾界禹貢西傾因桓是來注云在隴西郡臨洮縣西書本作桓水經臨洮謂之洮水又謂之桓水菌川水在縣南水經注出桑嵐西溪東流歷桑嵐川又東經菌川北又東入洮水菌塏川在縣南一統志云出東南石底嶺下北流注於洮藍川在縣南水經注源出來歷川西北溪南流歷川東北流經藍川歷水池城北又東入洮水和博川在縣南水經注源出和博城西南山下東北流經和博城南又東北注洮水邦金川在縣南六十里一統志云宋元祐中种誼等擊鬼章夜渡邦金川即此抹邦河在縣南三十里一統志云由岷山會大小南川松樹溝水成河北流入洮河南川水在縣南九十里山水雄秀有大南川小南川一統志云源出渭源舊志源出蓮花山流經抹邦山册説源出黃香溝北流入洮隴水在縣東一統志云即水經注所謂藍水也出鳥鼠山西北歷白石山下又西北經降狄道故城東昔漢馬援為隴西太守為狄道開渠引水而郡中樂業即此水也又西北入洮河東峪河在縣東三里一統志云源出渭源縣界分水嶺會馬兒藏南峪水成河西流狄道入洮河小河溝在縣北五里三岔河在縣西北十里東流入洮一統志云馬家灘在縣西八十里册説三岔水源出麻山關大馬家灘火石界內經縣西北又東北入洮蓋即水經注