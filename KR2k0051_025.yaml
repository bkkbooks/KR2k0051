  text: 甘肅通志卷二十五陵墓甘處邊陲原非都會郡邑舊乘羲黃二陵實屬傳疑不敢附會若夫名臣碩輔志士賢人冠劍所藏寢園可問豐碑古碣憑弔遺蹤起敬思哀表章崇護禁樵置守司牧之責志陵墓夏周祖不窋陵在安化縣城東三里許碑刻剝落有石大書周祖不窋氏陵商彭祖墓在真寧縣城東六十里一云在宜君縣北三十里彭村伯夷叔齊墓在隴西縣西南九十里首陽山前有清聖祠祭田碑記史記注首陽山在河東蒲坂華山之北河曲之中山西通志云首陽山在蒲州南四十五里一名雷首伯夷叔齊隱此殁葬山麓墓祠俱存今名二賢祠明楊恩有首陽山辨以隴西者為是周老王墓在安化縣西南二十里龍泉坡東嶺莫可考為周何王居民號天子塜秦文公墓在秦州東南麥積山下左丘明墓在靈臺縣東北三十里寰宇記縣有左丘明廟縣志謂廟側有墓密康公墓在靈臺縣西五十里丘將軍墓在靈臺縣東郭外里許靈臺觀內秦太子扶蘇墓在寧州西十五里舊有碑將軍蒙恬墓在慶陽府真寧縣北二十里漢紀信墓在秦州北門外墓傍有廟今廢前將軍李廣墓在秦州南二里石馬坪墓傍有故宅今廢營平壯侯趙充國墓在清水縣北二里白土崖有墓表秦嘉墓在通渭縣城川鋪宗室墓在涇州南五里相傳漢宗室葬此平襄侯薑維墓在伏羌縣西南五十里地名魏家溝不數武又有薑氏墓維先塋也又傳明萬厯間靜寧州南水洛城西南三十里山出一碑上題漢驃騎將軍薑維墓維天水人遇難蜀中墓何以在靜寧殊不可信王符墓在鎮原縣北二里劉表墓在固原州西寰宇記按從征記云劉表冡在髙平郡表子琮搗四方珍香數十石著棺中晉永嘉中郡人衛熙發其墓見表貌如生香聞數十里懼不敢犯丞相塜舊志在安化縣北二十里西川相傳公孫昆邪之墓義陽侯傅介子墓在安化縣西七里明正德間郎中都穆立碑表墓丞相公孫賀墓舊志在安化縣東南二十里林秋原碑存三國魏壯侯龎德墓在隴西縣碧岩里薑敘母楊氏墓在伏羌縣趙昻妻趙異墓在伏羌縣晉皇甫謐墓在靈臺縣東北十里張敖家堡原上權翼墓在秦安縣權家衙苻秦時封翼安丘公南北朝後周刺史石靖墓在河州北原上魏隴西公李虎墓在伏羌縣西北八十里後周唐公李昞墓在伏羌縣西北八十里後周苗光義墓在寧州南四十里南涼秃髮鹿孤墓在西寧縣南十六國春秋葬於西平之東南楊難當墓在成縣城西四十里有祠在栗亭西一名楊將軍廟西涼武昭王李皓墓在肅州西十六國春秋王葬建世陵元和志在酒泉西十五里隋薛舉墓在蘭州古峯山後尚書牛𢎞墓在靈臺縣南五里烈婦王氏墓在清水縣東三十里車道溝渭州刺史張崇妻盜逼守節而死唐西平忠武王李晟墓在狄道縣西二十里地名西平莊蘭家灣按西安府髙陵縣亦有李晟墓協律郎李賀墓在隴西縣城南仁壽山袁家灣文公李翺墓在隴西縣南仁壽山郡志誤以為李白文公權德輿墓在秦安縣權家衙秦州刺史薑謨墓在清水縣北十里祝英臺墓在清水縣東五里太尉節度使和文墓在文縣西大渡􅄵西平王李晟先塋在洮州衛西六十里吳侍御墓在兩當縣嘉陵江上侍御名郁杜甫有詩牛仙客祖墓寰宇記在靈臺縣南一里蒲川水西石闕前有碑存宰相牛僧孺墓在靈臺縣南三十里汾陽王郭子儀墓明一統志在合水縣東南一百二十里有碑子儀十一世孫訥刻田總管墓舊志在合水縣西南九十里漢城原張果老墓在真寧縣東七十里武安府校尉楊文才墓在武威縣城北三十里永豐鄉之原五代學士王仁裕墓在禮縣東北古長道鎮境宋忠烈侯劉滬墓在靜寧州西北山麓春秋致祭鄉人報賽有敕誥碑碣大將軍劉錡墓在靜寧州東郊北山麓有路碑存涪國武安王吳玠墓在靜寧州南一百二十里水洛城北原信國武順王吳璘墓亦在州南水洛城北原四代丘壠俱存忠州防禦使姚兕墓在隆德縣西北三十里有碑弟姚貴墓附焉隴西郡侯王德墓在隴西縣西四十里有神道碑存太尉張嚞墓在漳縣西三十里太尉衛國公吳挺墓在成縣北一十里太尉楊政墓在成縣東政原州人佐璘玠兄弟保隴蜀柱國王公儀墓在西和縣西北白石口趙家町東里許有神道碑西和守諡襄節陳寅墓在西和縣崆洞山北半里許同時殉難二十八人墓在旁殉節通判賈子坤墓在西和縣安撫使王韶墓在岷州南半里金童山下都元帥堪卜底節墓在岷州城東七十里小石門山下將軍張吉墓舊志在合水縣西四十里有宋張將軍碑遊擊將軍董默墓在真寧縣東三里銘碑俱存西夏李氏墓在寧朔縣賀蘭山下數塜皆繼遷等墓金總管圖們呼圖克台墓在狄道縣北元兵攻臨洮力戰而死會州守將郭斌墓在會寧縣東山麓學士虞仲文墓在寧遠縣西二十里焦家峽元帥忠烈侯郭哈瑪爾墓在靖逺縣西南二里小坪山頂有石碑元臨洮府尹祁安墓在狄道縣北葉家坪平章趙琦墓在狄道縣城西太師鞏昌安懿王旺扎勒墓在隴西縣東四十里沙灣有神道碑隴右王汪世顯墓在漳縣南三里汪古山下南安王汪惟正墓在隴右王墓旁學士趙世延墓在禮縣西一里丞相實吉爾墓在禮縣西一里元帥石麟墓在禮縣東三十里梁國公趙國瑶墓在禮縣孟元帥墓在合水縣西十里定祥原有碑追封西寧王實都墓在武威縣西北平章事沃稜之父以子貴封有碑記西臺中丞雲丹巴勒墓在武威縣北三十里洪武時其孫納木喀歸附賜姓汪髙昌王墓在永昌縣北十五里聖容寺之次有敕賜世勳碑記永昌王庫騰墓在永昌縣東南一百二十里鄂爾多城其西又有妃墓明禮部員外許允德墓在狄道縣東五里允德長安人洪武初安撫西寧諸處畨民殁後葬此少卿劉杰墓在狄道縣北四十里董家坪會川伯趙安墓在狄道縣東五