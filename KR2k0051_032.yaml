body:
  text: 甘肅通志卷三十二名宦慶陽府漢杜延年字幼公杜陵人為人安和明法律宣帝時召拜北地太守選用良吏捕擊豪強郡中清靜居嵗餘帝使謁者賜延年璽書黃金二十斤谷永字子雲長安人元延元年為北地太守時災異尤數永當之官上使衛尉淳于長受永所欲言永奏對天子感其言永所居任職嵗餘徴入為大司農夏育北地太守熹平三年鮮卑入冦育率休屠追擊大破之馮異潁川父城人建武中領北地太守事靑山賊率萬餘人降異又擊盧芳將及薁鞬日逐王破之上郡安定皆降隋李充成紀人開皇中拜朔州總管甚有威名為敵所憚元諧河南洛陽人寧州刺史有威惠時吐谷渾渡河連結黨項諧率兵出鄯州趣青海邀其歸路相遇於豐利山擊走之在州數年百姓德之然性剛不能取媚於左右嘗言於上曰臣一心事主不曲取人意帝曰宜終此言栁儉字道約河東解人居官以仁明著稱大業初徴拜𢎞化太守清節逾勵五年入朝郡國畢集帝謂納言蘇威吏部尚書牛𢎞曰其中清名天下第一者為誰威等以儉對帝賜儉帛二百匹令天下朝集使送至郡邸以旌異焉及大業末盜賊蜂起數被攻逼儉撫結人夷卒無離叛竟以保全唐李績曹州人寧州防禦使威名大振狄仁傑字懷英太原人髙宗時為寧州刺史撫和戎落得其歡心郡人勒碑以頌後遷豫州時越王兵敗支黨餘二千人坐死仁傑密表其詿誤有詔悉謫戍邊囚出寧州父老迎勞曰狄使君活汝耶羣哭碑下齋三日乃去垂拱中建廟城西宋范仲淹撰碑頌其德郭翰以御史巡察隴右多所按劾次寧州時狄仁傑為刺史爭言有異政翰謂僚屬曰入其境其政可知願薦使君美於朝母久留即命駕去趙縱守慶州與黨項戰死杜牧以詩哭之楊朝晟字叔明夏州朔方人貞元間代張獻甫為邠寧節度使朝晟請城方渠合道木波以遏吐蕃師次方渠水乏有靑蛇降巖下走視其迹水從而流朝晟使築防環之遂為停淵士飲仰足圖其事以聞有詔置祠命泉曰應聖己城吐蕃悉衆至度不能害乃引去復城馬嶺而歸開地三百里韓逰瓌靈州靈武人始為郭子儀禆將纍進邠寧節度留後奉天之狩逰瓌興慶州刺史論惟明以兵三千赴奉天朱泚兵躡攻之戰不利泚兵奪門逰瓌殊死戰乃解推赴難功第一拜邠寧節度使畢諴邠寧節度使河西安撫使諴到軍遣吏懷諭羌人皆順向時戍兵常苦餽餉乏絶諴募士置屯田嵗收穀三十萬斛以省度支經費詔書嘉美宋董遵誨涿州范陽人乾德六年以西夏近邊授通逺軍使既至召諸酋長諭以朝廷威德刲羊釃酒宴犒甚至衆皆悅服後數月復來擾邊遵誨率兵深入其境擊走之俘獲甚衆太宗即位兼領靈州路巡檢在通逺軍凡十四年安撫一靣夏人悅服姚內斌平州盧龍人宋初為慶州刺史在郡十數年西夏畏服不敢犯塞以其武猛號為姚大蟲田仁朗元城人開寶中知慶州西人冦邊仁朗率麾下擊之前鋒稍却仁朗斬指揮使二人軍中震恐爭乞效命遂大破之其酋長相率請和璽書褒美田紹斌汾州人真宗初調環慶靈州清逺軍部署慶州有野雞族數為寇掠道路患之紹斌召其酋率三人斷臂馘劓放還寇感化帖服范廷召冀州棗強人淳化二年環慶路都部署至道中副李繼隆討李繼遷廷召出延州與賊遇白池大小數十戰屢克捷真宗嘉之曹瑋彬之子真宗時為環慶路都鈐轄瑋嘗上涇原環慶兩道圖至是帝以示左右曰山川城郭險固出入戰守之要在是矣因敕别繪二圖以一留樞密院一付本道俾諸將按圖計事天禧中以瑋為環慶緣邊巡檢安撫使委乞骨咩等族聞瑋至歸附者千餘部落趙振字仲威雄州歸信人景德中為慶州都巡檢使時金湯李欽等三族難制振募降羌啖以利令相攻破十餘堡欽等詣振自歸振為置酒共射欽等百發不中振十矢皆貫欽等皆誓不敢犯范仲淹吳縣人仁宗時為環慶路經略安撫使建戰守之䇿待諸蕃以誠威信大洽慶人為立廟祀之張凝無棣人知慶州西蕃族難制凝襲破之土羌雜居頗為患凝誘至分水嶺降其族各四千户邊境獲安种世衡字仲平洛陽人知環州蕃部有牛家奴訛者素倔強未嘗出謁郡守聞世衡至遽郊迎世衡與約明日當至其帳往勞部落是夕雪深三尺奴訛方卧帳中謂世衡必不能至世衡蹴而起之奴訛驚且喜率其族羅拜聽命諸部有二者使討之無不克其後百餘帳皆自歸率羌兵以援涇原無敢後者嘗課吏民射有過失射中則釋其罪人人自厲皆精於射由是數年敵不敢近環境遷環慶路兵馬鈐轄范仲淹檄令築細腰城晝夜興築有功及卒環人畫像祠之杜把字偉長無錫人仁宗時知慶州蕃酋孟香率部落內附夏人以兵來索香詔還之把言彼違約舉兵香不可與因移檄問罪夏人讋服孔道輔字原魯孔子四十五代孫為寧州軍事推官數與州將爭事有蛇出天慶觀真武殿中一郡以為神州將率官屬往奠拜欲上其事道輔徑前以笏擊蛇碎其首觀者大驚後莫不嘆服遷大理寺丞安俊仁宗時環州都監破元昊吃井那等諸寨安撫使韓琦上其功遷環慶路都監劉越大名人知慶州上言朝廷既授范仲淹韓琦四路經略安撫招討使而諸路亦帶招討稱號非宜詔罷之景泰普州人通判慶州上言元昊雖稱臣包藏禍心當選將練卒修城儲糧以備不虞三疏不報俄元昊反又上邊臣要略二十卷會有薦泰知兵者召對稱旨使知寧州任福開封人咸平中知慶州兼環慶路副總管上言慶州去蕃族不逺願勒兵境上按亭堡謹斥堠因經度所過山川道路以為緩急攻守之備仁宗善之聽便宜從事夏人冦保安鎮戎軍福部分諸將攻白豹城四靣合擊破其城平骨咩等四十一族以功拜龍神衛都指揮使孫長卿字次公揚州人知慶州州險峻乏水長卿鑿百井皆及泉泥陽有羅川馬嶺上搆危棧過者惴恐長卿訪得唐故道闢為通途人皆便之史方字正臣開封人知環州兼環慶路兵馬都監先是磨媚等六族內冦方諭以恩信乃傳箭牽羊乞和減禁兵五千徙內地以省邊費劉几字伯夀洛陽人知寧州處官清約政務便民州俗喜巫軍校有挾妖法結其徒為亂者几使他兵伏壘門以伺夜半盡擒之孫沔字元規會稽人仁宗時知慶州元昊死諸將欲乘隙大舉沔以乘危伐喪非體止之戰亡遺骸聚而葬祭之軍中感泣几三知是州邊人服其能韓絳字子華雍丘人以翰林侍讀學士知慶州夏人犯環慶絳請行郡縣治兵大破之又熟羌據堡為亂即日討平之加端明殿學士李允則字垂範謙溥子為寧州防禦使允則不事威嚴間或步出遇民有可語者延坐與語以是洞知人情訟至無大小面訊立斷善撫恤士卒皆得其用盜發輒獲人莫知所由身無兼衣食無重饈不畜資財後人作六君子堂允則其一也蔡挺字子政宋城人治平初知慶州上書論攻守大計夏人冦大順城挺盡斂邊户入堡戒諸寨無出戰密布鐵蒺藜城旁水中賊渡水馬多躓夜斫夏營夏人潰去又築荔原堡分屬羌三千人守之傅求字命之考城人知慶州環之定邊寨蕃官蘇恩以小過疑懼而遁將佐議攻討涇原既出師境上求謂恩非素㩦二者乘以兵必起邊患但遣禆將扣其帳開以禍福恩感還寨如初張守約字希參濮州人神宗時知環州慕家族黠狠難制搖動種落勒兵討擒之餘遁入夏國守約駐師境上檄取不置居數日械以來斬於市進為環慶都鈐轄知邠州夏人十萬屯南牟畏其名引去守約典七州皆有惠愛可紀俞充字公達鄞縣人熙寧中知慶州慶陽兵驕小繩治輒肆悖充嚴約束斬妄言者五人於軍門聞有病苦則巡撫勞餉死不能舉者周之以故莫不畏而懷焉蕭注字巖夫臨江新喻人熙寧初知寧州有膽氣環慶李信之敗列城皆堅壁注獨啓關夜宴如平時賈嵓字民瞻開封人神宗時為慶州荔原堡都監紹聖中夏兵數萬圍麟州神堂寨嵓以數百騎往援一矢殪其酋衆駭潰錢即字中道臨安人知慶州築安邊城歸德堡開地萬頃縱耕其中嵗得粟數十萬斛張舜民字藝叟邠州人為襄樂令王安石倡新法舜民上書言人君不可與小民爭利時人壯之元豐中環慶帥髙遵裕辟掌機宜文字范純仁字堯夫仲淹子神宗時知慶州帝曰卿父在慶著威名今可謂世職純仁揣帝有功名心對曰臣未嘗學兵陛下使臣治城壘養百姓不敢辭既至嵗方飢擅發常平粟賑貸全活者甚衆或謗其不實遣使按視會秋大稔民歡曰公實活我忍纍公耶晝夜爭輸還之范純粹字德儒仲淹子元祐中代兄純仁知慶州請修諸路䇿應救援之法朝廷是之及夏侵涇原純粹遣將曲珍救之曰本道首建應援牽制之䇿臣子之義忘軀殉國無謂鄰路被冦非我職也珍即日疾馳三百里破之於曲律搗橫山夏衆遁去章楶浦城人哲宗時知慶州夏人入冦楶先用間知之遣驍將折可適伏兵鼓噪而出斬獲甚衆又預置毒於牛圈瀦水賊馬飲者多死遂破其衆髙遵裕字公綽瓊之孫環慶路經略安撫使兼知慶州神宗命統涇原兵討夏國師渡旱海賊騎驟至遵裕出精兵與戰斬首千餘級耿戡元祐間為真寧令建學教人既去人思之為豎碑頌德趙卨字公才卭州依政人知慶州夏人欲襲取新壘大治攻械卨具上撓夏計及夏侵蘭州卨遣將間道出敵寨後邀其歸路斬馘甚衆遷龍圖閣直學士曲珍字君玉隴干人元祐初為環慶副總管夏人冦涇原號四十萬珍搗虛馳三百里破之曲律山俘斬千八百人吕由誠字子明誨之季子知合水縣王中立种諤征靈州由誠部運隨軍天寒食盡他邑役夫多潰去惟由誠善撫字所部分無失者鄭僅字彥能徐州彭城人知寧州諸軍多殺老弱持首級要賞僅下令非強壯而能生致者賞半之有內附羌追冦得老人不忍殺擒之乃其父也相持哭一軍感動諸路爭進討奏捷僅獨保境不生事寇亦不犯种師中字端孺世衡之孫歷知環秦州又知慶陽府老成持重為時名將榆次劉韐言師中聞命即行奮不顧身雖古忠臣不過強霓自金歸宋知環州兼環慶路統制軍馬沿邊安撫使隆興間金兵圍環霓與其弟環慶路統領沿邊忠義軍馬震堅守孤城招降不屈城陷死之詔立旌忠廟金龎迪延安人天眷中為慶陽尹歷三考不易以治最聞詔書褒美西人榮之楊仲武保安軍人皇統初知寧州關中薦飢境內盜賊縱橫仲武悉平之馬諷字良弼大興漷隂人天德初為寧州刺史民有告謀不軌者株連數十百人諷察其無狀乃究問告者告者具伏其誣衆歡呼感泣元何布哈至大三年慶陽路兵馬都總管訓練士卒增濬城塹政通人和百廢俱興李真奉元路人至順中任合水主簿博學儒雅惠愛及民陳政奉元路人至正中慶陽府同知涖政公勤興舉廢墜明陳林洪武初知慶陽府創造之始百務聿興事有成規才猷可觀何敦善淳安人洪武間以人才調慶陽府同知持身亷謹政績有聲秩滿以績最賜衣一襲升撫州府知府李仕銘徐州人永樂間知寧州修創壇祠驛舍諸工興作不一多傭無業貧民償其功而餼廩焉人不告勞事亦稱辦劉綱河南禹州人宣德間知寧州亷勤公恕百廢俱興久任三十年規模整肅州人觀感莫忍違令纍加爵增參議俸比考績入覲賜宴禮部以旌寵之列祀六君子堂馬傑利津人成化間知慶陽府尚禮讓惜人材至折民訟洞察隱微且為開市興利招集逺商一郡始稱富庶云郝鎰字廷重河間人知慶陽府郡民多穴處不知桑麻鎰至革姦胥清徴輸之弊招工陶瓦甓治屋廬教樹藝暇則飾公署學校民有殺人報父仇者鎰據法當原憲司不從後臺議卒是之治為諸郡第一段紳蘭陽人𢎞治間知寧州立市集開官街凡便民者無不力行之且訊刑明允有循良風楊寬涿州人𢎞治間任管糧通判亷介自持禁約倉厰不得妄取且以糧芻積羡扣補失業之數由是民力寬省軍儲不乏馬湘徐州人𢎞治間任管糧通判時屬邑負稅十數萬湘曰民寧有食土而不輸賦者乎此必有過額侵漁之擾乃長事者之過也為定限革弊良者有所遵循姦猾不得規避賦稅漸完築環縣城郭鑿鹽池井得甘泉民利賴之及歸行囊莫辦士民深服其亷龍相慶陽衛指揮僉事驍勇善騎射正德中敵人入寇督軍戰於箭竿嶺身中二十餘矢力竭而死朝瀛山西平陸人正德中知合水縣居心慈惠恩及黎庶性尤剛毅縣有豪強者輒為懲誡威行境內肅然向化田大有字豫甫東平人嘉靖中知慶陽府興學治戎賢聲大著北冦攻圍郡城出竒制勝威震西邊馬彥卿內江人萬厯中知寧州在任十五年增修內城及郭城雉堞凡鳯凰堡焦村太昌新莊襄樂城皆屬創築初設北關通商利民立遺愛祠阮自華安慶人萬厯末知慶陽府博雅名儒尤以天象預知慶地有兵創修武備城賴以全宋雲霄山東淄川人天啓七年慶陽府同知秉性清簡居官明恕時匱夫馬夫鋪兵等役俱係僉報里甲民産多蕩雲霄署縣篆一切革去乃設處工食招募應役民受其賜周日強蠡縣人舉人崇禎間知寧州值合水為賊所陷州城危在旦夕聞督師楊鶴赴省已次永夀日強軍書日三上督師返節駐寧民喜更生鶴嘉其經畫有方特疏題擢分守河西道唐萬齡贛榆人知寧州簡民間壯者編為逰兵城頭設八陳陳立哨官用是習於技擊後賊圍城卒能固圉逰兵之力也馬一荀雲南建水人明末慶陽府推官忠厚存心用刑惟寬及流冦圍城晝夜戒嚴多方設法守禦賴以保全郭之麟威逺人崇楨間知真寧縣好賢禮士省刑薄稅時流冦猖獗麟練鄉勇躬擐甲胄卒保孤城父老謂百年來循良之最尋倅江州卒死賊難袁繼登江南人崇禎間知安化縣明隆萬以還户口凋耗地荒糧重民不堪命繼登履畝踏勘備陳賠纍申請院司題請蠲除荒糧官民便之癸未城陷被執不屈而死靳聖居長治人崇禎末慶陽府推官闖賊至即不言不食以死自矢及城陷不屈死周嘉彥明末慶陽城守都司少年驍勇號周小將闖賊攻城分守城西北一帶極為戒嚴殺賊甚衆賊登東城嘉彥率親丁五六人巷戰手殺數百人所向披靡或勸出城彥仰天大呼曰我恨不能殺盡此賊報國恩也何走為復撲殺數十人乃自刎皇清沈加顯河南河內人順治二年任慶陽道時值闖冦之後空城瓦礫閴無居人郭外尚為賊據加顯設法招徠遺民日漸來集更請兵駐防激勵將士除賊首三十三人脅從皆散凡被虜男婦皆綏戢安業五年升涼州參政潔己愛民和平寬厚請免丁徭兩地皆感恩不忘杜霽逺永年人順治九年知安化縣招撫逃亡回籍八百餘户墾屯地七百餘頃捐資修城樓築垣墉俱堅固可垂永久設立鄉城社學八所淘浚城內外湮塞舊井收殮明末死難骸骨葬於髙原甘州府漢路博德西河平州人武帝時以右北平太守從驃騎將軍有功封邳離侯驃騎卒後博德以衛尉為伏波將軍出塞築遮虜障益封其後坐法失侯為強弩都尉屯居延卒郭忠昭帝時為張掖太守屬國都尉元鳯三年單于使犁汗王窺邊天子詔邊警備後無幾右賢王犁汗王以騎四千分三隊自日勒屋蘭番和入冦忠發兵擊之射殺犂汗王大破之得脫者數百人自是胸奴不敢犯張掖忠以功封成安侯辛慶忌狄道人元帝初舉茂才為張掖太守徙酒泉所在著名蕭咸字仲為蘭陵人望之之子初為好畤令遷張掖太守有政績數增秩賜金後復為中郎將官至大司農傅育北地人章和初叛羌出塞依迷吾育請發隴西張掖酒泉各五千人諸郡太守將之育自領漢陽金城五千人尅期擊之令隴西兵據河南張掖酒泉兵遮其西未及會育獨進兵迷吾聞之徙廬落去育選精騎三千窮追之夜至建威三兜谷遇伏兵育下馬手戰殺十餘人而死諸郡兵到羌遂去肅宗下詔褒美封其子毅為明進侯史苞始為張掖都尉及竇融行河西五郡將軍事以苞為張掖太守及融決䇿東向遂與融砥厲兵馬光武西征隗囂融率苞等會髙平後封苞為褒義侯馬賢元初間領征西校尉事永寧元年羌寇張掖賢將萬人擊破之斬獲萬數餘寇悉降羌復冦張掖殺長吏賢率兵擊其種皆亡出塞璽書封賢安亭侯馬續永寧間為張掖太守代韓皓為校尉兩河間羌以屯田近之恐必見圖乃解仇詛盟各自警備續欲先示恩信乃上移屯田還湟中羌意乃安永和元年遷度遼將軍第五訪字仲謀長陵人為張掖太守嵗飢粟石數千錢訪乃開倉賑給以救其敝吏懼譴爭欲上言訪曰若上須報是棄民也太守樂以一身救百姓遂出穀賑人順帝璽書嘉之由是一郡得全嵗餘官民並豐界無姦盜拜護羌校尉邊境服其威信隋楊恭仁仁夀中甘州刺史臨事不苛細邊人安之文帝謂其父雄曰匪特朕得人乃卿善教子矣隂世師武威人煬帝初拜張掖太守深為戎狄所憚及唐師至世師以世荷隋恩遂勒兵拒守月餘不下被殺裴矩字𢎞大聞喜人髙祖時為吏部侍郎煬帝大業三年西域諸蕃多至張掖交市帝使矩掌其事諸商胡至者矩誘令言其國山川風俗人物儀形服飾撰西域圖記三卷合四十四國奏之仍别造地里圖窮其要害從西傾以去至西海將二萬里為三道北道從伊吾中道從髙昌南道從鄯善總湊敦煌帝欲收西域以矩為黃門侍郎令往張掖引至諸蕃自是西域往來相繼大業五年帝西巡至焉支山伊吾獻西域數千里之地置西海河源等郡大開屯田以通西域之路以矩有綏懷之略進位銀青光祿大夫唐李漢長安時甘州刺史時郭元振都督涼州命漢通闢屯田盡水陸之利稻收豐衍舊涼州粟斛售數千至是嵗數登至匹縑易數十斛積軍糧餘十年牛羊被野宋曹元忠歸義節度使太宗時以州歸於宋明宋晟洪武中討哈密有功永樂中又遣都指揮史昭出兵擒火者厮通西域貢道封西寧侯鎮守甘肅莊得洪武二十四年以都指揮開設山丹衛治督農講武是年麥秀一莖兩穗者四次年一莖兩穗者十人以為德政所致蔣貴正統初西兵犯邊貴充總兵至甘肅擊敗賊衆以功封定西伯鎮守甘肅邊境寧謐彭智山丹衛都指揮僉事守禦善撫士卒學校公宇多所增置涼州府漢任延字長孫南陽宛人拜武威太守光武親見戒之曰善事上官無失名譽延對曰履正奉公臣子之節善事上官臣不敢奉詔帝歎息曰卿言是也既之武威時將兵長史田紺郡之大姓其子弟賓客為人暴害延收紺繫之父子賓客伏法者五六人自是威行境內吏民纍息郡北當邊塞南接種羌民畏冦抄多廢田業延選集武略之士千人明其賞罰屯據要害有警追討敵遂不敢出河西舊少雨澤乃置督水官吏修理溝渠人蒙其利又立校官自掾吏子孫皆令詣學受業郡遂有儒雅之士梁統字仲寧安定烏氏人初為酒泉太守更始敗竇融起兵保境更以統為武威太守為政嚴猛威行鄰郡詔加宣德將軍光武自征隗囂統與竇融等將兵會車駕及囂敗封統為成義侯更封髙山侯拜大中大夫孔奮字君魚茂陵人武建五年為姑臧長時天下擾亂唯河西獨安而姑臧稱為富邑每居縣者不盈數月輒致豐積奮在郡四年財産無所增力行清潔或以為身處脂膏不能自潤徒益苦辛耳被徴日單車就路姑臧吏民及羌人相謂曰孔君清亷仁賢舉縣蒙恩如何今去不共報德遂相賦斂牛馬器物追送數百里奮一無所受既至京師除武都郡丞旋拜太守為政明斷甄善疾非郡中稱為清平牛邯光武建武九年司徒掾班彪上言今涼州部皆有降羌與漢人雜處數為小吏黠人所見侵奪窮恚無聊故致反叛舊置護羌校尉持節領護理其怨結嵗時巡行問所疾苦今宜復舊以明威防帝從之以邯為護羌校尉趙沖順帝時為武威太守永和六年擊鞏唐羌降二千餘人詔沖督河西四郡兵為節度漢安元年以沖為護羌校尉沖招懷叛羌多詣沖降唯燒河種三千餘落據參䜌北界三年沖擊諸羌斬首四千餘級詔沖一子為郎沖復追擊于河陽斬首八百級于是諸羌前後三萬餘户詣涼州降建康元年復追叛羌于建威鸇隂河遇羌伏兵與戰殁沖雖身死而前後多所斬獲羌由是衰耗蘇正和靈帝光和間為涼州從事時武威太守倚恃權藝恣行貪橫正和案致其罪刺史梁鵠畏懼貴戚欲殺正和以自解訪之漢陽長史蓋勳勳素與正和有隙或勸勳因此報之勳曰謀事殺良非忠也乘人之危非仁也乃諌止之張奐字然明燉煌酒泉人延熹中拜武威太守平均徭賦率厲散敗常為諸郡最河西由是而全其俗多妖忌凡二月五月産子及與父母同月生者悉殺之奐示以義方嚴加賞罰風俗遂改百姓為立祠三國魏張既字德容髙陵人文帝初涼州盧水冦反河西大擾帝曰非既莫能安涼州乃以既為刺史既至金城遂渡河賊拒軍于鸇隂口既揚聲軍從鸇隂潛由且次出至武威冦以為神引還顯美既據武威遂前軍顯美寇騎數千因大風欲放火燒營既夜藏精卒三千為伏使餘騎挑戰陽退誘敵因發伏兵首尾進擊大破之封西鄉侯酒泉蘇衡反攻邊縣既擊降之遂上疏請治左城築障塞置烽候邸閣以備邊後西平麴光殺其郡守既曰光等造反郡人未必悉同乃檄告諭諸羌黨斬送光首其餘安堵既臨二州十餘年惠政著聞卒諡肅侯徐邈字景山燕國薊人明帝時為涼州刺史護羌校尉河右少雨常苦乏穀邈上修武威酒泉鹽池以收虜穀又廣開水田募貧民佃之家家豐足倉廩盈溢乃支度州界軍用之餘以市金帛犬馬通供中國之費立學明訓禁厚葬斷淫祀進善黜惡風化大行西域流通荒戎入貢賞賜散與將士與西羌從事不問小過若犯大罪先告部帥乃斬以徇由是州界清肅晉馬隆字孝興東平平陸人武帝咸寧五年涼州刺史楊欣為樹機能所沒河西斷絶帝每有西顧之憂臨朝歎曰誰能為我討此通涼州隆進曰臣能平之請募勇士三千人率之鼓行而西賊不足滅也許之乃以為武威太守隆募能引弩三十六鈞弓四鈞者立標簡試得三千五百人帝又給其三年軍資隆西渡溫水樹機能等以衆萬計乘險設伏隆依八陳圖作偏箱車地廣則為鹿角列營地狹則為木屋施于車上且戰且行弓矢所及應絃而倒竒謀間發出敵不意賊以為神轉戰千里音問斷絶或謂已殁後隆使夜到帝撫掌歡笑詰旦召羣臣謂曰若從諸卿言無涼州矣詔假節宣威將軍隆到武威鮮卑歸附涼州遂平張軌字士彥安定烏氏人永寧初軌以時方多難隂有保據河西之志求為涼州刺史時鮮卑入冦軌討破之威著西州時天下既亂所在使命莫有至者軌遣使貢獻嵗時不替進拜鎮西將軍都督隴右諸軍事封霸城侯張實字安遜軌之子建興初除西中郎將領護羌校尉軌卒長史張璽等表實攝父位詔為都督涼州刺史西平公涼州軍士得璽文曰皇帝行璽獻於實僚屬皆賀實曰是非人臣所得留因送于京師隋樊子蓋字華宗廬江人煬帝時為武威太守蒞官明察下莫敢欺以善政聞五年車駕西巡將入吐谷渾子蓋獻青木香以禦瘴氣及帝還謂曰人道公清定如此否子蓋謝曰臣安敢清止是小心不敢納賄耳加右光祿大夫子蓋曰願奉丹陛帝曰公侍朕側一人而已委以西方則萬人之敵宜識此心六年除户部尚書是嵗處羅可汗及髙昌王欵塞復以子蓋檢校武威太守應接二蕃後以疾卒於東京武威吏民聞其死莫不嗟痛立碑頌德宋丁惟清太宗時以殿直往涼州市馬惟清至而境大豐稔因為西人請留命知西涼府事咸平六年李繼遷陷涼州府惟清死之明濮英涼州衛指揮使洪武初修葺城樓倉庫措置有方士卒不勞而事集郡稱智能以擒叛賊功升右軍都督僉事掌行都司事劉林涼州衛百户洪武時土官逃叛攻掠涼州林擊賊至城西土臺力戰而沒事聞上喜其忠勇遣祭於臺下江亨洪武十年以涼州衛千户防守古浪繕城陴創驛傳始立莊浪衛屯住之所張傑洪武中任永昌指揮僉事開設衛治修築城池建學宫興文教措置有方馬昭遵化人鎮番守備纍功升都閫成化間展城開學修衛治建鐘鼓樓一切規制創造居多勇而善戰入陳有飛撾能掣寇於百步外人呼為馬撾陳亡敕封鎮國將軍王孟顔神木人崇禎九年任大靖營參將招壯丁汰老弱購備戰馬三百餘匹修築邊牆百餘丈開墾酸茨溝荒地本城及夾山堡廂井造窖以便民汲皆有益於地方十年套虜入寇提兵堵截斬級奪馬自是不敢犯境寧夏府唐裴識聞喜人度之子為靈武節度使靈武斥鹵識禱神而鑿之果得泉路嗣恭京兆人朔方節度使靈武初復戎落未安思恭披荆棘立軍府威令大行崔知溫字禮仁許州鄢陵人仕為左千牛遷靈州司馬境有渾斛薩萬帳數擾齊民知溫表請徙河北疏十五上始得請自是人得就耕渾斛薩至徙地顧善水草亦忘遷後入朝過州謝曰初徙且怨公今地膏腴衆孳夥更荷公恩皆再拜五代張希崇薊州人後唐明宗時靈武節度使靈武接邊境戍兵餉道常苦抄掠希崇乃開屯田教士耕種軍以足食而省轉饋明宗下詔褒美希崇撫養士卒招輯部落自回鶻瓜沙皆遣使入貢尋鎮邠寧晉髙祖入立復拜靈武節度為將不喜聲色好讀書知星歷天福三年月掩畢口大星希崇嘆曰此邊將亡兆我其當之明年正月卒贈太師馮暉魏州人靈武節度使靈武自唐明宗以來市馬糴粟招來部族給賜軍士嵗用度支錢六千萬自關以西轉輸供給民不堪役青岡土橋氐羌剽掠商旅暉至推以恩信止息爭奪廣屯田以省轉餉出俸錢治倉庫亭館民不加賦管內大治段思恭澤州晉城人天福中馮繼業自靈州舉家來朝帝以思恭代知州事思恭下車矯繼業之失綏撫部落訪求民病悉條奏免之宋董遵誨涿州范陽人太宗即位以通逺軍使兼領靈州路巡檢夏人有剽掠靈武進奉使者遵誨部署帳下欲討之夏人懼盡歸所掠伏罪遵誨慰撫令去自是各謹封界秋毫不敢犯安守忠字信臣晉陽人太平興國初知靈州在官凡七年雍熙二年知夏州每西羌犯邊戰無不捷侯贇太原人太平興國中知靈州按視蕃落宴犒以時得邊士心部內大治遷左衛在朔方凡十餘年帝念其久次求可代者而難其人田紹斌汾州人至道元年充靈州馬步軍都部署入番討賊斬獲無算以馬給諸軍之缺者捷聞手詔嘉諭之王昭逺冀州阜城人至道中李繼遷擾西鄙絶靈武糧道太宗命昭逺為靈州路都部署護二十五州芻粟徑達靈武繼遷不敢犯郭密貝州經城人淳化中夏人冦邊以密有武略擢靈州兵馬都部署訓練士卒號令嚴肅夏人畏服邊境寧謐楊瓊汾州西河人至道初為靈慶路副都部署河外都巡檢使賊纍冦疆瓊固捍有功導黃河溉民田數千頃敗賊於合河鎮北又破賊於城下追北三十里賜詔嘉諭充靈環十州軍副都部署兼安撫使曹燦字韜光靈夀人至道初知靈州徙河西鈐轄善撫士卒威愛兼著元郭守敬字若思郉臺人至元元年從張文謙行省西夏提舉河渠先是古渠在中興者一名唐來長四百里一名漢延長二百五十里他州正渠十皆長二百里支渠大小六十八灌田九萬餘頃兵亂以來廢壞淤淺守敬更立閘堰皆復其舊夏人賴之遂立生祠以祀張文謙字仲謙郉州沙河人至元初以中書左丞行省西夏中興等路羌俗素無統紀文謙得蜀士陷俘中者數人理而出之使習吏事旬月間簿書有品式子弟亦知讀書俗為一變浚唐來漢延二渠及夏靈應理鳴沙四州正渠十支渠大小共六十八溉田十數萬頃人蒙其利董文用字彥材稿城人至元初為中興等路行省郎中自渾塔罕之亂民間相恐動竄匿山谷文用鎮之以靜民乃安始開唐來漢延秦家等渠墾水田若干於是民之歸者户四五萬悉授田種頒農具更造舟置黃河中受諸部落及潰叛之來降者袁裕洛陽人至元八年以御史授西夏中興等路安撫副使時徙鄂民萬餘於西夏裕與安撫使獨吉請於朝計丁給地立三屯使耕以自養官民便之明盧茂成化間以都指揮守備靈州驍勇兼人到任之二日敵以百騎來犯茂單騎馳突之俄敵漸衆而茂兵亦至奮呼一擊斬其犯陳一將餘遁去數嵗不敢近靈州邊吳福鄞縣人寧夏參政寧夏鹽池禁嚴民食鹽甚艱福奏許民納鹽課官為量給民甚便焉秩滿升福建布政使袁旦大名府人隆慶五年任西路通判涖政清勤建議築邊垣濬渠壩王三錫翼城人萬厯三十五年任寧夏理刑同知案無留牘尤加意水利請於巡撫崔景榮石甃張政堡暗洞蕭如薰延安人任平羅參將劉東暘之反起於倉卒熊國臣等棄城匿河西望風而靡獨如薰堅守力拒偽將哱雲引著力兔來攻如薰伏兵射雲死九月八日如薰與李如松等以鋭卒擊南關雲梯攀緣而上城遂下以功加都督同知歷官總兵貞亮不渝更多修創之功杜希伏由延綏入籍寧夏世承武功歷興武逰擊平羅參將寧夏中協副將恢復四城擒斬六王屢獲竒捷亷勇著聞興武平羅至今皆建有生祠升湖廣安陸府總兵韓洪珍四川人天啓七年任西路同知威寧舊有七星渠嵗久荒淤洪珍與屯田守備王光先條列疏築之法上諸巡撫焦馨以百户李國柱劉宰分督之而専任洪珍綜其事靳桂香靈州參將明季無為教稱居士作亂夜入城殺河東道曹孟吉時桂香已謝事乃率衆守城門使賊不得出盡攻殺之劉謹身河南人明末任西路同知督修渠工剔除姦弊招選義勇保障城池皇清黎士𢎞字愧曽長汀人時吳逆煽亂西秦震動擢洮岷道副使署甘山道事王輔臣叛諸鎮會𠞰及復蘭州攝臬篆分别失守官吏罪號為平允會寧夏營辨謀逆殺提帥改授寧夏道佐提督張勇贊畫軍機申嚴守禦綏靖反側又密請免衛所逋糧七萬五千石冦平敘功升右參政丹達禮滿州人康熙二十七年任寧夏道時大兵駐防在城民心惶惑逹禮多方慰諭更詳督撫割城中一隅安置大兵勿與民間雜處嚴立教條以免滋纍其後大兵駐寧者六悉如舊制兵民相安皆逹禮之力也當兵馬雲集時需草甚多逹禮親督人夫採於湖灘不事科斂調度有方亦省公費軍馬亦給又督濬渠工修理廟學皆著善政去二十年後士民猶思之西寧府漢任尚安帝元初間任中郎將屢破西羌先零狼莫零昌又降西河虔人種羌萬餘口平隴右晉馬隆字孝興東平平陸人太康初朝廷以西平荒毁除隆為太守時南虜成奚為邊患隆至虜據險拒守隆令軍士皆負農器若將田者虜備稍怠因進兵擊破之畢隆之政不敢為冦積十餘年威信振於隴右隋梁毗字景和安定烏氏人文帝仁夀元年為西寧州刺史先是蠻夷舊俗酋長皆服金冠以金多者為豪俊遞相陵奪略無寧嵗毗患之後因諸酋長相率以金遺毗毗置金坐側而謂之曰此物飢不可食寒不可衣汝等以此相滅不可勝數今將此來欲殺我耶一無所納于是蠻夷感悟遂不相攻在州十一年帝聞而喜之徴為大理寺卿唐黑齒常之百濟西部人髙宗儀鳯時以功擢河源軍副使調露中吐蕃使贊婆等入冦屯良非川李敬玄之敗常之引精騎三千夜襲其軍贊婆等單騎遁即拜經略大使常之因建言河源當賊衝宜增兵鎮守而運餉須廣乃斥地置烽七十所開田五千頃嵗收粟斛百餘萬由是食衍士精戍邏有備凡蒞軍十年吐蕃憚畏不敢窺邊杜希望萬年人開元間拜鄯州都督破烏莽城鎮西威震吐蕃時軍屢興府庫虛寡希望居數嵗芻粟金帛豐裕皇清楊宗仁字天爵奉天正白旗人由湖廣藍山知縣卓異擢知階州州近生羌出沒晝劫行旅宗仁抵任連堡塞謹斥堠嚴緝捕羌夷斂迹商賈安行遷同知臨洮府事監收蘭州鎮逺橋商稅時值嵗歉請發倉廩以賑飢民減稅額恤商賈招流亡實户口循良之譽著於逺近上官有疑獄輒委治發姦摘伏民頌神明雍梁多盜老瓜隂賊尤為民害因讞他獄發案百餘皆為窮治又慮有司失察被譴取百餘事彚為十案悉置諸法盜風頓息而有司亦全遷知臨洮府率屬安民政績尤著尋擢西寧道寧古湟中地西陲要衝振頺剔弊賢聲著聞升浙江按察使歷仕至湖廣總督晉太子少傅卒贈少保諡清端直𨽻秦州漢馬成南陽人世祖封平舒侯從世祖征破隗囂以成為天水太守明年代來歙守中郎將率劉尚等下河池遂平武都陳立臨卭人為天水太守勸民農桑為天下最賜金四十斤入為左曹衛將軍護軍都尉晉陳安隴上人懷帝永嘉五年為中軍都尉守上邽有膂力左揮八尺大刀右揮丈八蛇矛後與將軍平先戰大雨泥深三尺奪其刀矛被執於澗曲殺之安善撫將士與同甘苦及死隴上思之為作壯士歌以悼之胡烈字武元臨涇人泰始中為秦州刺史初鄧艾納鮮卑降者數萬雜居雍梁間傅玄上疏言艾不慮後患使散居山谷此必為害胡烈素有恩信於西方令往必且消弭然獸心難保不可必久安若東入安定西赴武威此二郡非烈所制宜並屬秦州令烈得専御邊之宜及涼州叛烈屯於萬斛堆為虜所圍無援遇害杜預字元凱京兆杜陵人時虜冦隴右除預秦州刺史領東羌校尉輕車將軍假節屬虜兵強盛安西將軍石鑒使預出兵擊之預以虜乘勝馬肥而官軍懸乏宜并力大運須春進討陳五不可四不須鑒怒劾奏徴詣廷尉論贖其後隴右之事卒如預䇿南北朝王子直字孝正杜陵人正光中為秦州總管司馬以德政化人西土悅附劉藻字彥光廣平易陽人魏太和中為秦州刺史秦人率恃險拒課輸或害長吏前守宰皆依州遙領不入郡縣藻開示恩信誅鋤豪橫羌氐憚之守宰於是始得居舊治車駕南伐以藻為東道都督秦人紛擾詔藻還州人情乃定裴邃字深明河東人為秦州刺史大開屯田數千頃倉廩盈實省息邊運人吏獲安乃相率遺邃絹千餘匹邃從容曰汝等不應爾吾又不可逆止納其二匹張彛字慶賓清河人宣武中除安西將軍秦州刺史羌人憚其威一方肅靜號為良牧邢巒字洪賓河間人有文才幹略拜持節梁秦二州刺史拓地定境東西七百里南北千里獲郡十四及諸縣戍北齊韓軌字伯年太安人齊神武時為秦州刺史甚得民神武巡秦州欲軌還京師賜秦州城户人絹布二匹州人皆辭不受惟乞留軌神武嘉歎許留南齊王玄邈字彥逺太原祁人升明中為秦州刺史齊建元初李烏奴作亂襲州城玄邈率兵破之髙帝聞之曰玄邈果不負吾周獨孤信雲中人大統中除隴右大都督秦州刺史先是守宰暗弱政令乖方人有寃訟歷年不能斷決及信在州事無壅滯示以禮教勸以耕桑數年中公私富實流人願附者數萬家周文以其信著遐邇賜名為信岷州刺史梁企定反及涼州刺史宇文仲和據州不受代信皆破平之以功增封宇文導皓仲子獨孤信東下令導代信為秦州刺史導性寬明善撫御文帝每出征導恆居守深為吏人所附朝廷重之薨於上邽朝議以導撫和西土威恩顯著欲令世鎮隴右以彰厥德乃葬上邽城西中外會葬者萬餘人唐蕭瑀後梁明帝子徙長安為河池郡守有鈔賊萬人吏不能制瑀募勇敢士擊降之又擊走薛舉衆數萬髙祖授光祿大夫封宋國公薑謨上邽人武德初擢秦州刺史帝曰昔人稱衣錦還故鄉今以本州相授所以賞功涼州荒梗宜有以靖之謨至撫邊俗以恩信盜賊衰息人喜曰不意復見太平官府郝廷玉李光弼將纍為秦州刺史善訓練羌人不敢犯五代崔繼勳字成績長社人後晉天福中為秦州觀察使推恩信設方略以招誘諸部羌人相率奉牛酒請盟邊境以安宋劉熙古字義淳寧陵人乾德中知秦州州境與羌接熙古至諭以朝廷恩信取蕃部酋豪子弟為質邊鄙以寧宋璫字寶臣華州人太宗時知秦州有善政就拜監察御史充陜西轉運使以韋亶代之璫去州未百日亶坐事繫獄上念璫治績命再知州事安集諸羌部內清肅馮伉雍熙中州推官州民李益饒于財恣橫不法賂權貴為庇護長吏而下皆畏之獨伉不從益遣僕數輩毁辱伉伉屢表其事為邸吏所匿後因市馬驛者附表以聞帝怒詔知州吳元載逮捕具得其狀誅之溫仲舒字秉陽河南人淳化四年知秦州州雜羌戎有兩馬家朵藏梟波等部唐末以來居於渭河南大洛門小洛門寨多産良木為其所據嵗調卒采伐給京師必以資假道於羌户猶不免攘奪甚至殺掠為平民患仲舒至部兵歷按諸寨諭其酋以威信諸部獻地內屬既而悉徙其部落於渭北立堡寨以限之民感其惠為畫像祠之曹瑋彬之子知秦州有德澤於民秦人立碑紀功曹琮字寶章彬之子知秦州度羡材為倉廩大積穀於渭冀城以恩信懷生羌多請內屬寶元中元昊反復知秦州上攻守禦三䇿馬知節字子元薊人咸平初知秦州州嘗質羌酋支屬二十餘人踰二紀矣知節曰羌亦人耳豈不懷歸悉遣之羌懷其德訖任更不犯塞時州有銀坑嵗久礦竭課額弗除主吏破産償之不足知節請蠲之章三上得允文彥博汾州介休人知秦州有威名夏人不敢犯王隨字子正河南人乾興中知秦州秦卒有負罪逃入蕃部者戎人輒奴畜之小不如意復執出求賞前此坐法多死隨下教能自歸者免死聽復𨽻軍籍由是來歸者衆又建請增蕃落卒給廢陷馬地募民耕種梁適字仲賢東平人知秦州古渭初建寨間為屬羌所抄益兵拒守羌復驚疑適召諭其種人且罷所益兵羌人不為患吕公綽字仲祐夀州人知秦州安逺寨古渭州諸羌來獻地公綽顧其屬曰天下之大豈利區落尺寸地耶時弓箭手馬多闕公綽諭諸寨户凡十丁為社秋成募出金帛市馬馬少則先後給之唐肅字叔元錢塘人秦州司理參軍有商人遇逆旅而同宿者殺人亡去商人夜聞人聲往視之血濺其衣捕吏執赴州獄已具肅為伸其寃後數月果得殺人者韓琦安陽人知秦州兼秦鳯路經略招討使增廣州城招集屬户厲兵討賊訖琦去賊不敢犯王拱辰字君貺咸平人帥秦州威恩並用羌人信服尹洙字師魯河南人韓琦知秦州辟洙通判州事薦其才可用加直集賢院上奏命令數更恩寵過濫賜與不節三事仁宗嘉納余靖字安道曲江人知秦州教條分明以治最聞薛奎絳州人知秦州州宿重兵經費常不足奎務為儉約教民水耕嵗中得芻粟數十萬徙知益州秦民與夷落數千人列奎治狀請留璽書褒諭不許李參字清臣鄆州須城人以樞密直學士知秦州藥家族作亂討平之得良田五百頃以募弓箭手居鎮閲嵗未嘗以邊事聞英宗遣使問故對曰將在邊期於無事而已不敢妄以寇貽主憂參剛果嚴毅事至即決雖簿書纎悉不遺稱才能吏孫永字曼叔長社人知秦州王韶以布衣入募府建取熙河䇿永折之曰邊陲方安靜無故騷動恐變生不測會新築劉家堡失利衆請戮偏禆以塞責永曰居敵必爭之地軍孤援絶兵法所謂不得已而守者也尤人以自免於我安乎李及字幼幾鄭州人知秦州議者以及謹厚非守邊才及至州州將吏亦頗易之會有禁卒白晝攫婦人金叉於市吏執以來及方坐觀書召前詰問其人服罪及亟命斬之觀書如故將士驚服王令圖太原人至和中以殿中丞為河池令時值開河會議河去縣四十餘里部屬陜西移文令圖通幹其事自秋七月至八月路已通功告訖下詔旌之李周字純之馮翊人嘉祐五年知河池公正嚴毅沉晦自匿未嘗私謁執政李師中字誠之楚丘人知秦州以持重總大體自處前此多屯重兵於境冦至則戰而內無以遏其入師中簡善守者列塞上而使善戰者居中令冦至堅壁固守須其去出戰士尾襲之約束既熟常以取勝張詵字樞言建州浦城人知秦州號令嚴肅前此將吏貪功多從羌地射獵因起邊患詵至申令毋得犯得一犯者斬諸境上羣羌感悅吕大忠字進伯藍田人元祐初知秦州時郡糴民粟豪家因之制操縱之柄大忠選寮寀自旦入倉雖升斗亦受不使有所壅閼民喜爭運粟於倉負錢而去得百餘萬斛馬涓以進士舉首入幕府自稱狀元大忠謂曰狀元云者及第未除官之稱也既為判官則不可今科舉之習既無用修身為已之學不可不勉又教以臨政治民之要涓自以為得師焉謝良佐上蔡人秦州教授州守吕大忠每過之聽講論語必正襟斂容曰聖人言行在焉不敢不肅何常字德固京兆人知秦州諜告夏人多築堡柵朝議欲出兵牽制常言羌人生長射獵今困於版築違其所長而用其所短可拱手以待其敝也從之羅拯知秦州築東西二城姚祐字伯受長興人知秦州或請調熙河弓箭士徙邊以省更戍祐謂人情懷土重遷丐以二年為更發之期滿嵗樂業而願留者乃聽且請擇熙秦富民分丁授地蠲役借糧以勸耕植益廣秦之東西川建城壁嚴保障以控熙河涇原皆從之葉康直字景溫建州人元祐中知秦州時築井谷城成夏人侵之康直戒諸將設伏以待殱其二酋自是不敢犯境張浚廣漢人紹興初以川陜宣撫使置幕府于秦州至即出行關陜訪問風俗罷斥姦贓以搜攬豪傑為先務劉韐字仲偃崇安人知隴城以亷稱後使金死節子子羽參議張浚軍事駐秦州有方略狄訷元祐間知隴城寨綽有聲績趙鼎聞喜人徽宗時為兩當尉自筮仕時立志逺大後為中興賢相陳佃簡州人紹興二十二年自朝奉大夫知河池不為煩苛有古循良風常盛暑遣囚歸各感恩如期而至董彥威紹興中河池尉愷悌愛民一日盜至邑人大震彥威不恐懾徐遣兵盡捕之元田守璋大德二年徽州管軍元帥副使以驍勇見稱洞悉民艱軍民依賴張仲文大德中徽州管軍參議元帥善騎射務廣恩信勸民農桑建倉備荒軍民懷德明邵毅河南中牟人洪武中知清水剛果無私吏畏民服擢御史祀名宦劉德直𨽻人知清水重修城池創建縣治學校廟宇公署鋪舍正經界編里甲廖森兩當主簿元末縣內衙舍廢弛洪武七年森于舊基創建縣治公署始備又同訓導蔣慶于縣治東創建儒學諸生肄業始得其所士民稱頌傅鼐字天和直𨽻新河人成化間秦州知州嚴以涖政平以近民除淫祀戒逰食重農申教祛災弭盜凡學校館舍壇壝橋梁以次修葺常上疏言救荒弭亂二十事言皆剴切得旨如議行秦人便之宋珍字廷瑤深州人成化間知秦安性最孝母嘗怒杖珍珍跪而受邑人感嘆一日有風過堂下不去珍謂曰若有事白我盍我前風前就席至夜方寐如有前聲寃者于是遍境內體之果得殺人者置於理人以為亷明所致學校堂齋多所修建任五載曾不受囑人或有所贈遺略不省視却之後卒于官荆琨猗氏人嘉靖間清水縣訓導凡五載教士禔躬如出一日雖雨雪晏晦未嘗不整襟危坐捐所得俸補葺廟學治爼豆爵罍始倡明道之學萃諸生于官舍講習之清士始彬彬可觀天旱琨出米數十石賙貧士之不給者王忠顯山西澤州人萬厯十七年知清水甘淡薄注意民瘼興利除害嘗以息訟諭民兩造庭質唯決是非而已百姓戴如父母升南京户部主事朱廷彰晉藩宗室明末鞏昌判官署秦州事亷介剛直頗有聲政李賊至被執擁見賊帥叱之跪廷彰正色曰我天朝宗室可拜賊乎頭可斷膝不可屈賊猶欲生之大呼曰今日此來只須一死正襟危坐神色自若遂見殺朱呈瓘宗室明末知秦安邑處邊衝城守無具賊陷城縶至伏羌脅令賺城呈瓘呼告伏羌令曰諸君宜堅守勿降吾忍辱至此蓋欲知死所耳言訖罵賊連呼速殺我賊遂殺之伏羌卒嚴守不得下向永鳯禮店所副千户嘉靖甲午階州鐵甲山賊肆劫永鳯與戰追至麒麟山賊曰我貽若金帛盍兩生之永鳯叱曰何物賊敢以金帛餌我殱賊我分也因奮擊之射二賊死將復射弓忽弛軍曰可少却永鳯曰戰而却畏死耶復與力戰死之事聞擢其子元吉為正千户元吉忠勇有父風直𨽻階州漢孔奮字君魚茂陵人建武中以守姑臧清亷仁賢召除武都郡丞時隴西餘賊隗茂等夜攻府舍殘殺郡守畏奮追擊執奮妻子欲以為質奮惟有一子終不顧遂窮力討之吏民感義用命又率厲氐豪齊鍾留等共相遮擊賊窘懼逼急乃推奮妻子置軍前冀奮退却奮擊之愈厲遂擒滅茂等奮妻子亦為其所殺世祖下詔褒美拜武都大守為政明斷甄善疾非見有美德愛之如親其無行者忿之如讐郡中稱為清平虞詡字升卿陳國武平人永初間羌冦武都鄧太后以詡有將帥略自懷令遷武都太守羌衆遮詡於崤谷詡宣言請兵須到當發羌聞之乃分抄旁縣詡因日夜兼行令吏士各作兩竈日增之羌不敢逼或問之詡曰孫臏昔示弱吾今示強勢固不同既到郡兵不滿三千羌衆萬餘攻圍赤亭詡乃令軍中使強弩勿發而潛發小弩羌以為矢弱并兵急攻詡於是使強弩迸射發無不中羌退詡因奮擊之明日陳兵令出東郭入北郭易衣數周羌恐動乃潛伏兵於淺水候其走因掩擊大破之詡乃築營壁招流亡假貸貧乏郡遂以安先是運道艱險詡案行川谷由沮至下辨數十里燒石翦木開漕船道於是水運通利嵗省四千餘萬詡始到郡户裁盈萬二年遂增至四萬餘户趙沖順帝永和六年以沖為武都太守時唐羌內侵沖破之領西河四郡兵李翕字伯都漢陽阿陽人靈帝時仕武都太守屢致嘉瑞建寧四年開天井道西狹石路民為磨崖刋頌於魚竅峽三國魏楊阜字義山天水冀人建安中遷武都太守阜威信素著徙郡小槐里百姓襁負隨之為政舉大綱而已下不忍欺也在郡十餘年徴拜城門校尉南北朝魏髙允渤海人為中書侍郎從征楊難當禁暴止殺秦人更生隋楊文思字溫才華隂人周天和初行武都太守歷平十姓黨項羌及東山獠并破之五代郭瓊平州盧龍人後唐清泰初刺史階州城壘未葺蜀人屢冦瓊徙城保險民乃無患受詔攻文州拔二十餘寨生擒數百人晉天福中為朔方部署將兵平羌渾王𢎞贄太原人後唐時階州刺史到任增户二千餘復請置將利福津二邑詔褒之宋牛逄源淳化初知同谷簡靖自持治民敦尚禮教李公璹祥符中知階州州東北峪河水為患公璹命工鑿臥龍岡回河勢使東南流導水入江宇文之邵字公南綿竹人為文州曲水令嵗飢轉運使以布絹髙其價使鬻於民之邵言地狹民貧耕者亡幾况嵗方儉羌數入冦不可重困之以求利因忤運使遂乞致仕神宗即位求言上疏不報遂致仕司馬光曰志不行顧祿仕如錙銖道不同視富貴如草芥於之邵見之家願字處厚眉山人崇寧初以元祐黨人謫監華州西嶽廟禁錮十年大觀間禁解通判文州郡守鄭行純憑內侍勢自恣罷互市啓邊釁願爭之不從徑下令復其舊守怒交章互奏俱報罷蒲卣字君錫閬州人通判文州有獻議者欲開文州徑路達陜西卣言洮岷積石至文為甚邇自文出江油鄧艾取蜀故道也異時鬼章欲從此窺蜀為其阻隘而止夏人覘此久矣可為之通道乎議遂塞蘇宷字公佐滏陽人為利路轉運使文州嵗市羌馬羌轉買蜀貨猾駔上下物價肆為姦漁寀議置折博務平貨值以易馬宿弊頓絶劉鋭知文州嘉熙元年元兵來攻鋭與通判趙汝嚮乘城固守率軍民晝夜搏戰殺傷甚多拒守兩月餘援兵不至城中無水取汲於江敵知虛實遂增兵攻城甚急一夕移江流數里外鋭度不免乃盡飲家人以藥幼子同哥才六嵗飲藥時猶下拜受之鋭聚尸及告命焚之鋭及二子登文王臺自刎死軍民死者數萬趙汝嚮宣城人通判文州北兵圍城與劉鋭相誓死守更迭出戰及被圍旬有六日汲道絶兵民水不入口者半月至吮妻子之血卒無叛志城垂陷汝嚮猶提雙刀入陳中十六矢被執汝嚮善射敵先斷其兩臂而後臠殺之明陸𢎞洪武初為階縣令時兵燹後創建之績居多凡公署壇宇橋梁鋪舍煥然改觀簡原輔四川人洪武十年任階州建磚城招撫流亡審徭編户無不均平大有造於階張竒河南商水人自望江縣遷知階州亷介正直政事聿修階有巨豪數人悉繩之以法及歸囊橐蕭然惟圖書數卷而已崔尚義直𨽻長垣人嘉靖十六年知階州雅尚儉素取豫不茍尤嫻刑名凡有勘斷援筆立就未嘗假手于人升臨洮同知復攝州事鮑德字子慎雁門人嘉靖二十七年知階州邊警方殷嵗復大旱調兵食起餓莩全活者衆龍江暴漲捐俸修橋民免墊溺田輔西安衛人嘉靖二十九年守備文縣創立堡寨謹烽火嚴邊禁申軍法募勇敢時訓練在任二年番人不敢犯邊蔡思和湖廣攸縣人萬厯間知階州通水利開山壕凡強辨豪猾必置以法孤寒貧弱則撫翼之惟恐不盡力升敘州府同知州人立祠豎碑謝鏞字禹銘順天良鄉人崇禎九年知成縣值兵燹之餘官無宅舍民多流亡殘垣危堞整頓無資鏞設法防禦率民人上城繕城池建廨宇撫殘復業督耕勸墾暇則訓士習射有警即佩劍巡緝更募壯丁以習戰儲火器以設防戊寅巳卯間萬賊壓境率民固守賊不敢犯又倉卒定計以解徽危而徽亦無虞兩署徽州皆綏戢得所皇清毛洪麟山西夏縣人吳逆之變以軍功授秦州知州改授階州康熙十五年階州復陷退守階西之岡旗寨征繕扞圉不憚勞苦十八年冬大兵入境糧草甚亟居民逺竄多方措處供應不匱招流移通商賈旋以夫驢之役約費萬金力請豁免又請蠲免荒糧三千八百餘石民屯亡丁一千有餘胥幸更生有頌德碑直𨽻肅州漢辛武賢狄道人宣帝神爵中為酒泉太守時先零羌楊玉等反趙充國至金城欲俟虜疲極乃擊之武賢奏言郡兵皆屯備南山北邊虛空勢不可久可益馬食以七月上旬分兵並出張掖酒泉合擊罕开在鮮水上者天子下其書公卿議以為是上乃拜武賢為破羌將軍賜璽書嘉納其䇿子慶忌亦徙酒泉太守戴宏字元襄濟北剛縣人吳祐遷膠東侯相時宏父為縣丞宏從在舍祐每行園嘗聞諷誦之音竒而厚之遂與為友卒成儒宗知名東夏官至酒泉太守翟酺字子超廣漢雒縣人延光三年出為酒泉太守叛羌千餘騎徙敦煌來抄郡界酺赴擊斬首九百級羌衆幾盡威名大震後遷京兆尹三國蘇則字文師扶風人少以學行聞舉孝亷茂才起家為酒泉太守轉安定武都所在有威名唐公孫武逹京兆櫟陽人貞觀初為肅州刺史突厥入冦謀南趨吐谷渾武逹以精兵二千人與戰敵稍却復殊死鬭薄之張掖河潛命上流渡兵俟半渡乃兩岸夾擊斬溺略盡璽書勞之遷左監門將軍明曹贇任肅州衛千户本衛城旱地千餘頃贇於洪武二十七年創開溝渠逺引河水灌溉居人咸獲其利至今賴之鍾振任肅州指揮使正統二年北兵犯邊赴敵而死西域漢張騫漢中人武帝建元中以郎應募使月支十餘嵗騫持漢節不失因得窮河源還拜大中大夫由是西國遂通封騫博望侯元狩四年騫使西域是時胸奴渾邪王降漢元鼎六年分酒泉武威之地置張掖敦煌為河西四郡𨽻涼州部崔不意濟南人元封六年為魚澤尉教力田以勤效得穀因即魚澤障立縣名為效穀鄭吉會稽人以卒伍從軍數出西域由是為郎宣帝時吉以侍郎田渠黎積穀因發諸國兵攻破車師遷衛司馬護鄯善以西南道神爵中丐奴乖亂日逐王欲降漢吉發渠黎龜兹諸國五萬人迎之詣京師封日逐為歸德侯吉既破車師降日逐威振西域遂并護車師以西北道故號都護都護之置自吉始於是中西域立幕府治烏壘城都察烏孫康居等三十六國漢之號令始得頒西域馮奉世字子明上黨潞人元康初烏孫有擊胸奴功而西域諸國新輯帝欲安之以奉世為衛侯使持節送大宛諸國客至伊修城會莎車叛漢從鄯善以西皆絶不通奉世遂以節諭告諸國王因發其兵南北道合萬五千人擊莎車攻拔其城莎車王自殺傳其首詣長安諸國悉平威振西域奉世至大宛大宛聞其斬莎車王敬之異於他使得其名馬象龍而還上甚悅以為光祿大夫陳湯字子公山陽瑕丘人元帝建昭元年湯為西域副校尉為人沉勇有大慮多䇿謀喜竒功時郅支自以大國又乘勝驕不為康居王禮困辱漢使者湯乃矯制發兵與都護甘延夀襲擊斬之傳首至京師懸稿街十日竟寧元年封湯爵關內侯竇固字孟孫平陵人永平十五年以固嘗從其父融在河西明習邊事乃以固為奉車都尉同駙馬都尉耿秉將兵屯涼州十六年分道出擊羌夷固與耿忠率張掖酒泉敦煌甲卒及盧水羌人出酒泉塞至天山擊呼衍王斬首千餘級追至蒲類海取伊吾廬地置宜禾都尉留吏士屯田十七年復與耿秉及騎都尉劉張擊車師降之復置西域都護戊巳校尉班超字仲升平陵人永平十六年竇固擊胸奴超為假司馬超與從事郭恂俱使西域鄯善王廣奉超禮甚備後忽懈超疑必有北使詰侍者具服遂與吏士三十六人夜奔虜營順風縱火冦衆驚亂超格殺三人吏兵斬其使及從事三十餘級餘百人悉燒死明日以冦使首示廣廣遂納子為質復遣使于闐其王廣德禮意甚疏且信巫言求漢使騧馬以祠巫神令其相私來求馬超令巫自來乃斬巫而鞭其相廣德懼斬其冦使以降西域與漢絶六十五載至是復通十七年復與竇固執疏勒王兜題更立其故王子忠章帝建初元年留屯疏勒五年以平陵徐幹為假司馬將弛刑義從就超平西域八年復拜為西域將兵長史章和元年超發諸國兵擊莎車降之龜兹等兵各退散自是威震西域和帝永元二年遣兵至月支伏兵殺之月支由是遣使奉獻三年以為西域都護騎都尉六年討焉耆斬其王廣於是西域五十餘國俱納質內屬十四年以老乞歸耿恭字伯宗永平十七年恭以司馬為戊巳校尉屯後王部金蒲城恭至部示漢威德昆彌遣子入侍明年北單于擊殺車師後王安得遂攻恭恭以毒藥傅矢語胸奴曰漢家箭神其中瘡者必有異冦中矢者視瘡皆沸遂大驚會暴風雨隨雨擊之殺傷甚衆胸奴震怖相謂漢兵神乃解去恭引兵據疏勒城胸奴復來攻壅絶澗水恭於城中穿井向井拜禱有頃水泉奔出乃令揚水示虜遂引去十一月車師叛復與胸奴共圍之恭率勵士衆禦之數月食盡煮鎧弩食其筋革與士卒推誠同死生故皆無二心初關寵上書求救乃詔酒泉太守段彭等將兵救之章帝建初元年擊車師胸奴走車師復降軍吏范羌固請迎恭歸拜騎都尉三國魏倉慈字孝仁淮南人魏太和中敦煌太守抑挫權右撫恤貧羸民翕然稱其德惠數年卒於官吏民悲感圖畫其形南北朝令狐整字延保敦煌人魏大統十二年涼州作亂瓜州民張保殺刺史晉昌民呂興殺太守以應涼州整時為瓜州主簿保欲殺之以其人望恐失衆心雖外相敬內實忌之整陽為親附因使人説保使整將兵備東兵保從之整及玉門召豪傑述保罪狀馳還襲斬呂興進擊瓜州保奔吐谷渾衆議推整為刺史曰吾屬以張保肆逆亂恐闔州之人俱陷不義故相與討誅之乃復見推是效尤也乃推魏使者張道義行州事具以狀聞而帥宗族鄉里二千餘人入朝纍遷侍中申徽字世儀魏郡人先是元康為沙州刺史劉彥殺康而奪其位魏不能討因以為刺史屢徴不至大統十一年宇文泰以徽為河西大使密令圖彥徽以五十騎行既至止於賓館彥入謁徽執之因宣召慰諭吏民且云大軍續至城中無敢動者唐侯君集三水人貞觀四年為磧石道總管討吐谷渾約齎深入追及其衆於庫山大戰破之進會李靖大非川平其國十三年為交河大總管將兵擊髙昌拔其城降之分兵略定二十二地太宗以其地為西州置安西都護府郭孝恪許州人太宗時為安西都護貞觀十六年西兵來冦伊州孝恪擊敗之後復擊焉耆執其主而還蘇定方髙宗顯慶二年定方為前軍總管擊西突厥至曵嘻河西敗沙鉢羅兵冒雪兼行至其牙帳縱兵擊之斬獲又數萬沙鉢羅脫走趨石國定方於是息兵諸部各歸所居通道路置郵驛掩骸骨問辛苦畫疆埸復生業凡為沙鉢羅所掠者悉括還之百姓安堵如故乃命蕭嗣業將兵追沙鉢羅獲之分其地置崑陵濛池二都護府楊胄髙宗顯慶三年遣左領軍郎將雷文成送龜兹王布矢畢歸國龜兹大將羯獵顛發衆拒不納詔左屯衛大將軍楊胄發兵討擒誅之乃徙安西都護府於其國焉王孝傑新豐人初與劉審理擊吐蕃皆沒於吐蕃後竟得歸由是知吐蕃虛實會西州都督唐休璟請復取龜兹等四鎮中宗嗣聖九年乃敕孝傑及阿史那忠節將兵擊破之復取四鎮置安西都護於龜兹兵戍之後為總管與契丹決戰而死張孝嵩初為監察御史奉使廓州拔汗那者古烏孫也內附嵗久吐蕃攻之其王奔安西求救孝嵩率旁側戍落出龜兹西數千里下數百城傳檄諸國威振西域大食等八國請降勒石紀功而還杜暹濮陽人開元四年以監察御史按事至突騎施突騎施饋金暹固辭左右曰君寄身異域不宜逆其情乃受之埋於幕下已出境乃移狀令取之突厥大驚度磧追不及及開元十二年安西都護闕或言暹往使安西虜伏其清今猶慕思遂拜黃門侍郎安西副大都護守邊四年撫戎練士能自勤勵為夷夏所樂張守圭陜州河北人開元十五年為瓜州刺史時瓜州為吐蕃所毁守圭帥餘衆築故城板幹裁立吐蕃奄至衆失色守圭於城上置酒作樂虜疑有備不敢攻而退守圭縱兵擊之虜敗走於是乃修復城市招合流散使皆復故業朝廷嘉其功詔以瓜州為都督府即以守圭為都督髙仙芝本髙麗人從事安西驍勇善騎射纍官四鎮都知兵馬使天寶六載小勃律王及其旁二十餘國皆附吐蕃貢獻不入詔以仙芝為行營節度使討之仙芝遣將軍席元慶將千騎前行縛其大臣密諭之曰若酋領逃者第出詔書呼之賜以繒綵至皆縛以待我元慶如言仙芝繼至悉斬之又遣元慶斷娑夷橋仙芝虜小勃律王及其吐蕃公主自赤佛道而還上以為安西四鎮節度使袁光庭天寶末為伊州刺史伊州本漢伊吾廬地在敦煌大磧外唐置伊州吐蕃攻之纍年不下糧竭兵盡自焚死時不達音問者十五年德宗建中二年郭昕至朝廷始知之秋七月贈工部尚書郭昕子儀之弟為四鎮留後舊安西節度撫寧西域統龜兹于闐焉耆疏勒四國故謂之四鎮唐自吐蕃陷河隴伊西昕帥將士閉境拒守數遣使奉表皆不達德宗建中二年昕遣使間道自回紇中來上嘉之賜昕武威郡王張義潮沙州首領攝州事繕甲兵耕且戰略定其旁瓜伊西甘肅蘭鄯河岷廓等州宣宗大中五年遣其兄義澤奉十一州圖籍以獻於是河湟之地復入於唐詔置歸義軍於沙州以義潮為歸義節度使鎮之至懿宗咸通四年克復涼州八年入朝甘肅通志卷三十二
