body:
  text: 甘肅通志巻五十雜記齊諧志怪酉陽記雜遺言𤨏事採諺徵謠可廣見聞以資博洽遂仍舊志另列一巻并稽前代僭竊諸人附載於末志雜記古樂器琴伏羲氏斵木為琴綸絲為絃二十有七而音樂自是興或曰神農為五絃之琴桓譚以為文王加少宫少商釋知匠以為文王武王各加一絃是為七絃瑟通厯云伏羲氏作二十五絃之瑟世本云庖羲瑟五十絃黄帝使素女鼓瑟哀不自勝乃破為二十五絃呂氏春秋云朱襄氏使士達作五絃之瑟世紀云伏羲作瑟三十六絃蓋瑟屬隂故用十六之數都良管班管女媧氏命娀陵氏制都良之管又命聖女氏為班管合日月星辰名曰充樂玉律黄帝作以玉為管長尺六孔為十二音晉武帝時汲冡亦獲玉律尚書中候曰用玉為律東漢以玉律十二候氣先王之法也以六十律候氣葢京房之陋歟玉琯黄帝之時西王母獻昭華玉琯漢入闗中得秦府庫所藏有笛長二尺二寸亦名昭華琯雙角黄帝㑹羣臣於泰山作清角之音横吹之似兩鳳雙鳴二龍齊吟樂録亦云蚩尤氏率魍魎與黄帝戰於涿鹿之野黄帝乃命吹角為龍吟以禦之夔鼓昔東海流波山有獸焉其音如雷命之為䕫黄帝得之以皮作鼔撅以雷獸之骨聲聞五百里以威天下古缶形如足盆或曰形如覆盆以四杖撃之昔秦趙㑹於澠池秦王為趙王撃缶即此是也唐永泰初司馬滔進廣平樂亦有八缶箏箏秦聲也按禮樂記箏五弦筑聲今并凉二州箏形如瑟不知誰所改易也李斯諌逐客書云夫撃甕叩缶彈箏搏髀而歌呼嗚嗚快耳者正秦之聲也楊惲書云家本秦也能為秦聲魏文帝詩秦箏發新聲長笛吹清氣琵琶一名胡琴傅𤣥琵琶賦序云世本不載作者故老云漢送烏孫公主嫁昆彌念其行道思哀使知音者裁箏筑箜篌之聲作馬上之樂以方語目之故云琵琶取易傳於外國也釋名琵琶本出於胡中馬上所鼓也推手前曰琶引手却曰琶象其鼓時因以為名杜摯云琵琶興於秦末苦長城役百姓絃鞉鼔之唐明皇嘗恱之楊妃每奏於梨園諸王貴主並為琵琶弟子文宗内庫有琵琶二號大小忽雷時有内弟子鄭中丞好彈小忽雷既而中丞沒為梁師厚所得後遇良辰彈於花下有黄門過而聽之曰此鄭中丞琵琶聲也聞於文帝帝喜遣中使召之厚加錫賚大横吹小横吹並以竹為之笛之𩔖也昔張博望入西域傳其法於西京得摩訶兠勒二曲李延年因之更造新聲二十八解以為武樂後漢以給邊将晉魏以來二十八解不存其所用者惟黄鶴隴頭水出闗入闗出塞入塞折楊黄覃子赤之楊望行人十四曲唐樂所載大横吹部有節鼓二十四曲小横吹部有角笛簫笳觱栗桃皮觱栗六種曲名失傳吹鞭漢有吹鞭之號笳之𩔖也其狀大𩔖鞭馬者今牧童多巻蘆葉吹之雲和笙漢武帝内傳西王母命侍女董雙成吹雲和之笙樂考渥洼天馬歌武帝時南陽新野有暴利長遭刑屯田敦煌界數於此水旁見羣野馬中有竒異者與凡馬來飲此水利長先作土人持勒靽於水旁後馬玩習久之代土人持勒靽得其馬獻之欲神異此馬云從水中出因作天馬之歌西極天馬歌太初四年貳師将軍廣利斬大宛王首獲汗血馬來獻大宛舊有天馬種蹋石汗血從前肩膊出如血號一日千里因作西極天馬之歌隋七部樂開皇時初定令置七部樂一曰燕樂伎二曰清商伎三曰髙麗伎四曰天竺伎五曰安國伎六曰龜兹伎七曰康國伎唐貞觀中增西凉疏勒髙昌為十部伎玉宸宫調唐禮樂志凉州曲本西凉所獻也其聲本宫調有大遍小遍貞元初樂工康崑崙寓其聲於琵琶奏於玉宸殿因號玉宸宫調葱嶺西曲唐禮樂志宣宗時有葱嶺西曲士女蹹歌為隊其詞言葱嶺之民樂河湟故地歸唐也異物祭天金人漢驃騎将軍去病出隴西過焉耆山得休屠王祭天金人顔師古曰今佛像是其遺法也崑崙觴酉陽雜俎魏賈鏘有蒼頭善别水常令乘小艇於黄河中流以瓠匏接河源水一日不過七八升經宿色如絳以釀酒名崑崙觴芳味世間所絶藤杯續博物志藤杯出西域藤大如臂葉似葛花如梧桐質堅可為杯以酌酒有文章映徹可愛實大如指味如豆蔻能消宿酲氍㲣異物志西域大秦國埜繭織成氍㲣以羣獸五色毛雜之為鳥獸人物草木雲氣千竒萬怪上有鸚鵡逺望軒軒若飛其文赤白黒緑紅絳金縹碧黄十種色古樂府請客上北堂坐氈及氍㲣通俗文氍㲣細者謂之毾㲪班超與弟固書月支毾㲪大小相襍但細好而已遊仙枕開元遺事龜兹國進一枕色如瑪瑙溫潤如玉枕之則十洲三島四海五湖盡在夢中因名為遊仙枕龍虎玉杜陽雜編唐順宗時西域進美玉二一員一方徑各五寸光彩凝冷可鑑毛髮時伊祈元解方坐上前熟視之曰此龍虎玉也員者龍也生於水中為龍所寳若投之水必有虹霓出焉方者虎也生於岩谷為虎所寳以虎毛拂之即紫光迸逸而百獸懾伏詢使人果得之漁獵者花蹄牛元封中大秦國貢花蹄牛其色駁髙六尺尾環繞其身角端有肉蹄如蓮花善走多力帝使輦銅石以起望仙宫牛跡在石上者皆如蓮花形故陽闗之外有花牛津時輦得異石長十丈髙三丈立於望仙宫因名龍鐘石武帝末此石自陷入地中尾出土上今人謂龍尾墩石枕臨洮府城東總真觀馮真人修煉處内有石枕黄潤似玉鄉人老幼或有疾捫此枕即愈劍靈酉陽雜俎云開元中河西騎将宋青春每陣常運劍大呼執馘而旋未嘗中鋒鏑西戎憚之一軍始賴焉後吐蕃入冦獲生口數千軍帥令譯問衣大蟲皮者曰爾何不能害青春答曰常見青龍突陣而來兵刃所及若叩銅鐵我以為神助将軍也青春乃知劍之有靈月支香瑞應圗天漢二年月支國貢神香凡三枚狀如燕卵太如嚢時適大疫使者請燒香一枚以辟疫氣病者皆起香聞百里積月不歇龍駒青海周回千餘里海内有小山每冬氷合後以良牝馬置此山至來春收之馬皆有孕所生得駒號為龍種必多駿異吐谷渾嘗得波斯草馬放入海因生驄駒能日行千里世傳青海驄者是也青鳥山海經三危之山三青鳥居焉是山廣圓百里青鳥主為王母取食陶詩翩翩三青鳥毛色竒可憐朝為王母使暮歸三危山我欲因此鳥且向王母前在世無所須惟酒與長年李詩遥裔雙彩鳳婉孌三青禽以歡秦娥意復得王母心隴山鸚鵡天寳時宫中畜一鸚鵡聰慧能言一旦羽毛憔悴上憐而問之頗思鄉否鵡應聲曰以思鄉故如此命放之隴山後使臣過隴山忽聞樹上有聲問皇上安否視之則鸚鵡也使臣不覺淚下伎兒鳥兩當有鳥羣飛音如簫管二月從北向南八月從南向北春來種米秋來種麥土人名伎兒鳥魚洞兩當縣東五十里有魚洞一名長春洞每嵗暮春魚湧洞中而出不知所從來又成縣仇池山亦有神魚洞每年清明後連貫而出土人取之安石榴博物志陸機與弟雲書曰張騫為漢使外國十八年得塗林安石榴種元稹詩何年安石國萬里貢榴花迢遞河源道因依漢使槎崑崙玉李抱朴子云五原蔡綖入山而還語其家人曰到崑崙山有玉李形如世間者但光明洞澈而堅以玉井水洗之便軟而可食天仙椒敦煌新録虜蘇割刺荅魯之右大渾中髙百尋然無草木石皆赩色山産椒大如彈丸燃之香徹數里每燃椒有鳥自雲際蹁躚五色名赭爾鳥蓋鳳凰種也漢武帝遣将軍趙破奴逐匈奴得其椒不能解問東方朔朔曰此天仙椒也塞外千里有之能致鳳武帝植之太液池至元帝時椒生果有異鳥翔集幻異録異傳云秦文公時武都故道雍南山有大梓樹文公伐之輙有大風雨樹生合不斷時有一人病夜往山中聞有鬼語樹神曰秦若使人被髪以朱絲繞樹伐汝汝得不困耶樹神無言明日病人語文公如其言伐樹斷中有一青牛出走入豐水中其後牛出豐水中使騎撃之不勝有騎墮地復上髮解牛畏之入不出故置髦頭漢魏晉因之李廣與兄共獵於冥山之北見卧虎焉射之一矢即斃斷其髑髏以為枕他日復獵於冥山之陽見有卧虎射之沒矢及羽進而視之乃石也其形𩔖虎退而更射鏃破簳折而石不傷北魏姑臧段承根父暉字長祚身長八尺餘師事歐陽湯湯甚器愛之有一童子與暉同學後二年童子辭歸從暉請馬暉戲作木馬與之童子甚恱謝暉曰吾太山府君子奉𠡠游學今将欲歸煩子厚贈無以報德子後位至常伯封侯非報也且以為好言終乘木馬騰空而去唐𤣥宗于正月望夜上陽宫大陳影燈設庭燎自禁門望殿門皆設蠟炬連屬不絶洞照宫室熒煌如晝有道士葉法善在聖真觀上促命召來既至潛引法善觀於樓下人莫知者法善謂上曰影燈之盛天下固無與比惟凉州信為亞此上曰師嘗遊乎法善曰適自彼來便䝉召上異其言曰今欲一往得否法善曰此易耳於是令上閉目約曰必不得妄視若有所視必當驚駭上依其言閉目距踴身在霄漢已而足及地法善曰可以觀覽既視燈燭連亘十數里車馬駢闐士女紛雜上稱其善久之法善曰觀覽畢可回矣復閉目與法善騰虚而上俄頃還故處而樓下歌吹猶未終法善至西凉州将鐵如意置酒肆異日上命中官託以他事使凉州因求如意以還法善秦州民趙抱一常牧羊田間一夕有叩門召之者以杖引行杖端有氣如煙其香可恱俄至山崖絶頂見數人㑹飲音樂交奏與人間無異抱一駭而不測㑹廵檢司過其下聞樂聲疑羣盜歡聚集村民梯崖而上至則無所覩抱一獨在援以下之具言其故凡經夕若俄頃自是不喜熟食凡火化者未嘗歴口茹甘菊栢葉果實井泉間亦飲酒貌如嬰兒素不習文墨口占辭句頗成篇詠有道家之趣遂不親農事野行露宿大中祥符四年至京師猶丱角詔賜名度為道士自是間嵗或一至京師常令居太一宫與人言多養生事焉涇州人朱有少竄名伍符宋元豐初瀘賊犯塞詔秦卒征之軍次資中郡有往來醮壇山試仙臺俄二鳥飛鳴争食墜地若松肪有取食之即脹渇求飲遇一道士指松曰食此葉可療也忽不見有如其言渇止覺心爽神清有不知書不飲酒至是髙吟劇飲脫伍符而去僭竊漢隗囂天水成紀人囂季父崔聞漢兵起聚衆攻湖襄殺莾鎮戎大尹崔廣推囂為上将軍遂撃殺雍州牧陳慶復攻南安大尹王向分遣諸将徇隴西武都金城張液酒泉燉煌攻下之二年更始以囂為右将軍光武建武元年囂據天水自稱西州上将軍七年光武封為朔寧王九年囂卒其将王元周宗立囂少子純為王十年光武遣中郎将來歙等大破于落門純與周宗降漢其國遂亡盧芳安定天水人王莽之亂天下思漢芳詐稱武帝曾孫劉文伯因言為上将軍遣使與外國和親外國立為漢帝據安定光武建武五年芳入塞據五都僭稱帝七年朔方雲中中部皆降于芳十六年降漢漢立為代王其國遂亡西晉氐主楊茂捜本姓令狐楊駒之甥畧陽清水氐人也初楊駒始居仇池有地百頃至其孫千萬附魏封為百頃王千萬孫飛龍浸強盛徙居畧陽以其甥令狐茂捜為子茂捜避齊萬年之亂率部落還保仇池自號輔國将軍右賢王闗中人避亂者多依之尋卒子難敵遂據其地建興元年冦陷凉州二年為張咸所逐降于李成永昌元年稱藩于趙趙主曜封難敵為武都王尋稱仇池王遂卒子毅嗣遣使稱藩于晉咸康二年楊初殺毅降趙永和三年初遣使稱藩于晉晉以初為雍州刺史仇池公卒楊世嗣晉以為秦州刺史世卒楊纂立咸安元年苻秦伐仇池克之執楊纂以歸遂亡東晉西秦乞伏國仁隴西鮮卑人父司繁降秦苻堅以為南單于鎮勇士川司繁卒國仁代鎮苻堅南伐徵國仁從軍以國仁叔父步頹鎮勇士堅冦晉敗歸歩頽叛堅使國仁討之國仁遂與步頽合據隴右晉太元十年秋九月自稱大都督大将軍秦河二州牧建元建義十二年春三月秦王登以國仁為苑川王立三年乾歸國仁弟國仁卒子公府幼衆推乾歸為河南王改元太初遷都金城太元十四年春正月秦王登命為河南王隆安四年春正月還都于苑川夏六月秦遣其将姚碩徳來伐乾歸大敗降秦西秦中絶義熙五年長子熾磐起兵叛秦乾歸聞之自秦逃歸命熾磐鎮苑川自率衆徙都度堅山秋九月復稱為秦王改元更始六年復都苑川自是攻秦畧陽南安隴西皆克之八年春徙都譚郊六月為兄子公府所弑立二十四年熾磐乾歸長子義熙五年乾歸復稱為秦王及遇害熾盤襲位稱河南王改元永康宋永初元年改元建𢎞立子慕末為太子立十六年慕末熾磐苐二子熾磐卒慕末襲位改元永𢎞宋元嘉七年為北凉所迫東徙上邽為夏人所拒留保于南安八年春正月夏主赫連定起兵伐秦遣将韋伐攻南安慕末出降尋殺之其國遂亡立三年後凉呂光畧陽氐人也父樓婆為苻堅太尉光襲累遷驃騎将軍出討西域歸至髙昌聞堅國亂遂進撃凉州殺刺史梁熙而據其地晉孝武太元十一年聞堅凶問至迺自稱使持節侍中中外大都督督隴右河西諸軍事凉州牧酒泉公建元太安十四年僭稱三河王改元麟嘉置百官立子紹為世子二十一年僭天王位國號大凉立子紹為太子隆安三年立其子為天王遂卒立十二年吕紹光之太子立數日為纂所殺吕纂光庶長子紹兄也光卒紹秘不發䘮帥壯士入宫殺紹而自立僭即偽位改元咸寧後為番和太守吕超所殺立三年吕隆吕光兄之子隆兄超殺纂讓位于隆遂僭位秦遣其将姚碩徳來伐圍姑臧隆降凉遂亡立一年南凉秃髪烏孤河西鮮卑人與後魏同出初受吕光署築廉川堡以都之累拜征西大将軍益州牧左賢王隆安元年自稱大都督大将軍西平王改元太初攻吕光金城取之二年取凉嶺南五郡更稱武威王三年徙于樂都立三年利鹿孤烏孤之弟烏孤卒衆推立之遂僭嗣偽位改元建和徙居西平立三年傉儃利鹿孤弟也鹿孤卒遂僭稱凉王改元𢎞昌元興三年畏秦之强去其年號罷尚書丞郎官義熙四年復稱涼王改元嘉平義熙六年為北凉沮渠䝉遜所逼遷于樂都義熙十年傉儃出討他郡西秦乞伏熾磐襲樂都潰亂太子虎台傉儃降于熾磐尋遇害其國遂亡立十二年北凉段業京兆人呂光以為建康大守光晉昌守将沮渠男成與從弟䝉遜起兵叛光遣使說業奉以為主業許男成等遂推業為大都督大将軍凉州牧建康公改元神璽隆安三年春二月自稱為涼王改元天璽夏五月為西安太守沮渠䝉遜所殺立四年沮渠䝉遜臨松盧水人也隆安初起兵立段業為王業忌䝉遜出為西安太守隆安五年䝉遜入殺業自稱大都督大将軍凉州牧張掖公義熙八年遷于姑臧稱河西王改元置百官十四年稱藩于晉宋髙祖永初元年撃滅西凉景平元年受宋爵命八年受魏命為凉王立三十二年牧犍䝉遜諸子也䝉遜卒牧犍代立改元永和元嘉十一年册命為河西王十六年魏主圍姑臧牧犍出降其國遂亡在位七年夏赫連勃勃右賢王之後衛辰之子本姓劉以其上世隨母姓故改姓赫連氏初為姚興将鎮朔方晉義熙三年夏六月叛興稱天王國號大夏建元龍興義熙九年改元鳳翔用叱干阿利領将作大監發十萬人築都城義熙十四年即皇帝位于灞上都統萬改元昌武元熙元年改元真興宋元嘉二年卒立十九年夏主昌勃勃世子勃勃卒昌遂嗣立宋元嘉四年魏主來伐昌走上邽魏取統萬五年昌為魏将尉眷所擒俘之于平城立三年夏主定勃勃第五子偽封平原王昌被魏擒定收餘衆奔還平凉僭即皇帝位改元勝光元嘉五年取長安八年為吐谷渾所擒明年逃魏魏人害之其國遂亡立三年隋梁師都初為朔方郎将煬帝大業十三年起兵據郡畧定雕隂𢎞化延安等郡遂即皇帝位國號梁始畢遺以狼頭纛號為大度昆伽可汗師都乃引邊冦居河南之地攻破鹽川郡貞觀二年唐太宗遣右衛大将軍柴紹等討梁師都其下弑之以降以其地為夏州其國遂亡秦王薛舉金城人初為金城校尉驍勇絶倫家貲巨萬交結豪傑于西邊煬帝大業十三年夏四月隴右盜起金城令郝援募兵得數千人使舉将而討之方授甲置酒饗士舉與其子仁杲及同黨十三人于座刼援發兵開倉賑施自稱西秦霸王招集羣盜掠官牧馬賊首宗羅㬋率衆歸之𨕖精銳克枹罕岷山賊衆大振以仁杲為齊王領東道行軍元帥少子仁越為晉王兼河州刺史宗羅㬋為興王以副仁杲未幾舉得隴右之地衆至十三萬秋七月舉自稱秦帝徙據天水立仁杲為太子至唐髙祖武德元年八月舉卒子仁杲立是年秦王世民舉兵伐之仁杲出降唐斬之其國遂亡凉王李軌初為武威司馬煬帝大業十三年薛舉起兵金城軌與同郡曹克謀曰薛舉必來侵暴郡官庸怯勢不能禦吾輩豈可束手並妻奴為人所虜邪不若相與拒之保據河西以待天下之變衆以為然遂相與拜軌奉以為主軌乃令安修仁集諸部自結民間豪傑共起兵稱河西大涼王置官屬尋攻張掖燉煌西平枹罕皆克之盡有河西五郡之地武德元年唐髙祖立為凉王十一月自稱帝武徳二年唐遣安興貴襲軌殺之其國遂亡宋夏李繼遷拓跋氏元魏之後也自唐貞觀有寧夏等州之地唐末賜姓李祖仁福長興二年為唐定南節度使仁福卒子彛超嗣彛超卒彛殷嗣彛殷卒彛興嗣彛興卒子克叡嗣克叡卒子繼筠嗣繼筠卒弟繼捧代領其衆宋太宗太平興國七年與繼遷入朝獻銀夏綏宥四州未幾繼遷與其黨數十人復叛奔地斤澤由是從者日衆遂據夏州東南三百里至道三年繼遷請降太宗以為定南節度使賜姓名趙保吉立二十二年李徳明保吉子也既嗣屢表歸欵復奉誓表景徳二年真宗乃遣使授徳明檢校太師兼侍中充定南節度使明道元年封徳明為夏主尋卒立二十九年李元昊更名曩霄徳明子也徳明卒元昊嗣位明道元年仁宗遣楊吉授元昊三使封西平王景祜四年殺其叔父山遇稱帝于夏州仁宗削賜姓官爵慶厯四年上誓表于宋宋復冊為夏國王立一十五年李諒祚元昊子也時方期嵗養于母族訛龎訛龎因以三大将分治國政慶厯八年仁宗冊為夏國王立十九年李秉常諒祚子諒祚卒秉常遂嗣治平四年英宗遣劉航封夏國王立十九年李乾順秉常子秉常卒乾順嗣元祐元年宋遣穆衍往弔祭尋遣使封為夏國王順立五十一年李仁孝乾順子既嗣建元大慶立十四年李純祐仁孝子既嗣改元天慶後為李安全所廢立十三年李安全崇宗孫越王仁友子也廢純祐自立改元應天嘉定二年降于䝉古立五年李遵頊安全族子也安全卒遵頊遂立改元光定嘉定十年䝉古圍興州遵頊出奔西凉嘉定十六年傳國與子徳旺自號上皇立十二年李徳旺遵頊子既立改元乾定時䝉古入夏城邑多降徳旺憂悸而卒立三年李睨徳旺從子也德旺卒國人立之寳慶三年䝉古特穆津盡克夏城邑其民穿鑿土石以避鋒鏑免者無一二白骨蔽野夏主力屈出降其國遂亡立一年後序直省有通志猶古列國有史但史與志義例不同詳畧亦異夫統一省數千里之境上下數千年之久其間典章事實悉於志是載其事誠不易為臣等生逢聖世恭遇右文盛事遵奉綸音敢不悉心延訪耆碩採輯舊聞摉羅軼事以薈萃成編惟是各省通志俱有成書甘肅獨無舊本事屬創始縱極考辨猶恐語焉不詳擇焉不精又河西衛所新改設郡邑分隸未久今古異名臣等統率屬員合各郡邑之志搜討故實博採輿言凡地方建置沿革疆域廣袤逺近山川闗梁之險易城池公署之布置田疇水利之疏濬學校祠祀之昭垂户口財賦之繁庶兵戎驛政之修明鹽法茶馬之成規風俗物産之同異職官有古今増損之殊名宦覈其居官政績人物論其生平才德詳忠孝節義以風世勵俗載古今著述以潤色文章裒舊益新捃摭確實考其條目綜其義例不敢慿臆見以失實不敢徇耳目以傳訛刪繁舉要編次成帙統計共五十巻以備一統志之採擇繕稿既竣鳩工授梓臣謹稽首颺言簡末時雍正十有三年嵗在乙夘正月榖旦巡撫甘肅寧夏臨鞏等處地方贊理軍務兼理茶馬都察院右副都御史加五級紀録三次臣許容謹序後序竊惟九州之志興於上古自羲農軒頊之代已有八索九丘解之者曰九丘九州也顧其書弗傳至大禹周行天下平治水土咸則三壤成賦中邦而九州之紀載於是較若列眉迨於周官有職方氏掌天下之輿圗内史掌邦國之志外史掌四方之志而一切山川原隰戸口貢賦人才物産風俗歌謠靡不具載是漢唐以來郡國之志皆仿周官而為之者也今一省之通志猶古者九州之志非融㑹古今條貫本末詳畧繁簡咸折厥中葢難言之甘肅一省雖處西偏然本唐虞禹貢之區聲教漸濡之域自漢武開通西夷以後名臣賢士經營建置之蹟累畧相望我朝列聖重光太和洋溢薄海内外罔不率俾昔縁凖噶爾自棄於化育之外侵擾屬國恭承世宗憲皇帝命臣董師以正周官九伐之典特念甘肅為出口要地加意撫綏多方寛恤我皇上嗣登寳位懐保恵鮮尤極周詳懇摯於是甘肅士民敦本力農牽車服賈以勤孝養誦詩讀書型仁講讓以端行習一道同風埒於内地而凖噶爾亦慕義輸誠叩闗入贄又與西戎即叙西旅獻􅋙後先一轍是舉漢唐以來兵屯戰守之處而直與禹貢周官同為太平之盛何其幸也甘省通志於雍正六年奉勅纂修開局於蘭州臣以軍務殷繁馳驅塞外未與監修之事今年九月奉命入都道過蘭州而志書已将雕鐫告竣謹與臣劉於義㑹同披覽甘省記載向係闕畧一時採訪雖未必詳備然竊慶甘肅人民數千百年以來號為邊鄙荒徼風聲氣習不逮齊魯中州逺甚而恭遇我國家列聖相承湛恩汪濊徳化醇醲浹於肌膚洽於心志人才日以茂風化日以興田野日以闢生聚日以繁官斯土者日勉為循良而幾於潁川中牟之政普於流沙達於西海比隆唐虞聲教暨訖永永無斁是則臣之素志爰不揣固陋謹泐蕪詞綴諸簡末云乾隆元年九月初六日光禄大夫太子少保文華殿大學士兼兵部尚書仍管川陜總督印務加四級軍功加三級又軍功加三級臣查郎阿謹序後序竊惟甘肅一省在唐虞三代為雍州西偏而神聖經營之迹見於傳紀者班班可考神農顓頊堯舜之紀皆云徳被流沙史記黄帝披山通道至於空同今平凉肅州皆有此山夏后平治水土爰作禹貢如西傾朱圉之在臨鞏合黎黑水之在張掖三危流沙之在敦煌岷山積石之在洮河原隰豬野之在邠寧武威至於西戎即叙昆崙析支厥貢織皮則經畧西陲如此其重也漢置凉州刺史唐分隴右河西二道皆在今甘肅全境明制統於陜西布政司猶古之雍州今分為甘省猶漢唐分置凉州河隴之意因時制宜各適厥中顧以地處邊陲一切人風土俗盛於唐以前陋於宋以後其繼三皇五帝以來盛徳隆功東漸西被聲教暨訖者其惟我朝乎欽惟我聖祖仁皇帝睿謀神畧統貫三才誕敷文德則典謨訓誥之章赫濯武功則天地風雲之陣旌旄所指豪酋面縛塞垣内外以清以寧既啟佑於前我世宗憲皇帝重華濬哲容保無疆逺人不服以武臨之逺人既服以徳懐之初震九伐之聲靈旋舞兩階之干羽由是戎人稽顙奉貢入朝羽檄稀馳烽烟寧息復善承於後我皇上纘紹丕基睠懐西顧建中和之極金聲玉振兼綜而條貫之益撫摩而涵育之於是甘肅士民沐浴膏澤淪肌浹髓凡垂髫之童戴白之叟皆皥皥熙熙鼓腹含哺有以自樂殷武之詩不云乎惟彼氐羌來享來王曰商是常歐陽子云漠然徒見山髙而水清葢休養生息涵煦於百年之深也臣躬逢昌運忝任封疆自雍正六年恭奉勅命纂修通志因移駐酒泉軍務殷繁未遑監理今年三月欽奉簡畀甘肅巡撫事務移駐臯蘭赴任之始業經前撫臣許容久已付梓無煩校訂兹值刋刻竣事装潢成帙爰㑹同督臣查郎阿恭進外惟謹述我列聖之聖徳神功皇上之漸仁摩義俾甘肅一區聲明文物度越漢唐而與神農黄帝顓頊堯舜大禹數聖人先後經營之迹若合符轍是臣之所詠歌舞蹈贊頌颺言猶未罄其萬一者夫乾隆元年九月初六日賜進士出身光禄大夫吏部尚書署川陜總督兼甘肅巡撫紀録二十三次臣劉於義謹序甘肅通志巻五十
