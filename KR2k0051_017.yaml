body:
  text: 欽定四庫全書甘肅通志卷十七蠲恤聖朝子惠元元蠲租除賦休養撫綏薄海內外咏歌樂利俗同熙皥甘肅兆民被恩尤厚數十年來全蠲正賦豁免舊缺緩征平糶借給籽種發帑賑濟但有益於民生必勤求夫生遂黃童白叟沐浴膏澤淪肌浹髓志蠲恤順治五年覆准陜西臨洮府屬被雹災重者本年額賦全蠲稍重者蠲三分之二稍輕者蠲三分之一又覆准陜西水災蝗蝻氷雹相繼被災一等者蠲一年額賦二等蠲一年之半三等蠲三分之一九年覆准陜西莊浪西寧肅州所屬故絶拋荒並水淹沙壓地畝額徵糧草悉豫蠲免十二年覆准陜西地震全家被災者盡豁歷缺錢糧草束餘免本年地糧丁徭康熙十六年覆准陜西叠遭荒亂十五年正賦涇州等處免九分崇信等處并鹽茶㕔免八分莊浪縣免七分寧逺等縣免六分通渭縣免五分伏羌等縣免四分平屬學租銀亦照分數蠲免二十五年奉恩詔自用兵以來一應動用錢糧有因原未題明不准開銷屢經核减現在追取召買價值拖缺在民變價糧草多給兵餉各項及蓋造營房修理軍器雇募船隻俱令賠補歷年未清者概豫開銷豁免二十八年覆准甘肅涇州秋被雹災照例按分數蠲免錢糧二十九年覆准甘肅寧州被雹災田地錢糧按分數蠲免又覆准凉州衛所被旱錢糧照分數蠲免又覆准甘肅靖逺衛今春鮮雨米價騰貴土瘠民窮亟宜拯救先動用常平倉及捐輸糧石支給其不敷者在各年存貯倉糧內動支秋收買補還倉三十年奉上諭朕孜孜圖治軫切民依閭閻耕穫時勤咨訪其有以荒歉上聞或蠲或賑旋即施行務令得所念河南一省連歲秋成未獲豐稔非沛特恩蠲恤恐致生計艱難康熙三十一年錢糧通行蠲免並漕糧亦著停徵至山西陜西被災州縣錢糧除照分數蠲免外其康熙三十一年春夏二季應徵錢糧俱著緩至秋季徵收用稱朕眷愛黎元撫綏休養至意又覆准陜西寧州鎮原縣雹災照分數蠲免本年錢糧三十四年奉恩詔山西陜西江南浙江江西湖廣廣東福建等省康熙三十三年以前歷年積缺及帶徵未完銀米俱著豁免三十五年覆准陜西地方大兵往來供應勞苦其三十六年全省地丁并草折銀兩悉豫蠲免三十六年奉上諭朕惟治安天下惟期民生得所而欲民生之得所以敷恩寬賦為要朕為一切事務稍有動用民力之處即厪懷殷切刻不能忘比年以來因厄魯特噶爾丹狂逞逆命遣發大兵分道進剿軍興供億不得已而煩民力甘肅所屬各州縣衛所榆林等處沿邊各州縣衛所適當師行要道其喂養軍前需用馬匹並大兵往來經過各項措辦雖俱支給正項錢糧而供應繁多閭閻勞苦朕心深用軫念著將康熙三十六年甘肅巡撫所屬州縣衛所陜西巡撫所屬榆林等沿邊州縣衛所地丁銀米盡行蠲免行文各該撫遍加曉諭務俾小民均沾實惠稱朕體恤黎元至意甘肅所屬銀米既經全免需用錢糧著於鄰近省分作速撥給又覆准甘肅安化等州縣被旱動積穀借給窮民再動司庫銀賑濟三十五年未完錢糧暫行緩徵四十年奉上諭甘肅巡撫所屬地方康熙四十一年地丁錢糧盡行蠲免又覆准甘肅河州地方亢旱二麥枯槁發銀及穀賑濟又覆准動積穀賑濟寧夏等州縣災民又覆准甘肅地方被災該撫親歷查閲應賑之處將存貯糧石即行動賑無貯糧者於附近轉運又覆准甘肅安㑹等州縣被災尤重動司庫銀一萬五千兩設厰煮粥賑濟又覆准甘肅河州所屬土司今歲亦被旱災照依內地每大口給一倉斗小口給五倉升又覆准甘肅寧夏等處被旱將錢糧暫行停徵又議准甘屬本年錢糧于四十二年帶徵又覆准甘肅鞏昌府屬夏秋二次歉收將存貯米石十分减二糶與被災窮民再動支一萬石于明春將隴西縣重被氷雹災民每户散給五斗以為籽種四十一年奉上諭朕撫御寰區四十餘年無刻不以民生為念天下至大兆民至衆惟恐窮鄉僻壤百姓疾苦不能上逹孜孜勤求未嘗少懈從來水旱自古有之備荒之法全賴督撫得人倘以諱災為事任意虧空一有歉薄莫知所措視民命為草芥何以為民父母况秦省不通水運若不謹於蓋藏儉歲難於賑恤河西一帶地方素稱貧瘠雖免四十一年錢糧民生未裕再將四十二年地丁錢糧通行蠲免該督撫遍示所屬地方務使閭閻均沾實惠以副朕惠愛元元之至意又覆准陜西甘肅去歲被旱動用倉糧于被災之蘭州等縣衛十一處開厰煮粥賑濟至三月終止隴西安定等州縣至四月初止但甘肅地土寒凉入夏田始種植入秋麥才收穫目下正值青黃不接之時再動庫銀一萬兩于原設粥厰處仍行煮粥賑濟併令各州縣凡有飢民地方亦俱行煮粥俟麥熟收成之日停止又覆准西寧運西安糧石借給本地窮民於明秋照數還倉又題准陜西西寧衛下任上川口巴古等堡應徵屯糧于四十二年帶徵又題准陜西西安撥倉米十五萬石運送臨鞏等處北路運送五萬石南路運送十萬石陸續全運至甘肅所屬盤龍鋪瓦雲驛移咨該撫將米石速運入倉毋致浥爛又題准陜西甘屬西寧乃緊要地方産米甚少莊浪係接連三邊此二處俱於西安倉米內各運送五萬石收貯又議准西寧米價騰貴運西安糧米照時價十分减三糶賣俟明秋照數還倉四十二年覆准陜西甘肅平凉等州縣蟲食禾苗行令督撫將該縣存貯倉穀散賑恐有不敷于平屬附近所貯撥給又覆准陜西甘屬連歲被災飢民流散限一年內招回實在窮民大口給米五升小口給米一升其原有地畝之人查明于來春種麥時每畝給籽種三升原無産業者令地方官將無主荒地撥與耕種即給為業籽種亦照數支給又覆准陜西寧夏衛秋被水災行令該撫將存貯糧動支賑濟又奉上諭陜省米糧豐收不勝欣悅但山陜不通水路若稍遇災即至艱窘自古以來不能使其無災以備荒為要從前屢降諭㫖但督撫等實心周詳籌畫奉行者並無一人今值糧米豐裕之際無有急于各地方積貯者務將預備之處盡心究議遵㫖題定將陜西人口衆多之州縣增貯米三千石其次州縣二千石再次州縣一千石交與地方官採買存貯動西安司庫兵餉銀十四萬兩以十萬兩照依時價買米增貯各州縣以四萬兩蓋造倉厫其甘屬地方既無倉厫應於常平倉糧內十分之中動一分蓋造倉厫將此項用過糧石缺數照依原定數目填還再甘陜二處照依應徵地丁銀一錢米一斗輸納者令其捐輸糧三合以為備災之用如遇歉年停其捐輸四十三年覆准川陜二省倉糧無多俟積有嬴餘日再行糶賣四十四年題准陜西存貯常平倉穀石每年支放官兵餘糧年久恐致朽爛嗣後將新收及餘糧存貯其舊糧照新收之數換出發糶四十五年奉上諭朕子育黎元日求所以休養利濟之道念惟賜租减賦實有益於民生直𨽻各省錢糧次第全蠲一年者業經數舉獨是歷歲逋負積纍加增舊稅新徵勢難兼辦縱使少寬民力分年帶輸而督令續完仍多拮据朕眷懷及此深切軫恤是用蠲逋已責大沛恩膏俾閭閻獲免追呼官吏亦不罹參罰直𨽻山東積缺錢糧今年雖已蠲免其山西陜西甘肅江蘇安徽浙江江西湖北湖南福建廣東各省自康熙四十三年以前未完地丁銀二百一十二萬二千七百兩有竒糧十萬五千七百石有竒著按數通行蠲免或舊缺已完在官而見年錢糧未完足者亦准扣抵諭㫖到日各該撫立行所屬張示遍諭如有不肖有司以完作缺朦混銷算及開除不清者該督撫即行題參嚴加治罪四十九年題准陜西甘肅存貯米石歷久恐有浥爛行令該管官員糧貴之年存五糶五糧賤之年存七糶三五十一年奉上諭朕宵旰孜孜勤求民瘼永惟惠下實政無如除賦蠲租除每歲直省報聞倘有水旱災傷照輕重分數蠲免正供仍加賑恤外將天下地丁錢糧自康熙五十年為始三年之內全免一周使率土黎庶普被恩膏除將直𨽻奉天浙江福建廣東廣西四川雲南貴州及山西河南陜西甘肅湖南湖北各直省康熙五十年五十一年地丁錢糧一槩蠲免歷年舊缺錢糧一并免徵外所有江寧安徽山東江西各撫屬除漕項外康熙五十二年應徵地畝銀共八百八十二萬九千六百四十四兩有竒人丁銀共一百三萬五千三百二十五兩有竒俱著察明蠲免其歷年舊缺銀二百四十八萬三千八百二十八兩有竒著一并免徵計三年之內總免過天下地畝人丁新徵舊缺共銀三千二百六萬四千六百九十七兩有竒各該督撫務須實心奉行體朕軫念民生至意又奉上諭陜西鞏昌等處存倉米二十萬石於青黃不接時聽民借領俟秋收後照數還倉又覆准鞏昌等處産米無幾民缺倉糧准以麥一石抵米一石大豆豌豆一石零抵米一石還倉有現價糶賣者將價銀報明亦俟秋收後採買還倉五十二年奉上諭朕勤求民瘼無間遐邇雖在邊徼逺省偶有旱潦災傷無不訪察情形殫思賑救今歲直省各處俱獲收成惟廣東三水清逺高要髙明四㑹五縣福建候官縣福防廳所屬福右衛二處甘肅靖逺衛環縣鎮原縣固原州固原衛平凉縣平凉衛崇信縣慶陽衛靈州所㑹寧縣寧夏中衛寧夏所古浪所一十四處今歲夏秋被災各督撫已經奏聞雖各省地丁錢糧新經全免然一方災歉悉厪朕心艱食之際重以追呼朕所不忍其明年應徵廣東省三水等五縣額銀七萬七千九百兩零米一萬七千六百石零福建省候官縣等二處額銀三萬六千六百兩零米六千四百石零甘肅靖逺衛等處額銀四萬七千七百兩零糧八萬八千五百石零草八十四萬三百束零盡豫蠲豁户部即行文各督撫務須星速奉行即刻遍行曉諭俾民間無催徵之纍肆力東作用稱朕撫恤災黎至意倘有不肖有司奉行稽遲或借端别行科𣲖使小民不沾實惠該督撫嚴察參處如該督撫失察一併從重治罪又奉上諭會寧縣等處今歲錢糧著補行豁免又覆准甘肅靖逺衛等處薄收動倉糧接濟窮民併將本年錢糧緩徵又覆准甘屬地方歉收動捐穀借給平糶又題准陜西甘屬四十九年舊缺銀兩於五十五年帶徵五十三年覆准陜西甘屬去歲薄收于附近存貯糧內撥賑自二月起至六月終止每日大口給糧三合小口二合其有耕田缺乏籽粒牛具者每畝給糧五升有未回籍者令該地方官酌給路費搬回又覆准令甘屬各州縣修城使窮民得以傭工度日五十四年覆准陜西甘屬蘭州等處連年被災分給買穀種銀兩并照例給口糧養贍又議准𣲖大臣一員巡查甘肅被災地方銀米兼行賑濟又覆准甘屬保安堡四寨氷雹災傷行令該撫將被災人民作速賑濟又題准陜西甘屬被災地方五十三年未完錢糧暫行停徵又覆准陜西甘屬五十三年被災地方共二十八處歷年未完錢糧草束各照數分年帶徵又題准陜西甘屬雨澤愆期將本年錢糧暫行停徵五十五年奉上諭朕統一寰宇宵旰孜孜惟以年穀順成民生康阜為念故凡地方水旱情形必時加咨詢其有歲偶不登即詔所司亟行蠲賑五十餘年來未嘗稍懈前因甘肅靖逺衛等處歉收既已多方籌畫蠲賑頻施復將甘肅被災二十八州縣衛所康熙五十四年額徴銀糧草束通行蠲免但被災之餘民鮮蓋藏若非再沛𢎞施恐來歲辦賦猶艱除寧州隴西渭源狄道臨洮五州縣衛五十五年額徵銀糧草束已經蠲免外其靖逺等二十八州縣衛所五十五年額徵銀九萬七千八百七十兩零糧二十三萬九千四十石零草二百五十三萬七千八十束零亦盡與蠲免諭㫖到日該督撫即遍行曉示俾遐陬僻壤莫不周知務期均沾實惠以副朕軫恤邊民至意又奉上諭朕統一寰宇無分中外皆欲久安長治共樂升平宵旰孜孜五十餘年未嘗頃刻去懷也策妄阿喇布坦前曽頻行請安遣使來往近忽狂悖侵擾哈密哈密係我編置佐領之部落與內地無異若不遣發師旅置之不問斷乎不可故特徵兵備邊一切飛芻挽粟悉支正供毫無纍及閭閻然而行軍置驛及諸凡挽運皆由邊境今歲山西陜西二省屬豐收喜登大有猶念邊民效力轉輸無誤急公固其常分而民勞亦所堪恤若非格外施恩何以昭示鼓勵兹特大沛膏澤加意培養著將沿邊一帶運糧地方自山西大同府屬前衛右衛大同懷仁馬邑朔州保德等七州縣衛直至陜西延安府屬府谷神木安塞綏德米脂安定吳堡保安榆林保寧常樂雙山魚河歸德嚮水波羅懷逺威武清平甘肅屬山丹髙臺古浪莊浪西寧肅鎮寧夏左屯中屯平羅中衛靈寧平凉固原鎮戎西安慶陽阜城甜水河州歸德蘭州洮州等四十二州縣衛所堡康熙五十六年額徵銀八萬六千一百兩零糧米豆穀三十一萬七千七百二十五石零草二百七十六萬五千九百束零通行蠲免并將從前歷年逋缺銀糧草豆亦悉豫蠲除諭㫖到日該督撫即遍行張示使遐陬僻壤莫不周知仍嚴飭所司實心奉行以副朕加厚邊民至意其或陽奉隂違澤不下究該督撫題參從重治罪五十六年奉上諭朕撫馭寰宇五十餘年夜寐夙興為小民勤求生遂凡率土逺近皆期共享樂利聿成家給人足之休未嘗一日不厪諸懷也數十年以來各省正賦屢經全免歷年積缺亦已蠲徵偶有雨澤愆期或發倉廪散賑或截漕糧賑救不惜數萬萬金錢米穀頻沛恩施誠念窮簷之艱慮其致于顛連失所耳近者民力雖已稍蘇然念分年帶徵銀兩若不格外優寬則小民一歲所獲分納二年之賦以其盈餘養贍室家斷難充足朕每懷及此軫惻良深宜更加殊恩通行豁免今將直𨽻安徽江蘇浙江江西湖廣西安甘肅等八處帶徵地丁屯衛銀二百三十九萬八千三百八十兩有竒概免徵收其漕項雖例不准免亦著破格施恩將安徽江蘇所屬帶徴漕項銀四十九萬五千一百兩零米麥豆一十四萬六千六百一十餘石內免徵各半戶部即行文該督撫嚴飭所屬實心奉行遍加曉諭俾民間無催徵之纍均沾實惠用稱朕撫恤羣黎至意倘有不肖有司借端朦混私行徵收者該督撫嚴察參處如該督撫失察一併從重處分五十七年覆准甘屬山丹衛等處旱災錢糧照分數蠲免又奉上諭朕臨御五十年凡師行轉餉及災祲偶見即厪懷殷切蠲免賑濟之恩靡不下逮蓋以治平天下惟期民生得所而欲民生得所必以敷恩寬賦為急也三年以來策妄阿喇布坦狂逞跳梁遣發大兵屯駐西邊一切軍興征繕皆動支正供錢糧不使纍及閭閻而轉輸挽運陜西百姓雖勉力急公勞苦實堪憫恤又莊浪縣等處地震隨經遣部院堂官星馳前往察賑而用兵之後宜格外加恩用綏黎庶將陜西巡撫甘肅巡撫所屬通省各府州縣衛所錢糧米豆草束俱行蠲免目今係有軍務之時除米豆草束外其康熙五十八年應徵地丁銀一百八十八萬三千五百三十六兩有竒并歷年積缺銀四萬七百五十七兩有竒著一概蠲免戶部速行文該督撫通行曉諭實心奉行務俾均沾德意以副朕篤念民勞拯恤災傷至意如有不肖官吏朦混私徵澤不下究者該督撫嚴察指參從重治罪又奉上諭甘肅巡撫所屬康熙五十三四五六等年民間舊缺銀米草豆著盡行豁免務令得沾實惠又覆准陜西平凉府屬靜寧等七州縣地震查明賑濟其續報安定等縣五處地震一併酌量散給又覆准陜西凉州衛等一十三處夏禾被災其本年應徵錢糧暫行緩徵五十八年覆准陜西甘屬靖逺衛等十五處夏被旱災作速賑濟又覆准陜西靖逺等十堡秋禾被災窮民乏食將附近倉糧酌量撥運借給又覆准甘屬被災酌量借給籽種又覆准陜西靖邊等十堡秋禾被災其應徵本年糧草暫行停徵五十九年奉上諭朕惟天下之要首以乂安民生為急故自御極以來於閭閻疾苦無不博咨廣詢渙敷庥澤其有動用民力之處尤孜孜厪念刻不能忘蓋六十年如一日也比年因策妄阿喇布坦狂逞跳梁軍興征繕逺歷邊陲其沿邊數處師旅屯駐一切雖皆支用正項錢糧而協辦轉輸行齎居送之時民力勞瘁朕心時切軫念曽將陜西甘肅巡撫所屬康熙五十八年額徵地丁銀一百八十八萬兩零歷年舊缺銀四萬兩特沛恩綸悉行蠲免而沿邊各州縣衛所軍行既多飛挽之時辦賦復滋催科之擾若非格外加恩黎民恐致失業所有沿邊一帶陜西延安府屬府谷神木安塞綏德米脂安定吳堡保安榆林保寧常樂雙山魚河歸德嚮水波羅懷逺威武清平葭州龍州鎮靖鎮羅寧塞靖邊柳樹澗安邊磚井定邊饒陽水堡髙家堡甘肅屬山丹高臺古浪莊浪西寧肅州鎮寧夏左屯中屯平羅中衛靈州寧州平凉衛固原州鎮戎西安阜城甜水河州歸德蘭州洮州寧夏前衛平凉縣固原衛固原㕔河州衛蘭州衛蘭州㕔慶陽凉州衛永昌衛鎮畨衛甘州衛甘州右衛肅州衛鎮彞所等六十八州縣衛所堡康熙五十九年錢糧米豆草束俱宜蠲免但目下係有軍務之時除米豆草束外將五十九年額徵銀九萬八千一百兩零盡行蠲免户部移文該督撫通行曉諭實心奉行務俾均沾德惠以副朕曲軫邊民之至意又奉上諭朕自御極以來無日不以民生為念凡閭閻疾苦必詳加咨詢至於地方偶遇災傷一有所聞即行蠲賑撫恤備至務使黎庶安生樂業優遊化日六十年來夙夜孜孜未嘗少釋也邇年因西陲用兵師行糧從雖芻粟悉支正供絲毫無擾民間然轉輸必須民力勞苦宜恤曽將康熙五十八年陜西甘肅所屬額徵地丁銀一百八十八萬兩零歷年舊缺四萬兩零康熙五十九年沿邊各州縣衛所額徵銀九萬八千一百兩零浹沛恩綸屢行蠲免近聞二麥歉收民有艱於粒食者辦賦急公力何能支若非渙敷德澤無以培養窮氓是以特頒浩蕩之恩用申勤求民瘼之意著將陜西巡撫甘肅巡撫所屬通省各州縣衛所除應徵米豆草束外康熙六十年應徵地丁銀一百八十八萬三千七百四十四兩零通行蠲免户部速行文該督撫遍示曉諭實心奉行務必均沾實惠如有不肖官吏陽奉隂違澤不下究者該督撫嚴察題參從重治罪又覆准固原等州縣衛所被災錢糧照例蠲免又奉上諭陜西省地方現有軍務今歲糧穀適又歉收已預頒諭㫖著總漕將運米路徑勘視具奏協同總督辦事除陜西歷年錢糧屢經蠲免明歲錢糧另頒諭㫖蠲免外今雖動支常平倉糧散給而地方官大半俱在軍前現今所有俱係署事官員辦事人員殊少應照曩年差官賑濟山東百姓遣往賑濟遵㫖議定動戶部庫銀五十萬兩委司官運送將西安延安蘭州分作三路散賑併將陜屬各州縣衛所㕔常平倉糧六十九萬二千石零甘屬各州縣衛所㕔常平倉糧六十七萬二千石內就近酌量散賑除失收地方外如有應行散賑之處一面具題一面會同散給再旗民有情願效力人員許自備銀米赴部具呈將職名送散賑官處效力事竣照數目之多寡核明議叙又覆准甘屬固原州等二十州縣衛夏禾被災動糧借賑併于西安藩庫存貯五十九年地丁錢糧內動銀十萬兩解送甘肅以備散賑又覆准陜屬五十四五六七等年未完民缺錢糧令其分年帶徵又題准陜西固原平凉臨洮等州縣夏禾被災將本年分額徵錢糧停徵六十年覆准甘肅靜寧州等處被災照分數蠲免錢糧又議准直𨽻山東山西河南陜西五省被災將各省常平倉穀酌量動賑其直屬常平倉先經正順廣大四府米貴將常平倉穀十分之內動三分糶賣二分借給今照此例酌量賑濟山東濟兖東青四府動支倉穀散賑河南將截留漕米散賑仍平價糶賣山西將常平倉穀酌量平價糶賣陜西去歲歉收已發帑銀五十萬兩遣部院三路賑濟如有不敷將河南續運米石酌量散給其陜西錢糧已經全蠲直𨽻四省暫將錢糧緩徵又覆准山陜二省去秋歉收小民艱食良由地方官於閭閻疾苦漠不關心不能設法料理以致百姓流離行令山陜督撫確查地方官內有貪汚實跡不惜民瘼者即行題參從重治罪仍責令養活飢民以貸其死其平日不留心民瘼而惡迹尚未昭彰者該督撫即行查明亦令養活飢民從寬暫留以策後效督撫狥庇不行查參别經發覺一併治罪如該地方官有真正實心愛民設法賑救保全者該督撫保題准從優即升又覆准陜西甘屬五十九年夏秋被災今值春耕撥解庫銀二十萬兩給發籽種俟秋收後補還又奉上諭去冬雪大所以今春雨澤甚少大約冬雪多則春雨必少春雨少則秋霖必多此非由占驗而知者朕六十年來留心農事較量雨暘往往不爽其南方得雪于田土有益而北方雖有大雪被風刮去于田土無益今歲山東得雨而河南山西陜西地方未甚得雨備荒最為緊要不可不預為籌畫若直𨽻河南山東易于料理至山西陜西補救尤難古人云三年耕則有一年之蓄九年耕則有三年之蓄言雖可聽行之不易設立社倉原屬良法但亦曽舉行終無成效至于各省積貯穀石雖俱報稱數十百萬實在存倉者無幾即出陳易新之法不為不善然春間僅有所出秋收並無所入州縣官員侵蝕入已急則即以折銀掩飾此等積弊朕知之甚詳即報荒之真僞虛實朕亦知悉如熱河所積穀石每歲减價平糶秋收糴補還倉數目無多稽查頗易所以每有餘糧語云大兵之後必有凶年昔征剿三逆時豐收足以供給並無一州一縣貽誤平定以後亦間有歉歲兹當綢繆未雨不可不預為之慮又奉上諭陜省冬春雨雪愆期秋成難望其河南運米十萬石借支駐防兵糧湖廣所運米十萬石速催運到酌量平糶六十一年覆准固原等州縣衛秋禾被災錢糧照分數蠲免雍正元年覆准六十年平凉等㕔州縣衛所被災錢糧按分數蠲免又奉上諭陜西自軍興以來大兵駐劄運送糧餉供支草豆無一不需民力原非他省可比皇考每為軫念今當大沛恩膏以子惠元元所有康熙六十年以前陜省除借給籽種著該督撫查明定議分年帶徵外其餘凡有民屯衛所實在未完銀米豆草悉豫蠲免倘有不肖官吏敢以虧空揑稱民缺濫邀曠典者一經發覺罪在不赦戶部作速行文毋得遲留又奉上諭朕惟治安天下欲兵民並得其所必以敷恩减賦為要比年以來策妄阿喇布坦逞狂逆命發師致討四川陜西官兵經歷險道往返萬有餘里甚屬勞苦朕深憫念其倒斃駝載馬匹價銀及口外沿途與西藏留駐兵丁續補駝馬價銀著悉免追賠又西陲軍興以來民間急公趨事應付差役實厪朕懷聞陜西甘肅二屬各州縣衛所地丁銀兩每錢額外徵收三釐米每斗額外徵收三合以為備荒之用此項徒有加賦之徵而無賑濟之實著自雍正元年為始將額外徵收銀米永行停止如有舊缺亦悉豫蠲除户部速行文該督撫遵諭奉行務俾均沾實惠以副朕篤念民生至意又覆准甘屬古浪所地方氷雹傷禾錢糧按分數蠲免四年覆准陜西倉糧久未糶賣令於每年二三月內存七糶三至八九月買補還倉六年覆准蘭州㕔並武威縣氷雹打傷禾苗錢糧照分數蠲免七年覆准平畨縣河州氷雹打傷禾苗錢糧查雍正六年三月內奉上諭將蠲免之例加增分數以惠蒸黎其被災十分者著免七分九分者著免六分八分者著免四分七分者著免二分六分者著免一分欽遵通行在案平畨河州錢糧照欽定例蠲免又覆准平凉縣夏禾被災錢糧照分數蠲免又覆准平凉縣秋禾被災錢糧照分數蠲免又覆准安定縣秋禾被災錢糧照分數蠲免又奉上諭朕愛養黎元遐邇一體而邊逺之地小民家計不及近省尤朕心之所繫念數年以來甘肅四川雲南貴州廣西五省有用兵西藏及勦撫苗蠻等事其一應軍需皆動用公帑備辦秋毫不𣲖及于民間而糧餉轉輸亦有資于民力今藏地苗疆俱已寧謐朕心嘉慰特沛恩膏著將庚戌年甘肅額徵地丁銀二十七萬七千六百兩零四川額徵地丁銀三十一萬六千三百兩零雲南額徵地丁銀一十四萬一千六百兩零貴州額徵地丁銀七萬四千二百兩零廣西額徵地丁銀三十五萬三千九百兩零悉行蠲免其西安各屬地方近日亦有預備軍需之事朕心軫念著將庚戌年額徵錢糧蠲免十分之三共計銀四十七萬九千九百兩零此六省督撫大吏宜仰體朕心轉飭所屬有司敬謹奉行務使閭閻均沾實惠如有奉行不力被不肖有司暗飽私囊或被奸胥土棍强紳劣襟包攬侵蝕者朕必訪聞得知將通省大小官員分别從重治罪至於國家設官本以理民官有恤下之責民有奉上之義若設官而不為計及養亷之資則有司之賢者將窘迫而莫能支不肖者又將橫取而無所檢束矣是以酌定以錢糧耗羡均給各官養廉之法此揆情度理上下相安之道但思加恩百姓豁免正賦若將耗羡一併蠲除是民雖邀格外之恩而官轉有拮据之苦上司或因此稍有寬假則必致巧取苛索於民流弊種種轉多於耗羡之數于吏治民生均無禆益常見庸劣之地方官每以蠲免錢糧為不便于已心懷悵怏即此意也著於庚戌年為始凡遇特恩蠲免錢糧者其耗羡仍舊輸納諒必民所樂從若因水旱蠲免者不得徵收耗羡將此永著為例又覆准安定縣秋禾被災照分數蠲免又奉上諭甘肅地方年來預備軍需雖事事取辦于公帑而百姓挽輸效力亦甚勤勞朕心軫念維殷屢加恩澤前聞今歲蘭州平凉西寧等府所屬州縣內有雹雨蟲傷之處已諭該督撫留心賑恤停止催科嗣聞從前雨少之地俱已霑被甘霖秋成可望朕心深慰因念甘肅為軍需總滙之區百姓急公趨事所當格外加恩俾閭閻力量寬餘無催徵之擾以昭朕子惠元元奬勞賞善之至意著將河東河西各屬民户屯戶及畨民等本年應徵各項銀糧草束一概蠲免若有已經完納者准作來年正賦該督撫等務體朕心督率有司敬謹奉行俾秦民均沾實惠倘有豪胥猾吏舞弊作奸使澤不下究者經朕訪聞定將該管大小官員嚴加議處特諭又覆准平凉縣秋禾被災照例蠲免又覆准靖逺㕔并接收蘭州衛等處地方秋禾被災照例蠲免又奉㫖據寧逺大將軍嶽鍾琪奏稱自西安起程歷西鳳平臨以至甘凉等處小民承辦軍需莫不踴躍歡呼趨事赴公爭先恐後而靖逆衛屯民於應辦草束之外情願另備餘草運赴大東渠站所堆積以佐軍需等語靖逆逺處邊外人民無幾而自備割運草束輸力效誠可見師以義行統領大臣又能令承辦軍需各員無絲毫扣尅是以輿情鼓舞相率辦公朕心深為嘉悅著將靖逆庚戌年應徵正糧馬糧四百六十六石零大草五千三百八十八束全行蠲免以示加恩邊民急公之至意又上諭年來用兵西藏剿撫苗蠻及目今辦理軍需一切皆動支公庫而糧餉轉輸不無資于民力朕心深為軫念是以降㫖將甘肅四川雲貴廣西五省庚戌年地丁錢糧全行蠲免查甘屬之河西四府如寧夏西寧及甘凉肅以至嘉峪關外之靖逆赤金柳溝等衛所歷來額徵俱係糧料草束與各省額徵折色無異今當用兵之際雖絲毫不𣲖及民間而黎民踴躍急公之意大將軍嶽鍾琪屢次奏聞甚屬可嘉應將額徵本色加恩豁免以示惠愛邊民之至意著户部即行查明具奏查甘屬之靖逆衛庚戌年應徵糧四百六十六石零草五千三百八十八束已奉上諭全行蠲免其河西之甘州凉州寧夏西寧及肅州道屬以至赤金柳溝各衛所庚戌年共應徵糧三十五萬六百五十五石二斗四升零草四百七十五萬二千三百六十九束應悉行豁免八年奉上諭甘肅地方雍正八年地丁錢糧前已降㫖蠲免其河西四府州縣暨各衛所額徵糧料草束又經一體免徵朕念新歸內地畨民嚮風慕義願附版圖其地畝額徵本色糧草與河西等處賦稅相同亦應一體蠲免俾令同霑恩澤著將雍正八年河東之河州㕔應徵畨糧一千三十一石零洮州衛應徵畨糧三百一十六石零歸德所應徵畨糧一百六十三石零河西之西寧府屬應徵畨糧一萬五百四十二石零凉州府屬應徵畨糧二十七石零草一百九十七束零俱加恩蠲免該督撫即督率所屬有司敬謹奉行俾畨民均霑實惠特諭九年奉上諭朕思惠養黎元之道莫先於除賦蠲租使萬姓均霑恩澤是以數年來寬免各省之額徵以為阜民足食之計者難以枚舉而該省之人民果能抒誠慕義宣力急公朕尤嘉其人心風俗之淳良而屢沛恩施於常格之外也陜西甘肅二省經理軍需數年矣凡米糧芻牧之屬及車馬牲畜之類皆動支公帑銀兩備辦一絲一粟不使擾民此中外臣民所共知者然朕每念地方既有軍務縱不取辦于民財未嘗不資藉於民力而陜甘二省之人民踴躍趨事其心甚為可嘉年來已屢降蠲賦之㫖兹特再沛恩膏將雍正九年西安所屬額徵地丁銀蠲免十分之三共計銀四十七萬九千九百兩零甘肅所屬額徵地丁銀二十八萬二千二百兩零全行蠲免該督撫等可轉飭所屬有司仰體朕心敬謹奉行務令閭閻均沾實惠並將此㫖刋刻頒布俾深山僻壤之民共知之特諭甘肅通志卷十七
